body:
  text: 周易孔義集説卷十九光祿寺卿沈起元撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣韓康伯曰八卦備天下之理而未極其變故因而重之以象其動則爻之義所存各異故爻在其中本義因而重之謂各因一卦而以八卦次第加之為六十四卦爻六爻既重而後卦有六爻也楊誠齋曰八卦未畫萬象在天下八卦既列萬象在易朱漢上曰伏羲始畫八卦八卦成列而乾坤定位震巽一交也坎離二交也艮兌三交也六十四卦之象在其中矣三畫天地人也伏羲因而重之則三百八十四爻在其中矣歸藏初經八卦六爻則知因重之者伏羲也姚信曰夏曰連山商曰歸藏周曰周易連山神農氏也歸藏黃帝氏也又曰先儒論重卦者六家王弼虞翻曰伏羲鄭康成曰神農孫盛曰夏禹司馬遷揚雄曰文王而孔穎達陸德明陸希聲則以弼論為是柴與之曰八卦列成則凡天下之象舉在其中不止八物如説卦中所列皆是也按言因而重之則伏羲重卦無疑紛紛者可息又玩因重之因字伏羲於此更無事安排只每卦加八卦而已非如八卦之創為三畫故曰因也邵氏逐爻生出四畫五畫六畫之説不可從本義既主各加八卦之説而語録中猶有接次生出逐爻之語則泥於邵氏也讀語録者審之剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝生乎動者也虞仲翔曰剛柔相推而生變化故變在其中繫彖象九六之辭故動在其中鼓天下之動者存乎辭周濓溪曰吉凶悔吝生乎動噫吉一而已動可不謹乎王童溪曰聖人繫之以辭而命之於人使知吉凶之所以然而明其趨舍焉則趨舍之動又在乎爻辭之中矣項平甫曰人之動有吉凶悔吝而不出於卦辭爻辭之所命變與動字義相近恐讀者之不能辨也故聖人自釋之曰吉凶悔吝生乎動者也明變主易言動主人言也蘇紫溪曰動在其中動字與下文生乎動天下之動三動字俱同非當動卦爻之謂也剛柔者立本者也變通者趨時者也孔仲達曰若乾之初九趨向勿用之時上九趨向亢極之時是諸爻之變皆臻趨於時也其剛柔立本者立其卦本而不易也卦者時也變通者趨時者也卦既總主一時爻則就一時之中各趨其所宜之時故略例云爻者趨時者也朱子剛柔者隂陽之質是移易不得之定體故謂之本若剛變為柔柔變為剛便是變通之用剛柔是本變通即是其往來者朱漢上曰趨時者時中也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也本義貞正也常也物以其所正為常者也觀示也天下之動其變無窮然順理則吉逆理則凶則其正而常者亦一理而已矣髙氏萃曰天常示人以易地常示人以簡雖隂不能以不愆陽不能以不伏而貞觀之理常自若也日明乎晝月明乎夜雖中不能以不昃盈不能以不食而貞明之理常自若也天下之動進退存亡不可以一例測然順理則裕從欲唯危其揆一也惠迪吉從逆凶無二致也是則造化之正常即吉凶之貞勝豈可以二而求之哉觀彖吉凶之遇善惡參差故有僥幸獲福無妄生災者然非其常也必以其常者為勝天下之動亦常夫一理而已矣朱髙安曰禍福之來與是非相因間有不然者未定之天終歸於有定變不勝常也按貞勝之説張子以正為貞朱子謂非經旨細玩以貞作正於理極的但於貞夫一文義未洽既曰正矣又何容更添一字朱子以常相勝釋貞勝則又看得貞字輕惟以常者為正則常字內包得正字孔子恐人誤看貞字故又言貞夫一以明之也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也本義確然健貌隤然順號所謂貞觀者也此謂上文乾坤所示之理爻之奇耦卦之消息所以效而像之王童溪曰爻之立也效此易簡而已象之立也像此易簡而已謂自剛柔健順而外初無他事也項平甫曰乾易坤簡爻效象像即上文所謂象在其中爻在其中也此剛柔立本之事爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭張子因爻象之既動明吉凶於未形故爻象動乎內吉凶見乎外隨爻象之變以通其利故功業見也聖人之情存乎教人而已郭白雲曰爻象動於卦中吉凶見於人事項平甫曰爻象吉凶功業聖人即上文所謂變在其中動在其中也此變通趣時之事鄭亨仲曰道之在事者爻效之其在理者象像之靜而已則吉凶泯而未見動然後吉凶見吳草廬曰聖人之道四者而獨歸重於辭蓋此篇為繫辭之傳故也右第一章孔仲達曰此覆釋上繫第二章象爻剛柔吉凶悔吝之事更具而詳之觀彖傳以繫辭為名則所贊者文周之辭也然必推本設卦所以著明辭所由繫而下傳於辭尤詳以後數章亦皆所以申釋此章之意也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義崔氏憬曰言聖人行易之道當法天地之大德寶萬乘之大位謂以道濟天下為寶是其大寶也蘇子瞻曰理財者疏理其出入之道使不壅耳非取之也正辭者正名也朱子正辭只是分别是非教化便在正辭內朱漢上曰天地之大德曰生者仁也聖人成位乎兩間者仁而已義所以為仁非二本也故曰立人之道曰仁與義王童溪曰前章言聖人作易以垂萬世之教此章乃言聖人用易以致天下之利聖人所以配天地而王天下者亦有仁義而已矣仁德之用也義所以輔仁理財如作綱罟耒耜致民交易之類項平甫曰聖人之仁即天地之生大寶曰位即崇髙莫大於富貴故自此以下以包羲氏神農氏黃帝堯舜氏實之皆聖人之富貴者也財者百物之總名理財謂水火金木土穀惟修所以利民也正辭謂殊貴賤明取豫辨名實導使知義也禁民為非謂憲禁令致刑罰以齊其不可導者也蓋養之教之而後齊之其德意之所發主於仁民義者仁之見於條理者真西山曰易之並言仁義者此章及説卦立天之道章而已在天地曰生在聖人曰仁按此節注疏本屬上章朱子本義因之朱漢上曰胡旦分天地之大德曰生為一章陽卦多隂為一章考之文義當從旦龔原本亦然工童溪本吳草廬王秋山本皆以此為下章之首安溪觀象亦然愚玩文義伏羲神農黃帝堯舜皆聖人之得位者此節實為全章綱領考注疏章次謬誤非一皆經本義改正此節偶未及改耳今從諸儒本為下章之首又本義云曰人之人今本作仁呂氏從古蓋所謂非衆罔與守邦考釋文仁作人注云王肅卞伯玉桓玄明僧紹作仁嵩山朝氏東萊呂氏皆從釋文李秀巖曰蔡雍云以仁守位以財聚人則漢以前已用此仁字矣今仍之古者包羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情本義王昭素曰與地之宜諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象語類聖人心細雖以鳥獸羽毛之微亦盡察得有隂陽凡草木禽獸莫不有隂陽鯉魚脊上有三十六鱗龍脊上有八十一鱗又如草木之有雌雄銀杏桐楮牝牡麻竹之類朱漢上曰自此以下明備物致用立成器以為天下利者無非有取於易皆仁也曰王天下者明守位也蔡節齋曰聖人所畫之卦精可以通神明之德粗可以類萬物之情神明之德不可見者也故曰通萬物之情可見者故曰類項平甫曰象以氣言屬陽法以形言屬隂鳥獸之文謂天産之物飛陽而走隂也土地所宜謂地産之物木陽而草隂也王秋山曰伏羲繼天立極畫八卦以前民用後之聖人相繼而作制為相生相養之具皆所以廣天地生生之德自網罟至書契是也熊梅邊曰仰則觀象二句聖人所以作易仰以觀於天文二句聖人所以驗易俞石澗曰因而重之為六十四卦其實只是八卦故巽震相遇而文王名之曰益在伏羲則震下巽上而已震離相遇而文王名之曰噬嗑在伏羲則震下離上而已他卦皆然陸聚緱曰此羲皇畫卦之由若見龍馬負圖而畫卦不過觀鳥獸之文一端而已作結繩而為網罟以佃以漁蓋取諸離孔仲達曰諸儒象卦制器皆取卦之爻象之體取象不取名也韓氏乃取名不取象於義未善張子制作之意蓋取諸某卦非必見卦而始有為也是夫子之言耳本義兩目相承而物麗焉胡安定曰蓋者疑之辭也言聖人創立其事不必觀此卦而成之蓋聖人作事立器自然符合於此卦象也非準擬此卦而後成之故曰蓋取郭白雲曰當時之人知為網罟漁佃而已不知有所取也孔子以易道觀之然後知是蓋有取于離故曰蓋取朱漢上曰上古茹毛飲血故教以佃漁巽繩離目兩目相連結繩為之離為雉佃也兌巽為魚漁也馮厚齋曰離有二義曰象曰理理謂麗也謂麗於網罟也象謂虛中網罟之目虛也包羲氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益耨王昭素云諸本或作耜乃合上文本義二體皆木上入下動蔡節齋曰耜耒首斷木之鋭而為之耒耜柄揉木使曲而為之吳草廬曰益上巽二陽象耒之自地上而入下震一陽象耜之在地下而動耒耨舊本作耜日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑本義日中為市上明而下動朱漢上曰離日在上為日中坤衆在下為市為民鄭合沙曰十三卦始離次益次噬嗑所取者食貨生民之本也謝疊山曰震大塗艮小徑市井衢巷象神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤朱漢上曰乾在上為衣坤在下為裳項平甫曰乾坤相變為六十四卦此變通之象也俞石澗曰易無有窮也窮者數也陽數窮於九隂數窮於六窮則變變則通乾用九六爻俱變則為坤坤用六六爻俱變則為乾翁庶善曰乾數九故王之司服九章坤數六故后之司服六章陸聚緱曰通其變至吉無不利一段蓋言揲蓍求卦始於黃帝以之教民乃開物成務之大者也所謂取諸乾坤者揲蓍之法不離奇偶故孔子斷為取諸乾坤又按伏羲節先言畫卦後及制器而言綱罟黃帝堯舜節先言揲蓍後及制器而言垂衣裳上衣下裳亦乾坤之象當如首節分二段按揲蓍求卦為始於黃帝者創自陸氏於上繫蓍之德節已言之蓋陸氏實從此節悟出易之言通變化裁多言揲蓍求卦今此節若泛言聖人之用易何故於十三卦制器之中忽發此數語且傳文易窮則變特提易字明主易之蓍卦而言非言世運非言人事也陸聚緱研窮易理至二十年此種開闢之見自是不易且與項氏俞氏之説有默符者十三卦皆言制器此節只取衣裳二字與網罟耒耜等字一例天下治與教天下利天下諸語一例無庸重看刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙九家易曰木在水上流行若風本義致逺以利天下疑衍郭白雲曰巽為木坎為水故其彖曰利涉大川乘木有功也吳草廬曰刳木者空其中為舟以浮水剡木者剡薄其端為楫以運舟二三四五上舟虛之象初耦二楫運於舟後之象服牛乘馬引重致逺以利天下蓋取諸隨司馬溫公曰服牛乘馬附物而行本義下動上説董番陽曰大車服牛以引重小車乘馬以致逺重門擊柝以待暴客蓋取諸豫朱漢上曰坤為闔戶坎盜逼之暴客也俞石澗曰坤為闔戶互艮為闕重門象震動而有聲之木互艮為閽人擊柝象斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過本義下止上動鄭少梅曰艮為土木克之掘地也邱行可曰震木上動艮土下止杵臼治米之象胡雙湖曰震木互兌金斷之為杵象弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽胡雙湖曰以有互坎也坎為弓睽上張弧説弧皆取坎象坎木兌金剡之則為矢來矣鮮曰坎為弓矢離為戈兵又水火相息皆有征伐之意上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯蔡節齋曰棟脊檁宇椽也棟直承而上取四剛義宇兩垂而下取二柔義按乾為天主覆物上下四方為宇皆天所覆有宮室象雷動則風雨將至宮室成於下雷動於上故曰以蔽風雨古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過張紫巖曰陽藏其中送死之義鄭少梅曰棟宇必固其基故大壯下纍四陽以為基棺槨必堅其中故大過中存四陽以堅其中謝疊山曰棺槨木皆四片大過全體又有坎穴皆埋葬象初土坤爻為上下皆土木在土中棺槨象觀彖木入澤中按大過與頤反對頤以養生大過送死説詳下經上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬吳草廬曰古者結繩以為信大事大其繩小事小其繩以識别也書以刀筆畫木簡為文字契以木刻一二三四之畫而中分之各執其一合之以為信書契自一畫二三四畫始至五畫則為蓋至五而窮窮則變夬有五奇畫象書契之一二三四五至六則變矣故上畫耦者奇之變也又象契之上端分為二之處十三卦之制作畫卦始書契終蓋萬世文字之祖肇於畫卦備於書契是故易者象也象也者像也干令升曰言是故又總結上文也崔氏憬曰上明取象以制器之義故以此重釋於象言易者象於萬物象者形像之象也蔡氏攸曰象與卦並生以寓天下之頤其變不一而象亦為之滋矣上古尚此以制器中古觀此以繫辭而後之言易者乃曰得意忘象得象忘言一切指為魚兔筌蹄殆非聖人作易前民用之意也吳草廬曰此章第一節總敘以起下文自包羲至書契言制作之事而以是故總結之謂易卦皆器物之象彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也韓康伯曰材才德也彖言成卦之材以統卦義也朱子易之有象其取之有所從其推之有所用非苟為寓言也項平甫曰象即卦也卦著全卦之象彖言上下兩卦之材爻貢六爻之動三者具而吉凶悔吝明矣此章首言包羲觀物制易中言數聖人觀易制物皆尚象之事此乃言尚辭尚變尚占之事而易之四道備矣朱漢上曰卦有剛柔材也有是時有是象必有是材以濟之材與時會足以成務矣然天下之動其物難知有同是一時同處一事所當之位不同則趨舍進退殊途矣故爻效天下之動卦同爻異趨時之變不得而同吳草廬曰又以是故結上文二句謂彖爻如此故生出吉凶使人趨避著明悔吝使人警悟按吉凶悔吝當平講右第二章按此章句從項氏吳氏陽卦多隂隂卦多陽其故何也陽卦奇隂卦耦韓康伯曰夫少者多之所宗一者衆之所歸陽卦二隂故奇為之君隂卦二陽故耦為之主其德行何也陽一君而二民君子之道也隂二君而一民小人之道也郭白雲曰隂陽二卦皆以陽為君一君而二民其道順故為君子二君而一民其道逆則為小人朱漢上曰陽卦一君而遍體二民二民共事一君一也故為君子之道隂卦一民共事二君二君共爭一民二也故為小人之道吳敬齋曰陽卦固主陽也隂卦亦主陽可見陽有常尊也按此二節見聖人玩易之法是活法不是死法陽卦奇為主隂卦耦為主六子之定例亦重卦之常例然陽終是君隂終是民卦之德行又有君子小人之道矣右第三章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也韓康伯曰天下之動必歸於一思以求朋未能一也一以感物不思而至塗雖殊其歸則同慮雖百其致不二苟識其要不在博求一以貫之不慮而盡矣精義由於入神以致其用利用由於安身以崇其德孔仲達曰此明不能無心感物使物來應乃憧憧然役用思慮也不須思慮任運往來自然明生自然歲成往來相感屈信相須尺蠖之蟲先行必屈言信必須屈也龍蛇初蟄是靜也以存身者言靜以求動也聖人用精微之義入於神化寂然不動乃能致其所用先靜後動是動因靜而來也欲利己之用先須安靜其身可以增崇其德此亦先靜後動動亦由靜而來也精義入神以致用利用安身以崇德此二者皆人理之極過此二者以往則微妙不可知窮極微妙之神曉知變化之道乃是聖人德之盛極也程傳夫子因咸極論感通之道夫以思慮之私心感物所感狹矣物有萬殊事有萬變統之以一則無能違者故貞其意則窮天下無不感通焉屈則有信信則有屈所謂感應也有感必有應凡有動皆為感感則必有應所應復為感感復有應所以不已也張子屈信相感而利生感以誠也精偽相感而利害生雜之偽也何思何慮行其所無事而已下文皆是一意天下無窮動靜情偽止一屈信而已在我先行其所無事則是意必固我已絶百慮而一致先得此一致之理則何用百慮慮雖百卒歸乎理而已精義入神事豫吾內求利吾外也利用安身素豫吾外致養吾內窮神知化乃德盛自致非思慮之能強故崇德而外君子未或致知也氣有隂陽推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足云窮神是窮盡其神也入神是僅能入於神也言入如自外而入義固有淺深本義此引咸九四爻辭而言往來屈信皆感應自然之常理加憧憧焉則入於私矣因言屈信往來之理而又推以言學亦有自然之機也語類天下何思何慮一句便打破思字日月寒暑之往來尺蠖龍蛇之屈信皆是自然底道理為學亦只是如此精義入神用力於內乃所以致用乎外利用安身求利於外乃所以崇德於內雖至於窮神知化亦只是德盛仁熟所致何思何慮之有義者宜而已精者猶曰察之云爾察之之至而入於神有不可容言之妙所以用無不利也精義入神如何不思那致用底却不必思致用是事功是效驗郭白雲曰孔子於此雖論何思何慮而極天下往來之理而論之則知爻辭往來二字非徒然也是所謂玩辭也楊誠齋曰精於庖者其刀入神精於射者其矢入神苟入神矣其致用於庖與射也何有而況精於義理而入神者乎項平甫曰精義以利其用利用以崇其德未可以言無思無慮也至於過此以往而入於窮神知化之鄉安於盛德仁熟之境乃可以何思何慮此夫子從心之時孟子聖神之境也蔡虛齋曰聖人心胸大如咸九四只説人心感應之公私夫子一觸便上徹日月寒暑下徹尺蠖龍蛇而致於窮神知化一觸無遺者是也吳氏一源曰人皆知信之利而不知屈之所以利也故以尺蠖龍蛇明之専言屈之利以示人正欲人養靜以一動無感以待感也易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪朱子石是挨動不得之物自是不應去動他若是只管去用力徒自困耳柴與之曰此言困之小人不知義以危身邱行可曰石非可困之物而困焉則用力於不當用之地名烏得而不辱易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也韓康伯曰括結也君子待時而動則無結閡之患朱子公用射隼孔子自是發出言外之意子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也孔仲達曰此節明小人之道不能恆善若因懲誡而得福也故引噬嗑初九以證之善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶孔仲達曰此明惡人為惡之極以致凶引噬嗑上九爻辭以證之子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑朱子常有危亡與亂之慮則可以安其位保其存有其治吳草廬曰自處於危者乃自安其位之道也按此即否九五爻辭以明君子保安圖治之道子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也張紫巖曰居臺鼎之位德知力三者一有所闕則弗能勝其事而況俱不足者乎鼎九四以陽承隂位不中正而又下應於隂德薄也位離明下知小也互兌兌毁力小也錢融堂曰為君不明於所擇為臣不審於自擇以至亡身危主誤國亂天下皆由不勝任之故可不戒哉子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望孔仲達曰動謂心動事動初動之時其理未著已著之後則心事顯露若未動之先又寂然頓無幾是離無入有在有無之際故云動之微直云吉不云凶者凡豫前知幾皆向吉而背凶違凶而就吉無復有凶故特云吉諸本或有凶字者其定本則無不俟終日言赴幾之速也豫之六二既耿介如石不動才見幾微即知禍福何用終竟其日當時則斷可識矣凡物之體從柔以至剛凡事之理從微以至彰知幾之人既知其始又知其末是合於神道故為萬夫所瞻望也張子幾者象見而未形者形則不待神而後知也吉之先見云者順性命則所先見皆吉也朱子幾是欲動未動之間便有善惡所以聖賢説慎獨是就幾微處理會朱漢上曰吉之先見譬如陽生而井溫雨降而雲出衆人不識而君子見之項平甫曰諂者本以求福而禍常基於諂瀆者本以交歡而怨常起於瀆易言知幾而孔子以不諂不瀆明之此真所謂知幾者矣欲進此道唯存察之熟疆界素明者能之此所以必歸之於介如石者歟胡雙湖曰豫六二爻唯曰介於石不終日貞吉而夫子發明幾學以教人蓋介有幾義祁寬謂至纎至細處者深為得之上交謂五下謂初惟當豫時不諂不瀆不沈溺於豫此其所以為知幾也子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉蘇子瞻曰知之而復行者非真知也世所以不食烏喙者徒以知之審耳使知不善如知烏喙則世皆顏子矣所以不及聖人者猶待知爾程子顏子所謂不善者只是微有差失才差失便知便更不萌作顏子與聖人只此分别朱子庶幾近意言近道也項平甫曰殆者將也庶幾者近辭也天地網緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也本義網緼交密之狀醇謂厚而凝也言氣化者也化生形化者也語録致一専一也若不専一則各自相離矣天地男女都是兩箇方得專一三人行減了一箇則是兩箇一人行得其友成兩箇便専一項平甫曰天地之交合萬物而同生故曰化醇萬物之交各成其類故曰化生吳草廬曰以一合一則其情専以一合二則其情分按文言傳大抵夫子於本爻正意之外觸類旁通發明言外之意即此爻辭三人損一明損之主爻也一人得友明損之所以有孚也故象傳以三則疑也釋之言非損一非得友則不孚也此爻辭之正意夫子玩辭見損有少男少女之象又看出致一之道此本爻言外之意子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶韓康伯曰虛已存誠則衆之所不逆也躁以有求則物之所不欲也項平甫曰危以動則民不與黨與之與無交而求則民不與取與之與以易對懼直者其語易曲者其語懼乾之所以易者以其直也吳草廬曰安其身謂循理則身康安動謂變動其民也易其心謂平志則心和易語謂告語其民也定前定交下交謂先施於民以固結之求猶責也責其愛戴歸嚮也右十一節按此皆爻象文言錯簡説詳上繫傳子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪荀慈明曰隂陽相易出於乾坤故曰門名謂卦名本義衰世之意蓋指文王與紂之時也徐進齋曰天地之撰隂陽造化之迹也有形可擬故曰體言效其至著者也神明之德隂陽健順之性也有理可推故曰通言極其至微也李蒙齋曰雜而不越者言六十四卦其稱名雖雜而不越乎乾坤剛柔之道吳草廬曰易謂六子以奇耦相易而成卦乾坤者六子之所從出故曰門物猶言畫也射禮畫於地者亦曰物乾陽之德坤隂之德交互相合以生六子而震坎艮有一剛二柔之體巽離兌一柔二剛之體此八卦者與天地神明一也體謂以之為體撰猶言所為體天地之撰以卦體言通神明之德以卦德言名謂重卦之名雜謂不一越過也文王所稱六十四卦之名雖其義不一而皆不過自八卦中出觀彖伏羲之時八卦有名而已六十四卦之名則至文王而始具世變風移情偽日滋非是不足以周盡之故考其類而知其為衰世之意夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣張子如坤初六驗履霜於已然察堅氷於將至之類一云數往知來其義一也顯者則微之使求其原幽者則闡之使見其用故曰其事肆而隱本義而微顯恐當作微顯而王童溪曰往者彰之使人稽其所以然來者察之使人逆其所未然顯者吾微之使人不敢有所玩幽者吾闡之使人無或有所蔽郭白雲曰當名謂卦也辨物謂象也正言彖辭也斷辭繫之以吉凶者也張南軒曰論易之神彰往察來易之道微顯闡幽儻非乾坤開而當名辨物正言斷辭則易之道安能備而無窮乎是以陽奇隂耦以示之然後即其健而名之以乾即其順而名之以坤以八卦六十四卦當其名名既當則隂陽之物雖相雜有自然而辨者矣以吉凶言失得悔吝言小疵皆正其言也言既正則辭之指其所者有自然而斷者矣王秋山曰自夫乾坤之門一開而為八八而為六十四其卦其象各當其名其剛其柔各辨其物而又正之以至賾至動之言斷之以吉凶悔吝之辭易之道無不備矣吳草廬曰微顯即神德行也謂以人事之顯而本之於天道所以微其顯闡幽即顯道也謂以天道之幽而用之於人事所以闡其幽其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報本義肆陳也二疑也張南軒曰名卦曰睽而已而天下之事同男女之事類在焉名卦以恆而已而日月之久照四時之久成在焉此稱名小而取類大也程敬承曰理貞夫一而民二之有失得故二也明失得之報則天下曉然於理之一而民行濟矣濟者出之陷溺之危而措之安吉之地此其所以為衰世之意耶觀彖惟其旨逺辭文也故雖旁通曲喻而皆切于事理之實惟其名小類大也故雖雜陳兼該而悉原性命之奧右第四章按此四節諸儒疑多闕文吳草廬將小人之道也以下釋咸困十一節定為文言錯簡而以陽卦多隂二節與此合為一章遂覺通章貫穿兹本章次雖未敢更定然以上章小人之道也句觀之可見八卦之象已包涵衰世之事所謂設卦以盡情偽雖伏羲時風淳俗古未有其事而前知之聖已知其必有此事而畫卦以盡之也但其時有卦無名其義未顯至文王始徹底開闢出來而易之用乃備上章言陽卦隂卦是言六子此章首言乾坤易之門見六子之所從出文義自一貫易之興也其於中古乎作易者其有憂患乎孔仲達曰謂卦爻辭之辭起於中古作易者身既憂患須垂法以示於後以防憂患之事故繫之文辭明其失得吉凶也張子諳識情偽吉凶之變故能體盡性命本義文王拘於羑里而繫彖辭易道復興郭白雲曰聖人道不行於天下而憂患天下後世之深欲力以斯文昭示來世此文王所以蒙大難而作易也吳草廬曰羲皇之易有畫而已三畫卦雖有名而六畫卦未有名文王始名六畫之卦而繫之以辭易道至此而復興也卦名及辭皆前此所未有故不云述而云作是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也荀慈明曰懲忿窒欲所以修德見善則遷有過則改德之優裕也虞仲翔曰初乾之元故德之本也立不易方守德之堅固干令升曰柄所以持物謙所以持禮韓康伯曰復反其所始故為德之本侯行果曰履蹈禮不倦德之基也本義上天下澤定分不易必謹乎此然後其德有以為基而立也九卦皆反身修德以處憂患之事而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順于理以制事變也語類巽多作斷制之象蓋巽字之義非順所能盡乃順而能入之義是入細徹底方能斷得殺王童溪曰特言九卦者蓋言文王當時之事也使文王在當時無有是德其能脫於憂患之域乎項平甫曰基猶築室之基有實行然後德可積而崇也本者物所從生善之端人心發見之初故曰德之本地體本靜而其生不窮井道似焉故曰德之地張南軒曰履德之基為先步步踏實地也陸象山曰履謂以行為德之基也基始也德自行而進也有而不居為謙盈則德喪矣常執不盈之心德乃日積不常則德不固故曰恆德之固不臨患難難處之地未足以見其德故曰困德之辨盧氏曰基與地有别基小而地大基是初起腳跟地是凝成全體吳草廬曰辨者識之明孟子謂人之有德慧術智恆存乎疢疾因身之困而心識開明也陳紫峯曰基從積行上説本就心裏説固是得寸守寸得尺守尺地則全體不窮陸聚緱曰九卦以履為首巽為終者蓋文王遭讒而甘受羑里之囚正有見於上天下澤為君臣之大分也其後閎夭之􅑫求美女奇物善馬以獻紂乃得赦遂獻洛西之地請除炮烙之刑豈非巽以行權之妙用乎履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱虞仲翔曰陽始見故小乾陽物坤隂物也以乾居坤故稱别物韓康伯曰和而不至從物者也和而能至故可履也改邑不改井所居不移而能遷其施也蘇子瞻曰雷風相與故雜張橫渠曰益物必誠如天之生物曰進日息自益必誠如川之方至日增日得長必裕之非虛設也本義此如書之九德禮非強世而事皆至極復陽微而不亂于羣隂困身困而道亨井不動而及物巽稱物之宜而潛隱不露語類隱如風之動物無物不入但見其動而不見其形權之為用猶是稱是巽順恰好底道理有能稱量而不能隱至露形迹者非巽之道也龔括蒼曰卦有德則有體有體則有用履德之基以德言也履和而至以體言也履以和行以用言也履者以柔履剛而能説故曰和説而應乎乾則亨故曰至此禮之用和為貴也謙之成卦在九三以剛下人衆隂歸之故尊而光雷風相與剛柔皆應所謂雜也雜則宜厭而愈久所謂不厭與涅而不淄同也外剛則見內柔則隱巽為權故能稱其性入故能隱項平甫曰此釋卦之兩體履和即兌説至乾健也和而不健者不能至也恆非執一而廢百也日月往來四時變化代明並育而不相厭所以能久也吳草廬曰尊謂坤地之卑而尊之使居艮山之上光謂艮山雖下於坤而自不失其為髙先難謂方損之初如浚兌澤於下畚土以上也後易謂既損之後如艮山之靜止而受土以成其髙也設謂虛假如揠苗而長之非實有長裕也居其所謂巽之二陽在下體水之在井中者也遷謂坎之一陽在上體水之汲而及物者也稱謂巽二陽在隂之前其重不偏如稱物之平隱謂一隂入陽之內為卦之主俞石澗曰恆剛柔皆應而其文交錯如青黃之交錯可謂雜矣而有常至久而不厭也履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權虞仲翔曰禮之用和為貴故以和行有不善未嘗不知故自知也恆立不易方故一德也孔仲達曰性能謙順可以裁制於禮困守節不移不怨天不尤人故寡怨歐陽永叔曰君子一身之損益天下之利害也肆其忿欲者天下有受其害者矣遷善改過天下有蒙其利者矣本義辨義謂安而能慮語類見得道理精熟後於物之精微委曲處無處不入所以言巽以行權朱漢上曰井自守以正與人必以正各得其宜也九卦獨不取離明在地中時也陸象山曰損其害德者而吾身之害固有可逺之道有益於已者為利利莫如善君子遷善故曰興利福慶之利固有自致之理在君子有不足言者巽順於理如權之於物隨輕重而應不以一定而悖理也項平甫曰此一節推卦之用胡雙湖曰此節方論聖人用九卦以處憂患之道故皆以以之一字言之亦如六十四卦大象必著以字以明其用易也右第四章葉敬之曰此章三陳九卦専言卦也易道屢遷一章専言爻也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適侯行果曰居則觀象動則玩占故不可逺也孔仲達曰屢遷言隂陽數數遷改若乾之初九則潛龍九二則見龍也不居言隂陽六爻更互變動不恆居一體也周流六虛者言隂陽周遍流動在六位之虛位本無體因爻始見故稱虛無常者既窮上位之極又下來居於初如剝卦一陽上極十一月一陽來歸初也相易言隂陽六爻兩相交易不可為典常要會唯隨變動之時所適也朱子易不可為典要有陽居陽爻而吉者又有凶者有隂居隂爻而吉又有凶者有有應而吉者有有應而凶者是不可為典要之書也易不是死法太玄都是死法朱漢上曰周易言變故古人言易雖不筮必以變言其義史墨論乾之初九曰在乾之姤是也筮之之卦皆變也説卦震曰其究為健三變乾也巽究為躁卦虞翻曰巽三變成震也六子皆以乾坤相易而成剛柔之交或謂之來或謂之文或謂之分或謂之上下所謂唯變所適也其出入以度外內使知懼又明於憂患與故無有師保如臨父母虞仲翔曰神以知來故明憂患知以藏往故知事故韓康伯曰明出入之度使物知內外之戒也出入猶行藏外內猶隱顯遁以逺時為吉豐以幽隱致凶漸以髙顯為美明夷以處昧利貞此外內之戒也司馬溫公曰易出入六爻為人出入之法度蘇子瞻曰憂患之來苟不明其故則人有苟免之心而怠故易明憂患又明其所以致此之故朱漢上曰出入以一卦內外言之兩體也出者自內之外往也入者自外之內來也當出而入當入而出其患一也故大觀在上窺觀者醜三陽方壯牽羊悔亡唯精於義者能知之知義則知懼矣又明於憂患與故無有師保教訓而嚴憚之有如父母親臨而愛恤之見聖人之情也蔡節齋曰易之出入皆有度不差或內或外使人知所懼此言易之不可逺也俞石澗曰度節度也使知懼如泰倒轉為否內乾出而為外乾則戒之曰不利此外而使知懼也需倒轉為訟外坎入而為內坎此內而使知懼也蔡虛齋曰卦爻所説者皆利用出入之事出入必以其法法者事理當然之則也初率其辭而揆其方既有典常苟非其人道不虛行虞仲翔曰其出入有度故有典常神而明之存乎其人不言而信存乎德行故曰道不虛行孔仲達曰雖千變萬化不可為典要然循其辭度其義原尋其初要結其終皆唯變所適是其常典也侯行果曰方道也邵子曰既有典常常也不可為典要變也朱漢上曰不可逺者易之體也為道屢遷者易之用也能知卦象合一體用同源斯可以言易之書矣觀彖方謂時位由其辭以審度其時位則不可為典常者皆有典常矣右第五章項平甫曰此章専論易之爻辭易之為書也不可逺為道也屢遷二句一章大指自變動不居至唯變所適言屢遷也自出入以度至道不虛行言不可逺也唯其屢遷故虛而無常不可為典要唯其不可逺故有度有方有常而不可虛行人能循其不可逺之理則屢遷之道得矣按一部易經時中二言可括不可為典要者時之屢遷也典常者中之不可逺也易之為書也原始要終以為質也六爻相雜唯其時物也韓康伯曰質體也卦兼始終之義也孔仲達曰一卦之中六爻相錯雜各合其時若屯初九是居貞之時六二是乘陽屯邅之時朱漢上曰六爻相雜時異而物異八卦本象也時物别象也徐進齋曰時謂六位之時物謂隂陽二物也吳草廬曰要如要於路之要謂遮截其歸宿之處文王原卦義之始要卦義之終以為卦之體質而繫彖辭也爻之為言文也六位之隂陽相雜而交錯也周公觀六爻之交錯唯其六位之時或是陽物或是隂物各因其義而繫爻辭也按一爻言初六爻言上始終之謂也其初難知其上易知本末也初辭擬之卒成之終干令升曰初擬議之故難知卒終成之故易知本末勢然也孔仲達曰卦之初始起於微細擬議其端緒事未顯著故難知也卦之上爻事已終極成敗已成故易知若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣韓康伯曰彖舉立象之統論中爻之義約以存博簡以兼衆一以貫之者也崔氏憬曰上既具論初上二爻次又以明其四爻也言中四爻雜合所主之事撰集所陳之德能辨其是非備在卦中四爻也下論二三四五是重述其功位也蘇子瞻曰彖者常論其用事之爻故觀其彖則其餘皆彖爻之所用者也朱子先儒解此多以為互體漢儒多用之看來此説亦不可廢朱漢上曰物無常是亦無常非蒙以九二納婦而六三娶則不利節初九以不出無咎九二以不出失時是非得失不可不辨也胡雙湖曰物謂內外卦隂陽二物雜謂其自中四爻雜而互之又自成二卦之德故謂之撰內卦外卦既足以示人復有互體而辨之則是與非益可見胡雲峯曰此承六爻相雜而言也六爻本自相雜二三四五於六爻中又雜物撰德如屯下震物為雷德為動上坎物為水德為險下互坤則雜物為地撰德為順矣上互艮則雜物為山撰德為止矣可以辨是非而易愈備按易道主時夫子彖傳言時義時用此一卦之時也六爻時物則於卦時內又為爻之時如復主一陽之復而五隂皆有復義遁主四陽之遁而二隂亦主遁言從卦時也屯初為建侯之主屯二即以初為為難之剛同人以二五中正之應為利貞而於爻則二以應為吝皆與全卦之義不同所謂六爻之時物也至於中爻互體則有以互體而備全卦之用者如屯有互坤為衆故利建侯有五艮為止故勿利有攸往師之丈人以互震也蠱之先甲先甲以互震也頤有互坤故取養義中孚有三四大離故取中虛之義此一例也有從互體而立爻義者同一震也重卦之四在互艮互坎之中故有泥象同一艮也重卦之三在互坎互震之中故有危薰心象舉斯以觀餘可類推故曰辨是與非則非中爻不備也因彖辭已有以中爻立義者故曰思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪韓康伯曰同功同隂功也而有內外二處中和故多譽四位逼於君故多懼也三五同陽功也崔氏憬曰此重釋中四爻功位所宜也二四皆隂位隂之為道近比承陽故不利逺二逺陽雖則不利其要或有無咎者以二柔居中異於四也三處下卦之極居上卦之下而上臣天子若無含章之美則必致凶五居中不偏貴乘天位故多功蘇子瞻曰有善之名而近於君則懼矣故二之善宜著四之善宜隱剛勝柔危皆非必然者也從其多者言之爾朱漢上曰三處下卦之極其柔居之則危以剛居剛過則易敗此三所以多凶若五以剛居之得尊位大中宜處貴者也以柔居之有處謙執柔以貴下賤之美此五所以多功王童溪曰三既多凶不復言其善之不同以無善可録也蓋柔則不當位而危剛則過剛而勝故也張南軒曰論二與四詳於二而略於四論三與五詳於三而略於五即此以見彼也蔡節齋曰一卦六爻以五為主主五則四近而二逺也柔利近剛四近而位不中故多懼二雖逺而多譽者以居柔中之位也許魯齋曰四雖得正而猶有不中之纍況不得其正者乎二雖不正猶有得中之美況正而得中者乎上卦之中乃君位一爻之德莫精於此何玄子曰月逺日則光滿近則光微多譽多懼之説也觀彖以是推之四雖多懼而柔亦無咎以不利逺則利近故以六四承九五則吉三柔危推之于五則六五亦不如九五之功多矣右第六章吳草廬曰此章言六爻而六爻統於彖故先言彖乃説六爻也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也本義三晝已具三才重之故六項平甫曰言聖人所以兼三才而兩之者非以私意傅會三才之道自各有兩不得而不六也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉陸公紀曰天道有晝夜之變地道有燥濕之變人道有行止動靜善惡之變聖人設爻以效三者之變故謂之爻韓康伯曰等類也乾陽物也坤隂物也爻有隂陽之類而後有剛柔之用故曰爻有等故曰物蘇子瞻曰凡乾之類皆陽物坤之類皆隂物項平甫曰文不當者九居隂六居陽位也徐進齋曰一不獨立二則偽文隂陽相雜故謂之文吳敬齋曰以時位之得為當時義之失為不當何玄子曰不當者非專指陽居隂隂居陽也卦情若淑成以不當為吉卦情若慝反以當位為凶右第七章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也韓康伯曰文王與紂之事危其辭也易慢易也保其存者亡不忘亡者存有其治者亂不忘危者安懼以終始歸於無咎安危之所由爻象之大體也孔仲達曰懼以終始者言能於始思終於終思始也始終皆懼要歸於無咎也張子百物不廢巨細無不察也王童溪曰乾九三重剛不中可謂危矣然以惕懼自處雖危無咎豫初隂弱居下可謂易矣然以逸豫而鳴則志窮而凶是道也在天地之間物物皆然不特人如是也上而日月之明晦寒暑之往來下而草木之榮謝蟲魚之生死莫能逃此本末盛衰之理故曰其道甚大百物不廢然知其説者在乎終始以致其懼而已張南軒曰既懼其始使人防微杜漸又懼其終使人持盈守成髙忠憲曰無咎者善補過也易中凡説有喜有慶吉元吉都是及於物處若本等只到了無咎便好夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者侯之衍文蘇子瞻曰已險而能知險已阻而能知阻者天下未嘗有也故處下以傾髙則髙者畢赴用晦以求明則明者必見易簡以觀險阻則險阻無遁情矣本義健者如自髙臨下而知其險順者如自下趨上而知其阻所以能危能懼而無易者之傾也語録此段專是以憂患之際而言都是處憂患之道王童溪曰文王之盛德本諸乾坤乾坤之德行易簡也有得於乾坤易簡之德行以為我之德行則天下險阻無不盡知之矣無常不可為德行乾無時不易坤無時不簡故曰恆所以恆者以其至健至順也易簡者我心之固有優遊涵泳其味無窮能無説乎險阻在前往來於中能無所研乎易有爻有象所以效天下之易簡也爻象動乎內吉凶見乎外功業見乎變則定吉凶成亹亹者皆易簡之為也項平甫曰唯中心易直者能察天下險巇之情唯行事簡靜者能察天下繁壅之機陸聚緱曰至健至順是贊乾坤之德德行二句乃言效法乾坤者能易以知險簡以知阻也觀彖此以體乾坤之德者言是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能蘇子瞻曰言易簡者無不知也易簡者取諸物而足也本義天地設位而聖人作易以成其功於是人謀鬼謀而百姓皆得以與其能語録與能與字去聲他因卜筮方能做得事便是與能王童溪曰天地設位於上下聖人成能於兩間此乾坤之德所以全盡於聖人也人謀即成天下之亹亹鬼謀即定天下之吉凶項平甫曰人之言動即易之變化故曰變化云為此四句即上繫之四道也云為即尚其辭尚其變也象事占事即尚其象尚其占也精於變化云為則知動之微吉之先見故曰吉事有祥此以辭與變體之於身也即乾之知險也精於觀象則可知制器之理精於占卜則可知方來之事此以占與象措之於事也即坤之知阻也張南軒曰天能天而不能地地能地而不能天賴聖人成其能吳草廬曰人能以易中變化之道用之以言動則於事皆可以吉而有祥不至於凶而有災也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝崔氏憬曰伏羲始畫八卦因而重之以備萬物而告於人也爻謂爻下辭彖謂卦下辭皆是聖人之情見乎繫辭而假爻象以言剛柔兩物雜居得理則吉失理則凶故吉凶可見也逺謂應近謂比或取應而捨比或取比而捨應所以生悔吝項平甫曰剛柔雜居而吉凶可見此再言象之所以示人者明也變動以利言二句再言辭之所以諭人者殊也自彖辭觀之卦體本以變動而成故彖辭専言其變通之利雖蹇睽明夷至不美之卦其彖皆有所利蓋其初皆因窮而變變而成卦則以成卦者為利故曰變動以利言自爻辭觀之據逐爻之情則吉凶皆異於本彖矣有在彖為主爻而在本爻則凶者如震之九四震驚百里可為祭主而在本爻則為泥是也故曰吉凶以情遷言視彖之本辭則為遷易也自此以下皆言以情遷之事而以六爻之情辭明之吉凶悔吝利害之三辭分出於相攻相取相感之三情而總屬於相近之一情利害者商略其事宜有利有不利也悔吝則有迹矣吉凶則其成故總而言之曰吉凶相感者情之始交故以利害言之相取則有事故以悔吝言之相攻則其事極矣故以吉凶言之此就淺深分之若錯而綜之其相攻相取相感皆有逺近皆有情偽皆有愛惡也故末以相近一條明之近而不相得則以惡相攻而凶以偽相感而害不以近相取而悔吝是一近之中備此三條也凡爻有比有應有一卦之主爻皆情之當相得者也今止據比爻言之則反以三隅而逺而為應為主者亦必備此三條矣胡雲峯曰愛惡相攻由於逺近相取逺近相取由於情偽相感林次崖曰近而不相得是解逺近相取一句并愛惡相攻二句亦解近而不相得則凶可見惡相攻而凶生偽相感而害生者亦以其近也舉近則逺者亦可三隅反也觀彖愛惡者時所生如泰則交否則隔同人則同睽則異逺近者位所限如蒙之逺實比之比匪隨之隨小子觀之童觀情偽者德所發如泰之光大否之包羞同人三之伏戎五之中直愛惡之情顯故生吉凶逺近之迹疑故生悔吝情偽之積深故生利害然惟三者參會若不相得而逺雖無吉利之獲而亦無凶害之侵相得而逺雖非凶害之尤而無吉利之應近而相得者吉利至而悔吝消也將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈馮行可曰六辭與易絶不相關恐斷簡錯見於此或曰諸如此類亦各準其情而為辭然誣善失守恐不入卦爻王介甫曰易之辭必不慙枝遊屈也郭子和亦嘗疑之不敢強通胡雲峯曰六辭與易誠不相關意者尚占命筮之辭繫辭上傳曰問焉而以言其受命也如響夫子於此又發其情以見命筮之際本中形外自有不可掩者神物之蓍顧不能前知吉凶以告之乎亦欲人謹其事而重其筮也右第八章下繫章次從吳氏觀彖又總下傳之指而約言之以終首章之意蓋易簡者貞一之原聖人研悅此理于心參驗于變化吉凶之故推所憂患拯世傾危讀其辭而情尤可見周易孔義集説卷十九
