body:
  text: 周易孔義集説卷十八光祿寺卿沈起元撰繫辭上傳本義繫辭本謂文周之辭繫卦爻之下者此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故無經可附而自分上下云胡雙湖曰太史公引天下同歸而殊塗一致而百慮為易大傳蓋太史公受易楊何何之屬自著易傳行世故稱孔子所著者曰大傳以别之天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣蘇子瞻曰天地一物也隂陽一氣也或為象或為形所在之不同故在云者明其一也象者形之精華發於上者也形者象之體質留於下者也人見其上下直以為兩矣豈知其未嘗不一耶由是觀之世之所謂變化者未嘗不出於一而兩于所在也故在天成象在地成形變化之始也張子不言髙卑而言卑髙者髙以下為基亦先見卑後見髙也本義天地者隂陽形氣之實體乾坤者易中純隂純陽之卦名卑髙者天地萬物上下之位貴賤者易中卦爻上下之位動者陽之常靜者隂之常剛柔者易中卦爻隂陽之稱吉凶者易中占決之辭象者日月星辰之屬形者山川動植之屬變化者易中隂變為陽陽化為隂也此言聖人作易因隂陽之實體為卦爻之法象語類聖人是因天理之自然而著之於書後來人又是見天地之實體而知易之書如此天尊地卑上一截皆説靣前道理下一截是説易書楊誠齋曰南人喜楚語北人喜燕語方以類聚也鵲巢無烏子馬廄無狐穴物以羣分也善惡之分聚亦然蔡虛齋曰此節是夫子從有易後而追論未有易之先以見畫前之有易也乾坤剛柔貴賤吉凶變化此等名物皆非聖人鑿空所為不過皆據六合中所自有者而摹寫出耳來矣鮮曰此一條言天地萬物一對一待易之象蓋未畫易之前易已列于兩間也方四方物萬物吉凶即善惡以方言之中夏邊陲有內華外夷之善惡君子小人之善惡以物言之牛馬則善虎狼則惡此皆隂陽淑慝之分也故吉凶生矣兩間形象其中有往來隱見榮枯生死千變萬化易中變化則隂極變陽陽極化隂也觀彖方侯易則生殺之氣以類聚形質異則清濁之品以羣分成象成形一氣也而有兩在如日月之精降為水火水火之氣升為雲霓皆其驗也此節以造化不易之體言下文遂直用易中名物以説造化不復分别是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物韓康伯曰相切摩言隂陽之交感相推蕩言運化之推移孔仲達曰鼓動之以震雷離電滋潤之以巽風坎雨離日坎月運動而行一節為寒一節為暑不言艮兑者雷電風雨亦出山澤也胡安定曰乾言知而坤言作者蓋乾之生物起於無形未有營作坤能承天之氣已成之物事可營為程傳隂陽之交相摩軋八方之氣相推蕩本義知猶主也乾主始物而坤作成之大抵陽先隂後陽施隂受陽之輕清未形而隂之重濁有質也語録此成男成女通人物言在動物如牝牡之類植物如麻有牡麻及竹有雌雄之類皆離隂陽剛柔不得張紫巖曰天地之間舉無非易剛柔相摩勢之激也八卦相蕩序之移也鼓以雷霆而有氣者作潤以風雨而有形者生日晝月夜終始不息歲功成焉象數默運有不知所以然而然者萬形流動變化不停乾坤男女成功以著乾以一唱物資始焉坤以二承物資生焉邱行可曰前以乾坤貴賤剛柔吉凶變化言是對待之隂陽交易之體也此以摩蕩鼓潤運行言是流行之隂陽變易之用也至下文則言乾坤之德行而繼以人體乾坤者終之李西溪曰風亦謂之潤者以風能滋物之氣也吳草廬曰章首但言乾坤舉父母以包六子此先言六子而後總之以乾坤邵子曰日為暑月為寒始謂始其氣成謂成其質知者主之而無心作者為之而有迹來矣鮮曰此條八卦以天地水火山澤雷風八卦之象言非乾坎艮震巽離坤兑也觀彖相摩以兩物相交言如天與地山與澤水與火雷與風相蕩以八物相交言如天與雷風水火山澤餘亦如之此以造化交易之情言生物之機動于雷霆養物之用資以風雨暑以發之寒以斂之要其品彚男女之根資始成形之本則莫非乾坤之所為此以造化變易之用言不易者一定之分變易者流行之機按此處八卦字乃言天地間現成之八卦也相摩相蕩若切畫卦言與下文雷霆風雨未能一片韓氏説精矣乾以易知坤以簡能韓康伯曰天地之道不為而善始不勞而善成故曰易簡本義乾健而動即其所知便能始物而無所難故為以易而知大始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物語録行健所以易人有私意便難簡只是順從而已若外更生出一分如何得簡觀造化生長氣一過時萬物皆生可見其易項平甫曰萬物之始一而已矣其理安得不易及其成也成夫一而已矣其事安得不簡吳草廬曰易簡者以乾坤之理言此乾坤皆指天地而易之乾坤象之也觀象上文言天地之化備矣此則推言其所以成化者易坦易簡簡約為物不二故其心易無為而成故其事簡易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣本義上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣成位謂成人之位其中謂天地之中聖人之能事可以與天地參矣語録德就存主處言業就做事處説楊龜山曰行其所無事不亦易乎一以貫之不亦簡乎朱漢上曰賢人賢於人者也舜禹之聖亦曰選賢與賢王童溪曰易之為易乾坤是也乾坤之為乾坤易簡是也易簡之為易簡又吾心之所以自然者是也人以是理為難知乎生而無不知愛其親長而無不知敬其兄愛敬之外初無異事夫豈難知也故曰易則易知又以是理為難從乎即無不知愛之心以愛其親則為仁即無不知敬之心以敬其兄則為義夫豈難從也故曰簡則易從可久者是理之存於吾心者未嘗一日忘也雖與天地同其久長可也故曰賢人之德可大者是理之見於日用者未嘗一日怠也雖與天地同其廣大可也故曰賢人之業來矣鮮曰易乃造化之良知簡乃造化之良能人受天地之中以生其良知良能本與天地同其易簡而乃險不可知阻不可從者以纍乎人欲之私耳易知者我易知乎此無私之理也易從者我易從乎此無私之理也言人之所知如乾之易則所知者皆性分所固有而無一毫人欲之艱深豈不易知人之所能如坤之簡則所能者皆職之所當為而無一毫人欲之紛擾豈不易從易知則此理之具于吾心者常浹洽親就不相支離疏隔故有親易從則此理之踐於吾身者常日積月纍無有作輟怠荒故有功有親則日新不已是以可久有功則富有盛大是以可大按易知易從有親有功四語韓孔作人之信從解殊未安此章自造化以及聖人德業至精至微何説到外面極淺一層即朱子注賢人之德句云有親則一於內既云一于內矣何反藉乎同心者多而後為可久之德乎宋儒王童溪説得之來氏直指學易者言尤為切實右第一章本義此章以造化之實明作經之理又言乾坤之理分見于天地而人兼體之也來矣鮮曰此章首言對待之體次言流行之用至人成位乎中則天地之體用皆存乎其人矣此易之所由作聖人設卦觀象繫辭焉而明吉凶孔仲達曰卦象爻象各有吉凶若不繫辭其理未顯故繫辭于卦爻之下以顯明吉凶也朱子伏羲以上有畫無文文王周公乃繫以辭蓋卦之未畫因天地自然之法象而畫及既畫也一卦自有一卦之象故聖人即其象而命之名以爻之進退言則如剝復之類以形之肖似言則如井鼎之類及文王觀卦體之象而為彖辭周公觀卦爻之變而為爻辭吉凶之彖益著矣王秋山曰卦以象而立象又以卦而見明吉凶者有是象而吉凶之理已具繫之辭而吉凶之象始明吳草廬曰伏羲畫八卦因而重之則已有六十四卦之畫矣其時未有文字八卦之名止是因其三畫之形而生聲既有文字之後乃以乾坤震巽坎離艮兑為卦名之字若六十四卦未有名也但以三畫卦名分注于各卦之下以相識别而已文王又設立新名以名五十六卦而共為六十四卦名也俞石澗曰有畫斯有象有象斯有辭今人捨象玩辭但求辭之理不求象之理淺矣剛柔相推而生變化陸聚緱曰此句指揲蓍求卦而言剛爻化柔柔爻變剛有定法也按陸説為諸儒所未發蓋聖人既繫辭以明吉凶又教人揲蓍求卦而後前民用之道乃盡而後有觀變玩占之法觀下文六爻之動即九六之動爻所謂變化也未節動則觀其變變即六爻之動皆發明此句也揲蓍之動爻柔自剛來剛自柔來相推二字形容極精説者以六十四卦三百八十四爻之變化當之則是設卦以前事矣於此未合是故吉凶者失得之象也悔吝者憂虞之象也本義吉凶悔吝易之辭得失憂虞事之變得則吉失則凶憂虞雖未至凶然已足以致悔取羞矣悔自凶而趨吉吝自吉而向凶故聖人觀卦爻之中或有此象則繫以此辭趙氏玉泉曰吉即順理而得之象凶即逆理而失之象悔即既失之象困心橫慮而為憂之象吝即未失之先狃于安溺於樂而為虞之象也何玄子曰上文所謂觀象繫辭以明吉凶者也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也朱漢上曰變化之于剛柔猶進退之于晝夜晝推而進則夜退柔者變而為剛夜推而進則晝退剛者化而為柔日升降于太空本無晝夜由地上觀之出地為晝入地為夜剛柔之象亦然吉凶悔吝生乎動變化者動爻也六爻之動三極之道也邵康節曰易有貞數三是也關子明曰三數之極也極而不變其道乃窮何玄子曰六爻之動二句推言變化之故上文所謂剛柔相推而生變化也陸聚緱曰六爻之動乃言揲蓍成卦之用九用六也按此變化剛柔主揲蓍言與他處泛言剛柔者不同故以流行之象言蓋揲蓍之動爻剛老則變柔柔老則變剛特於進退之間變出剛柔實則一氣之流行一而二二而一者也正如晝夜雖分止此日光之出入動必以極陽極於九隂極于六不極則不變三三為九三二為六故曰三極之道此節言揲蓍求卦有自然之妙君子所以動則觀其變而玩其占也三才各一太極之説與動字似無涉是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利孔仲達曰如居在乾之初九而安在勿用居在乾之三而安在乾乾卦爻皆有辭但爻有變化取象既多以知得失故君子尤所愛樂張子序猶分也易之中有貴賤吉凶皆其自然之分也所居皆安之君子安分也玩習也每讀則每有益所以可樂本義易之序謂卦爻所著事理當然之次第王童溪曰易之序者消息盈虛之有其時也居之而安則大行不加窮居不損爻之辭者是非當否之有所命也樂之而玩則默而成之不言而信胡雲峯曰君子居而學易已窮乎象與辭之理動而用易又適合乎變與占之宜故有吉而無凶悔吝也俞石澗曰觀象玩辭如蔡墨云在乾之姤知莊子云在師之臨謂之在者是也觀變玩占如陳侯遇觀之否晉侯遇大有之睽謂之遇者是也按人一身視聽言動之則與處夫常變困亨之道皆備于六十四卦井井有條故謂之序即禮得其序之序右第二章本義此章言聖人作易君子學易之事觀彖此後數章皆以申釋此章之意按辭變象占夫子所謂易有聖人之道四焉者也此章首舉四者言之設卦句領起象辭剛柔句領起變占吉凶四句承設卦繫辭來變化六句承剛柔相推來而以居則觀象二句收明兩兩相承脈絡井井作易學易之綱領盡矣亦可見專以易為卜筮之用與學易而不知卜筮之道均非夫子之教也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也虞仲翔曰八卦以象告故言乎象也爻有六畫九六變化故言乎變者也本義象指全體言變指一節言項平甫曰彖辭所言之象即下文所謂卦也爻辭所言之變即下文所謂位也胡雲峯曰前章未及無咎之辭此方及之不貴無過而貴改過也張彥陵曰失得指時有消息位有當否説小疵兼兩意向於得而未得尚有小疵則悔向於失而未失已有小疵則吝來矣鮮曰善補過嘉其能補過也即上文言字之例是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔王輔嗣曰憂悔吝之時其介不可慢也即悔吝者言乎小疵也張紫巖曰隂小陽大體固不同而各以所遇之時為正陽得位則陽用事隂得位則隂用事小大之理至卦而齊本義位謂六爻之位齊猶定也介謂辨别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以無咎項平甫曰凡彖辭之例專取主爻而言存乎卦反在存乎位之下者位之貴賤以六爻言卦之小大以一爻言明于六位之中取一位以為卦主也邱行可曰此章就吉凶悔吝上添入無咎既欲人於悔吝上著力尤欲人於介上用功所謂幾者動之微吉之先見者也汪氏砥之曰易凡言悔吝即寓介之意憂盱之悔存乎遲速之介憂即鹿之吝存乎取舍之介是故卦有小大辭有險易辭也者各指其所之韓康伯曰其道光明曰大君子道消曰小之泰則其辭易之否則其辭險楊誠齋曰讀謙復之辭者如行夷途如逢春陽如對堯舜周孔何其氣象之和樂其辭夷易而指其所之之得且吉也讀遁剝之辭者如涉風濤如履霜雪如對桀紂盜跖何其氣象之凛栗其辭艱險而指其所之之失且凶也潘天錫曰辭各指其所向凶則指其可避之方吉則指其可趨之所蔡虛齋曰此條卦字辭字皆兼爻説右第三章本義此釋卦爻辭之通例易與天地準故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀韓康伯曰幽明者有形無形之象死生者始終之數也孔仲達曰以用易道仰觀俯察知無形之幽有形之明義理事故也用易原窮事物之初始反復事物之終末知死生之數也蘇子瞻曰準符合也彌周浹也綸經緯也所以與天地凖者以能知幽明之故死生之説鬼神之情狀也程傳原始則足以知其終反終則足以知其始死生之説如是而已以春為始而原之其必有冬以冬為終而反之其必有春死生類是也張子盈天地之間法象而已方其形也有以知幽之故方其不形也有以知明之故本義易者隂陽而已幽明死生鬼神皆隂陽之變天地之道也天文則有晝夜上下地理則有南北髙深原者推之于前反者要之於後王童溪曰天地之道即下文所謂一隂一陽也是道也其在天地則為幽明寓于終始則為死生見於物變則為鬼神易之為書彌滿無間倫理有序而天地之道盡在此書楊誠齋曰記曰鬼神之為德其盛矣乎視之不見聽之不聞體物而不可遺洋洋乎如在其上如在其左右此其狀也易曰與鬼神合其吉凶又曰鬼神害盈而福謙此其情也項平甫曰凡言易者皆指易之書也此書之作與天地凖故此書之用能彌綸天地之道此二句一章之主意也自此以下皆演此二句之義自仰以觀于天文至故知鬼神之情狀此三知者言易之所知與天地凖也自與天地相似故不違至安土敦仁故能愛此四故者言易之所能與天地凖也自範圍天地之化而不過至易無體此三而者言彌綸之功也吳草廬曰以謂以此易也卦之象觀于天文察于地理而皆合易之與天地凖也明者文之顯而易曉幽者理之隱而難察故謂所以然之迹胡雲峯曰此易字指易書而言書之中具有天地之道本與天地相等故於天地之道彌之則合萬為一渾然無欠綸之則一實萬分粲然有條按此節鬼神與晝夜死生並列為三則精氣二句非人物聚散之謂也説者以聚散屈伸言之皆作死生之説看矣聖人原不諱言鬼神精氣為物者神也天神地祗以及日月星辰金木水火之神皆精神所凝其聖賢忠烈沒而為神能福佑下民回斡造化亦天地間精氣所聚皆為神物以其確然有主故云物磷有光嘯有聲皆遊魂所變以其飄忽無常故云變與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛張子旁行不流圎神不倚也本義知周萬物天也道濟天下地也王童溪曰易之道即天地之道天地之道即易之道存諸易者如是則存諸天地亦如是爾故曰與天地相似相似又何背違之有以下言易之道所以與天地相似也樂天安土言易之道無適而非天地樂天則與時偕行安土則素位而行項平甫曰通於萬物之情故知雖崇而不失於過當於萬民之用故道雖廣而不失於流樂時位之推移而知其卒歸于有數也故能乘化而不憂隨其時位之險易而常遂其濟物之心故能無往而不用其愛具其理通其變極其數利其用凡易之所能備此也吳草廬曰旁行如天而不流如地觀彖與天地相似不言易者蒙上文也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體韓康伯曰方體皆係于形象者神則隂陽不測易則惟變所適不可以一方一體明孔仲達曰範謂模範圍謂周圍無方無體各有二義不見其處所云為是無方也周遊運動不常在一處亦是無方也自然而變而不知變之所由是無形體也隨變而往無定在一體亦是無體也邵康節曰神者易之主也所以無方易者神之用也所以無體項平甫曰此三而者總結一章以見其彌綸天地之道也蓋易所以匡括天地之變化而天地不能越乎其外此所謂彌也曲成萬物之始終而無一物之或遺此所謂綸也此即上文四故之所能也通乎幽明死生鬼神之道而知無所不至此所謂道也此即上文三知之所知也是故天地之神無隂陽之定方而奇耦之變亦與之周流而無定體此所謂易與天地凖也熊梅邊曰範圍天地之化易之神所以立也曲成萬物易之神所以行也通乎晝夜之道易之所以神妙也神妙不測所以無方可指變化無窮所以無體可驗按此章易字指易書兼卦爻繫辭蓍數而言故與天地凖以下皆言易也如日月風雨雷電皆天文也水火山澤東北西南皆地理也日月之運行寒暑之往來雲雷為屯山水為蒙雷水為解火地為晉地火為明夷若斯之類皆幽明之故也仰觀俯察當以成易言出乎震而終乎艮窮于剝而復于復養于頤而顛于大過無非原始反終死生之説也出震之帝妙萬物之神天生神物聖人則之成變化而行鬼神皆所謂精氣為物遊魂為變鬼神之情狀也至知周乎萬物而道濟天下即所謂類萬物之情也成天下之亹亹也旁行者即所謂推而行之存乎通也不流者即所謂既有典常也樂天知命者所謂趨時也不憂猶言不與聖人同憂也安土敦仁者即所謂以順性命之理立三才之道也能愛者所謂受命如響所謂無有師保如臨父母也至範圍曲成通知則一部易書六十四卦三百八十四爻觸處皆是夫子贊易之妙始于此章以下則或専言乾坤或分言卦爻蓍數或言聖人體易君子用易耳朱子於此作聖人之窮理盡性至命終與本文易與天地凖句文勢未順似非孔子之旨項氏以易字専言奇耦吳草廬以首節主卦爻次節主蓍數似皆未安精氣二句當主造化鬼神言説者多以人之死生為解未免混入上句右第四章陸聚緱曰此章贊周易之妙即所云和順於道德而理于義窮理盡性以至於命也一隂一陽之謂道邵康節曰道無聲無形不可得而見故假道路之道為名人之行必由乎道一隂一陽天地之道也物由是而生由是而成者也朱子一隂一陽往來不息舉道之全體而言莫著於此者矣隂陽之端動靜之機而已動極而靜靜極而動故隂中有陽陽中有隂未有獨立而孤居者此一隂一陽所以為道也郭白雲曰繫辭言道此章為著蓋道兼三才三才不過二象隂陽是也天地人皆具隂陽故六是之謂一隂一陽之道也觀彖此釋所謂天地之道也按孔子直指道體唯此語直截渾淪更無疏漏之處朱子語類亦云言道之全體莫著于此自本義採伊川之説以為隂陽迭運者氣也其理則所謂道後儒宗之遂使孔子之言不足主張道學而必俟曲為補救矣夫天地間萬事萬物不外隂陽二者孤立非道也偏勝非道也在造化為天地日月水火晝夜寒暑雨暘之屬在人事為男女夫婦君臣父子動靜呼吸之屬無非一隂一陽也二者對立而道之體立迭運而道之用行下章有曰形而下者謂之器形而上者謂之道朱子謂卦爻隂陽亦器也夫卦爻奇耦可謂之器造化之隂陽必不可謂器也器者一成而不可變之謂此各經器字定解如天不可為地日不可為月斯謂之器耳隂陽則不見不聞體物不遺安得謂之器乎入于有形象之中者此隂陽也運于無形象之際者此隂陽也且以氣言之固為隂陽而髙下尊卑小大非氣亦隂陽也仁義非氣亦隂陽也中庸所謂莫載莫破者此也鳶飛魚躍上下察者此也造端夫婦察乎天地者此也故此語為直指道之全體無容補苴斡旋曲為之説也橫渠云一隂一陽不可以形器拘故謂之道乾坤成列而下皆易之器數語真詮更無遺議矣且聖門論道無不切實如大學之道在明德新民率性之謂道和者天下之達道又天下之達道五又如仁者人也合而言之道也自晉人専宗老莊而道始虛玄韓康伯注此句云道者無之稱隂為無隂隂以之生陽為無陽陽以之成今程子云所以為隂陽者道也得毋近是且於經文之謂二字不順學者宜専信孔傳為主聖人豈欺我哉繼之者善也成之者性也程明道曰天以生為道繼此生理即是善也元者善之長萬物皆有春意便是繼之者善也朱子造化所以發育萬物為繼善萬物各正其性命為成性流行造化處是善凝成于我者即是性繼是接續綿綿不息之意成是凝成有主之意項平甫曰道之所生無不善者元也萬物之所同出也善之所成各一其性者貞也萬物之所各正也邱行可曰繼之者善是就天所賦人所受中間過接處説成之者性是就人心稟受處説按天地之大德曰生人物之生稟二氣之化育此生物之氣即生物之理氣之生物者即元也萬物之所以資始也元即仁也故曰善也自生物之氣凝聚而成形即生物之理凝聚而成性性之所以為善也即中庸所謂仁者人也具此生理而為人即有此仁也蓋萬物之生皆從生機而出未有從殺機而出者惟其生機故無不善也亦可見善字性字皆分不得理氣看理即氣也氣即理也孟子性善之説本此仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣吳草廬曰此因上文成之者性而言來矣鮮曰見發見也仁者知者即君子也性于人身渾然一理無聲無臭不可以名狀惟仁者發見于惻隱則謂之仁知者發見于是非則謂之知而後所謂性善者方有名狀也百姓氣拘物蔽而知君子仁知之道者鮮矣按性不可見來氏説允顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德程傳天地無心而成化聖人有心而無為張子富有者大而無外日新者久而無窮本義顯自內而外也仁謂造化之功德之發也藏自外而內也用謂機緘之妙業之本也語録譬如一樹一根生許多枝葉花實此是顯諸仁處及至結實一核成一箇種子此是藏諸用處生生不已所謂日新也萬物無不具此理所謂富有也黃勉齋曰春夏所以顯秋冬所藏之仁秋冬所以藏春夏所顯之用天地以生物為德以成物為業吕圭叔曰因上文仁知而言天地之大也用即知在天地則不言知而言用吳草廬曰仁者生物之元由春生而為夏長之亨此仁顯見而發達于外所顯者生物之仁也故曰顯諸仁用者收物之利由秋收而為冬藏之貞此用伏藏于內所藏者收物之用也故曰藏諸用二氣運行鼓動萬物而出入之天地無心而造化自然非如聖人于民有所憂而治教之也收物之用至冬而包括無餘故曰富有生物之仁至夏而日長日盛故曰日新髙忠憲曰此一隂一陽之道在天地者也按此承上文言一隂一陽之道在人之性為仁知在天地之化為仁用仁用者天地之德業仁知者聖人之德業不外此一隂一陽之道生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神張子一物兩體一故神兩在故不測兩故化推行有漸為化合一不測為神本義隂生陽陽生隂其變無窮效呈也法謂造化之詳密而可見者占事之未定者事占之已決者極變知來所以通事之變項平甫曰古語法皆謂形繫辭皆以形對象故法字但可訓為形字不可訓為模倣邱行可曰上章言易無體唯其生生所以無體神無方唯其不測所以無方數蓍數變卦變事行事以所占卦變而通之也蔡節齋曰象者法之未定法者象之已形乾主氣故曰成象坤主形故曰效法胡雙湖曰此章専論隂陽之道在造化與易書故首之以一隂一陽之謂道終之隂陽不測之謂神其體則謂之道其用則謂之神極七八九六之數以知來通隂陽老少之變以作事俞石澗曰窮則變變則通易也通其變使民不倦聖人之用易也蔡虛齋曰合一不測為神不合不謂之一不一不為兩在不兩在不為不測合者兩之合神化非二物故曰一物兩體也張彥陵曰舉乾坤見天地間無物而非隂陽之生生舉占事見日用間無事而非隂陽之生生徐天章曰一隂一陽無時而不生生是之謂易成此一隂一陽生生之象是之謂乾效此一隂一陽生生之法是之謂坤極一隂一陽生生之數而知來是之謂占通一隂一陽生生之變是之謂事按神易即是隂陽就其生生言之則謂之易就其不測言之則謂之神統而言之不外一隂一陽之謂道右第五章程氏敬承曰此章承上章説來上言彌綸天地之道此則直指一隂一陽之謂道上言神無方易無體此則直指隂陽之生生謂易隂陽不測謂神來矣鮮曰言一隂一陽之道不可名狀在人則謂之仁知在天地則謂之德業在易則謂之乾坤占事而終贊其神也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣龔深父曰逺邇以四旁中央而橫説之也天地之間以上下而從説之也張紫巖曰易本無逺以言乎逺感通之用應而不藏易本無邇以言乎邇不動之體自古固存求之天地凡有象貌聲色無非易者朱漢上曰廣者坤大者乾以言乎逺者變動也以言乎邇者不變者也項平甫曰逺而不止即直與闢也靜而正即專與翕也天地之間則備矣即大生廣生也無有逺近幽深遂知來物所謂不禦也寂然不動無思無為所謂靜而正也靜者坤之翕正者乾之專陸聚緱曰廣以經言大以圍言於逺邇見其廣於天地之間見其大夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉孔仲達曰乾是純陽若氣不發動則靜而専一故云其靜也専若其運轉則四時不忒寒暑無差剛而得正故云其動也直坤是隂氣閉藏翕斂故其靜也翕動則開生萬物故其動也闢程明道曰不專一則不能直遂不翕聚則不能發散本義乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言曰大坤二而虛故以量言曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者如此語類大生是渾淪無所不包廣生是廣濶容受得天之氣此説隂陽性體如此卦畫也倣佛如此乾畫奇便見得靜専動直坤畫耦便見得靜翕動闢吳草廬曰翕謂合而氣之専者藏乎此闢謂開而氣之直者出乎此胡雲峯曰乾惟健故一以施坤惟順故兩而承一之達所以行乎坤之兩故以質言曰大兩之分所以承乎乾之一故以量言曰廣林次崖曰此推言易之所以廣大也乾坤即天地也大生廣生皆就乾坤説易書之廣大則模寫乎此觀彖靜専動直靜翕動闢即所謂易簡也廣大配天地變通配四時隂陽之義配日月易簡之善配至德朱子配是相似之意易簡之善便如聖人之至德項平甫曰天地之間至大者天地至變者四時至精者日月至善者至德易之書具此四者豈不謂之備乎吳草廬曰易書廣大之中有變通焉有隂陽之義焉亦猶天地之有四時日月也四時日月即天地猶易之六子即乾坤也熊梅邊曰廣大乾坤也變通者乾變坤坤變乾也乾陽而坤隂也乾易而坤簡也右第六章胡雲峯曰首章論乾坤之尊卑結之以易簡而理得此章論乾坤之廣大結之以易簡配至德然則易不徒在乾坤而日在于吾之心中矣子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門韓康伯曰極知之崇象天髙而統物備禮之用象地廣而載物程子天理便是易也本義窮理則知崇如天而德崇循理則禮卑如地而業廣成性本成之性存存謂存而又存不已之意語類知識貴乎髙明踐履貴乎著實禮要極卑順如禮儀三百威儀三千纎悉委曲無非至卑之事有所欠闕業便不廣此性萬善完具無有欠闕故曰成性成對虧而言林次崖曰存存不已道義之得于心者日新月盛則德于是乎崇矣道義之見于事者日積月纍則業于是乎廣矣來矣鮮曰六十四卦三百八十四爻皆理之所在也聖人以是理窮之于心則識見超邁日進于髙明而其知也崇循是理而行則功夫敦篤日就于平實而禮也卑崇效乎天卑法乎地然非聖人勉強效法也蓋天地設位而知陽禮隂之易已行乎其中在人則謂之成性聖人特存之耳孫夏峯曰聖人以存存不已者濬心易之源則道義皆從此出而德崇業廣夫子曰可以無大過只一無過則德莫崇於此業莫廣于此矣右第七章項平甫曰上章言易此章言聖人體易於身也知窮萬理之原則乾之始萬物也禮循萬理之則則坤之成萬物也道者義之體智之所知也義者道之用禮之所行也按此章言聖人體易於身而實體易于心也德業即首章之德業而知禮以存性乃首章可久可大之工夫也道義之門即首章所言天下之理得也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象孔仲逹曰賾謂幽深難見者聖人有其神妙以能見天下深賾之至理也見此剛理則擬諸乾之形容見此柔理則擬諸坤之形容也程傳賾深逺也王童溪曰事物之理寓于幽微深逺之地者天下之賾也吳草廬曰賾頤中深處以喻蘊奧難見也形容謂有形之狀貌可象者象字指文王之卦名對周公之繫爻而言不以彖對爻言而以象對爻言者文王未繫象辭之先重卦之名謂之象象先于彖言象則彖在其中黃氏日抄賾晦菴獨以為雜亂夫云聖人有以見天下之賾則是幽深之理難見而聖人獨有以見之也擬諸形容使幽深者可見而人皆見之之若云雜亂則人皆可見何必聖人雜亂者具有形質何必擬諸形容合從伊川按賾字宜從先儒訓幽深難見為確蓋易以道隂陽即此隂陽二字未有易以前聖人憑空撰出以發天地之祕已為至奇至渺荒忽誕罔獨開天之聖人能見之非夫人所能見也是天下之至賾也然聖人見之而非有以實指何者為陽何老為隂亦何以使微者顯幽者闡而利天下之用于是畫為兩儀一奇以象陽一耦以象隂而擬得隂陽之形容矣聖人有以見萬物皆隂陽之所為而其大者莫如天地雷風水火山澤乃人苐見天地雷風水火山澤而不知其所以為天地雷風水火山澤者于是聖人畫為八卦以三奇之純陽性健者擬天三耦之純隂性順者擬地一陽動于二隂下為雷一隂伏于二陽下為風一陽居二隂中為水一隂居二陽中為火一陽止二隂上為山一隂居二陽上為澤而後所以為天地雷風水火山澤者形容出矣然猶不足以盡天下之奧賾也因而重之為六十四卦而後萬事萬物之理之虛渺而至賾者一一從實象模寫出來所謂形容者也于是象其物宜以為卦名物者即天地雷風水火山澤之八物也宜者義也兩卦即兩物因兩物相比而起義即夫子所謂時義也如雲雷為屯山水為蒙水地為比地水為師之類皆因物揆宜而為之卦名以象之故謂之象蓋所謂天下之賾者即邵子所稱畫前之易也聖人確有以見之而畫為兩儀為八卦為六十四卦無非使無形之理呈之于有象象立而理顯一部易經皆象也卦象爻象一也但對下爻字似主卦象故本義注云象卦之象要之言卦象則爻象亦在其中即下文繫辭斷吉凶專言爻者因動而言也彖辭之斷吉凶亦在其內聖人之文往往互言耳至此處物宜似非指説卦所稱也聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻本義會謂理之所聚而不可遺處通謂理之可行而無所礙處如庖丁解牛會則其族而通則其虛也語類若未動時不見得道理水平不流須是動方見得會是衆理聚處雖覺得有許多難易窒礙必於其中却得箇通底道理乃可行耳會而不通便窒礙而不可行通而不會便不知許多曲直錯雜處如有一事關著許多道理有父子之倫有君臣之倫有夫婦之倫若父子重則他不暇計君臣重則他不暇計如堯舜揖讓湯武征誅皆是典禮處典禮猶言常禮常法辭謂卦爻之辭一卦之中自有會通六爻又各自有會通柴與之曰動非紛擾可見者也凡消息進退屈伸往來已然未然之謂也會通謂事與理合而通行處胡雲峯曰通是時中典常是庸錢幼光曰盤錯之會人見為有礙者聖人觀之必有其通非權宜之行蓋確乎不可易也言天下之至賾而不可惡也言天下之至動而不可亂也吳草廬曰象顯天下至幽之義而名言宜稱人所易知則自不至于厭惡其賾矣辭載天下至多之事而處決精當人所易從則自不至于棼亂其動矣擬之而後言議之而後動擬議以成其變化朱子擬議只是裁度自家言動使合此理變易以從道之意項平甫曰學易者擬其所立之象以立言則言必各當于理議其所合之爻以制動則動必各當于時則易之變化成于吾身以言者尚其辭以動者尚其變此之謂也胡雲峯曰前言變化易之變化也此言成其變化學易者之變化也右第八章按此章言聖人作易君子學易之事鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎蔡節齋曰居其室即在隂之義出其言即鳴之義千里之外應之即和之之義保普菴曰樞動而户開機動而矢發小則招榮辱大則動天地皆此唱彼和感應之最捷也按此節即中孚九二爻辭在隂子和之義以發明君子出言制行之道同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭韓康伯曰君子出處默語不違其中其迹雖異道同則應本義言君子之道初若不同後實無間斷金如蘭言物莫能間而其言有味也按此即同人九五爻辭以明君子之交心同道同而不必迹之同也體殊象傳故不及大師句初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣按此即大過初六爻辭以發明敬慎之道錯諸地而可見可以不藉而猶必藉無一時之敢忽也物薄而用可重見極細小處却有補於大德無一事之可苟也夫子玩辭之法如此勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也孔仲達曰引謙卦九三爻辭言由恭德保其祿位也楊誠齋曰人之謙與傲係其德之厚與薄德厚者無盈色德薄者無卑辭如鐘磬然愈厚者聲愈緩薄者反是故有勞不伐惟至厚者能之德愈盛則禮愈恭吳草廬曰君子履謙乃其常行非為保其位也言存其位者猶言為善有令名也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也本義此蓋重出不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也孔仲達曰慎密不出者於易言之是身慎密不出户庭於此義言之謂不妄出言語也按此節即初九爻辭以明言語之當慎即大象慎言語之旨而危辭以示訓也言不慎密禍在一身猶小禍在家國者大千古禍亂聖人一一道盡於稽其類文周之時尚未有此春秋之世其禍已烈後世尤甚故夫子於此激切言之論語所言慎言皆以修德言此處獨以處世言所感深矣子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也孔仲達曰小人居上位必驕慢而在下必暴虐為政如此大盜思欲伐之矣楊誠齋曰司馬氏安能盜魏曹操教之也蕭衍安能盜齊蕭道成教之也盜非能盜小人之有也小人實教盜以盜已之有也所謂知盜非知奪伐之盜知教奪伐者之盜也按此即解六三爻辭以明小人之不可用右七節按右七節及繫辭下傳十一節文體原與乾坤二卦文言一例元儒熊與可云自乾坤二卦各附文言而諸卦文言散逸今見於大傳厪存者庶幾而乾上九之文言亦在其中可見大傳中釋爻辭者即諸卦之文言吳草廬云夫子既釋乾坤二卦其餘六十二卦三百七十爻之辭不能遍釋故上經釋九爻下經釋九爻以發其例而他爻可以類推是以文言傳後人以所釋乾坤二卦之辭附入本卦於是所釋上下經十八節不能成篇悉散入繫辭傳今悉更正胡雲峯亦云此皆象傳之文言也學易者可觸類而通其餘愚玩向來各節錯入繫辭傳中文體不類義亦無所連屬説者於上繫七爻以為聖人之擬議於下繫十一爻更無綱領乃或以釋咸九四爻一節為主以下諸節為利用安身之證支離牽合使人讀之耿耿不釋如熊氏吳氏所更正誠為快然想見夫子玩辭之法引伸觸長之妙足以開發後學但古周易分列十翼原本既不可見而文言傳流傳至今號為古本者止乾坤二卦熊氏吳氏説雖不易恐乖古人史闕文之意未敢竟從二公所定故仍附繫辭傳中而於繫傳前後文義則不復牽合云天一地二天三地四天五地六天七地八天九地十此二十字韓康伯在夫易何為者也之上班固律厯志在天數五地數五之上伊川程子曰宜在此紫陽朱子從之移在此章之首孔仲達曰此言天地隂陽自然奇偶之數也張子夫混然一物無有終始首尾其中何數之有特示有漸耳理須先數天又須先言一次乃至于十也且天下之數止于十窮則自十而反一又當止于九其言十者九之偶也郭白雲曰天數五地數五者此也漢志言天以一生水地以二生火天以三生木地以四生金天以五生土故或謂天一至天五為五行生數地六至地十為五行成數雖有此説而於易無所見故五行之説出于厯數之學非易之道也蔡節齋曰天地者隂陽對待之定體一至十者隂陽流行之次序然對待非流行則不能變化流行非對待則不能自行而五十五者則流行之細分也俞石澗曰陽數奇故以一三五七九為天隂數偶故以二四六八十為地舊説以此為河圗或以為洛書皆無所據胡東樵曰漢書五行志以天一至天五為五行生數地六至地十為五行成數説本劉歆歆説洪範之後復有二語曰河圗洛書相為經緯八卦九章相為表裏此宋世紛紛附會所自來也范諤昌傳為龍圗以五合為羲皇重定地上生成之位劉牧宗之著易數鈎隱圗以五生數列上位五成數列下位合為一圗名之曰洛書孔子曰在天成象在地成形又曰乾知大始坤作成物五行之氣行乎天材質成乎地陽倡而不和隂和而不倡無地生天成之理也東晉初安國傳出云龜文有數至于九書之為數造端于此北周盧辨注大戴禮于明堂九室下云法龜文也實本孔傳然隋人説經不從逮宋之中葉有偽龍圗者出焉託名陳希夷始為奇白偶黑之點而以墨絲聨絡于其間纍纍如貫珠劉牧效之著易數鈎隱圗亦作此狀而以太一九宫為河圗五行生成為洛書時又有關子明易傳言龜背之文九前一後三左七右四前左二前右八後左六後右朱子信之以劉牧為非命蔡季通草易學啓蒙遂兩易其名而以五合為河圗九宫為洛書又用劉歆經緯表裏之説謂易可通於範範可通於易範之綱數四十有五合乎洛書其子目五十有五合乎河圗為説彌巧去經彌逺歸熙甫曰易圗非伏羲之書也此邵子之學也諸經遭秦火之厄易獨以卜筮存漢儒傳據甚明不應此圗逺出姬孔之前乃棄而不論獨流落於方士之家此豈可據以為信乎論語河不出圖與鳯鳥同瑞而已顧命河圗在東序與兑弓和矢同寶而已按河圗洛書皆屬後人附會宋儒自邵子朱子外皆不謂然即此節天一地二二十字孔氏以為隂陽奇偶之數張子以為天下之數止于十已為不易之論此天下自然之數豈必河圗而後有一二三四五六七八九十也以天地分配者只就數之奇偶而言猶之六爻初三五為陽位二四六為隂位耳本義以漢志天一生水數語附之為五生數五成數其説本之希夷當日希夷龍圗尚有天地未合已合二圗其説尤誕生成之故又與乾坤生六子之道渺不相涉雖五行之理實該萬事萬物而在易經自有八卦以類萬物之情五行在八物之內不必更主五行也無庸傅會天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也孔仲達曰言此陽奇隂偶之數成就其變化而宣行鬼神之用二十有五總合五奇之數三十總合五耦之數張子一二相間是相得也各有合以對相合也如一六二七三八四九數只是氣變化鬼神亦只是氣天地之數五十有五變化鬼神皆不越於其間朱子天地之所以為數不過五而已五者數之祖也蓋參天兩地三陽而二隂所以為數五也張南軒曰天地自然之數盈虛消息往來不停變化雖妙而數有以成之若月令所謂鳩化為應雀化為蛤草木乃茂草木黃落可以厯數推而迎之此天地之數有以成其變化也鬼神雖幽而數有以行之若其神勾芒其神祝融其神蓐收其神玄冥各司其時各治其職者此天地之數有以行乎鬼神也潘天錫曰天數二十有五五其五也地數三十六其五也莫不自五數之大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後挂程傳數始于一備於五小衍之為十大衍之為五十本義兩謂天地也挂懸其一于左手小指之間也三三才也揲間而數之也奇所揲四數之餘也扐勒於左手中三指之兩間也閏積月之餘日而成月者也五歲之間再積日而再成月故五歲之中凡有再閏然後别起積分如一挂之後左右各一揲而一扐故五者之中凡有再扐然後别起一挂也郭兼山曰蓍數之母必用四十九者惟四十九乃得三十六二十四二十八三十二之策也何也蓋惟四十九之數去其十三則得三十六去其二十五則得二十四去其二十一則得二十八去其十七則得三十二得者策數也去者所餘之扐也策數皆自四十九而得非四十九則不可得故四十九為蓍數之母蓍之法必用四者以蓍之象本皆四也三十六二十四二十八三十二是也九八七六亦四也名曰老隂老陽少隂少陽亦四也故蓍之法非四不可郭白雲曰世俗皆以三多三少定卦象如是則不必四十九數以四十五四十一至三十三三十七五十三五十七皆可得五九四八多少之象獨不可得三十六二十四二十八三十二之策數故四十九為不可易之道可易者非聖人之法也王童溪曰易取天地之數為大衍之數然五十有五之數運之于天地萬物固足以成變化而行鬼神本此數以作易則有齟齬而不合者故去其五以為大衍之數然去之者非去也十其五則五者在其中矣蔡西山曰五歲再閏者一變之中具有五節挂一為一節揲左為二節歸左之奇為三節揲右為四節歸右之奇于扐為五節一節象一歲三節一歸奇象三歲一閏五節再歸奇象五歲再閏宋咸易辨曰天地之數是自然之數大衍之數是推衍之數李克恭曰天地之數以五為率故五帝五方五品五常五行五音五味五色皆以五十其五為五十則數終矣而合天地之數實五十有五所謂終則有始天行也而卜筮用成數猶隂陽用老象以終則必變也故釋去有五而用五十卜筮之成變化而行鬼神以此乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也孔仲達曰乾之老陽一爻有三十六策六爻凡有二百一十六策坤之老隂一爻有二十四策六爻故一百四十有四策合乾坤兩策有三百有六十當期之數三百六十日舉其大略不數五日四分日之一也二篇之爻總有三百八十四爻隂陽各半陽爻百九十二爻爻三十六總有六千九百一十二隂爻亦一百九十二爻爻二十四總有四千六百八隂陽總合萬有一千五百二十當萬物之數也策謂蓍朱漢上曰萬有一千五百二十當萬物之數此變爻也老陽老隂之策也以不變者論之少陽之策二十有八凡一百九十二爻為五千三百七十六策少隂之策三十有二凡一百九十二爻為六千一百四十四策合之亦萬有一千五百二十當期之日變者以不變為基不變者以變為用是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣孔仲達曰三變既畢乃成一爻六爻則十有八變乃始成卦也八卦而小成者象天地雷風日月山澤於大象略盡是易道小成引而仲之謂引長八卦而伸盡之謂引之為六十四卦也本義引伸觸類謂已成六爻而觀其爻之變與不變以為動靜則一卦可變而為六十四卦以定吉凶凡四千九十六卦王童溪曰營求也用蓍之法以四而揲之成易之數以四而求之故老陽數九四而求之則其策三十有六少陽數七四而求之則其策二十有八少隂數八四而求之其策三十有二老隂數六四而求之其策二十有四隂陽老少易之本也故曰四營成易俞石澗曰正義云四度經營蓍策成易之一變先儒祖其説以分二卦一揲四歸奇為四營非也歸奇於扐者再分二卦一揲四則為五營矣按引伸句當從孔疏觸類句當從本義顯道神德行是故可與酬酢可與祐神矣韓康伯曰可以應對萬物之求助成神化之功也酬酢猶應對張子示人吉凶其道顯矣知來藏往其德行神矣語蓍龜之用受命如響故可與酬酢曲盡鬼謀故可與祐神此言蓍龜之德本義道因辭顯行以數神項平甫曰天道雖幽可闡之以示乎人人事雖顯可推之以合乎天明可以酬酢事物之宜幽可以贊出鬼神之命子曰知變化之道者其知神之所為乎蘇子瞻曰神之所為不可知觀變化而知之矣變化之間神無不在張子惟神為能變化以其一天下之動也人能知變化之道其必知神之所為也本義變化之道即上文數法是也皆非人之所能為故夫子歎之右第九章本義此章言天地大衍之數揲蓍求卦之法易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占項平甫曰四者雖云辭占象變而下文所論則皆占也君子將有為節言所占之事也參伍以變節言占之法也易無思也節言占之理也張南軒曰易者無形之聖人而聖人有形之易故易乃聖人之道而聖人乃盡易之道者也故指易以為聖人可指聖人以論易亦可故曰易有聖人之道四焉指其所之者易之辭以言者尚之則言無不當矣化而裁之者易之變以動者尚之則動無不時矣象其物宜者易之象制器者尚之則可以盡創物之知極數知來者易之占卜筮者尚之則可以窮先知之神按繫傳器字如形而下者謂之器形乃謂之器器字所包甚廣不必專指網罟耒耜之類此制器二字即下立成器以利天下蓋大經大法無非器也聖人制禮作樂即制器也要以一成而不可變者則謂之器故尚其象是以君子將有為也將有行也問焉而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此孔仲達曰君子將欲有所施為將欲有所行往占問其吉凶而以言命蓍蓍受人命報人吉凶如響之應聲也觀彖此以蓍言之象辭占變之用所以行也明炳於幾先故曰至精參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此虞仲翔曰觀變隂陽始立卦故成天地之文物相雜故曰文數六畫之數六爻之動三極之道故定天下吉凶之象項平甫曰凡占之法有變有數每爻三揲為三變每揲有象兩象三象四時象閏象再閏為五小變此參伍以變也三揲之奇分而計之則得三少三多兩多一少一多兩少之數去三揲之奇以左右手之正策合而計之則得四九四六四七四八之數此錯綜其數也錯謂分而間之綜謂合而總之此兩句止論一爻之法通六爻之變得十有八變遂成初二三四五上以為剛柔相雜之文極六爻之數得七八九六遂定重單交拆以為內外兩卦之象此兩句方論成卦之法故曰此言占法也觀彖此以卦爻言之象辭變占之體所以立也用周于無窮故曰至變易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此孔仲達曰故謂事故言通天下萬事也本義此四者之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用語類寂然感通與窮理盡性本是説易不是説人諸家皆是借來就人上説項平甫曰蓍之變策之數爻之文卦之象皆寂然不動之物初不能如人之有思有為皆純乎天者也乃問焉而以言則受命如響遂知來物則感而遂通天下之故皆同乎人也此言占理也張彥陵曰上數遂字已含有神字意非精變之外别有神觀彖此又總蓍卦爻而言之機妙于不測故曰至神夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也虞仲翔日深謂幽贊神明無有逺近幽深遂知來物故通天下之志謂蓍也務事也謂易研幾故成天下之務謂卦也寂然不動感而遂通故不行而至者也韓康伯曰極未形之理則曰深適動微之會則曰幾孔仲達曰言易道𢎞大故聖人用之所以窮極幽深而研覆幾微也無有逺近幽深是極深也參伍以變錯綜其數是研幾也本義所以極深者至精也所以研幾者至變也所以開物成務者神之所為也語類極深是至深難見底道理都從易上見得如幽明之故死生之説鬼神之情狀研幾是研磨出那幾微來如吉凶悔吝幾微毫釐處都研出來項平甫曰至精至變至神易之體也惟深惟幾惟神易之用也物情難盡惟精於占者能極逺近幽深之情而繫其辭故雖深而無不至也事變至微人所易忽惟明于變者能推分合錯綜之文而見其至故雖微而無不察也自將有為以下專論尚其占一事猶以四事終之者占則有辭變則有象舉其一則四事皆在其中矣張紫巖曰精之所燭來物遂知天下之志於此而可通變之所該萬象以定天下之務于是乎可成吳草廬曰以辭為占則可以前知而開通天下人之心志以變得象則可以制作而完成天下人之事務右第十章觀彖此申釋第二章居則觀象一節之意按夫子看一部全易不出此四者故設卦章首述卦爻蓍數以明辭占象變之本至此乃指出四者為聖人之道夫子贊易之綱領盡于此子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑本義開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中物是人物務是事務項平甫曰此一節先設問答次以是故發辭開物知其未然也成務定其當然也斷疑即志與事之決也龔泉峯曰通志以開物言定業以成務言斷疑以冒天下之道言惟其冒天下之道所以能斷天下之疑是故蓍之德圎而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫韓康伯曰圎者運而不窮方者止而有分唯變所適無所不周故曰圎卦列爻分各有其體故曰方貢告也六爻變易以告人吉凶崔氏憬曰蓍之數七七四十九象陽圎其為用變動不定因之以知來物是圎而神也卦之數八八六十四象隂方其為用爻位有分因之以藏往知事是方以知也龔括蒼曰神則無方知則有方無方故常知來來亦無方也有方故常知往往則有方矣卦者象也象則示之以定體爻者變也變則其義不可為典要本義聖人體具三者之德而無一塵之纍無事則其心寂然有事則神知之用隨感而應所謂無卜筮而知吉凶也神武不殺得其理而不假其物之謂語類此言聖人所以作易之原也聖人以此洗心此字指蓍卦之德六爻之義而言洗心言聖人玩此理而默契其妙也其所以知來者所謂圎而神也所以藏往者所謂方以知也是以明于天之道以下乃言教民卜筮之事神武不殺只是譬喻王童溪曰聖人以此蓍卦六爻洗去夫心之纍則是心也廓然而大公而不窮之用默存于我即所謂寂然不動也發而為用酬酢萬變而不窮憂患在民而聖人以為己之憂患故曰吉凶與民同患即所謂感而遂通也神蓍之德吉凶隱于未形聖人神以知來則神在聖人而不專在蓍矣知卦之德吉凶顯于既者聖人知以藏往則知在聖人而不專在卦矣謂之聰明睿知謂之神武不殺所謂蓍卦之神知咸在聖人也項平甫曰蓍開于無卦之先所以為神卦定于有象之後所以為知鄭合沙曰圎者運而不窮可以逆知來物方者其體有定可以識於既往俞石澗曰或云藏當作識蓋因上文退藏之藏遂訛為藏愚謂藏與識相似識誤為藏恐或然也何玄子曰吉凶之幾將至而未至者曰來吉凶之理見在而可知者曰往是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫本義神物謂蓍龜湛然純一之謂齋肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先語類此言作易之事也蓍龜靈物也聖人亦必神明其德者齋戒便靈不齋戒則不靈也王童溪曰福善禍淫者天之道聖人明其所必然為善得福為惡得禍者民之故聖人察其所由致聖人以此齋戒以神明乎神物之德使斯民亦皆致敬咸知其德之為神明而信其所告也此之謂興前言蓍之德圎而神則神物固有是德也不齋戒以神明之何以前民用乎張南軒曰蓍龜天能生之而不能興之惟聖人用其四十九而幽贊於神明者所以興其蓍也鑽之七十二而置之前者所以興其龜也項平甫曰此第二節言始立蓍筮之人自此以下遂言畫爻布卦之法胡雲峯曰上文謂蓍卦爻之理不假於物而皆具于聖人之心此則謂蓍卦爻之用不能不假於物而亦不外乎聖人之心俞石澗曰其德謂蓍之德神明謂神而明之存乎聖人占者能以敬心求蓍則受命如響無有不應陸聚緱曰古之聰明睿知神武而不殺者先儒均無所指惟項平菴指為伏羲而雙湖繼之然其説未允伏羲之世民風朴僿豈能盡知揲蓍史記云黃帝迎日推策順天地之紀幽明之占存亡之難旁羅日月星辰水波土石金玉世史類編云帝命大撓作甲子容成作蓋天𨽻首作算數則厯法興而蓍數亦由此起下繫傳云黃帝堯舜氏作通其變使民不倦神而化之使民宜之豈非教民揲蓍之一徴乎況五兵之制亦創自軒皇則神武而不殺者舍黃帝其誰屬按此可備一説是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神朱子或問問闔户一假只是此一物以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通曰是如此郭白雲曰繫辭論變通最為易之要道其義微而難知也因其微而難知故以户言之蓋聖人舉近人而易曉者以見乾坤變通以至制法盡神之妙舉一户之義足以兼明之坤隂物故有闔户象乾陽物故有闢戶象既能闔復能闢所謂變也朝闢暮闔往來不窮所謂通也通者通其變也至于户之可見則曰象其有形則曰器制而用此者則曰法也利于出入之用而天下之民無不用之又其所以為神也來矣鮮曰即一户而易之理已在目前矣觀彖闔闢變通見象形器是天道也制用之法咸用之神是民故也是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業馬季長云易有太極謂北辰居位不動其餘四十九轉運而用也崔氏憬曰大衍五十有一不用太極也不變者也蘇子瞻曰易有太極是生兩儀分而為二以象兩則其一不用太極之象也郭白雲曰四象者九八七六隂陽老少之象此與大衍序同李克恭云易變也然必有不變者而變者以生説文極中也屋極謂之中梁上脊檁有太極之一乃生兩儀儀匹也一隂一陽相匹也天地兩儀也故曰分而為二以象兩無太極則五十策兩分之或皆奇或皆耦無奇耦兩儀也兩儀生乃可挂一而四揲之以得七八九六之四象是兩儀生四象也四象生則九變而成內卦十有八變而成外卦是四象生八卦也八卦則六十四卦具矣有八卦而吉凶可定趨吉避凶而大業以生矣按此節承上文言蓍卦之德隂陽之變故以揲蓍成卦之義總束上文太極句自韓孔以老氏無字一字解之邵子以為無為之本宋儒以為極至之理而太極生兩儀則以為有理而後生氣無敢為異説者然愚體玩數十年覺太極二字説來終近玄渺且於懸空太極之下著一生字尤未慊于心馬氏以不動之一為太極崔氏蘇氏宗之蓋其時太極圗之説未出也而生字之義克恭李氏洗發切實攧撲不破此章專言蓍筮不應于蓍數之外無端又添一義況夫子言易有太極明明主易而言非謂天地萬物之先有此太極也兩儀亦主易卦之隂陽言非泛指天地間之隂陽也故周子圗説可别作一書讀不必以此牽合是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜本義富貴謂有天下履帝位立下疑有闕文亹亹猶勉勉疑則怠決故勉胡雲峯曰此六者之功用皆大聖人欲借彼之大以形容蓍龜功用之大故以是終焉是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛出書聖人則之程子孔子感麟而作春秋然麟不出春秋豈不作大抵須有發端處如畫八卦因見河圗洛書果無河圗洛書八卦亦須作張子造化所成無一物相肖者以是知萬物雖多其實無一物無隂陽者以是天地變化二端而已胡安定曰諸儒謂河圗洛書出見於世伏羲因得之而畫八卦案下繫辭曰古者庖羲氏之王天下也仰則觀象于天俯則觀法于地觀文與宜又近取諸身逺取諸物於是始畫八卦此八卦自是伏羲觀天地取諸物而畫八卦也所謂則之者則其時以行其事耳鄭孔皆失之矣張南軒曰天欲雨山川必先雲氣況易之興也豈無先至之祥乎是以聖人終之以河出圗洛出書而又則之者度其時以卜其道之將興於世也大扺通于天者河也有龍馬負圗而出此聖人之德上配於天而天降其祥也中于地者洛也有神龜載書而出此聖人之德下及于地而地呈其瑞也而世儒之説乃謂伏羲得河圗洛書以作八卦鄭康成溺於緯書乃云河圗有九篇洛書有二篇而孔安國又以河圗為八卦洛書為九疇此皆蕪穢聖經者矣項平甫曰天地變化即四時也天垂象即日月也姚小彭氏曰今所傳戴九履一之圗乃易乾鑿度九宫之法自有易以來未有以此為河圗者至劉牧以此為河圗以生數成數為洛書未足深據也又關子明洞極經亦言河圗洛書而兩易之按唐李鼎祚集解盡備諸儒獨無關氏至本朝阮逸偽為之亦不足為證矣俞石澗曰暑往則寒來寒往則暑來是謂變化聖人效之如卦爻之動靜日月往來有盈昃薄蝕循其度則吉失其度則凶聖人作易以示人吉凶蓋象此而已伏羲之時未有文字如因河圗洛書之文而畫卦故曰河出圗洛出書聖人則之非圗書有天生之數而聖人就取之也顧命天球河圗在東序天球玉也則河圗亦玉之有文者爾崑崙産玉河源出崑崙故河亦有玉洛水至今有白石洛書蓋白石而有文者不知河圗洛書之有數安國之徒曷從而知之河圗數十洛書數九又果何所據耶蓋皆出于緯書也東坡言緯書所言之數非易數也易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也本義四象謂隂陽老少示謂示人以所值之卦爻按四象橫渠謂吉凶變化進退剛柔之四象則與上文不相屬與定之句亦復當從朱子右第十一章本義此章專言卜筮易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也朱漢上曰天之所助者順理也人之所助者信相與也六五履信思乎順又自下而尚賢是以自天祐之吉無不利言此者明獲天人之祐然後吉無不利俞石澗曰此大有上九爻辭孔子發明言外之意也爻但言天此兼言人蓋天人一理也右一節按此節朱子云在此無屬或是錯簡至吳氏熊氏以此節與釋咸困諸節為文言錯簡斯為至當兹本姑仍舊位置於前後文義自無容強為之説子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神崔氏憬曰言伏羲仰觀俯察而立八卦之象以盡其意設卦謂因而重之為六十四卦情偽盡在其中矣作卦爻之辭以繫伏羲立卦之象象既盡意故辭亦盡言也蘇子瞻曰辭約而義廣故能盡其言項平甫曰立一奇一耦二奇二耦三奇三耦之象所以擬健順動入陷麗止説之意也設六十四卦所以具憂樂求與見伏輕重久速聚散之情也繫之以彖辭爻辭所以闡吉凶悔吝元亨利貞之言也此三盡者作易者之事也用易者觀其變而玩其占以處事變而行其會通則足以盡趨時成務之利而見于事功觀其象而玩其辭得之于心體之于身如鼓之動而舞之赴心術血氣與之俱成則足以盡隂陽不測之神而成之于德行此二盡者用易者之事也乾坤其易之縕耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣本義縕所包蓄者猶衣之著也易之所有隂陽而已凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行語録易之言乾坤者多以卦言乾坤成列兩畫是列八卦亦是列成列後其變易方立乎其中若只是一隂一陽則未有變易在易不可見則乾坤或幾乎息只是説揲蓍求卦吳草廬曰有陽儀隂儀則一易而成四象再易而成八卦毁謂不先列兩儀之體無此體則無以見其相易之用不可見則其一定之體殆若無所用故曰幾乎息俞石澗曰縕之義與論語縕袍之縕同衣中之絮也乾坤其易之縕謂乾坤縕于易六十四卦之中非謂易縕於乾坤兩卦之中也易之所縕奇耦是也下篇云剛柔者立本者也本即縕之謂也陸聚緱曰乾坤者卦象之陳列易者蓍數之交易變易也無卦象則何所據以揲蓍無蓍數則卦象亦窮于無用按此節諸儒有以乾坤為天地易為造化者細玩本文成列二字自當主卦畫言若天地則可云定位不可云成列矣朱子之説為至當愚且謂乾坤成列而易立乎其中即乾坤二卦既成而一索再索三索以生六子變易之道盡從乾坤二卦而出凡六子之隂陽皆乾坤也伏羲畫卦之始如此是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業程子器亦道道亦器也張子一隂一陽不可以形器拘故謂之道乾坤成列而下皆易之器乾坤交變因約裁其變而别之故謂之變推而行其變盡利而不遺可謂通矣舉盡利之道而錯諸天下之民以行其典禮易之事業也王童溪曰道外無器器外無道其本一也故形而上者與形而下者皆謂之形化而裁之則是器有所指别而名體各異故謂之變推而行之則是變無所凝滯而運用不窮故謂之通舉是變通之用而措之天下之民故謂之事業張南軒曰以天地論之隂陽者形而上者也至于穹窿磅礴者乃形而下者歟形而上者之道託於器而後行形而下者之器得其道而無弊項平甫曰乾本健也初爻化則為入中爻化則為麗末爻化則為説坤本順也初爻化則為動中爻化則為陷末爻化則為止凡六十四卦之象皆示人以化而裁之也此謂之變當其變也順而推之則通違而執之則窮故乾之災變而無首則吉坤之傷變而永貞則利訟之九四渝則成渙而吉豫之上六渝則成晉而無咎凡三百八十四爻之辭皆教人以推而行之矣故謂之通利用出入民咸用之此舉而措之天下之民謂之事業也此五謂者以演説變通盡利之意也來矣鮮曰通者達也如乾卦當潛而行潛之事則通行見之事則不通矣當見而行見之事則通行潛之事則不通矣孫夏峯曰化裁以下包得寬非專於易但作易是統宗之理姑就此發之方得分曉是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻孔仲達曰下文極天下之賾者存乎卦鼓天下之動者存乎辭為此故更引其文也極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行楊龜山曰象之與卦爻之與辭皆載在方册化而裁之不失其中必存乎能通其變者乎推而行之無有紀極必存乎能變而通者乎神而明之傳之于心者存乎其人默而成之悟之於理者不言而信存乎德行本義卦即象也辭即爻也卦爻所以變通者在人人之所以能神而明之者在德語録自形而上者謂之道至于變通事業是自至約處説入至粗處自極天下之賾者至神而明之又自至粗説入至約處郭白雲曰象爻卦辭易之書也化裁推行神明默成皆聖人用易也神而藏用明而顯行存乎其人也項平甫曰實德存于身則不言而體已備即易之無思無為寂然不動也實行信于人則不言而化已孚即易之不疾而速不行而至也分而言之默與不言為神成之與信為明德為神行為明故曰神而明之合而言之隂陽不測皆謂之神可也然神在德行不在虛無則皆謂之明亦可也此六存者演説鼓舞盡神之意也邱行可曰上文五謂者聖人作易之用此六存者則聖人之用夫易也前言變通而歸之事業推易道於民也此言變通而歸之德行存易道於已也右第十二章楊誠齋曰此章言聖人作易之意其散在六十四卦之爻其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也易有三一曰天易二曰竹易三曰人易天尊地卑乾坤定矣天易也書不盡言言不盡意竹易也存乎其人存乎德行人易也程氏敬承曰上繫末章歸重德行下繫末章亦首揭德行即所謂乾坤易簡者乎周易孔義集説卷十八
