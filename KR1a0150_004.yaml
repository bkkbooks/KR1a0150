body:
  text: 周易孔義集說卷四光祿寺卿沈起元撰上經離下乾上中爻巽乾程傳同人與否義相反又世之方否必與人同力乃能有濟同人所以次否同人于野亨利涉大川利君子貞彖傳同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志鄭康成曰乾為天離為火卦體有巽巽為風天在上火炎上而從之是其性同于天也火得風然後炎上益熾風行無所不遍則㑹通之德大行故曰同人于野亨孔仲達曰同人謂和同于人野是廣逺之處借其野名喻其廣逺言和同于人必須寬廣用心無私乃得亨通故云同人于野亨與人同心足以涉難故曰利涉大川與人和同易涉邪僻故利君子貞蘇子瞻曰野無求之地凡從我者皆誠同也程傳至誠無私可以蹈險難者乾之行也無私天德也又以二體言其義有文明之德而剛健以中正之道相應乃君子之正道也天下之志萬殊而理則一君子明理故能通天下之志文明則能燭理故能明大同之義剛健則能克己故能盡大同之道然後能中正合乎乾行也張子曰不能通天下之志不可謂正天下之心天下之志自是一物天何嘗有此間别楊龜山曰文明以健總一卦之才中正而應以二五言文明而不健則物或蔽之中正而不應則物或間之同者寡矣郭白雲曰名卦不曰同天者聖人明人道蓋由同人則同天矣人道以同人為大故也趙復齊曰得中應乾同乎天也同乎天者同乎人也項平甫曰同人乾之九二也見龍在田德施普也故曰同人于野亨大有乾之九五也飛龍在天大人造也故曰大有元亨同人曰同人于野亨此句當連上文解之其說謂柔得位得中而應乎乾故其卦曰同人而同人之繇又曰同人于野亨也蓋本之以中正而無邪行之以剛健而無欲故能忘己而同人又能忘人而同乎野也故以兩曰字明之同人以一柔為主徒柔不能以同乎人也必以天德行之故雖得位得中而必應乎乾乃可謂之同人至于利涉大川則又曰此乾行也明非柔之所能辦也凡卦之以柔為主者皆然履六三小畜六四大有六五皆柔為卦主而其濟也必稱乾焉伏坎在下為川互巽在上為舟涉川象張紫巖曰惟貞則以我之心為天下心將合天下之志通為一矣離火在人屬心為志朱漢上曰同人之義以四言該之文明也健也中也正也以一言盡之正而已矣不正則燭理必不明行己必不剛施諸人必無相應之理反求于心不能自得其能通天下之志乎鄭東谷曰同人大有對變之卦人臣為羣陽之宗易失之私故同人之彖爻多戒人君為羣陽之宗上下順從故大有之彖爻多吉馮厚齊曰上乾君也天也下離六二在離之中人位也乾上離下五陽同歸二之一隂有以天同人之象亦為人君同乎斯人之象故曰同人離中虛有舟虛能載之象載上三陽健于行水吳草廬曰人目所望地連天際為野六二下居于地上應乎天故曰同人于野胡雙湖曰六畫卦二為地位自天視地則地為曠野胡雲峯曰同人于野其同也大利君子貞其同也正有所同者大而不出于正者故又當以正為本來矣鮮曰柔得位者八卦正位離在二錢啓新曰同人上體乾此人人之天此人人可應而同之理然惟離柔在于乾下得位得中應得全乾之體同得天下之人是以謂之同人同人于野以明體在天宇四垂之野人盡相見乎離無不見無不同矣是之謂亨易外日出而萬物相見君子之心如日得天下之所同然天通天下之志以日君子通天下之志以心觀彖乾為陽爻之通稱言五陽與之應也不必泥于二五之應不言上下應者居下體則但言應而已按傳有二應應乎乾統言五陽中正而應專主二五初九同人于門無咎象傳出門同人又誰咎也王輔嗣曰同人之始無應于上心無係吝通夫大同出門皆同楊誠齊曰門室之始初九同人之始吾與人曷嘗不同隔之者門也吾一出門則天地四方孰不吾同者何咎之有沈守約曰離體虛明無偏隘之失以剛處下無陵犯之患爻變為艮艮為門胡雲峯曰同人與隨皆易溺于私隨必出門而後可以有功同人必出門而後可以無咎蓋易以人名卦者有二家人一家之人也同人天下之人也門以內所同者一家之人而已出門同人所同者一國之人也天下之人也林次崖曰出門同人是解同人于門明于門為出門也唐凝庵曰門者人我之限拘于限則不能同人而有咎矣六二同人于宗吝象傳同人于宗吝道也侯行果曰宗謂五也二為同人之主和同者之所仰也有應在五過五則否不能大同于人則為主之德吝狹矣所同雖吝亦妻臣之道也程傳二與五為正應故曰同人于宗宗宗黨也同于所係應是有所偏與在同人之道為私狹矣故可吝郭白雲曰在卦論之六二文明之性固知同人之義自爻觀之其才至柔安能大同于物知同于五不失上下之分又以中正同中正亦何異於宗黨同於所尊者哉然以同人之道論之則小而吝矣按六二為同人之主自卦義言之則當同于五陽然二本隂爻豈可泛同若以一隂而同于五陽則為姤之女壯今六二中正知同于宗而已故周公謂之吝者從卦義言也孔子謂之道者從爻義言也九三伏戎于莽升其髙陵三嵗不興象傳伏戎于莽敵剛也三嵗不興安行也虞仲翔曰巽為伏震為草莽離為戎巽為髙王輔嗣曰貪于所比據上之應其敵剛强非力所當故伏戎不敢顯亢升髙望不敢進孔仲達曰安何也何可行也崔氏憬曰與二相比盜憎主人一爻為一年自三至五頻遇剛敵蘇子瞻曰二之同于五也歷三與四而後至故三與四皆欲得之程傳同人之時志在于同卦唯一隂諸陽皆欲同之三又與比以剛强居二五之中欲奪而同之五剛且正其可奪乎故畏憚伏藏也本義剛而不中欲同于二而非其正懼九五之見攻其象如此李隆山曰天下之理萃則必爭卦以同為義而三則伏戎四則乘墉五則大師克相遇故易中必知險簡中必知阻按變有互艮陵象又止而不興象九四乘其墉弗克攻吉象傳乘其墉義弗克也其吉則困而反則也王輔嗣曰處上攻下力能乘墉履非其位以與人爭攻三求二違義傷理衆所不與故弗克程傳三以剛居剛故不能反四以剛居柔故困而能反畏義而能改吉宜矣本義欲同于二而為三所隔故為乘墉以攻之象乘其墉矣則非其力之不足以義之弗克而不攻耳郭白雲曰九四無應居二剛之間為多懼之地困窮甚矣項平甫曰凡爻言弗克者皆陽居隂位訟之九二九四同人之九四是也唯其陽故有訟有攻唯居隂故弗克沈守約曰離外實而衛內虛而容墉之象據三之上乘也乾變而為巽健而能巽知不能克而反則之象李蒙齊曰九四雖不中正以其乾體故能知險履離故有明明而知險是以能止而弗攻胡雙湖曰三以四為陵其指四也四以三為墉其指三也聖人與四以吉開自反之門不與三者以無君之惡尤甚也九五同人先號咷而後笑大師克相遇象傳同人之先以中直也大師相遇言相克也張子二與五應而為他間已直人曲望之必深故號咷也師直而壯義同必克故遇而後笑本義中正相應同心者也而為三四所隔不得其同然理義所同物不得而間之六二柔弱三四剛强故必用大師以勝之然後得相遇張紫巖曰心通跡間其憂在先道之苛勝間何能為中直則君臣心本相通何憂不遇二五俱得中位是五之心即二心二之心即五心其為中直大矣至誠惻怛之意發見于外曰號咷君臣相遇道行天下有足樂者曰後笑克言與之者衆所勝在道若師之克離為戈兵九五以剛處中離體在下羣陽從之為大師吳草廬曰號咷者離火之聲笑者兌口之說胡雲峯曰同人九五剛中正而有應故先號咷而後笑旅上九剛不中正而無應故先笑後號咷張湛虛曰同人而曰大川戎攻師克何也同者人之所忌也忌同伐交大川不足喻其險按六二為同人之主故以于宗為吝至五則彖傳所謂中正而應者故傳明其中直况五陽皆同于二五非主爻無庸議其私昵上九同人于郊無悔象傳同人于郊志未得也侯行果曰獨處于外同人于郊也不與內爭無悔吝也同人之時惟同于郊志未得也蔡節齊曰國外曰郊郊外曰野雖在卦上猶未出乎卦也故止曰郊楊釋褐曰同人于野則亨于門則無咎于宗則吝于郊則無悔于宗不若于門于門不若于郊于郊不若于野六爻有不能盡卦義者同人是也梁孟敬曰同人于郊則所同者逺亦無私矣然猶未能極乎逺故不能吉亨止無悔而已所同者未能周天下是其志之未遂也觀彖同人之道以于野為至上雖當其象然爻德有所未備故殺其象曰郊郊雖未至于野然近于野矣于野則亨吉曰無悔知其志未得也總論按同人六爻不能盡卦義者何歟卦以二體立義爻以爻位趨時凡以一隂一陽為主者五爻皆從主爻而生逺近相得不相得之義其于二體中爻者更甚師比是也然師不如比以其在下也至于一隂為主隂本不如陽下又不如上同人以在下之隂為衆陽所歸以其得中勝于小畜之六四履之六三然當同人之時五陽之欲同于二者勢也在二之隂不可遍同于五陽者理也故二之于宗雖于同人為吝狹而不失臣妻之道二守于宗三四之爭起矣五非同人之主知中正之應而已既同于二豈為大同初上事外其庶乎乾下離上中爻乾兌大有元亨彖傳大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨虞仲翔曰謂五以日應乾而行乎天也本義大有所有之大也火在天上無所不照又六五一隂居尊得中而五陽應之故為大有乾健離明居尊應天有亨之道應天謂六五趙復齊曰九居五不言得尊位所當居也六居五故貴之五為大中貴于二也上下應者不拘逺近凡一陽五隂一隂五陽之卦皆然乾加震曰大壯大者壯也加離曰大有隂麗乎陽大者有之也柔得尊位陽應之隂能有大也朱漢上曰致元亨者由乎其才剛健則不息文明則能順萬物之理有是德而行之不失其時隨天而行也此合兩體推原六五言大有之才也郭兼山曰一柔而應五剛所謂不寶逺物所寶惟賢也不如是不足以為尚賢項平甫曰一隂在下勢不足以有衆能推所有以同乎人故曰同人一隂在上人同乎我為我所有故曰大有同人曰應乎乾明我應之也大有曰上下應之明人應我也履柔在下亦曰應乎乾小畜柔在上亦曰上下應之此可以推卦例矣同人離在下以德為主曰應乎乾者應其德也大有離在上以位為主曰應乎天者應其命也履兌在下曰應乎乾大畜艮在上曰應乎天亦卦例也王童溪曰善治衆者不以衆以寡善制剛者不以剛以柔大有之有五剛非六五之柔不可也上而上九以我能尚其賢降志而比乎我下而自初至四以吾能用其才以其類而從乎我所有豈不大哉鄭東谷曰必冲虛不自滿者能有大六五明體而虛中所以為大有張紫巖曰剛健而誠盡于內文明而禮盡于外合是二美中德斯大得乾之中曰大中應乎天而時行謂用離柔離萬物相見于時為正為時行當大有之世非用柔無以得天下賢非得賢無以保天下大業時也鄭少梅曰大有之時盛德在火萬物皆赴亨嘉之㑹胡雲峯曰小畜之亨不在六四而在上下五陽大有之元亨不獨在五陽而在六五來矣鮮曰時行即應天之實易外火日也日在天上從震而位乎乾彖言火而不言日者天子以神為治如日之用其火日之光火之神也火在天上萬物告成火之功成而天之德亦至華霞峯曰本是純乾一柔居五天啓文明在元㑹為中天之運在日行為當午之中在天道為一元資始萬象亨嘉之㑹在世道為大明首出衆正畢升之時按大有乾之九五之變卦辭無他文特言元亨而不言利貞者大有乃春夏之象而未及秋冬也鼎言元亨者乃東南之卦而未及西北也初九無交害匪咎艱則無咎象傳大有初九無交害也張子二應于五三能自通四匪其彭惟初無交故有害然非其咎楊龜山曰當盛大之時貧且賤焉恥也則無交宜有害矣故曰大有初九無交害唯大有之初為然趙復齊曰凡乾之初貴潛匪咎由時無咎由己朱漢上曰初九守正無交在它卦未有害大有上下應之而初九無交則害也項平甫曰六五受人之交而初獨不往交則害于大倫故為有害居勢適然豈能强合凡言害者皆不利之名俞石澗曰傳曰大有初九大有時也初九位也時位如此所以無交害爻傳凡稱卦名者皆以時言凡稱爻名者皆以位言按大有之時以交孚為利自當以無交為害此如比之五隂皆附而上六獨否為凶但比上以隂居卦外故有凶此以陽居初守正不苟故無凶咎在大有之世本無害之可涉若云無交于害則宜其為吉何必言匪咎而又何咎之可無宗張子說為當九二大車以載有攸往無咎象傳大車以載積中不敗也虞仲翔曰乾為大車體剛履中可以任重有應于五故所積皆中而不敗劉長民曰下乘陽為動上乘陽為實得中位為安五以虛中納下往則無咎程傳剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任如大車之材强壯能勝載重物也王童溪曰大車積集衆材而成大有衆材輻輳之時九二之材剛而中者又處衆剛之材之中則集衆剛之材以㑹于中而成此荷載之功也何敗之虞沈守約曰乾體剛健變為離剛健而能容載大車象中虛故能積剛健故不敗離為文明文明積中發于事業君臣同德以成文明之治也蔡節齊曰大車二也載謂載五胡雲峯曰坤為大輿九二乾體而曰大車者輿指軫之方而能載者言車則以其全體而言引之以馬之健行之以輪之圓皆乾象也不曰吉者大臣任天下之重職當如此也僅得無咎處大有之難如此易外大有六月之候萬寶告成火之為功也乾為大車以載載火也實載萬物也九三公用亨于天子小人弗克象傳公用亨于天子小人害也本義亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹飪之烹皆作亨字九三居下之上公侯之象剛而得正上有六五之君虛己下賢故為亨于天子之象朱漢上曰三五相交乾變離兌乾為天離為日兌為澤卜偃謂天為澤以當日天子降心以逆公是也天子施澤于下降心而說有粲然之文者莫如公之亨于天子也九三剛健而正與五同功故得此爻張紫巖曰三重剛立互兌下小人以事君為容悅無所不用其私必為天下大害有大之君尤宜察諸項平甫曰大有六五為主初獨無交逸民也上在其上賔師也中爻三位為臣二大臣也受大有之任故為載三外臣也奉大有之物以朝貢故為亨二以中故無咎三以不中故有戒四近臣也以柔自抑不怙大有之寵故為匪其彭王秋山曰土地人民皆天子所有陽剛得正之君子必不私其有以奉上故曰亨于天子以過剛不中之小人處之必據為己有因而不順故處大有則或為害而大有亦適足為小人害也熊梅邊曰或問九三與五無係應何以有亨于天子之象曰九三居上下之際乾離之交處下之上互兌之初又與五同功而異位故有此象錢啓新曰若以小人而有公之用撰毁折于乾離之中言有無于豐盈之世以民必竭健之力以君必蔽離之明龍麟洲曰三兼乾兌乾主上進兌下陽與上隂相悅有升而朝五之象乾良馬金玉皆庭實象離日之光下照兑澤而澤受之又君臣恩禮交接之象此非常之占小人豈能堪此合訂人臣效忠竭力忘家為國莫非亨也財物獻貢亨之一端耳九四匪其彭無咎象傳匪其彭無咎明辨晢也晢章舌反程傳九四過中是大有之盛也故處之之道匪其彭則得無咎謂能謙損不處其太盛也彭盛多貌項平甫曰四居離初能明于初為辨晢沈守約曰變而為艮明而知止唐凝菴曰居近君之位率諸陽以進有盛象惟以剛臣近柔主疑于自專其盛由離之明辨之而晢則其盛皆五之盛而匪四之盛華霞峯曰三不有其有故持以獻君四不私其有故解使去已按唐氏華氏看匪其二字細六五厥孚交如威如吉象傳厥孚交如信以發志也威如之吉易而無備也孔仲達曰信以發志者由已誠信起發其志故上下應之與之交接易而無備者以已不私于物惟行簡易無所防傋物自畏之蘇子瞻曰處羣剛之間而獨用柔無傋之甚者以其旡備而物信之故歸之者交如以其無備知其有餘也夫傋生于不足不足之形見于外則威削矣程傳當大有之時居君位虛中為孚信之象人君執柔守中而以孚信接于下則下亦盡其信誠以事于上上下孚信相交也張子君子以至誠交人然後有威重君子至平易有何關防擬備唯以抑抑威儀為德之隅儼然人望而畏之楊龜山曰威如之吉以德不以力所謂德威惟畏也郭白雲曰交如親之也威如尊之也誠信之道已通君臣之道巳嚴能銷患于未形孰為猜嫌之慮且初九之難進九二之積中九三之克亨九四之匪彭各以其道而來親而尊之可謂有賢之極矣舜明目達聰終于無為而治其易而無備之吉乎鄭東谷曰以柔順而有羣陽區區焉設關鍵以為備則亦不勝其備矣法制密而誠意消是豈大有之君哉項平甫曰五居離中有中孚象為信體柔為順履信思順而上下應之則其孚交矣王童溪曰人君能使人不敢違不若使人不忍違六五以誠信感發衆志則天下志應無山溪而固無甲兵而威夷然和易初無備禦而不怒之威自孚于上下李蒙齊曰孔子恐後世人主觀威如吉之言以作威殺戮逆詐設備為吉故釋云平易而無備即繫辭所謂有親可久之道也俞石澗曰在心為志蓋未發也發之者信也當大有之世在下者本有協應之志而在上者又足以感發之則人自敬之畏之來矣鮮曰威如即恭已易而無備即無為按六十四卦中以六居五而主君象者震以乘陽艮以承剛易得咎悔坤主于順終屬臣道故坤震艮在上之六五不若離之六五如大有晉鼎為易中極美之卦皆以離在上也離主文明其象為日在上為人君嚮明而治離之中爻乃虛明之體不專柔順于睽而猶得悔亡有慶于旅而有譽于噬嗑而無咎于未濟而暉吉皆離之美也至大有六五尤為乾飛龍在天之變爻如太陽當空人不敢正目而視威所自足孰敢慢易但以文明之德與萬物相見光明洞達天下歸心本無太柔之患更何須于戒備周公繫以威如孔子釋以無備蓋發離日之象也所謂交者即彖之應天也上九自天祐之吉無不利象傳大有上吉自天祐也郭白雲曰繫辭曰祐者助也天之所助者順也人之所助者信也履信思順又以尚賢也六五之君盡此而言于上九者蓋言大有之吉以此終也故象曰大有上吉則知此吉乃大有之吉非止上九之吉也項平甫曰六五在本爻但見其履信思順而已至上九而後見其尚賢當大有之世有羣小易有大賢難象傳曰大有上吉明事關全卦非止上爻此猶師之上六論師之終其言大君蓋指六五非謂上六為大君也趙復齊曰五能尊上此大有所以上吉君之大有極于尊賢鄭東谷曰五成卦之主上其終也五之德宜獲是福于終可驗五尚上九之賢故自天之祐于上九見之趙汴水曰九陽也在五之上為天象如大傳所釋又為賢之象五以下諸爻應為人助以上一爻應為天祐之天祐人助宜六五吉無不利蓋陽在隂上其象為天賢在君上其象為師傅胡雲峯曰五之厥孚履信也柔中思順也尚上九之一陽尚賢也所以其終也自天祐之吉無不利也本義于大畜尚賢曰六五能尊上九之賢胡雙湖曰五上為天位有天象龔泉峯曰天指上而言祐之謂祐五也觀彖以上爻終五爻之義易之如此例者極多解者乃以為上九尊尚六五之賢非矣按趙氏龔氏說尤得本爻繫此辭之㫖天祐二字乃非泛設于彖傳上下應之之義為切所以為大有之上吉也艮下坤上中爻坎震馮厚齊曰一陽五隂之卦一陽在上下為剝復象陽氣之消長在中者為師比象衆之所歸至于三四在二體之際當六畫之中故以其上而退處于下者為謙自下而奮出于上者為豫此觀畫立象之本㫖謙亨君子有終彖傳謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也鄭康成曰山體髙而在地下髙能下下之象亨者嘉㑹之禮以謙為主惟艮之堅固坤之厚順乃能終之虞仲翔曰君子謂三艮終萬物故君子有終崔氏憬曰日中則昃月盈則虧髙岸為谷深谷為陵髙明之家鬼瞰其室黍稷非馨明德惟馨滿招損謙受益石守道曰六十四卦唯謙六爻無悔吝皆吉程傳謙有亨道有其德而不居謂之謙人以謙巽自處何往不亨君子志存乎謙巽達理故樂天而不疑內充故退讓而不矜安履乎謙終身不易君子有終也他卦有待而亨唯謙便亨天以其氣下濟故能化育萬物其道光明地處卑以其氣上行交于天皆以卑降而亨也本義止乎內而順乎外謙之意山至髙而地至卑乃屈而止于其下謙之象變謂傾壞流謂聚而歸之趙復齊曰內止無欲故外能柔順凡矜伐皆欲之動陽實隂虛內篤實外虛少謙之義也一陽終于艮在上為剝終不可用在下為謙終而不窮止得所也蔡節齊曰下濟而光明艮光明象沈守約曰內剛止則不失于佞外柔順則不失于亢謙道之貴中也項平甫曰九三乾也降在下卦是下濟而光明坤地道處勢至卑而升在上卦是卑而上行下濟與卑釋謙字光明與上行釋亨字邱行可曰凡卦以一陽為主者彖傳皆以剛言復曰剛反豫曰剛應師比曰剛中剝曰變剛謙主九三而彖不言剛者謙無用于剛也用剛則不能謙矣吳草廬曰尊崇他人以居已上而已光顯卑抑自己以居人下而人亦不可踰越之胡雙湖曰謙唯陽剛君子能之然一陽卦必至三而後名謙者三人位有公侯之尊貴乃肯自卑而處三隂之下此所以為謙有艮之篤實坎之勞震之動而又承坤之重盛德如此安止不遷謂之君子有終宜哉按尊卑二字吳說為優以位言者文義缺妥初六謙謙君子用涉大川吉象傳謙謙君子卑以自牧也荀慈明曰初最在下為謙三體坎故用涉大川吉程傳以柔順處謙又居一卦之下為自處卑下之至謙而又謙也雖用涉險亦無患害郭兼山曰謙虛也中虛以涉難有不濟者乎張紫巖曰卑以自牧君子止心之道處艮下體又承坤為謙坤為馬為牛為地艮為山為自牧王童溪曰牧養也謙卑德初卑位養德之地未有不基于至卑之所所養也至則愈卑而愈不卑矣張南軒曰牧如牧牛羊然使之馴服方可以言養項平甫曰初六九三皆稱君子者此二爻皆非小人之所宜處初過謙者也小人用之則為柔佞君子用之以柔身濟難三有大功小人處之則有不賞之禍吳草廬曰初變為剛成離有舟象坤順在上前無阻隔胡雲峯曰謙主九三故稱君子初亦曰君子何也三在下卦之上勞而能謙在上之君子也初在下卦之下謙而又謙在下之君子也胡雙湖曰涉川貴于遲重不貴于急速用謙謙之道以涉川退後而不爭先自然萬無失一來矣鮮曰震木在坎水上涉川象六二鳴謙貞吉象傳鳴謙貞吉中心得也姚氏信曰三體震為善鳴二親承之故曰鳴謙得正處中故貞吉蘇子瞻曰雄鳴則雌應故易陽唱而隂和寄之于鳴謙之所以為謙三也六二其鄰也上六其配也故皆和之而鳴于謙而六二以隂處中雖微九三其有不謙乎故鳴以言其和于三貞以見其出于性也程傳二以柔順居中是為謙德積于中發于外見于聲音顏色曰鳴謙凡貞吉有為貞且吉者有為得貞則吉者六二之貞吉所自有也中心所自得非勉為之也鄭東谷曰鳴者氣有所感也三為謙主二中正而位其下以柔從剛以下從上所以感于三者誠故其鳴也為正且吉鳴而得遂其為謙之志曰中心得趙汴水曰鳴鳥語求友則鳴不平亦鳴九三成卦之主六二比而承之求友之鳴樂而鳴也郝京山曰艮為山震為雷二以山谷應虛而鳴上以雷聲出地而鳴九三勞謙君子有終吉象傳勞謙君子萬民服也荀慈明曰體坎為勞王輔嗣曰處下卦之極履得其位上下無陽以分其民衆隂所宗尊莫先焉上承下接勞謙匪懈王童溪曰謙之成卦在此一爻卦之德曰君子有終九三實當之三實艮體而止諸坤順之下所謂藴崇髙于卑下之地其象則地中有山也以剛明之才居下之上上為君所任下為衆所從信勞而不伐故獲終吉張紫巖曰以陽剛居羣隂中為君子艮終始為有終坤衆在上已下之為萬民服鄭亨仲曰身之服勞無如手足禹之胼胝可見艮為手互震為足趙汴水曰一陽在初有克己復禮之仁在二有師中丈人之吉在四有由豫大有得之業在五有顯比使中之主在上有碩果存陽之功上下始終歷試諸艱可謂勞矣勤勞如此一陽獨尊宜可用剛以臨物今不為比豫之在上乃退居三隂之下是勞而能謙也復師雖在下而不為終剝雖終而在上今九三艮為主是謙而能終者也吳草廬曰震動者勞之象胡雲峯曰乾之三以君子稱坤之三以有終言謙之三兼乾坤占辭勞者即乾之終日乾乾而謙則坤之含章來矣鮮曰八卦正位艮在三所以爻極善六四無不利撝謙象傳無不利撝謙不違則也王輔嗣曰乘三承五指揮皆謙不違則也程傳四居上體切近君位六五之君謙柔自處九三又有大功德為上所任衆所宗而已居其上當恭畏以奉謙德之君卑巽以讓勞謙之臣動作施為無所不利于撝謙也撝布施之象如人手之撝動息進退必施其謙蓋居多懼之地又在賢臣之上故也朱漢上曰艮為手止也震起也手止而復起有揮散之象揮散其謙之道布于上下撝謙也朱子不違法則言撝謙不是過分事沈守約曰以坤順之質以隂居隂在上卦之下能謙者也坤變為震動不違順卦變小過君子以行過乎恭者也六五不富以其鄰利用侵伐無不利象傳利用侵伐征不服也本義以柔居尊在上而能謙者故為不富而以其鄰蓋從之者衆矣猶有未服者利以征之而于他事亦無不利楊誠齊曰五以君上之尊體柔謙之德欿然不有其崇髙富貴之勢謙德之盛焉往不利利用侵伐姑舉其大者郭白雲曰隂虛為不富征不服者蓋有不服則征無不服則勿征也朱漢上曰五動成離坎有弓矢甲胄之象沈守約曰卦變為蹇險在前征不服象鄭亨仲曰五爻皆言謙惟六五不言者聖人慮其過梁孟敬曰九三在下乃立功之臣而坤為衆有用師之象五既得衆心之歸而又賢臣為之將是惟無動動必利胡雲峯曰謙之一字自禹征有苖而伯益發之六五一爻不言謙而曰利用侵伐何也蓋不富者六五虛中而能謙也以其鄰者衆莫不服五之謙如此而猶有不服者則征之固宜來矣鮮曰坤為衆中爻震變離為戈兵衆動戈兵侵伐象按五下有山之阻坎之險不服象而有九三為震之主故利侵伐上六行師亦同上六鳴謙利用行師征邑國象傳鳴謙志未得也可用行師征邑國也虞仲翔曰應在震故曰鳴謙體師象震為行坤為邑國程傳以柔處柔順之極又處謙之極極乎謙者也極謙而反居髙未得遂其謙之志故至發于聲音曰鳴謙征邑國已之私有謂自治其私朱子老子言大國以下小國則取小國小國以下大國則取大國又言抗兵相加哀者勝矣孫子曰始如處女敵人開戶終如脫兔敵不及禦大抵謙自是用兵之道只退處一步耳坤為衆有坤卦處多言師坤為土土為國故云征邑國也王童溪曰以謙德而處極位此執謙者之所不安故鳴其未得之志謙極易以取侮故六五上六皆以征伐為言所以救謙之過項平甫曰凡言鳴者皆志志有憂有樂皆寓于鳴當謙之時人志在下不以上為樂二在下卦之中如其所欲故其鳴為得志上在上卦之上欲下而不可得故其鳴為未得志六五利用侵伐上六利用行師皆與卦材爻德不類者謙自二至上皆師卦三在師中為萬民所服即師之懷萬邦師之六五利執言故此六五亦利侵伐師上六與六三之小人應故戒以勿用此所應者九三之君子故勸以可用用三也張紫巖曰利用云者于用為利未必用也趙汴水曰師卦未嘗言用師之利至謙之五上乃不一言之蓋惟謙抑之人必無喜功好大之失其征伐也必有甚不得已者合二卦並觀足見聖人之情王秋山曰謙之上即豫之初豫初曰鳴豫以應四也此曰鳴謙以應三也上六本謙退之至者然三為成卦之主得時得位獨與之應故鳴其謙退而未得之志然已愈退而人愈歸故利用行師志終不逺故止自治而已谷拙侯曰志未得正是謙處華霞峯曰謙卦中爻坎震坎險震動故多取行師征邑國象坤坎合行險而順師之吉也上之行師以謙極而可用行師非以志未得而至于行師也以可用行師見人之信從非以人未信從而必用行師也易外復師謙豫四卦皆有雷故皆言行師復之不利行師以雷在地中也坤下震上中爻艮坎豫利建侯行師彖傳豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉鄭康成曰坤順震動順其性而動者莫不得其所震為雷諸侯象坤為衆師役象豫喜逸悅樂之貌虞仲翔曰初至五體比故建侯三至上體師象故行師九家易曰建侯以興利行師以除害興利除害民所逸樂侯行果曰四為卦主五隂應之剛志大行故曰剛應而志行程傳豫者安和悅樂之義志行謂陽志上行動而上下順從其志得行順以動順理而動所以豫郭白雲曰馬氏王氏以豫為樂關氏曰豫備也豫備則逸樂也孔氏為逸豫程氏為和豫大率易之名卦兼備衆義非一字可訓邱行可曰屯有震無坤則言建侯不言行師謙有坤無震則言行師不言建侯此合震坤成卦故兼之沈守約曰坤母震長男母老子壯是以為豫母在內居樂也震在外出威也居樂出威是以利建侯行師張紫巖曰雷動于上坤順于下為天地以順動震春陽用事時以序行為四時不忒互坎在中為日月不過坎水為刑罰清坤衆為民服馮厚齊曰過平聲日月之行景長不過南陸短不過北陸故分至啓閉不差其序項平甫曰豫隨遁姤旅皆若淺事而有深意故曰時義大矣哉欲人之思之也坎睽蹇皆非美事而聖人有時而用之故曰時用大矣哉欲人之别之也頤大過解革皆大事大變故曰時大矣哉欲人之謹之也人死于大過而生于頤王元龜曰利建侯所以備豫利行師所以飭豫豫以和樂主義和而不備則乖戾隨之故有備豫之義和而不飭則驕怠生焉故有豫怠之義吳草廬曰豫者暇而樂也凡人從容和緩順序以動則先事詳審事成而樂以卦象則雷出地上陽氣伏藏地中非一日矣一陽二陽至三陽上達于地之後雷始發聲故其聲和樂專言時者重在時字時義重在義字時用重在用字胡雲峯曰比之建侯師之行師皆以一陽統五隂而豫在師比之間故兼焉建萬國聚大衆非順理而動使人心和樂而從不可也故二者皆繫之豫蔡虛齊曰時之一字貫六十四卦有時則有義有義則有用單言時則義與用在其中矣觀彖贊卦皆言時贊爻皆言位時位二字乃卦爻之所以立也初六鳴豫凶象傳初六鳴豫志窮凶也虞仲翔曰應震善鳴失位故凶石守道曰四為豫主初與之相應小人得志必極其情欲以至于凶蘇子瞻曰所以為豫者四也而初和之故曰鳴已無以自樂而恃其配以為樂志在因人而已所因者窮不得不凶本義卦辭為衆樂之義爻辭除九四與卦同外皆為自樂所以有吉凶之異窮謂滿極趙汴水曰位方在初時勢未窮而競躁如此是志已先窮也胡雙湖曰豫初六即謙上六皆震善鳴象錢啓新曰雷從地出雷自發聲地自鎮靜豫不可鳴如地不可震四動初動雷鳴地鳴凶象吳覲華曰坤初正在閉藏之時若一鳴便泄漏含藏之氣故凶易外師之長子與豫之侯皆在坎中故其初即懼豫四在坎衆隂從之皆行乎險危莫甚焉可以鳴豫為得志乎志窮滿也豫為謙之反正憂其滿謙可鳴而豫不可鳴豫雖志行而不可窮故豫之初即以為戒按初與四所應雖正然四既權要初復不正以豫應之所操者佞悅之術所希者烜赫之勢更無道義以正應之故遂致窮極其豫凶亦甚矣六二介于石不終日貞吉象傳不終日貞吉以中正也虞仲翔曰與四為艮艮為石侯行果曰得位居中柔順正一明豫動之可否辨趨舍之權宜如堅石不可移變應時則改不待終日故曰貞吉程傳當豫之時獨能以中正自守是其節介如石之堅人于豫樂心悅之遂至于耽戀不能已二介如石其去之速不俟終日故貞正而吉本義樂易溺人獨此爻上下皆溺于豫而獨能以中正自守其德安靜而堅確故思慮明審不俟終日而見凡事之幾微朱漢上曰初三不正二介于不正之間確然如石不可轉也三內卦之終二動離為日不終日也離目為見見之是以不俟終日而作中也故見不中正也故見不正項平甫曰凡物之兩間為介介所以分也說文云介分畫也當豫之時五弱四强人莫能分六二辨于去就之分如介于石間斷然易識不待事成故吉馮厚齊曰九四權臣象權所在衆所趨初鳴三盱舉世皆趨四以為說知有五君也哉二者五之應人臣在下者也居中履正知有君臣之分不徇權勢四不可奪而五不得應遂翩然而下不俟終日此孔子不脫冕而行乾之三言終日二之日故有不終日象丘行可曰豫以無所係應為吉初應四而三五比四皆有係者是以為凶悔疾六二隂靜而中正與四無係特立衆隂之中而無遲遲耽戀之意靜則確然自守動則見幾而作吉矣鄭東谷曰惟至晦者能明惟至靜者能動二靜晦自守故動不失幾二之豫先知之豫也趙汴水曰介剛之義石剛之質六二備坤二剛方之德故有介于石之象子曰憂悔吝者存乎介初與四應三與四比二介于初三之間雖與五正應而九四以剛臣在柔君之側故六二介然如石曽不待終日之間已先知四之不當從守正如此吉道也豫與比反比乃剛君故欲羣隂皆比而不比者凶豫有强臣故不取羣隂之宗四而不宗者吉郝京山曰介于石靜而定坤象不俟終日明而决震象錢啓新曰止則石震不能驚動則雷艮不能止易外雷于豫之初未出地而鳴故凶二未出地而介于石之間矣出之速不俟終日故吉二艮之初乃山之根石也介者止之至也止于山介也止于山之石尤介也下卦本坤艮為坤之介故曰介于石艮之起震不崇朝而雷雨作知幾者莫如雷其作也有連日而無終日故曰不終日按二與五不相應與四不相比君門萬里權勢復逺處地之中山之下故有衆醉獨醒之象此考磐在澗以寤歌為樂豫得豫之正者也六二所處上庸主下權臣雖其臣剛正公忠報國歸而佐之可以身名俱泰而猶必堅守如石去之若凂可見權要之地非獨姦佞不可近榮寵之境非獨亂世不可戀也六三盱豫悔遲有悔象傳盱豫有悔位不當也本義盱上視也隂不中正而近于四四為卦主故六三上視于四而下溺于豫宜有悔者也其占為事當速悔若悔之遲必有悔也郭白雲曰睢盱上視而悅之非介于石也遲疑而有待非不終日也朱漢上曰三動成巽巽為多白眼睢盱上視媚佞以求豫吳草廬曰上悔字改悔之悔下悔字悔吝之悔六三之不能自守速宜改悔若改悔之遲則有悔矣胡雲峯曰六三雖柔其位則陽猶有能悔之意溺于豫而悔之遲則又猶豫者也按三處互坎之初幾入于險矣居互艮之下猶能止而不進動而成巽猶豫未决悔遲之象吳本以盱豫為句悔遲有悔為句宜從之與本義亦合九四由豫大有得勿疑朋盍簪象傳由豫大有得志大行也虞仲翔曰據有衆隂坤以衆順故大有得得羣隂也坎為疑故勿疑王輔嗣曰衆隂由之以得其豫大有得也不信于物物亦疑焉勿疑則朋合侯行果曰為剛之主衆隂所宗莫不由之以得其逸體剛心直志不懷疑故得羣物依歸朋類大合若以簪篸之固括也劉長民曰羣隂止滯獨體剛陽居動之始震發羣隂故隂皆由我而豫四雖體陽猶居隂位未離其類故稱朋焉簪者所以固冠而總髮冠之危賴簪以固之猶君位危賴臣以安之石守道曰簪居首君象六十四卦唯豫九四居臣位之極以一陽主五隂更無陽爻以分其權是居盛位大有權以得民也其君得無疑乎必以其民朋附于君此一爻周公當之程傳為動之主動而衆隂悅順為豫之義四大臣之位六五之君順從之以陽剛而任上之事豫之所由也大有得言得大行其志以致天下之豫居大臣之位承柔弱之君而當天下之任危疑之地獨當上之信任而下無同德之助所以疑也唯當盡其至誠勿有疑慮則朋類自當合聚簪聚也簪之名簪取聚髮朱子四以震體之陽為隂主如大臣轉天下之危為安上無為而下佚樂故曰由豫耿希道曰以象言之萬物莫不由雷以豫以爻言之五隂莫不由陽以豫勿疑乃能協衆力以安其上猶簪之總衆髮以安其冠若自疑則衆斯睽矣朱漢上曰疑者衆隂不從五而從已也盍合也坎為髮為通四剛在衆柔之際交而通之猶簪也髮非簪則散亂不理邱行可曰卦五柔爻皆斷一剛爻獨連故以簪為象張紫巖曰姬旦總羣臣以輔成王誠信而已疑心一萌士將去之坎中為勿憂一陽為首為簪衆隂為髮沈守約曰震動也變而為坤順動而豫率土之衆由之而豫上下純坤朋合之象王秋山曰勿疑之道在總合上下之朋以歸于君如簪總合衆髮以歸于上俞石澗曰彖傳剛應而志行蓋謂此也六五貞疾恆不死𧰼傳六五貞疾乘剛也恆不死中未亡也虞仲翔曰坎為疾位在震震為反生程傳人君致危亡之道非一而以豫為多在四不言失正而于五乃見其强逼者四本無失故于四言大臣任天下之事之義于五則言柔弱居尊威權去己之義各據爻以取義也本義當豫之時以柔居尊沈溺于豫又乘九四之剛衆不附而處勢危貞疾之象王童溪曰當逸豫之時恣驕侈之欲宜其死于安樂有餘也然乘九四之剛恃以拂弼于己故得恆不死孟子曰入則無法家拂士出則無敵國外患者國恆亡六五之得九四法家拂士也故雖當豫之時不得縱其所樂恆不死宜也夫中以位言之則五之位以人言之則人之心位號猶存人心未去所以恆不死朱漢上曰恆震巽也六五動則有震巽恆久之象中者人心也中盡亡則滅矣鄭東谷曰二與五皆不言豫二靜晦不為豫也五乘剛不敢豫也四方得位為衆所歸五之欲有所制而不得逞偲偲然視四之制已若正固之疾人得一固疾疾雖不快于己亦足以久其生者有戒心也四以和豫得衆而無害五之心五得四而有戒心是以未亡而常存吕東萊曰觀豫六五之象然後知上無耽樂之君則下無擅權之臣馮厚齊曰貞疾猶痼疾痼固也疾自外入者當豫之時上下耽于逸樂以天下之事天下之才盡付九四大臣而漫不省此貞疾之證然君臣之名位未亡此恆不死之證趙汴水曰疾者豫之反書曰有疾弗豫是也雷西仲曰中猶降衷之衷言六五降衷之性未亡也髙忠憲曰可見中者人之命脉觀彖貞者常也恆亦常也上六冥豫成有渝無咎項氏以冥豫成為句吳草廬本從之象傳冥豫在上何可長也項平甫曰成者極也豫極則昏故曰冥豫成豫反為謙謙則無豫怠之咎上變為晉晉則無冥暗之咎故曰有渝無咎凡言渝者當以變卦觀之沈守約曰柔居衆隂之上無陽剛之應冥豫之象也爻變為離卦變為晉明出地上明乏至也明能燭理知禍福之機有渝之象趙汴水曰在上所以釋冥何可長所以釋渝髙忠憲曰豫上故冥動極故渝雖昏冥之至而渝則無咎故順動之道知其不善速改以從善而已總論按此卦卦義全美而爻多凶咎蓋天下之治以人心和樂熙熙皥皥為極盛卦舉全義故以治言而全美心德之治以戒謹恐懼兢兢業業為進德爻分才位故以德言而多咎樂不可耽逸不可縱生于憂患而死于安樂豈獨為人君戒哉若六二之豫則孔顔曲肱陋巷之樂矣本卦大體象坎坎水內明外暗上處卦外故曰冥又坎月在雷雨之際晦冥之象周易孔義集說卷四
