body:
  text: 周易孔義集說卷十三光祿寺卿沈起元撰下經坎下兌上中爻離巽困亨貞大人吉无咎有言不信彖傳困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也鄭康成曰坎為月離為日兌為暗昧日所入也今上掩日月之明猶君子處亂代為小人所不容故謂之困孔仲達曰困窮厄委頓之名道窮力竭不能自濟故名為困剛見揜于柔猶君子為小人所蔽坎險而兌說君子處險困之世不失暢說之心故亨非小人之事也以剛中者就二五釋貞大人之義剛則正直所以為貞中而不偏所以能大若正而不大未能濟困困濟乃吉而无咎也處困求通在于修徳徒尚口說更致困窮石守道曰困徳之辨言困方辨其徳天降大任于是人必先苦其心志勞其筋骨而後亨本義坎剛為兌柔所揜九二為二陰所揜四五為上六所揜所以為困處險而說身困而道則亨也楊誠齋曰困而亨亨不于身于其心不于其時于其道剛于中者萬險不能隕其正正于己者千憂不能喪其說沈守約曰困矣而首言亨坎在下也物資水而生人資道而成坎藏一一者水之源道之本人物于時雖困而本源未衰以下有水内有道也有本有原雖困而亨坎為通也下坎為心上兌為口維心則亨尚口則窮朱漢上曰四五為三上所揜九二為初三所揜又陷焉陷亦揜也兌為口有言也下无應不信也趙復齋曰不曰險而説者以説處險有致力之義趙汴水曰不失其所句絶无入而不自得何失所之有不撓而折于困不躁而重其困斯為剛中之善王秋山曰无咎之道所以戒九二成卦之主中而不正也有言不信所以戒上六成卦之主柔説于外也吳草廬曰困字象木在中四面不得通達剛為柔揜蔽塞其前後无由通達胡雲峯曰他卦言亨與貞不貞則不亨亨由于貞也此卦言亨與貞處困能亨則得其貞貞由于亨也胡雙湖曰澤涸于上水流于下兩不相得二為坎主上為兌主兩不相應皆困道天地之氣自西而北則順故坎上兌下為節自北而西則逆故兌上坎下則困龍觀復曰所如艮止其所之所不愧不怍泰然不失其常處俞石澗曰困與屯蹇相似而時不同屯蹇外險困則險在内欲動則不容動欲止則不容止唯有說而順受爾錢啟新曰流水在止水之下象其阻抑不通雨露為兌秋所斂象其閼鬱不暢何𤣥子曰所即二五之剛中也謂貞也髙忠憲曰險難中自有悅心者故困而不失其所初六臀困于株木入于幽谷三嵗不覿象傳入于幽谷幽不明也王輔嗣曰最處底下沈滯卑困居无所安陸君陽曰以陰處下臀象坎于木為堅多心株木象水性趨下无所睹見故曰入于幽谷有應在四體性底滯不能自達以至三嵗不覿朱漢上曰初覿四歴三爻三嵗也困九月霜降氣也故曰株木蒺藜秋成也大過十月小雪氣也故曰枯楊姤五月夏至氣也故曰𤓰𤓰生于四月内也夬三月清明氣也故曰莧陸莧陸三月生也鄭合沙曰兌正秋坎正北兌一陰始得秋氣而蔓草未殺故為葛藟六三秋冬之交蔓草葉脫而刺存故為蒺藜初六為大冬之時蔓草霜殺所存者株木三陰故繫以草木之象項平甫曰初在坎下入于幽谷即坎初入于坎窞也趙汴水曰谷亦有陽明者今曰幽晦之極也此不遇而在下者單氏渢曰人行則以趾為下居則以臀為下初六困不能行而在下臀象王秋山曰卦以柔揜剛為困爻則不分剛柔皆以處困為訓俞石澗曰初欲應四而二間之四亦困于金車故云三嵗不覿止云三嵗不終困也梁孟敬曰以陰在下而不正則困而益困自取之爾唐凝菴曰唯陽剛在困能不失其所陰柔不能况初本為險者坎木兌毁株木象髙忠憲曰所以困者以入于幽谷而不明果其明乎又何株木之有九二困于酒食朱紱方來利用享祀征凶无咎象傳困于酒食中有慶也石守道曰既在險中何可以行以其居陽明之徳可以无咎本義困于酒食厭飫苦惱之意朱紱方來上應之也征行則非其時而于義為无咎語錄當困時則困于好事王童溪曰以大人剛中之才而處人臣正中之位安其所遇雖困窮險難何足動心但未能推君之恵澤以足天下之願欲而徒使之飽滿酣適則以是為困也鄭合沙曰坎為赤乾為大赤二五乾坎之爻故坎象赤紱而九五象朱紱齊節初曰兌羊巽雞離雉坎豕皆食也坎又為酒吳草廬曰九二處坎中畫應兌中畫為酒食所困而已以離牛之革蔽于巽股之下紱象龍觀復曰玉藻再命三命皆服赤韍盖命服也然采芑朱芾亦人臣服二云朱五云赤偶變文耳陸績云朱紱赤紱享祀祭祀互言无它義觀彖三陽卦之所謂困也而皆取飲食車服之象者貧賤患難不足以困君子進退牽係道閉行塞乃君子之困也二居下體困之初也故其象為困于酒食而朱紱且方來當此之時辭避不能既受爵祿唯竭其精誠感格于上按此正困而不失其所之象酒食衎衎居易俟命而已夫子釋以中有慶言慶不在境遇之亨而在中心之自得也以朱紱方來為慶者失之惟其征凶所以為困若可逺引則不困矣以剛居中所以无咎无咎有慶彖所為亨也六三困于石據于蒺藜入于其宫不見其妻凶象傳據于蒺藜乘剛也入于其宫不見其妻不祥也程傳陰柔不中正處險極而用剛不善處困之甚者以剛險而上進則二陽在上堅不可犯居九二剛中之上其不安猶藉刺本義石指四蒺藜指二沈守約曰坎而為巽巽為進退為不果在險而進退有難困于石據于蒺藜象項平甫曰六三坎體為夫上六兌體為妻坎為宫王元龜曰介于二剛而上无應不見其妻象吳草廬曰三雖有離目能視而妻在宫外柔與柔不相應夫與妻隔絶不見也齊節初曰九家易坎為蒺藜又為宫九四來徐徐困于金車吝有終象傳來徐徐志在下也雖不當位有與也劉長民曰以澤載水則有功今澤无水有徳无用故曰困于金車吝也有終者以下能潤已下又應已則困有所濟故能保終王童溪曰自外而内曰來巽不果為徐徐沈守約曰兌而為坎澤始通也始出于險流而未快來徐徐象始塞終通初吝有終象趙汴水曰四居上卦將即下以求安徐徐其行不敢輕動猶乘堅剛之車遲重安詳乃能不敗不僨此有祿位君子之處困者吳草廬曰來謂下應初徐徐者以居柔而其行不勇也坎為輪為輿以兌金固其車輪雖堅固而不利轉重滯不速為吝齊節初曰坎為車輪飾以兑金曰金車熊梅邊曰亦困之善者俞石潤曰以九居四雖不當位困六爻唯初與四剛柔相應故特以有與明之按九四所以志在下者盖困之得亨在下之有水澤得水而流故志在下况適為我應乎金車齊氏吳氏説得之乃本爻之象指九二者非卦變重坎有重險之義出亦不易困于金車也究以澤得水而通水性就下上水流接下水為有與為有終此亨困之道在人則隠退遜避之象以應下為欲拯初者亦非也九五劓刖劓刖王肅本作臲􅑶陸績同鄭云當作倪㐳晁氏曰當作倪㐳即臲􅑶之古文也與上六字同吳草廬従之作臲􅑶困于赤紱乃徐有說利用祭祀象傳劓刖志未得也乃徐有說以中直也利用祭祀受福也本義剛中而說體故能遲久而有説張紫巖曰兌巫為祭祀二五徳剛中曰以中直沈守約曰二五皆剛居中正徳同也是以皆利祭享爻變為震震為諸侯赤紱象卦變為解在困而善解者也王伯厚曰困九五曰利用祭祀李公晦謂明雖困于人而幽可感于神愚謂孔子曰知我者其天乎韓子云唯乖于時乃與天通不求人知而求天知處困之道也呉草廬曰臲􅑶髙而不自安之象赤紱常繫于身雖困人而用之以祭祀則為宜故利用祭祀胡雲峯曰二五取象皆相應二曰朱紱五曰赤紱二曰方來五曰乃徐有説二曰享祀五曰祭祀按劓刖之象諸說紛紛俱屬牽强以為刑小人者固於卦義不切以為指二則二之本爻苐云困于酒食何於此爻轉有劓刖之傷以為本爻上下俱傷則上為陰揜似矣下則以剛乘剛非以柔乘剛之比易例未有以為病者况象傳祇云志未得似非受傷之象宜従臲卼為是盖困三陽爻皆朱子所謂困于好事者而二五剛中尤彖辭所謂貞大人吉者故朱紱赤紱皆受祿之象五尤髙位而不得行其志臲􅑶不安故以為困當柔揜之際四面小人進退隔礙惟盡此中直之道以事天奉天不獲罪于天而已所謂利用享祀祭祀者也身困而道亨在此始困而終亨亦在此受福終亨之謂盖爻變為震震動則有出困之機所以為有説為受福也説従兑體而言即彖傳所謂險以説困而不失其所也又困无君臣之象六爻亦惟初四有應二五爻辭亦无求應之象各就本爻所處時位而言亦不必曲説牽纒也上六困于葛藟于臲卼曰動悔有悔征吉象傳困于葛藟未當也動悔有悔吉行也程傳有悔咎前之失也曰自謂也若曰動皆得悔當變前之為有悔也悔而求去可以出因故征吉本義以陰柔處困極物窮則變若能有悔則可以征而吉矣沈守約曰兌而為乾健而説是以能出困朱漢上曰葛藟巽象曰兑口象鄭亨仲曰困有不可動九二也有不可不動上六也項平甫曰此彖所謂尚口乃窮也若能斷葛藟而不牽辭臲卼而不居行而去之吉孰加焉吉在于必行而不在于徒動故曰吉行也徐進齋曰葛藟纒繞之物臲卼危動之狀位髙象震无咎者存乎悔悔可出困胡雲峯曰困窮而通其上之時乎然剛困不害其亨柔困不悔不吉兩悔字與豫不同豫言悔遲則事必有悔此言事雖可悔而能悔則吉梁孟敬曰葛藟柔而居髙者以六在上象吳敬齋曰困非自己致者則當守其剛中之徳道主于貞若由己之柔暗而致者則當變所為以免于困道主于悔按小人之困惟利欲纒繞撥脱不開為甚葛藟之象况居髙自危處毁折附決之位秋風搖落幾無自全之策惟覺其動而有悔故聖人開之以悔而能征則吉可致亦以困極有將亨之機也巽下坎上中爻兌離井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶彖傳巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也孔仲達曰井有常徳邑雖遷移井體无改終日引汲未嘗言損終日泉注未嘗言益汔幾也繘綆也巽木在下又巽為入以木入于水而上水井象井體有常由二五以剛居中也不釋往來二句无喪无得往來井井皆由以剛居中更无他義故不具舉水未及用則井功未成蘇子瞻曰井未有得喪繘井之功羸瓶之凶在汲者爾程傳无喪无得其徳常至者皆得其用往來井井其用周羸毁敗也雖使㡬至而未及用亦與未繘井同水出乃為用未出則何功瓶以上水而致用敗其瓶則不為用矣是以凶本義往者來者皆井其井也語錄井是那掇不動物所以改邑不改井晁以道曰彖主三陽言井洌寒泉食是陽剛居得中正邑可改而井不可改也三井渫不食是水未見于用未有功也二甕敝漏是既不得水并其瓶而亡之羸其瓶而凶也張紫巖曰君子剛中至徳不為天下之動而變其守无喪无得中先定也定者能應隨取而與曰往來井井在困坎之一潛于下澤不上施在井坎之一升于上徳及天下巽為進退為不果互兌互離在中離中虚兑毁折為汔至未繘井羸其瓶朱漢上曰巽為繩繘汲繩郭白雲曰井以静為徳以動為功動而出故能致養于无窮不能動出特止水而已非井之義也井水在下今坎居上而為井者水在下則未用在上則出而有功井字本取井榦之象而井田又取井字之義鄭東谷曰蜀君子謂易有性命二卦余讀井困二卦始悟无水為困此命也君子以致命而井則有水焉此性也君子知澤雖涸而井不涸是以致命而盡性井雖有水若汔至而未繘井及羸其瓶則并非我有矣人雖有性而所習有作輟之異所存有人欲之私則性非我有矣李隆山曰坎水見于諸卦者皆諸水下流之失故多以險喻其在卦而得水之真性者井是也一陽實其中二陰圍其外如陽氣初回于凝陰之中冬水因之而變温此坎之真性天下之水冬温者獨井泉而已盖得之地脉不失其本真在人身則精血是也林黄中曰井者君子之徳井不可改以其剛中也剛中者泉在中也項平甫曰幾至而未至者特未而已猶可勉而至也一羸其瓶无可為矣馮厚齋曰川流之水皆雨之所降若穴地得泉乃天地之英水之元也瓶汲器文従缶瓦器也或謂古无桶故不取巽木象韓信以木罌渡師如樽罍古皆用木疑古以木為瓶従缶則又瓦為之此象巽木无疑趙復齋曰三陰為地三陽為水泉通地中之象六四柔順不阻陽之往來石隙通泉之象丘行可曰改邑不改井井之體无喪无得井之徳往來井井井之用三句言井之事汔至亦未繘井未及于用也羸其瓶失其用也二句言汲井之事徐進齋曰初柔為井眼二三剛為泉實四柔為井中空處五剛為泉實已汲將出井也上柔為井口全井之象胡雙湖曰井以三陽為水陽上至五幾至井口矣而巽繩在下未繘井也互離象瓶兑上爻正當離中而毁折之羸其瓶也梁孟敬曰汔至亦未繘井言未垂綆于井利澤未及于物爾非有凶禍至敗其瓶則非但无功而凶按改邑不改井諸説多以卦變求象不知井乃六畫卦之象六畫卦之名今直以井字作坎字看而以坎水不動為不改殊失之矣初六井泥不食舊井无禽象傳井泥不食下也舊井无禽時舎也王輔嗣曰最在井底上又无應沈滯滓穢故曰井泥不食是乆井不見渫治者也禽所不嚮而况人乎一時所共棄也干令升曰在井下體本土爻故曰泥本義井以陽剛為泉上出為功初六以陰居下故為此象張紫巖曰初以柔順居坎險下盖不能潔白其徳而自抵于廢棄者也鄭東谷曰輕清陽也為泉重濁陰也為泥沈守約曰卦變為需需之初為需于泥井泥象朱漢上曰初在井下互兑口在上不食也離為飛鳥四不應初无禽也馮厚齋曰井雖不改而汲之者少則泥而不可食為廢井矣緣改邑為義趙汴水曰古者鳥獸蟲魚通曰禽禽者蛙螺之𩔖井有生氣而禽生焉井泥則不食雖生物亦无之來矣鮮曰易言禽者皆坎也師六五田有禽以本卦坎也比九五失前禽坎變坤也恒大象坎此卦坎居上卦此二卦下卦皆巽巽深入鳥髙飛故皆曰无禽九二井谷射鮒甕敝漏象傳井谷射鮒无與也虞仲翔曰巽為谷為鮒鮒小鮮也離為甕孔仲達曰鮒謂初也子夏傳云井中蝦䗫呼為鮒魚程傳陽剛之才本可以養人濟物而上无應援故不能上而就下是以无濟用之功不言悔吝者處中非過也不能上由无援非以比初也本義九二剛中有泉之象然上无正應下比初六功不上行沈守約曰巽而為艮艮為山而下入焉谷象巽伏也初陰伏于下鮒象卦變為蹇井道之塞者也朱漢上曰兑為口離為腹器在井中有口有腹且大者甕也二動兑毁見腹坎水下流甕敝漏也胡雲峯曰陽剛之資豈肯甘于下流上无應與以至于此人禀性雖美而无誘掖汲引之者其猶是乎梁孟敬曰井谷井旁之穴井雖有泉而无能汲者其泉但注射于鮒爾所以莫汲者甕敝漏故也二以剛中之才而上无正應不能汲引其象如此非井之恥也不能汲引者之恥也按甕敝漏句諸説皆作井谷之喻梁氏最得其解與象傳無與之義合兩𧰼不宜平㸔九三井渫不食為我心惻可用汲王明並受其福象傳井渫不食行惻也求王明受福也孔仲達曰渫治去穢汚之名井被渫治則清潔可食九三居下之上異初六井泥之時得位而有應于上非射鮒之象但井以上出為功猶在下體未有成功雖渫治未食也蘇子瞻曰正而不中故潔而不食不中非邑居之所會也井未有以不食為惻者凡為我惻者皆行道之人耳行惻明非我之自惻也張紫巖曰巽上巽潔齊為井渫楊誠齋曰井无善汲則如无井君子无明王則如无賢王童溪曰陽為實為明明則无初之泥實則无二之漏其渫固宜可用汲王明並受其福此惻者之詞也王者享任賢之福賢者有福天下之功為並受其福沈守約曰三井水之半半水之井不若滿水之井易知也潛徳之人不若顯徳之人易聞也唯明者乃能知人之未知是以王明而後可求巽變為坎井道通矣猶在坎下人所不見不食象項平甫曰上與之有應故為之心惻上比于五力可以汲故可用汲五在坎中自三至五為離願其為離不願其為坎也故為求王明求王明者將以兼善天下故為並受其福象傳行者皆惻非為私應此以明好賢之公心求王明為上下並受其福此以明慕君之本心朱漢上曰以陽居陽清潔也巽為股入坎水而水清治井之象兑口在上不食象我者九三自謂坎為加憂為心病坎為輪井車汲引之象往來行也故曰行惻五為王離為明陽為福趙復齊曰上六孚五未應三在上者先食也水之上者己汲則中者達而上故汲王秋山曰清潔可食而正應陰柔不能援而出之是不為人所食也來矣鮮曰五非正應故以求字言之不求正應而求王明此時也六四井甃无咎象傳井甃无咎修井也荀慈明曰坎性下降嫌于従三以甃輔五故无咎孔仲達曰案子夏傳云以塼壘井修井之壊為甃六四得位而无應自守而已可以修井崩壊施之于人可以修徳補過蘇子瞻曰陽為動為實陰為静為虗泉者所以為井也井者泉之所寄也故三陽為泉三陰為井甃之于井所以禦惡而潔井也待是而潔故无咎程傳居髙位而得陽剛中正之君但能處正承上不廢其事亦可免咎本義居四雖得其正然陰柔不泉但能修治而无及物之功鄭東谷曰初六最下井之泥上六極乎上井之收六四在井之間而得正井之甃上比于五為五之捍沈守約曰甃而修之先自治也使盈而洌待五之用也盖居坎始變為兑兑為壅為毁折因其壅且毁而修治之井甃象王童溪曰六四陰虚亦敝漏也然下有九三之助故有井甃象郭白雲曰易之言无咎于有疑之爻多言之其不言者或明見其无咎或明知其有咎如井之初六九二雖未至凶皆有咎之爻也九三雖未至吉知其无咎矣六四之才疑于有咎故明言无咎聖人之意或見于有言或見于无言是以人難得之朱漢上曰坎水坤土合而火之甃也有巽工焉自下壘而上至井口甃也古者甃井為瓦裏自下達上項平甫曰甃以禦泥而䕶泉有閑邪存誠之功丘行可曰三在内卦渫井内以致其潔四在外卦甃井外以潔其汚盖不渫則汚者不潔不甃則潔者易汚胡雲峯曰三之渫渫初之泥四之甃甃二之谷其日新之功乎日新不已寒泉之來不窮來矣鮮曰近九五之君修治其井以瀦畜九五之寒泉者也能修治臣職則可因君而成井養之功九五井洌寒泉食象傳寒泉之食中正也子夏傳居于中正為井之主保井之徳養而不窮道之上行人受其施本義洌潔也陽剛中正功及于物張紫巖曰中正美徳厭天下心如渴得飲熱以寒息所及者大楊誠齋曰以甘潔清寒之徳為一井之主天下之人酌而飫之鄭東谷曰井以寒潔為貴道以中正為貴九五之不言吉吉可知也沈守約曰卦變為升井道升而上行也朱漢上曰井五月卦陰氣自下而上井寒矣故九五有寒泉象兑口承之食象郭白雲曰洌言井之修潔主人事言寒言泉自然之性主天理言王童溪曰以中正之徳居中正之位此堯舜禹湯文武之君所以有功于養人也若孔孟有徳而无位此九三之井渫不食萬世之下猶為心惻渫與洌性也食不食命也易山齋曰三五皆泉之潔者三居甃下未汲故不食五出于甃已汲故食鄭亨仲曰坎宫之陽以其在北故寒有陽故洌胡雲峯曰井至此初泥已渫二漏已甃井道全矣所謂井養而不窮者正在此爻上六井收勿幕有孚元吉象傳元吉在上大成也虞仲翔曰幕盖也收謂以轆轤收繘坎為車輪應巽繩為繘王輔嗣曰處井上極水已出井井功大成矣幕猶覆也不擅其有不私其利則往无窮矣程傳取而不蔽其利无窮有孚有常而不變也他卦之終為極為變唯井鼎終乃成功是以吉本義有孚謂出有常而不窮也井以上出為功而坎口不揜故雖非陽剛而其象如此王童溪曰勿幕陰道吝嗇故為之戒沈守約曰應于三而引于五博濟而无不施井道成也巽木也下體之巽則入乎水而上水者也復變為巽井成而設榦之象趙復齋曰上不揜五五之澤施陰虚孚陽故大吉也總論丘行可曰内卦井道之小成外卦井道之大成合六爻觀之陽泉陰井曰射曰渫曰洌泉象曰泥曰甃曰收井象以序言之二始達之泉三已潔之泉五可食之泉也初方掘之井四已修之井上則出汲之井矣又以二爻為一例初二在井下不見于用故初泥二谷三四在井中將見于用故三渫而四甃五上在井上已見于用故五言食而上言収也胡雲峯曰其出有源井之體其應不窮井之用必如此而後為盡性之極功象傳揭上下二字見井之用在上而不在下初井泥為時所棄下也故在上則為修而中正由中正而大成愈上則功愈大離下兌上中爻巽乾張㓜于曰井常道也革者非革常道革其壊常者也後漢書禮儀志引古禮云立秋浚井改水改水即井道之革革已日乃孚元亨利貞悔亡彖傳革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉王輔嗣曰火欲上澤欲下相戰而後生變劉長民曰中女思嫁反居内少女戀家反居外出處之志不同王介甫曰澤火非如坎離有相逮之道惟勝者能革其不勝也蘇子瞻曰水火則有男女之象然後能相生此非水火也二女同居而已二女同居則睽兑欲下而遇離離欲上而遇兑雖欲相違而不能也則不能不相攻攻必有一勝勝者斯革之矣火能革金離革兑者也故曰革火者金之所畏而金非火無以就器用器成而後知火之利也程傳文明以説以卦才言革之道文明則理无不盡事无不察説則人心和順可致大亨而得貞正天下事革之不得其道則反致弊害故革有悔道唯革之至當則新舊之悔皆亡王者之興受命于天故易世謂之革命朱子易言順天應人後來多言應天順人非也張紫巖曰革金火之變也聖人用土之信以濟革火金之時得未土以承火母生金子于是有庚伏之候而嵗功以成聖人應天下之革非信无以服億兆也故曰革而信之鄭合沙曰革有爐鞴象初為爐底二為爐眼三四五是爐腰上是爐口盖以離火鼓鑄兑金従革也革而受之以鼎鼓鑄成鼎也李隆山曰兑之陰潤在上是為澤澤之氣凝結而成秋之肅是為金金得火成器水得火成煖革之者乃利其用也朱漢上曰已日當讀作戊巳之已十干至庚而更更革也離納已故有此象乾始于坎終于離坤始于離終于坎乾終而坤革之地革天也陽極生陰乃為寒坤終而乾革之天革地也陰極生陽乃為暑天地相革寒暑相成項平甫曰彖傳水火相息以水火明澤火之異非以水解澤也水男火女故可以相息水以木生火火以金生木有生息之道焉至澤與火則澤女也火亦女也二女同居无生息之理離火至兑秋為澤所變故謂之革火旺于離遇兑而伏澤已在上火已在下寒當革暑陰當革陽王童溪曰革暗亂而文明革怨懟而和悦二體之用革之六爻皆正故曰大亨以正李蒙齋曰已日者時已窮俗已厭不可不革之時龔泉峯曰坎離一陰一陽故其交則相為用為既濟不交則不相為用為未濟離兑二卦皆陰故其相違則為睽相遇則為革吴草廬曰天有十日甲至戊為前五日已至癸為後五日革于已過中半之後則无輕遽之失而能孚于人下卦離之中爻為革之主爻離象日納已故曰已日胡雲峯曰彖未有言悔亡者唯革言之革易有悔也必革而當當字即是貞字一有不貞則有不信有不通皆不當者也張仲溪曰時未當革聖人不能先時時而當革聖人不敢後時故曰革之時大矣哉蔡子木曰元亨利貞乾道也隨者隨物革者改物物不可以徇心隨故元亨利貞而得无咎物不可以妄心改故元亨利貞而得悔亡錢啟新曰蠱中爻震為甲日巽中爻兑為庚日坎離天地之中戊已日干之中中土之位土中之數戊陽土陽主生坎中一陽為戊日已陰土陰主成離中一陰為已日故已日乃孚何𤣥子曰兑金離火火鼓鑄而金従革以火革金也舊説水滅火火涸水恐非革之作用且以兑作水是冐坎之名也已日即六二之所謂已日乃孚即三四五所謂有孚也春夏為陽盡于離秋冬為陰起于兑此天地革而四時成之象髙忠憲曰六二恰好是已日已日當革之日也正當革之時故革而信之大亨以正而悔亡也天地之四時差一日不得湯武之革命早一日不得華霞峯曰已日乃孚自王輔嗣以來皆謂即日不孚已日乃孚已字讀如以字傳義因之此即所謂愚民可以樂成難與慮始又曰非常之原黎民懼焉戰國君臣輕改先王之舊章往往借此為自便之圖聖人不以訓也聖人之革如四時之代謝天下以為固然湯革夏南征北怨東征西怨武革商其君子迎君子其小人迎小人此之謂孚此之謂已日乃孚易外已坤也離之中是也二為離中二以離火革兑金實以已土革離火也土在離為中央之土王者得中央土徳以革乎金火用徳而不用威用生而不用殺改夏為秋慮其過于肅殺故以土徳解之火伏于已而金乃革革去故也火為故金以去之金革乎火也火革金成則鼎之位正而命凝按夫子彖傳天地革而四時成大象傳治厯明時是此卦之象非水火相息之謂也如以澤即是水則水火亦可名革何名既濟盖此卦以天道則夏秋之代禪以人事則湯武之革命冬春夏令相代以生唯夏秋相代以剋堯舜之禪春夏也湯武征誅夏秋也金火之際天地之大闗鍵也故知化育之聖人必以土濟之干支卦位皆是道也革兑上離下象則火之爍金序則金之代火火爍金而金无以代火文王于彖辭用已日二字義極精妙非周公窺得微㫖于二爻用之以顯其㫖後人更无従推測也故已日二字實兼數義今融諸説而通之用已土以濟金火化剋為生革之用也此已也四時之序成功者退已則過中火敗于酉金當進而火當退革之時也此已也土主信彰信兆民萬邦作孚革之體也此已也天道如此人事如此或疑易無兑為金之明文以之説易似屬附會考説卦云兑正秋也金者秋令兑之為金不必更求明文况洪範金曰從革與此卦革義恰符故澤水之革自不當以水為澤而當以秋金為兑澤庶於名卦之義為切也初九鞏用黄牛之革象傳鞏用黄牛不可以有為也干令升曰雜為牝牛離爻本坤黄牛象王介甫曰初九剛大而文明其材可以有為在下无應用中順固其志而已吕藍田曰居下无位比于六二上无正應雖有剛徳不敢自任惟固結六二以自固二居中柔順故曰黄牛以其堅固故曰革程傳以時則初以位則下以才則離性上而剛體健皆速于動者有為則凶咎至矣黃中色牛順物以中順之道自固則何吉凶之有本義革亦取卦名而義不同張紫巖曰以中順自固此周文王心趙復齋曰革之功在二陰黃牛者六二己未可革静以待人項平甫曰中順言于初九初九用六二之徳也故曰鞏外束内也沈守約曰變為艮外剛而止鞏用黄牛象王秋山曰謂六二以順處中為成卦之主任革之事初陽位下革非其任惟宜鞏固自守奉承六二之革而用之不可自有所為俞石澗曰皮去毛而熟之為柔皮革之革亦取變義六二已日乃革之征吉无咎象傳已日革之行有嘉也程傳六二柔順中正又文明之主上有剛陽之君同徳相應中正則无偏蔽文明則盡事理應上則得權勢體順則无違悖時可位得才足處革之至善也不進則失可為之時為有咎張紫巖曰桀紂之惡著伊尹太公不得已而與商周商周之革二臣之力也二離中有文明徳能上應九五敷大信于天下離于是為亨曰行有嘉沈守約曰爻變為乾明而健卦變為夬剛決柔也熊梅邊曰六二内卦之主故卦辭之已日見于此何𤣥子曰行有嘉即征吉之謂言嘉者二與五應也按此爻為離中之陰已也陰土也故曰已日九三征凶貞厲革言三就有孚象傳革言三就又何之矣子夏傳自初至三令已行矣民已信矣又何之乎孔仲達曰九三陽爻剛壯又居火極火性炎上處革之時征之非道正之危也上之三爻皆従革者也既革言三就有孚従革已矣而猶征之則凶所以征凶而貞厲吕藍田曰自初至三徧行三爻革之有漸革道以成故曰革言三就郭白雲曰九五六二為革之主三不中用剛非革之主革有天道非九二炎上之性可自任之時也沈守約曰以至明革至昏正也而三以剛躁革之正之危也下三爻革物者上三爻従革者離而為震炎極而動往則有凶也離為言爻處其三革言三就象卦變為隨革而信之衆説而隨孚象王童溪曰居下體之終革道之小成又過用其剛革之所戒以革道言自初至三已三就矣有孚謂亦已著信于人矣豈可復有所往歟故象又申之曰又何之矣馮縉雲曰下卦之終火進遇澤故征凶張紫巖曰湯武之師弔民而止革道既成過中則殘武不可凟也自三以往有互乾體曰有孚如犬在上孰不信也蔡進齋曰初未可革二則革之三則有孚故曰革言三就王秋山曰革之道革而當則止二以中正順人心而革革已當矣至三不可以復革吳草廬曰之往也即征義按此爻象義乃倒裝之法得夫子傳乃明九四悔亡有孚改命吉象傳改命之吉信志也虞仲翔曰將革而謀謂之言革而行之謂之命陸君陽曰革而當故悔亡劉長民曰成革之體在斯一爻故下三爻皆以革字著于爻辭至于四則惟曰改命吉也程傳離下體而進上體革之時也居水火之際革之勢也得近君之位革之任也下无係應革之志也以九居四剛柔相濟革之用也事之可悔而後革之革而當悔亡也朱子乾卦到九四言乾道乃革是到這處方變耿希道曰當水火交㑹之際五行代王至此可以改制離火兑金正夏秋之交張紫巖曰居互乾中其革當天下信之以我明徳易彼昏政曰改命吉互體巽居澤火之際曰改命項平甫曰九四時已革而成悦矣革之而民悦則革之湯武是也易山齋曰改命即革命之義改命于有孚之後上下皆信其志沈守約曰爻變為坎坎為衆為信為聴衆信而聴従有孚象互巽巽為申命為行權改命象卦變既濟水火相革革而濟也丘行可曰改則進子革矣五上言變變者革之成趙汴水曰命上承九五之命也人不従其令而従其好不信其命而信其志湯武之革不志于弔民則疑其无君九四之有孚非信其改命之蹟而信其改命之志也王秋山曰二大臣也任革之事四近臣也任革之謀以陽剛之才居近君之位盡離明之見而居兑説之體彖所謂文明以説者也故能悔亡而上下信之胡雲峯曰下三爻方欲革故為新故有不輕改之意上三爻則故者已革而為新矣故不言革而直言改命至鼎則曰凝命改而後可凝也夏改為秋之時乎自三至五皆言有孚三議革而後孚四有孚而後改深淺之序五未占而有孚積孚之素也熊梅邊曰九四改命順天應人之事九五虎變上六豹變聖人神化之妙歟革道至此極矣何𤣥子曰九四革之盛也故以彖悔亡歸之信志即彖傳革而信之之信孟子言湯非富天下天下信之即信志之義九五大人虎變未占有孚象傳大人虎變其文炳也孔仲達曰居尊處中為革之主損益前王創制立法有文章之美炳然可觀有似虎變其文彪炳是湯武革命順天應人不勞占決信徳自著劉長民曰五為革命之主是威武宣而文徳著也三以革言三就命令己申四以改命信志物盡従化至五則大亨以正不假占而有孚也張子虎變文章大故明豹變文章小故蔚本義虎大人象變謂希革而毛毨也在大人則自新新民之極順天應人之時也九五以陽剛中正為革之主故有此象語錄大人虎變正如孟子所謂所過者化所存者神上下與天地同流豈曰小補之哉張紫巖曰兑西方為虎兑互離龜為占沈守約曰兑見也其體文柔變而為震其動剛武悦澤見于外而剛武動其威虎變象卦變為豐豐日中也大明中天豐盈盛大萬目咸睹不待占而信也馮厚齋曰此湯武革命即位之象虎言其威武變言其為大君也雷西仲曰占以決疑不疑何占大人之革天下莫不信之何待占而後孚哉虎義獸也文章煥炳而有不怒之威龔泉峯曰革以孚信為主故彖與三四皆以孚為言至五之未占有孚則不言而信无為而成无以復加矣胡雲峯曰仲夏毛希而革易仲秋毛落更生潤澤鮮好卦體離夏革為兑秋故有此象易外陰金之精為虎陽木之精為龍既革命而為九五大人雖純乾而不言龍飛以此時龍已入潜虎方得位又以征誅而有天下所主在威變者兑之澤也虎豹皆文章之獸而有霧露之澤其文可悦故有孚卦互巽風従虎巽之風従順天應人之象上六君子豹變小人革面征凶居貞吉象傳君子豹變其文蔚也小人革面順以従君也李氏鼎祚曰兑為口乾為首今口在首上面之象劉長民曰初至三革道已成四至上則變道已成三則貞厲上則居貞吉征則皆凶也本義革道已成君子如豹之變小人亦革面以聴従矣不可以往而居正則吉變革之事非得已不可以過朱漢上曰陸績云兑之陽爻稱虎陰爻稱豹虎大豹小考之天文尾為虎火也箕為豹水也同位于寅虎豹同象而異爻也離二文之中故二交五其文炳明離三文已過故三交上其文蔚茂繁縟君子豹變也乾為首兌為說乾首而説見于外小人革面也革面内嚮順従其上非謂面従也旋其面目也命定當復其常故征凶柔戒于不守故曰居貞吉郭白雲曰君子小人皆従九五大人而革者也馮縉雲曰當革卦而取皮革之義易之所以為通也牛革取其固虎豹之革取其文王童溪曰革道大成君子離隠之顯見于有道之世功業著見小人去虐歸仁中悦而誠服天下之弊始患于不能革故六二曰征吉弊已革又患乎不能守故九三上六俱征凶然于三曰貞厲防其剛過上曰居貞吉以陰静終也項平甫曰上六革之效君子小人以臣民言之也面向也古者面皆謂向胡雲峯曰君子小人位則有上下徳則有正邪今既无不革矣豈可復有所往哉巽下離上中爻乾兌鼎元吉亨程子朱子云吉羡文彖傳鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鄭康成曰鼎有木火之用雜撰乾兌乾金兑澤澤鍾金而含水爨以木火鼎烹熟以養人象程傳凡離在上者皆云柔進而上行柔在下之物乃居尊位進而上行也得中應剛能用陽剛之道也本義鼎烹飪之器為卦一陰為足二三四陽為腹五陰為耳上陽為鉉有鼎象又以巽木入離火而致烹飪鼎之用也故其卦為鼎下巽巽也上離為目而五為耳有内巽順而外聰明之象享帝貴誠用犢而已養賢則饔飱牢醴當極其盛故曰大烹郭白雲曰易以器物名卦者井鼎二卦而已道器一也由道可見器由器可推道也朱漢上曰聖人卑巽下人兼天下之耳以為聴故其耳聰兼天下之目以為視故其目明柔履尊位則无亢滿之累得中則无過與不及之咎應剛則君臣道合萬物各得其養是以元亨王童溪曰鼎取新也易也者日用而日新之道也故有取于鼎項平甫曰巽入乎下鼎之足腹聰明于上鼎之耳鉉此象其形柔進上行即水氣之上蒸柔得中應剛即火氣之下得此象其用大烹非尊大之也大猶廣也多也天下聖賢非一人不廣且多不足以養之蔡節齋曰烹飪鼎之用不過祭祀賓客二事祭无出于上帝賓客无過于聖賢易山齋曰易之諸卦皆言象取諸物以名卦者鼎與井而已井以木巽水鼎以木巽火二卦以養人為義故皆以實象明之趙汴水曰巽以為主然後能成離明之徳單氏渢曰巽以養下達聰明目者也得中而應剛能養聖賢者也胡雲峯曰人需飲食飲食需井鼎革茹毛為火食庖羲有取于鼎也尚矣大有與鼎直言元亨文王之意謂大有六五虚中在上而能有衆陽之大所以大亨鼎變生而熟化剛而柔水火不同處而能使相為用可以養人亨亦大矣龔泉峯曰易以井言徳性以鼎言才器徳性在己故窮不損達不加猶井之无喪无得也才器有小大在人之所施猶鼎有大小各隨其量而有所受也張中溪曰上體離也離為目而兼耳言之者以六五為鼎耳而取也觀彖鼎義與井相似然井在邑里間所養者民鼎為朝廷貴器所養者賢易義至于尚賢則吉无以加初六鼎顛趾利出否得妾以其子无咎象傳鼎顛趾未悖也利出否以從貴也荀慈明曰以隂従陽故未悖也陸君陽曰趾當承鼎顛而覆之悖也于是出其惡故雖覆未悖猶妾不當貴以其子故得貴焉張子柔牽于上必有義乃可鼎顛趾必出否妾従貴必以有子乃不悖于義本義居鼎下趾象上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉顛而出之則為利矣得妾而因得其子亦由是也盖因敗為功因賤致貴也従貴謂應四亦為取新之義沈存中曰古鼎有三足皆空所以容物者所謂鬲也煎和之法常欲清在體上及升鼎則濁滓皆歸足中鼎初顛趾出否謂濁否在下先須㵼而虗之王童溪曰妾非正者也猶鼎之顛也然而有子則不正之咎可无有可貴者在也林黃中曰鼎以足竒耳偶而成器以初為趾則初畫耦而欠一趾趾欠則下以上為顛上以下為折鄭東谷曰鼎重寳不可顛也然定命之始未免猶有所革而取新故詳其義于初必顛趾者乃出否也否出則美實可全凡取新之義必舍惡而取善舍賤而取貴期合于義朱漢上曰初不正否象應四得正未悖也趙復齋曰初四相應均于覆鼎初以賤従貴故為出否四以貴従賤故為覆餗又初无實四有實故也妾以賤従貴者也然得主非貴有子乃貴以有子為得妾也徐進齋曰妾初也子四也柔巽處卑妾象従剛應四以其子也吳草廬曰初鼎趾象上鼎象初上應四則趾向上四下應初則口向下九四陽在上而不中正妾子象初上應四如妾因子貴而得上達俞石澗曰烹飪之初不去其宿穢則為新物之害初六陰柔不中正如小人内懐不善因經顛覆之禍乃去其不善以従善是亦利也在鼎之初有子以主器又何咎焉九二鼎有實我仇有疾不我能即吉仇音求象傳鼎有實慎所之也我仇有疾終无尤也王輔嗣曰以陽之實居鼎之中有實者也程傳與初宻比隂従陽者也仇對謂初也鼎之有實猶人有才業當慎所趨二不暱于初而従五之正應乃是慎所之也徐進齋曰怨耦曰仇不善之匹也陰陽相匹而非正是初為我仇也即就也初自顛趾不能就二不我能即也故吉何𤣥子曰疾陰柔之疾乃初爻所謂否也初向病舊穢未除業已倒趾而傾出之徐乃實物于其中和五味羞百珍何初之疾能即我哉盖承初爻出否之後舉成事而言也吉孰加焉初既出否而後可置實于鼎中此慎所往之道慎于初也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象傳鼎耳革失其義也蘇子瞻曰上九離極火之所炎耳受炎足以廢塞其行程傳鼎耳六五也三以陽居巽上剛而能巽其才足以濟務然與五非應不得於君者也道何由行本義以陽居鼎腹中本有美實然以過剛失中越五應上又居下之極為變革之時故為鼎耳方革而不可舉移雖承上卦文明之腴有雉膏之美而不得為人之食張紫巖曰乾金離火乘之為革反兑為不食忠嘉之徳未獲信用于上曰雉膏不食朱漢上曰離為雉兑澤為膏雉膏食之美者兑口在上不食也郭白雲曰凡物之行以足獨鼎以耳耳革則行塞胡雙湖曰三動為坎雨隂陽和洽而失其悔終吉之占也兑為澤亦有雨象胡雲峯曰井鼎九三皆居下未為時用井三清潔之泉而不見食鼎三鼎有雉膏而不能以為人食然君子能為可食不能使人必食何𤣥子曰此人臣過于激烈以自塞者也三以剛居剛承乘皆陽故有此𧰼三變為坎則有水火均調之意然後炎勢息鼎沸平故終吉來矣鮮曰三居木之極上應火之極木火既極則鼎中騰沸並耳亦熾熱革變而不可舉移故其行塞耳革不食唯救之以水方雨則能虧損其騰沸熾熱之勢而悔者不至于悔義宜也烹飪之水火不可過不可不及方得烹飪之宜今太過失其宜矣合訂三當風火之交風嘘火烈鼎中沸騰耳亦熾熱鼎之用變腥為熟火過則不止物變而鼎腹鼎趾以至鼎耳其色皆變矣按鼎耳自指五言革則言其以風應火所致也方雨言本爻之動也動則成坎故終吉九四鼎折足覆公餗其形渥凶象傳覆公餗信如何也王輔嗣曰渥沾濡之貌既覆公餗體為沾濡知小謀大不堪其任受其至辱災及其身胡安定曰鼎之實必有齊量君子雖有才徳亦有分量若職事過其才分則有隳官之謗蘇子瞻曰鼎之量極于四其上則耳矣受實必有餘量以為溢地溢則覆矣程傳大臣之位當求天下賢智與之協力四下應初隂柔小人不勝任而敗事鼎折足也餗鼎實也形渥謂赧汗也張紫巖曰離雉為餗互兑兑毁為覆餗沈守約曰離而為艮火焚山敗其質也卦變為蠱風落山隕其實也折足覆餗象朱漢上曰兑為澤乾為面巽為股澤流被面沾濡其體其形渥也林黃中曰四應初初欠一足折其足矣初未有實故出否四實已盈故覆餗易山齋曰四亦鼎腹有實在二陽之上已過于溢而又以陽剛之才下應于初初趾已顛故有折足𧰼覆公餗四近君為公之𧰼張中溪曰顛則舍舊而圖新折則鼎毁而用廢錢融堂曰四近君不中不正下亦以不中不正應之民心乖離傾敗天祿顛危宗社此欺君罔上之驗王秋山曰𧰼傳言委任不當果何如也欲人詳玩以為戒六五鼎黃耳金鉉利貞象傳鼎黃耳中以為實也陸公紀曰得中承陽故曰中以為實王童溪曰在鼎之上受鉉以舉鼎者耳也六五也在鼎之外貫耳以舉鼎者鉉也上九也謂以虚而受實體柔而納剛以六五之虚中而資上九剛實之助此黃耳之得金鉉也以是為正非所利歟人君欲受人之實為己之實非有中虗之徳不可故傳曰中以為實沈守約曰離之中爻對峙于上黃耳象馮厚齋曰黃坤土中色離之五再索于坤而在上卦之中曰黃耳王秋山曰主鼎者在耳耳不虗中鼎雖有鉉而无所措耳而无鉉則鼎雖有實而无所施故六五虗中以納上九之助而後一鼎之實得以利及天下吴草廬曰黃耳中虗故能受鉉以為實胡雲峯曰鉉在上可以舉鼎二剛在下可謂金不可謂鉉利貞五質陰柔故為之戒龔泉峯曰金鉉指上九言非九二也鉉之用雖出鼎上而實貫乎耳中六五鼎耳也故兼鉉言之上九鼎玉鉉大吉无不利象傳玉鉉在上剛柔節也石守道曰玉言火炎而不變其性也程傳井與鼎以上出為用處終鼎功之成在上鉉𧰼剛而温者玉九陽居隂不極剛而能温者也易山齋曰鼎與井其用在五而其功皆在上所以全養人之利項平甫曰金鉉實用之物玉鉉為文而已上九鼎實已成无所復治故曰玉鉉在上明設而不用也飾以寳玉陳之廟廷而已上九居離之極當文盛之時如治定功成但當制禮樂以文太平所以大吉无不利烹飪之事以剛柔得節為功水火之齊即節也李西溪曰玉和物也鼎道貴和得玉鉉則陰陽和而鼎之功成丘行可曰五與上之鉉而有金玉之異五以柔中受上之剛故取金上爻剛位柔剛柔有節故取玉周易孔義集説卷十三
