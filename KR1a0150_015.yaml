body:
  text: 周易孔義集說卷十五光祿寺卿沈起元撰下經離下震上中爻巽兑豐亨王假之勿憂宜日中彖傳豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虗與時消息而况于人乎况于鬼神乎孔仲達曰動而不明未能光大資明以動乃能致豐故曰明以動故豐程傳豐為盛大其義自亨明動相資而成豐大也王者有四海之廣兆民之衆極天下之大故唯王者能致之所有既大其保之治之之道亦當大也故尚大張子宜日中不宜過中本義盛極當衰有憂道焉聖人以為徒憂無益但能守常不至于過盛則可矣故戒以勿憂宜日中日中則昃又發明卦辭外意言不可過中也郭白雲曰日過中則昃豐過盛則憂一道也宜如日之方中用中道以持滿則可無憂日未中則不及既中則過惟日中無偏照朱漢上曰離日震動日動于下升于東方萬物咸睹宜照天下也王童溪曰何謂所尚之大明以動是也非明無以照非動無以行所以致是豐者此道能盡此道者惟王致豐之王者六五也六五以柔尊居震體有震懼驚憂之象故戒之以勿憂離日在下日未中之象未中則照有所不周故勉之以宜日中然致豐易保豐難故聖人于此又因日中之一辭而别演其義項平甫曰有大則患失其大無疆惟休亦無疆惟恤此古今之至情也聖人曰是不必憂昭吾明德如日之中照臨下土豈有隂慝敢干然日月有昃食之虞天地有盈虗之變人不免于死生鬼神不免于聚散則豐豈吾所能常有又豈憂慮之所能如何哉此聖人極言勿憂之理因以足日中之義使知中者人之所當勉而昃亦非人之所能為也豐卦皆以明為主故下三爻皆明而無咎上三爻皆暗以求明為吉不能求為凶此所以宜日中也沈守約曰豐六月卦雷奮而亨火盛而熾之時雷電交作雲行雨施百穀皆豐故為豐帝出乎震相見乎離人君向明而治以成豐亨盛大之治人主之象非人臣之所當是以王假之尚大也而爻以幽暗不明為象者蓋以體言之雷動于上電照于下風雨晦冥之時也以爻言之初九之陽二隂乘之三四之陽五上重隂覆之隂掩陽之象以理言之時豐盛則芽蘖生焉是以戒其過毛伯玉曰豐大也亦盈也惟有道者明德若不足未嘗中故不昃未嘗盈故不食日新則為大反是則為盈知日中之宜則知日昃之可戒胡雲峯曰日在下雷在上是正晝昏暗雷電大作之時故不取日象而彖曰宜日中宜照天下豐似明夷盈虗消息惟剝與豐言之剝則君子之道已消而虗故有息之機豐則天下之勢已息而盈故有消之機天地鬼神乾卦後惟謙與豐言之謙則有虛可以持盈豐則自盈必至于虗何𤣥子曰豐有憂道焉而曰勿憂蓋于此有道焉致豐之本即保豐之道離明主之而震動將之也按王假之程傳與彖傳文義合宜日中句彖辭意因未中而曰宜孔傳慮其昃以常保其中為宜各有攸取也月盈則食食虧也非月食日食之食初九遇其配主雖旬無咎往有尚象傳雖旬無咎過旬災也孔仲達曰豐者文明以動尚乎光大者也初配在四以陽適陽以明之動能相光大蘇子瞻曰凡人智生于憂患而愚生于安佚豐之患常在于暗故爻皆以明暗為吉凶初二三皆離而有明德者四五上則豐而暗者離火也日也以下升上其性也以明發暗其德也故三離皆上適于震初九適四其配也劉長民曰旬數之極猶日之中無咎者謂初未至中猶可進也若進而過中則災故云過旬災也爻辭不言豐者謂初未至豐往有尚言其進至于豐也程傳明動相須猶形影相資如表裏初九明之初九四動之初位則相應用則相資故初謂四為配主配雖匹稱然就之者也如配天以配君子往而相從則能成其豐吕藍田曰十日謂之旬旬盈數兩陽合而成大雖盈無咎過盈則溢項平甫曰初以四為配四以初為夷上下異辭也自下並上曰配錢啓新曰一月三旬初二象上旬十日旬亦盈數故言雖以示不可過之意豐初乃日升月恆之時上弦至望不滿旬日日僅有半日之升餘皆昃時月不滿旬日之恆餘皆食時豐而過旬無不是災日世上福只享三分便已當虞其過六二豐其蔀日中見斗往得疑疾有孚發若吉象傳有孚發若信以發志也程傳明動相資乃能成豐二為明主又得中正而五居應地隂柔不正非能動者獨明不能成豐則喪其明而為昏暗有孚發若謂以己之孚信感發上之心志也郭白雲曰天下之理明則無疑暗則疑六二用明投暗往得疑疾乃其宜也朱漢上曰震巽為草二在草中有周匝掩蔽之意巽為不果六五隂失位疾也張紫巖曰震蒼筤竹萑葦為蔀離中虗為孚為信王童溪曰無應而不動有明而無用故體柔居隂以自蔽晦豐其蔀象蔀草莽隂蔽之地當明盛之時應六五昏暗之君故曰日中見斗斗居中而主運平六五象王秋山曰六爻唯初九應震之初六五應離之中故明餘則當雷收電息之時故暗二虗中故有孚五亦虗中故可發此六二之吉也胡雙湖曰離外有互兑為澤有浴咸池象前有震木有拂若木象皆非中天之日乃出東方之日也日中皆離象目亦取離目斗皆取五錢啓新曰二與三四成巽巽為隂木為髙為長所大者不過如蔀草之蓊蘙然豐其蔀象來矣鮮曰􅫟蔀草名何𤣥子曰斗為帝車運乎天中五以柔暗居尊二仰承之為日中見斗按諸爻日中猶言晝日也非中天之中電閃則雷擊雷迅則電赫二者本相應卦義在明以動貴用離明以發震志而二居臣位上雖暗君而屬震體猶有可發之志如電閃則雷自奮非若明夷之暗晦故彖傳獨釋有孚句以明其吉正與六五之來章相應若非語辭謂五也能發若則始雖有疑而終必相孚在積其明誠而已明夷之六二猶以用拯馬壯為吉况在豐時猶明盛之世耶于此可識臣道九三豐其沛日中見沫折其右肱無咎象傳豐其沛不可大事也折其右肱終不可用也程傳三居明體之上陽剛得正應上隂柔震終則止不能動者也無上之應不能成豐沫星之微小見沫暗之甚也右肱人所用賢才無可賴之主如折其右肱吕藍田曰以陽居陽其明宜廣而應于上六一陰蔽之油然作雲沛然下雨日中盛明不免障蔽朱漢上曰上六暗極不可用之以有為從之必罹其咎故自折其右肱示終不可用則無咎張紫巖曰微子去箕子為之奴折右肱義也王童溪曰沫作昧斗後小星五有斗象上居五後則沫居斗後也三有才而上無足賴則豐大之功何恃而可成右肱既折勝大事者無其具矣沈守約曰三之互體兑也兑為澤豐其沛象何𤣥子曰右肱謂九三變柔互艮為肱兑為毁折陽爻為右華霞峯曰日以出震為用明以善動為用上柔掩三故豐沛見沫三失其動故折其右肱皆上之為于九三無咎也按三變為互坎大雨之象故曰豐其沛三之所應窮大失居彼在天際不接于下豈復可用折右肱明者之自晦也九四豐其蔀日中見斗遇其夷主吉象傳豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也孔仲達曰以陽居隂暗同六二夷平也四應在初同是陽爻能相顯發而得其吉四與初交相為主者賓主之義陸君陽曰初云配主恭也四云夷主謙也程傳四為動主然以不中正遇隂暗之主豈能致豐居大臣之位而得在下之賢同德相輔其助豈小故吉夷等夷也張子近比于五故亦云見斗正應亦陽故云夷主郭白雲曰初與四迭稱主者明動相須莫適為主惟明者知求動以為主動者知求明以為主朱漢上曰處不當位自蔽其光明故曰幽不明九四不正其不明自取之異于二三項平甫曰二四爻辭同用蔀斗而其意不同故曰位不當言以九居四不得比六二之當位曰幽不明言九四之幽暗不得比六二之自明曰行也言九四之當行不得比六二之不往二中正而明四不中正而又不明也沈守約曰卦變明夷晦其明也豐蔀見斗象動以順以吉行象胡雲峯曰二應五四承五故象同俞石澗曰豐不為明夷者賴有九四爾按四震主何以幽不明蓋互巽不果互兌為澤雷藏澤中幾於震之遂泥雷止則電息故幽然動體故在象傳以行也明之言雷動則電自應之幽者明矣故吉由遇其夷主如得夜行之燭兩陽非應故皆曰遇六五來章有慶譽吉象傳六五之吉有慶也程傳二有文明中正之德大賢之在下者五與二雖非隂陽正應在明動相資之時有相為用之義五若能來章則有慶譽而吉楊誠齊曰六五隂爻而雷質雖柔而實剛君雷而佐電雖暗而亦明郭白雲曰豐以無所豐為大是以六爻之中稱豐者皆無善道而六五不言豐獨為可尚馮縉雲曰六二言往六五言來往來交合章明之象王童溪曰五之所處者中也中則無自豐自亢之失所以有來章之吉張紫巖曰二五處雷電中位二以離中而麗于陽為章五下二羣陽畢應之曰來章兑為譽五處震中柔而有斷是以能來天下賢王秋山曰以下卦而視六五有日中隂蔽之象以六五而視下卦有離明返照之象五又柔順得中謙虛待下故能來章豈惟有譽其福慶將及于天下錢啓新曰五日中之位五為假之于上尚四之動以為動尚二之明以為明明動合而章皆五中天之章華霞峯曰五天位天之明原以日之明為明離日麗天則障蔽悉除而光天有慶矣按此爻柔順居中與二同德爻辭故自言其象之吉不復泥于見斗之辭而以為暗君也上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶象傳豐其屋天際翔也窺其户閴其無人自藏也石守道曰子雲云炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱髙明之家鬼瞰其室正合此義程傳以隂柔之質居豐極動終其滿假躁動甚矣豐其屋處太髙也蔀其家居不明也髙亢昏暗自絶于人人誰與之張子豐屋蔀家自蔽之甚窮大而失居者也處上之極不交于下而居動之末天際翔也朱漢上曰震巽為草周匝掩蔽蔀其家也自處髙大如飛鳥務上翔于天際上動成離離為飛鳥在外卦之際天際也九三正應自下往窺之三離目為見坤户闔而不應閴寂乎其無人三自四歷三爻三嵗不覿也張紫巖曰豐其屋以聚斂裒積為事自盈也蔀其家家道不明也閴其無人天下離心也王童溪曰以六居上愚自用也在上曰屋豐其屋翔于天際在下曰家蔀其家掩蔽其內謂之自藏非人之逺已乃已之逺人此九三所以甘心于折肱也項平甫曰外極其大而內極其暗熊梅邊曰此日中則昃盛極必衰理勢所然胡雲峯曰卦辭曰宜日中二下卦之中日中之象五上卦之中日中之位初與四未及乎中三與上已過乎中上又處豐之極胡雙湖曰上有震巽木屋象初至四互家人家象震初畫户象無人本爻隂虗也髙忠憲曰柔暗自髙上翔而不下應故失三之明而取凶吳氏桂森曰豐大也人生名譽要大事業要大家計要大不知盡是蔽明之物所以都做了豐蔀豐沛豐屋遮天黑地若得本心之明一出頭便大明中天一切障蔽立時消化如何纍得明象傳自藏也自有而自蔽之也總論按此卦命名則以雷電交作其勢盛大萬物咸亨而取故大象不言日而言電而卦辭爻辭取象取意則皆因日在雷下也日在雷下雷必有雲日在震下東方乍起故其明必貴於動日必願其中不動則日無由中日貴麗天而在雷下此所以可憂也此初二之貴于往貴于發也震者震隂而達陽者也上有重隂賴一陽震之而始開而雷之動必賴火之力火之力弱則雷不能奮即震之二隂不能開無以為雷而適足以掩日之明有晝晦見星之象此所以明貴於動而雷復藉乎火也六五天位而隂得九四之陽震於下而離日之明乃得麗於天來章日之來也九四遇其夷主之功也豐蔀豐沛即雷雨之動滿盈草昧之象非謂蔀沛之能蔽日也秦樹峯云豐蔀豐沛當與下句斷不必與下見斗見沫牽合可謂得㫖至上爻為卦終卦外日光之照沈于下雷聲之震息于上但隂雲晦蔽而已故象不言日而祗以豐極自高取象艮下離上中爻巽兑旅小亨旅貞吉彖傳旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉孔仲達曰此就六五及二體釋亨貞之義柔處于外弱而為客之象處外而得中順陽則是得其所託而順從其主又止而麗明動不履妄故能于寄旅之時得通而正不失所安本義山止于下火炎于上為去其所止而不處之象六五得中于外而順乎上下之二陽艮止而離麗于明故其占可以小亨而能守其旅之正則吉旅非常居若可苟者然道無不在故自有其正不可須臾離王童溪曰旅者失位之時君子得位則亨在天下失位則亨在一身故曰小亨用剛非旅道也莫尚乎用柔然柔不可過也莫尚乎得中項平甫曰旅小亨就旅之卦才言之旅貞吉乃處旅之道以柔行順小亨也知止則自處者正麗乎明則所依者正必如是而後吉張紫巖曰離一變為旅旅明德之失也德失而後有旅互巽為順楊誠齊曰山止而不動猶館舍也火動而不止猶行人也蔡節齊曰柔得中乎外而順乎剛與剛中而應者不侔止而麗乎明與動而明明以動者不侔故止可小亨梁孟敬曰凡客于外者皆謂之旅如天子蒙塵諸侯寄寓大夫去國聖賢周游皆是俞石澗曰旅之時最難處旅之義不可不知其亨雖小時義則大來矣鮮曰明者已之明非人之明也止而麗乎明只是內止外明錢啓新曰或以旅興或以旅喪所關甚大華霞峯曰旅不宜剛以柔得中而亨以順剛而亨以止麗明而亨皆柔小之亨故曰小亨貞吉不外乎此觀彖凡物之寄于物而不居者莫如火山上之火則尤寄而不居旅之象初六旅瑣瑣斯其所取災象傳旅瑣瑣志窮災也陸公紀曰瑣瑣小也艮為小石故曰旅瑣瑣履非其正應離之始艮為山以應火災焚自取程傳陰柔在旅之時處于卑下鄙猥瑣細乃其所以致侮辱取災咎也沈守約曰處旅之下宜止靜也變而為離炎躁妄動取災象趙汴水曰凡旅必有所志君子志于行道商賈志于懋遷初為出行之始不能識其大者而較錐刀之小利計瑣尾之末節人將咸厭且怒志窮于此所以災也谷拙侯曰爻賤其行象鄙其志六二旅即次懷其資得童僕貞象傳得童僕貞終無尤也張子居得位即次象得三之助曰懷其資下有一隂無所係纍曰得童僕朱漢上曰離為螺貨貝象巽為入懷其資也艮為少男初卑陰賤童僕也王童溪曰即次則有其居懷資則有其用得童僕則服役有人蓋以六居二之為正故也旅道患不正正則吾無尤于物而物亦莫吾尤所以有得而無喪項平甫曰貞字當自為句不可連于童僕旅以貞為吉而六二九三皆得正位故聖人辨之如六二中正柔順合于卦辭之貞如九居三重剛不中以此為貞適以自危龍麟洲曰艮為門庭有次象三四在前為陽實巽為近利市三倍懷其資象王秋山曰人在旅賴童僕之助既得之則次可即資可懷故象止言得童僕為旅之貞趙氏三泉曰二處旅而有中正柔順之德則內不失己而已無不安外不失人而人無不與凡旅所不可無者皆有以全之九三旅焚其次喪其童僕貞厲象傳旅焚其次亦以傷矣以旅與下其義喪也程傳剛而不中居下體艮上自髙之象自髙則不順于上故上不與而焚其次上離為焚象過剛則暴下故下離而喪其童僅朱漢上曰巽木離火兑為毁傷焚其次也王童溪曰以九居三雖正為厲旅親寡之時朝夕所與者童僕爾豈可以旅視之以旅視乎下則童僕亦以旅視乎上矣其能久留徐進齊曰旅貴柔中旅之貞也三剛貞而不中危厲之道胡雲峯曰九三因六二取象二柔順中正故即次三過剛不中又近離故焚其次二居中乘柔故得童僕三過剛則無徒又下之柔已為二所得故喪其童僕唐凝菴曰三為艮主未嘗無次不得麗五而應于上蓋離惟五為明四上皆燥火故初應四為災三應上為焚不惟不得撰巽之資即艮止所有之次且為之焚三本與下成艮然二得麗于明初則依之三既失所麗初焉得不棄之喪其童僕象何𤣥子曰旅之為義可一宿而不可久處者三為艮止乃一于止而不知變者逼于離火燕雀處堂所以焚次喪僕九三貞與二同但剛而不中止而不動無避禍全身之哲所以不能免厲黃陶菴曰以旅與下謂視童僕猶旅人也當旅時而與下之道刻薄寡恩直若旅人然義當喪也九四旅于處得其資斧我心不快象傳旅于處未得位也得其資斧心未快也王介甫曰居陰不得行而處者也程傳四有剛明之才為上下所與得貨財之資器用之利然上無陽剛之與下唯隂柔之應不能伸其才行其志其心不快也朱漢上曰離為兵巽木貫之斧也上得乎五下得其三九剛處四履謙能下故得上下之利然未得位也故不快孟子曰久于齊非我志也沈守約曰四處離始欲上行也變而為艮艮止也欲行而止旅于處也止于其所而背其所見心未快象王童溪曰位未得而道未行雖貨利之至君子未快鄭東谷曰未進于中失位而處旅者故曰旅于處諸理齊曰四心之位火性剽疾今位隂故有不快之象趙汴水曰旅而暫止宜也今而久居于義為未安李蒙齊曰次乃傳舍處者可久可安之所也春秋云師次易云左次皆非久義或出或處擇不處仁皆久安之義胡雙湖曰斧離為兵象亦兑金在巽木上象離兑在四上所以得也巽上九喪其資斧亦有離兑巽象然在上爻下所以喪也胡雲峯曰得資足以自利得斧足以自防唐凝菴曰四未得明之正位按旅非可久處之所乃變為重艮之中互坎之體處而不行為久羈客旅之象故曰旅于處非不能即次之謂然離體變為互震豈能鬱鬱久居所以其心不快未得位非未當位之謂亦非以未得位釋旅于處言雖久處而未得位以起下二句意孔子以未得位一句釋經文上下三句又别是一體六五射雉一矢亡終以譽命象傳終以譽命上逮也本義雉離象也六五柔順文明又得中道為離之主故為射雉象雖不無亡矢之費終有譽命也語録易言終吉皆是初不甚好楊誠齊曰少康逃虞思之國宣王匿吕公之家是旅也張紫巖曰離為雉戈兵為射雉項平甫曰中德為譽中位為命外卦為終此即彖所謂柔得中乎外而順乎剛旅之最善者也馮縉雲曰卦六爻無理不備厲王居彘平王之遷黎侯寓衛衛侯處曹不幸至此苟能以中正之道自處所依得人能反其國邑復其世祚于此見易為後世作聖人之憂至矣趙汴水曰射雉者于郊郊旅之所吳草廬曰乾之剛象矢變乾為離射而得雉也乾之三矢而亡其一也俞石澗曰五君位王者無外故爻不言旅非謂不取君義上逮者上及乎君位故有譽命如九四之未得位安有譽命上釋終字梁孟敬曰譽人之稱譽命天之休命來矣鮮曰本卦中爻兑巽四兑為譽二巽為命六五比四而應二所以終得譽命何𤣥子曰謙柔自牧文明在中可以挽人心回天命按此爻自乾變離失乾健而得文明終以譽命不失尊位也八卦柔爻離為最善重卦六五亦唯離多吉而在旅則小之所以亨者此也以其得中于外謂之旅所以雖係君位而有射雉亡矢之象上九鳥焚其巢旅人先笑後號咷喪牛于易凶象傳以旅在上其義焚也喪牛于易終莫之聞也孔仲達曰最居于上如鳥之巢以旅處上必見傾奪如鳥之巢被焚客得上位所以先笑凶害必至故後號咷程傳巢鳥所安止焚其巢失所安無所止也上承鳥焚其巢故更加旅人字張子以陽極上旅而驕肆也失柔順之正曰喪牛怒而忤物雖有凶危其誰告之故曰終莫之聞本義上九過剛處旅之上離之極驕而不順凶道也王童溪曰棲髙處亢而寄諸危地者鳥之巢是也髙極必危離火有焚象牛順物旅道以柔順謙下為本上九喪其至順之德所以凶也張紫巖曰互兑兑口為笑為號咷離又為牝牛沈守約曰離為鳥變而為震震為木而居卦之上鳥巢象項平甫曰笑者喜其髙離之鼓缶而歌也號咷悲其焚離之大耋之嗟也旅上即離三也失其柔故所喪者牛趙復齊曰五宜陽居大壯六五非陽故曰喪羊上宜陰居旅之上九非陰故曰喪牛壯之時不可以失剛旅之時不可以失柔張舜元曰火有聲笑號象林黃中曰三承九四之離為他人所焚也上焚其巢自焚也鄭合沙曰上九得勢寄一身于炎炎之上不知有焚巢之禍九三趨炎躁進不知有焚次之災吳草廬曰上一卦窮處疆場之象俞石澗曰易當依王肅音亦與疆場之場同易中凡稱卦名皆言所遇之時凡言在上皆言所處之位以旅之時而位在人上人必害之故曰其義焚也剛亢絶物况又無應則其喪牛于易也無一人告之故曰終莫之聞也吳氏桂森曰離中之明原可畜之牝牛亦可安之坦途只一念自亢便喪牛于易終無開悟之期可慨也夫按離為牝牛變為震故為喪牛巽下巽上中爻兑離巽小亨利有攸往利見大人彖傳重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人陸公紀曰二得中五得正體兩巽故曰剛巽乎中正皆據陰故志行陰為卦主故小亨孔仲達曰巽卑順之名說卦云巽入也蓋以巽象風風行無所不入施於人事能自卑巽者亦無所不容巽之為義以卑順為體以容入為用上巽能接于下下巽能奉于上上下皆巽命乃得行故就二體上下皆巽以明可以申命也石守道曰巽齊也齊者申之以命令蘇子瞻曰柔皆順乎剛是以小亨言必順二五而後亨也利有攸往為二五用也利見大人見九五也程傳巽與兑皆剛中正巽說義亦相類而兑則亨巽乃小亨者兑陽之為也巽隂之為也兑柔在外用柔也巽柔在內性柔也巽之亨所以小陽剛居巽而得中正巽順于中正之道也本義一隂伏于二陽之下其性能巽以入也以隂從陽故利有所往然必知所從乃得其正故利見大人巽順而入必究乎下命令象重巽為申命中正指九五柔謂初四語類申是丁寧反覆風之吹物無處不入無物不鼓動詔令之入人淪肌浹髓如風之動物只是巽便能入義理之中無細不入朱漢上曰風者天之號令命者天之令也故巽為命內巽命之始外巽巽而達乎外申前之命也重巽象唯可施之于申命若施之于它則巽已甚矣剛巽乎中正而柔順之則柔者亦得其正而小者亨矣豈非小者之利乎王童溪曰巽雖以隂為主然在巽之時二五以陽剛居中正之位則是剛亦巽也剛亦巽則剛無過剛矣故為巽之大人而志行乎下趙復齊曰柔與剛遇剛中柔順故亨剛道盡柔乃服兩者俱利反此俱失主在剛不在柔也馮厚齊曰巽之取義卑也以其下于陽順也以其承于陽伏也以其藏于下入也以其進于下鄭亨仲曰九二巽乎中者也重巽則兼五言之故曰巽乎中正初六順乎剛者也重巽則兼四言之故曰皆順乎剛李隆山曰巽之所以致亨者蓋指二五以陽剛處中正之位而初四出而順從之乃所以為利項平甫曰重巽以申命是小亨也事必待于申命而後行豈大亨之規模趙汴水曰一隂生于下二陽巽之于上巽卦本乾隂生而陽巽之故亨剛雖巽柔猶居中正之位柔既已生有順剛之象王秋山曰二以剛中而巽順乎五之剛中正其志得以上行唐凝菴曰能順乎剛之中正則併化乎柔之過巽而就于中正矣利見何疑華霞峯曰卦惟九五陽剛中正居重巽之位然非九二以剛居下巽之中能巽乎五之中正未必能使柔皆順剛而攸往利見俾小者之亨也九五之志行九二之力居多按分言之二五皆剛巽乎中正以重卦言九五為剛中正之大人以卦之主也本義以剛巽乎中正獨指九五秋山霞峯宗而暢之雖似非彖傳本義亦可備參初六進退利武人之貞象傳進退志疑也利武人之貞志治也孔仲達曰處令之初法未宣著體于柔巽不能自決心懷進退未能從令者也成命齊邪莫善武人宜用武人之正以整齊之吕藍田曰所謂果敢以從事也朱漢上曰巽初行事之始居卑體柔不能自立退則不安進則無應又二剛據之莫知所從故進退志欵變巽成乾應兑乾為健兑為決疑志去矣張紫巖曰柔道常疑初六以柔居兑先出命而二三其心唱之者既疑聽之者必惑尚安能立天下事哉必也外用其權內濟以果去姑息之弊得中正之宜巽道行矣聖人特于初發之吳草廬曰武人質柔而位剛又依附外剛以為强如人之被甲胄執戈兵初比九二以二之剛為己之剛故曰武人剛强自治然後能果決上進以從陽胡雲峯曰此與履六三皆以隂居陽故皆稱武人象傳于此曰志治彼曰志剛俞石澗曰巽申命行事之卦令出務在必行豈宜或進或退初以武人處之則貞固足以幹事爻柔故志疑位剛故志治易外巽之進退有風之初起盤旋不定之象始雖不果終則甚躁故利乎貞姤之勿取以其不貞也下巽即姤下卦故利貞九二巽在牀下用史巫紛若吉無咎象傳紛若之吉得中也趙復齊曰巽在牀下謂初六也用史巫以誠接之也初六志疑故二接之朱漢上曰將以誠意感動九五故用史巫紛若吉史道人之意以達于鬼神巫以鬼神之意告于人史巫皆尚口而巽者史巫紛若則卑巽之意達于上下張紫巖曰互兑為史巫史巫通于神者誠而已九二得中能以誠上通乎九五之君用以獲吉當申命行事時號令之發禍福之幾也忠藎之臣罄其由中之情朝夕孜孜曾不憚煩發號施令有不當天下心哉二以剛中乘隂是能自卑抑以行其志于巽者鄭合沙曰巽以陽爻為牀簀陰爻為足四陽行列簀之象二隂四隅在下足之象胡雙湖曰牀全體巽木象剝之牀以卦形肖象耳俞石澗曰二五兩剛本不相應非用三四不能達也史指三巫指四三近二可達二意于五四近五可達五意于二也三四交相往來于二五之間猶祭禱而用史巫也毛伯玉曰巽初民象牀者二也長民者也古者席地而坐唯長民者坐于牀吳草廬曰初偶二竒有牀之象巽謂卑伏而入于下指初六而言牀二也初在二下卑伏而入于下之象卦之名巽本取二柔之卑伏者然當巽時陽亦當巽蓋陽為陰所順從亦必以卑巽待之若剛强自處非所以懷柔順服之人也二得屮居柔故亦能巽二之位與五應卑巽以應上如卑巽以事神既能巽于上則亦能巽于下不當位宜有咎得中故無咎也何𤣥子曰巽在牀下者言二卑巽于在牀下之初也足為牀之本足固則牀安民為國之本民順則國安九二承五之命以致之民恐初之未喻而丁寧煩悉其辭以達其誠意孔子云使民如承大祭九二之謂也所謂剛巽乎中正也紛若猶多方也申命行事紛若而得中也按卦有陽巽隂二巽五之道於此爻見之巽之義取入取伏二之巽在牀下指初而言上之巽在牀下指四而言乃不易之象以為九二過巽之象者失之用史巫句本别為一象不必緣上句來致為拜跪牀下之說觀上爻喪其資斧句未嘗緣上句來可見蓋巽成卦之義非祇卑巽之謂也巽者德之制巽以行權本卦彖傳以申命大象傳以行事為全卦之㫖命與事皆聖王化民成俗之要象風之行淪浹上下其間有無限條理無限次第毛氏以初隂為民象極為得㫖民者命與事之所究初與四之二隂也而為申命之主者則九五之君承申命之責者自在九二之臣九二剛中下巽乎初以恤民隱上巽乎五以輔君德故曰巽在牀下用史巫紛若也傳言得中亦謂二之居中得通上下之志也所採諸說會而通之足暢爻義九三頻巽吝象傳頻巽之吝志窮也王㑹之曰權始于微物情之未然三用剛而必使由之頻數之令人所不與故吝沈守約曰頻巽屢變也巽也者剛巽乎中正而後志行也剛過而不中令且不當是以頻巽爻變為坎巽而入險卦變為渙令出而屢改則衆必散志不得行是以志窮按觀頻巽之象益徴巽卦之義非泛泛卑巽之謂也如曰卑巽而已則有過巽而無頻巽卑巽謙下太過則不可若卑巽而不過中固可無時不巽無事不巽豈巽于今日明日即不當巽巽于此事于彼事即不當巽乎又何頻巽之吝何至志窮釋者又以九三非能巽者勉强為巽以至屢失細玩亦無其象蓋巽有實象風也木也有虗象伏也入也體其伏入于人事為巽順為卑巽體其實象于人事為命令為事權此卦彖傳特言申命以風之實象言也巽乎中正之巽順乎剛之順以伏入之虗象言也九三之頻巽巽即命也以下巽之終究而為躁過剛不中又當重巽之際有一命乍行一命復頒之象朝更夕改號令紛繁濟以急躁周公以其勢之不行而謂之吝孔子誅其志之躁動而謂之窮蓋過剛不中進退無常以致命令反覆也諸儒唯王氏沈氏為得其解六四悔亡田獲三品象傳田獲三品有功也翟子元曰三品巽為雞兑為羊離為雉也王輔嗣曰乘剛悔也然得位承五卑得所奉雖以柔御剛而依尊履正以斯行命必獲强暴逺不仁獲而有益莫善三品故曰悔亡田獲三品一曰乾豆二曰賓客三曰充君之庖孔仲達曰田獵有獲以喻行命有功也王介甫曰田興事之大者也三品有功之盛者也柔而可以大有功者巽乎正而得所附也郭白雲曰六四近君志決于進無初六之疑則悔亡矣六四至柔不應有田獲之功以順乎剛故得之由是觀之巽豈柔弱畏懦之義哉張紫巖曰以隂居四陽中有離明而用以巽順羣剛上下順之則可以立于無過之地故曰悔亡自三至五互離離佃漁為獲三品沈守約曰田獲三品令行之效也田除害獲得禽行君之命而致之于民將以興利除害害去利獲令行而功著胡雲峯曰田武事初利武人之貞四之田獲用武而有功者也俞石澗曰三品指下三爻為大臣者當謙恭下士以收拾天下人才如巽之六四田獵而有獲可謂有功矣來矣鮮曰八卦巽居四為正位所以有功華霞峯曰下三爻皆巽順乎五而四近之四聨下三爻以巽五三品之獲非四誰歸利往利見皆四之功故曰有功九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象傳九五之吉位止中也程傳五居尊位為巽之主命令之所自出也處得中正盡巽之善貞正中也貞則吉而悔亡齊覺翁曰八卦兑西為庚巽撰兑而五在兌上故言庚俞石澗曰卦撰兑兑居西方故言庚按先庚二句說詳蠱卦制巽者在兑金之斷也舊說更改之義非也爻上言吉以爻德也下言吉言其所以然謂以庚之斷故吉也上九巽在牀下喪其資斧貞凶資斧漢吉作齊斧應劭云齊利也讀如資此與旅資斧不同當從齊斧為是象傳巽在牀下上窮也喪其資斧正乎凶也王輔嗣曰斧所以斷者也處巽之極過巽失正喪所以斷故貞凶本義喪其資斧失所以斷也居巽之極失其陽剛之德張紫巖曰剛上用巽為上窮本有剛德而以巽喪之資利也斧斷也沈守約曰處外無位極巽失據不能行權是以喪其資斧申命行事收成在此而居極失權正乎凶也華霞峯曰巽德之制以剛中為制巽以行權以剛中為權上九居巽之極失剛中之德無其制無其權貞凶矣按巽在牀下自當與二爻同象諸家以為窮上反下固無其理無其象何𤣥子以為指三尤曲說也顧不與四比而與二同象者明重巽之義也蓋隂順乎陽陽所易溺惟中正則能斷以行之上卦重巽重言巽在牀下以明隂入之深九五陽剛中正猶以兑金之斷制而吉五在兑金之上也上居全巽之極以陽居隂不中不正兑金之斷既獨歸於五上無所得無以斷制而四之重巽伏入于下遂溺于柔懦又爻變為坎水性下流隨之而波靡矣其凶必也象傳上窮也正言雖與九二之巽在牀下象同而無如上之所處已窮異于九二之中也窮極也巽之立卦雖以隂起義然卦既名巽則三爻皆巽不分隂陽先儒以為陽亦當巽者尚嫌添一當字也兑下兑上中爻離巽孔仲達曰說卦云說萬物者莫說乎澤澤滋生萬物所以萬物皆說猶人君以恩惠澤民民莫不說胡安定曰不謂之說而謂之兑者聖賢感天下之心必以仁義恩惠之道不可以言語口舌故去其言而為兑趙復齊曰陽聚而不行故為澤隂為岸焦弱侯曰人有喜說必見而在外蓋陽假隂之和柔喜說非由于隂也兌亨利貞彖傳兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉王輔嗣曰說而違剛則諂剛而違說則暴剛中而柔外剛中故利貞柔外故說亨天剛而不失說者也劉長民曰天之所助者順人之所助者信柔外為順剛中為信故得順乎天而應乎人程傳陽剛居中中心誠實之象柔爻在外接物和柔之象故為說而能貞若違道以干譽者違道不順天干譽非應人非君子之正道本義一隂進乎二陽之上喜之見乎外也其象為澤又取坎水而塞其下流之象剛中故說而亨柔外故利于貞又柔外故為說亨剛中故利貞亦一義也朱漢上曰二五剛中而二三四不正不正則陷于邪諂悔吝將至故利貞上天位順乎天也三人位應乎人也郭白雲曰說在事為之先則民可忘勞說在患難之先則民可忘死項平甫曰順乎天兑上也應子人兑下也天人皆通所謂亨忘勞忘死即所謂勸吕東萊曰當適意時而說處平安時而說皆未足為難唯當勞苦患難而說始見真說李隆山曰三女之卦彖必以正戒之蓋隂柔之性易流若三男之卦則直言卦德而不復戒以利貞者陽剛之性不至于溺趙汴水曰坎流則氣行故能通兑止則氣聚故能養物得所養而說故曰兑說也俞石澗曰先民犯難兩說字亦為重兑而發和說之道在內在外無施不可在內而先民則忘勞在外而犯難則忘死周省貞曰兑何以言忘勞忘死兌正秋也陽內隂外生氣在內殺氣在外天道好生而秋殺乃所以濟春生之窮王道主仁而義正乃所以濟仁育之窮蓋唯肅殺能固濟生氣而內和故曰利者義之和兌說正取此義初九和兌吉象傳和兌之吉行未疑也趙復齊曰純卦元應取隂陽近逺言其情初九逺隂所說者陽故和而吉蔡節齊曰爻位皆剛得說之正未牽于隂所行未有疑惑者若四比三有商兌之疑矣徐進齊曰疑謂係于隂卦四陽唯初與隂無係趙汴水曰和在說先初象龔泉峯曰初居說體在內無應說在心而無所私係者也胡雙湖曰兌自有和義獨言于初以得陽剛之正具和說之體何𤣥子曰初心未渝廓然大公說之正也和者天下之達道何施不行贊之曰行未疑變坎則為狐疑矣鄭孩如曰信心信理而行出之于外者未與心疑使有係應便不能自決髙忠憲曰是人心最初之真說按兌隂卦說柔象而隂必以陽為本和者陽和也以陽居陽比應皆陽而在內卦之初天地陽和之氣充然在中無雜無妄是為說之本以是推行吉何疑乎九二孚兌吉悔亡象傳孚兌之吉信志也程傳二承隂柔當有悔剛中之德孚信內充雖比小人自守不失故吉而悔亡心之所存為志二剛實居中是孚信存于中也張子私係于近悔也誠于接物信而不妄吉且悔亡鄭東谷曰陽剛得中自信必固故曰信志龔泉峯曰當說之時以孚信為說者也人亦不得而妄說之故吉何𤣥子曰初去三逺不特志可信而行亦未涉于疑二比三行雖不免于可疑而志則可信六三來兌凶象傳來兌之凶位不當也程傳隂柔不中正比于在下之陽枉已非道就以求說所以凶也之內為來隂性下也王童溪曰六三居兩兌之間左右逢迎唯以容悅為事故凶象曰位不當也上下四剛皆君子也三以小人厠乎其間而又居髙位豈所當乎沈守約曰兌陽說隂也剛中而柔外說之正也三以隂柔為內說之主媚于上下以來其說是以凶也變而為乾健于求說來兌象項平甫曰初至五為中孚故信三至上為大過故凶又互象之著明者也熊梅邊曰居二兌之間說而又說不得其正者按傳言位不當也可見來兌之凶専在不正與彖利貞相反惟不正則其來兌者惟有邪媚而已三為內卦之主而失其正故嚴其辭九四商兌未寧介疾有喜象傳九四之喜有慶也王輔嗣曰介隔也三為侫說四以剛德裁而隔之間邪介疾宜有喜也程傳四上承中正之五而下比柔邪之三雖陽剛而處非正故不能決而商度未寧謂擬議所從而未決也吕藍田曰能介六三諂邪之疾故有喜項平甫曰介兩者之間人所守以為限别也故有守有别者謂之介豫之六二能以中正自别為介于石凡疾之愈者為有喜無妄之疾勿藥有喜損其疾使遄有喜皆指疾愈為言也沈守約曰兌變為坎坎為加憂未寧之象徐進齊曰商兌未寧正天理人欲公私界限處不可不商所從也聖人以介疾有喜言之所以開示正道隄防邪心其意切矣郭白雲曰當兌之時處上下之際不妄從說不遑寧處知所擇者也故終有介疾之喜及物之慶也趙復齊曰商兌故未寧絶三說五乃有喜爾胡雲峯曰位柔有商兌象質剛有介疾象俞石澗曰爻剛位柔半動半靜故象未寧四雖近三四居上體三居下體非若同體者也傳言九四以位言也云四居此位能截斷六三使不為吾疾也龍麟洲曰巽為進退不果故曰未寧九五孚于剝有厲象傳孚于剝位正當也程傳五得尊位而處中正盡說道之善猶曰有厲者雖聖人在上天下未嘗無小人勉而革面亦聖人之所說也剝者消陽之名蓋指上六巧言令色孔壬堯舜猶畏之其可忽諸張紫巖曰君道以化為難夫治至小人信而化之天下其孰有不說者哉有厲戒也欲使之視安若危也五剛中而又下應九二之賢君臣同德誠信足以孚小人而格化之非得中得位何以致此項平甫曰兌為正秋下二爻七月為否中二爻八月為觀上二爻九月為剝九五正當剝之時是以戒之熊梅邊曰九五中實孚于上下者也為兌之主而不言兌居位之正以孚信從事所謂說之不以道不說者也吳草廬曰有厲者今未厲也言其有則不可不知戒也按玩爻德象傳則所謂孚于剝者即解之有孚于小人也程傳已得其意紫巖特暢其㫖諸儒謂不信君子而親信小人則豈陽剛中正之所為乎孔子又何以位正當贊之乎且又何以見其不信君子乎夫剛中為孚二五所同其占不同者二之剛申在內卦為臣位自守而已足五居君位而剛中正其孚信所及足以動物其勢極盛非如二之自守而已五既孚于上下并上六之隂柔亦在所孚之內有厲者正以極盛而戒之也至以上六為剝者項氏以否觀剝三秋之卦當全兑之正秋而五上為秋之九月於剝字尤有來歷自初至五有中孚之象故二五皆言孚自二至上有革之象上則當革面之爻故五言孚于剝程子之所謂革面者也但澤性下行極上口開決于上將潰于下兑為毁折聖人憂之故曰有厲上六引兑象傳上六引兑未光也劉長民曰執德不固見誘則從故稱引兌郭白雲曰說有引之而說者從人也隂柔不足以有為引之則從人而說不能光大于道固無得而亦未至于失已故吉凶悔吝無得而言焉易山齊曰上隂居陰位猶近于正者也雷西仲曰陽為實隂為虗上六以隂居一卦之外是不能充實于內而說于外之象也道充于內外物不能動君子光大之道引之則說故曰未光也按上爻為重兌之主猶重巽重震以初為主重艮以上為主也兌之上乃柔外之正象又得其正又居一卦之終故以引兌言全兌之性情蓋引者兌澤之象澤非坎水坎有流而不盈之德其性沛然莫禦不為物引澤鍾于此不引之則為止水引之為溝澮則溝澮引之為池沼則池沼隨引隨至無所決擇無所迎拒此全兌之性情也其為利物傷物正與不正尚視其引之所至而未可遽定故無吉凶悔吝之占即以人事言見道義而悅見紛華而悅均之悅也孔子以未光釋之者蓋易為物遷異于艮止非光大之道也舊說皆鑿彼坐以其凶可知甚以為凶不足道者蓋見來兌之凶也不知六三雖亦兌主而不中不正在上卦之內失柔外之象故繫以凶上非其類也且苟有凶咎周公何諱而不言乎坎下巽上中爻震艮馮縉雲曰繼兌之後人情說豫則開舒放肆而亂所由生渙所以為散也華霞峯曰說而後散所謂泮渙之渙也此渙字好渙者離也才一轉便成渙散之象此渙字不好却相因人情到舒散時自好停一會便精神散漫積久便分崩離析只一條路上來渙亨王假有廟利涉大川利貞彖傳渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也王輔嗣曰二以剛來居內而不窮于險四以柔得位乎外而與上同內剛而無險困之難外順而無違逆之乖是以亨孔仲達曰渙之為義人心離散大德之人能于此時建功立德解難釋險所以為亨至于建立宗廟德合神人可濟大難大難既散當以止道而柔集之故曰利貞薛氏溫其曰二以身入險四則輔君任事上下同志厥事乃濟李晟入險陸贄輔后二爻之象程傳剛來而處得其中柔得正位于外而巽順于五乃上同也上巽木也下坎水大川也木在水上乘木之象涉則有濟難之功朱子王乃在中是指廟中言王指九五言朱漢上曰上為宗廟艮為門闕五王位九五有入自門闕至宗廟之象楊元素曰當渙之時何以御之王者宅中而正位託天地宗廟之靈以固民之離心故曰王假有廟王乃在中也張紫巖曰剛來二句言乾坤剛柔之變乾陽下來坤柔上進上下之情其孚若一渙有不亨者哉乘木有功坎以巽濟必取乘木譬人君躬行仁德于上虗心拱已坐收渙散之功為有功云王童溪曰利貞者九五正位于上利以正道奔走天下之羣才而成渙功彖傳不及利貞疑有逸文于中孚可見李隆山曰萃因民之聚立廟以堅其歸向之心渙憂民之散立廟以收拾其蕩析之心皆所以統攝人心而堅凝之也馮厚齊曰剛來不窮即需剛健不陷義不困窮之意鄭東谷曰方其渙也孰為君孰為臣至于有廟則王位乎中而上下定矣萃假有廟萃之所有也此假有廟渙之所宜也張南軒曰收天下之心莫若立宗廟而正王位王乃在中所謂中天下而立定四海之民也王秋山曰剛來坎中在他時為陷于險此則坎已渙故來而不窮木乘風而順行于水上是涉大川而有功此亦言渙之所以亨也胡雙湖曰卦有因民渙散而聚之意假廟是也又有渙天下患難意涉川是也爻則全以渙為美事不可一例觀之俞石澗曰渙有巽風解凍而渙然氷釋之象坎為加憂人之氣憂則結喜則散憂患渙散而亨通故亨梁孟敬曰有散必有合散所當散而合所當合乃亨之道也錢啓新曰渙亨在二四同功二來險中以同風散主爻遂有震起而無坎陷四得位于外惟剛中之五是同何險不為流散渙所以亨合訂𫝊以剛來柔往釋卦名以不窮上同釋亨義王假有廟取九五在中之義在字釋假字中字釋廟字乃字對二與四言二四往來五乃在中也按剛來二句夫子以坎巽主爻言也王乃在中乘木有功皆以卦象釋卦辭必以中字作中正之中作中心之中誠如朱子所議非彖傳本義也但易象皆假象王在中正位之意也乘木用巽風以散坎難也認作祭祀涉川者得無又失之泥乎初六用拯馬壯吉象傳初六之吉順也程傳居渙之始不云渙者離散之勢辨之宜早方始而拯之則不至于渙馬謂二二有剛中之才初陰柔順兩皆無應親比相求初託于剛中之才以拯其渙如得壯馬以致逺故吉拯渙于始為力則易時之順也張子處險之下故必用拯無應于上順比九二之剛拯而馬壯其吉宜矣朱漢上曰坎為美脊之馬互震為作足馬之壯者王童溪曰渙散之初則時未至于渙也當此之時順此之勢而亟救之則用拯之道得矣按傳言初六以時位言也順主順時之說為優九二渙奔其機悔亡機音几象傳渙奔其機得願也虞仲翔曰震為奔坎為棘為轎輮震為足輮木有足艮肱慿之機象張子奮于險中進而之前則難解悔亡故曰奔其機徐進齊曰機物之可慿以為安者五象也當渙之時唯五為能拯天下之渙而已奔之則得所依矣故失位之悔亡奔速辭楊誠齊曰九二以剛中之才當險難之世大臣之位逢九五剛明中正謙巽之君奔而赴之與之濟難得其志願何悔之有機君所慿也沈守約曰失位居險不無悔也五雖非應剛中同德去危即安不窮于險得其志願是以悔亡五居巽中巽為木而居于中正機象坎變為坤行險而順得所奔者也卦變為觀機尊者所慿可觀而仰也趙汴水曰奔疾趨也古者尊者慿几以坐卑者拱而立于二言機指九五猶不敢言天子而言乘輿也若近比于初何以奔為胡雙湖曰初取馬壯為吉是貴其去險也二在險中曰奔其機豈非欲其速奔出險乎機指巽木同德相逢九五是也俞石澗曰剛中互震有動而出險之道按此爻諸說不一以初六為機始于王輔嗣夫二比初不得言奔坎下陷不得言機二就初是甘沈淪于險下也以二為機九為奔始于朱子夫入險為安何渙之有九已居二何奔之有以六四為機者說尤支離何元子以二為機而謂奔出其機雖得出險之意但奔有奔赴未可為奔去自以奔五者為允六三渙其躬無悔象傳渙其躬志在外也孔仲達曰渙之為義內險外安六三內不比二而外應上九是不固所守而能散其躬故得無悔吕藍田曰六三獨應上九挺身出羣雖未離險志己在外故得無悔本義隂柔而不中正有私于已之象然居得陽位志在濟時能散其私以得無悔大率此上四爻皆因渙以濟渙者也王童溪曰上九渙其血去逖出無咎謂其能逺害也六三與之居相應之地其亦慕上之為乎無悔宜矣項平甫曰自三至五成艮艮為躬李隆山曰三居坎上近接乎巽坎水得風而散巽木得水而通故能渙散其身出險自無悔吝沈守約曰身伸也躬屈也能屈身以渙志者也是以無悔蓋外巽以濟內險所以為渙坎變為巽則險濟矣趙復齊曰志在上應二無復險難之散躬實為之易山齊曰三四為人位在外體者人也在內體者已也三在內體故為渙其躬陳隆山曰己私散則為善三之躬四之羣上之血是也夫人不能自脫于險者有我而已六三雖不中正而高出坎險之上于是釋然消散其有我之私而志在于外自然無悔矣王秋山曰渙之六爻唯三有應必渙其躬不為坎陷後能與上聚而無渙散之悔胡雲峯曰三居風水相渙之間己私消釋氷泮風休故無悔黃陶菴曰外指天下言唯躬之渙所以能濟天下之險唯志在天下之渙所以有躬之渙也髙忠憲曰人之志內見一身遂難外通六三應上志在濟時渙其有我之私而無悔矣按渙其躬者不有其躬也陰柔不中正而得此象者惟其有互震之體接巽風之散上應陽剛得正人之援故能不為陷陽之隂而以其身上同四五為拯險之身無悔宜矣六四渙其羣元吉渙有丘匪夷所思象傳渙其羣元吉光大也胡安定曰天下之渙起于衆心乖離人自為羣六四上同九五而下無私應居陰得正是大臣秉大公之道使天下之黨盡散則天下之心不至于乖散而兼得以萃聚故得盡善本義散其小羣以成大羣使所散者聚而若丘語録當人心渙散之時各相朋黨不能混一唯六四能渙小人之私羣成天下之公道此所以元吉徐進齊曰羣同類丘聚之髙夷等夷四與初三皆柔類而等夷者也柔進居四散其同類之私羣而上聚于五故元吉渙下聚上渙有丘也匪夷所思非二柔思慮之所及也丘行可曰九五下連二爻為互艮丘也項平甫曰渙其羣渙之始也渙有丘渙之終也義各不同故兩言渙以别之張紫巖曰四為腹心之臣居尊功崇朋類絶思道以光大艮為光大沈守約曰巽變為乾風行天上布宣化令渙有丘象趙復齊曰上附九五不連初三則二之難益解李蒙齊曰隂道以喪朋為正近不比三逺不應初胡雲峯曰渙惟此爻大善而吉蓋初二三上皆不正六四得隂柔之正能輔君以濟渙者錢啓新曰四有上同無下昵渙其羣象渙為水之散丘為山之聚不見四之有羣惟見五之為丘渙有丘象坎在下為心巽深入故又言所思何𤣥子曰巽為解險之主四為巽卦之主卦之所以成渙者在此一爻變乾具陽剛之德故能光明正大如此潘去華曰羣不渙則心皆散而無所聚二隂等夷皆知羣之為羣而不知羣之當渙知羣之當渙而豈知渙之為聚按此爻彖所謂得位而上同者也惟上是同必散其朋為風之主互震之極動而散之渙其羣象互艮之中渙有丘象初順二而三應上匪夷所思也九五渙汗其大號渙王居無咎象傳王居無咎正位也九家易曰謂五宣布號令百姓被澤若汗之出身不還反也坎水汗象陽稱大王輔嗣曰處尊履正居巽之中能散汗大號以蕩險厄者也為渙之主惟王居之乃得無咎胡安定曰汗者膚腠之所出出則宣滯愈疾九五居尊能出其號令布其德澤宣天下壅滯發天下堙鬱使天下之人皆信于上所以居位而無咎石守道曰渙王居無咎者渙除險難之後非皇極之君不能居正位也蘇子瞻曰渙然之中不知孰臣孰主至于有廟天下始知主之所在故曰渙王居張子正位凝命廓然以王道自居乃無咎朱子聖人說一汗字為象不為無意蓋人君之號令當出于人君之中心由中而外由近而逺雖至幽至逺之處無不被而及之猶人身之汗出于中而浹于四體也朱漢上曰巽為號陽為大渙時民思其主王正位則渙散者知所歸矣王童溪曰渙而再言之者汗其大號取其散所以欲渙也王居正位取其正所以合渙也張紫巖曰互艮為門闕艮止為居鄭合沙曰人之一身陽主氣隂主形元氣蒸而為汗流而為血二陽散于外故言汗言血二隂分于中故言躬言羣胡雙湖曰艮體有身之象汗自身出俞石澗曰彖言王假有廟此言王居蓋相發也錢啓新曰四渙曰羣上渙曰血所渙者險體五渙曰汗坎為心五二通為一心凡大命令之下以散則為和風以潤則為甘雨如人之汗從心而液遍一身之皮毛爪甲無不霑透按渙王居遵孔傳正位解則非散其居積也蓋上言渙取散義下言渙卦時也上九渙其血去逖出無咎象傳渙其血逺害也王輔嗣曰逖逺也最逺于害不近侵克散其憂傷逺出者也誰咎之哉王介甫曰六三以柔乘剛在內困于有難之地隂之傷也故曰血上九應之則與之俱傷矣去而逖出則逺害矣張子上若係三害不可免能絶棄隂類逺出其難則可免咎朱漢上曰先儒讀渙其血作一句去逖出作一句以象考之當從先儒一本作去惕出然象曰逺害當從逖矣王童溪曰上九以陽剛之才當渙散之終禍難既散脫然處無用之地所謂功成而身退也項平甫曰血與出韵叶卦唯上九去險最逺故其辭如此散其汗以去滯鬱散其血以逺傷害上三爻皆以巽渙坎者也故汗與血皆指坎言之二居險中為汗汗心液也三居險極為血血外傷也張葆光曰巽為風應乎六三之坎坎為血卦風之與血常相為用渙而運之則榮結而聚之則為害俞石澗曰渙諸爻唯三與上應然三可以應上上不可以應三在險中者貴乎出險在險外者戒乎入險三賴陽剛之援故不可不應上上而應三則又入乎坎而有傷害矣郝京山曰坎為血渙血則坎氣消盡矣下懲險應陽剛決絶巽風髙舉出不內顧故去而逺出以避害也錢啓新曰去不復來逖不復近出不復入其于坎血逺而又逺何咎之有周易孔義集說卷十五
