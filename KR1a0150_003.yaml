body:
  text: 周易孔義集說卷三光祿寺卿沈起元撰上經乾下巽上中爻兌離胡雲峯曰自乾坤而下屯蒙需訟師比皆三男陽卦用事至此方見巽之一隂用事而以小畜名焉尊陽也小畜亨密雲不雨自我西郊彖傳小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也胡安定曰隂陽交雨澤乃施若陽氣上升而隂氣不能固蔽則不雨若隂氣雖能固蔽而陽氣不交亦當不雨猶若釡甑之氣以物覆之則蒸而為水也程傳物相比附則為聚聚畜也又相親比則志相畜所以次比畜止也止則聚矣乾在上之物乃居巽下夫畜止剛健莫如巽順為巽所畜故為畜也然巽隂也惟能以巽順柔其剛健非能力止之也畜道之小者也得位得柔巽之道也能畜羣陽之志是以為畜語録或以小畜為臣畜君大畜為君畜臣曰大畜只是所畜者大小畜只是所畜者小不必指定一件事便是臣畜君君畜臣皆是這箇道理隨大小用本義我者文王自我文王演易于羑里視岐周為西方正小畜之時也柔得位謂六居四上下謂五陽張紫巖曰六四居近君位體巽順至德總攬羣剛而上畜于君曰小畜亨卦體有至健不息之誠而又將之以巽順畜其入矣九五剛中六四比而承之其志遂行故亨不雨德澤不施也臣之誠意雖通于上而君德未孚若天氣未應然何以尚往臣事君勉盡吾道而已不以未孚而怠其愛君之心畜道斯成畜君者好君也小畜貴往朱漢上曰四得位上下五陽說而應之說則見畜矣非應曰應隂者陽之所求此以六四言小畜之義健而濟之以巽則易入剛不過乎中則志行于上下兩者得則柔道亨而陽為隂所畜矣此以二體言小畜之才六四志在畜君以往為尚然不待唱而先之故其施未行郭白雲曰剛德天德也天德畜之則止不畜則失聖人之所以為聖以能畜天德而已畜有二道止而畜之者畜之大也入而畜之者畜之小也能大畜天德則理無不亨小畜疑其未亨故言亨也上下應者陽道喜于從隂雖非其位其志皆應志行四之巽志也剛德居中而巽志行是以亨也尚往者其道方行行猶未已也密雲尚往則澤有必下之理盡其道為大畜施未行為小畜王童溪曰柔能制剛弱能制强其所以能者何也曰柔得位而上下應之蓋柔不得位則受制于衆剛之不暇上下不應則衆剛之情俱不我協如制剛何魏鄭公之尊寵故得肆志于太宗項平甫曰凡隂蔽之極則陽氣蒸而為雨密雲不雨者隂方上往未至于極自我西郊者方起于此未至于彼然謂之尚往則非不往謂之未行則非不行亨固在其中矣為以臣畜君終當感悟之象王秋山曰上下應之謂五陽皆從之從之則為所畜胡雙湖曰一隂卦六小畜乾下必上達巽上必下入六四當其際也密雲兌澤氣上蒸象不雨巽風散之離日烜之象西郊兌象胡雲峯曰下畜上小畜大正文王與紂之事但能用巽柔之道以止畜其惡終不能大有所為文王觀象而適有㑹于心故以其所遭者言之張湛虛曰剛中而志行指巽卦言剛中九五也以剛居巽體中由四之孚上合其志得相固結志行巽之志行也觀彖密雲不雨氣上行而畜聚未固也成卦之義雖主于一隂畜衆陽及繫辭其爻則諸爻皆有畜意讀易者謂隂雖畜陽陽猶可亨失卦意矣按卦有巽離兌備三隂之卦密雲象三陽橫亘于下澤氣不能下流不雨象密雲不雨因陽氣未交自屬至理諸儒多以雲起西方隂位陽氣不應而不雨或有所本實無其驗愚謂自我西郊文王特即其所處而言雨澤不能下于西耳非言雲之起于西方也此卦多主臣畜君郭氏獨主畜天德極得觀象之法且于畜聚之義尤合一卦可該萬事若止主畜君而言所用偏矣故並存之初九復自道何其咎吉象傳復自道其義吉也楊龜山曰六四得位為一卦之主而初與之為應受畜于四者也過未形而畜之其復自道矣夫何咎之有郭白雲曰天德之大而人畜之雖曰小畜亦已艱矣唯早辨者易為力易為力則復自道復則鮮失是以吉而無咎然曰復者何蓋小畜未能無失是以不免有復也王童溪曰初九之陽動乎一卦之初動之微也當動之微制之使不愆于道則用力少而見功多而無制之之勞矣故曰復自道如不逺復是也孟子曰惟大人為能格君心之非小畜之初動之微所謂心之非也復而自道其盡格心之業乎趙復齊曰往其反為復陽欲上行遇隂而止故復于下以畜其德其往也本有咎既復矣咎變為吉沈守約曰初居健始四為畜主健處于下巽應乎上畜于未然引以當道不待過舉而後圖之何咎蓋初變為巽健而能順其義吉也王秋山曰復反也初志欲上行而為四得時得位者所畜故復然剛而得正雖為所畜而復如自守以正不為所畜者故曰復自道言雖為彼所畜而吾實自復于道也龔泉峯曰初九知幾不進而自復其道何咎之有易及諸經無有以復為上進者觀彖下卦三爻自畜者也初能順時義而止退復自道無咎且吉矣九二牽復吉象傳牽復在中亦不自失也郭白雲曰不能辨之于早至二艱矣牽勉强之義非自復之易然勉强能復猶為吉也非二有剛中之德亦將自失楊誠齊曰初安于復故為自復二勉于復故為牽復二雖剛而猶居中故能勉于復雖不及初之自復豈不愈于過剛而不知止者乎故亦許其不自失王秋山曰亦者謂初既以剛正而自道二亦以剛中而不自失也九三輿說輻夫妻反目輻陸氏曰本又作輹車下縳也象傳夫妻反目不能正室也程傳三以陽爻不中密比于四為隂畜制不能前進猶車輿說去輪輻言不能行也夫妻反目謂怒目相視婦制其夫未有夫不失道而妻能制者也故說輻反目三自為也本義剛而不中迫近于隂為所係畜不能自進然以志剛又不能平而與之爭夫妻反目之象張紫巖曰乾為金為圜為良馬有輿輪象互離為目巽多白眼為反目沈守約曰三處健極過舉已形失夫子之義勉義過中失婦道之順兩者俱失豈正室之道小畜之道尚往往則亨說輻未亨也至五然後亨小畜之道貴和和則雨反目未和也至五然後雨以未巽故也王童溪曰初九動之微制之無勞九二動之已形制之已勞九三則行過乎中而剛動之才已極制之之力猶之輿也欲使不行非說去其輻不可夫說輻而使之不行則在我失之强聒而在彼易以怨憝制之于中不若制之于初制之于終不若制之于中人臣之有所畜制者勞逸難易之分此三爻盡之項平甫曰九三反目則稱妻言相敵也上九既雨則稱婦言相順也輿說輻陸氏釋文云本亦作輹按輻無說理必輪破轂裂而後說輿下之輹車不行則說之今畜道止于不行非有破裂之象與大壯大畜同作輹字為長來矣鮮曰乾為夫長女為妻按三所比者小畜之主必為所畜六四畜止三陽三當其際首先受畜故有此象夫畜于妻宜其不能平也孔子罪以不能正室以見若無過舉何事于畜何至為妻所畜此推本之論亦以况臣之所以畜君也六四有孚血去惕出無咎象傳有孚惕出上合志也程傳四處近君之位畜君者也若內有孚誠則五志信之從其畜也卦獨一隂畜衆陽苟欲以力畜之必見傷害惟盡其孚誠以應之則可以感之矣故其傷害逺其危懼免可以無咎此以柔畜剛之道以人君之威嚴而微臣能畜止其欲有孚信以感之四既有孚則五信任之與之合志所以得惕出而無咎惕出則血去可知舉其輕者也五既合志衆陽皆從之矣張紫巖曰四五皆曰有孚君臣之際非孚莫畜惟臣孚于愛君君孚于從臣何咎之有四互體離巽順而明用能有孚血去惕出郭白雲曰以人畜天以柔畜剛非天下之至誠其孰能與于此王童溪曰小畜之成卦在此一爻也稟至柔之才處多懼之地而任畜止之權其憂傷恐懼何如也然吾之誠意既至則金石可動而况于人乎趙復齊曰自三言四乘剛則危自五言四承陽則順重卦故乘剛巽之承陽本體也順上畜下故無傷無恐下畜三陽上奉九五有君人之大德有事君之小心胡雲峯曰中虛為巽之本中實為巽之質小畜四五皆曰有孚此意也唐凝菴曰六四雖為畜主其力甚微故有傷害之懼惟虛中與上合志相孚以畜乾則是非以巽之隂畜乾乃以全巽畜乾矣故無咎觀彖臣而畜君必有壅閼未能通達者惟積誠之至則壅閼可去而情可通如人身之有結滯血去而氣通也九五有孚攣如富以其鄰象傳有孚攣如不獨富也張子六四為衆陽之主已能接之以信孿如不疑則亦為衆所歸故曰冨以其鄰本義巽體三爻同力畜乾鄰象而九五居中處尊勢能有為以兼乎上下故為有孚攣固用富厚之力而以其鄰之象以言能左右之也張紫巖曰君臣交孚王道以昌致之在臣孚之在君九五剛中六四以誠意上交于五而畜之羣陽罔不順比莫可解矣陽實為富巽繩為攣如四五以巽順履乾位內剛外順隂陽交濟為有孚朱漢上曰五近四相得無應以分其志有孚也易言交如者異體交也攣如者同體交也四五同巽體君臣同志攣如也四虛五實而五與之共位食祿四得盡其心能以富用其鄰也相比為鄰巽離亦鄰也王童溪曰此小畜之所以亨也以九居五陽之純也陽之純則為充實充實有孚也六居四隂之純也隂之純為謙虛謙虛有孚也沈守約曰爻變為艮止卦變為大畜能止健也畜道之大成也李蒙齊曰九五剛明中正之君而行巽順柔克之政四以正匡其君五以正用其臣君臣合志四五皆言有孚而五又曰攣如者蓋君臣相信固不固在君而不在臣也何𤣥子曰六四隂虛九五陽實能推其富以助六四是富以其鄰也名以巽止健實以健止健也上九既雨既處尚德載婦貞厲月幾望君子征凶象傳既雨既處德積載也君子征凶有所疑也載音在才再切虞仲翔曰巽稱婦以巽婦畜乾夫以上畜下故貞非隂道之順故厲月幾望者隂之盛也劉長民曰陽老而隂長不已極則反陽密雲不已終為雨也上九居女之長長而不已至坤儀也坤德積而不已至龍戰也程傳既雨和也既處止也既和而止畜道成矣四用柔巽之德積滿而至于成也載積滿也張紫巖曰居上而畜道以成利澤以敷曰既雨既處居此位當此時其周公還歸事乎曰婦貞厲欲其謹守臣道之貞不可一日忘厲也曰月幾望君子征凶欲其用謙持恭于禮不敢少越也蓋上九居五陽先于臣道疑若過亢自非體巽君子莫知自畜而犯義矣朱漢上曰坎為月離日在兌西月望之時也巽為不果疑也按卦有互離為日爻變坎為月幾望之象沈守約曰德者文德之積婦貞厲者戒其不順也疑似也君子以中順為主上九位當畜道之盛則疑于亢矣爻變為坎卦變為需既雨之象項平甫曰居畜之極畜道已成不雨者既雨尚往者既往說輻者為載反目者為婦彖之所謂亨者于是見之德積而成載所畜大矣然以小畜大非可常之事婦道貞此而不變則危君子過此而復行則凶月望則昃隂極則消自然之理臣之畜君固出于正然進而不止則君有所疑能無凶乎既亨之後又以戒之吳草廬曰隂藏于陽之內陽旋繞不已則為風上變為柔則成坎而為雨故曰既雨雨作而風息外陽不復動故曰既處觀彖小之為道臣道也妻道也以小畜大而至于成退而不居可也疑如隂疑于陽之疑按小畜與大畜唯四五一隂二隂之殊而卦之分小大者不在于四五之隂爻也蓋小畜主巽而言巽為隂卦大畜主艮而言艮為陽卦巽德入畜之力小艮德止畜之力大此小大所由名也然則小畜之義自不專主六四一隂而彖傳特舉柔得位而言者以巽之為巽在隂爻也隂地道也臣道也妻道也此隂陽之定分也不可槩以隂為小人觀坤之文言隂亦稱君子矣小畜得位之隂德主巽順非小人也上爻征凶之戒乃于卦終卦外致扶陽抑隂之意猶坤上之龍戰也究之坤上之龍戰與乾上之亢龍一而已皆不可為全卦之正義先儒存小人害君子之見視六四一隂若賊則與彖辭言亨傳言柔得位者相左至以亨屬陽按之卦義未合夫畜有止義藴義序卦物畜然後有禮物畜然後可養則畜之為用妙矣逺矣義取于畜為止為藴皆取其能畜非取其不能畜也所止所藴均指內乾大畜畜極而通小畜畜極而成故畜未成有不雨之歎畜成有既處之占乾陽不貴上進而貴止于內也若以上進為吉則以不能畜為吉卦何取于畜乎兌下乾上中爻離巽項平甫曰履不處也履止訓行畜止而履行二卦正相反對也人之所行未有能外于禮者故序卦謂履為有禮非以禮訓履也李蒙齊曰動以天為無妄是動合乎天德也明乎天為同人人心即天心也悅乎天為履是聖人樂天之道也履虎尾不嘻人亨彖傳履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也程傳天在上澤處下上下之分尊卑之義理之當也禮之本也常履之道也故為履履踐也藉也履物為踐履于物為藉以柔藉剛故為履言履藉于剛乃見卑順說應之義人之履行如此雖履至危之地亦無所害故履虎尾而不見嘻所以能亨也本義履有所躡而進之義以兌遇乾和說以躡剛强之後履虎尾而不見傷之象剛中正指九五也語録上乾下兌以隂躡陽是隨後躡他如踏他腳迹相似故卦之三四爻發履虎尾之義遊定夫曰卦之才以一柔進退履衆剛故有履虎尾象而不嘻人亨者說而應乎乾故也說而不應乎乾則不敬應而非說則不和敬以和何事不行不疚者兑澤下流故也膏澤下于民則內省不疚矣楊龜山曰禮以用和為貴說而應和之至也郭白雲曰履者行道之義乾天道也天下之所難履而行之者故有履虎尾象直取其難非取其為害也然履虎尾有嘻人之患履乾之道者雖難而無嘻人之患唯有亨之理也沈守約曰舄履之履所以藉也步履之履謂之履踐也故履有上踐下藉之義乾以剛踐于上而兌以柔藉于下故曰柔履剛也乾之剛健在上虎也兌之文柔在下尾也故以履虎尾為象蓋六三以一隂為履之主過中處陽界二重剛位非所據履危也然其體則下承上也其情則說而奉乎乾也失其所履而全其所承雖危而無傷是以不嘻人亨王童溪曰履德之基也德有凶有吉吉凶相遼皆自所履始是以君子恐懼戒敬不敢失足書云若蹈虎尾是也吕東萊曰履繫辭獨舉最危者言之何也大抵踐履功夫須于至難至危之處試驗過方始無往不利危無過于履虎尾尊無過于履帝位自履帝位推之自尊及卑自履虎尾推之自危及安天下之時位皆在其中矣項平甫曰卦有二義自下卦言之六三以兌說與乾應下說上和自上卦言之九五以中正臨下雖剛而和皆履虎尾而不嘻者也三自下通上故謂之亨五自上通下故謂之光明是亦亨也不疚以訓不嘻光明以訓亨字朱漢上曰獨于履言帝位者易君德而當君位者五卦否無妄同人遁乾體而無履之時有是德有是時而履是位者唯履而已上下履位物物循理之時也離為明故曰光明胡雲峯曰程傳訓履為踐為藉以上下論也本義有所躡而進以前後論也于尾字尤切涉世多是危機不為所傷乃見所履大傳曰易之興也其當文王與紂之事耶是故其辭危危莫危于履虎尾矣九卦處憂患以履為首說而應乎乾是以下體之兌應上體之乾若蒙曰志應師曰剛中而應是剛柔兩爻自相應比小畜上下應是一爻為主而衆爻應之梁孟敬曰人之于禮亦踐行其天理者故履為禮也和非阿容悅非佞媚亦恭順而不失其正耳兑之剛中而柔外此其道也蔡虛齊曰八卦兌為至弱乾為至健以至弱而躡至健後自是危幾故獨以履名卦按虎于說卦乾兌皆未之及據此卦彖傳之文明以乾為虎諸家以兌西方為虎支矣孔傳因天澤之象推到履帝位亦即以履帝位作履虎尾義精矣凡重卦例一隂一陽者一為卦主此卦六三爻德無取而在全卦自以六三為主游氏一柔進退履衆陽之說最精其所以不嘻人則在卦德也初九素履往無咎象傳素履之往獨行願也荀慈明曰初九者潛位素履謂衣布之士未得居位獨行禮義不失其正故無咎陸公紀曰禮以文為主在禮之初未離于質胡安定曰禮之始率以質素為本往則踐履而行之謂程傳安履其素而往者獨行其志願而己獨專也若欲貴之心與行道之心交戰于中豈能安履其素也張子隂纍不干無應于上故其履潔素正己而不求于人不願乎其外者本義居履之初未為物遷率其素履也游定夫曰素無飾也大行不加窮居不損豈借美于外哉履此而往獨行其平昔之志而已郭白雲曰素有先定于內之義沈守約曰兌體柔順而又居下志剛守下不求于應處下而說當履危之始安時處順獨履素行善履之始是以往無咎非有應也獨行願之象項平甫曰初九重剛其志在行不能使之不往能不失其初心之素則無咎吕東萊曰言人當事事守初心不為地位所移此最教人出門第一步龔泉峯曰赤子之初心未達之所守皆所為素也俞石澗曰履道貴柔不貴剛在履之初而以剛居剛本有咎也唯能安于素履處卑下而不僭則無咎九二履道坦坦幽人貞吉象傳幽人貞吉中不自亂也虞仲翔曰二變成震為道為大塗故履道坦坦程傳九二居柔寬裕得中坦坦平易之道楊龜山曰剛中而承柔異乎六三之履虎尾也故曰履道坦坦居中處說而上無應故曰幽人張紫巖曰二居澤中隂掩之為幽人中正為坦坦互離有明德而又得中蓋臣之能定者朱漢上曰道中正也幽人言靜而無求沈守約曰兌而為震說而動動而行于大塗履道坦坦之象卦變無妄剛自外來而為主于內中不自亂之象邱行可曰履以陽處隂為美二與四同二坦坦而四訴訴二得中而四不得中也吳草廬曰二為地上為人胡雲峯曰柔在其前虛而無礙梁孟敬曰行于道路者由中則平坦從旁則崎嶇以剛居中得其平坦何𤣥子曰二臣位而言幽人蓋謂幽靜恬淡之人履柔行中無所歆羡髙忠憲曰君子雖中天下定四海而幽人之心自若按二居澤中地位變為震為雷藏澤中幽人也離明則能明哲保身爻變中爻為艮思不出位之象故能守貞此貞字當主貞固意且易例中可該正非以貞為戒也况履貴居柔不以不正為嫌六三眇能視跛能履履虎尾嘻人凶武人為于大君象傳眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也本義六三不中不正柔而志剛以此履乾必見傷害耿希道曰視欲正視而不正則眇者也行欲中行而不中則跛者也故歸妹初九不中則為跛九二不正則為眇履六三不中又不正故跛眇兼焉歸妹履皆兌下也楊龜山曰以成卦之才言之說而應乎乾故履虎尾不嘻人亨以一爻言之柔失位不中而上承三陽則履虎尾嘻人凶也郭白雲曰以隂居陽無中正之道又以一柔介五剛之間勢無全人故有眇跛之義夫居五剛之中履于上則不能履于下視于前則不能視于後常有不足之道位不當者歟武人三軍之勇者其視一于進而已其履亦一于進而己此所以唯武人可用是道以有為于大君也其志剛也故爻辭于嘻人凶之後繼以武人為于大君言志剛不言吉凶者明武人可用也履六三九五皆有二義亦如恆之婦人吉夫子凶朱漢上曰離為目兌毁之眇也巽為股兌折之跛也沈守約曰以一隂為兌之主而在乾下履虎尾之象乾為首兌為口健而尚口嘻人凶之象也蔡西山曰眇跛爻柔也能視能履位剛也王秋山曰質暗才弱本不足以有為以當履之時一隂為主適與時遇是以不顧其位不當勇于行而履危蹈禍斯道也唯武人用之以為王事一于進以行其志之剛則可吳草廬曰通指一卦而言上九虎之首也虎口實而合有不嘻之象此據一爻而言三為人位兌口虛而開如人在虎口中故有嘻人象血氣之勇非義禮之勇武人象為謂以膂力之剛而效使令也俞石澗曰大君指九五觀彖凡爻既斷吉凶之後而又加一辭者皆發明占外之意以反決其占也九四履虎尾訴訴終吉象傳訴訴終吉志行也王輔嗣曰逼近至尊以陽承陽處多懼之地故曰履虎尾訴訴也然以陽居隂以謙為本雖處危懼終獲其志故終吉吕藍田曰履道尚行則虎尾不可不履四質剛而志柔懼而獲吉志行也程傳九雖剛而志柔四雖近而不處故能兢慎畏懼則終免于危而獲吉陽剛能行者也居柔以順自處也郭白雲曰舜之志孝也文王之志仁也克諧以孝舜居難而志行也出羑里而請除炮烙文王居難而志行也朱漢上曰動成震為恐懼王童溪曰四處三陽之後故亦曰履虎尾在卦德曰履虎尾不嘻人亨其九四之謂乎沈守約曰乾而為巽巽順也卦變中孚信也近君多懼而能巽順而信是以終吉項平甫曰諸爻皆以位為志初為行願二為中不自亂三為志剛四為志行皆主位言之蓋其所自處如此則其志可知矣三言志剛可見四之志柔四言志行可見三之志不足行皆互文也俞石澗曰初曰獨行願去君逺也四曰志行近君也處履之時居近君位履以和行故六三之志徒剛九四之志則行按乾之初虎之尾也四正當其位故有履象歷危險而德彌修行愈成此爻之謂矣九五夬履貞厲象傳夬履貞厲位正當平聲也張紫巖曰貞厲謂貞其德厲其志德貞志厲夬道乃成得乾中為位正當沈守約曰乾而為離剛而明也剛而明是以能决王童溪曰以剛中履帝位剛則足以有决中而且正則其决也莫不當矣然或不知以危懼自處則剛有時而息中有時而過正有時而變故戒以貞厲當履虎尾之時其危懼戒敬之心不可俄頃而弗置之念况九五之位乎梁孟敬曰乾天下之至健也德行恆易以知險五健之至矣而知險之戒可不慎哉按此爻即彖傳所謂履帝位而不疚者也合之象傳位正當句自無不足之辭貞者中正也厲者乾健也上九視履考祥其旋元吉象傳元吉在上大有慶也王輔嗣曰禍福之祥生乎所履處履之極履道成矣故可視履而考祥也居極應說髙而不危是其旋也程傳上處履之終于終視其所履行以考其善惡禍福若其旋則善且吉也旋謂周旋完備無不至也郭兼山曰視履者猶洪範之五事考祥者猶念用庶徴其旋元吉猶嚮用五福沈守約曰積其行履其所得其終慶其有餘矣蓋履以說而應乎乾為義乾變為兌健而能說得履之道其旋元吉也乾為天兌為澤乾而為兌天澤也大有慶之象張紫巖曰位在乾上兌說承之天應乎上人說于下然且汲汲益視所履思有不合于天者必將修身成已而求致其祥非剛健不息得乾元用九之道其孰能致此哉互離目為視王秋山曰元吉在上謂大善于終也俞石澗曰不失其素而終始如一則元吉梁孟敬曰人之所履者觀之于始則誠僞未可見唯觀之于終然後見也乾下坤上中爻兌震胡雲峯曰三陽來而居內三隂往而居外惟泰卦為然自乾坤至履陽三十畫隂三十畫隂陽之數適相等然後為三陽三隂之泰泰豈偶然哉三隂三陽之卦凡二十而否泰適居其先故卦辭獨以往來言泰小往大來吉亨彖傳泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也虞仲翔曰坤隂詘外為小往乾陽信內為大來蜀才曰天氣下地氣上隂陽交萬物通故吉亨邵子天本居上地本居下而泰則乾下而坤上此天地之用也亦猶火本炎上水本趨下而既濟則離下而坎上此水火之用也程傳不言元吉元亨者時有汚隆治有大小雖泰豈一概哉言吉亨則可包矣本義泰正月之卦楊龜山曰小者未往則隂為內主陽無自而到故小往而後大來否反泰者也故大往而後小來小人在內而能進君子者未之有也夫天地交則氤氲而化醇故萬物通上下交則貴貴尊賢之義明故其志同內陽而外隂以二體言內健而外順以卦之才言內君子而外小人君子道長小人道消以卦之時言有其體而後有以成其才有其才而後有以御其時三者備而泰之為泰吉亨之道盡矣朱漢上曰萬物通天地之泰也其志同君臣之泰也不交則不通不同則不交以氣言之內陽而外隂則通以德言之內健而外順則通以天下言之內君子而外小人則通泰者通而治也張紫巖曰陽自內來一為復二為臨三為泰至泰剛德成矣剛內為泰其心剛也剛德之君子悉處于內小人何所容跡言致泰者在君心之剛而已王童溪曰以天地人事而兼言之內陽而外隂則發生自我而隂則順承之內健而外順則建立自我而衆皆退而聽之此天下之泰也李隆山曰當泰通之世陽來于內隂往于外陽在內而實則吉氣勝而為亨也觀之一身陽浮于上隂涸于下病必繼起須二氣升降于一身之中然後血氣流通四體健固此理無適不然吕東萊曰內君子外小人則小人趨事赴功反為君子所役初不必去小人也泰內健而外順否內柔而外剛何也否則上下不交有天地之形而無天地之用故不言健順項平甫曰凡小人得志必害君子君子得志未嘗使小人失所故泰于吉之下又加一亨字明泰之福所及者公物無不遂也彖具三義第一段於隂陽二氣無所抑揚取其交而已第二段以內外為義雖在內在外各得其所要是重內輕外已有抑揚第三段以消長為義全是好陽而惡隂沈守約曰泰顯履之效也未有履而不交者未有交而不泰者邱行可曰天地之形不可交而以氣交上下之分不可交而以心交蔡西山曰陽本在上之物自上而下故曰來坤本在下之物自下而上故曰往按六十四卦六爻皆相應而又皆以陽下隂應隂為應之極正者莫如泰故曰上下交而其志同也初九拔茅茹以其彚征吉象傳拔茅征吉志在外也劉子政曰賢人在上位則引其類而聚之于朝在下位則思與其類俱進虞仲翔曰三陽俱志在外初為類首已舉則從若茅茹也上順而應不為違距進皆得志故以其類征吉也初應四外謂四也程傳以陽爻居下是以剛明之才而在下也時將泰則羣賢皆欲上進三陽之志欲進同也故取茅茹彚征之象志在外上進也楊誠齊曰君子志在天下不在一身故曰志在外吕東萊曰當泰之初賢人彚征人君不能遍識必首先用一大賢則天下賢人自然牽連而進如舜舉臯陶而元凱進湯舉伊尹而仲虺進蔡西山曰在外謂應隂也隂為民君子在內則恩澤及乎民胡雙湖曰易取茅象凡三泰取陽爻否大過取隂爻否泰以有互體震巽也荀爽謂震為蕃鮮李鼎祚謂巽為草木泰互震為茅三陽為根否互巽為茅三隂為根大過藉用白茅亦巽體上有兌金乃已刈之茅用以藉地一隂不可以茹言茹則言拔藉地不言茹白亦取巽象吳草廬曰茹根也彚類也三陽為類茅雖不共本拔之則其根相連而起初之以其類同進似之按卦言大來爻言征行者蓋彖主成卦之全象而言爻則主乾陽之時義而言三陽初泰時為正月春氣始動方進而四陽五陽以至純乾正所謂道長之時也在本卦則上交之道也九二包荒用馮河不遐遺朋亡得尚于中行象傳包荒得尚于中行以光大也王輔嗣曰尚猶配也中行謂五程傳二以陽剛得中上應于五五以柔順得中下應于二君臣同德是以剛中之才為上所專任故二雖居臣位主治泰者也所謂上下交而其志同也故治泰之道主二而言以含容之量施剛果之用周及庶事遐逺不遺若事之微隱賢才之在僻陋皆遐逺者也絶去其朋與之私斷以至公而必行有此四者故曰得尚于中行朱漢上曰兌為澤河之象也震足蹈川徒涉也陽與陽為朋二絶其類而去朋亡也六五柔中以下九二九二剛中以配五其道光大時已泰矣苟淺中不能容之則輕人才忽逺事植朋黨好惡不中不足以厭服人心天下復入于否中行者所以存泰也張紫巖曰坤隂在上包荒象隂荒也馮厚齊曰遐謂外三隂朋謂內三陽蔡節齊曰泰之六爻惟此以剛居中故備泰之道王秋山曰乾之大故能包荒乾之健故能馮河覆而無外故不遐遺剛而得中故能朋亡所以能合乎中行之君而致泰之盛也尚尚主之尚配合也應六五歸妹之義龔泉峯曰初九以其彚九二則欲其朋亡何也初九在下之賢則欲其引類而進九二大臣惟亡其朋類則能用天下之賢吳草廬曰二變為柔互坎為水互震為足錢啓新曰二五同志以有為合交以成用將極地之所載而為之治先際天之所覆而為之包荒全坤之勢包全乾之量龍麟洲曰乾包坤故曰包荒易外地大故曰荒包荒者天在地下地之下皆天地大而天更大二天也五之地在其中有包之象觀彖此四者必以包荒為本包荒者天地之心也然非用馮河則吾道不伸非不遐遺則所處不當非朋亡則或牽于私故必斷而明明而公然後有以濟包荒之用而合乎中道與論語所謂寬信敏公相似九三無平不陂無往不復艱貞無咎勿恤其孚于食有福陂彼僞反傾也象傳無往不復天地際也張子因交與之際以著戒能艱貞則享福可必郭白雲曰否泰之道如循環終則有始可不預戒乎九三下體之上位已過中故以平陂往復而思戒艱若周公之無逸貞若成王之持守九三六四是天地相交之際張紫巖曰互兌兌口為食互震震以恐致福項平甫曰無平不陂為三陽言無往不復為三隂言兩言無不者明此皆天道之必至者也艱則不敢易貞則不敢弛乾之九三固能乾乾夕惕雖危無咎者也用以居泰不亦宜乎錢啓新曰乾體恆易為平三過中與四撰兌毁下乾之體不全無平不陂之象焦弱侯曰三四爻兩孚字正相應三孚四四孚三彼此相信所以為交泰易外泰之時天下于地而與地際地上于天而與天際三當天下地上之際乃隂陽之㑹屈伸之交故曰際泰之交以孚為本艱貞故孚合訂平泰也陂否也泰不可常無有泰而不否者所以泰者隂往居外之故隂非長往無有往而不復者艱謂憂勤惕厲貞謂誠慤敦固艱則知危不危可勿恤矣貞則誠信感格而有孚矣豈但無咎且將食福此保泰之道也勿恤其孚作兩句讀謂勿恤也其將孚乎孚則格人亦格神故曰食福胡滄曉曰泰六爻皆具泰義此爻在泰卦之中正天地相接之際正所以發能交之義六四翩翩不富以其鄰不戒以孚象傳翩翩不富皆失實也不戒以孚中心願也宋仲子曰四互體震翩翩之象隂虛陽實故言失實九家易曰乾升坤降各得其正隂得承陽皆隂心之所願也張紫巖曰泰至是而盛四自內為三隂首下從羣陽其順若飛鳥有翩翩勢其心若一不戒以孚安有害治于後哉三隂為鄰隂從陽為孚趙復齊曰從六五下賢其心休休焉者也沈守約曰四處上體近君之位三陽既進樂與賢者共之志同願得坤勢下順變而為震動而下順翩翩之象陽實隂虛四居坤下不富之象李蒙齊曰上以謙虛接乎下下以剛直事乎上上下相孚乃君臣之交泰也故下三爻皆以剛直事其上上三爻皆以謙虛接乎下四當二卦之交故發此義上三爻虛中無我翩然而來接下之道皆出乎中心之誠不待人之戒告而後能鄰謂五與上故四五皆稱行願在下卦之初則明以彚交于上在上卦之初則明以鄰交于下蓋上下交而其志同也俞石澗曰三交其上勿恤其孚故四交于下亦不戒以孚失實與逺實同隂之從陽猶貧之依富也三隂在外而失所依故曰皆失實何𤣥子曰此孚與三其孚相應所以專屬三者三四相接四為隂首也孚于三則衆陽皆見四先孚三則羣隂畢從交泰窽繫實在于此郝景山曰坤耦下翩翩之象觀彖交泰之義于四五兩爻發之按此爻說易者泥于彖辭往來二字遂以隂之下交為害正之象夫彖主成卦而言爻主時位而言成卦主大小時位則主上下當泰之時其道貴交故陽本來也而彚征得尚則皆以往為義隂本往也而翩翩歸妹則皆以來為義此六爻之往來正所以為交泰也不然上下不交何以名泰苟于四而惡隂之來亦將于初而慮陽之往乎六五帝乙歸妹以祉元吉象傳以祉元吉中以行願也陸公紀曰五以柔在上帝女之象下配于二下嫁之象天降于下猶男下于女天復于上地復于下天地之大義地以順而承天也五志于順故獲祉福天地助順故必元吉居中降志故曰中以行願程傳史記謂湯為天乙其後有帝祖乙帝乙多士曰自成湯至于帝乙此稱帝乙未知孰是六五以隂居尊下應九二剛明之賢而順從之如帝乙之歸妹降尊就卑以順從其夫也故能成治泰之功郭白雲曰泰之所為天地交者以臣有乾德而居下君有坤德而居上是以謂之交也六五以謙尊自居用坤之六得黃裳之道下二以成其政所謂上下交也元吉非一人之吉而天下之吉所謂敷錫庶民者也以祉福天下也楊誠齊曰王姬之貴不有其貴而貴其夫君人之尊不居其尊而尊其賢此六五以柔中之君而下從九二剛中之臣也任其臣以致泰泰福溥于天下君之願欲孰大于是項平甫曰泰之所以成泰者以九二六五上下相交治泰之事皆九二主之六五降心以享其效而已張舜元曰互體兌約象震有歸妹卦體李西溪曰五歸妹而二尚主交際之義胡雙湖曰泰中四爻固互歸妹泰五即歸妹之五故其辭同上六城復于隍勿用師自邑告命貞吝象傳城復于隍其命亂也虞仲翔曰隂皆乘陽行不順故勿用師坤為邑震為言兌為口故自邑告命程傳掘隍土積纍以成城如治道積纍以成泰泰終為否如城土頽地復反于隍也泰之終民心離散豈可用也衆不可用方自其親近者而告命之雖得其貞正亦可羞吝本義命亂故復否告命所以治之也沈守約曰坤變為艮艮土之聚也土聚而附于地城象土聚而極于危則剝而圯復隍象鄭東谷曰處泰之終坤體而隂柔泰安得不亂處否之終乾體而剛陽否安得不傾人事天理未有不相符者王秋山曰若以剛健之才處之扶顛持危亦自有道故不曰凶而曰吝劉保齊曰泰取上下交故六爻之中相交之義重初與四交泰之始故初言以其彚如茅之連茹四言以其鄰如鳥之連翩二與五交泰之中故五言人君降其尊貴以任大臣二言大臣盡其職任以答夫君三與上交泰之終故三言平變而為陂上言城復而于隍天運循環有必然者而保泰之意隱然有不容不恐懼者焉來矣鮮曰不能保邦于未危之先而罪已下詔于既危之後亦可羞矣命猶政令唯其命亂所以復否聖人于泰終而歸咎于人事其戒深矣髙忠憲曰國家命亂遂成復隍然聖人于此猶有道焉曰勿用師自邑告命而已雖貞吝尚可自守合訂自邑告命如德宗在奉天詔書所到軍士涕零唐祚不絶非盡軍旅之力按坤土在上中爻震動兌毁有牆髙基下根搖木撥之象為城復于隍坤下乾上中爻艮巽否之匪人不利君子貞大往小來彖傳否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也石守道曰否之者匪人也天也故君子遇此則儉德避難而不憂也樂天而已矣孔子曰道之將廢也與命也孟子曰吾之不遇魯侯天也與否之彖合矣張紫巖曰用君子必治用小人必亂此古今不易之理今舍君子而用小人必以小人為君子矣非天奪之鑑而然乎聖人曰否之匪人慨歎之辭也王童溪曰不云其志不同而云天下無邦何也曰建邦設都唯以亂民否時上下不交所謂邦者未嘗無也然亂民之責屬之誰乎有邦猶無邦也朱漢上曰乾坤不交震反成艮艮者萬物之終也故曰萬物不通項安世曰以天道言之內隂外陽則死內陽外隂則生以人道言之內柔外剛則為小人內健外順則為君子以世道言之內小人外君子則為亂世內君子外小人則為治世合而言之消長二字而已王秋山曰不利者舉天下事事物物皆不利也當此之時為君子者尤宜貞固以自守故曰君子貞俞石澗曰健順德也剛柔質也否之時隂柔用事于內肯順君子哉順則不否矣故不以健順言而但以剛柔言柔者易以親故在內剛者易以疏故在外來矣鮮曰否之者非人也乃天也即大往小來也不利即萬物不通天下無邦道長道消也君子貞者即儉德避難不可榮以祿也否之匪人者天數君子貞者人事程朱以為非人道似無道字意誠齊以為用非其人似無用字意觀彖君子之貞隨時消息豈有不利者乎按之匪人三字自孔仲達以來多以用小人而致否立說意在垂戒不欲直指為天道也朱子又云或疑三字衍文當亦以舊解為不安耳夫治亂循環必致之數周公于泰爻辭明言無平不陂無往不復孟子所謂斯二者皆天也天地之氣有春生必有秋殺一部易象無非天道否泰皆天也保泰傾否則人道也正不必諱言天數初六拔茅茹以其彚貞吉亨象傳拔茅貞吉志在君也荀慈明曰謂三爻同類相連欲在下也貞正謂正居其所則吉也李氏鼎祚曰初六巽爻巽為草茅象吕藍田曰以柔處下臣之分也上下不交共以聽命有死無他臣之正也引類守正以保其身時雖不泰其道亨矣胡安定曰引類而退守道以正程傳泰之時以同征為吉否之時則以同貞為亨始以內小人外君子為否之義復以初六否而在下為君子之道易隨時取義變動無常否之三隂上皆有應在否隔之時故無應義初六能與其類貞固其節則處否之吉而其道之亨也爻以六自守于下明君子處下之道象復推君子之心固未嘗不在天下也張子柔順處下居否以靜者也能以類正吉而必亨不事苟合志在得主者歟郭兼山曰先大夫有言居廟堂則憂其民處江湖則憂其君蓋泰言志在外否言志在君之意也郭白雲曰志在君者君子儉德避難豈忘君哉伊尹樂堯舜之道其愛君至矣時泰矣君子引類而出出則進于位時否矣君子引類而處處則進于道也王童溪曰以其類貞而吉且亨者詘身以伸道故無往而不吉不亨也吉謂免禍亨謂仲道志在君言行止雖繫于時而君子之志于君無往而不在也項平甫曰初動為震震草在下艮手反拔之拔茅之象沈守約曰坤而為震以順動也卦變無妄動不妄也王伯厚曰貞吉潔其身以有待吳草廬曰互巽為茅初二柔畫茅之茹觀彖凡隂陽消息因其時而論其義不必定以爻為人泰之拔茅拔而進否之拔茅拔而退也儉德避難所謂貞也逺小人之害故吉守道以俟時故又有亨道按易以卦明時卦之立義以全卦取象六爻則各隨其爻之象而合之卦之時義以消息其吉凶故常與全卦之義絶不相蒙易以隂陽消長之義立卦者如姤復則一隂一陽之長夬剝則一隂一陽之消臨遁則二陽二隂之長聖人扶陽抑隂之意辭嚴于彖及周公繫爻則復者六爻皆有復義遁者六爻皆有遁義若泥彖辭全象則復在一陽何以隂亦言復遁在四陽何以隂亦言遁諸卦皆然可見周公爻辭變動不居其大例也此卦六交皆言處否之道不必仍以隂為小人程說最精以為小人連類而進者泥矣夫小人之所以為小人者唯以其不正也不知有君也若能正能志在君則君子耳何得指為小人何從定其初為小人而變為君子者耶蓋初本坤順前遇互艮止而不進不交之象初變則卦成無妄所以能守正而獲吉且亨乾為君坤初以順而應乎乾故曰志在君明乾之為君以見坤之為臣主臣而言即不復主小人而言也六二包承小人吉大人否亨象傳大人否亨不亂羣也荀慈明曰大人謂五二五相應否義得通故曰否亨王輔嗣曰居否之世而得其位用其至順包承于上王秋山曰六二質雖隂柔而居中得正處否之時猶小人中之君子也小人之吉九五大人之否賴之以濟故曰大人否亨是以二曰小人吉五曰大人吉君臣對言中正故也處羣隂之中而中正獨立是不雜亂于其羣也故大人之否賴之以亨俞石澗曰六二涅而不淄者也易外乾在上坤順而承之故坤之彖曰乃順承天德濟齊曰小人作亂乃君子之否今六二乃率其羣隂而順君子故君子之所否者乃亨矣象曰大人否亨而小人之吉亦在其中六三包羞象傳包羞位不當也張子處否而進履非其位非知恥者也郭白雲曰當過中思變之時六三不能變以有為尸祿素餐邦無道穀恥也楊慈湖曰六三德不如六二而位益髙有愧于中故曰包羞按包承包羞二包字說者不一程傳皆以包畜為訓則包字無著本義訓包承為包容夫以君子而至為小人所包容聖人必不忍為是言也或以為二包初三包二於義亦無謂項氏以易中稱包皆謂陽包隂考包荒包瓜包有魚皆于陽爻言之故可定所包為隂與本文隂爻文勢不同考包字訓同括字坤之括囊亦包義也則不可以包主于陽矣愚謂此二爻包字即初爻之彚泰四之鄰否四之疇皆言乎其類也蓋此二卦三陽三隂無論交與不交皆截然分類與他卦不同故多以類言之二爻象傳之言羣亦其義也六二居中得正為坤道之美故能包舉初三以承順乎乾六三居衆隂之上勢得包其同類故皆曰包象傳于六二曰不亂羣者美六二也當否之時上下不交獨二以中正上應中正率類以承陽否之所以可亨者在此猶剝之六三獨與上應象稱無咎而傳以失上下美之也說者以不亂羣為大人夫既為大人何至與小人為羣而曰不亂且何以繫之六二耶于六三曰位不當者憫六三也以不中正之才艮止則不能上進巽順則不敢為惡當否道將革之時以居下卦之上徒包納羣醜以重其辱為世指目故聖人憫之謂不居其位則可免于羞耳譏其不能守君子之貞也九四有命無咎疇離祉象傳有命無咎志行也九家易曰巽為命謂受五之命以據三陽故無咎程傳四以陽剛健體居近君之位是有濟否之才而得髙位者也然當君道方否之時處逼近之位所惡在居功取忌而已若能使動必出于君命威柄一歸于上則無咎而志行矣本義命謂天命楊龜山曰東漢之衰嬖幸持權竇武何進倚元舅之親招集天下名儒碩德共起圖之宜若可為然命不出于君而下不應故與疇類皆陷于禍張紫巖曰四居互巽中有剛德而巽順事上故能承命以動均福其類其至誠恭順之心未嘗自用而忘君云三陽為疇陽實為祉沈守約曰巽為申命為行權能申君之命以行其權有命之象項平甫曰泰九三于無咎之下言有福否九四于無咎之下言疇離祉者二爻當天命之變正君子補過之時也當否之時苟無天命四雖有志可若何哉泰雖極治以命亂而成否否雖極亂以有命而成泰命者天之所令君之所造也道之廢興豈非天耶世之治亂豈非君耶徐進齊曰有命無咎即泰無平不陂之義言隂陽往來泰否反覆天運固如此也王秋山曰既有命則上之意不惑于羣小可知故四可無咎而濟否之志得行胡雲峯曰泰變為否易故于內卦即言之否變為泰難故于外卦始言之俞石澗曰四為近君大臣有剛健之才其志柔弱非奉九五之命不敢自擅是以無咎有命無咎則向者在君之志得以行矣吳大年曰三隂上進四撰艮止之何𤣥子曰居上卦之始能力持隂陽交戰之衝衆正賴之按當否之時君命久不下行九四處將濟之時變而為觀有觀示四方之象承君命以宣布逺近號令諸侯以共濟其否如天寶播遷得靈武之信六軍鼓舞也爻辭有命二字極精采君命即天命靜觀者歸于天命致用者則全恃君命也九五休否大人吉其亡其亡繫于苞桑象傳大人之吉位正當也當平聲程傳有大人之德而得至尊之正位能休息天下之否張子以亡為懼故能休其否張紫巖曰慮患若繫馬于柔桑者然苞桑民柔象也書云若朽索之馭六馬繫桑之義也巽木為苞桑巽繩為繫沈守約曰乾而為離剛而且明德也卦變為晉明麗于尊位也是以能休否吳草廬曰人依木傍以息曰休互巽為木人情厭亂冀得休息九五陽剛中正之大人如木有芘䕃可依以休息于否將變之時也俞石澗曰否至五否將傾矣大人處此則安詳和緩不動聲色而措天下于泰山之安故曰休否不然荒忙急迫適以激其變非吉之道其亡其亡警之至也桑之方苞弱而不可繫物以此為戒而防其亡則存可保桑柔木詩柔桑是也草木叢生曰苞來矣鮮曰巽為隂木柔桑之象以國家之大不繫于磐石之堅固而繫于苞桑之柔小危之甚也按苞桑諸儒皆以為堅固不拔之義細玩爻位休否尚未至傾否世亂略平國危乍定民氣初靜而未安人心初集而未固苞桑之繫正狀其危張氏俞氏來氏說優上九傾否先否後喜象傳否終則傾何可長也程傳上九否極故否道傾覆而變也否傾則泰後喜也王童溪曰言傾否而不言否傾人力居多焉朱漢上曰否毁兌成如決積水而傾之莫之能禦也兌為悅隂陽得位為喜巽為長王秋山曰何可長也者幸之之辭也俞石澗曰否終則倒轉而為泰故曰傾否如損極則成益益極則又成損明乎此則知彖傳所謂剛柔上下之義矣周易孔義集說卷三
