body:
  text: 周易孔義集說卷十七光祿寺卿沈起元撰大象傳孔仲達曰十翼之中第三翼總象一卦故謂之大象凡六十四卦說象不同總包六爻不顯上體下體則乾坤二卦是也或直舉上下二體者若雲雷屯天地交泰凡十四卦或有舉兩體上下相對者天與水違行訟上天下澤履凡四卦或直指上體而為文者若雲上于天需風行天上小畜凡十五卦意取上象以立卦名也亦有先舉下象以出上象者地上有水比澤上有地臨凡十二卦亦意取上象共下象而成卦也或先舉上象而出下象義取下象以成卦義者山下有泉蒙地中有水師凡十三卦或有雖先舉下象稱在上象之下者若雷在地中復天在山中大畜明入地中明夷澤無水困亦義取下象以立卦也項平甫曰卦有吉凶善惡而大象無不善者如剝與明夷人君無用隂剝陽之理則當自剝以厚下君子無用暗傷明之事則當自晦以涖衆諸大象例皆然故大象與彖辭無同文者苟同義焉無所復用大象矣胡雙湖曰大象皆著以字即一以字示萬世學易之凖俞石澗曰稱上稱大人者皆一稱先王者七稱后者三稱君子則五十三易蓋為君子謀不為小人謀也天行健君子以自强不息孔仲達曰天體之行晝夜不息周而復始無時虧退故云天行健君子以自强不息此以人事法天胡安定曰以字明其用易也自與晉自昭明德之自同用功在我非由乎人也自强象乾之健不息象乾而又乾本義凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能趙汴水曰諸卦皆舉卦名惟乾言健案集韻乾渠焉切或作􅪫當是􅪫訛為健按孔氏以不言天行乾而言健所以尊乾異于他卦者非也其實乾健二字乃聲之訛爾地勢坤君子以厚德載物本義地之象亦一而已故不言重而言其勢之順則見其髙下相因之無窮至順極厚而無不載也馮時行曰法坤以厚德法重坤以載物天地民物之責聖賢道學之傳非德之厚孰能載之李去非曰天以氣運曰行地以形載曰勢雲雷屯君子以經綸張子雲雷皆是氣之聚處屯聚也本義經綸治絲之事經引之綸理之屯難之世君子有為之時郭白雲曰坎在上為雲坎在下為雨項平甫曰經者立其規模綸者糾合而成之經以象雷之震綸以象雲之合吳草廬曰君子治世猶治絲欲解其紛亂屯之時必欲解其鬱結山下出泉蒙君子以果行育德本義泉水之始出者必行而有漸王童溪曰泉水之源所謂純一而不雜者項平甫曰果行象泉之出育德象山之深徐進齊曰蒙而未知所適必體坎之剛中以果決其行而達之蒙而未有害必體艮之靜止以養育其德而成之真西山曰果行如水之必行育德如水之有本雲上于天需君子以飲食宴樂孔仲逹曰雲上于天是天之欲雨待時而落所以明需司馬溫公曰雲上于天萬物䕃之滂沱下施萬物飲之以豐以肥以榮以滋故君子以飲食宴樂程傳雲氣蒸而上升于天必隂陽和洽然後成雨故為須待之義隂陽之氣交感而未成雨澤猶君子蓄其才德而未施于用君子觀需之象懷其道德安以俟之飲食以養其氣體宴樂以和其心志居易以俟命也張紫巖曰飲食宴樂蓋自養象雲上于天利澤必下君子觀象養其身以養人至九五需于酒食則養人之功博矣項平甫曰飲食以養陽象坎宴樂以養隂象乾飲食宴樂需客之具古語宴客為需王童溪曰雨為萬物之所需須此以養也物得所養則得其生人君之待天下使之各盡其耕鑿之利此養天下之道也使之仰父俯子嬉遊順適而無追胥勞擾之害此宴樂天下之道也需之義也吕東萊曰飲食宴樂涵養此理而已吳草廬曰飲食者各因其自養之素如夫子之飲水疏食顔子之一簞一瓢宴身安而他無所營作樂心愈而他無所謀慮坎為酒飲也中爻成兑食也陽居內有宴安象陽舒為樂樂天不憂象按聖人一言包藴無窮飲食宴樂自養養人皆是合觀諸說義乃完足天與水違行訟君子以作事謀始本義天上水下其行相違作事謀始訟端絶矣項平甫曰乾陽生于坎子坎水生于天一乾坎本同氣而生者也一動之後相背而行遂有天淵之隔天下事不可以細微而不謹不可以親昵而不敬禍難之端夫豈在大吳草廬曰作事坎象謀始乾象坎水流行如有事作為乾知大始能說諸心觀彖理明于素則爭心不生慮周于先則爭端不起地中有水師君子以容民畜衆本義水不外于地兵不外于民故能養民則可得衆楊誠齊曰君子容民如地容水能容受之斯能畜聚之劉習靜曰居則為比閭族黨之民役則為伍兩軍旅之衆衆即民也容之畜之于無事之日用之于有事之時項平甫曰地之能固以其中有水他水所以畜地君子之于民浸潤之道深入乎其中所以能涵蓄萬衆而不分也容畜屬坎民衆屬坤王童溪曰散漫而不一者水衆象也翕受而無遺者地君子之德也有翕受含洪之德則平居知有尊君死長之義一旦驅之死地則捐軀效命謂容之畜之者所以能用之也張紫巖曰水居地中容而有制君子法象不容無以得天下心不畜無以制天下命觀井田丘乘法師象見矣師五得坤中盡容畜意吳草廬曰地猶人之肌肉水猶人之血脉地中有水猶人肌肉中有血脉灌注之也以地之至廣而水之灌注無不周遍猶人之至衆而將之統禦無不管攝故卦名師易外地中有水不見其水而無地非水容民畜衆不見其衆而無民非衆使小人樂樂而利利君子賢賢而親親而師道盡矣地上有水比先王以建萬國親諸侯程子建萬國以比民民不可得而盡比故建諸侯使比民而天子所親者諸侯而已是比天下之道本義地上有水水比于地不容有間建國親侯先王所以比天下而無間者王童溪曰物相比而無間者莫若水子夏傳曰地得水而柔水得地而流也君民之勢亦然建國親侯使上下逺近脉絡相通則君臣之勢交相比矣朱漢上曰坤為衆封建自古不廢夫子必曰建萬國者衆建諸侯而少其力也項平甫曰水與土同生于申而衰旺死生無不同之故先王象之以立封建之法亦所以同其盛衰而為至親不可解之䇿也萬國象地諸侯布其上象水風行天上小畜君子以懿文德程傳畜聚為藴蓄之義君子所藴蓄者大則道德經綸之業小則文章才藝君子觀小畜之象以懿美其文德本義風有氣而無質能畜而不能久故為小畜懿文德言未能厚積而逺施也游廣平曰風之柔無所不入地類也故有文德之象舜格有苖文德之懿也仲山甫柔嘉維則令儀令色則所以畜宣王者文德而已矣楊龜山曰小畜之時以柔畜剛故君子以懿文德逺人不服則修文德以來之畜剛莫大乎文德也王童溪曰何為懿曰積小以至大由微而至著之謂也王荆公曰小者之畜其可以暴為之乎懿文德為之不以暴也沈守約曰風行天上有聲而無實猶德蘊胸中有心無用是以懿文德而已蓋巽之用為潔齊為號令為行權其在天下則為姤后以施命誥四方其在地上則為觀先王以省方觀民設教今在天上未能潔齊于物未能號令于時未能行權于道是有聲而無實但作密雲而未能雨澤以及下也上天下澤履君子以辨上下定民志程傳天在上澤居下上下之分尊卑之義天下之正理也君子觀履之象以辨别上下之分以定其民志夫上下之分明而後民志定民志定然後可以言治古之時公卿大夫而下位各稱其德終身居之得其分也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至于公卿日志于尊榮農工商賈日志于富侈億兆之心交騖于利天下紛然如之何其可一也欲其不亂難矣張紫巖曰澤氣上通其性悅禮必人情通悅而後可久且澤水靜止象民志之定項平甫曰天上地下其分自絶不必辨也天上水下其志自乖不必定也唯上天下澤則澤之氣常行于天而天之分自嚴于上故為行而不處之象又為辨而能定之象此其所以合于禮也辨上下乾之斷定民志兑之說朱漢上曰巽為不果疑也古之治天下者思去民之疑志以定之耳沈守約曰履者禮也禮由隂作以治陽也樂由陽來以治隂也一隂生于姤姤隂始遇也天地相遇品物始章禮之本也由姤而升一隂至三而為履剛柔之勢始立矣于是制禮焉以辨上下定民志雖有剛武不能暴文柔制禮之時也自姤而升由隂作也而居于三治陽也一陽生于復復德之本也由復而升一陽至四為豫雷已奮而上逹矣于是作樂焉以薦上帝配祖考上律天時而下順民心作樂之時也自復而升由陽來也而居于四治隂也履道貴謙不喜處盈卦之陽爻皆以不處其位為善趙復齊曰乾父也八卦之始至尊兑少女也八卦之終至卑故取上天下澤也楊誠齊曰天髙地下澤又下之下者天地交泰后以財成天地之道輔相天地之宜以左右民蘇子瞻曰物至于泰極矣不可以有加矣故財成輔相以左右民使不入于否而已否未有不自已甚者始左右之使不失其中則泰可以常有也本義財成以制其過輔相以補其不及郭兼山曰子為天正丑為地正寅為人正自子至寅三陽生而三才之道備故泰者可以備人事以奉天時之時也朱漢上曰泰者天地交也財成輔相者以人道交天地也坤為民財裁古通用張紫巖曰箕子陳洪範自五行至五福六極財成輔相之道舉備其中郭白雲曰泰之時萬物盛極而人不知節故財成輔相以天地交泰之道左右吾民也蔡節齊曰天地之道以氣形全體言天地之宜以時勢所趨言氣化流行聖人為之裁制以分春夏秋冬之節地形廣邈聖人為之裁制以分南北東西之限春生秋殺此時運之自然髙黍下稻此地勢之所宜聖人輔相之使春耕秋斂髙者種黍下者種稻天地不交否君子以儉德辟難不可榮以祿郭白雲曰儉德辟難與疏且逺者言也楊誠齊曰非能忍天下不可忍之窮不可避天下不可避之難窮之不忍誘之者至矣誘之所投禍之所隨唯不可榮以祿則免矣項平甫曰儉德避難不與害交也不可榮以祿不與利交也此君子所以體天地不交之象不可榮猶言不可得而榮儉德屬地之嗇不可祿屬天之髙趙復齊曰儉損其德謂韜光晦迹不見于外按儉德即括囊之義處濁世而聞望顯著祿一及難不免矣天與火同人君子以類族辨物虞仲翔曰方以類聚物以羣分君子和而不同故于同人以類族辨物也蘇子瞻曰水之于地為比火之與天為同人同人與比相近而不同不可不察也比以無所不比為比同人以有所不同為同程傳不云火在天下天下有火而云天與火者天在上火炎上火與天同故為同人之義君子以類族辨物各以其類族辨物之同異也若君子小人之黨善惡是非之理物情之離合事理之異同凡同異者君子能辨明之故處物不失其方也王童溪曰同人所以為同者非渾然無所區别之謂類物之族而後物得所辨則以不同同之乃所以為同人馮厚齊曰類族如天之兼覆辨物如火之燭照趙復齊曰乾與離其卦殊天與火其物異故君子同天下之理不同天下之物合訂類族猶孟子之類萃大善與大善為類族小善與小善為類族君子之辨物辨以此也辨則不同矣唯有不同而後有同良楛美惡之不齊物之情也親疏厚薄之異等人之倫也去稂莠所以植嘉禾逺小人所以親君子若渾而同之是大亂之道也火在天上大有君子以遏惡揚善順天休命司馬溫公曰火在天上明之至也至明則善惡無所舛慶賞刑威得其當然後能保有四方以順天休命本義所有既大無以治之則釁孽萌于其間矣天命有善無惡故遏惡揚善所以順天反之于身亦若是而已趙復齊曰明能辨善惡健能遏而揚之楊誠齊曰天討有罪吾遏之以天天命有德吾揚之以天吾何與焉故曰順天休命同人離在下而權不敢專故止于類而辨大有離在上而權由已出故極于遏而揚地中有山謙君子以裒多益寡稱物平施石守道曰山髙則損之地卑則益之是損山之髙益地之卑也夫損髙而益卑損多而益寡乃稱物平施蘇子瞻曰謙之為名生于過也物過然後知有謙使物不過則謙者乃其中耳過與中相形而謙之名生焉聖人即世之所名而名之其實則反中而已地過乎卑山過乎髙君子多者取之謙也寡者益之亦謙也本義以卑蘊髙謙之象裒多益寡所以稱物之宜而平其施亦謙之意語録人多見得在己者髙在人者卑謙則抑己之髙而卑以下人便是平也朱漢上曰裒荀鄭諸儒讀作捊取也字書作掊山在地中則髙者降而下卑者升而上髙卑適平上三隂多也下二隂寡也艮為手掊也故君子取有餘益不足以貴下人則貴賤平以財分人則貧富平以德分人則賢不肖平然平非漫無尊卑上下差等也稱物而施適平而止平者施之則也坎為水天下之平施者無若水也郭兼山曰裒多益寡德之盛稱物平施禮之恭馮厚齊曰凡大象皆别立一意裒多益寡稱物平施非君子謙德之象乃君子治一世使謙之象也楊龜山曰何謂稱物逺近親疏各當其分所謂稱也何謂平施所以施之其心一焉所謂平也胡雙湖曰地雖卑而多山雖髙而寡今地中有山有裒多益寡象乃稱物平施也一陽在中有衡平之象五隂有物與施之象易外山之末在地上而本在地中地中有山山之本也山藏其本而見其末此山之謙也水伏流于地中不見其形水之謙也謙兼隂陽二土二土之德故曰謙其德博厚而皆平故曰以平施雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考鄭康成曰奮動也雷動于地上萬物乃豫也人至樂則手欲鼓之足欲舞之王者功成作樂以文得之者作籥舞以武得之者作萬舞各充其德而為制祀天帝以配祖考使考與天同其饗也荀慈明曰樂者聖人因人之豫而節之所以養其正而間其邪其和可以感鬼神而况于人乎司馬溫公曰雷出地春分候也春分之時雷迅出地以動萬物萬物莫不奮迅悅豫而從之豫喜意也作樂所以飾喜也薦之上帝以配祖考用樂之盛者程傳陽始閉鬱及奮發則通暢和豫故為豫本義雷出地奮和之至也先王作樂既象其聲又取其義殷盛也郭兼山曰雷出地蓋帝出乎震之時夏之二月帝者生物之宗祖考者人之始郭白雲曰禘有樂而嘗無樂先王作樂之道因雷之收發蓋春秋者天地之闔闢也一闢而雷奮于是乎樂作故能通隂陽之氣一闔而雷收于是乎不作樂以順隂陽之理此所以禘有樂而嘗無樂合于豫之作樂崇德也郭亨仲曰四至初有宗廟之象易外雷起黃鍾為聲音之元當在地中中和之氣始復當在地上中和之氣大行此天地之至樂也先王奉之以作樂崇其中和之德以薦上帝亦以天地之中和還之于天地而已樂以人聲為本而人聲以天聲為本雷者天之聲中聲也純剛無欲乃元音也豫卦震樂之始作互坎樂之中中和之德充實于中也互艮樂之成下坤雷反于地歸其本根也雷以氣為道然氣不可象故象其聲聲在則氣在以聲宣其氣人氣宣而上帝之氣宣矣宣上帝之氣以宣天下人之氣何德之崇如之澤中有雷隨君子以嚮晦入宴息翟子元曰雷春夏用事今在澤中秋冬時也吕藍田曰雷入于澤退藏不用如日之嚮晦羣動皆息君子不得不隨本義雷藏澤中與時休息項平甫曰震朝氣也兑暮氣也春入于秋嵗之暮也卯入于酉日之暮也木入金鄉則絶雷入澤中則蟄人入晦時則息皆隨時之明義張紫巖曰潛神至靜之地而後能盡動說之道君子存身于靜其動也仁天下說隨大功以著馮厚齊曰雷發于震之春收聲于兑之秋由震而兑雷藏澤中與時休息日出于東方之震而入于西方之兑由震而兑自明嚮晦天地之隨為晝夜為寒暑為古今君子之隨為動息為語默為行藏易外山止也澤引也卦互艮互巽巽順也順以止之順以引之此所以合乎造化行乎鬼神山下有風蠱君子以振民育德程傳風遇山而回則物皆散亂故為有事之象君子觀有事之象在已則養德于天下則濟民本義物壞而有事莫大于二者乃治己治人之事也李隆山曰山下有風風落山之謂山木摧落蠱敗之象振民謂巽風之鼓為號令育德猶艮山之養成材力朱漢上曰震動在外振民也兑澤在內育德也育德者振民之本俞石澗曰小畜風在天上觀風在地上渙風在水上並無所阻故皆言行蠱之風則止于山下為山所阻而不能條達故不言行而言有來矣鮮曰風俗頺敗由于民德之不新民德之不新由于己德之不明按大象傳大抵以內外卦起義故先內而後外不必以治己在治人之後為疑澤上有地臨君子以教思無窮容保民無疆王輔嗣曰相臨之道莫若說順不恃威制得物之誠故物無違本義教之無窮兑也容之無彊坤也郭白雲曰天之澤謂之澤地之澤亦謂之澤皆以及物為功故澤為說朱漢上曰以土制水宜若易者然迫之以險隘奔潰四出壞之而後已居之以寬大則蓄而為澤矣君子之于民也亦然臨之以勢勢有盡也親之以教教無窮也趙汴水田澤之于地有潤而無竭故君子以教思無窮地之於澤有受而無阻故君子以容保民無疆胡雲峯曰不徒曰教而曰教思其意思如兑澤之深不徒曰保民而曰容保民其度量如坤土之大風行地上觀先王以省方觀民設教九家易曰風行地上草木皆偃故以省察四方觀視民俗而設其教也吕藍田曰風行地上萬物得其所以化程傳風行地上周及庶物為由歷周覽之象觀民設教如奢則約之以儉儉則示之以禮省方觀民也設教為民觀也朱漢上曰巽為多白眼觀也坤為民張紫巖曰坤地為方申命為教項平甫曰方與民屬地省之觀之教之屬風易外天道莫神于風之所化巽司風化震司動化動以為生化以為成小畜為風之始行于天上未能化物也觀為風之終行于地上而物乃盡化故觀者風化之主也觀古文作即風字故觀者風之卦也天之神道莫如風聖人之神道莫如教天以風為教聖人以教為風故曰風教電雷噬嗑先王以明罰勑法電雷諸本作雷電朱子云當作電雷今從石經本改正侯行果曰雷以動物電以照物雷電震照則萬物不能懷邪故先王則之明罰勑法以示萬物朱漢上曰明其罰之輕重使人曉然易避效電之明正其法令以警懈惰效雷之動九四坎為律法也王秋山曰電掣則雷震雷迅則電赫相須並用亦有一噬一嗑象熊梅邊曰明罰勑法以先王言者取其法令垂後世折獄致刑以君子言者所以制小人山下有火賁君子以明庶政無敢折獄程傳山者草木百物之所聚火在其下庶類咸被其光明賁飾之象君子以修明庶政成文明之治折獄者專用情實有文飾則沒其情矣故無敢用文以折獄也朱子明庶政是離無敢折獄是艮明在內不能及逺故止而不敢折也此與旅都說刑獄但爭艮與離之在內外止在外明在內故明政而不敢折獄止在內明在外故明慎用刑而不留獄山附於地剝上以厚下安宅劉長民曰山以地為基厚其地則山保其髙君以民為本厚其下則君安於上蔡節齊曰厚下坤象安宅艮象劉壽翁曰厚下安宅此言治剝之道馮厚齊曰以上下厚薄取象不以隂陽消長為義李隆山曰易中象辭曰大人曰君子曰先王而此獨曰上者剝之世在下皆羣隂而猶有一陽在上作易者喜見之故指在上之一陽而為之辭按山附於地猶之君託于民孔子觀象于此已别具隻眼故不曰地上有山也說家或泥于卦義以附于地為頽剝之象轉覺牽强蓋民猶水也可以載舟可以覆舟地薄則山崩陷地厚則山安宅聖人所以止剝于未然也雷在地中復先王以至日閉關商旅不行后不省方程傳雷在地中陽始復之時陽始生于下而甚微安靜而後能長先王順天道當陽之始生安靜以養之人身亦然當安靜以養其陽也郭白雲曰閉塞人事以助天地之發朱漢上曰復冬至之卦剝艮為門闕反則閉關馮厚齊曰后天子諸侯之通稱省方巡省四方潘天錫曰閉關體坤之闔户項平甫曰彖取陽之復來故可以出入可以朋來可以有攸往象取雷之在中故不可以行不可以出吳草廬曰一陽初生于地中未能為雷而曰雷者春時之雷即此初生之陽所為也關者四郊之門商旅不通則外者不入內人君不巡狩則內者不出外蓋欲地上安靜以養地下初動之陽商旅坤為衆象行者衆為大塗象后震為君象方坤為國土象易外天之風無時不有故曰天下有風地之雷無時而不在故曰雷在地中地無下地之下天也故不言地下而曰地中按震之雷即震之龍也復之初即乾之初潛龍也十月之龍戰之龍即十一月之潛龍之龍唯其潛而勿用故有閉關之象知冬月之潛龍即知冬月之伏雷陽未嘗有一刻之或息天下雷行物與無妄先王以茂對時育萬物張子物因雷動雷動不妄則物亦不妄故曰物與無妄育不以時害孰甚焉本義天下雷行震動發生萬物各正其性命是物物而與之以無妄也先王法此以對時育物因其所性而不私焉蔡進齊曰對與對越上帝之對同蘭惠卿曰如春毋取麛夏毋伐木之類項平甫曰時以象天物以象震吳草廬曰茂懋通勤勉之意上奉天時以行政令使無一民不得其所無一物不遂其生胡雙湖曰震為春互巽為春夏之交先王茂對此生長之時以養育萬物是亦聖人之雷行物與之以無妄矣何𤣥子曰雷無私震物無私與故以為無妄之象對時謂順合天時對時而曰茂涵蓄多少盡性至命之理非極誠無妄者不能對時正所以育之天在山中大畜君子以多識前言往行以畜其德程傳畜為止畜又為畜聚天在山中之象則為蘊畜艮止乾之義則為止畜止而後有積故止為畜義天在山中所畜至大多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其德乃大畜之義朱漢上曰內卦兑口前言也外卦震行往行也項平甫曰文在外故為小畜識在心故為大畜龔泉峯曰以畜為止者文王周公之易兼取畜止畜聚二義者孔子之易張中溪曰天在山中畜其氣也凡山中雷雨雲風之氣皆天也魏鶴山曰天在山中譬則心之體也聞一言見一行審問慎思明辨篤行以畜其心之德則愈畜而愈大馮深居曰多識如天之容覆畜德如山之圍繞俞石澗曰地之上空虛處皆天也室中有天洞中有天山中之天何疑焉山下有雷頤君子以慎言語節飲食荀慈明曰雷為號令今在山下閉藏故慎言語以陽食隂艮以止之故節飲食程傳雷震于山下山之生物皆動其根荄發其萌芽為養之象口所以養身君子觀象以養身慎言語以養其德節飲食以養其體在身為言語于天下則凡命令政教出于身者皆是愼之則無失在身為飲食于天下則凡貨財資用養于人者皆是節之則無傷王童溪曰山物之善止者雷物之善動者山下有雷則動有止之謂也項平甫曰愼言語象雷之藏身節飲食象山之止物馮厚齊曰法雷之動以慎其所出法山之止以慎其所入俞石澗曰雷在山上則聲已在山是為小過在山下則聲未出山其動不至于過是頤養之象澤滅木大過君子以獨立不懼遁世無悶劉長民曰用之則獨立不懼舍之則遁世無悶朱子木雖為水所浸而木未嘗動故君子觀之而獨立不懼遁世無悶項平甫曰獨立不懼木之植也遁世無悶澤之說也水洊至習坎君子以常德行習教事司馬溫公曰水之流也習而不已以成大川人之學也習而不止以成大賢程傳兩坎相習水流仍洊之象水自涓滴至于江海洊習而不驟也其因勢就下信而有常故君子取其有常則常久其德行不常則僞也取其洊習則習熟其教令之事若驟告未喻遽責其從不能也蘇子瞻曰事之待教而後能者教事也君子平居常其德行故遇險而不變習教事故遇險而能應本義治己治人皆必重習然後熟而安之郭白雲曰常德行所以行險而不失其信習教事所以設險而固其國耿希道曰行險者武事所謂教事武事也馮厚齊曰如周官大司馬四時之教是也明兩作離大人以繼明照于四方王輔嗣曰繼謂不絶也明照相繼不絶曠也孔仲達曰繼續其明乃照于四方若明不繼續則不得久為照臨程傳大人以德言則聖人以位言則王者大凡以明相繼皆繼明也舉其大者以世襲繼照言之陸農師曰日照乎晝火照乎夜繼續而起不至絶曠朱子兩作猶言洊至今日明來日又明只是一箇明兩番作作起也郭白雲曰六十四卦唯離象獨稱大人大人者與日月合其明故稱大人項平甫曰日君象也不容有兩故明之兩作者為大人繼明之象繼有前後之義非並作也日繼日猶君繼君有天子諸侯嗣位之象故曰六五之吉離王公也繼明與重明不同重明如聖益聖繼明如聖繼聖也趙復齊曰日入而升謂之兩作日新不已謂之繼明梁孟敬曰人君有緝熙之敬而光明無間固繼明也世世以明相繼重華重光亦繼明也易外明兩作所謂大明終始也山上有澤咸君子以虛受人崔氏憬曰山髙而降澤下而升山澤通氣咸之象程傳人中虛則能受實則不能入矣虛中者無我也中無私主則無感不通以量而容之擇合而受之非有感必通之道也張子感物之善莫若以虛受人有所係慕皆非正吉吕藍田曰山能出雲而致雨者山內虛而澤氣通也本義山上有澤以虛而通也語録兑上缺澤口象兑下二陽澤底象艮上一畫陽土之象下二畫隂中虛便是滲水象項平甫曰艮象下虛兑象上達趙汴水曰彖爻與象各有攸主釋彖言咸感釋象言虛受唯圓機之士可以學易雷風恆君子以立不易方王童溪曰方也者不易之地也大學為人君止于仁為人臣止于敬此不易之地所謂有常之德也朱漢上曰巽股為立動而不易其方其不動者乎項平甫曰雷風相與者其情也雷主聲風主氣聲之與氣相從而不厭雷風恆者其方也聲常在外氣常在內二物者天下之至動也而不易如此是以君子象之方之所在則立焉非一方也邱行可曰巽入也而在內震出也而在外二物各居其位則謂之恆故君子體之而立不易方若雷入而從風風出而從雷二物易位而相從則謂之益故君子體之亦有遷改之義此恆益之不同趙汴水曰雷風二物至不能久而天地之化所以能久者雷風也胡雲峯曰雷風雖變而有不變者存體雷風之變者為我之不變者善體風雷者也胡雙湖曰震巽皆木有立象巽震同處東南故有不易方象天下有山遁君子以逺小人不惡而嚴崔氏憬曰小人浸長如山之侵天君子遁避若天之逺山侯行果曰羣小浸盛君子避之但矜嚴于外不憎惡于內王會之曰君子之逺小人如天道默運不下校于物張子惡讀如憎惡之惡逺小人不可示以惡也本義天體無窮山髙有限朱漢上曰初四二五相應不惡也四陽以剛嚴在上臨之不惡而嚴也張紫巖曰不惡如天之無不容嚴若山之靜而止王童溪曰天非與山較髙下也而山之于天自有不可侵之勢據巔以觀天而天愈髙愈逺愈不可及項平甫曰乾為君父故嚴艮為少男故小王秋山曰天乾也上三陽健行而逺去山艮也下二隂為一陽止之而不得行是小人猶有所制而君子得以從容逺去又見去之髙者其勢不可得而止遁之象雷在天上大壯君子以非禮弗履孔仲達曰壯而違禮則凶凶則失壯程傳自勝之謂强張子克己反禮壯莫甚焉朱子雷在天上是甚威嚴人之克己能如雷在天上則威嚴果決方能克去非禮項平甫曰內知非禮屬乾外能弗履屬震知行並進至壯者能之趙復齊曰動乎天故非禮弗履馮氏去非曰天上而澤下為禮天下而雷上宜其戒非禮也趙汴水曰雷在天上非所宜履猶壯者之行易越禮度故戒之徐方塘曰禮天秩乾象震為足履屬震象明出地上晉君子以自昭明德程傳昭明之也去蔽致知昭明德于己也明明德于天下昭明德于外也明明德在己故曰自昭朱漢上曰乾曰自强晉曰自昭二者自已為之天行日進誰使之哉項平甫曰明德以象曰自昭以象出地趙復齊曰如日之升無或使之揠苖則害矣明入地中明夷君子以蒞衆用晦而明王輔嗣曰藏明于內乃得明也顯明于外巧所避也孔仲達曰君子用此明夷之道以臨于衆冕旒垂目黈纊塞耳無為清靜民化不欺若運其聰明顯其智慧民即逃其密綱奸僞滋生藏明用晦反得其明張子不任察而不失其治郭白雲曰明夷非毁其明也晦其明而已晦其明則有終明之道朱子晦是不察察外晦而內必明張紫巖曰明失當求之晦即一身之間用晦則神氣守而智益明酬酢事變不失其性不獨蒞衆當晦也明入地中旦而復明曰用晦而明項平甫曰用晦而明以坤養離也吕東萊曰此君子養明之道不有虞淵之入焉有暘谷之明何𤣥子曰用晦而明謂明生于晦風自火出家人君子以言有物而行有恆蘇子瞻曰火之所以盛者風也火盛而風出焉家之所以正者我也家正而我與焉朱子風自火出如一爐火必有氣衝上去便是風楊龜山曰言忠信則有物行篤敬則有恆張紫巖曰風象化火象禮化自禮出君子必誠其言行非禮儀法度不言行謝上蔡曰不誠則無物誠者物之終始終始者有常之謂項平甫曰五行之氣熱極為風人心之動化為風凡風皆自火出者也蓋萬物以火為內天下以家為內人之言行以心為內言行風也有物有恆心主之也李西溪曰風自火出槖籥之火也大凡鼓鑄須是鼓得許多風從火裏出槖籥自有一箇户庭閫奧家之象就中必有模範言行身之模範也物恆其則也一身之模範一家之模範也徐進齊曰物恆內也言行外也外本乎內風自火出象吳草廬曰言屬火言有物如火之麗于物而傳行如行地之風其行有常胡雲峯曰一家之化自吾言行出皆由內及外自然薰蒸而成者也華霞峯曰言行最不可欺家人上火下澤睽君子以同而異荀慈明曰火性炎上澤性潤下故曰睽也大歸雖同小事當異百官殊職四民異業文武並用威德相反共歸于治故曰以同而異程傳不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳項平甫曰同象兑之說異象離之明君子周而不比和而不同羣而不黨皆同而異也楊誠齊曰禹稷顔回同道而異趣夷惠同聖而異行未足為同之異也一孔子也而齊魯之去異遲速一孟子也而今昔之餽異辭受此同而異也張舜文曰離兑同出于坤火澤同出于地一動而上一動而下其末異如此按凡大象都止就本卦全象取意效法明夷即用其晦睽即用其異但異非直異有同者在乃可異耳與彖傳合睽之義自别山上有水蹇君子以反身修德陸公紀曰水本應在山下今在山上終應反下故曰反身君子處窮之時則獨善其身孔仲達曰蹇難之時惟宜反求諸身道成德立方能濟險朱子困之極事無可為惟有致命遂志山上有水如山上之泉曲折多艱然猶可行故教以反身修德馮厚齊曰艮為躬在內反身象坎水象德蒙之德亦坎也蔡節齊曰反身止乎外艮象修德養乎中坎象趙汴水曰山上有水立卦以起義險在前偃卦以起義雷雨作解君子以赦過宥罪王輔嗣曰赦放免過誤失宥寬宥罪故犯過輕則赦罪重則宥項平甫曰過與罪屬坎坎為法律為徽纒赦宥屬震震為動出為反坐山下有澤損君子以懲忿窒欲虞仲翔曰兑說故懲忿艮止故窒欲孔仲達曰懲者息其既往窒者閉其將來忿欲皆有往來懲窒互文而相足也程傳氣通上潤深下增髙皆損下之象修己之道所當損者唯忿與欲項平甫曰懲者遏而絶之如澤之絶山窒者塞而不流如山之塞澤王秋山曰和說則無忿知止則無欲故曰損德之修也俞石澗曰山下有澤則澤寇山而山塞澤澤日壅山日削為損之象揚子雲曰山殺瘦澤增髙其說是已風雷益君子以見善則遷有過則改王輔嗣曰遷善改過益莫大焉孔仲達曰必雷動于前風散于後然後萬物皆益二月啓蟄之後風以長物八月收聲之後風以殘物風之為益其在雷後劉長民曰六子皆有益于物必曰風雷者水火山澤惟能結聚萬物必由散動然後增長程傳風烈則雷迅雷擊則風怒二物相益者也張紫巖曰萬物至是有去故從新之益坤隂變否為遷善為改過胡雲峯曰速于遷善則過當益寡決于改過則善當益純又自有相益之功觀彖雷發動其陽氣故有遷善之義風消散其隂氣故有改過之義按損上以益下原兼損而言必有所損乃有所益故傳言改過者損也言遷善者益也與卦義通又不獨以象取也澤上于天夬君子以施祿及下居德則忌張紫巖曰功力爭歸雖霈天之澤不自以為功則人心悅而天意得澤上于天利澤下施與天下同古者謂祿曰天祿乾下為祿乾剛為德居德則兑毁隨至曰居德則忌蔡進齊曰居其德而不施則與象反矣故忌趙復齊曰戒滿而溢李隆山曰居者積而不流之謂若奇貨可居之居李蒙齊曰忌如道家所忌之忌功被天下而守之以讓其是道歟趙汴水曰澤本在下氣騰而上于天必決而復下為雨露之澤祿施及下體天澤下沛之義居若寵利居成功之居所謂有其善矜其能者以德自居猶以祿自富來矣鮮曰夬三月之卦正天子行惠布德之時恩澤之澤居者施之反按此與無敢折獄文法同雲峯以為大象無反例者非天下有風姤后以施命誥四方孔仲達曰風行天下無物不遇故為姤象風行草偃天之威令人君法此以施教命誥于四方朱漢上曰施命誥四方君與萬民相遇之道巽為命自上而下張紫巖曰化不足而後有命命非聖人得已也盤庚周公誥書丁寧反復正隂生防微之幾觀彖施命與巽之申命相類皆取風之號令又微隂潛伏則貴有以振動發散之澤上于地萃君子以除戎器戒不虞除去聲王輔嗣曰聚而無防則衆心生孔仲達曰澤上于地則水潦聚除治也程傳衆聚則有爭物聚則有奪聚必多故所以戒不虞除謂簡治去弊惡也朱子澤本當在地中今在地上則有潰決奔突之憂沈守約曰坤在下闔户之時兑在上日入之所時暗而衆聚是以有不虞之備四有據衆逼尊之象君子戒備之時項平甫曰水與澤相近而不同水火以氣言坎離主之山澤以形言艮兑主之水之氣可在地上水之形不可在地上必置防以聚之以待不時之用張紫巖曰順說之極上恬下熙安于佚豫不可一日忘備王秋山曰澤上有地臨則聚澤者地岸也澤上于地萃則聚澤者隄防也以地岸聚澤則無隄防之勞以隄防聚澤則有潰決之憂故君子觀此象為治世之防胡雙湖曰除戎器澤容水象戒不虞地順象兌正秋屬金主刑殺亦有戎器象地中生木升君子以順德積小以高大孔仲達曰地中生木始于毫末終至合抱君子象之以順行其德積其小善以成大名程傳順則可進逆則退也萬物之進皆以順道朱子木一日不長便將枯瘁學者之于學不可一日少懈郭白雲曰地中生木人莫見其升之之迹者以順積而致之耳順則不逆于德積則為之有漸項平甫曰坤為順巽為髙物之髙必以積其所積必以順趙汴水曰上坤下巽宜曰地中有木而曰生木者生則自下而升為升之象木之升也順一氣之自然不天閼之由芽蘖而拱把其升也烏可躐等至哉聖人因象以喻進德修業之理易外不言地下有風而曰地中生木風從天而降木自地而升澤無水困君子以致命遂志本義水下漏則澤上枯故曰澤無水致命猶言授命言持以與人而不之有也朱漢上曰澤無水則澤道困矣然水在澤下未嘗不通沈守約曰澤水之聚水就下而趨坎則澤無水澤無水則萬物困矣趙復齊曰于困之時求所以不困者吕東萊曰困窮之時所為者不成所欲者不得志每為命所妨正君子用力進步之地此致命遂志獨言于困也胡雙湖曰致命兑澤涸象遂志坎心亨象何𤣥子曰致猶委也人不信其命則死生禍福營為百端居貞之志何以自遂今一委之命則不以命二志者夫且能以志立命木上有水井君子以勞民勸相勞平聲相去聲吳準齊曰象言木上有水是謂水之下有木明矣蓋井無木為底則泥隨汲動水必濁唯用木則泥有所護汲不至濁泉眼亦無窒塞之患伏羲時未有井文王時則有井矣以此卦有井象而名之曰井如鼎卦之象亦若是而已鼎用烹井用汲亦皆自然之道也君子觀井象而以為井田之法使民服田力穡勤勞以奉養其上又勸其相助而不敢惰農自安亦猶井中之水養人濟物而以上出為功也坎勞卦也故言勞民互兌為口故言勸巽順故言相李秀巖曰勸相亦為井田設即相友相助相扶持之意按諸儒解木上有水或謂潤氣上行草木之杪每晨珠露以象水上于木或謂桔橰汲水獨吳氏以井底有木為訓良然蓋井鼎皆以實象定名非以意造也凡大象傳以字必有實事如封建治厯折獄作樂之類井田大事其制本從井象起義吳說勞民句尤為至當澤中有火革君子以治厯明時本義四時之變革之大者李去非曰晝夜者一日之革晦望者一月之革分至者一嵗之革厯元者無窮之革項平甫曰謂之有火言非其地不當有也澤中有火天之革治厯明時人之革凡改世者必治厯改嵗者亦必治厯治一世之厯者可以明三正五運之相革治一嵗之厯者可以明十二月六十甲子之相革丘行可曰日行周天嵗差甚微積之久則差始見而厯法不容不更故治厯取諸革趙復齊曰澤中有火兌見離藏正秋時也火藏矣而非無故火墓于戌冬繼秋春繼冬夏繼春父子相傳因也秋繼夏金火相傳革也以氣言之金革火時一秋而暑氣退涼颷生也以物言之火革金爐鑄是也五行以相生相授而金火以相革相成馮深居曰大澤之中水落而有火革故之象吳草廬曰治厯取兌象俾日月五緯之躔次秩然而理如澤之衆流有歸明時取離象俾春夏秋冬之氣候粲然而見如火纎微畢徹木上有火鼎君子以正位凝命本義鼎重器也故有正位凝命之意凝猶至道不凝之凝所謂協于上下以承天休者也項平甫曰存神以息氣人所以凝壽命中心無為以守至正君所以凝天命正位象離為聽政之位凝命象巽巽為命邱行可曰凝命凝已改之命以鼎繼革欲人于變革之後以端重守之趙復齊曰木上有火焰也此言主器之道趙汴水曰鼎貴正正則不傾鼎貴安安則不搖王秋山曰取其端正之象以正其所居之天位則愈久而愈安取其鎮重之象以凝其所受之天命使之愈久而愈固胡雲峯曰鼎器正然後可凝其所受之實君位正然後可凝其所受之命來矣鮮曰孔子因大禹鑄鼎象物成王定鼎於郊鄏卜世卜年所以說到正位凝命洊雷震君子以恐懼修省程傳洊重襲也上下皆震為洊雷項平甫曰恐懼修省所謂洊也人能恐懼則既震矣又修省焉洊在其中馮厚齊曰恐生于心懼見于貌修其所未為省其所已為或曰修其善省其惡毛伯玉曰恐懼作于心修省見于事兼山艮君子以思不出其位董氏曰兩雷兩風兩火兩水兩澤皆有相往來之理惟兩山並立不相往來此止之象程傳位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也張子如素夷狄行乎夷狄素患難行乎患難耿希道曰不出其位其身止也思不出其位其心亦止也象兼山趙汴水曰思其位思其所以位則動靜語默皆素其位未嘗越思也何思何慮者大人之止收其放而間之者君子之止思而後能止其所何𤣥子曰易重時位即時位即道也山上有木漸君子以居賢德善俗王肅本作善風俗吳草廬從之程傳人之進於賢德必有其漸非可陵節而遽至教化之于人移風易俗非一朝一夕所能成故善俗亦必以漸蔡節齊曰居德艮止象善俗巽入象項平甫曰古書居皆訓積如化居居業積德者喜漸漸則增趙復齊曰體內卦以修德法外卦以化民華霞峯曰居如山止積久而安善如巽風漸次以入澤上有雷歸妹君子以永終知敝王輔嗣曰歸妹相終始之道也故以永終知敝蘇子瞻曰歸妹女之方盛者也凡物之有敝者必自其方盛而慮之逮其衰則無及矣本義雷動澤隨歸妹之象君子觀其合之不正知其終之有敝推之事物莫不皆然項平甫曰震為反生終也兌為毁折敝也邱行可曰雷震澤上水氣隨之而升女子從人之象婚姻之道欲其有終必有以知其不終之敝女子以說而動失身敗德不永其所終者多矣王汝中曰男女之合莫正於禮莫不正于情以禮而合咸恆與漸也以情而合歸妹也按傳不曰雷澤歸妹而曰澤上有雷明雷之動因澤之說也澤氣感而雷乃動雷動而澤以說隨之女從男也歸妹有坎離既濟之象既濟曰初吉終亂况在歸妹雷藏于澤斯善其終雷電皆至豐君子以折獄致刑孔仲達曰斷決獄訟須得虛實之情致用刑罰必得輕重之中若動而不明則淫濫斯及蘇子瞻曰易至于雷電相遇則必及刑獄取其明以動也至于離艮相遇曰無折獄無留獄取其明以止也程傳噬嗑言先王勑法以明在上王者之事豐言君子折獄以明在下君子之用朱漢上曰電明照也所以折獄雷威怒也所以致刑郭白雲曰噬嗑動以求明故雖電雷而未極其至豐先明而後動則動無不善是以極其至故曰雷電皆至明之至而動亦至也項平甫曰聲光並至所以為大俞石澗曰電光閃閃雷聲轟轟凡有歉於心者莫不震懾而知服折獄致刑猶是山上有火旅君子以明慎用刑而不留獄孔仲逹曰山上有火逐草而行勢不久留故為旅象項平甫曰明象火慎象山不留獄象火之過山張中溪曰明無遁情慎無濫罰明慎既盡決斷隨之聖人取象于旅正恐其留獄也隨風巽君子以申命行事荀慈明曰巽為號令兩巽相隨故申命也法教百端令行為上故曰行事孔仲達曰兩風相隨物無不順郭白雲曰君子之德風有風之德而下無不從然後具重巽之義重巽隨風皆繫乎上下而言沈守約曰風之行無形巽而入之不暴化之行亦無迹也神道鼓舞亦不遽也前以巽制之後以巽申之上以巽出之下以巽行之新新而不窮承承而不已何事不行是以君子以申命行事邱行可曰申命所以致其戒于未事之先行事所以踐其言于申命之後項平甫曰申命象風之聲行事象風之迹按孔子大象往往别取一義不必與卦意同獨此言申命行事乃重巽之本象即彖傳之意以明之繫辭巽以行權即行事也麗澤兑君子以朋友講習虞仲翔曰兑兩口對故朋友講習也孔仲達曰同門曰朋同志曰友邵康節曰它說皆有所害唯朋友講習無說于此故言其極者也蘇子瞻曰取其樂而不流也本義兩澤相麗互相滋益朱漢上曰講其所知習其所行張紫巖曰兼山有物我兩止義麗澤有內外皆說意蔡節齊曰講兌象習重兌象風行水上渙先王以享于帝立廟石守道曰冬月天地閉塞水凝為氷春風一動釋其否結解其氷凍渙象王者出民塗炭之後法此享帝以訓民事君立廟以教民事親二者忠孝之道教化所先也程傳風行水上有渙散之象享帝立廟人心之所歸係人心合離散之道無大于此張紫巖曰盤庚安羣臣百姓必以天以先王蓋所以先天下而合其心坎血為享乾上為帝風主化水主信將大其化非誠信不可朱漢上曰享于上帝使人知天無二主立廟則人知反本項平甫曰享帝于郊象巽之髙立廟于宫象坎之隱俞石澗曰渙泮渙也風來水靣而水有文故曰渙風無形無所寓則無以見之水動成文後見風之至鬼神亦無形者設壇于郊立廟于宫而後天神格人鬼享有所寓故也梁孟敬曰風之與水雖散而相感應是其散者乃所以合也人心之散因祭祀而合鬼神之散因郊廟而合澤上有水節君子以制數度議德行侯氏行果曰澤上有水以隄防為節程傳制立數度凡物之大小輕重髙下文質皆有數度所以為節也數多寡度法制議德行謂商度求中度也朱漢上曰澤之容水固有限量虛則納之滿則泄之水以澤為節也郭白雲曰澤無水則為不足澤上有水則為有餘有餘則當節在人之節制數度以節于外議德行以節于內為國為家至于一身其內外制節皆一也項平甫曰制數度坎之法律議德行兌之講習王童溪曰數度所以為節也使貴賤上下各安其分德行欲其中節也隨時合宜無過不及則為中節俞石澗曰澤所以止水故謂之節數者一十百千萬也度者分寸丈尺引也澤上有風中孚君子以議獄緩死孔仲達曰風行澤上無所不周其猶信之被物無所不至故曰澤上有風中孚郭白雲曰治獄聽訟虛中為先此君子法中孚以議緩也項平甫曰獄之將決則議之既決則又緩之然後盡于人心故獄成而孚輸而孚在我者盡故在人者無憾兑為口舌為附決議獄象巽為進退為不果緩死象徐進齊曰象言刑獄者五噬嗑賁豐旅中孚也以離為兵戈有刑獄象又離明則刑不濫中孚厚畫離也噬嗑豐兼取震動以致決賁旅兼取艮艮以止之也中孚似離互體有震艮而又兌以議之巽以緩之聖人即象垂教其忠厚惻怛之意如此王秋山曰繫獄者恐其有虛中之實故議之臨刑者恐其有實中之虛故緩之吳草廬曰五獄皆離象離中虛外窒有似囹圄刑之用不用則自震艮而異震動必用噬嗑豐也艮止不用賁旅也然噬嗑罪輕則罰薄豐罪重則加刑賁情重而未明則待鞫旅情輕而猶疑則暫出蓋離獄在內者其獄有人離獄在外者其獄無人也四卦三畫之離獄之小者中孚六畫之離獄之大者死罪也而有震有艮則刑之用不用未決故議之議之則非必死非必不死緩之而已矣議獄緩死必誠求之故見于中孚之象山上有雷小過君子以行過乎恭喪過乎哀用過乎儉程傳當過而過乃其宜也不當過而過則過矣張子過恭哀儉皆宜下之義吕藍田曰山上有雷震動一山則有餘震動天下則不足此小者過也丘行可曰雷在山上已離于地而未升于天其聲小過而已朱漢上曰考父之過恭髙柴之過哀平仲之過儉非過于理也小過乃所以為時中項平甫曰曰行曰喪曰用皆見于動象震也曰恭曰哀曰儉皆當止之節象艮也趙復齊曰恭哀儉多不及過之而後中水在火上既濟君子以思患而豫防之王輔嗣曰存不忘亡既濟不忘未濟孔仲達曰水在火上炊爨象飲食以之而成性命以之而濟故曰既濟劉長民曰水火之性竟則必復復則為變蔡節齊曰思患坎難象豫防離明象項平甫曰人之用莫大于火而火常足以生患善濟火者莫若水思火之為患而儲水以防之使水常在火上則其患亡矣故君子制行立教行政舉事必皆有以濟之周秦之强弱師商之過不及皆其事也錢啓新曰君子觀象于其相濟之用即思其相射之患豫防如豫以水防火又豫防水之滅火火在水上未濟君子以慎辨物居方王輔嗣曰辨物居所令物各當其所本義水火異物各居其所故君子觀象而審辨之朱漢上曰有辨然後有交辨之以正其體交之以致其用有未濟乃有既濟而未濟含既濟之象項平甫曰必加慎者以其未濟也水火交則有難未交則未有難然難將生矣辨之不早辨居之不得其所皆難之所由生也可不謹乎易終于未濟而始于屯其意深矣馮厚齊曰慎于辨物使物以羣分慎以居方使方以類聚趙汴水曰既濟言其用用貴交未濟言其體體惡糅雜故謹而辨之各居其方全其體所以待用體虧則用嗇君子在位小人在野辨忠佞之邪正不特水火為然龔泉峯曰辨離明象居坎陷象按大象傳孔子專以卦象言也不必盡與卦意同此則所謂孔子之易也首句言體象或並舉或側叙每以一字晝卦義所以示人觀象之法八純卦皆兩體一象天無二地無二則天以行言地以勢言水有前後則曰洊至天無二日則曰明兩作作繼起也雷聲復疊則曰洊雷非若水之漸進故不曰至風亦有前後曰隨風洊有力隨有情隂陽之分也山多並峙故曰兼澤相比則相入故曰麗餘卦于天地山澤雷不言他象離火也而或言日言電言明坎水也而或言雲言雨言泉巽風也而或言木各隨卦象而變屯曰雲言水之氣也雷上不得有水也雲與雷合雷在雲中有盤繞之象為屯蒙曰泉是山下之水曰出見蒙有開發之機初之發蒙出之象也故不曰有需之雲曰上于天是未成雨而欲雨故可需訟不曰天下有雲天下有雨而曰天與水違行以上下不交而水性自下訟所由也凡大象未有言地下者以地下即天故多言地中師之水在地中伏于隂師象曰在見兵即在民也比之地上有水顯于陽比象曰有言其不可無也蹇之山上有水曰有者不常有也非定在也故不言在解不曰水而曰雨變險象為膏澤也既濟曰水在火上未濟曰火在水上不言有而言在者一言其既也一言其本也天在上火炎上為同人與違行正相反故亦曰與大有之火君象也不言日者以卦名大有主離中之一隂也故言其本象而曰在者正其位也與出地上者異矣噬嗑之火與雷合則曰電賁之火不言日者日入地則晦山下非地下比日在地上容光必照無祗在山下之理故曰山下有火晉不言日言火而曰明出地上言明以别于大有之君象言出以見其始進而上也明夷不曰日在地中而曰明入者言非無明也言自明趨晦也自入于地也非地之咎革不曰火在澤下澤下有火而曰澤中有火危之也澤將熄火矣豐之火不曰火曰日而曰電雷下不得有日也甚之曰皆至象勢之盛大也旅曰山上有火有非常在暫焉耳風隂質而清小畜之風行于髙天之上以臣畜君之象蠱之風束于山下風不散而物可化故不曰行而曰有觀之風曰行言其無不到也大過不曰風者澤下不得有風也曰澤滅木滅沒也以明卦之不善家人不曰風在火上而曰風自火出以內外相因明卦義也姤之風曰有者言乍遇之也不願其行也渙曰風行水上水得風而生瀾行以狀其泮渙升不曰風而曰木者地中不得有風從地而升者唯木曰地中生木生升象井以水下不得有風故亦曰木木上有水以象井鼎亦曰木者象傳火之薪以致烹飪漸不言風者風無漸之次也故曰山上有木明非地中生木之易長也故不曰生豫之雷出地矣狀之曰奮豫樂之象可繪隨為澤中之雷其聲隱隱故曰有復為地中之雷時在冬至尚未有聲然已在矣故曰雷在地中無妄之雷出地之後曰天下雷行行以狀其遍頤之雷在山下其聲微不可為出而非地之伏故與澤中同曰有雷行天之物也大畜天上之雷以視天下之雷勢更峻而盛故不曰行而曰在若聚而不散者歸妹之雷在澤上雷者澤之所由以升也隨之反隨則澤以藏雷歸妹則雷以動澤雖同曰有此則見澤之將隨雷也小過曰山上有雷視山下則聲逺視天下天上則聲近猶愈于澤中之泥故為小過謙曰地中有山言山之本半在地中也剝不曰地上有山而曰山附于地明山以地厚而得峙諸家泥卦義謂山剝而反于地失之矣大畜曰天在山中天者氣也氣無不入故為畜以凝聚言也咸曰山上有澤澤氣上通也遁曰天下有山明天之下必有山山不能無然山自在下無傷于天之髙以喻小人而遁之道已盡損曰山下有澤明山日峻而下日虛也夬之澤假雨澤之澤曰上于天天非澤所明其必決而下也萃曰澤上于地有所受則不流也故聚困有水而曰無水水下泄則澤上涸也節反對下有所畜幸之曰有水中孚之風澤澤止水也無風則靜有風則動明其相感曰有履之天澤而曰上曰下尊卑之分定矣睽之火澤而曰上曰下睽離之勢成矣二卦直明卦體而義已備泰否之地天天地言交不父以顯其義恆之雷風益之風雷不加一言者義自以象著也至卦名下每用一以字一示古人制器尚象之道一示學者用易寡過之法如建國立廟作樂明刑行師言衆治厯正位之類皆制器之事也如自强不息厚德載物之類皆寡過之事也周易孔義集說卷十七
