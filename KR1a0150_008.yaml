body:
  text: 周易孔義集說卷八光祿寺卿沈起元撰上經巽下兌上中爻重乾項平甫曰過者越而過之非過誤之過胡雙湖曰或疑頤與大過對何不名為小過中孚與小過對何不名為大過蓋大過以四陽在中言小過以四隂在外言此是聖人内陽外隂之意大過棟橈利有攸往亨彖傳大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉王輔嗣曰初為本上為末司馬温公曰大過剛已長矣可濟之以柔不可濟之以剛故大過之陽以居隂為吉不以得位為美程傳大過之時其事甚大故贊之曰大矣哉如立非常之大事興不世之大功成絶俗之大徳皆大過之事楊元素曰不曰義者不可以常義拘不曰用者非常之可用用權之時成敗之機間不容髪可不謂之大乎本義四陽居中過盛故為大過上下二隂不勝其重故有棟橈之象又四陽雖過而二五得中内巽外説有可行之道故利有所往而得亨也語録處大過之時則當為大過之事處小過之時則當為小過之事在事雖是過然適當其時合如此便是合義朱漢上曰剛柔不可以相无柔既不足剛亦无自而托故曰棟橈本末弱也剛過而中所謂時中也非過于理也以過為中也猶之治疾疾勢沉痼必攻之以瞑眩之藥自其治微疾之道視之則謂之過自藥病相對言之則謂之中吕東萊曰大過為非常大過人之事却是巽順和説元不須動聲色項平甫曰棟橈二字以六爻之象言之此禍變之大者利有攸往亨以六爻之才言之中四爻剛雖大過而得時措之中初上二爻又能巽而説不失人心故利于有行雖遇大變而可以亨此才略之大也彖言利有攸往乃亨言往則亨不往則不亨也史氏曰古文篆體本末字皆從木以一陽畫藏于木之下則根株回暖故為本以一陽畫散于木之上則枝葉向榮故為末大過四陽畫積于中二陽畫處于初上如木上缺下短所以為本末弱也趙汴水曰二卦兑即巽之反故六爻皆可象木猶屋之棟李蒙齋曰孟子曰民為貴社稷次之君為輕即大過民為本君為末之意故王注云初為本上為末君弱于上民疲于下居中用事者皆剛梗不制之臣也棟既橈矣大厦將顛剛中巽説拯之之道胡雲峯曰大過之事甚大无其時不可過有其時无其才愈不可過梁孟敬曰此過盛而當壞之時也然聖人不委之時命必有扶顛持危之道焉何𤣥子曰棟説文謂之極爾雅謂之桴義皆訓中即屋之脊檩惟大過是以棟橈惟棟橈是以利往惟利往是以亨來矣鮮曰此卦大象坎坎為棟坎主險陷橈之象又為矯輮亦橈曲之象按坎離隂陽互藏其宅也陽以隂為宅大過全肖坎陽過盛而隂衰宅不能容陽安所託速救之乃亨故大過為死卦人之死未有不由陰不能養陽强陽飛越者也初六藉用白茅无咎𧰼傳藉用白茅柔在下也胡安定曰為事之始不可輕易况大過之時其事至重功業至大尤不可易于有為必當過分慎重于事始慎之則可以立大功興大利何咎之有本義當大過時以柔居巽下過于畏懼而无咎者也朱漢上曰巽為白為草白茅也以柔藉剛藉也楊誠齋曰君子當大過之世而在下柔以順承潔以自淑而已郭林宗曰大厦將傾非一木之支不忤羣小獨免黨禍故无咎王秋山曰以過柔之道處過剛之世過而得中故无咎吳草廬曰陽勢過盛故隂之承陽其謹敬亦過于當時譬之祭物必藉以茅謹敬之至也趙玉泉曰視天下无可忽之事者舉天下无不可為之事九二枯楊生稊老夫得其女妻无不利象傳老夫女妻過以相與也吕藍田曰初六少隂女也上六老隂老婦也九二在初六之上老于初六故曰老夫九五在上六之下少于上六故曰士夫程傳大過之初得中居柔與初比密初既切近于二二復无應于上其相與可知是剛過之人而能以中自處用柔相濟者也楊者陽氣易感之物陽過則枯陽過而與初老夫得女妻則能成生育之功在大過陽爻居隂則善九二九四是也稊根也楊龜山曰聞之蜀僧云四爻之剛雖同為木棟負衆榱則木之强者也楊為早凋則木之弱者也此卦本末皆弱二近于本五近于末故均為木之弱也巽乾體也一索而得女二居乾體老夫也而下比于初得女妻也朱漢上曰兌澤巽木澤木楊也兌正秋枯楊也項平甫曰全卦有利往象九二獨有之二居柔而用中又與柔比六爻中獨此一爻不為過甚之事初本也故為稊木根初生之芽也初又巽之主爻為長為高木已過而復芽又長且高故有往亨之理張紫巖曰英才遇合而後化育功成在大過時必得如二之臣援初六英才而進之始可有為于大過若五華而不實適為醜也楊誠齋曰以陽剛之才居謙柔之地下比初六此大臣之能下士而得助者也則廢可興衰可扶大厦之顛何患初六耦而敷散根象沈守約曰爻變為艮陽止也卦變為咸男女相感陽止隂説老夫女妻也趙汴水曰老夫少女非隂陽匹耦然與其隂過陽寧陽過隂以過壯遇過弱其過也所以適乎中也王秋山曰初以柔居剛二以剛居柔而此之剛柔適中相濟而有功九三棟橈凶𧰼傳棟橈之凶不可以有輔也司馬温公曰居陽履剛而在下體之上剛很强愎不可有輔本義三四兩爻居卦之中棟象九三以剛居剛不勝其重故橈張紫巖曰九三承二陽本輕而末重剛過于外者也九四履二陽本重而末輕剛積于中者也三處巽上輔之者弱不橈奚為四處互乾中剛健得中二陽從之是以棟隆而吉鄭東谷曰三凶四吉何也救過于其末不若救之于其本大過之棟橈由本末弱然實以末為重三所居不得位而應乎上救其末于已過之後故棟橈而不可有輔四居大臣之位而應乎初救其本于未過之初故棟隆而不橈乎下其下不橈其上安得而不隆李西溪曰下卦上實而下弱下弱則上傾故三居下卦之上而曰棟橈凶言下弱而无助也上卦上弱而下實下實則可載故四居上卦之下而曰棟隆吉言下實也此二爻當分上下體看胡雙湖曰橈者非謂九三自不勝其重指初六柔弱故不勝其重耳彖稱棟橈獨九三當之其致橈之由九四棟隆吉有它吝象傳棟隆之吉不橈乎下也王童溪曰九三九四列之中爻之中譬如屋室衆材咸集而棟則居中然三則橈四則隆以陽居陽而居下體之上與以陽居隂而居上體之下其理勢不同也不橈乎下下謂初六初與四相應四既居隂不恃其才之剛强而初六又以隂居陽其本未搖而所支載者亦不至剛過此棟之所以隆而不橈乎初六也雖然譬之一室九三之棟既橈而九四之棟亦安得獨隆乎故曰有它吝猶言此之棟雖隆矣其如它之不然乎吝謂有所不足也所謂大厦之傾非一木之所能支也胡雲峯曰三之橈有二以剛居剛過剛則折一也應上之柔柔不能輔二也四之隆亦有二剛而能柔一也三應上為救其未四應初為救其本上六以柔居柔為隂之極初六以柔居剛猶可不橈乎下二也盖惟其柔而居剛故二比之則如稊之復生于下四應之則如棟之不橈乎下也有它吝王弼以來多以它為初愚按易中无以正應為它者子夏傳云非應稱它胡雙湖曰四在三上有棟隆之象九五枯楊生華老婦得其士夫无咎无譽象傳枯楊生華何可久也老婦士夫亦可醜也程傳當大過之時以中正居尊位上比過極之隂如枯楊生華雖有所發无益于枯上六老婦五雖非少比老婦則為壯于五无所賴也故反稱婦得郭白雲曰老夫女妻則剛為主而柔輔之大過之得者也老婦士夫則柔為主而剛輔之大過之失者也王童溪曰上六窮隂處大過之極老婦象九五純陽處上六之下上夫象如驕盈之君以衰庸之臣輔之雖幸而无咎不足以有譽隂在卦初女妻象隂在卦末老婦象項平甫曰五所與者上末也故為華上又兑主為毁折為附決木已過而生華又毁且決无久生之理鄭東谷曰剛而得中故无咎馮厚菴曰老夫得女妻再娶女之夫也老婦得士夫婦再嫁而夫未娶也趙汴水曰枯楊已非可久生華速之也老婦得士夫是為失節不可醜乎吳草廬曰二五皆象夫婦者以其變為咸恒也二變為咸五變為恒何𤣥子曰君子而自任太過則小人反將藉之以為用如老婦之誘惑士夫者可不戒哉上六過渉滅頂凶无咎𧰼傳過渉之凶不可咎也王輔嗣曰處大過之極過之甚也渉難過甚至于滅頂凶志在救時故不可咎孔仲達曰此猶龍逢比干憂時危亂不懼誅殺直言深諫以忤无道之主遂至滅亡其意則善復有何咎𧰼云不可咎言不害于義也本義處過極之世才弱不足以濟然于義為无咎矣盖殺身成仁之事語録東漢諸人不量淺深至于殺身亡家然其心何罪故不可咎朱漢上曰乾為首上六在首之上頂也兌澤滅没其頂渉難之過也郭兼山曰方大過之時非不恤其危渉險以求濟何可及也𧰼曰獨立不懼遯世无悶上六非斯人之徒而誰與馮厚齋曰上畫偶兌隂水也中四畫竒人之身也初畫足也全卦有人居澤中滅頂之象故于上一爻發之易大抵上下畫停者從中分反對為象頤中孚小過皆然而此卦尤明三四對皆棟上隆下橈二五對皆枯楊上華下稊初與上對初慎上凶張紫巖曰夫子歴聘天下而耦耕之徒非之懼凶也彼荷蕢者自謂深厲淺揭不及于難豈聖賢之仁乎澤在木上為過渉為滅頂沈守約曰澤滅木則舟梁之用廢其極必至于渉變而為乾說而健過渉者也兌為澤乾為首滅頂之象卦變為姤隂壯不可長救之之時吳草廬曰大過肖坎坎之中畫水也積四陽為一中畫水之深過于常時也按此爻伊川以為小人冒險泥于六之隂也夫小人冒險則凶而己何云无咎大過雖嫌于過究係大之過大陽也君子也正氣也朱子故以殺身成仁之事當之蓋此本取全卦為義過渉滅頂即大𧰼所云澤滅木也凶无咎即大象所云君子獨立不懼遯世无悶也大過過在四陽初上二隂本无過故皆得无咎而初當大過之始尚可敬慎以趨吉上居大過之終自无求全之道止期弗叛于道義而已兌為毁折為說湯火鼎鑊甘之如飴所以為大過凶之下繫以无咎孔子更以不可咎釋之深予之也斯為聖人之書也坎下坎上中爻震艮張子坎離天地之中二氣之正交然離本隂卦坎本陽卦以此見二氣其本如此而交性也非此二物則无易趙復齋曰坎陽在内隂在外故水明内景離陽在外隂在内故火明外景水得陽氣升而為雲所以能升者陽也其升而復降者隂也張南軒曰得于乾者震坎艮得于坤者巽離兌得于乾者毎无待而有濟得于坤者不能特立以成功尊卑之分倡隨之義也李隆山曰乾坤者隂陽之祖而坎離則天地之中也坎居正北于時為子為夜之中而一陽生故坎一陽居中離居正南于時為午為日之中而一隂生故離一隂居中天地隂陽之中即坎離之中此乃造化張本之地也坎在物為水在人為精以畫觀之坎中實即精蔵于中水積于淵之𧰼離于物為火在人為神以畫觀之離中虚即神寓于心火明于空之𧰼坎之中實是為誠離之中虚是為明中實者坎之用中虚者離之用誠明起于中者易之妙用聖人之心學也謝顯道曰坎互屯蒙蹇解四卦坎所以多凶按坎中爻震艮則具三男離中爻巽兌則具三女習坎有孚維心亨行有尚彖傳習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉荀慈明曰陽動隂中故流陽陷隂中故不盈也虞仲翔曰行謂二尚謂五也二位震為行動應五故行有尚震為行水性有常消息與月相應五在天位艮為山坎為川王公謂乾五坤為邦乾二之坤成坎險陸公紀曰月者水精月在天滿則虧不盈之𧰼孔仲達曰諸卦之名皆于卦上不加其字此坎卦特加習者以坎為險難特加習名重習謂上下俱坎是險之重疊乃成險之用程傳以剛中之道而行則可以濟險難以剛中之才而往則有功故可嘉尚若止而不行則常在險中矣坎以能行為功本義中實為有孚心亨之象趙復齋曰二耦畫地一陽陷其中水行地中𧰼水常行地中豈有盈而溢者水行乎坎其勢平其趨下盈科而進其必然者復之初坎之二五畫竒而實復動于虚坎存于中命之曰心取𧰼精矣陽渉隂所以盡變隂揜之不能阻其亨剛中故也水以流為尚險以去為通心以運用為神郭白雲曰一陽揜于二隂非亨也然剛中則所守至固雖非亨而心亨矣用剛中以行何往非功其本則自有孚心亨之微推而及于天下也朱漢上曰坎在上天險也震足止于下不可升也坎在下地險也艮為山坎為川半山為丘陵也五乾為王設險不唯城郭溝池兵甲之利綱紀法度人所不能踰者皆是項平甫曰重卦之序坎居六子之先故于坎卦加習字以起後例故孔子于離曰繼明震曰洊雷艮曰兼山兌曰麗澤皆與三畫卦不同坎彖自為兩節象為水之多義為險之重自水流至有功以水言也自天險至大矣哉以險言也卦辭皆言水之義爻辭皆以險為義水流而不盈謂不止也坎不盈謂不滿也不止故有孚不滿故中未大因其辭而釋之坎有時而盈水无時而盈也都聖與曰習之義訓因書曰卜不習吉是也李隆山曰以𧰼觀之則陽居坎險是為心病以理觀之則陽為誠實是為心亨趙汴水曰坎為流水兌為止水水瀦則盈水流則不盈水之就下行乎險者也至平生焉春夏汪洋秋冬歛涸至信出焉險固所以為難有時而用之亦足以防難天積虚以不可升為險故能神其道地積形以山川丘陵為險故能畜其富胡雲峯曰卦亨字本義例以為占唯此卦曰中實為有孚心亨之象盖他卦言占事之亨也此言𧰼心之亨也陽實有孚之𧰼陽明心亨之𧰼心有主則實見得事理實是如此此心微有不通即是險阻俞石澗曰最有信者莫如潮一日兩至隨月之盈虧以為消長未嘗差失也章本清曰坎卦指出心以示人可見心在身中真如一陽陷于二隂之内所謂道心唯微者此也吳敬齋曰陽陷隂中所以為坎中實有孚所以處險有孚則誠立心亨則明通心之體静而常明如一陽藏于二隂中也心之用動而不息如二隂中一陽之流行也一陽者流行之本體二隂者所在之分限觀彖物之陷于險而能行險者莫如水故水流而不盈句先言水徳以起下文行險之義五行之性惟水流行其徳流通而至實故行險也不為所困不踰越以出于險而積累以充于中孚亨之義由此而取人之行險而不失其信如水之不盈而有常維心亨如水之流通而不困二五剛中兼有其義剛則實而有信中則虚而能通初六習坎入于坎窞凶𧰼傳習坎入坎失道凶也本義以隂柔居重險之下其陷益深沈守約曰坎而為兌川壅澤也卦變為節節止也壅且止益深也習坎入坎之𧰼楊誠齋曰窞偶畫穴之𧰼胡雲峯曰初六六三皆以隂居坎下水性本下而又居下坎體本陷而又居陷中之陷故皆入坎窞而初又下卦之下也按道以水言則水由地中行者水之道也坎之偶畫坎之坤地非水道也初更入于坎中之旁穴水之旁溢者失其道也其𧰼如此以理言之則不中不正也九二坎有險求小得𧰼傳求小得未出中也本義處重險之中未能自出故為有險然剛而得中故可以求小得楊龜山曰求者自求也外雖有險而心常亨故曰求小得郭白雲曰剛而得中心亨之道一離乎中則失之矣故𧰼言求小得以其未出中也趙復齋曰陽實在中得而非失有險未平未光大也陽居中則在險出險則失中卦時然也聖人觀彖與其失中寧未出險居中光大險自平爾項平甫曰坎有險即習坎言坎上又有坎也張紫巖曰以身則私心以國則小人均曰險隂蔽陽也學問未躋于聖賢事業未大于國家利澤未加于天下皆九二求小得義陳明卿曰求其小不求其大原不在大也涓涓不已流為江河如掘地得泉不待溢而出外然後為流泉也觀彖所得雖小而有可大之基勢按坎卦出中即失道安能求小得乎未出中則水循其道雖在下坎為小得可以行有尚六三來之坎坎險且枕入于坎窞勿用𧰼傳來之坎坎終无功也項平甫曰坎卦尚往利剛而不利柔三亦隂柔止言勿用言无功不言失道凶者六三志剛而不安于位來之坎坎甚矣其有志于出險也之往坎坎勞貎此言上下往來之勞下文始言險之多欲進而上則險而不可升欲居其位則枕而不能安欲退而下則入于坎窞才不剛位不正時不利皆无所施故戒以勿用𧰼曰終无功者言雖勞其心力多方圗之終无出險之效也味終字可見坎坎之為勞矣先儒以有兩坎字便稱來往皆險非也沈守約曰坎為巽為進退為不果來之坎坎𧰼巽伏也險且枕𧰼卦變為井入于坎窞𧰼趙汴水曰或來或往躑躅求出可謂不遑寧居矣奈身居兩險之間始之用力徒勞終亦計功无有而已按坎為勞卦則坎坎為勞而又勞猶乾乾為健而又健蹇蹇為蹇而又蹇也項氏趙氏說最允六三所以有出險之志來之之勞者不獨以柔居剛盖以三居互震之位自有震動之能也無如前有重險又當互艮之止所以終于无功六四樽酒簋貳用缶納約自牖終无咎𧰼傳樽酒簋貳剛柔際也虞仲翔曰震主祭器故有樽簋坎為酒簋黍稷器三至五有頤𧰼坎為木震為足酒在上樽酒𧰼貳副也艮為牖小光照牖象王輔嗣曰處重險而以柔居柔履得其位以承于五五亦得位剛柔皆无餘應以相承比明信顯著不存外飾剛柔相濟而相親焉際之謂崔氏憬曰于重險之時比五承陽修其潔誠進其忠信則終无咎蘇子瞻曰夫同利者不交而懽同患者不約而信四非五无以為主五非四无以為蔽薄禮簡約終不相咎者四與五之際也程傳自牖言自通明之處人臣以忠信善道結于君心必自其所明處乃能入也本義牖非所由之正而室之所以受明也始雖艱難終无咎郭白雲曰能虚中盡誠以通交際之道猶自牖納約其情已至不必堦序行禮之地趙復齋曰坎隂陷陽至四而變因重卦也二五之剛挾柔在内麗𧰼著而險情變三乘剛非可取者故不若四至順也承陽履隂无復險矣由是隂陽情通交際得焉器用缶尚質素也納約自牖无隠情也險變為順故要其終沈守約曰四五君臣得位下比上承交際以禮而相養以道酒養陽也食養隂也四以樽酒養五之陽五以簋貳養四之隂相濟以相養缶喻四之誠牖喻五之明潘天錫曰樽酒簋貳用缶與損二簋可用享同意納約自牖與暌遇主于巷同意馮厚齋曰缶瓦器可擊之以作樂張舜元曰震有著樽𧰼坎有酒𧰼全體有簋𧰼坎為缶何𤣥子曰簋貳樽酒而副以簋也禮天子大臣出會諸侯主國樽于簋副是也爻變為兌當坎世而君臣相說故其𧰼如此按爻變中爻為巽順而善入納約之𧰼趙氏所云險變為順亦謂巽也九五坎不盈祇既平无咎𧰼傳坎不盈中未大也虞仲翔曰盈溢也艮為止謂水流而不盈坎為平地安也艮止坤安故祇既平張子坎盈則進而往有尚矣楊龜山曰陽在重隂之中雖中而未大故坎不盈祇既平而已盈則出險矣然既平則有出險之漸故无咎朱漢上曰祇適足之辭項平甫曰九五已登上坎无重坎矣然水必盈坎而後可出獨處隂中无應于下如水之力適與坎平未能流而出坎故曰中未大馮厚齋曰五在上卦之中有剛明之才宜有以出險矣而上猶有隂所以不盈而祇既平蓋下有坎故流而不盈未出險故既平而已上一隂猶岸也龍門之險至盟津而平乃利涉焉既平則險可濟按坎之中水也未大故不盈大則盈科而進矣上六係用徽纆寘于叢棘三歲不得凶𧰼傳上六失道凶三歲也九家易曰坎為叢棘又為法律上罪三年舍李氏鼎祚曰坎于木為堅多心叢棘象巽為繩係用徽纆也馬融云徽纆索也三股為徽兩股為纆孔仲達曰用徽纆之繩寘于叢棘若能自修三歲可以自新故𧰼曰凶三歲言三歲之後可免也程傳以隂柔居險極以其陷之深取牢獄為喻張紫巖曰水逆行謂之洚水上六處重險之極失道彌甚厯三爻復歸于坎為三歲不得龔泉峯曰坎卦本以陽陷隂為義至爻辭則隂陽皆陷不以陽陷于隂為義陽之陷為可出隂之陷反為甚何𤣥子曰變巽為入坎尚往者也上居險極且伏而入終不能出險按坎為法律重坎之上法之峻也故象如此要以水極于上懷襄之勢也重坎之時下則横流上則滔天皆失水由地中行之道故初上皆云失道坎以中一陽為水上下二隂為土為岸而于重卦又往往以上之偶畫分拆為隄缺防開之象大過之滅頂既濟之濡首亦是也故傳言上六失道者盖以上六則偶畫分拆于上是為失道也唯井以上出為功故以上偶畫為勿幕而吉取𧰼之細而變若此亦可見此卦初上之失道不可直作道理之道解矣離下離上中爻巽兌程傳離麗也明也取其隂麗于上下之陽則為附麗之義取其中虚則為明義離為火火體虚麗于物而明者也朱子水質隂而性本陽火質陽而性本隂水外暗而内明以其根于陽也火外明而内暗以其根于隂也郭兼山曰人者天地之合也水為精火為神其精神者天之分骨骸者地之分各有所麗焉故合則渾離則散方其合也氣聚而形成于有方其離也氣散而神合于无是以離附物則生去物則滅聖人以是而知死生之說離利貞亨畜牝牛吉彖傳離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也王輔嗣曰離之為卦以柔為正故必貞而後乃亨柔處于内而履正中牝之善也外强而内順牛之善也離之為體以柔順為主故不可以畜剛猛之物而吉于畜牝牛程傳牛之性順牝又順之至也畜牝牛謂養其順徳楊龜山曰火无常形麗物而有形盈天地間未有无所麗而能有成者重明合二體言也柔麗乎中正以六二言也柔不中則茹不正則邪故麗乎中正乃亨郭兼山曰成卦之本在二二有牛𧰼而爻曰黄離元吉又從可知也朱漢上曰離中之隂即坤之隂坤為牛順也六二以隂居隂為牝牛至順也以剛正畜養之而麗乎中正故亨是以畜牝牛吉李隆山曰離中虚心之𧰼利貞則亨畜牝牛則吉此聖人敎人牧心之法畜之為言牧而止之之謂也離之性上若不能畜牝牛則不免有炎上之患項平甫曰上卦為重明下卦三爻皆麗乎正故曰重明以麗乎正句中加以字如同人之文明以健賁之文明以止皆論上下兩卦之體也日月麗乎天而成明百榖草木麗乎上而成文故離為文又為明張紫巖曰明本于性因而重之緝熈光明之學也或謂上下俱明是不然互坎為日月互巽為百榖草木邱行可曰五為天位日月麗乎天之𧰼此以氣麗氣二居地位百榖草木麗乎土之𧰼此以形麗形趙汴水曰人心无常不能无所麗重明繼作所麗皆正而後道化可得而成蓋化易于行難于成前聖明而正矣繼之者或正而不明或明而不正則前行後廢何成之有胡雲峯曰坎之明在内以剛健而行之于外離之明在外當柔順以養之于中況坎水潤下愈下則陷故以行為尚離火炎上愈上則焚故以止為吉梁孟敬曰一隂居内二陽在外為之防閑畜牝牛象易外坎一剛為牝馬離一柔為牝牛牝馬牝牛皆心也畜牝牛者畜其心也麗乎中者畜之道也日月麗乎天之正心畜乎身之中麗亦畜也百榖草木相見乎離而互巽則齊乎巽觀彖或疑牝牛坤𧰼而離取之坤反為牝馬何也曰惟坤之非馬故曰牝馬取其順而能健惟離之非牛故曰牝牛取其明而能順初九履錯然敬之无咎𧰼傳履錯之敬以辟咎也王酸棗曰處萬物相見之初履錯雜之時蘇子瞻曰六爻以相附麗為事火性炎上故下當附上初九附六二以柔附剛者寧倨而无諂以剛附柔者寧敬而无瀆趙復齋曰柔承剛所履錯然初九出而遇之能敬則隂陽合徳動與物交皆天理也日出而作故發此𧰼王童溪曰諂則失已非下承上之道慢則失人非剛接柔之道初之敬者所以解諂與慢之咎也初九之所以能敬者以正故也張紫巖曰離初禮所始行也初以剛陽居離明先用能行禮于離項平甫曰相麗之初未論求福且欲避咎沈守約曰變為艮艮為徑路艮止也知其當止而止之敬之𧰼馮時行曰日方出人夙興之晨履錯然動之始于其始而加敬則終必吉禍福幾微每萌于初動之時故戒其初易外履者禮也錯然者離之文章也離有文章之麗无敬以直其内則飾焉而已有敬則其文章乃麗如日月之東西錯然而麗天百榖草木之花實錯然而麗土人五性本于五行火行則禮離初火行之初故言禮觀彖敬者人心之朝氣也能常敬則不昏矣六二黄離元吉𧰼傳黄離元吉得中道也王輔嗣曰居中得位以柔處柔履文明之盛而得其中侯行果曰此本坤爻故云黄離程傳以文明中正之徳上同于文明中順之君大善之吉𧰼傳不云正者中也正在其中郭白雲曰離之六爻二五為美五中而非正柔麗中正者唯六二盡之黄為中之色而徳之至美者也故元吉其義與坤六五相𩔖李去非曰黄地之中色與黄裳元吉同裳下飾而離為日此其異也項平甫曰坤之六五黄裳元吉離乃以六二為黄離元吉者自坤言之六五坤道之最盛而用柔中故元吉離則乾之本體而坤來文之其義以明為主乾之九二本自文明而坤之六二又以地道之光來居其位光明如此而以柔順中正將之故曰黄離元吉得中道也沈守約曰變而為乾大明升天得其所麗卦變大有火在天上萬物咸照文明之盛胡雲峯曰離性炎上上之中不如下之中為元吉易外𤣥水之正色黄火之正色火以黄光為吉未逺于地則黄火之本也漸近于天則赤火之未也火初生而其氣方柔又居地之中故黄也日初出黄以離地氣未逺也日將入亦黄以復與地氣近也黄者日之氣氣之黄者為元氣聲之黄者為元聲色之黄者為元色坤之黄色之元也離之黄氣之元也九三日昃之離不鼓缶而歌則大耋之嗟凶𧰼傳日昃之離何可乆也荀慈明曰初為日出二為日中三為日昃程傳離之義在人事為最大九三居下卦之終前明將盡後明將繼之時人之始終時之革易日昃則將没矣朱漢上曰九三離腹變坤為缶艮手擊之鼓缶也項平甫曰句法不節若則嗟若同日既昃矣不動而求樂則坐而待憂九三動為震震為鼓為聲互坎為缶又為擊缶之聲梁孟敬曰過剛不中時去志荒哀樂失常能无凶乎君子值此思患之心與樂天之誠並行而不悖不暇于歌何至于嗟易外日昃之離歌與嗟皆為死生所動故皆凶日不可以乆中而不昃人不可以乆生而不死故曰何可乆盖憂生與達生皆非正道聖人唯順其自然觀彖日過中則昃喻人之徳衰而向昏九四突如其來如焚如死如棄如𧰼傳突如其來如无所容也王輔嗣曰處于明道始變之際昏而始曉没而復出故曰突如其來如程傳繼明之初故言繼承之道在上而近君繼承之地也以陽居離體剛躁而不中正突如而來非善繼者上陵其君不順所承人惡衆棄天下所不容吕藍田曰剛柔不當位則剛必凌柔下必犯上不順之勢物所不容不戢自焚趙復齋曰炎上侵五故戒之深不然如日之再升明之日新亦其𧰼也吕東萊曰九四處近君之位聖人于此一爻嚴其義峻其辭正天下之大分明君臣之大閑六十四卦近君之位獨于離一爻言之何哉盖離有相繼之義大抵人臣之繼君必如舜禹乃可无舜禹之心即是莽卓馮厚齋曰竈之出火者謂突突如下卦之火從突出衝上按此解極精九四之火非外來也由内而出積之所致也天下之患生于積重而況于炎上之火此即馴致其道至堅氷之例也莽操之禍豈忽然而來者耶張紫巖曰互巽巽為木為風木火以風行來如焚如也火出木盡死如棄如也沈守約曰變而為艮炎盛薄山火焚山敗火无所麗焚死棄𧰼胡雲峯曰四既上突而迫于五三亦上突而迫于四故四之焚愈甚吳草廬曰四變中爻成坎火入坎水而滅死也來矣鮮曰三之舊火既上于四而不能回四之新火又發五得中居尊四之火又不能犯上下兩无所容必至于焚死棄而後已章本清曰明之于人猶火之于木火宿于木而能焚木明本于人而能害人六五出涕沱若戚嗟若吉𧰼傳六五之吉離王公也項平甫曰九四為前明將盡急于求繼逆子也六五順子也以繼父為悲以承業為憂不以得位為樂凡天子諸侯之初嗣位皆當如此故曰六五之吉離王公也李西溪曰三日既昃上體繼之五為繼明之主也出涕戚嗟吉者盖以繼世易位事也故出涕戚嗟則吉𧰼曰離王公也盖此禮天子與諸侯達也朱漢上曰離目兑澤出涕也鄭康成曰自目出曰涕兑口嗟若也王童溪曰離王公謂麗正位也趙汴水曰顔色之戚哭泣之哀弔者大悦此其事也沱若嗟若五為君位而凶憂如此聖人故因爻辭之吉而釋之曰其吉者五為王公也以聖繼聖孝道之治天下如此所以吉也后王君公皆君也吳草廬曰六五為重離之主繼明而嗣位者也嗣天子之孝如是按易例凡有戒懼之處大抵以厲字或惕字盡之未有如此爻憂戚之甚者兩剛之間乃離之本體非逼也不足為懼且麗非陷比即四陽之逼亦在四言之耳五有柔中之徳苟以四之逼而涕泣咨嗟直魯哀高貴鄉公之流何以為文明之主无咎足矣安得言吉諸儒毎喜泛言君道致失爻義玩𧰼傳離王公三字乃春秋書即位之意不然五為君位六十四卦所同何于此獨揭而示耶易理之妙固以一𧰼可通萬𧰼然六十四卦亦以各有所主故謂之時尤于人事之大者聖人多以一卦示之如師言用兵訟言聴訟鼎言主器革言革命則離之繼明自主嗣位者言上九王用出征有嘉折首獲匪其醜无咎𧰼傳王用出征以正邦也張子離道已成然後不附可征本義剛明及逺威振而刑不濫蔡節齋曰王五也上以陽居五上處離之極五用之出征則有嘉美之功離為甲胄戈兵李西溪曰繼體之君自當出征有扈之戰啓之所以承禹淮夷之征成王以繼武王葢不如是不足以正邦項平甫曰六五舜讓徳不嗣禹稽首固辭之時上九誅四凶征有苗之時趙汴水曰興師用武非王者初政之急不意有敗常干正之人不加獮夷失繼明之道聖人以正邦釋之猶康王曰張皇六師无壞我高祖寡命是也丘行可曰坎性下陷故上坎為安離性上炎故下離為安胡雲峯曰坎水内明外暗上六暗于外者必陷于刑離火内暗外明上九明于外者可用行兵剛逺則威震故曰折首明逺則刑不濫故曰獲匪其醜王秋山曰王位既正可以出征正其不正以正定其邦國也苟非繼明之始邦何待正總論胡雙湖曰易大傳云日月運行一寒一暑隂陽之義配日月懸𧰼著明莫大乎日月日月之道貞明者也愚謂太虚中萬物何莫非易之呈露特日月繼照真天地自然之𧰼易之為義尤著明于日月鄭氏厚曰易從日從月天下之理一竒一偶盡矣天文地理人事物𩔖以至性命之微變化之妙否泰損益剛柔失得出處語黙皆有對待故易設一長畫二短畫以總括之所謂一隂一陽之謂道者也陸氏秉曰易字篆文日下從月取日月交配而成是日往月來迭相為易之義説文日實也太陽之精无虧故文從圈滿而畫竒于内為日圏缺而畫偶于内為月或曰日月特坎離二𧰼何以得耑易之名曰易有爻有位九六為爻之隂陽初二三四五上為位之隂陽以爻之隂陽言之唯坎離二卦當日月之𧰼以位之隂陽言之初二三為位之離四五上為位之坎六十四卦之位皆坎離則六十四卦之位皆日月之𧰼也況日月隂陽之精天地功化皆寄在大光明中日之功又大于月月特受日之光大哉日乎出則晝入則夜行南陸則暑行北陸則寒萬萬古生殺慘舒皆日功用不然八表同昏父母諸子亦且奈何哉周易孔義集説卷八
