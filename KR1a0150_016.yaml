body:
  text: 周易孔義集說卷十六光祿寺卿沈起元撰下經兑下坎上中爻震艮節亨苦節不可貞彖傳節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民王輔嗣曰為節過苦則物不能堪無說而行險過中而為節則道窮也孔仲逹曰節者制度之名節止之義制事有節其道乃亨坎剛居上兑柔處下是剛柔分也剛柔分男女别節之大義也二五以剛居中為制之主所以得節節不違中所以得亨此以二體及二五剛中釋所以為節得亨之義石守道曰坎陽在上兑隂在下亦如為君為父為長者在上為臣為子為少者在下聖人制節謹度莫大於人倫故得節之義程傳事既有節則能致亨節至於苦不可固序以為常也內兑外坎說以行險也五居尊當位也以節主節者也處得中正則節而能通過則苦矣本義節有限而止也澤上有水其容有限故為節當位中正指五又坎為通郭白雲曰天下之理過則有節不及無節也過而不知節則傷害隨之節無傷害是以亨也節之過與無節同非亨之道朱漢上曰凡物過則苦味之過正形之過勞心之過思皆曰苦苦則違性情之正人情易則行險則止以說行險雖止不失其和王童溪曰節物者無其位則不能行無其道則不可久九五有其位中正有其道張紫巖曰順人情以行所難行曰行險以身先之曰當位度吾身之可行者於天下曰中正中正則可久而其道合天下之情故通度起黃鐘之律坎上為制度沈守約曰節救渙之弊也時之所以叛離渙散必其綱紀法度之盡隳也節以止之使下有法守而上有道揆所以救其弊坎藏一而在上豐其源而嗇出不傷財象兑為澤而在下澤及下而民說不害民象趙復齊曰內卦陽盛隂為之節外卦隂盛陽為之節昧者困於物通者皆實理喜怒哀樂發無不中其為節也不亦優乎當其可中正而已天地之節播隂陽五行於四時是故陽復於子長於己而隂節之隂遇於午極於亥而陽節之厯有章蔀紀元嵗有春夏秋冬月有晦朔弦望日有晨昏晝夜何莫非節節止也所以止不中不正而歸於中正也竹有節故幹聳水有節故盈科而進制者謂以此制民之情度者謂以此為法則先王之禮經盡之馮厚齊曰以坎節兑坎為法律象也陽富為財隂虛為民隂陽雖相節而三隂三陽仍在陽不傷隂不害也李隆山曰以坎乘兑坎水得兑澤而止故為節趙汴水曰物無節其生也不遂事無節其用也不通節有必亨之理李蒙齊曰節之義近於嚴峻是行險也以說道行之甘節是也坤之六五節之成坎是太隂而節以少陽冬之有春之象乾之九三節之成兑是太陽而節以少隂夏之有秋也人欲無窮苟非節以制度則傷財害民故愛人必先於節用胡雲峯曰月有中氣有節氣節則適中故可通行於天下錢啓新曰坎欲流以兑而有所主兑為主坎常不失其流五得中非其一於流而無止又非一於止而不流是以亨按三隂三陽之卦共二十而言剛柔分者止噬嗑與此卦隂陽各半之說似與本卦卦義無涉初九不出戶庭無咎象傳不出户庭知通塞也程傳當節之初戒之不出户庭則無咎然君子貞而不諒通則行塞則止故象明之曰知通塞也張子見塞於九二故不出本義户庭户外之庭陽剛得正居節之初未可以行能節而止邱行可曰初四雖有應然陽爻蔽塞一不可出四為坎體應則入於坎窞二不可出剛在下而無位三不可出馮縉雲曰初則二蔽之二則無蔽之者二猶户三猶門四猶路朱漢上曰初九六四正應往來故曰通九二近而不相得窒其所行故曰塞變成坎坎水為知故知通塞動有險故不出户庭乃無咎不出而處不語而默雖有正應不說也是之謂節王童溪曰此回居陋巷之時也項平甫曰初在兑下兑為户闔户之時不可出也趙汴水曰六爻莫外於上莫內於初猶之宫室初為房奧庭除深居密處不與外接此隱約之士胡雙湖曰前陽爻為户隂爻為門同人初隨初明夷四皆隂爻在前稱門節初户庭前有九二二門庭前有六三也九二一爻橫於初九之前有户閉而不通象又前有名山大川之險艮又止其前故初二皆有不出象徐天章曰户以節人之出入澤以節水之出入故初不出而無咎唐凝菴曰節之所以異於習坎者惟下一爻塞乎兑底所以節坎之流耳初在兑正不當通而當塞之時吳敬齊曰節兼通塞言猶艮兼行止言也初九知塞而兼言知通者見其非一於止也二失時極則但知塞而不知通矣按知通塞云者因九二之失時而兼及之兩傳緊相呼應九二不出門庭凶象傳不出門庭凶失時極也蘇子瞻曰水之始至澤當塞而不當通既至當通而不當寒故初九以不出為無咎言當塞也九二以不出為凶言當通也程傳剛中之質而處隂不正居說失剛承柔近邪不出門庭謂不從於五不正之節也失德失時是以凶張紫巖曰方節之時上有建中之君九二以剛在臣位中才健而不肯任事容悅取媚不恤國家大計者艮為門庭艮止為不出互震震主動當動而止故曰失時項平甫曰二為互震為門闢户之時當其可動不可不出張禹李績謹密不言而覆漢唐之祚凶孰大焉張南軒曰處節之道要知時識變處顔子之世不可為禹稷之事當禹稷之位不可守顔子之節吳草廬曰九二以敵應不相與故不出胡雲峯曰初九於時當止位雖有應止非失時九二於時當行位雖無應行非干時故節而止者易節而通者難龍麟洲曰二雖震動體而前艮為止又前為坎險是雖有疏通之象而不能出華霞峯曰初正兑底所以止坎之流故在初宜塞二剛中之水與坎五合為流通矣故在二宜通按九二剛中非柔退者震户方開前無壅隔雖互艮在前何至有不出之象蓋亦以剛則能自守中則可自信所以當節之時知節之當守而不知節之貴通又爻變為水雷屯屯難守固以兑之少女乘班如之馬矢不字之貞為不出門庭之象也周公警之以凶為大臣不任事者之戒孔子歎其失時亦明其未為失德歟六三不節若則嗟若無咎象傳不節之嗟又誰咎也張子處非其位失節也然能嗟其不節有補過之心則亦無咎若武帝下罪已之詔而天下大悅李元達曰臨之六三失臨之道而既憂之節之六三失節之道而嗟若皆得無咎易以補過為善也鄭東谷曰進乘二陽處澤之溢過乎中而不節者三也馮厚齊曰畫有穴而决之象此不能節者蔡節齊曰六故不能節三故能嗟趙汴水曰節以剛為主三能嗟其不節則知悔知悔則有節誰將咎之胡雙湖曰以澤節水其成卦正在六三一爻今自爻觀之坎水自溢出於兑澤之上非三之所能節者故有不節象兑口開又有嗟若象吳草廬曰又誰咎也同人與節釋經文言誰得而咎已解三經文無無咎字乃夫子自言其無所歸咎也龍麟洲曰居兑說之極兼震動之體不能節者然又兼艮止則非終不節者按爻言無咎例非貶辭輔嗣作無所歸咎者殊非易例爻雖以隂不中正而有不節之象而震動則知懼艮止則能節所以有嗟若之象爻變為乾乾以知險卦變為需健而不陷所以無咎六四安節亨象傳安節之言承上道也程傳順承九五剛中正之道是以中正為節也以隂居隂安於正也下應於初水上溢為無節就下有節也四安於節故能致亨節以安為善四能安節之義非一象獨舉其重者上承九五中正之道以為節足以亨矣項平甫曰六四順受九五之節而得其亨亨自上為之故曰承上道也此所謂制數度也王童溪曰節而勉强非可久之道九五中正為節之主四以柔正上承剛柔相濟以成制節之功非有所勉强也故曰安趙汴水曰九五以當位而節六四之柔六四以當位而承九五之道承上之云明四能安於五之節也胡雙湖曰四最先受節者順正故安胡雲峯曰六四水澤之交水於此自然受節九五甘節吉往有尚象傳甘節之吉居位中也王輔嗣曰為節之主不失其中不傷財不害民之謂也節之不苦非甘而何程傳所謂當位以節中正以通者也在已則安行在人則說從節之甘美其吉可知以此而行其功大矣故可嘉尚朱子甘與苦對甘節與禮之用和為貴相似郭白雲曰安節自安而已人未必安甘節則人已皆不以為苦項平甫曰九五得中為甘甘者五行之中味也趙汴水曰甘受和和者節味之偏而適其中行之以甘人不吾病而事以成胡雲峯曰他爻之節節其在我者九五當位以節節天下者也節天下而天下甘之所謂中正以通五本坤體又居中故有甘象在臨之三則我求說於人故無攸利在節之五則人自說於我故行有尚唐凝菴曰兑為止水而撰震坎為流水而撰艮止中有行流中有止五二相尚彼此適中併二之塞而為甘一卦之節皆通為甘為往有尚錢啓新曰往謂通之以節天下觀彖居中有由中之義水之由中而出者其味甘也上六苦節貞凶悔亡象傳苦節貞凶其道窮也干令升曰彖稱苦節不可貞在此爻也孔仲達曰節極過中以至於苦吕藍田曰用過乎節物所不堪守是不變物窮必乖故貞凶然禮奢寧儉未害於義張子處險之極故曰苦節道雖窮而悔亡木義雖有悔而終得亡之沈守約曰居外無位唯守一介之節為自苦難行之行以修其身可以無悔然非通人達士可與立制議者也項平甫曰上六苦節之極貞而不變以此施於當世其道則凶乃若其心則信正而行不以為苦故曰悔亡古之苦節之士蹈禍敗而不悔者多矣王氏湘鄉曰甘節良臣也苦節忠臣也君子不得已而為之以為常則凶矣然殺身成仁亦無後悔趙汴水曰節以求通節至於苦非可繼之道我術已窮何以使人之通凶之下言悔亡與大過上六凶之下言無咎其義相近胡雲峯曰苦節之悔猶勝不節之嗟胡雙湖曰二至五似離有炎上作苦象俞石澗曰凶以其過於中也悔亡以其正也陸庸成曰觀下卦通塞二字上卦甘苦二字可以知節道矣通處味甘塞處味苦塞極必潰故三受焉甘失反苦故上受焉髙忠憲曰雖凶而悔亡雖苦而實節華霞峯曰天下有時值其窮不得不苦其節者聖人著不可貞之義於彖辭所以貴通人之節設貞凶悔亡之教於爻所以明固窮之操按此爻程傳悔則凶亡之說殊不可從兑下巽上中爻震艮程傳節者為之制節上能信守之則下能信從之中孚所以次節朱子孚字從瓜從子如鳥抱子象今乳字一邊從孚蓋中所抱者實有物也郭白雲曰雜卦曰中孚信也夫信者孚之一也信不足以盡孚故必曰中孚孚之道有無心於信天下而天下信之之意無不感無不通無不受而容之也道有誠有孚有信信者孚之一孚者誠之一項平甫曰坎離者乾坤之用故上經終於坎離下經終於既未濟頤中孚肖離大小過肖坎故上經以頤大過附坎離下經以中孚小過附既未濟趙復齊曰隂盛而陽陷為坎陽盛而隂麗為離故小人勝君子則掩而害之君子勝小人則容而化之小過有坎象中孚有離象按澤水同象而唯風澤為中孚者蓋坎自奔流不因風動澤乃止水無風則靜遇風則動其相感甚速所以為孚但風必在澤上而澤不可在風上故澤風則聖人專取卦畫而為大過而大象則取巽之木而不取巽之風中孚豚魚吉利涉大川利貞彖傳中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也陸君陽曰三四合體為中孚之主中孚者中有誠信若鳥卵之有孵實柔在內而剛包之鳥卵孵實之象也蘇子瞻曰謂之中孚者如羽蟲之孚有諸中而後能化也內無陽不生故必剛得中然後為中孚程傳二柔在內中虛為誠之象二剛得上下體之中中實為孚之象上巽下說上至誠以順巽乎下下有孚以說從其上其孚乃能化於邦國也信及豚魚信道至矣以中孚涉險難其利如濟川而以虛舟則無沉覆之患卦虛中為虛舟象中孚而貞則應乎天天之道孚貞而已守信之道在乎堅正故利貞張子上巽施之下說承之其中必有感化而出焉者蓋孚者覆乳之象有必生之道朱子無事時虛而無物曰中虛自中虛中發出來皆是實理曰中實一念之間中無私主便謂之虛事皆不妄便謂之實不是兩事朱漢上曰孚猶鳥之伏卵也巽伏於上說從於下不動而柔者化剛者應拚然而飛矣化邦之道猶是巽為木兑金刳其中舟虛也象中虛涉川之利重載不如虛舟仗誠而蹈大難猶乘木而其中枵然豈有風波之患馮厚齊曰孚卵也孚卵育而化也古蓋以卵為孚在人則性由中而發於外而人化之也巽為木為風木得風而行於澤上所以利涉中孚之義由無妄也有正有不正男女之相期士夫之死黨小人之握手出肺肝相示皆不正之孚也故利貞誠者天之道正則應乎天不正則狥乎人孚不足言矣李隆山曰羽蟲之孚柔渾於內而剛殼於外雌伏啐喙不違其自然之期信之最可必者趙復齊曰柔在內而不掩剛得中而為主則隂說乎陽而巽順以聽此君子所以化小人也下卦為內上卦為外而三四二爻有時為內於中孚見之二五為中而三四二爻有時為中於益於中孚見之又有隨時取中者如復之六四柔曰內剛曰中聖人立言精妙化邦之道如風之入如澤之潤天之道四時不忒莫知其利周子曰利貞誠之復王秋山曰豚魚出澤必風此天地間不言之信人之孚信及夫豚魚則孚道至矣風於澤澤於風二者以虛相入以實相受中孚之象吳草廬曰豚魚澤中之物俗謂江豚澤將有風則浮出水面南風則口向南北風則口向北舟人稱為風信風澤之卦故取以為象中實之孚其信如豚魚則吉二五中實能孚於三四而三能說四能巽以孚於二五是二五之孚能化一國之民而使之孚也邦指三四之民而言胡雙湖曰吳氏江豚之說隆山厚齊皆同隆山謂中孚之豚魚以巽兑合而為之諸儒不究本象釋豚魚為二物厚齊則謂水陸不相類而象意俱失愚謂巽為魚而生於兑澤則是江豚明矣龍觀復曰玉篇江豚一名鱄䱐亦取專而孚之義歟何𤣥子曰豚魚澤處而知風不爽其信全乎天者也人能積孚於中始於天之無僞終於天之不爽若豚魚焉則誠精之體有完無虧吉可知矣即以化難化之人平難平之難至誠可格如大川之可涉矣信及豚魚猶言信如豚魚也易外風將起澤豚魚必先知之風無心而信豚魚豚魚亦無心而信風皆天之所為故曰應乎天按彖辭直言豚魚吉是言豚魚之吉非言格及豚魚者之吉也夫豚魚何以吉以其信也故夫子以信及豚魚釋之明文王以豚魚之至信而任天者為中孚之誠至而自然之象也若如王輔嗣說則豚魚祗作草木字看矣初九虞吉有他不燕象傳初九虞吉志未變也郝京山曰中孚貴初初陽在下陽氣方潛初念純一其志未雜故虞吉錢啓新曰虞澤虞一名固澤鳥時常在澤象主守之官唐凝菴曰燕春去秋來有信之象使初有他不能若燕之信於孚道有虧孫夏峯曰虞澤鳥也以主守不易為信者也燕𤣥鳥也春去秋來以隨時變易為信者也初方立而遽求權故聖人許其為虞難其為燕他也者未離於守而妄託於通嘗試非其所安尚與圓機有間是薄虞而非虞學燕而非燕兩失之者也虞燕二義只一豚魚可兼吳尊彜曰初陽始孚以說應順與物忘機然震動在上防其志變故以有他示戒按中孚之義以誠一而任天為孚道之至此爻虞吉文義與豚魚吉一例諸家以虞字訓安訓專更或為虞度為虞防為歡虞為憂虞皆不免經營紛擾與憧憧往來無異何以言吉傳何以言志未變馮厚齊以為虞人草廬雙湖宗之唯錢啓新以為澤虞之鳥孫夏峯特主其說愚細玩之卦以孚名取羽族孚子為象又卦似大離離為飛鳥故曰鶴曰翰音多言羽族則虞為澤鳥適從其類考澤虞字出爾雅非無稽俗說夫彖稱豚魚吉者取自然之信純乎天也則澤虞與豚魚一例虞吉與豚魚吉文義亦一例於象則取澤中之鳥於義則取其任天而不雜以人澤虞即鵜鶘澤之外無他往魚之外無他好終日立澤飲啄在是靜以自守不易其性初剛以之孔子故以志未變釋之若作虞人恐未見其志之不變何遽以吉許之當從澤鳥為優有他云者乃未變之反似不必指為應某從某也唯燕字作安字者泛作燕雀之燕者似未為的姑存之九二鳴鶴在隂其子和之我有好爵吾與爾靡之象傳其子和之中心願也王輔嗣曰處內而居重隂之下履不失中不徇於外任其真者也立誠篤志雖在暗昧物亦應焉故曰鶴鳴在隂其子和之不私權利惟德是與誠之至也故曰我有好爵吾與爾靡之本義好爵謂得中靡與縻同言懿德人之所好故好爵雖為我所獨有而彼亦繫戀之也朱漢上曰震為鵠鵠古鶴字鶴震聲感兑鳴於正秋九二象九二剛得中中孚之至者九居二在隂也靡子夏傳作縻巽為繩縻係象沈守約曰鶴陽明之物二兑體居重隂之下變而為震震為善鳴處於隂暗在隂象上比二隂與之相得陽說而鳴於下隂說而順於上和之象鄭東谷曰二獨無應若未信於人而爻最吉者自耀者其實喪自晦者其德章二以剛履柔而得中且伏於二隂之下無求而物自應者感以天也項平甫曰二鳴於澤中不求人知而三以同體自來相和二有好爵樂與三同李蒙齊曰好爵者孟子所謂尊爵也天爵也良貴也靡共也同也胡雲峯曰鶴鳴子和天機之自動好爵爾靡天理之自孚俞石澗曰爾指三我吾九二自謂也何𤣥子曰二五皆以剛得中而臨在內之柔孚信厚積合體無間故聖人於此發中孚感通之妙鳴鶴九二也其子三四也二為隂位在兑澤之中艮山之下幽隱之處故為在隂卦象中二隂如鳥卵二上孚之如抱卵然其子象也繫辭曰况其邇者邇指其子而言好爵指五五乃體備天爵而據人爵之尊者故謂之好爵謂二積其誠信孚於三四以上應乎五也龍麟洲曰二以中實之孚感三四中虛之孚出於自然如鶴鳴子和孚之至也隂陽相感則鳴錢啓新曰二鳴三四兩爻一體震動上下賡鳴二五合中無分吾我故好爵在五而謂之我易外中心願二隂之中為心虛故孚孚故願其鳴也由中而發發本無心乘乎天氣之清其和也由中而應應亦無心接乎母氣之和三四之虛皆無心之至以氣相貫以聲相通猶君臣相得一都而一俞也好爵爾靡者君以人爵而靡士之天爵士以天爵而靡君之人爵攣如者好爵相靡之象按諸儒以二為鶴五為子五為鶴二為子或又以初為子於爻位不順且敵體弗和俱不可從本義好爵謂得中蓋以二言也何氏指五蓋五以中實應二則五之好爵即為二之所有矣二說可兼六三得敵或鼓或罷或泣或歌象傳或鼓或罷位不當也王輔嗣曰三居少隂之上四居長隂之下對而不相比敵之謂以隂居陽欲進者也欲進而閡敵故或鼓四履正而承五非已所克故或罷不勝而退懼見侵陵故或泣四不與物校退不見害故或歌進退無恆憊可知也吕藍田曰以隂居陽雖與上應而比於四近不相得所以得敵張紫巖曰二隂相偶曰敵敵有競進意風澤相激為鼓罷為歌泣項平甫曰二隂之勢等故三稱敵四稱匹稱類中孚以中正相孚三皆無之故至於此胡雙湖曰鼓震動象罷艮止象泣二至四似離而有兑澤象歌正當兑口象俞石澗曰三四兩隂相並而成匹故曰得敵爻柔位剛半動半靜又不中不正故其象如此蘇紫溪曰人而孚則千里之外孰非吾與人而不孚則一室之近孰非吾敵作止哀樂皆失常度所謂人而無信不知其可也何𤣥子曰三內卦主四外卦主同為隂柔而其志相反敵也按此卦合六爻觀之有中虛之象以二體言則二女也三四又長少主爻相比而不相得三又不若四之正乃起而為敵澤遇風而興瀾故無定形鼓罷泣歌曲肖少女之情態此與中孚正相反者也傳言位不當者以隂居陽非虛非實動靜無恆也或以上九正應為敵者非易例六四月幾望馬匹亡無咎象傳馬匹亡絶類上也王輔嗣曰居中孚之時處巽之始應說之初居正履順以承於五內毗元首外宣德化充乎隂德之盛故曰月幾望馬匹亡棄羣類也孔仲達曰棄三之類如馬之匹亡絶三之類不與之爭而上承於五也郭白雲曰馬匹不亡則有鼓罷泣歌之纍今馬匹亡則安行上道得敵匹亡其道正相反也朱漢上曰古者駕車四馬兩服為匹兩驂為匹王童溪曰隂道畏盈孚志貴一中孚所以為中孚者三四也四處近君之位以盈為戒月幾望則不至於盈不三之比而唯五之承馬匹亡象沈守約曰巽隂之長四巽之主隂之盛也趙復齊曰隂虛資陽月受日光也既望則缺幾望則盛胡雙湖曰自二至四互震馬象王秋山曰四中虛五中實以此之虛受彼之實如月受日之明而相望曰幾者猶有未盈何𤣥子曰大明生於東月生於西兑西震東下卦兑中爻震日月相望象九五有孚攣如無咎象傳有孚攣如位正當也胡安定曰居尊位而中正是有至誠至信之心發於內而交於下以攣天下之心上下內外皆以誠信相通何咎之有本義剛健中正中孚之實而居尊位為孚之主下應九二與之同德張紫巖曰五剛中為有孚互艮艮手艮止為攣二隂中虛羣陽協順為攣如趙復齊曰爻至此始稱孚盡卦義也餘卦稱孚者多泛言也此卦欲盡其義故諸爻吝之李蒙齊曰九五中正居尊下無係應誠而不私盡中孚之道者也止稱無咎者即聖人處無過之地也位正當者美其有天德而居天位胡雲峯曰九五合九二以成一體包二隂以成中孚其固結如此五二一心故也一則孚孚則化王秋山曰五以巽順中正為孚之主初上同德相親三四柔順相承九二剛中而應上下牽攣而歸之是無一民一物之不孚何咎之有按中孚雖兼中虛中實二義究以實為感虛為應故中實乃中孚之本而二之實不如五之實九五所以為中孚之主而能盡卦義也上九翰音登於天貞凶象傳翰音登於天何可長也王輔嗣曰翰高飛也飛音者音飛而實不從也居卦之上處信之終信終則衰忠篤內喪華美外揚故曰翰音登於天孔仲達曰虛聲逺聞也程傳陽性上進風體飛揚九居中孚之時處於最上孚於上進而不知止者也貞固於此而不知變凶可知矣夫子曰好信不好學其蔽也賊固守而不通之謂也張子將變而為小過也本義雞曰翰音巽之象居巽之極為登於天雞非登天之物而欲登天信非所信而不知變亦猶是也朱漢上曰雞振其羽翮而後出於聲翰音也鄭東谷曰信貴在中乃極乎上巽風也以陽居之蓋以飛求顯以鳴求應者實既喪矣何能久哉沈守約曰雞陽物而巽隂無力於飛鳴者也巽為風風行天上有聲無形變而為坎陽陷於隂實不從也李蒙齊曰上九剛在外而不中飛鳥之音宜下不宜上逆而不順何可久也吳草廬曰雞知旦物之有信者胡雲峯曰五上天位九二鶴也而鳴於地之隂上九雞也而鳴於天之髙有是理乎梁孟敬曰上九處中孚之極是以信而有聲聞者也不中正而以有信聞其有信之名無信之實者雞不能飛而音聞於天聲聞過情貞固守此安得不凶按翰音作雞本之戴記注疏止作鳥音似尤穩蓋記非周以前書也艮下震上中爻巽兑小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖傳小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也宋仲子曰二陽在內上下各隂有似飛鳥舒翮之象故曰飛鳥震為聲飛而且鳴鳥去而音止故曰遺之音王輔嗣曰施過於不順凶莫大焉施過於順過更變而為吉孔仲達曰六五乘九四之剛六二承九三之陽上則乘剛而逆下則承陽而順故曰不宜上宜下胡安定曰飛鳥遺之音但聞其音不見其迹飛鳥翔空愈上則愈窮是上則逆也下附物則身安是下則順也程傳時當過而過乃非過也時之宜也乃所謂正也小過之時自不可大事而卦才又不堪大事與時合也中剛外柔飛鳥之象中二畫鳥腹上下二隂鳥翼鳥出於卵小過所以次中孚張子時宜用過雖過正也過於自大其勢必危過於自損可以獲吉郭白雲曰凡剛非二五皆非得位小過之義可過於下不可過於上可過於柔不可過於剛故不及其君遇其臣所以為小過之無咎朱漢上曰所以小過者時而已譬之寒或過於隂暑或過於陽冬裘夏葛無非正也過而不失其正則吉柔得中也作大事非剛得位得中不能濟失位則無所用其剛不中則過乎剛是以小過之時不可作大事也王童溪曰鳥飛決起遺音不能上徹不宜上也音遺於下下所共聞宜下也吳草廬曰飛鳥遺之音以下象占為陽剛君子謀也隂强陽弱君子上則進為隂所忌易以取禍下則退就卑處可以全身大者陽也小過之時勇退而不進如鳥音之下而不上則大者可吉此君子不得志之時轉凶為吉之道也梁孟敬曰隂雖過陽然陽在於內隂皆順之故可以亨以隂過陽必利於正不正則不能亨隂之正者以順為正也俞石澗曰中孚肖離離有飛鳥象變為小過則肖坎見坎不見離則離之飛鳥已過但聞其遺音也隂本在下之物唯宜居下若居上則僭為卦震上艮下唯可過於止不可過於動故曰不宜上宜下初六飛鳥以凶象傳飛鳥以凶不可如何也王輔嗣曰小過上逆下順應在上卦進而之逆無所錯足飛鳥之凶朱漢上曰初艮體不正柔而止不當過也有應在四為四所以如師能左右之曰以其過至甚如飛鳥迅速雖欲救止不可如何項平甫曰初上二爻隂過而不中是以凶以象觀之初上二爻皆當鳥翅之末初六在艮之下當止而反飛以飛致凶上六當震之極其飛已髙動而成離則麗於網罟二五不言飛鳥者唯初上二爻動則成離離為飛鳥耿希道曰大過至上乃凶小過在初已凶以應上而求進失宜下之義也俞石澗曰以六居初不中不正之小人不安艮止之分而妄徼震動之舉如小鳥髙飛力盡必墮六二過其祖遇其妣不及其君遇其臣無咎象傳不及其君臣不可過也何𤣥子曰三陽為父四陽為祖五隂而尊妣之象妣在祖上如周人祖后稷而以其母姜嫄為妣故詩云似續妣祖春秋傳我所欲曰及不期而㑹曰遇二五雖非正應而同類相求越三而四以應於五是過其祖而遇其妣也然五雖德為妣而位則君三四居近君之位則皆臣也二未應五而先與近比之三四遇故又有不及其君遇其臣之象二有承陽之美而無害陽之心故無咎合訂五在三四之上二往應五則必越三四而上之矣六二柔順中正不肯躁進故寧比三而不應五所以然者以隂陽言六二婦也六五妣也三四為祖二上越三四而應五是遇其妣而過其祖然以位言五君也三四近君大臣二小臣小臣不可過孚大臣分也臣不可過則君不可及矣故唯遇其臣以通於君而已不可過非二陽阻之二自安分而知其不可也漢之朝錯賈誼暗於六二之義矣按此爻象義諸說不一均未為協唯何𤣥子近之朱髙安合訂尤明確而於兩象並列之故猶未疏解極暢愚玩象傳獨舉不及其君乃知過其祖二語非正象也考易例有客主二象並舉者孔子則獨釋主象以定爻義如夬之九三壯於頄客象也君子夬夬遇雨無咎主象也孔傳故獨釋君子夬夬萃之六三萃如嗟如無攸利客象也往無咎主象也孔傳故獨釋往無咎此爻柔得中而且正又艮止之中撰巽之下五又敵應故二有安於下之志而無上應之過此不及其君遇其臣為二之主象也上文二語乃客象因二五雖應而為兩柔敵體而言也若曰過祖遇妣在婦妣之情可接祖孫之氣可通猶可遇也然以位則君臣不可過此六二之所以不應五此六二之所以無咎也無咎不兼承過祖二句來易象難解處但據孔傳自得的解九三弗過防之從或戕之凶象傳從或戕之凶何如也項平甫曰三四二爻方為隂所過非能過人者也故皆曰弗過三在艮止之上當止而防之若恃其重剛而往從之則足取凶而已趙復齊曰艮故能拒兑故說應不能終止吳草廬曰防如捍水之防往從上六則或為所戕害胡雙湖曰朱子謂弗過遇之兩字為一句愚謂弗過防之亦當兩字為絶句隂過之時故二陽爻皆稱弗過二隂在下有上進之勢故當防錢啓新曰隂既過陽三之防之當如山之峙立而安固不搖方得免于戕害三苟弗防或以所應為從或以所比為從以失中之剛而從過極之隂其不為羣隂之所害者幾希三凶其從四戒其往小過之時利貞之道宜然唐凝菴曰九三為艮成卦之爻若隄防然所以止下之不上者皆其力也苟以上之正應從則自失其止或以兑之毁折而戕害之凶立至矣九四無咎弗過遇之往厲必戒勿用永貞象傳弗過遇之位不當也往厲必戒終不可長也陸君陽曰小者在上四能下之是以無咎以陽居隂故位不當斯得小過之心也若動而犯上失飛鳥之宜故往乃致危必在戒之而已勿用戒辭勿用所以深思逺慮以保永久之貞張子道非剛亢故無咎有應于下故曰弗過遇之王介甫曰居隂而應下雖于卦為震不志于動以進者故無咎遇若孔子之遇陽貨可遇不可往也郭白雲曰遇之下順乎柔不以剛自居也位不當所謂剛失位而不中也朱漢上曰盛衰相循無小人常過君子之理陸震曰小者之過終不可長也戒而慎之以俟其復沈守約曰剛不當位豈免于咎下應于初不失其順上承于五不犯于逆是以無咎陽居震始剛而動也變而為坤順也卦變為謙不亢也是以弗過張紫巖曰勿用靜也如乾初九勿用永云貞貞不可須臾忘也雷西仲曰以陽居隂在上卦之下而又下應于初則務下不務上者故無咎君子失位不能過小人而不遽絶之故曰遇敬戒潔身以防小人之患曰必戒危行言遜也自守其正久而不改以待天時之復故曰永貞小人終不可長君子永貞則終有以過之矣俞石澗曰此爻皆以兩字為句按此爻以失位之剛處隂過之時而體震始前有兑毁故往厲必戒傳義勿用永貞為句作不可固守其常解考永貞之德易未有為不利者否困皆以貞而吉豈于小過而勿用之陸氏張氏說精矣六五密雲不雨自我西郊公弋取彼在穴象傳密雲不雨已上也程傳以隂柔居尊位雖欲過為豈能成功密雲不能成雨自西郊故也隂不能成雨張子三止于下隱伏之象小過有飛鳥之象故因曰取彼在穴朱漢上曰澤氣上而為雲兑隂盛也故為密雲沈守約曰澤動于上艮止于下不雨象隂居盛位不足當尊是以言公徐進齊曰隂陽和則成雨皆隂無應不雨象趙復齊曰陽微未達隂盛不下隂不主于陽而能利者未之有也胡雙湖曰小過全體似坎弓象互巽繩弋象俞石澗曰在穴謂三四兩陽爻在二五兩隂爻之問隂為我故以陽為彼何𤣥子曰五隂在三四之上亦欲畜二陽而成雨然二陽終不為和三四陷在坎中坎為隱伏故稱在穴雷動龍興方能致雨三為乾之少男四為乾之長男皆有龍德與五非正應故公用弋以致之姚承菴曰小過宜下不宜上隂至于五過甚矣居尊自亢澤不下究欲膏澤下于民必須求巖穴之士以為輔故戒之以求助抑之以下賢合訂陽不交通是以不能成雨為五進一䇿曰公其弋取彼在穴謂三四無異巖穴之士按時雖小過隂必資陽弋取在穴自當指三四兩陽穴者坎象五柔得中居尊可亨在于求陽不雨則不亨矣上六弗遇過之飛鳥離之凶是謂災眚象傳弗遇過之已亢也王輔嗣曰過至于亢將何所遇飛而不已將何所託孔仲達曰鳥飛而無託必離繒繳張子不宜上而上自取之災本義居動極之上處隂過之極過之已髙而甚逺者沈守約曰變而為離動極炎上亢也離為鳥為網罟飛鳥離之象卦變為旅旅上為鳥焚其巢此為飛鳥離之凶趙復齊曰二以柔遇中四以剛遇柔故皆無咎上六過中逺陽無所遇者亢極而凶王秋山曰三為正應乃當遇而弗遇二陽在下不當過而過之俞石澗曰超乎六爻之上故曰過之離與詩鴻則離之之離同總論按觀小過彖爻之辭聖人教人處亂世之道曲而至矣二陽陷于四隂無可遁也剛皆失位非困之得中也處此者不宜上宜下非獨位不宜上聲名亦不宜上東漢諸君昧于此義以取黨禍處小過者即在小過謹小慎微之謂也離下坎上中爻坎離吳草廬曰濟者渡水已竟之名二物相資相成亦曰濟易外既濟之象一日一月日下而月上以成其交所謂日月相推而明生既濟亨小利貞初吉終亂彖傳既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也王輔嗣曰初吉終亂不為自亂由止故亂孔仲達曰人皆不能居安思危慎終如始故戒以今日既濟之初雖皆獲吉若不進德修業至于終極則危亂及之彖曰既濟亨小小者亨也脫一小字陸君陽曰初以隂陽交故吉終則水火不同性故凶侯行果曰剛得正柔得中故初吉正則有終極濟有怠止止則窮亂鮮于侁曰終止則亂者返本之謂水返而終于潤下火返而終于炎上程傳既濟天下萬事已濟之時張子通其變然後可久故止則亂郭白雲曰易六爻有應者八卦皆應皆得位在六十四卦之中獨此一卦而已是知既濟者必有應必得其位然後可李隆山曰既濟則亨矣而亨在于小何也易以隂柔為小離之一隂在中也坎一陽在上與之相應小者得大者之應而亨也况三隂皆出三陽之上則是三者皆在上而亨也三陽下之隂陽相交而為既濟猶泰之隂上陽下而相交也其所以致亨者非獨兩兩相應以居位各正也蔡進齊曰六爻獨二有亨道故曰亨小初吉二也離明在內也終亂上也既濟終為未濟矣又坎難在外象趙復齊曰泰乾坤全體交既濟隂陽雜以交隂陽錯居陽皆交于隂至矣陽下濟隂故初吉隂上乘陽故終亂咸之不能為恆久矣六二居中柔未盛上承上六亢隂盛無承吉凶之辨馮厚齊曰六爻各當其位天下定矣所謂利貞者此也然定而無復有事則定者乃亂之源也邱行可曰人處多事則戒心生戒則畏而不敢肆治所由兆處無事則止心生止則怠而不復進亂所從起項平甫曰既濟以六二為主爻未濟以六五為主爻故二彖皆曰柔得中以柔為主柔為小故稱小焉謂小大皆亨者誤張紫巖曰精神交感君臣之德俱明為既濟離位在下互體又離易險為明何事不濟隂以陽亨曰亨小君用剛臣用柔一卦中剛柔各得其叙既濟之利在是二五正體互有明德故吉終或止之明者息矣上六柔失厥中柔道以窮鄭東谷曰既濟之時唯靜而不擾者為能守之下體柔得中守之以靜是初吉然靜不可止也止則蠧弊生而終亂矣離柔中也坎剛陷也始則守以柔中之德終則剛陷于中其才如是趙汴水曰小之致亨者火性炎上即以炎上為用也離在下實司鬱蒸發達之權凡交濟之用皆由于離離主隂小也及其終也君止于安臣止于佞上止于自奉下止于無告保濟之道窮胡雙湖曰既濟隂陽各歸其宗易于伏而不動履其運者若一切止而不為則亂矣俞石澗曰孔子恐人以為亨之小特加者字明六二之亨也何𤣥子曰自二至四互坎二為涉險之始兢惕意多故吉上處坎終狃其既濟亂自此萌唐凝菴曰天下之治全在于明上六正離互離俱所不及全以柔暗用事止而不流復成其險明所不及濟道以窮按勘亂之才非陽剛不可守成之主唯柔中為貴既濟者守成之時也然柔不利逺亨者小止者亦小中不中之分耳初九曳其輪濡其尾無咎象傳曳其輪義無咎也程傳以陽居下上應于四又火體其進鋭也時既濟矣進不已則及于咎故曳其輪使不進濡其尾則不濟既濟之初能止其進則無咎本義輪在下尾在後初象曳輪則車不前濡尾則狐不濟謹戒如是無咎之道語録非不欲濟欲濟而不敢輕濟也沈守約曰變而為艮止其行也卦變為蹇蹇于行也獸之涉水必揭其尾濡其尾蹇于濟也鄭亨仲曰坎為輪初在坎後曳之也蔡進齊曰狐有濡尾象亦坎也熊梅邊曰雖當既濟之初速于求進則復入于坎險故曳輪而無咎唐凝菴曰初有離之明能受水之濟皆知進止之義曳二之輪濡已之尾以明其不進則必圖所以永其濟者而後進矣于既濟之義為無咎六二婦喪其茀勿逐七日得象傳七日得以中道也王子雍曰體柔應五履順承剛婦之義也離為婦坎為盜喪其茀鄰于盜也勿逐自得履中道也二五相應故七日得程傳以文明中正之德應九五陽剛中正之君宜得行其志然五居尊位時已既濟無復進而有為在下賢才豈有求用之志自古既濟而能用人者鮮矣剛中反為中滿坎離乃相為戾茀婦人出門以自蔽者喪其茀則不可行然中正之道無終廢之理不得行于今必行于異時逐則失其素守勿逐自守卦有六位七則變矣馮厚齊曰詩翟茀謂以翟為蔽車之飾李隆山曰離為雉為文明有翟茀之象胡雲峯曰喪特失其在外者逐則失其在我者矣郝京山曰六二離主為中女婦象上應九五為坎坎為盜為輿喪其車茀象九三髙宗伐鬼方三年克之小人勿用象傳三年克之憊也干令升曰髙宗中興之君鬼北方國離為戈兵故稱伐坎當北方故稱鬼侯行果曰上六暗極九三征之張子上六險而應此處卦之未濟以終亂者也故以比鬼方九三以陽居陽文明而正故用師雖久困而必克吕藍田曰九三備文明之德宜伐暗者也髙宗有九三之德然後可以伐鬼方猶至三年憊而後克是以明伐暗不可易也本義當既濟之時以剛居剛髙宗伐鬼方象久而後克戒占者不可輕動徐進齊曰盡坎三爻而成既濟三年克之象九三當既濟之中以剛居剛欲兼舉內外之治故有此象楊誠齊曰未濟求濟者寧既濟求過于濟者傾九三當既治之世挾重剛之資居炎上之極有求過于濟之心賢君伐逺夷宜易而難宜速而久而况其餘乎沈守約曰中興之業既就逺方之伐既成逺近濟矣而使小人預其間貪功逞欲必以亂終不可不戒離變為震離為戈兵震為威武克伐象卦變為屯屯利盤桓三年克之象鄭東谷曰三處欲變之位剛陽過于有為視在內之事已濟必欲用剛以求功于外故為之戒無事之世捨內治而幸邊功者皆小人倡之也故曰勿用胡雙湖曰鬼方唐帝紀注夏曰獯鬻商曰鬼方周曰獫狁漢曰胸奴魏曰突厥龍觀復曰小雅覃及鬼方通言夷方此卦下離故伐言于三後卦上離故伐言于四其象明甚郝京山曰九三離坎之交水火相射克伐象進遇重險蹇蹇終濟三年克之象潘去華曰蓋盛世勤民之難也小人居盛不虞其衰成功不慮其難故戒以勿用九三離日將昃剛得正而位不中聖人唯恐其失之躁動也致警深矣髙忠憲曰人但知盛時物力之甚裕不知盛時舉事之易憊故以髙宗伐鬼方猶克之于三年小人勿用當嚴之于明盛也六四繻有衣袽終日戒象傳終日戒有所疑也陸君陽曰繻亦作襦飾之盛袽衣之敝六四得位于外名之美也險而乘剛行可疑也猶盛飾而衣有敝袽行有所疑而終不為纍者以終日之戒善補其過故聖人許之石守道曰大臣之位當既濟之時則思未濟言美服而敝如當既濟則亦有未濟大臣憂國故終日防慎而戒疑其有弊郭白雲曰既濟思患預防而六四又為多懼之地近君居險是以有繻有衣袽之戒袽敝衣說文謂繻為繒采蓋謂勿以新繒而忘敝袽亦猶勿以既濟而遂忘未濟之難也有所疑者雖未有患以多懼而預防之也蔡進齊曰既濟適中時且變矣故言繻雖美必至于有袽事雖濟必至于未濟必須終日戒慎則不至于終亂趙復齊曰六四坎離雜故疑林黃中曰說者謂敗絮可以塞漏舟愚謂不然漏舟而待敗絮非防患之道離為日三爻皆離終日象坎為憂戒懼象吳草廬曰四為日將昃之時將昃則漸終唐凝菴曰四當離終坎初雖有互離之文明而坎險已隱伏于中矣故曰繻有衣袽夫以綵繒為衣人見其外之文明豈知其中藏敝絮乎坎本有疑又互離互坎其疑可知稍有不戒水便滅火焉得不戒郝京山曰外繻而內袽亂伏于治坎隱之象來矣鮮曰四變中爻為乾衣之象又成兑為毁折敝衣之象按王輔嗣以繻為濡以袽為塞舟之滲漏林氏駁之當矣繻袽二象諸儒或以先後言或以表裏言雖小異可參看要于戒義警切九五東鄰殺牛不如西鄰之禴祭實受其福象傳東鄰殺牛不如西鄰之時也實受其福吉大來也王輔嗣曰牛祭之盛禴祭之薄祭祀莫盛修德黍稷非馨明德惟馨是以東鄰殺牛不如西鄰禴祭在于合時不在于豐也崔氏憬曰五坎為月月出西方西鄰之象應二在離日出東方東鄰之象也離又為牛坎水克離火殺牛之象鮮于侁曰東六二西九五殺牛用順之道禴祭誠篤之理二居文明之中厚禮薄信雖用柔順豈若薦誠蘇子瞻曰祭未有殺牛者禴時祭國之常事小人以為常事不足以致福故非時殺牛而求之不和時祭之福不求而大也既濟之主在安常守法而已求功名于法度之外則易之所謂殺牛也趙汴水曰牛為盛祭離言畜牝牛禴為殺禮猶坎言樽酒簋二既濟之時離主用坎困離而為用者也故其祭也東盛而西菲禮盛者誠或衰禮薄者誠必一以誠交神神實福之萃之大牲損之二簋各因其時胡雙湖曰程傳東鄰謂五西鄰謂二本義從之橫渠又謂東鄰上六西鄰六四愚謂東鄰指離六二西鄰指坎九五五以二為東鄰二亦以五為西鄰也坎為幽隂多說祭祀坎水又有禴薄之象實受其福九五陽爻為實也唐凝菴曰既濟之功雖盛于二之明享既濟之福乃在于五之時蓋五之得位即得時也吉大來五以陽大能來之也郝京山曰豐不如儉言二不言五懼以獲福既濟憂不濟斯為識時髙忠憲曰此爻說者皆以五不如二故于東西之解穿鑿彌甚不知實受其福只說本爻味象辭自見蓋既濟已過時只宜守儉自受其福不似初吉之時可為殺牛之祭也上六濡其首厲象傳濡其首厲何可久也王輔嗣曰處既濟之極之于未濟則首先犯焉過進不已則遇于難濡其首也將沒不久危莫先焉薛氏溫其曰濡其尾者有後顧之義濡其首者不慮前也恃以為濟遂至陷沒歷險而不虞後患既濟終亂其義見矣馮厚齊曰首在前尾在後則既未濟之六爻象皆橫觀也皆有坎水故首尾皆濡凡事之欲濟者身在其外乃可濟首尾皆濡則身在其中矣既濟險在前未濟乃出乎險者而卦義相反蓋以水火相濟不相濟為象也然險終在前故既濟終厲終出于險故未濟終孚沈守約曰爻變為巽巽入也上極而入于險濡首象項平甫曰上六居濟之終而復陷于險如病愈之後而復遇病其能久乎王秋山曰不言凶而言厲者欲人知危懼而速改則濟猶可保也俞石澗曰上六已出坎水之上下應九三則又沒入于坎豈不危厲坎下離上中爻離坎程傳易者變易而不窮也未濟則未窮也未窮則生生之義趙復齊曰陽皆在上隂皆在下情未濟隂陽皆不當位義未濟胡雲峯曰上經首乾坤乾坤之後六卦皆主坎之一陽下經終既未濟濟因坎水取義而亨又皆主離之一隂天地終始皆水火相為用也易不終既濟而終未濟易不可窮也未濟非不濟也未焉爾水火不交而坎男下離女上男女之交也况既濟下離互坎上坎互離既濟之中互未濟未濟下坎互離上離互坎未濟之中互既濟非唯見時變之相為反覆而水火互藏其宅復于是見之易外交為易之用不交為易之體體恆而用不恆易之道尚恆故易字日上月下有未濟象未濟者恆也未濟亨小狐汔濟濡其尾無攸利彖傳未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也孔仲達曰未濟者未能濟渡之名六五以柔居中下應九二納剛自輔故于未濟之時終得亨通本義未濟事未成之時水火不交不相為用卦之六爻皆失其位故為未濟汔幾也幾濟而濡尾猶未濟也何所利哉語録未濟取狐為象上象首下象尾未濟未出中不是說九二一爻是合一卦之體皆未出乎坎險所以為未濟不續終是首濟而尾濡不能濟不相接續故曰不續終也狐尾大濡則不能濟郭白雲曰既濟曰亨未濟亦曰亨者既濟之亨已然之亨未濟之亨將然之亨未濟之濡其尾以小狐幾濟而濡尾也沈守約曰離隂卦五隂爻力不足是以不續終李隆山曰坎為穴為隱伏物之穴居隱伏往來水間者狐也項平甫曰既濟未濟皆以柔為主既濟自六二而達于上六則濟之事已終故為既濟未濟自初六而至于六五幾于濟矣而未能出中以至于上則其事猶未終也故為未濟故曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也其曰雖不當位雖六爻皆不當位義但取五而已濡其尾即是不能全濟之象無攸利之後復言剛柔應者覆解上文亨字也雖無攸利用其柔中以與剛應自有致亨之理吳草廬曰三四五互坎為狐剛大柔小以六五隂柔故曰小狐汔幾也幾及于上也井卦之水在九五井口之中未出上六井口之外則曰汔至未濟之狐在六五坎水之中未登上九水外之岸故曰汔濟蓋六五狐之前體若至上九則為出水登岸矣尾在前水之內後水之問故濡俞石澗曰濟之名由坎而得既濟坎在上而難在五亨之者二故既濟之亨主二未濟坎在下而難在二亨之者五故未濟之亨主五狐之渡水其尾必揭用力盡在尾今小狐汔濟而濡尾弱而不能用力又安能濟何𤣥子曰當五之位已涉二坎故曰汔濟然未克濟者以上九障其前也中即柔得中之中既未出中則始雖連續以涉而未能與前相繼續而成其終矣然剛柔皆應隂得陽以為助未濟者終于必濟故亨郭鵬海曰既未濟均以柔得中則敬慎勝也既濟之亂以終止未濟之無攸利以不續終則克終難也既曰柔得中而又有不續終之戒可見濟事無可輕忽之時既曰不當位又著剛柔之應可見得人無不可濟之事按狐或以為九二非也朱子以全卦未出險為未濟者得之彖主一卦之象故狐在五得中而未出中語自一串而反覆言之初爻之濡其尾則自主本爻言之不必與彖同也或以初九爻象遂謂彖之小狐主初而言則與彖傳未出中句不合亦不可從小狐之汔濟未濟以隂柔力弱以致濡尾程傳以為勇于濟者似無其象初六濡其尾吝象傳濡其尾亦不知極也王輔嗣曰處未濟之初最居險下不可以濟者也而欲之其應進則溺身未濟之始始于既濟之上六也濡其首猶不反至于濡尾然以隂居下困則能反故不曰凶程傳以隂柔處險而應四處險則不安應四則志行于上然已極隂柔四非中正不能援之濡尾則不能濟不度其力而進終不能濟為可羞吝朱漢上曰卦後為尾坎水濡之徐進齊曰既濟初濡其尾無咎者才剛離體離明則知緩急之宜而不急濟雖濡尾亦終濟未濟初濡其尾吝者才柔坎體坎陷則冒險以進而急于求濟至濡尾而不能濟李氏光曰志欲有為而才不足雖履危涉難奮不顧身為可吝雷西仲曰知始之欲濟而不知終之不能續故曰亦不知極也極者終窮之謂九二曳其輪貞吉象傳九二貞吉中以行正也干令升曰坎為輪離為牛牛曳輪上以承五命孔仲達曰居未濟時處險難內體剛中之質以應于五五體隂柔委任于二令其濟難者也經綸屯蹇任重憂深曳其輪者言其勞也靖難在正然後得吉位雖不正以其居中故能行正代仲顔曰負荷重任若車重行遲施曳其輪用正治難而得其吉吕藍田曰剛中而應志在出險雖曳輪于險中猶行之不止郭白雲曰曳其輪將以有行也六五柔中必得九二剛中之臣相與為應乃可有濟曳輪用力甚艱而後有濟也熊與可曰坎輪離牛既濟坎在外初與四應故離自內曳之欲其止未濟坎在內五與二應故離自外曳之欲其出于險王秋山曰曳其輪竭力為上以求濟也陽剛居大臣之位受六五孚信之知乘其中正之車牽曳其輪而進雖未濟保其必濟按未濟之亨在剛柔之應而尤主于二之剛中為應求濟之時任濟之責豈容止而不進况坎險非可安之所不進何待孔子謂其行正非謂其守正也傳義之說竊所未安九二剛中居柔非重剛躁進之比拯主之難何嫌于進其與既濟初爻辭同而義異熊說精矣蓋既濟初九之輪在前未濟九二則適當輪位也六三未濟征凶利涉大川象傳未濟征凶位不當也本義隂柔不中正居未濟之時以征則凶然以柔乘剛將出乎坎有利涉之象或疑利上當有不字劉夀翁曰六三居險之極未能出險而隂柔失位才不足以濟又求進焉凶可知矣烏能涉大難乎既曰征凶又曰利涉文義相背本義疑利字上有不字為得之趙汴水曰居未濟之終過此則近于濟矣故特表以卦名胡雙湖曰自三至五又互坎大川象胡雲峯曰未濟之時唯剛乃克有濟六三隂柔不中正故明言未濟征凶龍麟洲曰涉大川坎象三居水火之交故征進則凶下坎雖終撰坎繼之故又不利涉按此爻從朱子後說為直截觀孔傳祗釋征凶可見九四貞吉悔亡震用伐鬼方三年有賞于大國象傳貞吉悔亡志行也程傳九四陽剛居大臣之位上有虛中明順之主又已出于險未濟已過中有可濟之道九而居四故戒以貞固則吉而悔亡震動之極也力勤而逺伐三年然後成功濟天下之道當貞固如是吕藍田曰離體有文明之德利伐幽暗故皆曰伐鬼方斯爻剛德不盛故必貞吉悔亡然後可以行其志不曰克之而曰有賞既濟九三强剛之質尚力以取勝斯爻不純以武不戰而服也本義以不貞之資欲勉而貞非極其陽剛用力之久不能鄭亨仲曰四動成震故以威震為義沈守約曰既濟之憊明衰也未濟之賞明進也馮厚齊曰鬼方初六也有賞六五大君也大國本爻之位陽為大位為國項平甫曰未濟之時所喜在剛九四所居者柔比九三為有悔必貞以勝之然後能任其事而無悔曰貞吉又加震字亦勉之之辭曰志行言其志必行而不屈然後得吉而無悔張紫巖曰三年克之而後行賞緩而圖之欲全其生也周公東征用此矣離南方萬物亨嘉之時為賞歷坎三爻以應初為三年鄭東谷曰既濟初吉終亂未濟初亂終吉以卦體言既濟則出明而之險未濟則出險而之明以卦義言濟于始必亂于終亂于始必濟于終天道物理然也作易者于既濟之三以伐鬼方為戒于未濟之四以伐鬼方為功既濟欲其安于濟三妄動以求功必入于險故戒未濟欲其濟難四動而求功能出于險故美之陳隆山曰既濟之三未濟之四二爻正當濟難之地故象討伐但既濟言髙宗未濟則受命出征者耳雷西仲曰先言貞吉悔亡後言伐鬼方者先自治而後治人也李蒙齊曰既濟之世利用靜未濟之世利用動胡雲峯曰九四以剛居柔故曰震用震懼也臨事而懼未濟者必濟梁孟敬曰既濟之時其兵貪兵也故三年則憊未濟之時其兵義兵也故三年則有賞按既濟坎險在外九三之伐為徼功于外故為戒未濟坎險在內九四之伐為靖難于內故有賞四變中爻為震故曰震用六五貞吉無悔君子之光有孚吉象傳君子之光其暉吉也本義以六居五亦非正也然文明之主居中應剛虛心以求下之助故得貞而吉且無悔又有光輝之盛信實而不妄吉而又吉也暉者光之散也郭白雲曰有孚虛中也故能尊賢而容衆上言貞吉始之吉也下言有孚吉終之吉也此所謂能續終者也文王徽柔懿恭所謂柔中也光于四方顯于西土君子之光也王童溪曰六五體柔居中謙光下逮而人信之近而九四逺而九二所以濟者有其人而享成功者在乎我離明之德不顯而自光由中之孚不言而自信張紫巖曰未濟隂陽失位君用柔臣用剛聖人于九二九四六五爻辭皆曰貞吉謂不貞則失君臣之常不可與有濟也二以曳其輪為貞四以伐鬼方為貞五虛心以孚于二剛為貞吳草廬曰離日在天下照地上光被于九二光及九二而暉在六五也郝京山曰有孚二五交映而吉也大明居中二五相得坎承離明離資坎潤暉映發越清通而不可掩沈克齊曰五唯以隂虛而有麗陽之光則亦有三陽之孚孚在內則光有本光愈盛則孚愈充昭著之文明莫非盛德之發越始以五之孚孚于三陽終以三陽之光盡合為五之光故吉而又吉易外未濟之五日中天之時周禮十輝注謂日旁之光氣也暉古文作中㸃象日之精外象日之光迸四射太陽盛實所致觀彖由未濟而濟則光輝倍盛雷雨之後而見青天其輝光必倍于常時凡人之出于磨厲與國家之興于憂危理皆如此上九有孚于飲酒無咎濡其首有孚失是象傳飲酒濡首亦不知節也朱漢上曰上孚于三坎為酒項平甫曰既濟之終有亂之理故上六以濡首為時事之危未濟之終有濟之理故上九以濡首為人事之失濟以孚為美然所以用此孚者不可忽也六三以坎從離飲酒象上九自離入坎首反向下而入於酒濡首象我飲彼則彼可以出險而成既濟之功彼濡我則併我而入于險矣天下將濟豈可有失失則敗矣王童溪曰易三百八十四爻而成書其半隂也半陽也然易為君子謀故以乾之初九始馬而未濟之上九終焉貴陽道也于乾初則戒以勿用于未濟上九則戒以濡首始終為君子謀也趙復齊曰出險故孚于飲酒不節故失也邱行可曰內三爻坎險也皆未濟之事外三爻離明也則未濟為既濟矣李蒙齊曰未濟之終甫及既濟而復以濡首戒之懼以終始其要無咎此之謂易之道吳草廬曰失是者失其是也胡雲峯曰既濟三陽皆得位未濟皆失位然既濟之五反不若未濟之上者以時而言未濟不若既濟之初既濟不若未濟之終王秋山曰未濟終則變而濟消息之理然也况四有受賞之功至五吉而又吉是變未濟為既濟矣上九風濤既息舟楫達岸之時又以剛明處之宜乎上下有孚信其已濟歡然交欣以樂其樂也然過於樂而濡首則先信其已濟者皆非所信也失是者非也夫子曰亦者謂亦如既濟之上六溺宴安而不知節也易象傳亦字多若此華霞峯曰不知節道理至當處有天然之節合乎節則是過此便不是初知極上知節總成其是按易象皆寓象也一坎耳變水而為酒是化險為夷易危為安之象上孚于三三坎體故曰孚于飲酒也認定飲酒宴樂者泥矣然酒即水也可以溺人故又曰飲酒濡首只是溺于安樂意非沈湎也總論李西溪曰上篇首乾坤終坎離下篇首咸恆終既未濟亦坎離也上篇首天地隂陽之正也故以水火之正終焉下篇首夫婦隂陽之交也故以水火之交終焉吳敬齊曰易之為義不易也交易也變易也乾坤之純不易者也既濟未濟交易變易者也以是始終易之大義周易孔義集說卷十六
