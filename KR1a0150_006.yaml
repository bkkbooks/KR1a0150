body:
  text: 周易孔義集說卷六光祿寺卿沈起元撰上經震下離上中爻艮坎噬嗑亨利用獄彖傳頤中有物曰噬嗑噬嗑而亨則柔分動而明雷電合而章柔得中而上行雖不當位利用獄也李氏鼎祚曰頤中有物曰噬嗑謂九四互體坎為法律又為刑獄四在頤中齧而後亨故利用獄石守道曰凡柔則言上行剛則言來柔下剛上定體也剛來如訟無妄渙等剛體本在上而來下上行如晉睽鼎噬嗑等柔體本在下今居五為上行程傳卦外剛中柔人頤口之象中虛之中又一剛爻為頤中有物之象必齧之則得嗑故為噬嗑凡天下至于一國一家至于萬事若君臣父子親戚朋友之間有雜二怨隙者皆讒邪間于其間也除去之則和合矣故間隔者天下之大害噬嗑者治天下之大用去天下之間在任刑罰故取用刑為義在二體明照而威震用刑之象也噬嗑卦自有亨義事所以不得亨者以有間也噬而嗑之則亨通矣獄者所以究治情僞得情則知為間之道然後可以設防致刑五為用獄之主以柔處剛而得中得用獄之宜也趙復齊曰頤外實中虛囹圄之象中有實焉囚也决而去之獄賁空爾此卦動故利用獄賁止故折獄致刑離必遇震乃為電否則日也火也離合震剛柔分動而明故春分後雷發聲電始至秋分而雷收電隱用刑噬嗑之一端耳朱漢上曰六五柔中不當位也施于用獄無若柔中之為利蓋人君止于仁不以明斷稱也項平甫曰剛柔分分者未合之時也一剛在內分隔三柔此其所以當噬也動而明則二體合矣合而章則大化亨矣此三句皆解噬嗑亨也李隆山曰噬嗑以去頤中之梗雷電以去天地之梗刑獄以去天下之梗徐進齊曰剛柔分未噬之象動而明方噬之象合而章已噬之象李西溪曰人之頤中自有雷電齒剛而古柔雷之擊搏必與電合齒之噬齧必與舌俱趙汴水曰體卦之畫則寬嚴胥濟體卦之德則明清善聼體卦之象則訟不淹宿俞石澗曰噬嗑倒轉為賁亦有頤中有物之象而以為賁何耶曰凡噬者必下動賁無震不得為噬嗑也夫頤而中虛則無事于噬而自合今有物焉則窒塞矣故文王曰噬嗑亨孔子添一而字蓋謂噬而嗑之則亨不噬則不嗑不嗑則不亨也何𤣥子曰雷得電爍而益威電得雷轟而益曜當罰即罰當刑即刑如雷之奮而與電合罰所當罰刑所當刑如電之赫而與雷合來矣鮮曰剛柔分震剛離柔分居內外內剛者齒也外柔者輔也按剛柔分乃引起下文動而明句自當以二體言不當以爻言分字從合字生有分有合乃為噬嗑初九屨校滅趾無咎象傳屨校滅趾不行也王輔嗣曰屨謂著而踐履也校謂所施之械也處刑之初居無位之地是受刑之人凡過之所始必始于微而後至于著罰之所始必始于薄而後至于誅過輕戮薄故校之在足足為懲誡不復重犯故無咎侯行果曰屨貫趾足也震為足坎為校震沒坎下故屨校滅趾初位得正故無咎程傳初與上無位為受刑之人餘四爻皆為用刑之人朱漢上曰震為行艮止之不行也吕東萊曰大抵為惡先從發足處制之則惡必不能長矣蔡節齊曰滅沒也沈守約曰震為足在足之下者趾也變而為坤滅趾之象趙汴水曰趾足跟也說文足跟曰踵字從止人不能行為􅵋字亦從止則止為不行之義下爻或言足或言趾足者通稱趾有止之義吳草廬曰足械之制周圍其脛而已今械木之廣既圍脛而遮掩又過其脛并不見脛下之趾也入獄之初桎之使不得去鞫問無罪則釋其械而縱之來矣鮮曰中爻坎為桎梏校之象故上九亦言校震性動滅其趾則不得動而行以為惡矣六二噬膚滅鼻無咎象傳噬膚滅鼻乘剛也王輔嗣曰處中得位所刑者當故曰噬膚也膚者柔脆之物也本義祭有膚鼎蓋肉之柔脆者六二中正故其所治如噬膚之易語録膚腹膄滅浸沒也謂因噬膚而沒其鼻也趙復齊曰以柔居柔而且乘剛故最易噬項平甫曰他卦以乘剛為危噬惡者以乘剛為利也楊誠齊曰二三五有衆齒上下噬齧之象沈守約曰艮為鼻爻變而艮體亡矣吳草廬曰卦體象頤初上二剛象頤口上下齦齶有齒牙能噬者也中四畫乃頤中虛而容物之象故各象所噬之物二三五柔畫物之脆者四剛畫物之堅者二三五皆柔三五以柔居剛雖脆而堅二以柔居柔最為易噬膚者豕腹之下無骨之肉古禮别實于一鼎曰膚鼎二最易噬象膚又近初剛初為下頤之齶凡噬物下齶之動最有力以至近能噬之剛噬至柔易噬之物一舉盡臠略無留難以至所噬之膚掩遏噬者之鼻也坎為豕二在互坎下象豕腹向下之膚艮為鼻二當互艮之下畫鼻之下端也正與所噬之膚相直故有膚滅其鼻之象噬嗑在于去間噬易是其間易去也故無咎胡雲峯曰噬而言膚臘胏肉者取頤中有物之象也各爻雖有所噬之難易然因各爻自有此象故于其所噬者因而為之象耳來矣鮮曰人剛則性直獄內委曲不能隱藏六二又以中正乘其剛以聼斷必得其情故易六三噬臘肉遇毒小吝無咎象傳遇毒位不當也虞仲翔曰三在膚裏故稱肉離日熯之為臘坎為毒孔仲達曰臘是堅剛之肉毒者苦惡之物三處下體之上失政刑人刑人不服若齧其臘肉非但難齧更生咎怨猶遇其毒也刑不侵順雖有遇毒之吝於德亦無大咎趙復齊曰獸乾者臘物雖小而有骨六三柔若易噬居剛中實噬之者易而不戒則傷諸口遇毒故小吝終噬之故無咎吕東萊曰自不正而欲正人難矣哉噬臘肉而遇毒當于此知正己之道雖吝而無咎小人有惡從而治之在我則實無罪聖人不長小人之惡之意也林黃中曰臘者肉見于外骨藏于中以六居三外柔內剛臘肉之象胡雲峯曰二三皆無咎而三小吝者中正不中正之分也觀彖以柔居剛動而麗明故雖所治至難不免小吝而無咎九四噬乾胏得金矢利艱貞吉象傳利艱貞吉未光也陸公紀曰肉有骨謂之胏離為乾肉又為兵矢金矢者剛直也噬胏雖難終得伸其剛直程傳居近君之位當噬嗑之任者四已過中是其間愈大而用刑愈深故云噬乾胏噬至堅而得金矢金取剛矢取直九四陽德為得剛直之道剛而明體陽而居柔剛明則傷于果故戒以知難居柔則守不固故戒以堅貞剛而不貞者有矣凡失剛者皆不貞也在噬嗑四為最善楊龜山曰九四合一卦言之則為間者也以爻言則居大臣之位任除間之責者也項平甫曰四五兩爻稱得金又皆用貞者下卦為間尚淺故用力易上卦為間已大故用力難非貞不濟四得剛直之才可以去間矣然以所居不正未能光大故必艱貞而後吉先艱後貞者明所遇者艱非才之罪能以貞勝雖艱可吉五得剛中之位可以去間矣然以其才不當位故必貞厲而後可無咎先貞後厲者明五本非才雖貞猶厲但正得當中故可免咎而已大抵噬嗑諸爻噬于淺者皆可無咎噬于深者雖吉亦艱就其淺者言之三已稍難故遇毒而有小吝就其深者言之初則艱中則利終則凶馮厚齊曰肉之附骨猶四之附九居于離火故為乾胏丘行可曰噬嗑唯四五兩爻能盡治獄之道象以五之柔為主故曰柔得中而上行雖不當位利用獄也利用之言獨歸于五爻以四之剛為主故曰噬乾胏得金矢利艱貞吉吉之言獨歸于四而他爻謂之無咎也主柔而言以仁為治獄之本主剛而言以威為治獄之用胡雙湖曰蒙金矢指坎九二此爻正互坎中爻蘭氏曰九乾之策乾為金齊氏曰坎為矯柔為木又為弓矯木加金施於弓亦有矢象胡雲峯曰乾胏骨連肉剛中有柔九四剛居柔故所噬如之來矣鮮曰九四居坎中坎得乾中畫故有金象有矢象若六五變為乾則止有金象無矢象矣故止曰得黃金且九四剛而不正故戒之以剛直六五柔中故戒之以剛中得者教人必如此非周禮鈞金束矢之謂按光離體也未光四居互坎中也六五噬乾肉得黃金貞厲無咎象傳貞厲無咎得當也虞仲翔曰隂稱肉離中日烈故乾肉也王輔嗣曰黃中金剛也本義噬乾肉難于膚而易于臘胏者也柔順而中以居尊位用刑于人人無不服故有此象語録問九四六五皆有艱難正固危懼之意故皆為戒占者之辭曰亦是爻中原自有此道理大抵才是治人彼必為敵不是易事故雖時位卦德得刑之宜亦須以艱難正固處之朱漢上曰黃中色離中之坤也變乾為金故曰得黃金王童溪曰四以剛而居柔五以柔而居剛其不正一也故四必艱貞而後為吉五必貞厲而後得無咎沈守約曰離變為乾明而健噬乾肉之象剛健而中得黃金之象雷動于下而天臨于上人君用刑之象趙汴水曰此利用獄之爻也乾肉黃金皆不過于剛者六五大君以柔用獄故動中肯綮無頓刃折剛之患而猶曰貞厲無咎者聖人謹用刑獄其過慮若此釋彖言不當位此言得當者彼以位言此以事言五以柔用獄行以正厲其無咎者得用獄之當也李西溪曰九四以剛噬六五以柔噬以剛噬者有司執法之公以柔噬者人君不忍之仁林黃中曰以六居五剛柔得中乾肉象俞石澗曰居離明之中其明不至于察而罰當其罪上九何校滅耳凶象傳何校滅耳聰不明也鄭康成曰離為槁木坎為耳木在耳上何校滅耳之象程傳上過乎尊位無位者也故為受刑者居卦之終是其間大噬之極也何負也謂在頸也朱漢上曰四坎為耳上九宜曰耳不聰而曰聰不明何也坎水離火日月之光火外景也于目為視水內景也于耳為聼視聼之用無非明也項平甫曰上九離之極離主目坎主耳離極則傷坎火旺則水囚故耳受其病沈守約曰上處卦極變而為震動極而不知己也離麗也震動為木上極而麗于木何校象毛伯玉曰以怙終故寄之上九王秋山曰居卦之外火體炎上而去震逺是有雷霆之威若罔聞知炎炎于上而不顧故凶吳草廬曰上畫為首剛畫在上首械象首械在坎耳之上是械之厚掩過其耳而耳不見也居卦之終問獄已成而首何至厚之械罪不可掩矣來矣鮮日上九未變離明在上坎耳在下故聼之明今上九變則不成離明矣所以聼之不明也坎既心險又不信好言所以犯大罪按彖傳頤中有物則專指九四一爻而言至卦辭利用獄傳以剛柔分動而明雷電合而章柔得中而上行釋之則是二體六爻皆有噬嗑之道各有用獄之義自不得復泥于九四之梗矣卦體與爻象取義不同類如此以噬四為主以六爻遞相噬者均枝辭也初上兩爻孔子繫辭備言小人之狀故諸儒以為受刑之人說自不易但初上之為小人何歟蓋天下國家之害惟在小人之為間而柔惡易去剛惡難除初上皆剛而無位故聖人以象為間之小人卦象震離雷電相合本天地間暴烈之氣在上為用威在下即為不靖無位而不靖初上以之初乃孽之萌上為惡之極且中爻艮山坎水坎為險陷為刑獄為法律為弓矢為盜離為兵戈為惡人是卦有外示陽明中藏險毒之象初動而之險將入山水之間挾弓矢興戈兵而為盜勢且必麗于法幸而艮止于前變為坤順尚可懲之于初此屨校滅趾之象也孔子以為小人之福也上則伏險在中亢威在上變為叠震動不知止離火不戢必自焚身當獄成不變之時其能免乎此周公于滅耳之下更繫以凶孔子以為惡積罪大者也止惡于初怙終不悛爻中固有其象非硬設也離下艮上中爻坎震傅氏云賁古斑字文章貌賁亨小利有攸往彖傳賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下荀慈明曰隂來居乾之中文飾剛道交與中和故亨分乾之二居坤之上上飾柔道兼據二隂故小利有攸往矣孔仲達曰文明離也以止艮也用此文明之道裁止于人是人之文德之教蘇子瞻曰剛不得柔以濟之則不能亨柔不附剛則不能有所往故柔之文剛剛者所以亨也剛之文柔小者所以利往也易有剛柔往來上下相易之說而最著于賁學者推其所從變曰泰變為賁此大惑也一卦之變為六十三豈獨為賁哉徒知泰之為賁又烏知賁之不為泰乎程傳山者草木百物所聚下有火則照其上草木品彚皆被光彩有賁飾象物有飾而後能亨無本不立無文不行有實而加飾則可以亨賁飾之道非能增其實也但加之文彩耳事由文而顯盛故小利有攸往往者加進也理必有對待有質則有文一不獨立二則為文非知道者孰能識之離在內故曰柔來艮在上故曰剛上非自下體而上也天文謂日月星辰之錯列寒暑隂陽之代變以察四時之遷改人文人理之倫序本義柔來文剛陽得隂助而離明于內故為亨以其剛上文柔而艮止于外故小利有攸往剛柔之交自然之文故曰天文先儒說天文上當有剛柔交錯四字理或然也項平甫曰賁亨謂內卦也小利有攸往謂外卦也凡卦之德以內卦為主事外卦為發用古人之於文不敢一日離也因其羞惡辭讓之節而為之文以飾之其交也以禮其合也以義百拜而飲三辭而受六禮而婚所以飾其情而養其恥也荀子不知而以為僞晏子不知而以為勞戰國之君以為迀濶西晉之士以為鄙吝獨伏羲文王周公孔子以為此奉天命之變成人倫之化不可以一日無也觀賁之六爻無一爻凶咎者聖人之貴文若此朱漢上曰以天文言之無非剛柔交錯象物成列光耀離合日陽也而為離月隂也而為坎以人文言之父子君臣夫婦朋友長幼五者剛柔交錯粲然成文天理也非人為也上下內外尊卑貴賤其文明而不亂各當其分而止矣文明以止則禍亂不生災害不作王秋山曰文盛則實必衰小利有攸往者謂不可太過以滅其質也吳草廬曰麗于物而其焰炎熱者有體之火未麗于物而其氣溫暖者無體之火山下有火山腹之內有此無體之火也書曰賁若草木溫暖之氣能長養萬物草木暢茂賁然有光故為賁俞石澗曰文貴乎明不明則無别又貴乎止不止則流梁孟敬曰朝廷文之以儀制而亨焉賔主文之以禮貌而亨焉家人文之以倫序而亨焉推之事物凡有質者無不待于文也何𤣥子曰離本明艮亦光明兩者合而相賁故為賁剛為質柔為文柔來文剛本先立矣而文行焉故亨分剛上而文柔非以剛為文也剛居上而柔始得成其文不然無質之文非文也高忠憲曰離明艮止文明內藴天然本色不雜外飾故為賁觀彖離柔也宜在外而居內是柔來文剛又卦畫六二之柔來文初三之剛也艮剛也宜在內而居外是剛上文柔又卦畫上九之剛上文四五之柔也時變者如春夏之敷華柔來文剛也秋冬之成實剛上文柔也化成者如禮樂之明備文明之功也性命之各得以止之效也按凡在內卦曰來外卦曰往不可謂卦中升降尤不可謂自他卦往來也此言分者以內卦為主以剛爻為本也初九賁其趾舍車而徒象傳舍車而徒義弗乘也王輔嗣曰在賁之初以剛處下居于無位棄于不義安夫徒步以從其志崔氏憬曰剛柔相交以成飾義者也今棄二比故曰舍車四乘于剛艮止其應初全其義故舍而徒自飾其行曰賁其趾趾初也程傳初九有剛明之德而在下者也無所施于天下唯自賁飾其所行而已趾取在下而所以行也君子守節處義其行不苟義或不當則舍車輿而寧徒行衆人之所羞而君子以為賁也初應四正也從二非正也舍二而從四舍車而徒行也朱漢上曰二坎為輪車也四震為大塗為足足趾行乎大塗徒行也六二非正應義弗乘也吳草廬曰二之柔來飾初之剛初不受飾故舍二之車而自飾其趾內飾于己而不資外飾于人剛正而明者能之胡雙湖曰前有互坎初未入坎體故有舍車徒行象胡雲峯曰君子行義必于在下之時發足之初觀之來矣鮮曰舍車而徒即賁其趾也變艮止而又止舍象升乎車者必在上方可乘初在坎下無乘之理故有舍坎車而從震趾象六二賁其須象傳賁其須與上興也王輔嗣曰得其位而無應三亦無應俱無應而比焉近而相得者須之為物上附者也故賁其須侯行果曰自三至上有頤之象二在頤下須也上承于三與之同德可相與而興起也朱漢上曰二三剛柔相賁文不虛生須生於頤須所以賁其頤也項平甫曰六二主內卦之文者也內卦以文為文須之麗于身最為虛文也然陽氣不盛不足以賁其須則須與陽同其盛也故曰與上興鄭東谷曰二以一柔而處二陽之間二陽皆賴其賁然隂柔而二其所賁則非義矣與上興謂賁三也初已應四二不必賁之三則上無其應二所當賁也吳草廬曰須之美者生而美也六二柔麗乎中正固有其美如須之美非有待于外物而賁者然隂柔不能自動必附麗乎陽如須雖有美必附麗于頤也態梅邊曰柔不能自立得剛而後立下不能自興得上而後興按此乃柔來文剛之爻也初舍之故賁三九三賁如濡如永貞吉象傳永貞之吉終莫之陵也盧氏曰有離之文以自飾故曰賁如有坎之水以自潤故曰濡如體剛得正故永貞吉程傳三處文明之極與二四相賁賁之盛也光彩潤澤故云濡如與二四非正應相比而成賁故戒以永貞則吉鄭東谷曰隂之交賁易以陵乘乎陽故告之胡雲峯曰互坎有濡義亦有陷義濡首濡尾濡而陷者也九三非不貞也能永其貞則二隂與我為潤澤之濡我與彼不為陷溺之濡矣按胡氏說與盧氏程氏稍異玩傳終莫之陵句胡氏說正可備參六四賁如皤如白馬翰如匪冦婚媾象傳六四當位疑也匪冦婚媾終無尤也崔氏憬曰以其守正待應故終無尤李氏鼎祚曰坎為盜故疑當位乘三應初逺陽故曰當位疑也孔仲達曰以其當位得與初應但礙于三故遲疑也若不當位則與初非應何須致疑張子六四以柔居隂性為艮止志潔行堅終無尢也張紫巖曰四潔白其德以自守初自下從之猶馬疾馳初四皆未受飾質之美者四以柔居柔抱道守靜始以乘剛而疑終以志同道行而無尤互坎為白馬剛阻為冦艮變巽為皤如初本乾體為馬項平甫曰三當賁道之隆四當賁道之變故下三爻皆以文為賁自四以上屬艮艮為篤實而主白故上三爻皆以白為賁姚小彭氏曰商人尚白戎事乘翰翰與皤皆白色也沈守約曰初逺三比疑三塞路潘天錫曰初四正應始雖疑慮終必得合復何尤哉梁孟敬曰六四在離明之外為艮止之始乃賁之極盛而當返質之時也故云賁如皤如華霞峯曰賁如也而曰皤如猶舍車而徒而曰賁趾也以道義為賁者也按初來應四亦有剛上文柔之意又婚媾之道陽求隂隂不當求陽况四守正艮止則白馬翰如自指初而言初之舍車而徒應四之志專矣初德簡素故為翰如冦者四自疑也三匪冦四在坎中故疑變為重離冦疑釋而婚媾合故曰終無尤易傳凡言疑者非實象也與屯六二不同六二賁于丘園束帛戔戔吝終吉象傳六五之吉有喜也荀慈明曰艮山震林山林之間賁飾丘林以為園圃隱士之象五體中履和勤賢之主尊道之君也虞仲翔曰艮為山故稱丘木果曰園六五動成巽巽為帛為繩艮手持故束帛石守道曰居賁之時須一隂一陽交相賁飾六五下無應與比于上九上九居卦外無位之地丘園象程傳五雖居位獲賁于外比之賢本義束帛薄物戔戔淺小之意郭白雲曰六五為賁之主及于丘園聖人不遐遺之義也賁之盛大無過于得賢及逺為國之休光趙復齊曰六五賁上聘于隱者上九賁五來受聘命梁孟敬曰居至尊之位宜徴集丘園之賢以共成文明之治隂性吝嗇然賢人不以幣帛為悅六五虛中待賢則幣帛雖微而賢者亦進矣何𤣥子曰丘園指上此與蠱卦上體艮同蠱上九不事王侯則此上九為山林之賢無疑矣束帛戔戔其跡似吝因卦體文明以止特取此以見敦本尚實之意儀文雖薄然孚契真儒挽回末俗之機實在于是故終與上九合志而吉按此爻五為君位無丘園自賁之理卦以剛柔交錯為賁故有應以應為賁初與四也無應則以比為賁二比三故曰賁其須與上興也五比上故賁于丘園上九為剛上文柔之爻則上之賁五乃卦義所在非五之賁上乃五受上之賁也禮聘高賢之說不可易凡傳言有喜有慶者皆取隂陽相合之義此自主五上相合也上九白賁無咎象傳白賁無咎上得志也王輔嗣曰處飾之終飾終反素而無患憂得志也孔仲達曰守志任真得其本性居上得志程傳得志者在上而文柔成賁之功六五之君又受其賁故雖居無位之地而實尸賁之功楊龜山曰賁無色色色者也白賁受色者也上九賁之極剛止乎上有其質而文明麗之故無咎而得志趙復齊曰艮止故靜貞文之極得白乃所以為賁項平甫曰六二柔來而文剛主內卦之文者也內卦以文為文上九分剛上而文柔主外卦之文者也外卦以質為文故曰白賁無咎白本非所以賁也然文自質始白故在衆采之先文之既盛必以質終則白又在衆采之後是則白者賁之所成終而成始也以艮之白成賁之終得遂其篤實之志李隆山曰雜卦賁無色也其白賁之謂乎卦以賁飾為義而諸爻所以相賁大率皆清修潔白而非浮靡之事至上九白賁則凡世間之色無可觀矣王秋山曰上九止文之流于終終則反而質矣故賁道成而無弊無弊故無咎得志志在成賁也何𤣥子日子不云乎質有餘者不受飾賁非君子之所樂也故終之以白賁白指上九其所賁者四五曰白者以假象言艮止之終全體無文之賁即文明以止之止字也惟上九以白色下賁乎二柔故四得之而為皤如五得之而為束帛而下卦之文明者亦得之而有所砥文極必幣有艮之篤實以敦厚其終則不至于弊何咎之有華霞峯曰得志得文明以止之志坤下艮上中爻重坤剝不利有攸往彖傳剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也王輔嗣曰坤順艮止所以順而止之不敢以剛止者强亢激拂觸忤以隕身身既傾焉功又不就非君子之所尚也孔仲達曰剝剝落也君子通達物理貴尚消息盈虛值消虛之時存身避害危行言遜也盈息之時極言正諫建事立功也天行謂逐時消息盈虛乃天道之所行也劉長民曰小人方盛不可逆止順而止之使不為害可也程傳夏至一隂生而漸長一隂長則一陽消至于建戍則極而成剝是柔變剛也卦有順止之象乃處剝之道君子當觀而體之郭白雲曰潛龍勿用內文明而外柔順艱貞晦其明儉德避難遁之時義皆君子遇剝之義也趙復齊曰隂盛不進受陽之止陽微不去期以止隂非明消息盈虛之理孰能知此決水者盡去剝果者核存易豈人私惟天道爾順而止之變剝也聖人造化之妙也楊龜山曰觀剝之象則知所以治剝矣夫寒暑之變天且不能暴為之况于人乎順而止之其漸而非暴之謂乎楊誠齊曰不利有攸往其遂聼天下之自亂乎聖人固曰盍觀諸剝之象乎坤順艮止止亂以順止小人亦以順故解黨禍者陳實之臨延唐祚者方慶之對皆順而止之非逆而激之也此君子治剝之道也趙汴水曰治滔天之水者必先疏其流縶逸鞅之馬者必稍避其鋭善御小人者亦惟順其方張之勢靜處事外不輕攸往以存其在我使小人逡巡敬視而不敢迫乃可徐止其進倘冒然與角必將摧折敗北尚安能止之耶故順而止之之方非姑息也非養奸也一陽無恙來復于是而基焉不然并與一陽而剝之君子之道不幾于熄乎陸德明作順而止無之字如此則但明兩卦之德不見君子觀象以止小人之義陳隆山曰夬剛決柔剝柔變剛君子之去小人聲其罪與天下共棄之名正言順故曰決小人之欲去君子辭不順理不直必萋菲浸潤以浸蝕之故曰變一字之間君子小人之情狀皎然矣吳草廬曰隂長已至五僅存一陽再往則并一陽消之矣故不宜有往胡雙湖曰不利有攸往戒陽也有挽留一陽意體艮止之象也若一陽更往則為坤陽道盡矣來矣鮮曰消息盈虛四字皆以陽言復者陽之息姤者陽之消乾者陽之盈坤者陽之虛按不利有攸往以去訓往即果食不食之義箕子之為奴存疇範也狄梁公之事武后存唐祚也順而止之如孔子之見南子應佛肸孟子之說齊宣與夫陳平之王諸吕皆是道也觀象為學易通義夫子特於剝言之者以順而止之乃旋乾轉坤大作用即在剝卦本象恐人以卦極不善觀之忽耳乃後世說易者猶僅作順而止看略去之字孔義晦矣初六剝牀以足蔑荀爽本作滅貞凶象傳剝牀以足以滅下也孔仲達曰牀者人之所以安處也在剝之初剝道從下而起蘭惠卿曰一陽在上五隂載之牀象蔡節齊曰牀者人之所安其體上實下虛故取以象剝足在下又取以象初六二剝牀以辨蔑貞凶象傳剝牀以辨未有與也孔仲達曰辨牀身之下足之上分辨之處崔氏憬曰辨當在第足之間牀梐也未有與者言至三則應故二未有與也丘行可曰與應也凡隂陽相應則為有與咸六爻皆應則為感應以相與艮六爻皆不應則謂之敵應不相與剝之未有與者是言當剝之時在上未有陽以應隂無以止隂之進也使其間有一君子與之為應以遏止則猶有所顧忌而不敢肆吳草廬曰六三之剝之唯其有與也未有云者言六二之所未有至六三而後有也蓋傷有與之不早而僅存一陽也何𤣥子曰二之所應者五五君位也其關係為至大得九五則有與其卦為觀故大觀在上下觀而化得六五則未有與其卦為剝小人道長蔑貞之凶皆以無與得之深惜剝之不得為觀也按卦以時言爻以位言卦既為剝則六爻皆居剝之時不可復議某為剝陽之隂某為受剝之陽其凶其無咎無不利為占者設也從本爻位象得之主君子主小人者皆偏也貞者何碩果也乾元至收斂成實為貞碩果之象也初二兩爻居剝之始即言蔑貞即履霜堅氷之意危之也乾之元藏于坤下三爻坤體坤道以從陽為安貞今乃剝陽則為蔑貞蔑坤之貞即蔑乾之貞其凶宜矣六三剝之無咎象傳剝之無咎失上下也王輔嗣曰與上為應羣隂剝陽我獨協焉雖處於剝可以無咎三上下各有二隂而三獨應於陽則失上下也孔仲達曰上下羣隂皆悉剝陽已獨能違失上下之情而往應之所以無咎程傳志從於正在剝之時為無咎如東漢之吕强是也趙復齊曰三應五比皆能存陽而免凶沈守約曰渾跡小人之間隂為君子之應剝之無咎者也蓋處剝之道以順而止為善坤而為艮順而止也何𤣥子曰唯其失四小人所以得一君子三以失上下而無咎猶坤以喪朋而有慶按失上下猶否二之不亂羣也六四剝牀以膚凶象傳剝牀以膚切近災也王輔嗣曰剝道浸長牀既剝盡以及人身靡所不凶程傳五為君位剝已及四在人則剝及其膚身垂于亡矣張舜元曰艮為膚噬嗑六二噬膚互艮體沈守約曰艮為背四居艮始膚也變而為離離為火剝膚象六五貫魚以宫人寵無不利象傳以宫人寵終無尤也虞仲翔曰剝消觀五巽為魚為繩艮手持繩貫巽貫魚也艮為門闕為宫室動成觀故無不利何氏妥曰下比五隂駢頭相次似貫魚魚為隂物以喻衆隂程傳一陽在上衆隂有順從之道故發此義張子隂陽之際近必相比六五能上附于陽反制羣隂不使進逼方得處剝之善下無剝之之憂上得陽功之庇故曰無不利郭白雲曰六五柔得尊位大中為剝之主能御衆隂以承陽者也張南軒曰五雖君位而卦有隂為之主不取君義者坤剝遁明夷歸妹旅也非人君所處故無君義張舜元曰柔得尊位衆隂以次相傳有后以宫人備數進御于君之象沈守約曰為羣隂之主而上承于陽以順止之道反制小人使之順而不犯貫魚之謂艮而為巽巽而止也卦變為觀觀而化也丘行可曰遁剝皆隂長之卦遁隂長而猶微可制故遁言陽制隂之道曰畜臣妾吉剝隂長而已極不可制矣故不言陽之制隂而言隂之從陽曰貫魚以宫人寵龍麟洲曰內坤為女加以撰坤女之衆也門闕之間衆女居焉宫人象來矣鮮日一陽在上五率其衆隂本卦原有此象內順外止本卦原有此德隂順則能從乎陽艮止則必不剝陽矣隂聼命于陽小人聼命于君子也故元不利華霞峯曰剝之五隂剝一陽而無利統卦象言之也三應陽而無咎五承陽而無不利就爻象言之也上九碩果不食君子得輿小人剝廬象傳君子得輿民所載也小人剝廬終不可用也侯行果曰艮為果為廬坤為輿楊龜山曰羣隂剝陽而一剛止乎上碩果也不食者順而有以止之也朱漢上曰五隂奉一陽君子得衆而民載之故曰民所載也上九剝而為六小人自徹其庇至于無所容其軀而在外之君子亦失其所故曰終不可用也趙復齊曰果必碩而後反生陽必剝而後復故陽不可以無剝此天理也張舜元曰剝自乾變乾為木果下應六三不為所剝故不食王童溪曰一陽居衆隂之上果之碩大者也不食者生育之萌正寄諸此也墜地而復生則剝反為復矣此復初九之一陽即剝之上九也一陽居上有衆民共載之象剝道既終九復見剝則小人無可庇其軀矣丘行可曰卦以上九為主其曰碩果不食幸陽之存也趙汴水曰此爻為艮止之主一陽巋然在上足以止羣隂之進不為其所剝胡雲峯曰此一陽也在坤之月為剝之盡而復生在此則剝未盡而能復生果中有仁天地生生之心存焉吳草廬曰君子謂一陽坤為輿五隂承載一陽如人之在車上小人謂上九變為柔也一陽上覆五隂有廬之象竒變為耦如廬之破壞穿漏而無以覆蓋其下何𤣥子曰上九當剝之終吉凶未定天若祐晉則為謝安之止桓溫天下皆得載天不祐漢則為王允之死于㴶汜而小人亦自底于亡斯二者天也此爻不言吉凶聖人之意深矣易外艮之木堅而多節故生剝之碩果出地厚之中而在高山之上果之仁天地之仁也不食者天地之所以留其仁也剝爛也碩果其堅如石故不爛以坤土之厚而含𢎞之以艮山之高而安敦之太和保合之固人不得而食之為萬物之所資始資生乾元不可見曷不觀之碩果震下坤上中爻重坤復亨出入無疾朋來無咎反復其道七日來復利有攸往彖傳復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎王輔嗣曰入則為反出則剛長孔仲達曰褚氏莊氏並云五月一隂生至十一月一陽生凡七月而云七日者欲見陽長須速故變月言日李氏鼎祚曰剝卦陽氣盡于九月之終至十月末坤卦將盡則復陽來隔坤之一卦六爻為六日復來成震一陽生為七日胡安定曰凡歷七爻以一爻為一日故謂之七日程傳復亨既復則亨也陽氣復生于下漸亨盛而生育萬物君子之道既復漸以亨通澤于天下故復有亨盛之理復生于內入也長進于外出也先云出語順耳陽之始生其氣至微故多摧折春陽之發為隂寒所折出入無疾謂無害之者故無咎所謂咎在氣為差忒在君子之道為抑塞卦才有無疾之義乃復道之善三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能即勝小人必待朋類漸盛則能協力以勝之下動而上順是動而以順行是以得出入無疾朋來而無咎朋之來亦順動也姤陽之始消七變而成復故云七日一陽復于下乃天地生物之心先儒皆以靜為見天地之心不知動之端乃天地之心也張子復言天地之心咸恆大壯言天地之情心內也情則見于事也剝之與復不可容線須㬰不復則乾坤之道息故適盡則生更無先後之次此義最大剛長之時預戒以隂長故言至于八月有凶若復則不可須㬰斷故言七日者晝夜相繼元無斷續之時也見天地之心者天地之心唯是生物天地之大德曰生也本義積隂之下一陽復生天地生物之心幾于滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也語録天地之心動後方見聖人之心應事接物始見三陽之時萬物蕃新只見物之盛大天地之心却不可見唯是一陽初復萬物未生冷冷靜靜而一陽既動生物之心闖然而見雖在積隂之中自掩藏不得此所以必于復見天地之心也朱漢上曰陽生于子隂生于午自午至子七而必復乾坤消息之理一歲一月一日莫不皆然易有以爻為歲者以爻為月者以爻為日者于復言七日來復者明卦氣也趙復齊曰六位為主六龍為朋楊龜山曰動而不以順行則疾之者至動而以順行而後出入無疾而後朋來無咎楊誠齊曰孰為天地之心動而生物貴陽賤隂長君子消小人是也體之聖失之愚履之治舍之亂聖愚治亂此心而已趙汴水曰初復之剛精鋭勇往况衆剛朋來動易決裂倘逆理而行則小人將伺隙而起亨未可保也聖人即是以二字發明其指趣示人深矣胡雙湖曰復卦彖辭文王于一陽之復何其愛之深而勞問喜慶之至也若曰一陽初復可亨道矣出入得無疾乎朋類將來為臨為泰庶幾無過咎乎自反而復還在道七日始遂來復而今而後庶乎其利有攸往矣此皆勞問喜慶之詞也俞石澗曰向在剝時君子唯順而止之今為復則以順而行時雖不同君子行止無非禮也順順天理也順理而行無往不可天行謂天道之運行剝窮于上而反于下則止者復動往者復來猶天道之運行周則復始也初九乃復生之主爻果核一點其名曰仁氣候肅殺寂然不動氣候發生則其仁萌芽自核中而出即此天地生物之心可見華霞峯曰反復其道計其反復之道也觀彖心者統性情兼體用者也此卦一陽初反動靜之間謂之性則已發謂之情則未著故特以心言之以括性情之妙也按王輔嗣以寂然至無動息地中為見天地之心此老莊虛無之說輔嗣往往以此說易與聖道岐互自伊川謂動之端乃見天地之心朱子暢其說始為確解震動在下安得云靜耶朱子謂濓溪就利貞上說復與伊川說差不同王弼之說與濓溪同豫謂不然濓溪所云利貞誠之復非指復卦之復就貞上說乃以剝之碩果為復非地雷之復也通書又言誠復其不善之動而己亦與一陽之復絶不相關非輔嗣所可同也初九不逺復無祗悔元吉祗音柢象傳不逺之復以修身也程傳復者陽陽君子之道故復為反善之義初復之最先者失而後有復唯失之不逺而復則不至于悔大善而吉也祗抵也無祗悔不至于悔也修身之道唯其知不善則速改從善而已楊龜山曰初九陽始生而未形動之微也吉凶悔吝生乎動未形而復其復不逺矣趙汴水曰隂陽有反復違道者無自復之理聖人故斷之以修身胡雲峯曰本心呈露之初按易者教人法天之學孔子於此卦象傳尤顯言之以修身句特特提明六二休復吉象傳休復之吉以下仁也本義柔順中正近于初九復之休美吉道也趙復齊曰初九先覺六二資之易為功也初九之仁寄言于二聖人微㫖能言之類莫能加矣草木之仁布種于地其生也根莖暢達莫之能遏二居初上不期而化何以異此胡雲峯曰遁貴逺莫逺于上九而九五能比之故曰嘉復貴不逺初九不復逺而六二能比之故曰休梁孟敬曰一陽在下為卦之主猶仁人也故卦之衆隂以與初逺近向背為得失何𤣥子曰六十四卦言仁僅見于此是知不逺復便是仁也故孔子曰仁逺乎哉易外下仁者何下初也仁碩果之仁也初在下故曰下仁初在下為仁乾之一也凡仁必二故二爻言仁仁在果中果以雷拆則見仁按以下仁注家以初九為仁六二下之吳草廬云他處凡言下者皆謂在其下也剛下柔男下女屯貴下賤初九在六二之下也未有在其上而言下者其說至當然吳氏竟以仁屬六二則又不可趙氏之說精矣蓋仁者即天地之心亦即人之心初陽是也下即內也自二言之為仁在于內即心存于身廣胖之美為休為吉六三頻復厲無咎象傳頻復之厲義無咎也本義以隂居陽不中不正又處動極復而不固屢失屢復之象屢失固危復則無咎沈守約曰震而為離動而明非迷不知復者頻復象卦變明夷明傷而後求復危道也胡雲峯曰三上下進退之間故曰頻柔而不中以其位剛故頻復按以不中不正而屢失以居震極而能頻復震無咎者存乎悔震動之功多矣六四中行獨復象傳中行獨復以從道也王輔嗣曰處中得位而應于初獨得所復順道而反物莫之犯孔仲達曰上下各有二隂已獨應初居在羣隂之中故曰中行獨自應初故曰獨復從道而歸故曰以從道張子柔危之世以中道合正應故不與羣爻同本義為與衆俱行而獨能從善之象郭白雲曰剝六三乃復六四反對其義相類在剝則取其失上下以應乎陽在復取其獨復以從道朱漢上曰道言初九震為大塗亦道也不言吉無咎者正則吉可知頻復之厲猶無咎也四獨復五敦復不言吉者不以利害言也沈守約曰下體震也四變而從震獨復象俞石澗曰道指初九修身之道于羣隂中從道而不從衆繆當時曰中即中以自考中字獨即中庸慎獨之獨四能以中而行而于獨知之中憬然自覺所謂復以自知也蓋復之為復全在初爻猶人之初念也五隂皆復此而已唯四在隂中有所專向故發此意六五敦復無悔象傳敦復無悔中以自考也孔仲達曰處坤之中敦厚于復程傳以隂居尊處中而體順能敦篤其志以中道自成則可以無悔自成謂成其中順之德本義考成也趙復齊曰二四之復資諸人者五之復成諸已者與初非應位自守中爾鄭東谷曰厚體而居中是謂黃裳之吉以是而復復在我者也諸卦六五唯坤體則無不善此黃中之理張紫巖曰以坤履震中德而不息自能敦復也項平甫曰臨以上九為敦臨艮以上九為敦艮皆取積厚之極復于五即言敦復者復之上六迷而不復故復至五而極沈守約曰坤體至厚卦變為屯屯固也一陽方生其氣閉固則剛得上長先王以至日閉關敦復得之李隆山曰易中陽長之卦凡在上隂柔之主未嘗不附而順之故復臨泰大壯諸卦六五皆以下順陽剛而得居上之體李蒙齊曰中者六五固有之性也人受天地之中以生惟其有是性是以非比非應而能復胡雲峯曰本有坤體又互坤厚之至也不逺復者善心之萌敦復者善行之固敦復則其復也無轉移自然無悔矣不逺復入德之事敦復成德之事按考爾雅訓成程朱本之初六之修身至此而成德中者敦復之由成者敦復之德或訓考為察非六五身分上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象傳迷復之凶反君道也虞仲翔曰坤冥為迷荀慈明曰坤為衆故曰行師陽息上升必消羣隂故終有大敗程傳隂柔居復之終終迷不復災自外來眚由己作無施而可復則合道迷復與道相反也張南軒曰隂柔之才去剛太逺所謂人欲肆而天理滅者王童溪曰在復之上隂暗柔懦故迷迷者失道之謂項平甫曰隂盛之時君道常為小人所以故曰以其國君凶二最近初故為休復上最逺初故為迷復迷則相仇上六即坤上六龍戰之爻故有行師之象蓋與初戰也徐進齊曰位高而無下仁之美剛逺而無遷善之機厚極而有難開之蔽柔終而無改過之勇胡雲峯曰坤體而居上卦之上先迷者也迷復與不逺復相反十年不克征亦七日來復之反乾無十坤無七隂極于六而七又為乾之始陽極于九而十自為坤之終凡言十年者坤終之象楊廷秀曰心為天君以其國君言喪失其本心合訂坤為衆震為長子行師象故一陽五隂之卦多言行師按孔子於迷復言反君道者非謂上有君象也蓋復以見天地之心心者何生物之心也乃君道也迷復則此心熄矣隂至上六堅氷肅殺生意幾滅故曰反君道也下四爻皆已復獨上迷復故極言其凶周易孔義集說卷六
