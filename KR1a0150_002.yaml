body:
  text: 周易孔義集説卷二光祿寺卿沈起元撰上經乾下坎上中爻離兌程傳雲上于天有蒸潤之象飲食所以潤益于物故需為飲食之道需有孚光亨貞吉利涉大川彖傳需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也李鼎祚易解作剛健而不可陷虞仲翔曰孚為五離日為光侯行果曰體乾剛健遇險能通險不能陷義不窮也程傳需者須待也乾剛上進而遇險未能進也剛健之人其動躁乃能需時處之至善者也故夫子贊之五以剛實居中為孚之象而得其所需亦為有孚之義以乾剛而至誠故其德光明而能享通得貞正而吉也所以能然者居天位而得正中也項平菴曰凡待者皆以其中有可待之實也我實有之能待必有光亨之理若其無之何待之有故曰需有孚光亨張紫巖曰夫需天下須以養也為天下須非有孚君子剛健不息克盡中正之道其能養惠天下而充其所以為光乎貞吉以中正吉也中正則道協天人治以光大險難聿濟大功以立位在乾上必曰天位蓋言中正之德足以格天云鄭東谷曰五雖為坎主然處中而尊其剛陽之德同乎乾也德同則乾恃五而進五陷乎險亦援乾以進非特乾需乎險五亦需乎乾矣五在險中人見其或陷也剛陽在下以類而至則有不陷之義存焉王秋山曰惟剛則內有所主故能需惟健則動不可禦故能濟吳草廬曰互離舟象俞石澗曰九五九二同德相信是為有孚陽明而光故亨固守以正而不妄動故吉林次崖曰遇事勢之未可為即安於義命從容以待機會而不切切覬望則其待出于真實而非虛假心逸日休胸襟灑落不亦光明豁達乎蔡虛齋曰以剛遇險而不遽進以陷于險者蓋隂氣不能寧耐乾剛則沈毅不苟而能寧耐所謂乾天下之至健也德行恆易以知險來矣鮮曰坎為通亨象八卦正位坎在五正象觀彖需之義不止處險凡事皆當順其理而待其成故需有養義九五一爻陽實為有孚中德為光居正為貞以是而位天地則能致治功而成大化需道之極善者也初九需于郊利用恆無咎象傳需于郊不犯難行也利用恆無咎未失常也程傳君子之需時也安靜自守志雖有需而恬然若將終身焉乃能用恆也雖不進而志動者不能安其常也本義郊曠逺之地未近于險之象初九陽剛又有能恆于所之象項平甫曰初九以剛居剛恐其躁急故雖逺而猶戒九二以剛居柔性寬衍而居得中故雖見侵毁猶不害為終吉初九在乾為勿用故戒以用常用乾之故常也九二在乾為寬以居之故為衍在中朱漢上曰坎為險難初九正應六四險難在前當守正不動以需其應故曰不犯難行也沈守約曰變為巽巽順也伏也巽而伏不犯難行之象卦變為井無得無喪有常德也利用恆之象王秋山曰人所居為邑自邑而郊已離所居而有行矣行則正與四應是行而遇險不能不需健體已動需未必能久故利用恆來矣鮮曰乾為郊故同人小畜皆言郊何玄子曰純乾之體乾行有常不後一度不先一度健而順行故曰恆九二需于沙小有言終吉象傳需于沙衍在中也雖小有言以吉終也荀慈明曰二應五水中之剛故曰沙二與四同功而三據之故小有言乾雖在下終當升上故終吉孔仲達曰隂為小君子之進小人懼其害不免有言程傳水近則有沙二以陽剛之才居柔得中寬裕自處需之善者也去險漸近而未至故小有言語之傷終得其吉也朱漢上曰五坎為水二三四兌為澤水往矣而其剛留于澤者剛鹵也二在澤中剛而柔沙象干險者也沈守約曰沙剛而虛能勝水而水行雖近于水而能順其浸潤者也二以陽處中雖漸近于難而中守寬裕不與險爭是以需于沙衍在中也近水則浸潤易入近難則譖訴易行是以小有言也剛中寬裕不罹陷害是以吉終也蓋乾變為離剛而虛需于沙象卦變既濟終吉象李彥平曰沙近于水平易之地也二居逺近之間剛德處中守平易之心而已不與小人苟合則興讒謗之言終不能害胡雲峯曰孔孟周行諸侯見可而進需于沙者也近于世難矣然志在天下後世道廣德𢎞其心甚大雖小有患害厄于陳蔡圍于匡人謂之不敬謂之干澤于孔孟乎何傷當時重之萬世仰之以吉終也胡雙湖曰言多從兌取兌為口二當互兌之初故曰小有言來矣鮮曰小言者衆人見譏也避世之士責以潔身用世之士責以拯溺也合訂二與五應需而不往故有言或譏其不速往或以為宜且退也九三需于泥致寇至象傳需于泥災在外也自我致寇敬慎不敗也程傳泥逼于水也既進逼于險當致寇也三剛而不中又居健體之上有進動之象故致冦苟非敬慎則致喪敗矣本義外為外卦敬慎不敗發明占外之意朱漢上曰坎為盜冦也項平甫曰此爻在乾為夕惕無咎故以敬慎戒之胡雙湖曰澤水混為泥胡雲峰曰致之一字罪在三矣險何嘗逼三三急于求進自逼于險爾梁孟敬曰不言凶咎者以險在外若能敬慎猶可免也按以二體作內外言于此首見外字六四需于血出自穴象傳需于血順以聽也李鼎祚曰六四體坎坎為雲又為血卦血以喻隂隂體宜順從陽故曰需于血項平甫曰血者坎之初諸儒惑于血字皆謂四為陽所傷而出殊不思傷則必相距非順以聽也吳草廬曰四坎內偶畫象穴來矣鮮曰血即坎字非見傷也按需下三爻以險在前而言上三爻坎體以相需相養而言四之血即坎之水也萬物資水以養人資血以生需于血與五之酒食象同義一雲上于天必待隂陽和而後成雨四與初應正隂陽和而成雨之候膏澤下流而有養物之功出自穴者血之出也水下流象傳言順以聽者順聽于初得隂陽之和也九五需于酒食貞吉象傳酒食貞吉以中正也司馬溫公曰有孚光亨貞吉人君所以待天下之道也九五居中履正以待天下之需中則養天下而不過而有以盡時措之宜正則不有其功常久而不已也郭白雲曰飲食非自養也養賢而已養賢以及萬民所以應天下之需也鹿鳴之君盡得需于酒食之道天保之福所謂貞吉也張紫巖曰五以剛德處乾上有中正大德而位天位九二復以剛中應其道足以養天下而納之中和曰需于酒食君臣同心行吾中正之德于上而天下率化和氣肇豐年應酒食之需莫盛此矣坎之水物所生也為酒食朱漢上曰九五為需之主應之以中正天下之需于五者無需不獲各足其量而止如飲者止于醉食者止于飽需者無窮應者不動王廣陵曰酒食德澤之謂也九五之君當天中正以澤乎民謝顯道曰坎為水為險為毒水之險毒者酒也沈守約曰坎而為坤夷險而為順也萬物皆致養也卦變為泰上下交而時泰矣飲食宴樂與賢者共之之時也胡雙湖曰坎承兑羊離雉為食水在火上烹義著矣徐麒父曰需中有兌為口舌飲食象鄭孩如曰以治道言使斯民樂其樂而利其利期治于必世百年之後而不為近功者須待之義按中正二字並見始此上六入于穴有不速之客三人來敬之終吉象傳不速之客來敬之終吉雖不當位未大失也項平甫曰乾陽已至入穴者非上六也不速之客也朱漢上曰三陽自外入主人未應不速之客也上六九三當位而應九二初九不當位而不應三陽同類敬其一不敬其二則需之者所失大矣象辭去其三人止曰不速之客來者為上六也上六于二于初為不當位也當位而應則得一人不當位而兼應之則得三人自不當位言之則失也自得三人言之則雖不當位未大失也沈守約曰坎為穴變為巽入也按入穴之象説者泥于坎險而不得其義輔嗣以為固伊川以為安紫陽以為陷夫穴既非固安之所陷則無終吉之理且上居卦外何反言入坎險將出何復言需均未協也蓋上三爻非需險也雲上于天坎水養物之功必資乾陽之通氣未通而待其通故亦曰需需之而乾陽上通則養道功成上為天位坎雲極于天而三陽之氣上騰雲際故曰入于穴客之入也項氏得之在上之穴為牖上通天光客之入穴即坎卦六四納約自牖之象敬之終吉即樽酒簋二終無咎之象上六隂柔與乾剛相接即剛柔際之謂也陽尊隂卑故須敬之彖所謂有孚光亨者在此此需道之成終也孔子釋象凡象辭二句三句各一義者句為釋之辭繁而義一者約而釋之傳例如是此四爻不釋出自穴者以出穴之義即在需于血內也上爻不釋入于穴者以入穴即下句來字也學者熟玩孔傳爻義自明要之一卦六爻移步換形義各有取所謂不可為典要唯變所適也至于需之大義治功則休養滋培性功則涵養沖和皆需道也故次屯蒙之後若泥于處險之偏象而為逃避伏匿之曲説適成滿紙荆棘耳坎下乾上中爻離巽邱行可曰訟字從言從公言出于公則為訟不公則為誣為詐非訟也熊與可曰乾坎互巽離有家人卦故訟每起于家人風火鼓扇而天水違行張中溪曰人有爭不能直之于私故言于公也訟有孚窒惕中吉終凶利見大人不利涉大川彖傳訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也孔仲達曰窒塞也惕懼也凡訟之體不可妄興必有信實被物止塞而能惕懼中道而止乃得吉也若終竟訟事雖復窒惕亦有凶也剛來而得中輔嗣必以為九二者凡上下二象得于下象者則稱來且凡云來者皆據異類而來九二在二隂之中故稱來劉長民曰剛來謂二性本剛直好勝而訟也來居柔能屈其性也處中位不失中道也程傳剛自外來而成訟則二乃訟之主也據卦辭二乃善也爻則以自下訟上為義所取不同也本義訟爭辨也上乾下坎乾健坎險上剛以制其下下險以伺其上又為內險而外健又為已險而彼健皆訟之道也九二中實上無應與又為加憂當下卦之中有有孚而見窒能懼而得中之象上九過剛居訟之極有終極其訟之象九五剛健中正以居尊位大人之象以剛乘險以實履陷不利涉大川之象語録九二正應在五五亦陽故窒項平甫曰曲直未得故窒勝負未明故惕林黃中曰需訟皆有坎故有孚同坎在上而進不陷故需曰光亨坎在下而光自掩故訟曰窒惕鄭東谷曰坎三爻惟二剛而無應窒于二隂之間窒生訟訟生惕雖窒惕也然二剛而得中有孚之象有孚而中則不極于訟有吉義焉胡雲峯曰天子主諸侯有司主士庶訟非特士庶之爭來矣鮮曰中爻巽木下坎水本可涉大川但三剛在上陽實隂虛遇巽風舟重遇風則舟危矣舟危豈不入淵何玄子曰以窒故訟以惕故不終訟按中吉傳以得中釋之蓋惟得中故能中止初六不永所事小有言終吉象傳不永所事訟不可長也雖小有言其辨明也王輔嗣曰處訟之始訟不可終故不永所事然後吉劉長民曰初雖應四而體惟相違故亦為訟四以剛處柔能變其志而不成訟故終吉程傳以柔居下不能終極其訟者也以上有應援故雖小有言終得吉在訟而相應相與者也故初于四獲其辨明張紫巖曰互離在前離明為其辨明項平甫曰此終吉者在訟為不終在人為有終楊慈湖曰訟之初未深小有言而已沈守約曰坎變為兌兌為口小有言象楊誠齋曰才弱者有慚忿而無遂心位下者有微訴而不敢于大訟故雖有言而小胡雲峯曰初不曰不永訟而曰不永所事事之初猶冀其不成訟也小有言我不能已也沈克齋曰永字象水長流不已初在坎下坎水不能出而長流故為不永九二不克訟歸而逋其邑人三百户無眚象傳不克訟歸逋竄也自下訟上患至掇也荀慈明曰下與上爭即取患害如掇拾小物也二者下體之君君不爭則百姓無害程傳二五相應之地而兩剛不相與相訟者也九二以剛處險為訟之主乃與五為敵五以中正居尊位其可敵乎是為訟而義不克也朱漢上曰以不正而訟中正不可也况以臣訟君乎歸者二自五而反逋者失位而竄坎為隱伏竄也項平甫曰一家好訟百家受害言三百户無眚見安者衆也張紫巖曰事固有下訟上者乎曰臣不能自節以禮義而區區欲必伸其志于道不遜于天不順有致訟之理而刑罰所由加也是謂自貽伊戚曰患至掇云聖人著此訓明君臣之間道貴同不同則疑疑則爭爭則亂沈守約曰坎而為坤乾居其上君臣之象卦變為否上下不交訟象坤順也知義不可避險而逃不失其順不克訟之象鄭東谷曰成卦各有所主所以訟者二實為之初三雖同險體蓋附之也是以初與三有終吉之義而以訟之必不勝者寓于二焉蘭惠卿曰二為逺臣大夫之位古者大夫食二百八十八人之祿三百户其舉全數乎馮厚齋曰此卿大夫有位者之訟也熊梅邊曰訟之得名正以二居險中卦辭之有孚窒為二而發以下訟上凶患可知惟其居中有孚窒塞而能惕故能歸逋而無眚俞石澗曰既逋則近己者無連坐之患故曰其邑人三百户無眚來矣鮮曰坎為眚變坤則無眚矣按邑人三百户無眚鄭康成以為三百户言至薄也王輔嗣注邑過三百竄而據強災未免也傳義皆用其説愚謂逋竄之後尚恐據強為災則百户句意乃更深一層何以象傳略之蓋以下訟上罪同叛逆必取誅滅不止一身一家傳所謂患者此也宜從荀氏為直截六三食舊德貞厲終吉或從王事無成象傳食舊德從上吉也虞仲翔曰道無成而代有終坤三同義也孔仲達曰六三以隂柔順承上九居爭訟之時處兩剛之間貞正自危柔體不爭係應在上故終吉程傳三雖居剛而應上然質本隂柔處險而介兩剛之間危懼非為訟者貞謂堅固自守厲終吉謂雖危地能知危懼則終必獲吉柔從剛下從上三不為訟而從上九所為或從王事無成謂從上而成不在己也王童溪曰訟者剛健之事非柔順者所能為故初與三皆云終吉然初之終吉即其初而知其終之有吉也三之終吉居其終而安享是終吉也貞固自守而無九二九四上下之交焉則雖處危險之極而終吉故訟之六爻不言訟惟三為然張紫巖曰位在坎上有互離體變坎險為離明項平甫曰舊德坤也坤之中爻動而成坎初六六三皆舊爻也曰貞曰或從王事無成皆六三舊辭故聖人引之以實其義所以發凡起例使人知三百八十四爻皆乾坤之舊也六三為上所訟上終訟之人不可與辨三貞守舊德含章不變自無訟理或不幸而與爭王事則明其事理而讓其成功以存從上之體從上吉謂從上九也初以訟為所事三之王事亦爭辨之事爾熊梅邊曰坤六三亦曰或從王事無成而曰有終者以地道代有終也此不曰有終者訟不可終也訟以中止為吉無成乃所以為有終所以為中吉龍麟洲曰以離明體上承乾君有從王事象巽為不果有無成象唐凝菴曰舊德以坤從乾之舊德也按舊德坤順之德也順則不訟何吉如之故傳以從上為舊德其義顯矣九四不克訟復即命渝安貞吉象傳復即命渝安貞不失也虞仲翔曰失位故不克訟渝變也變而成巽巽為命故即復命渝動而得位故安貞吉程傳陽剛而居健體不得中正本為訟者初正應而順從非與訟者無與為敵其訟無由而興故不克訟又居柔應柔亦能止之義命為正理失正理為方命故以即命為復夫剛健而不中正則躁動故不安處非中正故不貞所以好訟若義不克訟而不訟反就正理變其不安貞為安貞則吉矣朱漢上曰克其剛強欲訟之心而與初相應相應則情義相得各復其所何訟之有各復其所者復即命也九四處柔體離巽柔巽故無狠怒明則知可否斯九四所以能復歟巽為命為號令陸績曰訟之復乾變為巽項平甫曰九四變為六四則以柔居柔既安且正長無好訟之失矣故曰復即命渝安貞不失也此亦以渝字發逐爻自變為四千九十六卦之例也胡雲峯曰四之不克訟與九二不同九二坎體其心本險九四乾體其心能安乎天理之正故吉然曰歸曰渝皆知反者九二識時勢能反而安其分之小九四明義理能變而安于命之正潘去華曰訟非善事四何以能變而安貞在乾陽一惕間也故前念之悔即為後念之貞競心之忘即道心之正也九五訟元吉象傳訟元吉以中正也王子雍曰以中正之德齊乖爭之訟元吉也王輔嗣曰用其中正以斷枉直中則不過正則不邪沈守約曰乾變為離大明中天幽枉必達趙汝梅曰大人在上平諸侯萬民之訟至于讓畔讓路而息爭吉孰大焉觀彖有大人之德故未訟則感之而化已訟則就之而直上九或錫之鞶帶終朝三褫之象傳以訟受服亦不足敬也王輔嗣曰處訟之極以剛居上訟得而勝者也以訟受錫榮胡可保故終朝之間褫帶者三也項平甫曰上本乾之亢龍以剛終訟于法當凶自無勝理以三從之故有或來之錫言出于望外也沈守約曰爻變為兑兑為口健極而尚口終訟之象兑澤也天而為澤錫命之象卦變為困尚口乃窮也胡雲峯曰或設若也非必之辭鞶帶命服以錫有德非以賞訟豈有必得之理甚言訟不可終也來矣鮮曰離日居下卦終之象坎為盜褫奪之象焦弱侯曰康成注以褫為拖言與小象合不知孔子正發明言外之意以為雖不見奪亦不足敬也龍麟洲曰上與六三撰離中爻故曰鞶帶身之文也外實中虛皆離象坎下坤上中爻震坤師貞丈人吉無咎彖傳師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣干令升曰毒荼苦也六軍之鋒殘破城邑皆所以荼毒姦宄之人使服王法者也毒以治民明不獲已而用之故于六爻皆著戒慎之辭也王輔嗣曰丈人嚴莊之稱也為師之正丈人乃吉也興役動衆無功罪也故吉乃無咎孔仲達曰云貞正者欲見齊衆必須以正故訓貞為正也剛中謂九二應謂六五險謂坎順謂坤剛中而無應或應而不剛中或行險而不柔順皆不可行師石守道曰二為師之主王能任之專任長子故無咎司馬溫公曰毒之者將以安之也若針砭所以己疾也程傳有吉而有咎者有無咎而不吉者吉且無咎乃盡善也吉謂必克無咎謂合義師旅之興不無傷財害人毒害天下然而民心從之者以其義動也本義坎險坤順坎水坤地古者寓兵于農伏至險于大順藏不測于至靜之中又卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故卦名曰師以謂能左右之也一陽在下之中而五隂皆為所以也險謂行危道順謂順人心楊龜山曰比則衆在內一陽在上為之主君象也師則衆在外一陽在下為之主將帥象也趙復齋曰師之主貴柔中師之帥貴剛中柔者出師之本剛者行師之用遊定夫曰詩稱方叔元老老者成德之稱丈人者老者之尊稱而法度所資也師之道以律為主故以丈人言之用師以正天下之不正故師謂之征剛中而應任將之道行險而順興師之道仰順乎天無違天以干時俯順乎人無拂人以從欲故能以衆正則人皆知其欲正己而已天下孰不趨于正哉張紫巖曰丈人謂二智德俱全之稱仁愛足以撫天下之命法度足以制天下之命謀猷足以托天下之命為丈人項平甫曰易之言兵必正必大人必出于王道然後獲吉而無後禍按中爻震為長子九二當之故為丈人初六師出以律否臧凶象傳師出以律失律凶也李氏鼎祚曰初六以隂居陽履失其位以斯行師失律者也凡首率師出必以律若不以律雖臧亦凶蘇子瞻曰以律者正勝不以律者奇勝能以奇勝可謂臧矣然其利近其禍逺其獲小其喪大故曰凶程傳初師之始也行師之道以號令節制為本師出當以律不然雖臧亦凶善謂克勝凶謂殃民害義也王童溪曰否失律也臧善也謂有功也師不以律雖有功亦凶李隆山曰二為師主初受節制有師出以律之象沈守約曰坎為法為衆為通變而為兑法壅而不行衆散而為弱之象是以凶也胡雲峯曰以律不言吉者謹嚴乃出師之常勝負猶未可知故不言吉出而失律凶立見矣按本義云否臧謂不善也似直截但玩象傳以失律為凶是失律則凶不止不善王氏蘇氏程氏以失律二字專釋否字似優蓋臧可訓善未可作律字看也九二在師中吉無咎王三錫命象傳在師中吉承天寵也王三錫命懷萬邦也孔仲達曰承上之寵為師之主任大役重無功則凶故吉乃無咎李氏鼎祚曰二互體震震本數三三錫命之象程傳九二一陽為衆隂所歸五居君位是其正應二乃師之主專制其事者也凡師之道威和並至則吉也既處之盡其善則能成功而安天下故王錫寵命至于三也在師中吉者以其承天子之寵任也天謂五也人臣非君寵任之專安得專征之權而有成功之吉王三錫以恩命褒其成功以威懷萬邦也張子懷威萬邦所以重將帥朱子在師中吉言以剛中之德在師中所以為吉朱漢上曰九二剛居柔威和並用得中者也張紫巖曰二居下卦中曰在師中吉自五至二歷互坤三位曰王三錫命坤在上曰萬邦馮厚齋曰凡行師將必親之在師之中然後得吉而無咎將不在中而督人以戰誰用命哉項平甫曰在師中者明其為將也吉者戰勝也無咎者民從之而無怨也王三錫命者君寵之也爻辭本是三事小象特交錯其文言在師中吉以其承天之寵言王三錫命以其能懷萬邦蓋明二所以勝非己之功以與五相應得君寵也五之錫命非喜其能勝以二用中德衆隂從之賞其能懷吾民也將而知此無恃功之心君而知此則不賞殘民之將胡雲峯曰在師中吉無咎即卦辭意也中則無過不及所以為貞在師而中所以為丈人故師六爻唯九二吉無咎易外丈人以水為德萬邦之懷亦猶水之容畜乎地也水為元氣之所生丈人為王養其元氣以為祈天永命之本坤為萬邦坎為懷衆隂在一陽之懷其象如此按在師中或以為中道或以為下卦之中或以為在師之中諸説當合看孔子以中正二字定易之吉凶原借爻位説得中位即是中道在師卦即是師中威萬邦項氏與程張説小異亦可合看六三師或輿尸凶象傳師或輿尸大無功也程傳輿尸衆主也蓋指三也以三居下卦之上故發此義軍旅之事任不專一覆敗必矣本義以隂居陽才弱志剛不中不正犯非其分故其象占如此王童溪曰九二師之主也而六三復居其上外柔懦而內剛狠之人也而兼主軍制豈不兼喪前功耶故曰大無功也故六五復申其戒曰弟子輿尸使不當也楊龜山曰唐九節度之師不立統帥雖李郭之善兵猶不免敗衄則輿尸之凶可知朱漢上曰坤為輿輿又訓衆三動得位尸之也坎變兌毁其師也六四師左次無咎象傳左次無咎未失常也王輔嗣曰得位而無應無應不可以行得位則可以處故左次之而無咎也行師之法欲右背高故左次之程傳左次退舍也隂柔不中而居隂得正知難而退師之常也不能勝而完師賢于覆敗遠矣張紫巖曰六四以坤順居互震上動而不失其靜且震位居左為左次沈守約曰左者無用之地也左次待命未失其常也卦變為解動而免于險是以無咎李隆山曰坤體平陸而無險左旋其斾下依坎水之阻而止軍者也軍事出則尚右旋反則尚左胡雙湖曰師再宿為信過信為次左次退宿也兵法前右後左則右為重左不用之地四左次與明夷四左腹同坤體之下熊梅邊曰左堅壁不動之意出坎險入坤順郭亨仲曰左次依震林坎水靜止而不動易外左次者按師以待其服解緩也緩而左次以不尚力為德也左次亦以律故曰未失常常者律也六五田有禽利執言無咎長子帥師弟子輿尸貞凶象傳長子帥師以中行也弟子輿尸使不當也虞仲翔曰長子謂二震為長子在師中故帥師弟子指三三體坎坎震之弟失位乘陽故貞凶孔仲達曰犯而後應故往即有功猶如田中有禽而來犯苗若往獵之則無咎過以中行是九二居中也使不當謂六三失位也石守道曰執言猶書所謂奉辭也程傳五君位故言興師任將之道師之興必盜賊姦宄為生民害然後明其罪而討之二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也任使之不當也本義六五用師之主柔順而中不為兵端者也朱漢上曰五應二二為田震為稼坎為豕田豕害稼沈守約曰坤衆也致役也坎勞卦也勞衆以徒役之事田之象坤順也坎剛居中直也順且直執言之象馮厚齋曰田獵以除田之害故曰田二在地之中由之象上六大君有命開國承家小人勿用象傳大君有命以正功也小人勿用必亂邦也程傳此專言師終之義不取爻義蓋以其大者若以爻言則六以柔居順之極師既終而在無位之地善處而無咎者也本義師之終順之極論功行賞之時也坤為土故有開國承家之象趙復齋曰師之終不再舉賞功之際戒受封者勿用小人其義深矣用小人國必亂亂則師又舉非師之終或謂小人有功者不賞非也王者六鄉之民皆君子統之者六卿也何假于小人而用之張舜元曰謂之大君者别于諸侯也禮樂征伐自天子出萬世之通法也郭白雲曰武成之終曰列爵惟五分土惟三又曰敦信明義崇德報功則盡上六之義者其武王乎崇德則小人勿用矣楊慈湖曰正功言賞必當功不可差失也開國承家之始其初不可用小人也于此始言勿用者因此賞功原其始也用小人為將帥幸而成功則難于不賞使之開國承家則害及民必亂邦也馮厚菴曰爻比六五大君有命之象三為應弟子輿尸之象故曰小人勿用以位為弟子以德為小人本爻隂柔不斷故戒趙汴水曰大君六五也周官將軍皆命卿開國者出封為諸侯師帥皆中大夫旗帥皆下大夫承家者大夫之采邑胡雲峯曰初師之始故紀其出師而有律上師之終故紀其還師而賞功六爻中出師駐師將兵將將伐罪賞功靡所不載其終始節次嚴矣末曰小人勿用則又戒辭也然亦在于謹其始焉耳曰丈人曰長子用以行師者得其人及其開國承家自不至于用小人矣熊梅邊曰開國承家則天下定矣功成治定師道終矣自兹以往只戒以小人勿用則可保安于無窮也邵二泉曰弟子輿尸戒于師始小人勿用戒于師終始無弟子則終無小人來矣鮮曰變艮為門闕家之象又為止勿用之象觀彖凡上爻有以君道言者皆以卦終取義非以其爻為君位也按小人勿用程朱皆以有功勿用為疑愚謂此皆三代以後之事三代以上征誅創業豈有販繒屠狗之徒而曰有功勿用耶所採諸説得易本旨坤下坎上中爻艮坤郭白雲曰一陽之卦得位者師比而已得君位者為比得臣位者為師比吉原筮元永貞無咎不寧方來後夫凶彖傳比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比吉也王昭素謂多此也字朱子云當云比吉比輔也程傳比吉道也人相親比自為吉道故雜卦云比樂師憂民不能自保戴君以求寧君不能獨立保民以為安不寧而來比者上下相應也朱漢上曰凡物孤則危羣則強父子夫婦朋友未有孤危而不凶者人君為甚故比而吉謂九五也項平甫曰凡卦自上而下為來比之成卦本以坤在下為下順而從又四隂在下順而從巳五巳得比輔之義矣而五猶以位在坎中憂畏不寧方且來比于下上下之心相求如此比之所以成也屯之初九動乎險中故為宜建侯而不寧比之九五居坎而下比故為不寧方來皆以坎為不寧也坎險多憂故為不寧之象方來與朱紱方來之方來同王童溪曰以卦言之則一陽而五隂比之然上六視下諸爻則其道為窮當比之時顯比之主若揭日月于上自四而下皆面夫五而順從之上六獨背夫五而後之迷悟失道其能獨存于天下乎楊慈湖曰君子體仁足以長人體元居貞同天不息所以能比天下邱行可曰原再也蒙內卦坎為初筮彖釋之曰以剛中謂九二也比外卦坎為再筮彖釋之曰以剛中謂九五也馮厚齋曰萃與比下坤同而上體水澤不甚相逺萃以九四一爻有分權之勢故元永貞言之于五比下無分其權者故元永貞言之于彖王秋山曰四隂順從乎五五下比于四隂故曰上下應上六孤立于外如後其夫者夫謂五陽也上隂婦也婦而比夫當然之理不先而後凶之道也來矣鮮曰比剛中在上故有三德而人來親輔也剛中則私欲無所留所以為元善者此也剛中則健而不息所以為永者此也剛中則正固而不偏所以為貞者此也蓋八卦正位坎在五所以有此三德而無咎初六有孚比之無咎有孚盈缶終來有他吉象傳比之初六有他吉也虞仲翔曰坤器為缶坎水流坤初動成屯屯者盈也故盈缶劉長民曰居順之首為比之先衆願從之故有他吉程傳言比之初六者比之道在乎始也始能有孚則終致有他之吉其始不誠終焉能吉上六之凶由無首也本義比之初貴乎有信則可以無咎矣若其充實則又有它吉也王童溪曰位之卑者則與之者必狹交之淺者則信之者必寡然有要道修吾胸中之誠而已誠則無上下之間比無不善張紫巖曰四隂中虛為缶坎水坤土相承為盈缶項平甫曰坎卦五為有孚四為用缶坎水盈則下流故初六取以為象朱漢上曰缶所以汲質素之器誠之象水盈其中亦誠信充實而無間之象它吉謂比五子夏曰非應稱他沈守約曰坤為土為腹震為足土為腹而足居之缶象卦變為屯屯固比合合而能固比之善者也龔泉峯曰比以九五為主初去五獨逺而近比于二二中正故比之而無咎若至于誠意充積則雖逺于五而非應亦終得比之也梁孟敬曰陽為實隂為虛初以隂居陽虛而能實孚信之象缶本虛也有盈缶則實矣趙氏曰易六爻貴于正應惟比諸爻不論應否而專以比五為義高忠憲曰易重初初者未變之心也故曰有孚按傳云比之初六者蓋比以爻位言則隂陽相比以二體言則水土相比水性潤下下者得之最先初處順之始有率先歸順之象地之最下有先得水潤之象象辭之有孚以初六也有他吉者亦以初六也比之有以比四為説者愚謂比卦不主應以成卦言則貴比五以比輔之義言則附近為比當以比之為比二他吉為比五有孚比之初之孚也有孚盈缶五之孚也項氏之説精矣六二比之自內貞吉象傳比之自內不自失也吕藍田曰比之時主比不主應二獨應五守貞性于內而不自失者也程傳二與五為正應皆得中正以中正之道相比者也二處于內自內謂由己也以中正之道應上之求乃自內也不自失也郭白雲曰比以九五為主而六二正應為主于內蓋率天下而比五者故自內至外率天下以歸王也王童溪曰正者吾性之自然而不變也比而不失吾性之自然者故曰自內相比而或失之偽為者皆非自內也項平甫曰六二之正其所自有以六居二正位也以二比五正應也但能守其所固有則足以吉矣李隆山曰比之世隂皆求陽而非陽求隂故二之比五自內之外出應乎上者也胡雲峯曰凡卦以下卦為內上卦為外六二言內六四言外內外卦之分見於此梁孟敬曰貞吉有爻之本善者有爻非貞而為之戒者此曰貞吉爻之本善也按自內即二之中正也以中正為比而不以迎合諂附為比故貞吉六三比之匪人象傳比之匪人不亦傷乎王輔嗣曰四自外比二為五應近不相得逺則無應所與比者皆非其親是以悲傷本義隂柔不中正承乘應皆隂所比皆非其人之象趙復齋曰初比于五先也二應也四承也六三無是三者之義將不能比五矣沈守約曰三變成艮止于兩隂之間比匪之象卦變為蹇三已逼險往則蹇矣宜其傷也陳氏臯曰君子修潔自立則四海之內皆所親也六三以隂居陽不守正也處不得中非正行也上無應援人不録也獨立無依亦可傷矣胡雲峯曰此爻略似蒙六四蒙所求者九二而四獨逺之比所宗者九五而三獨不比之按三處中爻艮位有止而不進比于五之象坤之極有迷之象上有顯比之君而迷于所比故可傷六四外比之貞吉象傳外比于賢以從上也程傳四與初不相應而五比之外比于五乃得貞正而吉也五陽剛中正賢也居尊位上也親賢從上比之正也項平甫曰四與上皆正而吉凶異者四在五內故能比五上在五外不能比五也朱漢上曰以正比賢以臣比君外比之所以吉也張紫巖曰四位居坤上率三隂從五是為貞顯比之功自四成之德位居隂在比得臣道順貞用以貞吉龔泉峯曰二四皆以隂居隂是自處已得其正而承五所比復得其人故皆言貞吉按四五同體而特言外比之者正以明四與初之不為應也坎卦中一陽為水上下二隂為土四隂親承九五之坎水為比之至親切者故貞吉上亦坎體而水性下流比下之土而不比上之土有滄海桑田之勢故凶九五顯比王用三驅失前禽邑人不誡吉象傳顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也程傳五居君位處中得正得比道之善者也顯明其道如誠意以待物恕己以及人發政施仁使天下蒙其澤天子之田圍合其三面前開一路使之可去邑王者所都諸侯國中禮取不用命者乃是舍逆取順也順命而去者皆免矣比以向背而言謂去者為逆來者為順朱子邑人不誡如有聞無聲言不消告誡如歸市者不止耕者不變田獵之禮置旃以為門刈草以為長圍田獵者自門驅而入禽獸向我而出者皆免惟驅而入者皆獲故以前禽比去者不追上使中由上之德使不偏也楊誠齋曰王者之比天下明示之以大中至正之道而已可以比天下而不可以示天下王者不由也故曰顯比有比天下之道而無比天下之心可與比天下矣上使中者上以中正比其下下以中正比其上非使之使也不使之使也太王去邠而從者如歸市則驅禽而禽不去成湯征葛而怨後豫則不令而捷于令聖人何心哉李隆山曰初六終來有他六二比之自內六四外比之五皆受之其取順之謂乎六三居內卦之前而比之匪人上六居外卦之前而比之無首此二者或傷或凶皆其自取九五不問也其舍逆而失前禽之謂乎張紫巖曰比至九五其道大成以一陽主衆隂剛中而貞且位居艮上中正之道足以制羣隂而止之莫不效順是為顯比上以隂在外為失禽坤下為邑人坤順為不誠失前禽者遐裔未賓撫之以寬而遂其生郭白雲曰書曰民心罔中惟爾之中其使中之謂乎朱漢上曰坤為衆為輿坎為輪田獵之象艮為黔喙坎為豕震為決躁內卦為後外卦為前坤在下為邑李仲永曰六二正應邑人也得位得中不期約而自孚故曰不誡吉胡雲峯曰諸爻言比之隂比陽也五言顯比陽為隂所比也師比之五皆取田象師之田有禽害物之禽也比之失前禽背已之禽也在師則執之王者之義也在比能失之王者之仁也胡雙湖曰顯互艮光輝象三驅坤三爻象互艮為旃門下三隂驅而入門象上一隂在門外失前禽象吳草廬曰驅即所謂驅逆之車驅禽獸使趨田也坎馬駕坤輿以行驅象俞石澗曰前禽即後夫衆已比五而上獨後是為後夫衆皆隨五而上獨前去是為前禽陸庸成曰三驅失禽置失得于勿恤者狀蕩平之王心邑人不誡泯知識于大順者狀熙皥之王化上六比之無首凶象傳比之無首無所終也王介甫曰隂之為物以陽為首而比之者也乘九五而不承焉比之無首者也以陽為首則有所終先陽則迷而失道况無首乎本義以上下言之則為無首以始終言之則為無終郭白雲曰上六非天下之所比又不能比人為臣而無君與無元首何異哉是以凶而無所終也張紫巖曰上六位坎險上比終已獨失所附從無所容于天地之間曰無首吳草廬曰上六居一卦之上如人首在一身之上也獨外王化不內向九五是比之下體俱足而上體不完猶人之無首也胡雲峯曰上六無首凶正與彖辭後夫凶相應按卦以水地為比水滿于上必致泛溢不受地之約束親比之道至此而決裂此即澤風大過之上過涉滅頂水火既濟之上濡其首皆以水爻在上為水滿之象而此又為坎險之極中懷叵測非明順歸往之性居比之終為卦之外據五之上有不服之象故其辭若此至蹇之上六亦水盈于上而而有來碩之象者以水在山上滿則下流于山有來碩之道若夫屯之上為泣血漣如亦水泛無歸之象與此略同需之上水有入穴之象以正應得陽剛轉可和而為雨故得終吉此則下應匪人其凶宜矣周易孔義集説卷二
