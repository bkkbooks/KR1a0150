body:
  text: 周易孔義集説易類提要臣等謹案周易孔義集説二十卷國朝沈起元撰起元字子大太倉人康熙辛丑進士官至光祿寺卿是書大旨以十翼為夫子所手著又未經秦火其書獨完故學易者必當以孔傳為主因取明髙攀龍周易孔義之名别加纂集于古今説易諸書無所偏主惟合于孔傳者即取之其篇次則仍依今本以彖傳象傳繫于經文之下謂易之亡不亡不係於古本之復不復王氏以傳附經亦足以資觀玩惟大象傳往往别自起義文言則引伸觸類以闡易藴皆無容附于本卦故別出之前列三圖一為八卦方位圖一為乾坤生六子圖一為因重圖皆據繫辭説卦之文至于河圖洛書先天後天方圓諸圖則謂此陳邵之易非夫子所本有概從刪剃頗能掃除紛紜轇轕之習其中亦多能推驗舊説引伸新義如乾彖傳大明終始王注程傳朱子皆未確解起元獨取侯行果大明日也之説而證以晉彖傳之順而麗乎大明禮所云日生于東於經義頗有根據觀六三九五上九之觀我生觀其生自孔疏以動出為生而後儒遂以動作施為解之俱不免于牽強起無獨取虞翻生謂坤生民也之説尤有合于九五象傳觀民之旨其釋大象傳比類求義于字句相似而義不同者推闡更為細密在近來説易家中亦可云有本之學矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易孔義集説傳易源流班固曰孔子晚而好易讀之韋編三絶而為之傳傳即十翼也自魯商瞿子木受易于孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子莊及秦燔書易為卜筮之書獨不禁故傳授者不絶隋書云秦焚書周易獨以卜筮得存惟失説卦三篇後河內女子得之漢興田何號杜田生授東武王同子中及洛陽周王孫梁人周寬齊服生皆著易傳漢初言易者本之田生同授緇川楊何寬授同郡碭田王孫王孫授施讐及孟喜梁丘賀由是有施孟梁丘之學焉施讐傳易授張禹及琅邪魯伯禹授淮陽彭宣及沛戴崇伯授太山毛莫如琅邪邴丹後漢劉昆受施氏易于沛人戴賔傳子軼孟喜從田王孫受易喜為易章句授同郡白光及沛翟牧後漢窪丹觟陽鴻任安皆傳孟氏易梁丘賀本從太中大夫京房受易後更事田王孫傳子臨臨傳五鹿充宗及琅邪王駿充宗授平陵士孫張及沛鄧彭祖齊衡咸後漢苑升傳梁丘易以授京兆楊政京房受易梁人焦延夀房為易章句説長于災異以授東海殷嘉及河東姚平河南乘𢎞皆為郎博士由是前漢多京氏學後漢戴馮孫期魏滿並傳之費直傳易授琅邪王璜為費氏學本以古字號古文易無章句徒以彖象繫辭文言解説上下經漢成帝時劉向典校書考易説以為諸易家説皆祖田何楊叔元丁將軍大義略同唯京氏為異向又以中古文易經校施孟梁丘三家之易經或脫去無咎悔亡唯費氏經與古文同范氏後漢書云京兆陳元扶風馬融河南鄭衆北海鄭康成潁川荀爽並傳費氏易沛人高相治易與費直同時其易亦無章句專説隂陽災異自言出丁將軍傳至相相授子康及蘭陵毋將永為高氏學漢初立易楊氏博士宣帝復立施孟梁丘之易元帝又立京氏易費高二家不得立民間傳之後漢費氏興而高氏遂微永嘉之亂施氏梁丘之易亡孟京費之易人無傳者唯鄭康成王輔嗣所注行于世而王氏為世所重其繫辭以下王不注相承以韓康伯注續之總論易象自八物外有卦畫竒耦之象內外上下之象有三才之象有中爻之象有變爻之象中爻為雜物撰德四畫內又别為兩卦而象亦隨之變爻者用九用六易之占専視變爻故爻辭已有兼變卦而言者則象亦隨變而易此皆按之卦爻核之文周孔三聖之辭而確乎不可易者非傅會也惟漢晉先儒以應為象云自某爻至某爻成某卦殊屬牽強蓋應以情應非此爻之彼爻也至半離半坎之説巧而彌拙均不可用其與説卦間有互異讀易者第據辭言象如乾不為虎而據履彖則乾為虎坤不為馬而據坤彖則坤為牝馬不必泥説卦而曲為之辭也易言六位時成又言六位而成章無無位之説王輔嗣謂初上無位謬矣伊川謂乾上九貴而無位乃爵位之位非隂陽之位隂陽竒耦豈容無也李安溪以易初二無言位當不當者獨三四五三爻言當位則所謂位者亦借以明分位之位謂德與位稱也愚謂當位者即正之謂也初上言正者多矣豈非當位乎亦不可泥矣伏羲之卦畫彖爻之所取既無非象矣至中正亦有象則孔聖之所創也文周繫辭以斷吉凶而所以為吉凶者其道何由孔子定之以中正而後吉凶悔吝之故得然易象何以有中正孔子以一卦分二體而以二五為中之象以六爻分隂陽之位以所乘之隂陽當位為正之象此與伏羲以􅅀􅄲為隂陽皆從無象中開闢出來非開天之聖人不能夫中正二字典謨以來第言虛理至孔聖傳易而遂有實象可據於是推之而無不驗按之而不可易斯亦竒兵可見一部易書無一字不著實至實而至虛故曰潔淨精微易之時義孔子發之以一卦為一時一爻又各有一爻之時于是天下萬世巨細精粗之道無不備此即所謂時中之道也卦變之説惟程子之論為不易蓋變為易之要義孔子繫辭傳言之詳矣要不越于隂變陽陽變隂乾坤生六子變之權輿也六十四卦以因重而得一重則六位已定必不可謂自某卦來也來氏創為錯綜之説不過正對反對之别名亦與因重之義不符易道貴交天地不交則萬物不生君臣父子夫婦兄弟朋友不交則人道滅絶故易以隂交陽陽交隂為造化之樞杻孔子更從二體六爻內以應言乎逺交以比言乎近交而後交之道始備交有善不善而吉凶悔吝生焉則又於應比之內考其中不中正不正合時義違時義以定之此所謂神而明之者也易冒天下之道而其大要不外三綱君道也臣道也父道也子道也夫道也婦道也如是而已矣但辭寄于象苟不得于象必謬于其辭謬于其辭必害于其道聖人因象立言無隻字泛設孔子釋文周之辭至簡而至精所用虛字如而字以字之字皆有深意以顯繫辭之道學者一字玩忽差以毫釐謬以千里害不在辭義而在世道言易者數千家即訓辭者亦人執一説其間有義可旁通者有必不可兼及者後學淺末何所適從熟玩文義可以定之聖人之言自典謨至今不獨道無有二即文理亦萬古不異虛心涵泳聖人之情有灼然著見不可移易者所謂文在兹者此也易者聖人教人法天之學也聖人不以不可見之天教人而以可見之天教人則八物是已八物皆天也天地雷風水火山澤相錯而成六十四卦使人觀象而知萬事之理皆本于天行止進退事上與下宜剛宜柔象義胥備效之為事業成之為德行故大象傳必曰以豈俟蓍筮而始顯其用哉易之興也其于中古乎孔子斯言想見伏羲畫卦以來易之道晦也久矣連山歸藏不特後世不傳其説而孔子亦僅云吾得坤乾焉而未言其義周禮太卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四想見前此祗為卜筮之用然考左氏所載筮卦占驗之妙亦據繫辭以斷當周易未作以前有畫無文所為卜筮者亦不知其若何為用意即朱子所謂如今之環珓相似耳則伏羲當日畫卦以通神明之德以類萬物之情順性命之理者終如長夜於是文周起而繫之以辭而易道始興是即卜筮之用亦自文周而始神不特闡幽微顯義理剖晰也宋道士陳圖南乃言羲畫不立文字使天下之人觀其象而已能如象焉則吉凶應違其道則吉凶反後世卦畫不明易道不傳聖人于是不得已而有辭學者為道止于是而不復知有畫矣此直以文周之辭轉有妨于易道欲廢辭而觀象其誣聖實甚而後儒猶有宗之者甚矣索隱行怪之惑人也凡例古周易文王卦辭周公爻辭為經上下二篇孔子十翼為傳十篇各為一書費長翁始以彖象繫辭之言解説上下經鄭康成合彖傳大象傳小象傳於經加彖曰象曰字王輔嗣祖之謂孔子贊爻之辭本以釋經宜相附近又取乾坤二卦文言附入加文言曰三字于首于是好古者每歎古易之亡至宋吕汲公吕東萊訂正古易十二篇朱子本義初本亦據東萊本篇次至明初修大全復析本義從程傳之序則今之行本也愚謂易之亡不亡存乎其義耳篇次分合豈直筌蹄而已哉學易者不能舍卦爻辭以求易即不能舍孔傳以解辭伊川易傳序云未有不得其辭而通其意者余所傳者辭也然則欲得文周之辭舍孔傳其曷由王氏以傳附經用資觀玩乃學易之定法不得云變亂今仍之唯大象傳乃孔子以卦畫二體示人觀象學易之道往往别自起義補文周未發之旨文言則引伸觸類以闡易藴皆無容附于本卦經文之後者不敢盡同王氏也十翼之説各家不同胡安定以上彖下彖大象小象文言上繫下繫説卦序卦雜卦為十翼似為得之兹以彖傳小象傳分附各卦經文外餘上下繫辭傳大象傳文言傳説卦傳序卦傳雜卦傳仍自為篇次高忠憲云易注自夫子即注即經非夫子而烏知易之所語何語哉嘗歎以為至論後之説易者第當詳繹孔傳自得經旨王輔嗣以來卦爻下先為注釋非勦襲即岐二甚非宜也趙復齋于乾彖有云元亨利貞形容乾體夫子贊之其旨甚明後學玩辭自有所得更立語言去本愈逺噫豈獨乾彖云爾哉苟非分經合傳則經文下直不容置一辭矣兹故于卦爻辭下即附孔傳後列諸儒之説以釋孔傳向以彖曰象曰字致後儒即以孔傳為彖象則鄭氏之貽誤也今易曰為傳以正之為隂文以志之使初學者知經傳之别知卦爻辭之為彖象開卷瞭如易理廣大悉備不可窮殫然孔子曰易有聖人之道四焉者舉其要矣説易者專門名家古今輩出縱有純駁要皆各有所得唯焦氏京氏主于災變占驗與孔傳言義理背馳此外豈無發明經義之處乃王輔嗣一掃馬鄭程朱一掃注疏程傳本義亦互有異同易義之糾紛視他經為甚夫羣言紛拿折衷聖人孔子為萬世立極之聖人又惟此十翼為所手著韋編三絶而後成非若詩書春秋之刪訂筆削猶有難求其説者又未經秦火其書獨完則學羲文周三聖之易者自當以孔傳為主愚不揣淺陋于漢晉唐宋元明以及本朝説易諸書概無偏主惟以合于孔傳足以旁通曲暢者即為採入名曰孔義集説以明遵孔之意其諸儒則統以時代為先後焉漢唐人釋經一字一義凡經前人所發者必稱某氏云云不欲襲為已説可見先儒之不苟此書單辭片語必載某氏存此志也其前儒所發後儒宗之既採前説後不復贅懼復疊也説易者千餘家其可會通互參者兼取弗遺其衷之孔傳弗符者既不復録宜無庸置辨然有數説同而一説異有千百年遵用而忽易一解者取舍之故不得不極其所以然以别其是非以定其指歸又間有先儒所未及愚以千慮一得偶有所見統附為案以俟明者採焉繫辭傳云居則觀其象而玩其辭動則觀其變而玩其占學易之道盡矣子又云假年學易可以無大過是易者教人寡過之書也蓋天下萬事之理皆有天造地設不可移易者聖人舉目皆是百姓日用不知故以易象示之使知順之則吉逆之則凶所以前民用也伏羲之所以畫文周之所以繫辭孔子所以反覆贊之無非以天道明人事憂世濟民之深意至天之所以覆地之所以載日月之所以行四時之所以運自天主之原無藉于卦畫故此書于所為河圖洛書伏羲方圓圖先天卦位圖即不敢定其真偽要之無關人事非孔子之所言俱不復載惟據孔傳萬物出乎震節為八卦方位一圖據乾天也節為乾坤生六子一圖據因重節為六十四卦因重一圖以備觀玩繫辭傳云雜物撰德辨是與非則非其中爻不備中爻互卦也文王卦辭周公爻辭以互體立義者其象皎然故先儒多以互體説易不可忽也今於每卦之下標明中爻互卦為觀象之助
