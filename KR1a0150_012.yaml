body:
  text: 周易孔義集說卷十二光祿寺卿沈起元撰下經乾下兌上中爻重乾程傳澤水之聚也乃上于至髙之處有潰決象五陽在下長而將極一陰在上消而將盡衆陽決去一陰所以為夬也夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖傳夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也孔仲達曰王庭百官所在之處君子決小人故可顯然發揚決斷之示至公而無私隱專用威猛以此即戎便為尚力取勝即是決而不和其道窮矣王介甫曰柔乘五剛上六乘九五之剛衆陽比五親決五為王位故曰揚于王庭決去柔邪當先明信其法宣其號令一小人猶在上故須常懷危厲故曰危乃光也程傳下健上說是健而能說決而能和決之至善也兌說為和柔居五剛之上猶為乘陵之象當顯揚其罪于王朝大庭使衆知善惡盡誠信以命其衆而知有危懼則君子之道無虞而光大也聖王誅亂必先修已舜之敷文德是也游廣平曰揚于王庭誦言于上也孚號誕告于下也告自邑自近而及逺也本義夬陽決陰也三月之卦以五陽決一陰必猶有危厲不可安肆又當先治其私而不可專尚威武則利有所往也以一小人加于衆君子之上是其罪也剛長乃終謂一變即為純乾語録孚號惕號無號取𧰼之義兌為口故多言號也耿希道曰植德莫如滋除惡莫如盡故一柔已窮而猶決五剛已盛而猶利往也張紫巖曰無怒之之心曰說有生之之意曰和此中正之道也然後能除大害譬如治病使疾去而元氣無損朱漢上曰決而不失其和非亢暴忿疾以力勝之決之至善也五得尊位體兌兌為口訟言于王庭與衆君子共去之一柔未去有危道其危猶曰其亡則決小人之道光矣光謂與衆棄之若隱其誅如唐去李輔國則不光矣郭白雲曰有乾之健故能決有兌之說故能和小人既決天下說而和四罪而天下咸服剛長乃終必夬之義也李隆山曰上六雖處至窮之勢然九五與之比九三與之應九四與之同體其與之敵者初九九二耳又逺于上雖欲決之勢所不及故曰有厲曰有戎有凶有者不必然之辭五陽相信知其危而戒之斯有萬全之勢無一跌之虞項平甫曰其危乃光與中未光相應不利即戎與暮夜有戎相應剛長乃終與終有凶相應李西溪曰一陰在五陽之上小人據尊位而在君側其巧詐之深未易動故揚于王庭使人主明知其為小人號令于衆使舉朝皆知其為小人告于邑使舉國皆知其為小人舉兵誅之惡在君側其勢不順故不利即戎胡雲峯曰陰勢雖微蔓或可滋窮或為敵不可于小人道衰之時忘戒懼也小人有一人之未去猶足為君子之憂人欲有一分之未盡猶足為天理之纍吳敬齊曰復利有攸往譬如平地之一簣故喜其進而曰剛長也夬利有攸往譬如九仭之尚虧一簣故恐其止而曰剛長乃終也華霞峰曰決之象從澤順而排之因其勢而利導之若決澤而使之流通決之善也然有潰決之憂不得其道則潰決四出而泛濫為害矣初九壯于前趾往不勝為咎𧰼傳不勝而往咎也王輔嗣曰居健之初為決之始宜審其䇿以行其事往而不勝宜其咎也不勝之理在往前也本義前猶進也當決之時居下任壯不勝宜矣語類與大壯初爻同此卦大率似大壯沈守約曰卦變為大過本末弱也往而不勝其任則有敗撓之凶朱漢上曰夬自大壯積之在大壯時四剛已壯長而至于五剛則初九壯于前大壯之趾也無應不可先動不曰凶者陰將盡也王童溪曰九以剛動之才居夬之初唱決柔之謀者也壯于前趾居衆動之先先衆而動之象毛伯玉曰勝在往前者兵法也必往之道也往不勝為咎者逺慮也所以戒其往也潘天錫曰陰在髙位初欲決之猶布衣論權臣不量力之甚胡潛齊曰京房欲去恭顯劉蕡欲去宦官而卒困于恭顯宦官此往不勝之咎九二惕號莫夜有戎勿恤象傳有戎勿恤得中道也蘇子瞻曰戎上六也惕號莫夜警也有戎勿恤靜也能靜而不忘警能警而不用得中道矣與大壯九二貞吉同故皆稱其得中程傳處中居柔不為過剛能知戒備處夬之至善也內懷兢惕而外嚴戒號雖莫夜有兵亦可勿恤矣張子警懼申號能孚號而有厲也以必勝之剛決至危之柔能自危厲有戎何恤朱漢上曰二動成離目巽多白眼惕懼之象巽風為號日在兌之下莫也巽為入日入于地莫夜也離為戈兵戎也我得中道行之以正千萬人往矣况窮寇乎郭白雲曰惕知懼也號明戒也有備則無患大壯以初九九三用壯而二則貞吉皆與夬同惕號鄭氏音作號呼者非其義也李西溪曰小人罪彰利在為亂故有有戎之象九二不可啓兵端但勿恤其計不行矣趙汴水曰勿恤者九之剛能前定二之柔能敬謹此中道也梁孟敬曰五以陽居尊位決陰者也二與五應居柔得中助五以決陰者二也按蘇氏以惕號莫夜為句有戎勿恤為句與𧰼傳合宜從之且有戎之意仍可蒙上而言也九三壯于頄有凶君子夬夬獨行遇雨若濡有慍無咎象傳君子夬夬終無咎也荀慈明曰九三體乾乾為君子三五同功二爻俱欲決上故曰君子夬夬獨行謂獨上與陰相應故遇雨王介甫曰頄在上而見于外九三乾體之上剛亢外見夬夬者必乎夬之辭應乎上六疑于汚也故曰若濡君子之所為衆人固不識若濡則有慍之者矣和而不同有夬夬之志焉何咎之有本義溫嶠之于王敦其事類此語録九三雖與上六為應而以陽居陽有能決之𧰼故壯于頄則有凶而和柔以去之則無咎沈守約曰在夬而善處嫌疑之地者也有凶非必凶也戒也乾健也變而為兌說也健而說所以能決朱漢上曰頄頰間骨兌澤下流遇雨也上六兌三動復成兌乾為衣而遇兌澤霑濡也巽多白眼上視而不說愠也鄭東谷曰夬決之時雖當揚于王庭若三與上應應則相疑故三之處夬當委曲致慮捨其朋而獨行恃吾之朋而往迫之窮則變矣遇雨相應而和如受其汚衆皆疑我之不決而吾心期于必決故終無咎平勃之決諸吕蓋得是理三與五任夬之責而又純陽皆言夬夬王童溪曰九三上六之應應之者決之也如明夷九三之于上六也九三以陽居陽又處健極與小人居相應之地疾惡之心見于顔面而不知濟之以和悅小人我疑則君子禍至故有凶夬夬夬之至以和悅之道而濟是夬夬應之乃所以決之則其遇雨又何嫌焉馮厚齊曰夬分二體為𧰼故三在下卦上為頄四在上卦下為臀蔡節齊曰雨上也若濡不至為雨所濡也俞石澗曰夬之五陽皆君子今獨稱九三為君子明其不為小人之黨也遇者不期而會非其本心何𤣥子曰健而說決而和故曰遇雨九四臀無膚其行次且牽羊悔亡聞言不信象傳其行次且位不當也聞言不信聰不明也李氏鼎祚曰兌為羊四五體兌四為臀以陽居之故無膚本義以陽居陰不中不正居則不安行則不進張紫巖曰羊取剛進觸物為義次且何哉蓋斷大事決大議非剛中者莫能周公大告邦君卿士罔不反曰艱大所見不同非懷奸者故無凶咎悔吝鄭亨仲曰膚陰柔之物故噬嗑剝言膚皆陰爻沈守約曰三陽健進而四處兌始以塞其路位既不當懼侵而傷居之不安臀無膚也一陰在上四以同體居陰趨下無志于決迫于衆陽進非得已其行次且也不與衆陽同志宜有悔矣惟强勉而前以輔于五乃免于悔牽羊悔亡也蓋居兌之下兌為毁折變而為坎坎為血卦臀無膚𧰼卦變為需險在前兌體本弱險又在前行次且𧰼兌羊而險阻之牽羊𧰼坎為耳而兌塞之聰不明𧰼項平甫曰九四一爻却與大壯不同大壯之四震體尚進進則成夬故曰壯于大輿之輹夬之四兌體悅陰而迫于三陽不能自決進退之間故曰臀無膚其行次且張舜元曰本爻變為坎兌為口坎為耳變故聞言終不成坎故不信趙復齊曰夬之四說上六而不決姤之三望初六而不去同體故也趙汴水曰言如揚庭孚號係于兌體遲疑不斷雖聞羣剛之告戒而不之信吳草廬曰羊羣行九四兌之下畫羊之在後者九五兌之中畫羊之在前者九五陽長之主如羊羣之在前四在五後牽聨而進以決柔則悔亡此勉其進也來矣鮮曰凡易中言臀者皆坎也坎為溝瀆臀之象乾為言乃前若自邑之言變坎為耳痛故云聞言不信九五莧陸夬夬中行無咎象傳中行無咎中未光也王輔嗣曰草之柔脆決之至易本義莧陸今馬齒莧感陰氣之多者九五為決之主而切近上六之陰如莧陸然若決而決之而又不為過暴合于中行則無咎矣朱漢上曰震為蕃鮮兌為澤莧蕢澤草也葉柔根小陸商陸亦澤草也葉柔根堅鄭東谷曰莧陸本草云一名商陸其根至蔓雖盡取之而旁根復生小人之類難絶如之王童溪曰九五決柔之主既以陽德居陽位又藉衆陽之助往決一柔宜若易然故有莧陸夬夬之𧰼健而說決而和者決之善也故必中行而後無過咎若有剛過之失而無說和之善則雖勝一小人揆之中道未為光大九五剛而中者謂五陽之勢强盛故戒其或過九三以陽居陽而處乾健之極九五以陽居陽而藉衆陽之助故曰夬夬丘行可曰凡陽之決陰逺則不能相及唯比與應當之胡雲峯曰初陽位在下不能決三五陽位當決者也故皆曰夬夬五當可決之位勢易于三三唯夬夬即可以無咎五之夬夬或失之過暴則猶為有咎也夬三月卦莧始生之時姤五月卦瓜始生之時故以取𧰼熊梅邊曰莧陸馬鄭王皆作一物近有音莧為完者太鑿按夬彖曰有厲告自邑不利即戎彖傳曰決而和其危乃光聖人去小人不尚剛壯如此九三以陽居陽既戒其壯頄而以遇雨若濡為無咎九五居中得正無壯頄之凶然以剛長之極互體重乾決陰于近視如摧枯故特明其中行無咎亦慮其過剛而以中和之道劑其剛强之過未光即其危乃光之光正以剛之極夬之易恐失有厲其危之警且以五陽決一陰即如莧陸之易亦未足為功故曰未光也諸儒以應比之故重為三五咎詳玩兩言夬夬乃本爻純陽之象非戒辭所為咎者正慮剛過為咎似無應比為纍之象俞石澗云宋成曰詳注驗經誤增中字上六無號終有凶象傳無號之凶終不可長也本義小人居窮極之時黨類已盡無所號呼終必有凶沈守約曰兌為口而處于極號之𧰼變而為乾陰消亡也郭白雲曰上六當五剛進決之時不可苟免不可長者又言終凶之速也按夬卦六爻善者止於無咎未有言吉亨者聖人於窮極之陰不敢忽如此蓋物窮則變寇窮則挺故六爻皆以過剛為戒不以得勝為慶也君子得時得勢宜玩斯義巽下乾上中爻重乾邵子復次剝明治生于亂姤次夬明亂生于治乎陰始遇陽履霜之謹其在此乎本義剝盡為純乾四月之卦至姤一陰而為五月之卦馮厚齊曰古文姤作媾遇也亦婚媾也以女遇男為𧰼王洙易改今文姤女壯勿用取女彖傳姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉孔仲達曰一柔遇五剛一女遇五男為壯至甚故戒之曰勿取此女就卦以驗名義只是女遇于男博尋遇之深㫖乃至道該天地陸君陽曰姤之主在初六陰氣尚微安得女壯乎巽為長女為風為入微陰遇陽有長女之性風動而無所不入句氏微曰二五之剛在姤遇之時皆得中正之位則天下人倫之化大行蘇子瞻曰九二亡而後為遁始無臣也九五亡而後為剝始無君也剛者二也中正者五也姤之世上有君下有臣君子之欲有為無所不可故曰天下大行程傳天地不相遇則萬物不生君臣不相遇則政治不興張子非中爻不能備卦德故曰剛遇中正朱子陽來謂之復復是本來之物陰來謂之姤姤是偶然相遇一陰遇五陽是不正的如人盡夫也之事故曰女壯天地相遇天下大行正是好事節而不好之漸已生于微矣故當謹吕藍田曰一女而遇五男一臣而遇五君壯而不可貞不可取也李氏元量曰夬之一陰不為主者陰往而窮也故曰剛決柔姤之五陽不為主者陰來而信也故曰柔遇剛月建一陰月曰蕤賓則陰為主而陽已為之賓矣張紫巖曰姤雖陰長之卦而陰陽至理以遇合為貴特在所遇正不正之間在卦體則勿用取女而不可長在二五則剛遇中正天下大行聖人發其兩端俾知一治一亂本所遇之正不正也一陰在內象君心之陰已生小人得乘間而進一小人遇引類以至宜慎矣坤陰變乾為天地相遇朱漢上曰陽生于子轉而至午陽極陰生午離也故萬物相見相見也咸章也皆謂出于離也郭白雲曰觀一陽之復猶曰朋來無咎而姤以一陰之遇不待得朋陽至四五而後言壯姤至一陰方長即為壯者亦見君子小人之情狀不同也王童溪曰姤遇也若不期而會然陰長于內陽消于外陰為主而陽為客主日勝客日負理勢必然故曰不可與長吕東萊曰一陰何以壯一念初發善善惡惡莫不皆甚壯也項平甫曰一陰方長已言女壯猶坤之初六即言堅氷也小人方壯引以為配必至滅剛故四雖正應不可取初遇與取不同遇如君遇民臣遇主分未嘗廢取則一與之齊不可復制矣故六爻喜遇不喜應李隆山曰以一陰遇五陽女下于男即相比附有不正之象故曰勿用取女一陰之生是為五月在辰為午南離之光所照耀品物咸章郝京山曰巽入而乾不覺方喜其遇故戒之按天地以下四語孔子見陰陽之原不可無但以中正之剛為主則陰適足為輔耳以補彖辭外意亦即照九五爻意合文周以盡姤義也初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象傳繫于金柅柔道牽也荀慈明曰絲繫于柅猶女繫于男故諭以初宜繫二也順二則吉往四則凶虞仲翔曰柅謂二也巽為繩乾為金巽木入金柅之象陰道柔牽于二也宋仲子曰巽為股又為進退股而進退則蹢躅矣初應于四為二所據不得從應故不安體巽為風動搖之𧰼本義一陰始生靜貞則吉往進則凶故以二義戒小人使不害于君子則有吉而無凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云沈守約曰巽伏也其究為躁卦始雖伏而終必躁也項平甫曰柅絡絲之跗絡絲柱以木為之跗令不動以金為之愈堅重矣趙復齊曰初六遇九二陰陽之情相得有所繫而止故吉反此則凶陰不可長趙汴水曰羸豕位雖在下而上孚于四恃有必壯之勢蹢躅不定猶之小人初進其志未嘗不思跳梁小人柔邪侫媚其牽聫而不絶猶之絲也絲繫于柅則不得縱亂柔道牽釋𧰼甚明徐進齊曰金柅謂二牽繫也柔方進而遇二則牽于二而止豕陰躁之物初𧰼胡雙湖曰初六不正故戒以正則吉金二剛𧰼與蒙金夫同柅巽木象豕初陰象周公但于初陰取不必卦內有坎也胡雲峰曰巽為繩繫𧰼一陰之柔能自繫于五陽之下而不進是謂靜正之吉動而進則見凶使小人自擇焉一陰甚微故于豕為羸壯可畏也羸不可忽也唐凝菴曰陰雖向長然猶幸陰性善牽故一見二之陽遂從而牽之巽為進退故有繫有往易外羸豕可繫而不可孚孚者繫之反豕蹢躅于乾之孚不蹢躅于乾之繫也按此一卦主爻自當主陰而言九二以上乃有制陰之責者金柅傳義從馬氏說作止車器玩象傳牽字當從絡絲跗為得孚字以趙汴水說為當惟與四孚應故有蹢躅之勢攸往之凶在此其貞吉陰之貞陽之吉也往見凶陰之往陽之凶也見者將來之謂也九二包有魚無咎不利賓象傳包有魚義不及賓也孔仲達曰初以陰處下故稱魚陸君陽曰包而有之使其邪不及于外蘇子瞻曰姤者主求民之時非民求主之時故近而先者得之逺而後者不得也不論其應與否程傳在他卦則初正應于四在姤則以遇為重包苴之有魚于遇為無咎包苴之魚豈能及賓謂不可更及外人也本義二與初遇制之在已猶可無咎若不制而使遇于衆則其害廣矣沈守約曰以才則剛以位則中于陰則至近可以包有小人而制之巽伏也變而為艮止也畜而止之包有之象朱漢上曰初六之民為二所有九四所不能包者逺于民也一民不可有二君亦義之所不及也鄭東谷曰賓非獨言四二為初主非主皆賓也楊誠齊曰魚者衆漁之所利衆漁求魚一漁先得者遇之之蚤也易山齊曰包者以陽而包陰故三爻皆言包趙汴水曰爻言不利非謂二欲害四也止由義不得兼故以不及釋之雷西仲曰魚之為物制得其道則可得而有之民象史記曰平易近民民必歸之近民者親近而愛養之之謂胡雙湖曰周公取象何常之有初爻象豕二又象魚五又象瓜剝五稱貫魚則一魚為一陰可見俞石澗曰止初六之進全在九二二不能止則長而為遁不至于剝不已也蘇紫溪曰包有魚重一包字不視小人為異類而直以兼容之量包之既不邇之使近亦不激之使無所容九三臀無膚其行次且厲無大咎象傳其行次且行未牽也孔仲達曰陽之所據者陰也九三處下體之上以乘于二無陰可據居不獲安上又無應同于夬卦九四之失據故曰臀無膚其行次且程傳處既不安則當去之而居姤之時志求乎遇一陰在下是所欲也其行次且不能遽舍也然三剛正處巽知其不正而懷危懼則可無大咎非義求遇固已有咎知危而止則不至于大也本義過剛不中下不遇於初上無應於上故其象占如此然既無所遇則無陰邪之傷故雖危厲而無大咎張紫巖曰巽進退不果為次且王童溪曰一陰在下衆陽皆所欲遇以三剛正不免于此者蓋巽其究也躁而三者巽之究故也凡人不能以道制欲者皆躁之為也故以厲責之李隆山曰易之六爻唯九三自乾以下多厲無咎之辭豈非重剛不中須知戒懼然後危而復安乎項平甫曰益六二即損六五姤九三即夬九四以反對觀之一也無大咎者三與初非比非應本不相及也易山齊曰夬以上為決而四阻于五姤以初為遇而三阻于二故臀無膚其行次且趙復齊曰九二為初所牽三尚間一爻至遁始牽而不可去李蒙齊曰居則臀在下故困初六言臀行則臀在中故夬姤三四言臀龔泉峯曰未為初所牽雖行次且而不進亦無大咎胡雙湖曰夬九四當上卦之下姤九三當下卦之上取臀𧰼夬不取三姤不取四者以其乾體故也爻位皆剛故無膚按臀象見夬四此同以三變成坎也九四包無魚起凶象傳無魚之凶遠民也程傳四與初為正應而初已遇二矣失其所遇猶包之無魚以不中正而失其民為上而下離必有凶變起者將生之謂民心既離難將作矣逺民者己逺之也上使之離也張紫巖曰四近君必下遇于民而後能上遇于君民有逺志位其虛矣郭白雲曰失道者寡助寡助之至親戚畔之凶之起自無魚始矣他卦正應有間多為終吉獨姤之時以遇為急故也按彖辭勿用取女初爻有攸往見凶則四之包無魚宜為四幸而曰起凶何也孔子慮後世不得其謂故以逺民釋之噫易道之不可為典要唯變所適乃如是夫蓋初四正應所謂天地相遇在此一爻故于初之陰不為女象而為民象四入乾體為天初陰為地本當相遇今初包于二是天地不相遇而舉天之下無民之應凶自此起且彖傳曰剛遇中正天下大行今四以不中正而不遇非凶兆乎觀象傳直曰無魚之凶可見凶在無魚非有他也而後之說易者猶泥于女壯之意而以起為妄動則凶且或慿空添入爭奪之意不若程傳之得㫖也九五以杞包瓜含章有隕自天象傳九五含章中正也有隕自天志不舍命也于令升曰初二體巽為草木蘇子瞻曰金柅包杞皆九二也豕魚瓜皆初六也陰長而消陽天之命也有以勝之人之志也君子不以命廢志張子杞之為物根固于下瓜之為實潰必自內游廣平曰以九二之剛中包初六之柔脆用賢得民之象郭白雲曰瓜綿綿相繼之實民𧰼也髙其木大其蔭綿綿之屬託其木而有生焉其為包也大矣含章九五之德也朱漢上曰二巽木也杞似樗葉大而蔭九五當陰長之時含章不耀中正自處是以能用九二以盡其才李隆山曰杞性堅而夀瓜柔而不正附麗而生易以滋蔓小人之性初六之才也王秋山曰剛健居尊衆陽為輔一陰之微去之易易而乃以中正之道含藏其剛健之美但包而容之如瓜在杞木覆蔭包容之中略無去之之意者蓋以姤亦自乾而來則一陰猶自天而降崇陽而抑陰固聖人之志有陽必有陰亦天道之常志不舍命者聖人雖有抑陰之志亦不違天道之常也何𤣥子曰制陰于方長亦難矣乃不以決而以包其包也又不自而以人天下見以為恭已無為而孰知其制之神歟故曰含章蓋以姤自乾來亦倚伏循環之理善制之使不為害斯可矣彖傳所謂剛遇中正天下大行正此爻也乾為離健而明故其神于用如此以陰陽之流行觀之復為天根陽含陰也姤為月窟陰含陽也不有天根孰為之顯不有月窟孰為之藏如陽不遇陰陰不遇陽即天地亦無以成咸章之化况于世道錢啓新曰初在下二已能包九五中正合下三陽撰為重乾以包一柔髙為之覆蔭而大為之容茹以杞包瓜象一柔在初遂成天地品物之章含章象華霞峰曰陽剛中正主卦于上天下大行之時乾姤只爭些子自乾之姤其幾甚微非陽剛中正之主不能識其幾未免有鋪張揚厲之意所以象曰九五含章中正也才自滿足飛龍之利見便化為羸豕之蹢躅矣天行一剝即復一夬即姤自夬上反為姤初初之一陰原從天降含章者志有隕者命九五之志即無以回天而易命終不付之天命之自然而舍之故曰志不舍命以杞包瓜瓜包于杞雨露所不潤其有蔓延而成實者鮮矣人主以陽剛中正主于上而小人自潛移默奪于其下其象如是孫夏峯曰瓜之為物得所附而後止種瓜杞下自能收拾散蔓君道廣覆自能斷絶民奸含章中正是志與天命相周旋也上九姤其角吝無咎象傳妬其角上窮吝也虞仲翔曰乾為首位在首上故稱角本義角剛乎上者上九以剛居上而無位不得其遇故其象占與九三類趙汴水曰初之陰惟上與之無涉今言姤直舉卦名以明其時耳無涉于初得免陰剝之患故止于吝無可咎者爻以致吝止以五陽至上而窮非有他也按周公於此四五兩爻自發陰陽不可偏無之意非復女壯之辭也孔子玩辭故於彖傳先發天地相遇品物咸章以為姤之時義而說易者猶泥于勿用取女之辭以釋上三爻之義宜其格矣坤下兌上中爻艮巽萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃下亨字陸氏云諸本皆無唯王肅本有程朱云衍文項氏云彖傳初不及此字可見彖傳萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣王輔嗣曰方以類聚物以羣分情同乃聚氣合乃羣孔仲達曰招民聚物物聚而歸假至也王至大聚之時孝德乃洽順說而以剛為主主剛而履中以應故得聚也聚而無主不散則亂唯大德之人能宏正道乃得常通而利貞大人為主聚道乃全以此而用大牲神明降福人聚神祐何往不利陸君陽曰氣聚而生氣散而死魂氣游散無所依歸故聖人于萃聚之時立宗廟以致孝享劉長民曰人聚于貨食人君聚而能散謂之仁天道惡盈聚而能散斯順天命蘇子瞻曰易言薦與禴享非正言也皆有寄焉用大牲猶曰用大利祿云天命我為物主非以厚我也故利有攸往順天命也不期而聚者必至之情程明道曰萃渙皆立廟因其精神之萃而形于此為其渙散立廟以收之程傳王者聚天下之道至于有廟極也天子萃合人心之道非一其至大莫過于宗廟萃不以正則人聚為苟合財聚為悖入用大牲吉以祭享而言上交鬼神下接民物百用莫不皆然當萃之時交物以厚天下莫不同其富樂萃而後用動而有裕天理然也天地之化育萬物之生成凡有者皆聚也有無動靜終始之理聚散而已故觀其所以聚則天地萬物之情可見矣張紫巖曰順以說得民也剛中而應得賢也坤在內為得民巽木在上為有廟巽為天命坤下為順天命朱漢上曰艮為門闕巽為髙上為宗廟坤為牛兌為刑殺郭白雲曰道不順情不說則無萃聚之道剛中而應九五萃之主也順以說為物聚之理剛中而應為能聚之道用大牲吉利有攸往者時也時則所謂天命當可為而為所以順天命天地萬物之情不過順說是以彖傳言可見也王童溪曰觀坤兌之順說而知上下之萃觀二五之相應而知君臣之萃觀致孝以享廟而知人神之萃觀天命之不可不順而又知天人之萃趙復齊曰陽聚于上陰聚于下君臣聚于上民聚于下否分而情隔觀尊而不親非所以聚也順理而說剛中應物故德聚不散上有二陽利見者九五李西溪曰宗廟者人心所係武王伐商載車以行係人心也趙汴水曰聚必有主天下主王者以聚其生王者主宗廟以聚其民君子將營宫室宗廟為先有廟者萃人心之本比唯一陽其統一萃有二陽其權分九四近在君側當三陽之塗宜率三陰以萃于五斯為得正雷西仲曰得萬國之歡心四海之內各以其職來祭然後可以謂之有廟而致孝享此謂天子之孝利有攸往者冉有所謂既庶矣既富矣又何加焉胡雙湖曰自五以下皆艮𧰼止蓄而有萃義又艮土坤土土萃而益多亦有萃𧰼熊南沙曰兌為巫宫室中有巫廟𧰼錢啓新曰澤衆水所聚說衆動所聚正秋揫斂地氣所聚按王假有廟玩彖辭義有字最重觀渙大象先王以享于帝立廟可見有廟者立廟之謂假字訓至為是初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象傳乃亂乃萃其志亂也趙復齊曰比一陽居五得聚而專萃則益之以九四豫一陽居四位近而逼萃則益之以九五有孚不終私疑四也乃亂乃萃昧卦義也勿恤所疑釋也往無咎從應宜也柔故有疑順故疑釋鄭東谷曰五君位四大臣之位四五以陽剛同德聚于上所以為萃初之陰必萃于陽然萃四則亂乃萃也四五雖同德而下之所歸當歸于五君不可分其所聚也初雖信于四而信必不終以其亂乃萃也號者攄所欲言握者合而為一若能號四與之為一樂附于五而不恤其他則往而無咎朱漢上曰巽為進退兌為口巽為號艮為手握手也兌為口為說笑也沈守約曰變為震動也震來虩虩後笑言啞啞若號為笑之𧰼趙汴水曰不終始孚而終疑也號呼而與之語也俞石澗曰四五同體初往從四亦可因四以萃于五何𤣥子曰大𧰼肖坎為有孚惑于二陽不能堅決故不終坤為迷亂象四五同德又為兌體四說于五乃萃人心以效之五者勿以失身從四為憂也坤為震順以動故往無咎錢啓新曰初四以順相號以說相應則握手之間一笑契合勿用憂恤孚必有終錢爾卓曰萃與比同比初無應曰有孚者一于五也萃初與四應有孚不終者不終于四也按此卦二陽在上有二君之嫌故彖辭利見大人特指九五明下三爻皆當萃于五乃為聚以正也然在九四與五同德非如豫四有震主之威又為說體君臣相說無二無猜又為互艮之主介然自守無違道結下之私特自下觀上勢若可疑初之所以惑于萃也六二引吉無咎孚乃利用禴象傳引吉無咎中未變也虞仲翔曰應巽為繩艮為手故引吉得正應五故無咎程傳五有中正之德二以中正之道往與之萃君臣和合也禴祭之簡薄者不尚備物以誠意交於神明也孚乃者謂有其孚則可不用文飾専以至誠交於上也趙復齊曰萃升之二皆曰孚乃利用禴孚者二五交也馮厚齊曰下卦中爻多引其類如泰與小畜之類是也本爻與五為正應引初六六三以萃于五為得君臣之大義何𤣥子曰爻變坎故𧰼孚又𧰼禴禴古作礿其享以樂為主坎為律坎又為耳主聽故取作樂象二引初三之同類以聚于五剛中而應上下交孚四海之內各以其職來助祭順莫大焉是乃利用禴也按引吉即彚征之意三陰皆當萃于五以利見大人為正乃以上有二陽初與四應三與四比各有誤于所萃之患二以中正為順之主與五相應故能引類而萃五蓋唯其得中不以上有二陽變惑其事君之志而能使初三之不中不正者皆獲所萃聚以正之功二居多焉彖之用大牲者上之接下當厚其祿二之利用禴者下之報上惟竭其誠以實不以文也取感通之意故以祭祀言中未變者見初之亂三之嗟唯其不中也引者孚者唯其中也六三萃如嗟如無攸利往無咎小吝象傳往無咎上巽也趙復齊曰萃如嗟如疑四也無攸利失時也豫九四動而險故三盱豫悔萃九四說而巽故三往無咎萃之九四非彊臣九五非弱君鄭東谷曰下二陰皆萃于陽三獨無附故咨嗟怨歎而無攸利然當萃之時下求萃于上上亦求萃于下三不以無應之故能往歸于上亦可無咎與上本非相得小吝上巽而受之無咎也上非上六謂在上之陽也李蒙齊曰自三至五為巽三所以往而無咎者以上之九四九五巽而可入也吳草廬曰三雖無應而比近九四之陽苟能往而上求九四則可無咎以一陰入二陽之下成巽體故曰上巽也俞石澗曰應在上六上方涕洟無攸利矣三與四比亦可因四以萃五第無正應而近比于四所聚非正有此小疵四五居已之上同為互體之巽故曰上巽孔子于此明以互體示人或以上為上六誤矣上六非巽體也何𤣥子曰無應比四五為萃主于心不安故自嗟歎兌為口嗟象九四大吉無咎象傳大吉無咎位不當也房𤣥齡曰大吉謂匪躬盡瘁始終無玷可免專民之咎程傳上比九五下比羣陰得上下之萃然以陽居陰非正也必得大吉然後無咎項平甫曰無尊位而得衆心故必大吉而後可無咎沈守約曰當承尊之地而以剛處之居說之首而下據其衆非至公奉上之大吉則違道說民專權附衆咎之大也卦變為比大吉無咎之象趙汴水曰九而居四于豫為大有得者柔君倚之也萃則剛明在上嫌于分民故戒之必如大有九四匪其彭乃可知戒懼則為伊周不然霍子孟以之族王秋山曰得君專而不僭得人衆而不私則大吉胡雲峯曰五曰萃有位以見四之萃非有位也九五萃有位無咎匪孚元永貞悔亡象傳萃有位志未光也趙復齊曰諸卦九五不言有位而此言之嫌也别九四也二陽均五有位故萃道歸五異于豫之貞疾恆不死矣匪孚以二陽也元永貞德優于四與比辭同則悔亡矣丘行可曰元永貞之德比萃二卦有之然在比則吉在萃止悔亡者比以一陽統五陰一則專萃以二陽萃四陰二則分分則不得以専萃此匪孚不如顯比也沈守約曰以中正當位居尊是以無咎衆附于四匪孚也體長人之德長守其正則民終歸之王秋山曰無長人之德則聚而不親無可久之道則聚而必離無貞正之守則聚而不固聚道惟此三者五有其位而猶有未孚是萃天下之志未光大也俞石澗曰五之所孚唯六二耳初則四之應三則四之比皆匪孚于我者也豈能無悔悔亡由于元永貞比唯一陽天下皆知比于五故元永貞言于彖萃有二陽恐天下莫知所萃故元永貞言于五按九五陽剛中正不可謂有位無德其匪孚其未光以九四也上六齎咨涕洟無咎象傳齎咨涕洟未安上也王輔嗣曰居于上極五非所乘內無應援處上獨立逺近無助危莫甚焉若憂懼之甚衆所不害故得無咎趙復齊曰乘剛危衆萃己孤能懼故無咎項平甫曰齎咨兌口之聲涕洟兌澤之流趙汴水曰六性柔暗不能固窮既失所萃聲容如此然得免于聚不以正之咎上卦外之位非上下之上欲萃不能故未安于位龔泉峯曰萃與比相似但比一萃二比専萃分萃者比之始比者其萃之終歟來矣鮮曰萃六爻皆無咎者水潤澤其地萬物羣聚而生乃天地為物不二生物不測之理所以六爻皆無咎按此爻與比上相似皆卦外窮無所歸又上畫偶開水澤潰決故有此象然比上凶而本爻得無咎者彼居險極此處說極爻德不同也且于此可得比與萃成卦不同之故焉比一陽統五陰特嚴君臣之分有率土皆臣之義豈容一人得外王化故無首而凶萃二陽萃四陰專明羣類之聚雲龍風虎從類翕集而名分未定有擇臣擇君之𧰼即或上下無交未妨獨來獨往故雖不得所萃而無咎關壯繆之事曹魏有孚不終也蕭丞相之薦韓信引吉也吳漢之初事朱鮪萃如嗟如也皆臣擇君之象彖辭之有廟利見利往其聖人受命初開國之時乎孔子于九五而謂之未光亦謂光大之治尚有所待乎六爻之情與比似同而實異者以此巽下坤上中爻兌震升元亨用見大人勿恤南征吉彖傳柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也鄭康成曰木生地中日長于上故謂之升代仲顔曰尊爻無大人故曰用見蘇子瞻曰巽之為物非能破堅達强者幸而遇坤故能升程傳南征前進也張紫巖曰巽而順可升之德剛中而應可升之資二以剛中應五剛德盛于內是以其亨大曰元亨木在地中其本既盛二陽之氣並進上達莫之禦矣自巽而離自離而坤柔道正位于離而成物于坤曰時升巽不果勿恤宜戒至離萬物皆相見南征之吉互兌為有慶郭白雲曰天地萬物皆有升在人則位之升德之升皆升也升位則行道升德則進道是以元亨升位而見大人故無附麗小人之失升德而見大人則日入于君子之途王童溪曰柔不可無剛故剛中而應升以元亨林黃中曰巽東南坤西南自巽升坤必涉乎離離南方也自南而征斯為善矣沈守約曰升明萃之效也聚以正是以升也巽在下木道方生坤在上地道上行地以生物為德五居坤體而應二地以順道容而生之也木之升由于陽道之升由大人是以利見也南明方陽也向陽利進是以志行項平甫曰萃剛中在上其勢必聚升剛中在下其勢必升故萃以五為大人升以二為大人徐進齊曰大人二也五當應二也用見九二剛中之臣以升于德升晉二卦皆以柔為主剛則有躁進之意李隆山曰元亨與蠱鼎大有同皆九居二六居五蓋主陽剛有應于上而言也趙汴水曰初六巽之主柔指初也六五升柔之主二以剛中上應故大亨王秋山曰物之升也自下而上木之升也由柔而剛胡雲峯曰剛而在上者常也柔升于上時也晉與升皆取進義晉則明己出于地上方進而未已故不假言亨升則木方生于地下他日可必其進而未已故言元亨胡雙湖曰自二以上皆震𧰼上行又巽木之上有震木陰木得陽木升而益髙易以陽為大巽順不足以大亨必剛中而應是以大亨俞石澗曰時指巽而言巽東南之卦于時為夏地氣至此而升騰也來矣鮮曰不曰利見而曰用見者九二雖大人乃臣位六五之君欲用九二則見之何𤣥子曰巽為木一陰在下象木之根二陽在上象木之幹初六允升大吉象傳允升大吉上合志也王輔嗣曰巽卦三爻皆應升上初與九二九三合志俱升是以大吉程傳初巽之主上承九二之剛巽之至也二以剛中上應于君當升之任者允信從也初柔無應不能自升信從于剛中之賢以進合志同升也上謂九二吕藍田曰雖處至下上與三陰同升衆之所允無所不利本義當升之時巽于二陽則信能升而大吉矣沈守約曰變而為乾健而上行卦變為泰君子彚征大吉象王童溪曰升以柔升也然居升始非有剛援亦未易升唯承九二剛明之賢二亦以同體而與之合志以同升故曰允升郭白雲曰所謂用見大人勿恤者也鄭合沙曰初附二陽而升三陰又與之一體鄭東谷曰上合志凡在上者其志無不合也楊誠齊曰初六柔而旁散在一卦之下木之根也二剛在初上木之幹也木與土相信而相得其升必鋭王元龜曰柔以剛而孚允升象柔得剛而大大吉象趙復齊曰與上三陰合志王秋山曰初柔巽承于二得陽則愈升胡雙湖曰初六一爻為成卦之主升之所以名也以兩體觀之巽在坤下如未出地之木初其根二三其幹方其勾未萌甲未折而根株已備勢必破地而出上升莫禦長養于夏凌霜于秋傲雪于冬而不改柯易葉者皆由于此巽為夏兌為秋坤為冬震位其間春氣無乎不貫聖人設卦觀象而命之名與夫爻辭之所由作豈苟然哉何𤣥子曰木得地氣以滋其升也允矣所以為升者巽也所以為巽者初也為梁為棟由此始基按上合志之上或為二陽或為三陰或為九二皆可通然皆偏辭也東谷說最精蓋巽體同升一也陰必資陽二也剛中而應三也地道敏樹坤陰翕受四也合而為允升大吉九二孚乃利用禴無咎象傳九二之孚有喜也陸君陽曰以陽處陰以剛處柔以此而升恭以應也升與萃反對萃之六二以盡誠于五升之九二以推誠于五故皆利用禴朱子人積其誠以事鬼神有升而上通之義張紫巖曰事君猶事神事天舍誠不能有格也五順二巽中道默通曰孚志得道行君子之喜互兌為有喜沈守約曰利用禴德升聞也上享其誠神嘉其德方且有喜何咎馮縉雲曰二中也五亦中也中誠相感故二為有喜五為大得志項平甫曰禴夏祭即南征之義升與萃相反而孚乃利用禴皆在下卦中爻者蓋禴所以享上也六二求萃于上九二求升于上故其義皆同孚者五用情于二禴者二用情于五也胡雙湖曰萃六二以中虛為孚升九二以中實為孚虛實不同孚則一而已俞石澗曰與萃二小異者萃二所應九五之剛既引而吉孚可知矣故先言無咎後言孚升二所應六五之柔安知其孚與否故先言孚後言無咎不孚而用禴不惟不利且有咎矣何𤣥子曰變艮為謙互兌變坎又大𧰼肖坎故二有孚互兌為祭祀故二四皆取祭享象五居君位而才弱二居臣位而質剛疑剛柔未能相合唯孚誠在中于以用禴雖鬼神猶格何况人主所謂南征吉此也九三升虗邑象傳升虗邑無所疑也蘇子瞻曰以陽用陽其升也果矣故曰升虗邑無所疑也不言吉者其為禍福未可知也存乎其個而已程傳以陽剛之才正而且巽上皆順之復有援應以是而升如入無人之邑張子上皆陰柔往無所疑本義陽實陰虗而坤有國邑之象九三以陽剛當升時而進臨于坤故其𧰼占如此沈克齊曰以陽實進臨坤陰之虗由此南征坤土平曠了無阻礙易外三震主自震至坤為升坤為衆震為侯有震之侯斯有坤之衆此南征之吉所致也六四王用亨于岐山吉無咎亨馬云祭也朱子云亨即享字古文無享字亨享烹通用象傳王用亨于岐山順事也程傳四近君之位而當升時吉無咎者有順德也以柔居坤順之至也文王之亨于岐山亦順時而已朱子以順而升登祭于山之象趙復齊曰二四不言升嫌五也二以誠通四以順事易山齊曰陰柔得位而在順體之下有順而升之理然至此不可復升故爻不言升徐進齊曰岐山在禹貢雍州境南坤西南象熊梅邊曰互兌故言岐山來矣鮮曰王指六五觀彖以柔正居上體之初升之最順而善者王者用之以亨于岐山乃為順事鬼神之道不曰西山者卦有南征之義不欲錯其文也朱髙安曰六四上順君下順民順之至也使之主祭而百神享也順理而事君孚神格此六四之以時升升以順也按亨于岐山假象也文王三分天下有其二以服事殷率太顛閎夭以事紂極順之事也故以升中於天者象之六五貞吉升階象傳貞吉升階大得志也虞仲翔曰巽為髙坤為土震升髙升階象張子柔中極尊不拒來者使物皆由已而升正而且吉志宜大獲也易所謂得志聖賢得其願欲張紫巖曰坤以柔升五坤中順德格于上下剛賢應之德進不已用得志于四海坤土為階自下而上曰升王童溪曰彖傳柔以時升蓋謂五也程沙隨曰下應剛德之臣自二升五如階有級此人君升進賢臣之象趙復齊曰柔升至五貞乃吉能守中也人由我升我為之階進賢君道也李蒙齊曰六五謙虗接下羣賢並升君德日進吳草廬曰坤三耦如地勢之自下而髙故𧰼階何𤣥子曰大指九二剛爻言二得五之應大遂其欲升之志彖傳所謂剛中而應有慶志行者也按易中二五貞吉大都以中則無不正也此爻乃坤之六五備中順之德為正位居體之美觀象傳辭無不足不必以貞吉為戒辭上六冥升利于不息之貞象傳冥升在上消不富也王酸棗曰升而不已至于不可升之處猶自升之是冥升者乎若不能止必致于困既困物必消散無以保其所有之富盛矣程傳以小人貪求無已之心移于進德則何善如之朱漢上曰坤為冥晦陰虛為不富升極當降長極當消沈守約曰坤而為艮地而為山陰長上極卦變為蠱風落山隕其實消不富象吕東萊曰昏冥嗜進固有消而無富若用之于正至誠無息則所過者化如物之在爐盡皆消釋無所係纍亦所謂消不富也趙復齊曰不息之貞終而復始無止也髙忠憲曰冥者不識不知而升正不息之貞也伎倆不存渣滓盡去日進于不可知之神其消不富之謂歟觀彖當晉極者唯自治其私當升極者唯固守其正自治守正則髙而不危滿而不覆保終之道莫過于此周易孔義集說卷十二
