body:
  text: 周易孔義集説卷七光祿寺卿沈起元撰上經震下乾上中爻艮巽程傳既復于道則合正理而無妄故復之後受之以無妄為卦乾上震下震動也動以天為無妄動以人欲則妄矣無妄元亨利貞其匪正有眚不利有攸往彖傳無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉程傳無妄者至誠也至誠者天之道也無妄有大亨之理法無妄之道利在貞正失貞正則妄也雖無邪心苟不合正理則妄也乃邪心也故有匪正則為過眚坤初爻變而為震剛自外而來也震以初爻為主成卦由之故初為無妄之主動以天為無妄九居初正也下動上健剛健無妄之體也五以剛居中正下復以中正相應是順理而不妄也天命謂天道也本義無妄實理自然之謂語録如賢者過之其心豈曽有邪却不合正理佛氏亦豈有邪心者朱漢上曰剛自外來安能必其為主于內動而健安能使剛中而必應以正而至于大亨乎非天命不能也天命即天理非人為也趙復齋曰剛自外來寄象爾其實天之所賦我固有也鄭亨仲曰陽復妄消之時惟利正者其匪正者皆不利也郭兼山曰天下雷行其動以時故春分而出萬物隨之而出秋分而入萬物從之而入莫之令而常自然故曰乾道變化各正性命其或感之有正有不正養之或得或失所以為夭壽為災眚是為匪正有眚之理王童溪曰初九之剛乾索于坤而為震而無妄之外體又乾也則初九之剛實自乾來故曰剛自外來在無妄則內體也故曰為主于內初九九五六二正也正則能大亨六三上九不正也不正則妄矣故有眚災以正而往何往不利故初九往吉六二利有攸往苟匪正則無妄之世何所往而利哉趙汴水曰動與天合理宜大亨然乾猶曰利貞况震之動吉凶悔吝由是而生安得不利于正乎此卦以匪正反覆致戒于以知聖人作易取義胡雙湖曰艮止在前不利往象王秋山曰無妄之往乃言無妄之時而為此匪正之往往將何之初九無妄往吉象傳無妄之往得志也程傳九以陽剛為主于內中誠不妄者也無妄而往無不得志以之修身則身正以之治事則事得其理以之臨人則人感而化李隆山曰無應而謂之往吉者兩剛相遇不牽于繫應之私是之謂無妄此初所以吉四所以無咎若二五相應三上相應而三災五疾上眚有應之不若無應可見趙汴水曰諸卦爻所舉卦名有取名之義者有紀卦之時者此卦特紀其時故曰吉曰災曰疾曰眚皆繫名以紀時如曰無妄誠也誠則有吉而已安得有他何玄子曰此爻足蔽全卦震陽初動誠一未分是謂無妄動與天合何不吉之有按此爻能盡無妄之道故直以卦名豫之而不繫他辭餘爻所謂無妄則紀卦時耳往者震也六二不耕穫不災畬則利有攸往象傳不耕穫未富也虞仲翔曰震為耒耜為禾稼互艮為手耒耜在手耕象禾稼在手穫象胡雙湖曰二為田災畬象不耕穫不災畬艮止義利往震動義豐復初曰未猶非也富謂利也不于力耕之初遽有望穫之心乃仁人不計功謀利而天德全矣來矣鮮曰柔順中正當無妄之時無私意期望之心不方耕而即望其穫不方災而即望成畬必如此則利有攸往也未富謂未有富之心何玄子曰未耕望穫未災望畬始耕望穫既災望畬意欲日廣謂非妄歟六二中正應五本自利往然無妄卦中獨不取應慮其有所係纍也故告之不耕穫不災畬正誼不謀利明道不計功也六三無妄之災或繫之牛行人之得邑人之災象傳行人得牛邑人災也虞仲翔曰坤為牛艮為鼻為止巽為繩係牛鼻而止桑下或係之牛也乾為行人坤為邑人程傳三隂柔不中正妄也又志應于上欲也亦妄也郭白雲曰居震動之極應上九妄行窮災之爻是亦妄行之人也匪正有眚之道王童溪曰六三不正在無妄之時宜其有災胡雙湖曰牛離象繫艮止義隂本坤體有邑象按彖辭主全象爻辭主時位故往往彖全吉而爻多凶咎獨此卦動以天為無妄而彖有正匪正利不利之不同已該爻象言矣有眚不利皆因匪正則非無妄之自有眚災也雜卦無妄災也乃夫子别出一解不可泥蓋無妄為天命命即理理主陽故剛自外來為主動而健剛中而應三語皆主陽言隂爻則隂為人欲妄也位不中正妄也不得以卦名無妄而六爻皆無妄也此爻無妄之災正彖所謂匪正有眚也爻辭無妄紀其時耳三以不中正之隂動極而應上上為妄行有眚之人故以行人象之邑者內卦隂爻三之象也以艮止之牛應上在上為有得在三為失牛牛有順德隂亦順質隂動而從妄行有眚之陽失其順矣則災固三之妄動所致豈降自天之謂乎其不正而止于有災眚者則仍以無妄之時物與無妄舉世皆陽和發生之象萬物于暢茂之中或有夭折屈抑要非若嚴霜氷雪之侯有摧毁死滅之虞故不言凶九四可貞無咎象傳可貞無咎固有之也程傳以陽居乾體若復處剛則為過矣過則妄矣居四無尚剛之志也可貞與利貞不同可貞謂其所處可貞固守之利貞謂利于貞本義陽剛健體下無應與可固守而無咎張紫巖曰四以乾剛居互艮上艮止也剛止則妄息咎從何來胡雲峯曰利貞兼正而固之意可貞則專訓固字而無正字義王秋山曰無妄一卦動以天者初九安其天而不動者九四以乾體而應陽剛純乎天也體剛用柔不動于欲也此九四之可貞無咎俞石澗曰九四不正則不可動而往矣故貞靜而止則無咎何玄子曰初九行乎其所當行九四止乎其所當止九五無妄之疾勿藥有喜象傳無妄之藥不可試也虞仲翔曰五動成坎坎為心病巽為草木艮為藥石本義乾剛中正以居尊位而下應亦中正無妄之至也如是而有疾勿藥而自愈矣既己無妄而復藥之則反為妄而生疾矣試謂少嘗之也王秋山曰易例陽為天理隂為人欲故陽為隂所纍者皆曰疾如損之損其疾鼎之仇有疾兑之介疾是也今五下應二是二之隂為五之疾然二亦中正以天德言之為不純疾也以中正言之則至善疾而非疾也故勿藥有喜何玄子曰有應則恐不能無私故以為疾然二五中正應而無害于應如太虛雲影自去自來豈足病哉告子之悍然力制以為不動心釋氏之滅倫棄世以為不住相犯勿藥之戒也觀彖勿者戒辭也既無妄矣不可以禍福利害動其心若少有災患而即為解免則因以生妄且益災矣上九無妄行有眚無攸利象傳無妄之行窮之災也趙復齋曰事類亢龍者也趙汴水曰上九居健之極故不能止而有行何玄子曰上九與六三震足為應有行之義不中不正不能以理勝欲行必有眚無妄之行猶彖傳無妄之往總論項平甫曰無妄之時以誠滅妄以陽滅隂凡陽皆勝凡隂皆不利初九往吉陽之得志六二中正異于他隂猶戒以不耕穫不災畬則利有攸往一則字蓋疑之也六三隂不得位所應又窮災如之何九四陽雖不得位而質剛體健可以自守九五與隂相應故不免于疾可見隂之為纍上九當時位之窮無可行之理故曰窮之災也即亢龍之爻辭也李蒙齋曰動以天為無妄無應即天理之公動以人為有妄有應即人欲之私故六爻以無應為得乾下艮上中爻兑震大畜利貞不家食吉利涉大川彖傳大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也孔仲達曰乾健上進艮止在上能畜止剛健故曰大畜剛健謂乾篤實謂艮剛健篤實故能輝耀光榮日日增新其德若無剛健則劣弱必既厭而退無篤實必虛薄必既榮而隕何能輝光日新乎尚賢謂上九程傳艮在上而止乾于下藴畜至大之象在人為學術道德充積于內乃畜之大也人之藴畜宜得正道故云利貞若異端偏學所畜至多而不正者有矣既道德充積于內宜在上位享天祿施為于天下則不獨一身之吉天下之吉濟天下之艱險乃大畜之用故利涉大川各以卦之才德言諸爻則惟有止畜之意張子陽卦在上而上九又在其上故曰剛上而尚賢本義日新其德而畜之大九自五而上六五尊而尚之又能止健皆非大正不能六五下應乾為應乎天趙復齋曰無妄震下乾上動以天也受之以大畜乾下艮上全夫天而止也又曰尚賢尊上九也不家食吉養賢三陽類升也郭兼山曰健為天德止健畜天德也大有有賢之卦也大畜畜賢之卦也張紫巖曰大畜以畜德為貞乾剛止乎內畜德之大者畜德而後可畜賢羣陽在下為賢乾為天艮止之天下剛德之賢畢畜是為大畜王童溪曰所畜之大于己則畜德于人則畜賢趙汴水曰下不健則其動尼于止而遽息息則不能光上不止則氣勢振于健而動搖搖亦不能光今鎮止愈力而剛動愈健是以其光與日俱新上九之剛屹然在上大君尊崇而嘉尚之以其能止乾之健也胡雙湖曰大畜以艮止乾得名而自利貞以下則皆取乾上進行健之義畜極則通也胡雲峯曰卦有乾體者多曰利涉大川健故也俞石澗曰止健非故抑其進養之以待用也陽卦為大隂卦為小小畜以小畜大非正也大畜以大畜大則正也唯其大正而能止健故健者咸止于下由是踐履熟涵養深所畜者久無復有輕躁之失梁孟敬曰畜者止也聚也止則聚矣乾上進而艮能止之其力大又三陽至大艮能畜之所畜聚者至大亦大畜之義小畜之為小者巽隂卦故其力小何玄子曰何畜乎乾懼其過鋭而或躁過剛而或折過大而或簡故畜焉以裁之此聖人陶鑄天下之妙機艮為門闕家象中爻兑口食象上九畜極而通艮家變為坤國故有不食于家而食于國之象中爻震木在兑前舟行而前涉大川象按以二體言則剛健篤實為卦之材剛上尚賢止健主艮止之德而言也而以中爻互震乾陽既主上行震動則必進故有不家食涉大川之象兑澤為大川乾健震動以行之應天之六五以接之故利可見互卦並重初九有厲利己象傳有厲利己不犯災也王輔嗣曰四乃畜己未可犯也石徂徠曰乾雖剛健前礙山險必不能通程傳健體居下必上進者也六四在上畜止進則有危在他卦為正應相援大畜相應乃為相止上與三皆陽則為合志而無相止之義本義乾之三陽為艮所止故內外之卦各取其義趙復齋曰陽未盛進則危止則利陽體故欲進位下故能止沈守約曰乾而為巽健而巽則知止也俞石澗曰需初曰不犯難謂坎水之險此曰不犯災謂艮山之阻何玄子曰履乾之初行而未成正用潛時也按與小畜初同意九二與説輹象傳輿説輹中無尤也吕藍田曰説輻不駕而已車體猶完以剛居中自全不進蘇子瞻曰小畜之説輹不得已也故夫妻反目大畜其心願之故中無尤也程傳二為六五所畜止勢不可進又得中道度其勢之不可止而不行朱漢上曰初剛正二剛中四五柔柔能畜剛剛知其不可犯而安之時也夫氣雄三軍者或屈于賓贊之儀才蓋一世者或聼于委裘之命蘭惠卿曰小畜六四為主近畜九三以隂畜陽又非正應所以九三不受畜而夫妻反目大畜九二受六五所畜以君畜臣以上畜下二五皆中又其正應何尤之有項平甫曰諸卦多于乾言輿蓋車之全體唯乾足當之沈守約曰二有載上之才而守難進之義守中而安其分者乾而為離健而中虛輿也卦變為賁明而知止是以無尤觀彖小畜初二以理自止故皆吉大畜初二勢不得不止免於災尤而已按小畜九二牽復吉同以中不自失也九三良馬逐利艱貞日間輿衛利有攸往象傳利有攸往上合志也石徂徠曰當天衢之亨可以馳逐而往前有山險未可輕進故利艱貞本義三以陽居健極上以陽居畜極極而通之時也又皆陽爻故不相畜而俱進有良馬逐象然過剛鋭進故戒以艱貞間習郭兼山曰乾為馬三陽至此而並進張紫巖曰三有互震體艮山在前其動也艱與上同德往必合志項平甫曰此爻輿衛蓋總指三陽皆同載而上進者吳草廬曰三四五上肖離為日間習也當艱難之時未可輕進九三變成坤為輿初二其衛也言九三當與二陽同心協力無日不訓國人討軍實而為行計也來矣鮮曰艱者艱難其思慮恐失太易易貞者貞固其作為恐失于助長按上合志言與上九合志此爻所以利往異于小畜之三者在此蓋小畜之上雖陽爻而巽隂隂德方盛大畜之上為艮陽故乾與合志非夫子之傳不得其故矣六四童牛之牿元吉象傳六四元吉有喜也六五豶豕之牙吉象傳六五之吉有慶也陸敬輿曰四體柔性止畜養賢人三陽俱進順而無逆如童牛加牿順之至也故元吉賢人競進世道必治故有喜侯行果曰牿楅也以木為之橫施于角止其抵童牛無角之牛胡安定曰牙杙也石徂徠曰童牛私欲不行而順順而物不犯以其有牿也乾自下承之燮友也柔得位以乘乾柔克也趙復齋曰童牛之牿至順也以接三陽不亦善乎以六居五故曰豶豕之牙和順不拂上承上九下引三陽人君畜賢之道如此馮厚齋曰小畜之畜乾六四也九居五為之助者也大畜之畜乾六四六五也九居上為之助者也外無陽爻則坤順而不能畜內無隂爻則同類而不相畜然則成大畜之義者在上九而能畜陽者六四六五也沈守約曰牛順物居艮始變為離離為牛童牛象項平甫曰牙埤雅云以杙繫豕也喜慶皆隂陽相得之辭卦中唯二隂有應故四為有喜五為有慶喜者據已言之慶則其喜及人來矣鮮曰變巽為繩繫象巽木杙象天下無嚙人之豕牛馬豕皆人所常畜者故大畜並言之何玄子曰舊説以四畜初初為童牛四為牿五畜二二為豶豕五為牙于理亦通然按初二兩爻實無童牛豶豕之象細思之大畜成卦之體原以二隂畜止三陽即九三一爻亦為四五所畜非如他卦必論應與也故童牛之牿豶豕之牙專就六四六五言四字連讀但取象于牿與牙耳爾雅云豕子豬􅭘豶豶者豕子也童牛豶豕的對牛牿豕牙的對四五皆隂艮為少為止故取象同先畜陽者四也五特助之而己故但言吉而不言元吉按象傳曰六四元吉曰六五之吉皆持舉爻位可見二象之義從本爻而言此象傳大例也所採諸説均合孔傳蓋兩爻皆言以柔畜剛之妙用也六四以正為順靜以止乾剛暴者遇之而馴發揚者遇之而斂六四之所以元吉也六五君位則有畜天下之象居中應天建極于此萬物會歸牙如崇牙之牙立而不動之象豕至隂之物易于隂爻多言豕姤初睽上皆取隂象不必泥於坎也上九何天之衢亨象傳何天之衢道大行也陸敬輿曰上為養賢之主其德剛厚能負荷天之大道而致羣賢之通泰也衆賢遂志治化日隆道大行也遊廣平曰使天下無家食之賢者上九之任故故以何天之衢為言本義畜極而通豁達無礙張紫巖曰震大塗為衢何謂勝其任王童溪曰何如何校之何言以身任天下之責當畜賢之時為五所尚主張賢路賢者得志莫盛于斯項平甫曰上九在上導乾以上行故謂天之衢趙汴水曰止而後行行必通養而後用用必濟騁駕天衢其亨可知行于地者有疆域之限行于天者無畔無際唯所欲之賢者顯立天朝言聼計從無適不可道之盛行何以加此沈守約曰艮變坤坤地而在乾上天衢象卦為泰畜極而亨賢者受養其道大亨時之泰也胡雲峰曰隨畜隨發不足為大畜唯畜之極而通豁達無礙如天衢然大學章句所謂用力之久一旦豁然貫通者亦此意俞石澗曰何謂天道是也何謂衢道大行是也道釋天字大行釋衢字來矣鮮曰上陽一畫象擔二陰垂軃于兩邊有擔挑之象言一擔挑起天衢也不家食涉大川此其時矣按以豁達無礙釋天衢固善而何字畢竟作負荷看方見大畜之力震下艮上中爻重卦趙復齋曰動于春夏止于秋冬天地所以養物動于日出止于日入人所以養生少壯動衰老止亦其義也楊誠齋曰上覆下承中四畫衆齒之象也頤貞吉觀頤自求口實彖傳頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉鄭康成曰頤口車之名震動于下艮止于上口車動而上因輔嚼物以養人故謂之頤姚德祐曰以陽養隂動于下止于上各得其正則吉也虞仲翔曰離為目故觀頤雙湖曰卦體似離有觀道孔仲達曰養正兼二義一養賢故下云聖人養賢以及萬民二養身故象云慎言語節飲食觀其所養言觀視所養何人觀其自養觀自求口中之實也是觀有二義若所養是賢及自養有節則其德盛也若所養非賢及其養乖度則其德惡也程傳上下二陽中含四隂上止下動外實中虛頤頷之象聖人設養之義大至于天地養育萬物聖人養賢以及萬民與人之養生養形養德養人皆頤養之道皆以正則吉所養謂所養之人與養之之道自求口實謂自求其養身之道皆以正則吉萬物之生養時為大故云時朱漢上曰口實者頤中之物四陰為虛虛則無物故自求口實無物而求正與不正未可定也故曰觀其自養上九尚賢在五位之上坤衆為民聖人養賢以及萬民也項平甫曰初上二陽即上下兩卦之主爻萬物始乎震成乎艮天地養物之功終始于二卦之內四時八卦之用皆包于頤故卦氣始于中孚終于頤此頤之所以為大馮時行曰頤上輔下車輔不動艮也車獨運用震也輔上九象車初九象雷西仲曰此卦震體皆凶艮體皆吉蓋養之道靜止則吉躁動則凶按中爻重坤萬物皆致養焉亦養義也自養養人當分隂陽不當分上下卦看初九舍爾靈龜觀我朵頤凶象傳觀我朵頤亦不足貴也蘇子瞻曰養人者陽也養于人者隂也朱漢上曰龜所以靈者咽息不食無求于外故能神明而壽趙復齋曰初上陽畫皆良貴也上以靜存初以動失玉童溪曰靈龜况初九本有可貴之質也以諸爻皆由上九以養舍其可貴之質而輕動以求養于人故爾之爾謂初我謂上草木之華擎乎枝葉之上謂之朵上九以一陽在羣隂之上朵頤之象初自下觀之故曰觀我朵頤蒙之九二蒙之主故象曰童蒙求我我謂二也上九頤之主故初曰觀我朵頤若泥于爻應而曰我四也失之矣項平甫曰初九得正而凶者為動之主動則失正上九由頤固為所養之主初九在下亦足為自養之賢靈龜伏息而在下初九象也朵頤在上而下垂上九象也上九卦主故稱我羣隂從我求養固其所也初九本無所求乃亦仰而觀我有靈而不自保有貴而不自珍宜其凶頤卦肖離離為龜龜陽物而下伏鄭東谷曰在下而動求養于人也求養于人者必纍于口體之養以初之剛陽而動于欲胡雲峯曰靈龜以靜為養初九居四隂撰坤之下有靈龜伏地養氣之象震下凡八卦惟頤最凶以其動于口體之欲也王秋山曰以陽居陽才本足以養人智本足以自養然以動體急于上行不能自守失己自賤其凶可知按四雖正應隂無養陽之理故朵頤自指上九六二顛頤拂經于丘頤征凶象傳六二征凶行失類也程傳隂不能獨立必從陽二隂柔不能自養必求養於陽若求養於丘則往必有凶丘在外而高之物謂上九也黃勉齋曰頤之六爻只是顛拂二字求養於下為顛求食於上為拂六二比初而求上故顛頤當為句拂經於丘頤為句六四顛頤與初為應六五拂經是比于上王童溪曰頤之中爻皆隂皆不正于六三莫止于六二六四二動體不能自養其正而即非己之應以求養焉以是為行所失多矣象曰失類言上九雖頤之主而非二之應類也項平甫曰二五得位得中不能自養反由養于不中無位之爻與常經相悖故皆為拂經上艮體故為于丘胡雲峯曰二在他卦為柔順中正在頤則為動于口體俞石澗曰征凶而稱六二者謂六二居得其位自養以正蓋不必動動則自取凶也按求養于下為顛隂求陽養理之自然二比于初顛頤非凶乃以動體見上之位高𫝑重非應而妄求焉故征則必凶所以傳云行失類也征凶言不征則不凶也觀六四顛頤之吉可見六三拂頤貞凶十年勿用無攸利象傳十年勿用道大悖也程傳隂柔不中正又動之極其養如此拂違于頤之正道是以凶張子履邪好動繫説于上不但拂頤之經害頤之正莫甚焉項平甫曰上為頤主三為正應而反凶者不正而好動故也卦辭頤貞吉三爻辭拂頤貞凶與卦義相反故曰道大悖坤為十故曰十年沈守約曰凡自養者不可以有求也失位之柔處于動極而由頤之主以為應已柔而動上剛而止俱處于極位雖居應道實相違恃應而往終莫之與震變為離動極炎上失養正之義震木也艮山也木資山以養者變而為離火焚山敗害其所養拂頤貞凶象鄭東谷曰不中正而居動極所以求養于人者必無所不至所謂拂于頤之正凶之道也按此與豫之鳴豫同義皆以得正應而凶可見不獨強援之不可攀附即人臣受祿公家誰曰非正而躁進諂求君子所賤凶不專以禍患言也勿用云者聖人為上九之養人者戒也六四顛頤吉虎視耽耽其欲逐逐無咎逐逐説文作跾跾式六反當從之象傳顛頤之吉上施光也馬季長曰耽耽虎下視貌本義柔居上而得正所應又正故吉趙復齋曰上九艮止故近養五初九震動故逺應四虎食肉異於龜蓋求養切者隂求陽養故吉而無咎初九上施則光張南軒曰虎視常垂首荀九家艮為虎蔡節齋曰艮體靜止能靜以待養于初故吉項平甫曰逐逐説文作跾跾式六反逺也詳耽耽之義則跾為宜耽耽深也跾跾逺也皆有沈厚專一之義艮寅為虎四靜而正故其象如此吳草廬曰自養于內者莫如龜求養于內者莫如虎按觀顛頤及虎下視之象自以待養于初為是隂必待養于陽初四正應宜其吉矣四雖上體隂無養人之能又非五之君位不必謂賴初之養以養人也其以四為養初者尤不可從即玩爻象亦無養人之虎六五拂經居貞吉不可涉大川象傳居貞之吉順以從上也虞仲翔曰無應順上故居貞吉艮為居也程傳君者養人者也反賴人之養是違拂于經常既以己之不足而順從于賢師傅上師傅之位必居守貞固篤于委信則能輔翼其身澤及天下故吉隂柔之才雖倚賴剛賢能持循于平時不可處艱難變故之際故云不可涉大川成王當管蔡之亂幾不保于周公况其下者乎項平甫曰五亦不正然性好止故能居貞而吉六五居貞非自守貞于從上也成王不疑周公孝昭委仕霍光六五之貞沈守約曰變而為巽止于謙巽資人以養者也卦變為益以謙受益吉道也丘行可曰豫五不言豫權由乎四也頤五不言頤權由乎上也豫五柔乘剛故貞疾頤五柔乘剛故居貞吉胡雙湖曰卦體象虛舟五不利涉上利涉者五柔安于艮止上剛止極而動也按象傳順字從中爻坤象來止於順德故安貞上九由頤厲吉利涉大川象傳由頤厲吉大有慶也本義六五賴上九之養以養人是物由上九之養也位高任重故厲而吉陽剛在上故利涉川郭白雲曰利涉大川由頤之才也大有慶天下得其所養也禹稷伊周為能盡之楊龜山曰卦唯二陽而上九居一卦之上履師傅之位任人君之責危疑所集也危者安其位者也故厲乃吉項平甫曰上九之厲吉非能自吉也得六五之委信而吉也故曰由頤厲吉大有慶也隂陽相得為慶易外頤初變則為剝故有朵頤之凶上變則為復故有由頤之吉總論按觀由頤之象則唯上九一爻為養人之主明矣然陽以養隂隂養于陽則初陽不獨可以自養本亦可以養人故六二之顛頤非凶六四之顛頤吉且無咎初爻之凶以其動主動於口腹之欲也至與四正應四得其養自為四之本象不復泥於初之本象矣拂經近儒李克塨剛主易注以經為頸拂為捩謂捩其頸以求養于上説似太新于象頗合附採之周易孔義集説卷七
