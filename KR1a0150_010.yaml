body:
  text: 周易孔義集説卷十光祿寺卿沈起元撰下經坤下離上中爻艮坎按晉于文為晉日兩至也自北至以至南至進而盛也晉康侯用錫馬蕃庶晝日三接彖傳晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也荀慈明曰坤為衆故曰蕃庶侯行果曰康美也崔氏憬曰卦名晉而五爻為主故言柔進而上行也程傳凡卦離在上者柔居君位多云柔進而上行在下而順附于大明之君諸侯之象本義康侯安國之侯錫馬蕃庶晝日三接言多受大賜顯被親禮上離下坤有日出地上之象順而麗乎大明之德趙復齋曰别而言之坤順離麗兼而言之六五以順德麗二陽三隂順進欲同麗也六五上行已進也三隂從之欲進也康侯之馬與牝馬同下獻上亦曰錫朝貢曰錫郭白雲曰雜卦曰晉晝也則知晉之義不止于進言明以進也晉與大有略相類大有火在天上君道也晉明出地上臣道也以人臣之進獨備一卦之義則臣道之至大者非康侯安足當之卦辭專以康侯為義不及其他也其德柔順而明故下能康一國之民而上能致王者之寵楊龜山曰侯有君道者也徐進齋曰馬坤象晝日離明在上象姚氏小彭曰用錫馬蕃庶侯享王之禮錫猶納錫錫貢之錫享禮馬匹卓立九馬隨之故曰蕃庶晝日三接王接侯之禮覲禮延升一也覲畢致享升致命一也享畢王勞之升成拜三也項平甫曰三女之卦獨離柔在上為得尊位大中故謂之上行巽在六四例謂之上合上同兌在上六例謂之上窮皆不得為上行林剛中曰晉有諸侯朝王之象坤為土為民有土有民諸侯象俞石澗曰晉日之進升漸木之進日出地上其明進而盛升漸進而無明盛之象諸侯進獻于王物大且多表其順也王接諸侯于晝昭其明也王秋山曰明出地上足以照臨一方未足以照臨四海未至于天猶可以進若明在天上則不可以進言矣梁孟敬曰進盛之時雖不言吉亨而吉亨可知以順而麗于大明雖不言利貞而正可知易外大明日也乾與晉皆言之乾之大明其潛為始亢為終亢而復潛終而復始故曰大明終始晉之大明出於地地之日也為大明之始大有之日升于天天之日也為大明之終晉之日從地以至山從山以至水四為坎之中艮之上登泰山日觀見海中日出而晉乎天文明之盛也觀彖順而麗乎大明以順為主而大明麗之蓋明麗皆離德離之明必有所麗也柔進上行所以發明卦意而起爻義按此六五與大有同大有言尊位大中而此祗言上者明非天子之象也所以六五象辭曰失得曰往吉皆非天子之事初六晉如摧如貞吉罔孚裕無咎象傳晉如摧如獨行正也裕無咎未受命也王輔嗣曰處順之初應明之始明順之德于斯將隆進退不失其正貞吉也處卦之始物未之信故曰罔孚方履卦始未至履位故必裕之然後無咎孔仲達曰摧退裕寬獨猶專也言進與退專行其正未受命未受錫命也程傳聖人恐居位者廢職失守以為裕故特云裕無咎者未當職任故也若有官守不信于上一日不可居也張子居晉之初正必見摧故摧如不害于貞吉王介甫曰初六以柔進君子也常人不見孚則或急于進以求有為或急于退則懟上之不知孔子待價罔孚而裕于進也孟子久于齊罔孚而裕于退也趙復齋曰晉主在五不取四應時之宜也晉如志在五也摧如阻于四也貞以自守雖無信者寬以自處待時而進毛伯玉曰摧如在彼而我不可以不正罔孚在上而我不可以不裕張紫巖曰互艮在上艮山為摧小人扼君子之進其勢若山九四炎上之性互體坎坎為小人初以坤順在下為罔孚沈守約曰爻變震卦變噬嗑有物間之罔孚象胡雙湖曰坤體寬裕故無咎六二晉如愁如貞吉受兹介福于其王母象傳受兹介福以中正也虞仲翔曰應在坎上故愁如得位處中故貞吉九家易曰大福謂馬與蕃庶之物是也程傳王母隂之至尊六五也二中正之德六五大明之君與之同德必當加之寵祿受介福于王母介大也趙復齋曰晉如志應也在下而裕得位而愁其揆一也五居尊位與坤合德氣同志應終莫之阻隂陽之情或以配合或以類聚惟其時爾或謂六二無應未知晉之同氣而升也郭白雲曰柔順中正臣道莫美于斯小人以進為喜君子以進為懼故召公為保則不悅正考父三命而傴俯兹其所以順而麗乎大明歟是以貞吉受福項平甫曰進者君子之所難也初未為衆所允以正處之以裕待之此將進之道二既進而當位則憂患之原方起于此固守中正不改其度此既進之道雷西仲曰責愈重而憂愈深當靖恭不懈職思其憂則正矣正則吉王秋山曰處晉之時與五同德其仕於諸侯之命卿命大夫歟其者隨其仕國之辭王母謂五雖居尊而實隂猶居君人之位而實臣也按二動成坎坎為加憂故有愁如象坤靜安貞非豔於進者以在晉時而當路受寵故愁如而吉六三衆允悔亡象傳衆允之志上行也程傳三不中正宜有悔而在順之極三隂皆順上者是三之順上與衆同志悔所以亡有順上向明之志而衆允從之何所不利上行上麗于大明也朱漢上曰三志上行則二隂因之得麗乎大明項平甫曰三已晉而在上晉道已成衆志皆信趙汴水曰三之位下不在田正明出地上之時胡雙湖曰三方成坤體衆象坤土居五行中有信象上互坎亦有信象按坤主臣道而此卦言臣道上進之冝晉六三即坤之六三坤三有含章之貞從王之知于其進也善矣九四晉如鼫鼠貞厲象傳鼫鼠貞厲位不當也翟子元曰鼫鼠晝伏夜行貪猥無已雖進承上潛據下隂久居不正之位故有危厲張子鼫鼠為物貪而畏人體陽欲進反據隂位動止皆失與六三義正相反本義不中不正以竊高位危道也趙復齋曰晉之時隂為君子陽為小人大哉時乎項平甫曰晉之道以順而麗以柔而上者也四雖已進乎上失柔順之道故如鼫鼠若固執而不悛危必至朱漢上曰鼫鼠子夏傳作碩鼠碩大也艮坎為鼠陽為大張紫巖曰九四互坎棄明德包險心曰晉如鼫鼠以離體居互坎中互艮終止于晝動于夜蔡進齋曰位柔爻剛貪據高位喜接衆柔前畏大明之君而不敢進王童溪曰諸爻皆以柔進九四獨以剛進以炎上之性上侵而五又有不可犯之勢位不當者謂以剛進失晉之義也馮厚齋曰鼠晝伏者也晉之離晝也在離之下伏于晝者也沈守約曰變為剝小人之極唐凝菴曰以強臣居柔君之側撰艮則止下之進撰坎則滅五之明按鼫鼠一説螻蛄也俗呼為土狗孔氏正義按蔡雍勸學篇云鼫鼠五能不成一技術注云能飛不能過屋能緣不能窮木能遊不能渡谷能穴不能掩身能走不能先人本草經云螻蛄一名鼫鼠荀子勸學篇作梧鼠崔豹古今注作鼯鼠是鼫鼠非詩之碩鼠也然據此則鼫鼠非鼠于爻象未合不若從碩鼠為得項氏又云古易鼫字有一本作碩則今本鼫字或係碩字之訛蓋以不中不正而處近君之位徵其貪也外剛內柔色厲內荏知其畏人也若螻蛄土狗與爻象無涉六五悔亡失得勿恤往吉無不利象傳失得勿恤往有慶也劉長民曰陽躁動隂靜止三五陽位以隂居之能節其動故爻辭不稱晉而皆曰悔亡石守道曰以道自任得失不以介意小人患得患失恤也本義以隂居陽宜有悔矣以大明在上而下皆順從故悔亡又一切去其計功謀利之心則往吉而無不利郭白雲曰君道無它中與明而已六五居中何悔不亡張紫巖曰柔進上行臣有明德而用之以順故悔亡五位在離中離為日初明終晦為失得離中虛為勿恤出坎為有慶獲六二正應且在下者莫不順麗其明為往吉無不利勿恤云者不當恤一己私往盡愛君愛天下心斯吉矣丘行可曰五所謂柔進而上行者也在下三隂皆欲附倚為四所間失也終與已合得也言五但當往而上進得失皆當置之不問胡雲峯曰事有不必憂者勿恤寬之之辭有不當憂者勿恤戒之之辭此為戒辭蓋當晉之時易有患得患失之心才柔又易有失得之纍也王秋山曰此爻成晉之主也聖人以康侯當之明出地上未至于天位雖尊而明不及逺一國之君也按此爻正與彖合有慶即錫馬蕃庶晝日三接之謂上九晉其角維用伐邑厲吉無咎貞吝象傳維用伐邑道未光也程傳角剛而居上之物以陽居上剛極則強猛進極則躁急無所用而可維用伐邑謂內自治也則雖厲而吉且無咎朱子吝不在克治正以其克治之難合下有此吝耳貞吝之義貞固守此則吝徐進齋離為戈兵有伐象邑謂內之私邑坤體在下象郭白雲曰進而上窮危矣然晉非進而已明順之義存焉至于伐邑則明德之昭已或虧蔽故言未光楊龜山曰明出地上非日中之時不足以照天下道未光也若道足以照四方則無思不服尚何伐邑之有王秋山曰明極者必窮物剛極者必觸物而以處晉豈康侯所宜維可伐己邑以自治然亦不可以此為正而固守之未光者征伐自天子出以諸侯而自伐己邑雖無咎而于臣道未為光大龔泉峯曰晉卦諸爻隂多吉而陽多厲者晉以柔順為善剛強則躁矣卦之得名亦以柔為主梁孟敬曰離為牛而以剛居上角之象進則摧其角若伐其私邑猶可以用其剛觀彖功名盛則所務者逺而反蔽于近勢位極則所統者衆而多昵于私于此不謹以至危身而隕名者多矣按晉升皆進義而兩卦爻辭皆喜柔而惡剛聖人之警躁進切矣晉六爻惟六二得中正餘五爻皆不正而初爻曰貞吉曰行正此項平甫所謂事理得中為正之説也蓋但能以柔進即為守正之君子故六三不中正而悔亡六五不正而往吉聖人之論中正變動不居如是而所為不易者亦即在此離下坤上中爻坎震明夷利艱貞彖傳明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之王輔嗣曰夷傷也日入地中明夷之象暗主在上明臣在下不敢顯其明智亦明夷之義時雖至暗不可隨世傾邪宜艱難堅固守其貞正之德劉長民曰利艱貞謂六五不失中正能正其志以隂居陽能晦其明張子文王體一卦之用箕子以六五一爻之德文王難在外箕子難在內本義蒙大難謂遭亂見囚內難謂為紂近親在其國內如六五之近上六語録文王箕子皆是晦其明然箕子佯狂意思便是艱難氣象上六為暗之主六五近之故利于艱難以守正而自晦其明也郭白雲曰彖自分二義文王有明德內文明也三分天下以服事殷外柔順也盡坤離之義得明夷之大者矣箕子用晦而明得其艱貞自為之奴卒陳洪範內難而能正其志也朱漢上曰明夷晉之反離為文明坤為柔順坎為險難陽為大艱貞者有其明而晦之也六五坎險在內內難也楊誠齋曰大難以天下言內難以一家言紂之難大能及天下而不能及文王小能及一家而不能及箕子此用明夷之力也趙復齋曰惟文明故能柔順逺害以艱為貞故能晦其明而不露吕東萊曰人皆視明入于地明自此滅殊不知明本不滅暫入于地而已如君子之道見傷而道本不曽滅王童溪曰明而傷焉在人君則為昏暗在賢人則為晦藏文明之德藴于內而不耀柔順之心施于外而無忤以文王所用之道也正其志以自守不敢逃去而亦獲免害箕子之所用也項平甫曰蒙難者有濟世之功內難者止于正志而已李隆山曰易未有一卦全體以利艱貞為義者蓋觀君子之明傷為可懼而危辭以戒之時可知矣趙汴水曰時方昏亂明者禍之的剛者敵之媒唯內明外順故可以免蒙覆其上也大難君臣之間也內難親親之間也不殞身以存道不枉道而遂臣正志也李去非曰晉明乎外明夷明乎內晉以順用其明明夷以順保其明單氏渢曰處之以艱則能藏其明守之以貞則能明不息吳草廬曰掩蔽其明而不見若有傷之者曰明夷胡雙湖曰彖辭文王所作曰利艱貞終守臣節而不失可見于此胡雲峯曰以二體則離明也傷之者坤以六爻則初至五皆明也傷之者上上為暗主而五近之故彖傳以利艱貞為五羑里演易處之甚從容可見文王之德佯狂受辱處之極艱難可見箕子之志梁孟敬曰艱者畏慎而無忽貞者正固而無邪何玄子曰正其志即貞也晦其明以正其志即艱以運貞也獨以利艱貞歸箕子者箕子之艱更甚于文王其生重于死也六二為內卦之主互坎在外故曰蒙按卦辭艱字作時之艱難者非初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象傳君子于行義不食也王輔嗣曰上六明夷之主初處卦始最逺于難明夷逺遁絶迹匿形不由軌路故曰于飛懷懼而行故垂其翼志急于行飢不遑食殊類過甚以斯適人人必疑之故有言荀慈明曰火性炎上離為朱鳥故曰于飛為坤所抑故垂其翼陽為君子不食者不得食君祿也王介甫曰飛者以下為順垂其翼飛而下也明夷難在上是以宜下不宜上二老避紂不食象蘇子瞻曰垂其翼緩之至三日不遑食急之至懼不免也去主而適敵主人必以我為謀己主人上六也程傳君子于行謂去其祿位而退藏也三日不食言困窮之極知幾者君子之獨見非衆人所能識傷未顯而去之則世俗孰不疑怪故主人有言穆生去楚申公白公且非之而不知穆生之去避胥靡之禍也張紫巖曰離為烏初在下為垂翼厯離三爻為三日互震在上為行為攸往項平甫曰不言夷未傷也斂翼而下飛者避禍之象胡雙湖曰食前互坎象下體未成坎不食象行互震象王秋山曰其伯夷太公之事乎來矣鮮曰離中虛又為大腹空腹不食之象按主人程傳以為衆人蘇氏以為上六丘氏以為應之四吳氏以為六二吕氏以為在朝之人細玩蘇氏説為允上六乃明夷之主故稱主人六二明夷夷于左股用拯馬壯吉拯説文及子夏本作拯字林云拯上舉音承象傳六二之吉順以則也李氏鼎祚曰初為足二居足上股也互體坎坎主左方左股象石守道曰以柔居中是居位之人不能如初九髙飛絶迹故傷于左股尚有右股未盡傷滅由逺于難楊誠齋曰二有文明之德暗主所甚忌也唯去可免于傷而居大臣之位昏世之所不得去也故有左股之傷以其德之文明故有馬壯之拯此正文王事也見囚傷股也順以則者有君人之大德又有事君之小心順乎君臣之天則也詩曰順帝之則其見文王之心乎項平甫曰坎為亟心之馬故壯馬壯則能力行于柔爻言之者貴其順也當險難之時力行順事可以反凶為吉若用剛則愈凶矣明之始夷臣雖受傷未忍忘君思用救馬盡力而出之明夷二動則為泰何吉如之然非上六之所能也但為六二者臣子之法當如是爾下三爻唯六二有救之之誠上三爻唯六五無去之之心六二當位之臣忍傷以救國事合于為臣之則故曰順以則王童溪曰六二文明之主又柔順之至非文王其誰當之諸家以為泰顚閎夭非也左股見傷羑里之危也然左股雖傷而強壯者猶無恙所以為文王者猶故也天命未革則為臣之分不敢違心不敢不自盡用拯者上欲拯吾君為無過之君下欲拯斯民為無難之民不敢不用其力故曰馬壯吉沈守約曰變為乾外晦而柔內明而健能避咎也卦變為泰泰道之所以興也王秋山曰既曰夷于左股又先之曰明夷者所以甚六二之不幸也蓋離之所以為明者二也成明夷之卦者亦二也胡雙湖曰馬互坎象胡雲峯曰明夷取手足心腹為象初二為股三四為腹五上為首初三右也故二四為左左弱而右強右陽而左隂何玄子曰以柔居中順以柔言則以中言微順以則曷克拯按此爻以文王當之者諸儒所同而以用拯馬壯為文王救君之誠者惟王氏得之蓋細玩夫子象傳六二之吉因用拯馬壯而吉是順以則正贊文王之用拯馬壯也夫文王以有二事殷挽回之力也伐密戡黎匡扶之力也皆所以救世乃所為用拯馬壯也蓋文王之心救得一分是一分故為純臣吉者非得脫羑里之謂更非得專征伐非終得翦商之謂以不失其正者為吉易例也項平甫謂六二有救之之誠是矣而以伊尹祖伊當之又與彖傳文王以之未合况伊尹祖伊並無左股之傷于象亦未切九三明夷于南狩得其大首不可疾貞象傳南狩之志乃大得也吕藍田曰離至南而益明得其地也程傳離之上明之極又處剛而進上六坤之上暗之極斯義也其湯武之事乎湯武非利人之天下志在去害而已狩去害之事大首暗之魁首上六也上與三正相應為至明克至暗之象趙復齋曰為明之主進獲上六必待天時人事之至先時則失正矣朱漢上曰自二至上體師坎為中冬狩之時離為南得者易辭郭白雲曰離之性失之過則暴故戒之熊梅邊曰居下卦之極在離之上其明有復出之漸焉猶在坤下當守正俟時而不可暴王童溪曰象傳南狩之志者謂九三之志所以大得者以其南狩也南云者謂其有是明狩云者謂其除亂而去害吕東萊曰武王五年觀政然後有牧野之誓李西溪曰武王處明夷則以不可疾為貞箕子處明夷則以利艱為貞項平甫曰貞字自為句明夷而南狩不得已而為之非棘其欲也蔡進齋曰南狩離明之狩也沈守約曰離變為震明而威南狩象卦變為復以明革昏明將復矣一陽方復當復以漸不可遽也胡雲峯曰初無位可去則去之宜早二在位可救則救之宜速三與至暗為應不可復救故有除害之象然二之救難可速三之除害不可速來矣鮮曰離為戈兵中爻震動征伐象華霞峯曰明夷無君九三將進而為君故時至明夷而君臣之位變矣曰南狩以除殘禁暴與三而非以下伐上曰得其大首以殱厥渠魁與三而非以臣弒君六四入于左腹獲明夷之心于出門庭象傳入于左腹獲心意也楊龜山曰腹坤象坤體之下故曰左于出門庭我不顧行遁此微子之明夷丘行可曰上傷人之明者而六四與之同體能深入其腹而得其傷明之心故知其不可輔而去之于是出門庭而歸周鄭亨仲曰干寶云一為室二為戶三為庭四為門四在門庭間故以出言趙汴水曰心意者縕諸內而未形諸外必為肺腑之親而後獲之胡雲峯曰入于左腹自離而入于坤坤耦有門象于出門庭者猶可去而出于坤胡雙湖曰幸去上六猶隔六五尚可避去錢啓新曰坎為明夷之心心絡于腹左四以坎陷象左腹之入旋以震動象門庭之出唐凝菴曰坤為闔戶震動闢之而出來矣鮮曰明夷之心紂之心意也六五箕子之明夷利貞象傳箕子之貞明不可息也孔仲達曰最比暗君似箕子之近殷紂利貞者執志不回暗不能沒明不可息正不能危蘇子瞻曰六五之于上六正之則勢不敵救之則力不能去之則義不可此最難處者也如箕子而後可身可辱也明不可息程傳五切近傷明之主若顯其明則見傷害必矣箕子晦藏其明而內正其志可謂貞矣戒之利貞謂宜如箕子之貞固也朱子彖言利艱貞爻言貞而不言艱者蓋言箕子則艱可見楊誠齋曰五陽明也六隂晦也以六晦五故為明夷張紫巖曰箕子有君道而在臣位商所以亡聖人謂使箕子得主殷祀周焉得有天下故以箕子居明夷五位示微意焉箕子後為武王陳洪範為天下後世利是為明夷之正箕子志于明道無志于愛身正道而息于天下非天地心故曰明不可息鄭東谷曰六五居中君失是中而箕子得是中箕子傳之而後天下萬世皆由是中以生明不可息也沈守約曰變為坎坎為險難為隱伏為加憂為心病蒙大難在險也晦其明隱伏也囚奴加憂也佯狂心病也箕子之象龔泉峯曰箕子晦其明則明全而不息何玄子曰五變中爻為離又與下離中畫相應明象居坤暗中夷象上六不明晦初登于天後入于地象傳初登于天照四國也後入于地失則也侯行果曰初登于天謂明出地上下照于坤後入于地謂明入地中晝變為夜此言晉與明夷往復不已蘇子曕曰六爻皆晦也而所以晦者不同自五而下明而晦者也若上六不明而晦者也故曰不明晦言其質晦非有託也強明而實晦本義居坤之極不明其德以至于晦始則處高位以傷人之明終必至于自傷而墜厥命語録不明晦是合下已是不明郭白雲曰不明晦其明息矣楊誠齋曰紂之嗣立聞見甚敏材力過人其初登于天之時乎及其昏棄厥德而為獨夫其後入于地失則之時乎沈守約曰坤變為艮艮山也日所由以出沒趙汴水曰則謂以明德為君天下之則六二之順以則為事君之則上六之失則為君人之則胡雙湖曰以卦言則傷離之明者在坤坤為晦以爻言則傷下五爻之明者在上上獨為晦胡雲峯曰上六不曰明夷而曰不明晦蓋惟上六不明而晦所以五爻之明皆為其所夷離下巽上中爻坎離家人利女貞彖傳家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣馬季長曰火以木為家故稱家人女以男為家家人以女為奧主長女中女各得其正故特曰利女貞王輔嗣曰家人之義以內為本者也故先説女程傳正倫理篤恩義家人之道也卦外巽內離為風自火出火熾則風生風生自火自內而出由家而及于外之象二與五正男女之位于內外明于內而巽于外處家之道也獨云利女貞者夫正者身正也女正者家正也女正則男正可知本義利女貞者欲先正乎內也嚴君亦謂二五上父初子五三夫四二婦五兄三弟以卦畫推之又有此象趙復齋曰自二至五隂陽得位柔皆順乎剛初上包括盛且間正家之象必曰利女貞者離巽皆女故也郭白雲曰齊家自夫婦始故舜觀厥刑于二女文王刑于寡妻至于兄弟利女貞者又家道之本與詩首關睢同朱漢上曰子事父母婦事舅姑皆雞鳴而朝故曰嚴張紫巖曰巽化也入也離禮也明也家人以禮為本內明外化家道以成家人又有互離體二隂居離中而四陽悉當其位曰女正位乎內男正位乎外王童溪曰九三上九父母象各在一卦之上剛而過中嚴也故父母稱嚴君各尸內外之尊鄭東谷曰長女處下而巽順乎陽中女居中而附麗乎陽婦人盡從陽之義女之貞也趙汴水曰父義母慈何以亦稱嚴母不嚴家之蠧也瀆上下之分庇子弟之過亂內外之别父雖嚴有不能盡察者必父母尊嚴內外齊肅然後父子兄弟夫婦各盡其道而後家道正熊與可曰卦四陽二隂陽以剛而主嚴隂以柔而主順正家之道盡矣胡雙湖曰女正兼二四言之然爻惟二稱貞吉則六二一爻尤重又離下巽上順長中之序則二女皆正胡雲峯曰四陽二隂陽強隂弱夫唱婦隨之象二柔皆居隂位執柔而不敢抗之象家人內也當以離內為主上父初子上下分而父子之倫正五夫四婦五上四下也三夫二婦三上二下也五兄三弟五上三下也上下分而家道正林次崖曰所正雖在女所以正之者則在夫蓋主家之人也正家而天下定猶云人人親其親長其長而天下平不作正家之效説按男女正天地之大義蓋男女者隂陽也即乾坤也即天地也此天地二字不必更從爻位上穿鑿初九間有家悔亡象傳間有家志未變也王輔嗣曰教在初而法在始家瀆而後嚴之志變而後治之則悔矣處家人之初為家人之始故必間有家然後悔亡張子男處女下悔也楊龜山曰為宫室辨內外男不入女不出間也趙復齋曰二隂內麗三陽間之不出閫也間之在始初志未變則間益固沈守約曰離始變為艮明于間家之道而止于未變之前艮為門闕間象卦變為漸杜其漸也吳草廬曰初上二爻以初終取義中四爻分上下二體取義下體在下之家以有家之臣言三為夫二為婦上體在上之家以有天下之君言五為王四為后取近比為配家道尚親也胡雲峯曰初之時當間九之剛能間俞石澗曰初九剛而不中不能無悔悔亡者離體而有先見之明能間于始也梁孟敬曰子始有室始代父而任事始命于朝而為士大夫皆是錢啓新曰撰坎在前初間坎下如水有防龍麟洲曰一竒下橫間象來矣鮮曰間從門從木木設于門所以防間六二無攸遂在中饋貞吉象傳六二之吉順以巽也王輔嗣曰居內處中履得其位以隂應陽盡婦人之正義無所必遂職乎中饋巽順而已是以貞吉本義柔順中正女正位乎內者也趙復齋曰順巽乎三以饋尊者二之正也朱漢上曰坎水離火而應巽木女在中當位烹飪而主饋事順也王童溪曰詩有采蘩以奉祭祀為不失職采蘋以供祭祀為循法度婦人之職守然也易山齋曰此爻正所以發明利女貞之義蔡宸錫曰以柔居柔無遂事之才居中得正無遂事之志九三家人嗃嗃悔厲吉婦子嘻嘻終吝象傳家人嗃嗃未失也婦子嘻嘻失家節也吕藍田曰以陽居陽純以嚴治家人所以嗃嗃嗃嗃者歡言也彼雖議我我未失道悔厲猶吉若過于嚴剛責善已甚賊恩之至皆有離心婦子嘻嘻失治家之節終吝道也嘻嘻嗟怨聲王介甫曰剛嚴之過雖未失吉婦子怨望至于嘻歎終亦吝而已未若九五之懿王酸棗曰在一卦之上剛嚴過中則傷猛楊龜山曰家人有嚴君焉而九三所以限制內外未失也婦子以悅順為事至于嘻嘻則失節矣剛過非婦子之道項平甫曰嗃嗃嘻嘻只一意非相反之辭稱家人者一卦之主治家者也治家過嚴雖多悔而難安然于家道未有所失若治家失道如谷風之有洸有潰小辨之維其忍之使婦子嘻歎怨毒則終不可行故吝嘻嘻二字在詩之噫嘻禮之嘻其甚矣左氏傳之嘻嘻出出陽虎從者曰嘻皆為歎懼之聲未有訓為笑樂者九三重剛而不中故其象如此若以為笑樂失節則終亂之道不止于吝矣趙汴水曰家人九三也嗃嘻説文無此二字嗃嗃以爻義求之當作嚴毅之聲嘻嘻悲歎聲三剛明知齊家之尚于嚴以聲色嚴毅齊家雖有悔也能危厲自謹則子嚴父詔婦順夫指家道之吉倘過于嚴變和協而為嗟歎則始吉終吝節猶竹節竹于虛之中以實為節過于實則閼其生意乖其輯睦失其節矣俞石澗曰嗃嗃當依劉向本作熇熇詩云多將熇熇説文云火熱也雷霆天之威也使日轟轟焉求人之過而誅擊之將不勝其病矣吳草廬曰嗃與熇通如火之炎熾嘻字與嘻通苦熱痛呼之聲亦于離火取象何玄子曰嘻嘻甚于嗃嗃蓋不堪而歎説者自漢來多曰嗃嗃之反宋王回疑重剛無嘻笑理獨得卦情火聲無常若歎若泣有嘻嘻象節不過也按聖人言道不越于中過猶不及未有寧過毋不及之説治家固主剛嚴亦尚雍睦天下有瀆亂之患亦有乖離之禍家道窮則乖故受之以睽可見終吝之占已伏乖睽之義細玩象傳剛嚴之吉已具上截夫豫以未失許之尚有不足之意焉下截正著其不中之失故以為戒節者節其過以歸于中之謂由九三剛過而言故以吕氏諸説為優六四富家大吉象傳富家大吉順在位也虞仲翔曰得位應初順五乘三比據三陽故富家大吉孔仲達曰體巽承尊長保祿位吉之大者石守道曰父子篤兄弟睦家之肥大臣亨祿位皆富也郭白雲曰君子修身齊家由內出外至于巽體家道成矣六四之富豈金玉布帛哉父父子子兄兄弟弟夫夫婦婦是也得道為順失道為逆故曰順在位也禮以家之肥國之肥天下之肥是謂大順易所謂富猶禮所謂肥象言順在位則禮之大順也趙復齋曰化行乎下家之肥正家由五歸美于四成化之首也張紫巖曰四位巽初居互離中離南方萬物畢亨為富巽順而有明德是以能富其家徐進齋曰當位應剛又介二剛之間以柔得剛以虛受實故曰富家順在位謂父子兄弟夫婦各正其位而無逆也李去非曰初間之二饋之三治之四則亨其富此治家之序沈守約曰變巽而為乾順巽而篤實富家象吳草廬曰九五王也六四后也后所處乃王之家富有四海以天下為家故曰富家大吉大者陽也亦謂九五后不敢有其吉而以歸之九五娥皇嬪虞塗山氏相夏太姒邑薑興周此舜禹文武之吉也胡雲峯曰四之位在上而主家之婦何玄子曰變乾為大乾包萬有卦變同人合家人而同心宜其富也順者柔正也在位者五之配也他卦以二為五配此獨以四為五配故四爻之辭無善于此觀彖男之功成于女猶天之功成于地此家人所為利女貞也故大吉之辭不于五而于四言之九五王假有家勿恤吉象傳王假有家交相愛也王輔嗣曰履正而應處尊體巽父子夫婦兄弟六親交愛而天下定故勿恤而吉蘇子瞻曰王者以天下為家九五有人君之德故稱其德論天下之家焉君臣欲其如父子父子欲其如君臣聖人之意也趙復齋曰五剛中正齊家之本四以下皆正齊家之效王童溪曰以二五言之則二爻居相應之地二有內助之德而五愛之五有刑家之道而二愛之此所謂交相愛也以六爻言之則六爻剛柔皆得其正以正道交相親愛此九五所以為一家之主也彖辭正家而天下定盡是道者九五也楊誠齋曰正人在法感人在心使人愛我易使人交相愛難九五以乾德之剛明居巽位之中正愛心感人巽而入之所以感假其家人以及天下莫不交相愛也郭白雲曰勿恤者王假有家毋憂天下之不定也項平甫曰彖以家人為主言父母之治家人如治天下故義主于嚴九五以君位為主言人君之視天下如視家人故義主于愛沈守約曰變為艮艮為門闕風行于閨門之內而及于天下假有家象卦變為賁交相愛禮之文也趙汴水曰堯之協和時雍始于睦族故一家交愛而一國交愛一國交愛而天下無不交愛此王之有家也楊釋褐曰間有家間之于始假有家假之于終丘行可曰三五陽剛皆主治家者也三剛而不中失之過嚴五剛而得中威而能愛盡治家之道故人無不化可以勿憂恤而吉彖以嚴正為吉五以相愛為義嚴以分言正家之義愛以情言假家之義假有感假之義龔泉峯曰假格同猶奏假昭假之假謂感格也初之間以法度至王假有家則躬行感化之矣何玄子曰舜格于文祖公假于太廟格假互用可證中爻坎為加憂此爻出于坎外故勿恤上九有孚威如終吉象傳威如之吉反身之謂也陸君錫曰反身修德言行相顧德盛如威司馬溫公曰以陽居上家之至尊者家人望以為儀表是以內盡至誠為下所信然後有威如可畏而獲終吉張子以陽居尊故威如身修而家齊故終吉郭白雲曰家人之始在于間成在于信終始不可變者威如而已威自我出也家人之道所以成始成終者修身而已朱漢上曰威非外求反求諸身而已反身則正正則誠誠則不怒而威張紫巖曰禮化既孚不嚴自畏已正于此威加于彼必然之符項平甫曰六爻皆當以小象為證曰志未變可見間之義主于初曰順以巽可見貞之義主于順始未失而終失可見嗃嗃嘻嘻為一事以順在位為言可見富家之義不主財利以交相愛為言可見王假之義不主于尊嚴以反身為言可見威如之義不主于徒法吕東萊曰出于至誠則其威乃威也威而不先有孚誠則不服反身者謂孚自我出不當任威當反觀吾之誠否也徐進齋曰以陽居卦終家道大成人信之矣然不以人信而或弛律身益嚴故曰威如沈守約曰變為坎坎為信有孚象卦為既濟剛柔正而當位家道之所以終濟錢啓新曰剛爻巽體無其威而如有其威龍麟洲曰孚本爻剛實象至誠之積孚于其家則尊重嚴整自有不怒而威之道按玩象傳則有孚威如作二事者非也蓋反身者即大象傳所云有物有恆也有物有恆即有孚也威如即在有孚內摹寫出來兌下離上中爻離坎周子家人離必起于婦人故睽次家人睽小事吉彖傳睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉程傳方睽乖之時六五以柔居尊位有説順麗明之善又得中道而應剛亦可以小事吉天高地卑而化育之事同男女異質而相求之志通生物萬殊而得天地之和稟隂陽之氣則類也時用聖人合暌之用也睽者本同也本不同則非睽也朱子睽皆言始異終同之理趙復齋曰二至五隂陽失位皆睽異也隂陽相與異中見同郭白雲曰火澤無相得之性方之天水違行蓋其小者雖不成訟亦為暌也然澤火之革火自下而上澤自上而下𫝑必遇而相息又不若睽之相違而不遇也項平甫曰睽之時用所以大者以效言之也百官分職而治之則凡職皆治是為大治萬國分土而平之則九土皆平是謂大平睽之有時而可用者此類也張紫巖曰天地男女萬物相待以致用其事其志有不得不一者唯聖人得所一而同之足以成天地之能趙汴水曰火澤之睽因乎動二女之睽由乎行不動不行未嘗睽也父子兄弟夫婦天倫之至也一有間之睽阻生焉然火澤不能不動二女不能不行是以君子謹其初也聖人貴合不貴異今曰睽蓋人情事勢之適然小事吉者就睽異之中有以善處之則亦吉也其屯之小貞洪範之作內之時乎天地不睽則清濁混淆男女不睽則內外無别萬物不睽則生化糅亂睽者其體合者其用卦言小事以六五柔中之才用睽不足以大事也王秋山曰以其時之事言之則可小不可大以其時之用言之則甚大而非小吳草廬曰睽之時無所謂吉以能得在下之説而在上能麗乎明一也柔不能振舉進而在上有勢位以臨下與退伏在下者不同二也得中則不太柔下應九二之剛資之以濟其弱三也然皆柔之為也故小事吉而已胡雲峯曰中女少女志不同歸為睽長女少女亦不同歸而名家人何也家人隂在二四女正者也睽則隂在三五不正矣女不正則家之所以睽也蔡虛齋曰人知睽之為睽不知睽之為合故極言之蓋天下無有獨而無對者唯其不能以獨而無對故二者常相須此睽之所以未有不合者也睽者其形合者其理睽者其靜合者其動睽者其别合者其交也事同志通事類皆以相交為用者言何玄子曰不為已甚徐徐轉移此合睽之善術小事吉猶言以柔為事也觀彖行小事于睽之時唯説柔得中者能之然説柔得中用之以行小事亦以睽之時故也初九悔亡喪馬勿逐自復見惡人無咎象傳見惡人以辟咎也蘇子瞻曰睽之不相應者唯初與四悔也四逸馬也惡人也四往無所適無歸之馬也馬逸無歸其勢自復馬復則悔亡矣唯好同惡異是以為睽故見惡人所以辟咎程傳諸爻皆有應唯初與四雖非應而同德相與故相遇本義見惡人如孔子之于陽貨楊龜山曰睽之初不可以有行故喪馬睽極必反故勿逐自復喪而逐之其失愈逺郭白雲曰居睽而説道存焉故悔亡喪馬睽也逐則不可合矣惡人與己異者也見者遇之而勿絶之辭非必欲見之也張紫巖曰喪馬自復四實下之也蓋睽必上下相求而後有合四位離互坎為惡人睽離之始坎離水火交戰于前兵戈之幾也四以炎上之性行險于外剛説若初不以四惡人而逺之辟咎為吾道謀也離目為見楊誠齋曰善合睽者與其亟也寧舒與其褊也寧宏初與四上下相趣而相叛水火異情而相賊唯相叛故舍我而去喪馬象勿逐自復合睽以舒之道也唯相賊九四之火值初九之澤則熄初九之水值九四之火則涸不以避為避而以見為避合睽以宏之道也此聖人合初九九四之睽也沈守約曰爻變坎兑而為坎始塞終通悔亡象四居離體上明而應所喪必復王秋山曰以剛居剛宜有悔者居正處説不與人睽吳草廬曰睽目不相視為睽二三四互離目在初之外而接乎四見也胡雙湖曰馬坎象坎性就下故自復何玄子曰初四敵應敵則成睽然自處得正無求于外四實暌我非我睽四靜以俟之遜以接之泊然若不見其睽者而後睽可合斯稱元夫九二遇主于巷無咎象傳遇主于巷未失道也王輔嗣曰處睽失位將無所安五亦失位俱求其黨出門同趣不期而遇程傳二五正應為相與者也然在睽乖之時隂陽相應之道衰而剛柔相戾之意勝故雖正應當委曲以相求巷者委曲之途遇者會逢之謂委曲者以善道宛轉將就使合非枉已屈道也王童溪曰孟子于齊王好色好貨好勇之對此委曲宛轉以覬其遇合者也然以太王公劉文武言則雖遇主于巷何失道之有楊誠齋曰此聖人合九二六五之睽也趙復齋曰二五陽下隂上體睽而情合陽喜上隂喜下故二者適相遇朱漢上曰兑變震艮震為大塗艮為門為徑門之有徑者巷也二五得中未失道也李西溪曰二五君臣之位故言君臣之睽當事勢睽離之時必欲拘堂陛之常分則賢者無自而進矣遇主于巷處睽之時則然李隆山曰二以剛中之才具和悅之性足以行之胡雙湖曰二五本應因卦體不相得爻又不正以致委曲艱難如此潘去華曰二五之睽以臣位反剛剛易亢君位反柔柔易疑也二能絀其剛紆其身以成吾君來矣鮮曰本卦離為戈兵互離亦為戈兵兌為毁折互坎亦為坎陷當天下睽乖之時前後戈兵中原坎陷內而主又柔弱國勢毁折分崩離析之時非但君擇臣臣亦擇君時也况又正應乎六三見輿曳其牛掣其人天且劓無初有終曳以制反掣尺逝反劓魚器反象傳見輿曳位不當也無初有終遇剛也程傳三居二剛之間欲進與上合而四阻于前二牽于後重傷于上為四所傷趙復齋曰二陽繫隂隂欲去之陽不捨隂力爭以取傷害當暌之時應爻未通睽極而解故終遇王童溪曰當睽之時九四獨無應六三以隂比之所謂起疑似而招凌犯者也欲往應上四阻之故見輿曳而不進牛掣而不前天髠首劓截鼻首上向鼻上通四欲阻其上向絶其上通故也項平甫曰三上爻辭最險怪蓋彼此皆不正相疑之深者三為上所疑故自見其輿之曳牛之掣其人之天且劓上離體三互離故皆以見為言輿與牛載人者以位言指三天且劓乘車之人以人言指六以六乘三故曰位不當天或作而謂去鬚髮楊誠齋曰此聖人合六三上九之睽也張紫巖曰互坎剛動在前為輿曳互離剛動在後為牛掣兑西方為鼻兌毁為劓胡雲峯曰三上皆提一見字意見之見非真也三上之睽生于見梁孟敬曰方睽之初遇四之剛無初也睽終必合遇上之剛有終也焦弱侯曰不正之隂而承乘應皆不正之陽是以邪見羣起人心懷疑意見橫生皆非實事九四睽孤遇元夫交孚厲無咎象傳交孚無咎志行也王輔嗣曰無應獨處五自應二三與已睽故曰睽孤初亦無應獨立同在體下同志者也同志相得而無疑交孚也其志得行雖危無咎孔仲達曰元夫謂初九處于卦始故云元初四俱陽而稱夫者丈夫之夫也程傳元夫猶善士同德相親故會遇交孚各有孚誠也初四皆陽剛君子至誠相交則志可以行不止無咎夫子曰行志救時之睽也王童溪曰初以不校為勇以辟咎為知善士也在四則目初為元夫貴初也在初則目四曰惡人愧四也郭白雲曰天下之𫝑合則衆睽則孤獨于上九九四稱孤者上居睽極四陷坎中故稱孤焉處孤之道求善士而相與以誠所謂德不孤也楊誠齋曰狄仁傑以一身徇唐非孤立于睽離之世乎乃薦一張柬之而五侯之合周復為唐仁傑之志行矣項平甫曰初在下而四近君四不正而初正張紫巖曰離性炎上往不知返其道為孤而初在澤下四復互坎水澤之性本自相通為遇元夫四本惡人因初見之道既交孚志以上行君子化人捷若影響趙汴水曰初四之德敵而致孤初四之位應而有遇遇則初之陽四之隂遂交孚矣睽無不合之理然正則易二五是也不正則難初四是也胡雲峯曰交孚初與四皆剛實象俞石澗曰初不言孤者在下獨立窮居無援乃士之常在上獨立失其輔助非處上之道合訂睽由于不孚不孚則疑疑斯睽矣故合睽之道莫如交孚六五悔亡厥宗噬膚往何咎象傳厥宗噬膚往有慶也程傳五雖隂柔之才二輔以陽剛之道而深入之則可往而有慶何咎之有本義以隂居陽悔也居中得應故能亡之厥宗指九二噬膚言易合項平甫曰二以五為主而委曲以入之巷雖曲而通諸道五以二為宗而親之二五以中道相應當睽之時其間也微而易合如膚之柔噬之則入二方委曲求入五能往應則君臣交通且將有慶王秋山曰諸爻皆言睽獨二五不言而言合蓋合天下之睽者君相責也膚者睽之淺噬則合之深吳草廬曰六五互坎之外體而柔如豕膚之柔而易噬龔泉峯曰同人于宗則吝厥宗噬膚則無咎者同人之世則欲其公處睽之世則欲其合胡雲峯曰噬嗑六二曰噬膚睽六五以九二為厥宗噬膚睽二變即噬嗑也或曰二至上有噬嗑象五以二為宗宗親之也上當以情親下也主尊之也下當以分嚴上也同人以九五為宗皆以離中隂爻言之隂從陽支子從宗子也按睽必有間去間斯合故以噬為言義同噬嗑也然噬嗑本象以頤中有物不在卦體而睽之所以睽自在火澤違行不在爻象而可以某爻為間也説者或以為噬三或噬四鑿矣蓋此爻彖所謂説而麗乎明柔進上行得中而應乎剛者也卦之主爻也夫正應易合固已又自二至四互離為説而明二體互離則與五同德化澤火之相熄而為重離之繼照中含互坎又為日月之交光此間之所以去而睽之所以合也况五變為乾為天澤履上下之分定宜無咎而有慶歟噬膚二字借兑口坎豕為象以形容易合之意非有所噬之爻也曰往者以君求臣下賢之意易爻自外之內亦有言往者屯四應初曰往吉與此爻之往何咎上爻之往遇雨正同自內之外亦有言來者需上之三人來也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象傳遇雨之吉羣疑亡也王輔嗣曰已居炎極三處澤盛睽之甚也程傳睽極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑上有六三正應本不孤而才性如此如人雖有親黨而多自猜疑妄生乖離常孤獨也睽極則不疑而合郭白雲曰天下之睽始于疑疑者小人之道睽之成卦本自二女故上九極言其疑六三隂也上九陽也陽氣下降隂氣上行故言遇雨丘行可曰見豕疑其汚我載鬼疑其祟我朱漢上曰坎為豕兌為澤豕在澤中負塗也離矢坎弓先張之弧疑四為寇也後説之弧知四非寇也九剛六柔自婚媾也坎在下為雨羣疑亡本無是也辭枝如此疑辭也李西溪曰初與四合朋友之睽二與五合君臣之睽三與上合夫婦之睽沈守約曰兌為巫巫者鬼所托也互離為大車三體中虛載鬼一車象弧矢之利蓋取諸暌上處其極是以先張後説也卦變歸妹男上女下隂陽和也龔泉峯曰卦內凡三言遇皆陽爻以見卦之睽隂為主睽之合陽為主也按疑則生睽固為物情苐諸卦離爻在上多美其明德未有病其極剛極明者何此爻之象若此蓋以卦則離在兌上以爻則應在六三也離本外明內暗而居兌澤之上中爻又為互坎兌澤之氣蒸為坎雲以蔽大明與火在天上明出地上之象異矣上正應之三恰兼水澤之位澤氣為雲之際重雲蔽日霧霾眯目於晦昧迷離之中自形恢詭譎怪之象故曰豕曰塗曰鬼皆從應爻生出水澤之氣所蒙也自上變為雷雷澤與雷水同象雷聲一震隂陽和暢百物解拆邪魅消亡疑團悉破故吉聖人取象之精若此觀水火既濟上爻之飲酒濡首亦以應爻之水為火病可證也周易孔義集説卷十
