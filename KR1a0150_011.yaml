body:
  text: 周易孔義集說卷十一光祿寺卿沈起元撰下經艮下坎上中爻坎離程傳屯困亦難也屯者始難而未得通困者力之窮蹇乃險阻艱難之義趙汴水曰水止于山上瀦而為澤咸也今水在山上雖與咸同然坎流水也非山之所能止唯有屈折回旋而後通故為蹇之象蹇利西南不利東北利見大人貞吉彖傳蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉孔仲達曰蹇難也至知矣哉釋卦名也蹇者有難而不進能止而不犯坎在其外是險在前艮居其內止而不往相時而動非知不能程傳方蹇難之時惟能止為善故諸爻除二與五皆以往為失來為得也能濟蹇者惟大正之道蹇之諸爻除初外皆當正位初六雖以隂居陽而處下亦隂之正也以正道正其邦可以濟蹇矣凡處難者必在乎守貞設使難不解不失正德是以吉也若遇難而入于邪濫雖使苟免亦惡德也薛氏溫其曰諸卦皆指內為來外為往此往得中謂五也解蹇相循覆視蹇卦則為解九二得中則曰其來復吉乃得中也往者得中中在外來復得中中在內朱漢上曰離目為見見險者明也此兼互體言本義蹇足不能進行之難也九五剛健中正有大人之象見險者貴于能止而又不可終于止處險者利于進而不可失其正趙汴水曰吃于言者曰蹇跛于行者曰蹇非不能言不能行也捷于口則期期躁于進則僵仆徐行緩語雖難而亦通何𤣥子曰處蹇者以止為尚濟蹇者以往為尚蹇六爻無不同心共濟者蓋同舟而遇風則胡越皆相救所以能出蹇觀彖舊說西南平易東北險阻者蓋以坤艮之方别之也然合坤蹇解三辭觀之蓋皆以先後為義東北陽也居先者也西南隂也居後者也在坤則先迷後得在蹇則往蹇來譽在解則其來復吉皆處後之義也蹇之時見險而止故利于處後按利西南句諸說皆有未安愚擬以內外上下釋之而以與坤卦未協為歉得安溪之說乃渙然氷釋易道之妙變動不居聖人演易以二體六爻翻來覆去頭頭是道不主故常乃所謂神無方而易無體也嘗觀易中成卦命名主二體全𧰼者彖辭則旁通六爻以盡其義以爻位成卦命名者彖辭則或取卦體或取卦德以闡其微如蒙以水之遇山險而止也而發蒙之主却取坎之九二需以險在前而不陷也而有孚光亨即取坎之九五位乎天位蠱以巽而止也而先甲後甲則取中爻之震為治蠱之道剝以五陰剝一陽而順而止之則取之卦德為變剝之用明夷以坤之掩離而為紂之惡德而文明柔順即為文王之盛德一以卦體一以卦德也睽以火澤之不相得也而說而麗明即為合睽之道一以卦體一以卦德也若此者推之六十四卦無不皆然推之三百八十四爻之辭無非是道要之六爻二體自有千變萬化之理卦爻辭之千變萬化因之而要不出六爻二體之中未嘗有一字一句出于卦𧰼爻𧰼之外者非夫子之聖韋編三絶必不能釋文周之辭也即此卦既以能止為知而往得中其道窮往有功無非以能往為尚既以坎為險而以九五得中為貴則出險者全在坎之中爻是同此一爻于三畫卦為陷陰之陽于六畫卦即為出險之主不復泥于為坎之主也且以爻言之陽剛主健而能出險則九三九五皆具濟蹇之才又不必論艮之陽與坎之陽矣愚謂自重卦之後三畫卦之體用乃盡其變所謂極天下之賾者存乎卦也初六往蹇來譽象傳往蹇來譽宜待也鄭康成本作宜待時也孔仲達曰初居艮始見險不往來而得譽宜止以待時也劉長民曰往而無應則入于蹇來則逺險吉之先見程傳有見幾知時之美有譽也張紫巖曰前有重坎為往蹇伯夷太公在海濱天下莫不稱其賢靜止自養用以獲譽沈守約曰爻變為離離性炎上往蹇也離明見幾待時明哲之道來譽也程沙隨曰六非濟蹇之才初非濟蹇之位往則犯難項平甫曰逺于險而先來有知幾之神合于彖之所謂知也趙汴水曰初二三在艮體上居險極皆未嘗往聖人特言往以戒于未往之先耳初本無來以不往為來宜待云者待時而往非終止不行按宜待若從鄭本則時與下尤字之字韻協但待字古亦有叶音啼入四支韻者六二王臣蹇蹇匪躬之故象傳王臣蹇蹇終無尤也王輔嗣曰當位居中以應于五不以五在難中私身逺害執心不回志匡王室履中行義以存其上處蹇以此未見其尤胡安定曰冒險而進非一身之故上以為君下以為民救天下之蹇也王介甫曰蹇蹇上下皆蹇蘇子瞻曰六二有應于五君臣之義深矣是以不計逺近不慮可否無往無來蹇蹇而已君子不以為不知者匪躬之故也程傳中正之人為中正之君所信任故謂之王臣薛氏溫其曰責望既重難難相仍盡瘁正邦事不一塗本義不言吉凶者但當鞠躬盡力而已至于成敗利鈍非所計也事雖不濟亦無可尤楊誠齊曰諸爻聖人皆不許其往唯二為大臣五履正位不往以濟誰當任乎張紫巖曰重坎為蹇蹇艮為躬艮中前有重坎為匪躬以國不以身也項平甫曰蹇蹇者不已之貌雖吃而猶言雖跛而猶行也趙汴水曰諸卦六二獨于此稱王臣者艱難之時正名以示警也九三往蹇來反象傳往蹇來反內喜之也孔仲達曰與坎為鄰進則入險來則得位內卦唯九三一陽居二陰之上是內之所恃故曰內喜之也程傳內在下之陰也反猶春秋之言歸張紫巖曰以剛德處互坎中故曰往蹇互坎趨下為反何𤣥子曰諸爻唯三有剛實之才可以濟蹇但與五非比非應唯反而就二二本忠貞之臣因思得剛明之才以共濟所以喜其反吳敬齊曰九三艮主所謂見險而能止者故能來而反止于其所六四往蹇來連象傳往蹇來連當位實也荀慈明曰蹇難之世不安其所故曰往蹇乘陽承五則與至尊相連故曰來連處正承陽故曰當位實吕藍田曰與三五比連故曰來連二陽交比下雖無應所賴實矣本義連于九三合力以濟朱漢上曰九三剛實四牽連之共濟五難當位而又得濟之實也陽為實項平甫曰六四以九三為實以九居三當位實也六四則連之而已若但言當位則六四亦當位也故加實字以明之按來連當兼三五言蓋九五大人五爻皆當利見連三則下二陰亦同往助五所謂朋來也四在重坎之交前水後水本有相連之勢又在上下卦之際近君之位接引下卦伊有責焉又此爻變則中爻為巽巽為進退為繩有退而連綴之𧰼又中爻為離亦明于自知知人者故雖陰柔而能從陽以濟蹇濟蹇之功陰必藉陽非誠實之實九五大蹇朋來象傳大蹇朋來以中節也王輔嗣曰處難之時獨在險中難之大者也朱子尊位而居蹇之中所謂遺大投難于朕身人君當此大蹇之時須屈羣策用羣力乃可濟也郭白雲曰君道居蹇則天下難矣故云大蹇張紫巖曰濟大難而得同德之助其道尚中過則亢而失助不及則不可與有為唯中則動無不當中節謂節之以中九三居互坎而二喜之四連之上應之五得三而上下之賢畢應為朋來陽與陽為朋也朋來而羣賢並應何憂乎蹇趙汴水曰朋諸爻也來皆朝宗于五也臣來朝于君雖上進亦稱來即彖所謂利見大人也胡雲峯曰解之三即蹇之四彼于四曰朋至故此以三為朋來來矣鮮曰中即剛健中正之德節節制也按朋來以朋為三取同德為應三來則諸爻自無不從之而來六二應爻自在其內上六往蹇來碩吉利見大人象傳往蹇來碩志在內也利見大人以從貴也侯行果曰體猶在坎外無所之故曰往蹇下應于三三德碩大故曰來碩三為內主五為大人若志在內心附于五則利見大人吕藍田曰往則窮險來則獲內之應碩大也九三以陽居陽故大也利見大人九五比也朱子諸爻不言吉未離乎蹇中也至上六來碩吉是蹇極有可濟之理朱漢上曰蹇難未解人不知所從上六因九三以從九五之貴則君臣之分定郭白雲曰難將革矣猶以往為戒慎之至也張紫巖曰蹇至上六而吉道以著得九三之應而已故在上位者必樂賢才之助王童溪曰九五朋來之主利見之者豈惟上六而獨云爾者處一卦之外尤不可不知所從也不然當比之世而上六獨後乎五不能無凶矣項平甫曰艮之上爻為碩剝之碩果是也𧰼恐學者以碩大為一故分而釋之碩與大皆陽德但碩則有厚實之𧰼故以屬艮上六本無所往特以不來為往爾鄭東谷曰屯與蹇上皆坎體陰柔屯則動乎險中動極必窮故泣血漣如蹇則見險而止止極則變故往蹇來碩吉梁孟敬曰上六者非髙位之臣即髙世之士也以五之在難亦來助之按上處卦終在蹇之外似為髙世之士而有來碩利見之𧰼者惟以正應在三而三又為乘時幹濟之人誼所當赴故吉商山四皓從留侯之招而見漢髙是此𧰼矣坎之上六如屯如比如節皆以無應而凶在既濟為有應而應者其讎故亦有凶需上與此爻則皆以應陽為吉坎下震上中爻離坎解利西南無所往其來復吉有攸往夙吉彖傳解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉王輔嗣曰動乎險外故謂之免天地否結雷雨不作交通感散雷雨乃作難解之時非治難時故不言用體盡于解之名無有幽隱故不言義孔仲達曰救難之時無難可往則來復為吉若有難可往則速赴為善褚氏云世有無事求功故誡以無難宜靜亦有待敗乃救故誡以有難須速程傳既解其難安平無事則當修復治道正綱紀明法度為可久可繼之治來復也當解而未盡者不早去則將復盛故夙則吉張子往而不返則生他變有所往而不速將後于時本義得衆謂九四入坤體得中有功皆指九二楊龜山曰天下方出屯難還定安集之時也漢為畫一之法而天下歌之來復之謂解之初與民維新之時也餘風遺俗亂法弊政有不可因者革之宜早天下已定而圖之則擾矣張紫巖曰震為木為蒼筤為萑葦為草木郭白雲曰動乎險中為屯動乎險外為解解與屯為內外亦與蹇為反覆其來復吉乃得中道所謂獲三狐而得黃矢者也有攸往夙吉往有功如射隼于髙墉之上者也邱行可曰大抵處時方平者易緩除惡不盡者易滋按利西南言上卦之震為解之主也下卦得中故不言不利東北初六無咎象傳剛柔之際義無咎也王童溪曰初居下位能以己之柔濟二之剛而亦以二之剛際夫柔則剛柔相資義為無咎所謂剛柔之際也同居內體同心相際以成解難之功安得以柔才為咎乎初四相應而初為坎底勢不上達四為動主性非下逮凡云際者上下相鄰之謂故泰九三曰天地際也初雖與四應而無際四之義趙復齊曰陰為陽難以其陵也或其阻也初六居陽承二應四不為陽難最先解者故無咎按坎六四亦曰剛柔際與此正同况此所比之二剛為解難之大臣初宜無咎矣故以際字明之非孔傳不得無咎之故矣九二田獲三狐得黃矢貞吉象傳九二貞吉得中道也王輔嗣曰狐者隱伏之物剛中而應為五所任處于險中知險之情以斯解物能獲隱伏也黃理中之稱矢直也田而獲三狐得乎中直之道能全其正者也孔仲達曰九二貞吉者謂九位既不當所以得貞吉者由處乎中得理中之道也程傳難方解而治之初必去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸獲謂能變化除去之也獲之則得中直之道乃貞正而吉也朱漢上曰二為田自三至上有師𧰼坎為狐為弓離為矢又為黃趙復齊曰得易辭獲難辭楊誠齊曰當解之世此爻欲其獲狐三戒其致冦四欲其解拇五欲其退小人六欲其射隼一卦六爻而去小人之𧰼居五田者力而取之矢者我直則壯黃者中而不過去小人而不力雖去必來去小人而不直雖行必革去小人而不中雖甚必亂王童溪曰二為坎主所謂無所往其來復吉乃得中者也狐疑物天下之難常生于人情之疑惑三狐衆多之疑也二以田而獲之沈守約曰田獲三狐得險情去衆疑也三居險極狐也六五陰柔不能制之二為五應剛直居中能得六三為險之情而去衆疑也坎變為坤致役也田象李隆山曰坎為穴為隱伏物之穴居而隱伏者狐也熊梅邊曰離為三數狐指六三之小人何𤣥子曰黃矢所以取狐狐獲則黃矢亦得矣六三負且乘致冦至貞吝象傳負且乘亦可醜也自我致戎又誰咎也孔仲達曰失正無應下乘于二上附于四乘者君子之器負者小人之事施之于人即在車騎之上而負物故盜知其非有而競欲奪之劉長民曰三據險極以柔乘剛以陰居陽是小人而乘君子之器又不應于上是固其險也險固不通難何由解故公用射之王會之曰非止速冦伐又起天下之戎吕藍田曰不安于上求媚于四而負之不安于下凌侮于二而乘之程傳陰柔居下之上處非其位難解之時而小人竊位復致冦矣朱漢上曰坎為輪故曰乘坎為盜故曰盜斯奪之此爻當內卦之上小人而在髙位自二言之為狐自上言之為隼自本爻言之則為負且乘趙復齊曰解之時陰喜得陽居其間者貪欲取之三本無應乃欲兼上下二陽難自己作致戎必矣張南軒曰小人乘君子之器招冦而起禍貞固守此不可吝乎張紫巖曰小人任重治功必隳解緩之世尤所當謹內而中夏外而四夷莫不啓陵侮之心如淮南視公孫𢎞輩猶發蒙耳六三位不中正居坎險上互坎又在前內外懷險小人之雄者負者而乘是足反居上首反居下大亂之道也沈守約曰宜負而乘可醜誰咎罪五之緩也坎變為巽巽為伏宜負也為髙乘也邱行可曰小人情狀不一狐言其蠱惑隼言其鷙害負且乘言其僭竊李蒙齊曰蹇難既解君臣各從其正小人居上者在宥罪之時王庭之鈇鉞雖未加焉已為天下所不容貞吝者固執而罔有悛心之謂雷西仲曰冦小為盜大為戎任使非人則變解而蹇天下起戎矣熊梅邊曰二以為狐而獲之五以為小人而解之上以為隼而射之其能免于患害乎胡雙湖曰互體之坎冦象九四解而拇朋至斯孚象傳解而拇未當位也王輔嗣曰失位不正而比于三故三得附之為其拇也孔仲達曰而汝也四若當位履正即三為邪媚之身不得附之也三不附四則無所解今須解拇由不當位也李氏鼎祚曰九四體震震為足六三在足之下拇𧰼劉長民曰朋二也二與四同功又俱陽爻故謂之朋蘇子瞻曰拇六三朋九二張子位不當則所履者邪故失位之陰因得駢附解之則朋信楊誠齊曰四以陽剛居近君之位而下比六三微賤在下之小人則君子之友望望然去之維解散其小人則君子信其忠正而朋至矣拇體之微而在下者也何𤣥子曰解去匪人之卦也唯二四兩陽爻任解之責者而三實界其間二雖獲之猶慮四昵之也故為告四之辭曰必解汝之拇而與朋相信則可苟昵近比之小人而不解則君子之朋雖至彼必將肆其離間之術矣按以拇為初以初為朋者皆泥于應也不知拇有駢附之義朋為同德之義不可易也六五君子維有解吉有孚于小人象傳君子有解小人退也王輔嗣曰居尊履中而應剛可以有解而獲吉矣小人雖暗猶知服之而無怨也本義卦惟四陰而六五當君位與三陰同類者必解而去之則吉張紫巖曰柔履尊位居震動中二四皆以剛德為五用君臣固結其心若一小人知國勢不可復搖而吾君臣之德有以孚其心莫不革慮從化以成解治坎險在下為小人二陽協從為維維聯合義也鄭東谷曰使世之小人皆信上之所用者必君子而所解者必小人則必改心易慮不復有投隙抵巇之望項平甫曰天方厭亂世難將解故小人皆以反正為喜心與君子相孚不煩攻擊此所以為解之時歟王秋山曰九二大臣九四近臣皆君子也成卦由之得時得位而五兼用之故有解之吉此人君解難之道也何𤣥子曰君子指二陽小人謂三陰五與三陰本朋也安能解陰幸二應四比皆陽剛之德五必與之相維係推誠委任有以行解落陰黨之謀則吉爻變中爻為巽巽為繩維之𧰼王心既一雖所甚昵寧能干我咸奉身而退矣按坎中實離中虛皆有孚𧰼與二應則坎之陰皆信故曰孚于小人上六公用射隼于髙墉之上獲之無不利象傳公用射隼以解悖也王輔嗣曰初為四應二為五應三不應上失位負乘處下體之上故曰髙墉墉非隼之所處髙非三之所履上六居動之上為解之極將解荒悖而除穢亂者也故射之極而後動成而後舉故必獲而無不利孔仲達曰公者臣之極上六以陰居上故謂之公陳氏臯曰躬親解難非人君之事王童溪曰隼六三也上以震動之極居一卦之上于位則正于勢則便于器則利于時則宜以正而去不正獲之蓋無難者三居下之上內外之限也髙墉𧰼若同人九四乘墉內外之限亦指三而言項平甫曰上六之辭最美以其獨正也正人而在髙位非君子而何張紫巖曰互離為隼重坎為弓矢離中虛陽包之為墉沈守約曰墉所以衛內而捍外也害在內小人而在君側也出乎墉之外則非射之所能及髙墉之上在內外之間據衛限之勢于此而射之獲之無不利矣震而為離威而明趙汴水曰公為外諸侯之長鷹揚善逃必上六更髙于六三然後射必命中此待時之義龔泉峯曰難者坎也陰也解難者震也陽也二四以陽解乎陰五上以震解乎坎故上卦言解而下卦不言解也兌下艮上中爻震坤王會之曰損泰之九三為損之上九曰損下益上損否之九四為益之初九曰損上益下孔子曰損益盛衰之始也蘭惠卿曰損益二卦專為三陰設也損乾之九四曰損上損乾之九三曰損下趙復齊曰損益之義在內卦剛而柔曰損柔而剛曰益不損初二而損三損其盛者不益四五而益上益其衰者益卦不損五上而損四損其盛者不益二三而益初益其微者損益盈虛二五不動㫖哉損過益不及得中而止陰損陽人欲損天理胡雲峯曰上下經陰陽各三十畫然後為否泰為損益咸男女之交變而損則不交恆男女之不交變而益則交咸情之感也極必損恆道之久也極必益益在下卦之下民爻也下之上容可損下之下為民决不可損故損曰損下益上而不言損民益曰損上益下民說無疆則其為益民也可知矣熊梅邊曰莫吉於泰而益上則損莫凶于否而損上則益是上可損而不可益下可益而不可損也明矣鄧汝極曰損益咸恆之交于上經視否泰乾坤後更十卦而天地交咸恆後更十卦而損益見為二經之樞上下交而泰不交而否損上益下而益損下益上而損損本泰以損下益上而否從胎焉益本否以損上益下而泰其還乎故損益者乾坤之往來否泰之大始也反之身咸言速心之德通于虛懲忿窒欲損之又損致虛以復其咸恆言久心之德凝于實遷善改過益之又益充實以成其恆按卦變之說固屬後儒穿鑿然文周繫辭于成卦之後自有彼此觀玩之道即如反對之卦其爻𧰼往往相照也故有謂三陰三陽之卦皆自否泰來者其病在認作卦變耳若謂從否泰看出盛衰消息之道自是聖人觀玩之至理朱子亦謂卦已成後用意推說斯為至當蓋否泰即乾坤之合體六子既生于乾坤則六子之合體自有乾坤合體之變象即如謂成泰之後變而為損則不可而艮之本坤兌之本乾不可誣也總于成卦之後從其合體而觀之則由泰以觀損而損之為損見損之漸即于否亦見由否以觀益而益之為益見益之可復于泰亦見况益彖傳天施地生明以益之上卦為乾之施下卦為坤之生孔子已有一否卦在眼前則以損為泰之衰微以益為否之轉機自是自然之𧰼故離乾坤而言損益則損益之義無著離否泰而言損益則彖傳上下之義亦無著駁卦變者并謂不必牽合否泰過矣至來氏以正反對為錯綜以錯綜為卦變至損益而其說遂不可通矣損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖傳損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行鄭康成曰艮為山兌為澤互體坤坤為地山在地上澤在地下澤自損以增山之髙猶諸侯損國之富以貢獻于天子陸公紀曰下以剛中說于上所以損下上以柔中止于上所以為益上下說而上不止則損于下上止而下不說則無益于上故說而止剛中而應乃得有孚元吉也虞仲翔曰乾為盈坤為虛損剛益柔故損益盈虛趨時通變故曰與時偕行王輔嗣曰損之為道損下益上損剛益柔也損下益上非補不足也損剛益柔非長君子之道也為損而可以獲吉其唯有孚乎損剛而不為邪益上而不為諂則無咎而可正孔仲達曰卦有元吉已下等事由于有孚故加一而字則其義可見二簋至約唯在損時應時行之非時不可也剛為德長不可恆減故損之有時吕藍田曰損之道不可以為正當損之時故曰可貞程傳譬如壘土損于上以培厚其基本則上下安固矣豈非益乎取于下以增上之髙則危墜至矣豈非損乎損之道必有孚誠則大善而吉可貞固常行而利有所往也本義損減省也損下卦上畫之陽益上卦上畫之陰損兌澤之深益艮山之髙損下益上損內益外剝民奉君之𧰼所以為損楊龜山曰損而剛柔皆應故有孚損之不以其道則民不孚凶咎隨之耿希道曰益下則下與上皆益損下則下與上俱損朱漢上曰坤為腹為方震為足艮為鼻震為木木為方器簋也上為宗廟艮為門闕為手震為長子升自門闕而薦之享也項平甫曰禮莫重于大享物莫微于二簋大享而用二簋損極矣而其所以可則有時矣章內三言時字明必有是時而後可以行是事非其時一物不可闕也趙復齊曰離者何陰包于陽故麗也中孚亦然中孚者信也惟損亦然損九三一爻以臨其上而陰包其間于是有孚而麗𧰼顯此卦才之美損之道上行益之道下施馮厚齊曰享諸侯享天子之禮二簋者下二陽爻應乎四五有奉之之義故以取𧰼趙汴水曰上卦陰虛不能不資乎下而艮則知止而不妄取下卦陽實為兌知上之不得已而非過求也故說順以奉上上下交信不嫌于為損其下四事有孚基之陽欲盛陰欲衰損陰益陽宜也今九三為乾剛之過上六為坤柔之過損過剛以益過柔庶幾適乎然亦有時而然非損益之常王秋山曰享奉上而上受之之謂二簋言損于下者有時而不可不省約質儉也適其時之不可損則不可以過求于其下也胡雙湖曰簋內方外圓下二陽為底三陰為腹上一陽為蓋初九己事遄往無咎酌損之象傳已事遄往尚合志也尚上通陸公紀曰己事者以其事為己任者也體剛在下為損之初是以事為己任者也損之用在于應時宜其速往尚合衆心吕藍田曰當損之初而位乎下不可緩也故以己之事遄往以益上庶幾合上之志亦不為己甚以失己故其損也酌之而後行游廣平曰事損之事也言損初之實以益四之虛也四之志欲損其疾而初遄往使遄有喜焉故曰尚合志然損下以益上者或失其節則後難繼故必酌損之張紫巖曰初四居艮兌先其志易合且從感速曰遄往鄭東谷曰謂在己所當損之事則宜速往以益上也林剛中曰酌取水也損澤以滋山酌損𧰼徐進齊曰初最下損下太過則其本傷矣必斟酌其義之淺深而不失損己益人之道可也趙復齊曰初為微盈酌損之以就中甚則反虛王秋山曰初剛而在下損初益四正所謂出粟米絲麻以事其上乃處卑下者在己當損之事故速往以奉上乃可無咎按己事作人己之己者得之卦體說而應上小民之急公效命者正在此爻以初為民位也常賦力徵必視為分內當為之事乃能踴躍歡樂盡奉上之誠已事遄往正兌說之象訓止訓輟俱未切爻義或作己疾解亦牽合酌損之當從初九不失己看為是不應于初而為四言之也九二利貞征凶弗損益之象傳九二利貞中以為志也王輔嗣曰柔不可全益剛不可全削下不可無正初九已損剛以順柔九二履中而復損己以益柔則剝道成焉故不可往而利貞進之于柔則凶矣孔仲達曰言九二所以能居而守貞弗損益之由以中為志故損益得其節適也蘇子瞻曰損有可貞之道九二是也程傳二以剛中居柔而說體以柔說應上則失剛中之德故戒利在貞正也征行也離乎中則失其貞而凶矣不自損其剛貞則能益其上若用柔說適足以損之世有雖無邪心而唯知竭力順上為忠者不知弗損益之之義也九居二非正也處說非剛也而得中為善志存乎中則自正矣守中則有益于上矣張子以陽居陰剛德已損故以征則凶本義不變其所守乃所以益上郭白雲曰三損于上足以致益二復損之則過矣項平甫曰損以有過不及故損一益一以求中也若九二六五則既中矣五非不足二非有餘一有增損則失其中矣沈守約曰居說失正是以戒也兌而為震處說而動正不足也胡雙湖曰陽雖弗損而與六五為正應以剛濟柔固未嘗無益之之道按此爻于中爻為震動復為震不正而動于下征凶宜戒矣六三三人行則損一人一人行則得其友象傳一人行三則疑也楊龜山曰陽施隂受受則益施則損以乾之三而索于坤則是三人行而損一人也索之而男女成焉是得其友也乾坤合而損益之道著郭白雲曰三則疑者損之成卦由六三上九之變得其友也三爻雖皆應而非艮兌成卦之主不可言得其友也王童溪曰兌之三爻皆志于益上然初九九二則以剛應柔故三人同行而語其自損之至者則六三也故曰損一人是一人也獨往以應上故艮兌相合此所謂得其友也王秋山曰此成卦之主故爻辭總言一卦之象不言于上而言三者損下為損上則得剛之益非損矣按損之所以得元吉無咎諸美者以有孚也故于主爻發明有孚二字之義得友者交孚也疑則不孚矣損一人而一人行乃成少女少男之體而彼此交孚以卦為損故專主損之一爻言不兼上下之往來也三則疑者下卦過損而三隂則疑于剝不損而三陽則疑于大畜皆無孚象故孔子釋以三則疑者明此卦之交孚惟在于損一益一之間過損不可不損不可也不言二則疑者蒙爻辭之三人而言絪緼媾精致一之義夫子别為引伸非此爻之本義不必牽合六四損其疾使遄有喜無咎象傳損其疾亦可喜也王輔嗣曰履得其位以柔納剛能損其疾者疾何可久故速則有喜有喜乃無咎劉長民曰隂而止滯以成其疾必求陽以散之使遄者謂能來初也蘇子瞻曰遄者初九也損其疾則初之從我也易故遄有喜程傳在損時而應剛能自損以從剛陽也損不善以從善也楊龜山曰六四乘承皆隂偏于隂者也隂陽失其平則為疾四當損時所當損其疾者也楊誠齊曰六四以柔居柔得初陽為應損其疾者也初言遄往四言使遄蓋初之遄實四有以使之也項平甫曰當受益之地而稱損者損己之疾所以受人之益也四能損柔受剛使得速施其益則有喜而無咎合志者得效其忠豈非可喜之事亦字亦初九也徐進齊曰才柔苟止而或怠于從善初剛在下亦難于益己苟非自損其過汲汲然以好善求益為心則應者緩而益者寡能無咎乎凡言有喜有慶者皆內外相應之情也柔過為疾忿欲之類胡雲峯曰下損己以益上當使下亦速有所喜乃無咎六五或益之十朋之龜弗克違元吉象傳六五元吉自上祐也崔氏憬曰元龜直二十大貝雙貝曰朋蘇子瞻曰六五者受益之主而非受益之地也以受益之主而不居受益之地不求益者也不求益而物自益之故曰或或者不知其所自來之辭也十朋之龜則九二弗損之益也龜之益人也豈有以豫人而人亦豈有以取之亦效其知而已六五之于九二無求也自上祐之雖欲避之而不可得故元吉吕藍田曰當損下益上之時以柔中居上天下之益歸焉古者以龜貝為貨十朋之龜利益多也莫之致而至至斯受之故弗克違郭白雲曰六五之辭與益之六二同者損至六五疑于益矣又其反對之義同也趙復齊曰止于至中不求損益然柔有可益之道此益非不足而益如天祐人助之意欲辭之而不可得項平甫曰六五本無待于補九二亦不補之補自上來神天之降祐鄭東谷曰凡曰或益之曰有他吉曰自上祐皆謂不期于得而得之也損之爻唯上得益五非得益者也然五沖虛中順而居尊位雖不期于益必有益之者矣邱行可曰卦似離者皆有龜象頤與損益皆外實中虛所以取象龜也按損三本以益上損四本以益初損益成卦之道也而損以益上為義六五為上卦之主益以益下為義六二為下卦之主皆當受天下之益者也故兩爻辭大同然二爻所以獲益者不第在成卦之主也蓋天下獲益者必先有受益之地兩卦二五皆坤體中德柔順之質能受陽施載而不重滿而不溢故天下之益歸之皆二五之德所自致他爻不能及故其辭極美曰自上祐自外來謂莫知其所自來也或以自上祐為指上九自外來為指初九以初九自六四也說似可通合之或擊之自外來句則此上字外字均不必有所指上九弗損益之無咎貞吉利有攸往得臣無家象傳弗損益之大得志也張子上九本為九三雖為損下其實上行故云弗損益之損終反益益卦損上而益下則可大得志楊龜山曰居損之上損極矣上九陽止乎上能止而有節豈惟可以補過猶可正而有為遊廣平曰得臣無家謂三之致一也郭白雲曰一人行而得其友者上九故無咎貞吉利有攸往是由損下益上其道上行之所致也得臣即得友之義鄭東谷曰上九坤體得乾之施變而為陽則在上者已有餘矣不損乎下而以其有餘者益之非特無咎無所不利也王童溪曰君子之志在于益下而已位人之上先損于下而惟有益于下大得志也項平甫曰得六三之臣損其家而來補于國此上之所以安坐而大得志也三以得上為友上以得三為臣三在下故為臣在內故為家吳草廬曰三獨隂居下專意奉上國爾忘家故曰無家胡雲峯曰弗損益之上與二辭同而意異二當益上之時不損其所守乃所以益上上受益既至則又當推以益下按弗損乃艮止之象益之陽實之施此爻變為臨有敦臨之吉故為大得志得志者不在受益而在益下爻義已盡于弗損益之無咎貞吉利有攸往下又言得臣無家者正明上九所以致此之由而卦辭所以有孚而元吉可貞利往之故全在于九三之損此卦之所以名損也此句不專在本爻之象而在全卦震下巽上中爻坤艮益利有攸往利涉大川彖傳益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行鄭康成曰君以益下為德故謂之益雷動風行猶君出教令臣奉行之故利有攸往利涉大川范蜀才曰此本否卦乾下之初坤為無疆震為喜笑以貴下賤大得民故說無疆孔仲達曰損益得名皆就下而不據上者向秀云明王之道志在惠下故取下謂之損與下謂之益動而驕盈則被損無已動而卑巽則進益無疆天施氣于地地受氣而化生亦損上益下之義其施化之益無有方所薛氏溫其曰損稱損益盈虛益稱凡益之道者損下益上時不獲已然後行之富國實民無時不可故言損則不可無益而不損又何害也胡安定曰利涉大川者君能以仁義之道益下下受其賜則捐軀而報上效命以助君可濟險難蘇子瞻曰涉川者用木之道震巽皆木雷厲而風行故利涉大川程傳風烈則雷迅雷激則風怒交相助益下厚則上安故益下為益五以中正居尊二以中正應之是以中正之道益天下天下受其福慶也張子上巽下動者損上益下之道木以動而巽故利涉大川否九四下而為初九故曰天施地生又曰損上益下又曰自上下下本義損上卦初畫之陽益下卦初畫之隂自上卦而下于下卦之下故為益朱漢上曰坤為衆民也凡利涉大川言木者三益也渙也中孚也皆巽也郭白雲曰益動而巽則無盈滿之纍故日進無疆益裕道也王童溪曰損四海之供奉以益天下之不足益偏在下而民說無疆則益又在上損萬乘之尊嚴以下天下之賢者益偏在下而其道大光則益又在上上下俱享其利故無適而不利焉天施地生指乾坤一索而得震巽長男長女相與用事以言益之功用之大也趙復齊曰中孚益皆中虛中孚木在水上舟行于水益木在震上木之動者亦舟渙唯取木居水上耳損卦論損益盈虛益卦專言益爾陽主行益者隂主得益者張紫巖曰益下不必與之以利饒之以財聖人躬修道德制情性去私欲用中用禮用謙用儉損己以富之下賢以教之益道盡矣鄭東谷曰天先施則地乃生趙汴水曰損彖戒之詳而嚴益卦豫之約而確聖人之情可見矣王秋山曰乾陽本在上而下坤之隂是為人上而屈己待下謙尊而光之道也乾下而初天施也坤上而四地生也天地施生之益無時不然未嘗一息間斷故曰與時偕行胡雲峯曰卦以內為主凡物以下為本損下謂之損益下謂之益而上之損益不與焉厚其本也易外木以生為德易之道生生故重木道木道之行天地之道也朱髙安曰乾坤始交而為震巽春陽布澤盛德在木天道大光萬物亨通時也初九利用為大作元吉無咎象傳元吉無咎下不厚事也陸公紀曰此后稷公劉之功孔仲達曰大作謂興作大事也初九處益之初居動之始有興作大事之端又體剛能斷應巽不違有堪建大功之德故曰利用為大作侯行果曰震為稼穡又為大作益之大者莫大耕植朱漢上曰陽為大震為作初九得乾之始元吉也坤厚也郭白雲曰損為益之始益為損之終當興利之初故利為大作也損益二卦終始相通故其辭意相接損之上九曰無咎貞吉利有攸往益初九言利用為大作元吉無咎所以終利有攸往之辭亦知其大得志也馮厚齊曰益用享帝用凶事用遷國皆大有作為之卦故曰益以興利初九大作之始故以元吉無咎戒之錢啓新曰初合四巽以出震所為大作非小小利益事必盡坤土而耕治之盡坤衆而吉凶與同患之雷厲而長養之風既大行風飛而恐懼之雷益大震使人無不遂其生無不復其性所為如是是謂大作何𤣥子曰初九一爻乾所施于坤而成震者蓋管生物之樞而主益下者也轉否為泰實惟斯時如均田正賦以厚天下之生建學飭紀以正天下之德設官分職以經天下之治布兵設險以衛天下之寧皆是也開天下無疆之益必元吉而後咎可免酌之古酌之今尤酌之後當于時當于事求當于心元吉者大善之謂以功言非以效言也下不厚事下民愚賤不能自厚于所事非陽剛自上來大作而為之所則下何賴焉故必元吉而後無咎卦之損上益下正在此爻也按此爻不宜作受益者說趙復齊所謂陽為行益者得之也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象傳或益之自外來也王輔嗣曰帝生物之主興益之宗出震而齊巽者也六二居益之中當位而應于巽享帝之美在此時也孔仲達曰自外來明益之者從外而來不召而至程傳永貞吉就六二之才言二中正虛中能得衆人之益者也然質本隂柔故戒在常永貞固則吉人為善則千里之外應之六二中正虛己益之者自外而至是也苟為不善則千里之外違之上九求益之極擊之者自外而至是也郭白雲曰損益相須以相成損之上益之初損之五益之二故損上益下其辭相屬而損五益二又大同矣六二柔順中正人之所與故或益之十朋之龜弗克違或者來益而不一之辭五曰元吉此曰永貞吉君臣之道不同故其吉亦異沈守約曰帝出乎震震長子主鬯者也享帝之象蘭惠卿曰六二柔順受益之臣王用之可以享帝獲吉如成湯用伊尹而享天心太戊用伊陟而格上帝王童溪曰以六居二雖正也然震體也震則動動則不常故以永貞戒之馮厚齊曰王九五也趙汴水曰損四以益初本非益二故云或義與損六五同身居臣位與五不同非意得益必永守其正乃可此二之吉也二五為正應故九五用賢享帝薦其明德此五之吉也徐進齊曰自初至五有龜象與損六五同按二即坤之中坤利永貞故曰永貞吉六三益之用凶事無咎有孚中行告公用圭象傳益用凶事固有之也本義六三隂柔不中不正不當得益者也然當益下之時居下之上故有益之以凶事者蓋警戒震動乃所以益之也占者如此乃可以無咎又戒以有孚中行而告公用圭也用圭所以通信語録益用凶事猶書言用降我凶德嘉績于朕邦游廣平曰益則吉矣而用凶事者所謂吉人凶其吉也沈守約曰震體剛直離性炎上圭象徐進齊曰三與上應而以為有凶事者上有或擊之凶而三位又多凶故也李隆山曰益損上益下下卦皆蒙益者也故六三亦曰益之三以隂居陽震動不安有凶象胡雲峯曰以二體則二五各居中以全體則三四並居中故中孚以三四為中此三四稱中行張彥陵曰投之艱難置之盤錯警戒震動之謂也無咎可因是而遷善補過也下二句正言其所以無咎有孚者洗心滌慮誠于體國而不欺中行者履正奉公合于中道而不悖即此便是上通于君處何𤣥子曰凶事得益如征伐凶事也用之而亂可弭遷徙凶事也用之而生可厚說文云凶象地穿交陷其中也三本坤體今變為震地震必陷又中爻變坎亦陷故以凶言互體變坎有孚象震為大塗行象在卦中中行象髙忠憲曰凶事乃三之固有而善受者反以凶事得益為其有孚中行誠信通于上也人能于貧賤憂戚受天之玉成者如此按象傳固有之句得髙氏說始直截切當蓋凶事乃本爻震體之象三居震極風雷相擊所謂震來虩虩震驚百里者也故曰固有之然恐懼致福旋為笑言啞啞故云無咎有孚中行皆從恐懼來此凶事之所以得益也六四中行告公從利用為依遷國象傳告公從以益志也張子本為初六寄位于四居隂體巽所趨在下以為依遷之國人所容信必中行不私然後告必見從鄭亨仲曰坤為國自初之四遷國象程沙隨曰卦體震互坤諸侯象項平甫曰六四自損以益下與初互遷而成益此公劉古公之事也迹若損民而志實益下觀盤庚三篇可見損益之實矣馮去非曰四近君非三比遷國須先告公上既從然後為之不則為擅命徐進齊曰四初為往來之爻有下遷象遷國順下而動也古者建國有不便于民則視民利用遷熊梅邊曰四與初應遷則九四下為初九即損之一人行則得其友也吳敬齊曰四正主于益下者然非君位不敢自專必告于公中行則見從矣何𤣥子曰互坤遷國而再立國象也告公而公即從之損其身以徇人以益下為志者也贊九四下為初九之辭朱髙安曰人情安土重遷難與慮始此爻遷國自四主之不唯民不信公亦不能無疑必平日所行事事合于中道君乃信其益下之志出于至誠也按益以益下為志國之依在民民之依在稼穡四之益下乃依民之所利而利之也或作四依五者似非爻義九五有孚惠心勿問元吉有孚惠我德象傳有孚惠心勿問之矣惠我德大得志也王輔嗣曰為益之大莫大于信為惠之大莫大于心信以惠心盡物之願以誠惠物物亦應之崔氏憬曰惠心及下終不言以彰己功問猶言君雖不言人惠其德則我大得志也程傳五剛陽中正居尊位又得六二中正相應以行其益何所不利陽實在中有孚之象沈守約曰巽而為艮艮其背惠心勿問之象卦變為頤如天地養萬物朱漢上曰問而後惠惠亦狹矣勿問則吉之至善王童溪曰至誠惠益之心行于不言之間勿問云者所以設後世人君行小惠者戒吕東萊曰苟惠民而先問民之感與不感是計功利非誠心也龍麟洲曰上有孚五中實象下有孚卦中虛象上惠巽順象下惠坤順象梁孟敬曰九五不言益而為益之大者如天施地生而其益無方也春生秋殺隂潤陽煦天之心固無私也而生物之不齊天不與知蔡虛齊曰有孚之施于下者在我只為心自下之受此施者目之則為德潘去華曰人君施惠于民不必求之物不必損于己唯求之心而惠自下矣九五陽剛中正故曰有孚惠心以中感中以正感正遂有六二之有孚張彥陵曰大得志非以民惠我而得志以我足以致民惠我為得志也上九莫益之或擊之立心勿恆凶象傳莫益之偏辭也或擊之自外來也孔仲達曰勿猶無也張子未嘗損己而云莫益之作易者因益卦而言爾本義莫益者從其求益之偏辭而言也若究言之則又有擊之者矣張紫巖曰雷風為恆風雷為益上九處風雷極處故有勿恆之失沈守約曰以剛處極居亢乘尊己盈也是以莫益之人道惡盈衆忿所歸是以或擊之盈不知止求益得損凶咎之來非意所及蓋風雷相資極則相薄而為災上居巽極求益不已三居震極用在凶事過極相與莫益或擊巽變為坎入于坎陷溪壑無厭之欲也巽為躁卦坎為心病處極而躁心險而病立心勿恆之象卦變為屯動乎險中是以凶王秋山曰卦取損上益下損陽有餘益隂不足今上九反是以陽有餘處退巽之極居無位之地非有益于人者又益窮則變乃挾其剛强反益之道專利于己非徒無益于人而又損之故為衆所嫉不唯無益之者且有起而擊之者矣胡雙湖曰恆九三亦巽體亦有不恆其德之戒巽為不果為進退為躁其立心勿恆之意歟擊下互艮手象胡雲峯曰二不求益而或益之自外來也上求益而或擊之亦自外來也孰有以來之五由中心之有孚上由立心之勿恆吉凶之道未有不自心生者俞石澗曰損下之道時暫而已不可恆久益彖傳云日進無疆其益無方益下之道則宜恆久上居巽極立心不恆凶道也易外風而浚則莫益雷而振則或擊浚于下必振于上浚者益下之反振者損上之反浚民之膏血以自肥振己之淫威以自賊未見其能自全也擊者振恆也周易孔義集說卷十一
