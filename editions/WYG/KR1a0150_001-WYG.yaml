body:
  text: 周易孔義集説卷一光禄寺卿沈起元撰上經乾下乾上乾元亨利貞彖傳大哉乾元萬物資始乃統天子夏傳曰元始也亨通也利和也貞正也九家易曰乾者純陽天之象元者氣之始也孔仲達曰乾健也天之體以健為用聖人欲使人法天之用不法天之體故名乾不名天也胡安定曰乾者剛陽至健之氣元者始生長養之德言天以一元之氣生成萬物而无有限極故曰大哉程傳上古始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦重乾為乾乾天也天者天之形體乾者天之性情元亨利貞惟乾坤有此四德在他卦則隨事而變焉四德之元猶五常之仁偏言則一事專言則包四者乾元統言天之道也天道始萬物物資始于天也本義貞正而固也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天朱子語錄元者生意在亨則生意之長在利則生意之遂在貞則生意之成蔡虚齋曰天地間凡大者為始始者便是大乾元之大亦以萬物資始處見也顧玉停曰讀大哉乾元句可見大乃贊乾之元不可以大訓元矣按元者生氣唯其生故可訓始萬物之生即其始也唯其生故又訓善生氣無不善也雲行雨施品物流形程傳言亨也楊誠齋曰傳言元利貞而獨不言亨者蓋雲行雨施氣之亨也品物流形形之亨也項平甫曰元象一動則屯而為雲解而為雨雲雨皆生于天一之水故自元而亨者象之俞石澗曰前言萬物此言品物元為稟氣之始未可區别故總謂之萬亨則流動形見而洪纎高下各有區别故特謂之品大明終始六位時成時乘六龍以御天荀慈明曰六爻隨時而成乾孔仲達曰乾之為德依時乘駕六爻之陽氣以控馭天體此乃申明乃統天之義上文以至健元始明乾德故云乃統天此明乘駕六龍各分其事故云以御天侯行果曰大明日也六位天地四時也六爻倣彼而作也大明以晝夜為始終六位以相竭為時乘言乾乘六氣而陶冶變化運四時而統御天也程傳天道終始乘此六爻之時乃天運也張子乾之四德終始萬物迎之不見其首隨之不見其後然推本而言當父母萬物本義始即元也終謂貞也不終則无始不貞則无以為元也趙復齋曰初至上為六位九為龍自元而貞德之序也由貞而元德之妙也乘六龍者非乾元乎朱漢上曰雲雨坎也大明離也乾卦而舉坎離者六爻坎離錯居坎離者天地之用也雲行雨施坎之升降也大明終始離之往來也所謂亨也萬物殊品流動分形隂陽異位以時而成六位循環萬物生生而不窮者乎此贊亨也胡滄曉曰大明節見亨之由于元也首出節見利貞之由于元也皆所以見元之大也此二節並无一語黏著人事大明二字專言日象按大明二字自王輔嗣訓詁未明程傳有大明乾道之終始則見卦之六位以時而成云云當時已有疑之者朱子亦謂此處説得果是鶻突然程傳本以此節為天運不貼聖人説惟本義以此節為聖人之元亨首出節為聖人之利貞後儒因之而亦有以一章中忽言天道忽言聖人文義欠順疑為錯簡或移大明節于乃利貞之下或移大明節于首出節之後以便將乾道聖人分段疏説皆未免强經以就傳也今觀孔氏侯氏趙氏朱氏皆以此節為釋乾道而大明為離日則侯氏朱氏之言尤為的當攷晉彖傳順而麗乎大明禮記大明生於東是大明為日經有明文可據蓋乾元為天地之生氣萬物之生非雨以潤之日以暄之則生機无由而暢元之亨亨以此也大明終始即日之一日一周即天行之健元之運也而一歲四時皆由日月往來而成六爻即四時之象也故曰六位時成此六位无非乾陽即无非乾无一元貫於六位而天道以次而行若御之者然是亨之通與利之遂貞之成皆在時成一句内故下文接言變化各正以乃利貞束之朱氏所為坎離者伏象也初二三為二陽夾一隂離象四五六為二隂夾一陽坎象六十四卦六爻所同而乾為六十四卦之首彖言天道之大用故舉以明之坎離日月也易字篆文從日從月可見日月為隂陽之精則日月為全易之本而月受日光日可以該月孔聖所以特提大明終始以明乾元之用也周易經傳無一字泛設玩辭者詳之乾道變化各正性命保合太和乃利貞本義變者化之漸化者變之成物所受為性天所賦為命太和隂陽會合冲和之氣也各正者得于有生之初保合者全于有生之後此言乾道變化无所不利而萬物各得其性命以自全以釋利貞之義也語錄元不生于元而生于貞蓋天地之化不翕聚則不能發散也此理循環不窮脗合無間不貞則无以為元也朱漢上曰太和者相感絪緼之氣天地之所以亨也各正性命保之而存合之而聚項平甫曰乾道變化即時乘六龍也各正性命即以御天也乘隂陽來往之變以御資始流形之化使飛走動植各盡其正性稚壯老死各極其正命所謂物之大利者釋利字也曰各者成乎萬也曰合者歸乎一也萬者利之盡一者貞之至乾之六陽翕而成坤保神于靜合氣于漠以固太和之本以厚乾元之復此屬貞字所保之和即性命之根極也推其本統言之則曰乾元極其變化言之則曰乾道始乎乾元終乎太和萬物出于元入于元此元之所以為大也林次厓曰各正性命是利保合太和是貞向之資始于元流形于亨者今則各效法象各成形質而性命於是乎各正既而愈斂愈固生意凝蓄而不滲漏化機内藴而不外見則太和于是保合矣來矣鮮曰就各正言之則曰性命雖以理言而不離乎氣就保合言則曰太和雖以氣言而不離乎理其實非有二也按太和即元也元在貞内故曰保合首出庶物萬國咸寧劉子珪曰陽氣為萬物之所始故曰首出庶物朱漢上曰乾為首震生萬物積震成乾首出乎庶物之上易外乾之元所謂帝也乾元之出見于復帝之出見于震元者萬物之所以為性命帝者萬物之所以為出入者也乾為首首出者帝出也帝為庶物之主故曰萬國咸寧按此二語諸儒作聖人説固無不可但玩文言雲行雨施天下平也二語則雲行句固言乾之元亨天下平即申言萬國寧若以上句言乾道下句言君道无此文義故以首出二句連上三節總釋乾之四德証之文言尤合程傳云乾道首出庶物而萬彚亨於文言亦云隂陽敷暢天下和平之道皆未貼聖人言也初九潛龍勿用象傳潛龍勿用陽在下也沈雲禎曰龍假象也天地之氣有升降君子之道有行藏龍之為物能飛能潛故借龍以比君子之德也孔仲達曰第一言初上當言末六言上則初當言下不言一與下者從無而入有不言六與末者欲明位居卦上也崔氏憬曰九者老陽之數動之所占故陽稱九程傳龍之為物靈變不測故以象乾道變化陽氣消息聖人進退初九在一卦之下為始物之端陽氣方萌聖人側微若龍之潛隱未可自用當晦養以俟時吕東萊曰乾之初九曰潛龍勿用坤之初六曰履霜堅氷至陽者善之𩔖也隂者惡之𩔖也善端初發且要涵養惡念初生便須剪除呉草廬曰初二為地初地之下猶龍之潛伏于地下而未出見也胡雲峯曰乾初曰陽在下坤初曰隂始凝聖人扶陽抑隂之意已見言表梁孟敬曰乾純陽之卦而取象于龍故夫子于文言皆以聖人事明之觀之六爻則象之所示占之所決夫人可用如初九潛龍在聖人則方居側微也在君子則遯世无悶也在學者則養正于蒙也以是而推其用何不可哉姚承菴曰凡卦爻辭占不過占此辭耳其取象于潛見者言必如龍之潛龍之見而後可非必上半為象下半為占也九二見龍在田利見大人象傳見龍在田德施普也鄭康成曰二于三才為地道地上即田故稱田以三畫卦言于三才為人道得稱大人陽大隂小故大謂九孔仲達曰陽氣發見故曰見龍田是地上可營為有益之處陽氣發在地上故曰在田初之與二俱為地道二在初上所以稱田陸君陽曰陽氣見于田則生植利于民聖人見于世則教化漸于物程傳出見于地上其德已著以聖人言之舜之田漁時也利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤大德之君九五也乾坤純體不分剛柔而以同德相應本義九二剛健中正出潛離隱澤及于物物所利見朱漢上曰二變為離離為文文章炳明見龍也如日下照施及于物者普矣郭兼山曰大人者其道大之人也九三君子終日乾乾夕惕若厲无咎象傳終日乾乾反復道也鄭康成曰三于三才為人道有乾德而在人道君子之象王輔嗣曰三不中之位上不在天未可以安其尊下不在田未可以寧其居此危地也以其重剛不息故能乾乾惕若孔仲達曰居不得中故不稱大人九三所居之位實有危厲文言云雖危无咎是實有危也若字宜為語辭程傳進退動息必以道也本義重剛不中居下之上乃危道也然性體剛健有能乾乾惕厲之象蔡季通曰下乾終而上乾繼乾乾之象乃健而不息也趙復齋曰内卦已盡乃日之終六而方三未盈也三而非六不亢也未盈故日新无已不亢故危而无咎項平甫曰自上而下曰復自下而上曰反三之上下皆得純乾故曰反復道龔泉峯曰君子九象終日三象三下卦之終故言終夕亦日之終也錢啓新曰君子在人位盡人道全體乾德居下乾之終應上乾之終有終竟一日自日而夕之象吳覲華曰九三言君子就人身上説龍德龍德剛健晝夜无息君子終日乾乾又夕惕若方是真龍德合訂乾乾惕若即虞書危微意乃聖賢相傳心法獨于三爻發之者三四于三才為人位三居下卦之上尤為危地也其實潛見飛躍无往而非乾惕九四或躍在淵无咎𧰼傳或躍在淵進无咎也石徂徠曰爻云或躍无咎夫子謂必須進故加一進字以決其疑以進釋躍字張子處隂故曰在淵本義躍者無所緣而絶於地特未飛耳淵者上空下洞深昧不測之所龍之在是若下于田或躍而起則向乎天矣九陽四隂居上之下改革之際進退未定之時也易山齋曰淵卑於田二言在田今反在淵者淵乃龍之所宅非在田之比在田不能變在淵有可變之道也已離下體故謂之躍猶在上體之下故謂之在淵項平甫曰劉牧謂在淵為藏非也龍之得水猶人之得時也初九之藏乃在地下非在淵也吳草廬曰在淵者謂將躍而猶在於淵蓋言其將然故為未定之疑辭而稱或邱瓊山曰九為陽陽動故曰躍四為隂隂虚故象淵吳覲華曰四在外卦已是出為世用謂之潛已非可潛謂之飛尚未得飛所以躍而曰或正是兩在不測之境淵者空洞靜深可飛可躍不得而囿故必在淵按四在三畫之卦為地位故有淵象然得水故與潛異四有伏坎故為得水九五飛龍在天利見大人𧰼傳飛龍在天大人造也鄭康成曰五于三才為天道天者清明无形而龍在焉飛之象也虞仲翔曰五體離離為飛五在天故飛龍在天孔仲達曰言九五陽氣盛至于天故云飛龍在天此自然之象猶若聖人有龍德飛騰而居天位為萬物所瞻覩程傳進位乎天位也聖人既得天位則利見在下大德之人與共成天下之事天下固利見夫大德之君也本義剛健中正以居尊位如以聖人之德居聖人之位造猶作也吳草廬曰六畫之卦五上為天五為上卦之人位故曰大人按虞氏所云五體離者變象也上九亢龍有悔象傳亢龍有悔盈不可久也蘇子瞻曰夫處此者豈无无悔之道哉故言有者皆非必然者也本義亢者過于上而不能下之意也陽極于上動必有悔朱漢上曰上九變兌兌為毁折亢滿之累也盈極則虚不可久也焦弱侯曰上天際之極龍之居杳㝠而不能為雨者故曰亢劉氏濓曰陽極盛而隂生龍既飛而思潛此自然之理故曰有悔吳覲華曰時值其亢龍不能違聖人值其亢聖人不能違惟聖人善憂其悔時雖亢而不窮于亢高忠憲曰此言時位非言聖人用九見羣龍无首吉象傳用九天德不可為首也朱子曰用九用六當從歐公説為揲蓍變卦之凡例蓋陽爻百九十二皆用九而不用七隂爻百九十二皆用六而不用八也特以乾坤二卦純陽純隂而居篇首故于此發之使遇此卦而六爻皆變者即此占之蓋剛而能柔吉之道也林次厓曰乾變之坤雖為坤之所為然本自剛來與本自坤者不同坤變之乾雖為乾之所為然本自柔來與本自乾者不同故乾无首之吉終不可同于牝馬之貞坤永貞之利終不可同于乾之元亨聖人不教人即所變之卦以考其占而別著自此至彼之象占者正以其有不可同者耳谷拙侯曰一歲首春一月首朔似有首矣然春即臘之底朔即晦之極渾渾全全要之莫知所終引之烏有其始更无可為始也用九者全體天德循環不已聖人之御天者此也安溪觀彖乾之六爻皆變則陽而隂矣如羣龍之身皆見而獨不見其首此天道之所以藏諸用人事所以固其基凡剛柔動靜屈伸進退理皆如之不可為首與不可為典要相似言天之為德渾然不見其端始也在天者隂陽則无始動靜則无端在聖人則寂然不動感而遂通也德濟齋曰龍者承六爻而言也无首者循環為用也六位時成循環不定六虚之用用以虚也如當潛則潛非潛為首也當躍則躍非躍為首也六爻皆然聖人惟能運用天道各當其時无少止息則吉也六爻不言吉此獨言吉者以其剛而能柔循環而无止息也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖傳至哉坤元萬物資生乃順承天孔仲達曰至謂至極言地能生養至極與天同也天亦至極但包籠于地故乾言大哉坤言至哉吕藍田曰乾之體大矣坤之效乾之法至乾之大而後已故乾元曰大哉坤元曰至哉本義始者氣之始生者形之始順承天施地之道也潘去華曰隂之純則順之至順之至者順乎陽也高忠憲曰坤之元即乾之元坤透體皆乾乾元在坤故曰坤元資生者生其所始也一元之氣於是乎成形坤厚載物德合无疆含𢎞光大品物咸亨孔仲達曰凡言无疆有二義廣博長久含𢎞二句言亨也程傳以含𢎞光大四者形容坤道猶乾之剛健中正純粹精也三无疆不同德合无疆天之不已也應地无疆地之无窮也行地无疆馬之健行也游定夫曰其靜也翕故曰含𢎞含謂无所不容𢎞謂无所不有其動也闢故曰光大光言无所不顯大言无所不被四者坤元之德也德合无疆合乎天也牝馬地𩔖行地无疆柔順利貞干令升曰行天者莫如龍行地者莫如馬孔仲達曰釋利貞也程傳坤乾之對也四德同而貞體則異乾以剛固為貞坤則柔順而貞牝馬柔順而健行故曰牝馬之貞行地无彊謂健也非健何以配乾未有乾行而坤止也其動也剛不害其為柔也語錄利字不聨牝馬為義如云利牝馬之貞則坤便只有三德郭白雲曰乾為馬非坤也坤取牝馬者欲合乾德无疆故有取于馬合乾而非乾故曰牝馬項平甫曰順者坤之元行者坤之亨利者宜此而已貞者終此而已郭兼山曰坤配乾是以有元有亨有利獨无剛德以終之故為牝馬之貞而已林次厓曰牝馬地𩔖順也行地无疆順而健也故承之曰柔順利貞言此即坤德之順健云爾不敢自主承天施以生萬物柔順也承天生物直至有終利貞也君子攸行先迷失道後順得常西南得朋乃與𩔖行東北喪朋乃終有慶安貞之吉應地无疆王輔嗣曰西南致養之地與坤同道者也故曰得朋東北反西南者也故曰喪朋隂之為物必離其黨之于反𩔖而後獲安貞吉孔仲達曰喪朋象人臣離其黨而入君之朝女子離其家而入夫之室崔氏憬曰西南巽離兌皆隂與坤同類故曰得朋東北艮震乾坎皆陽與坤非𩔖故曰喪朋得朋猶迷于失道喪朋乃順而得常安于承天之正故曰安貞吉程傳隂從陽者也待唱而和隂而先陽則為迷錯居後乃得其常也西南隂方東北陽方離喪其朋𩔖乃能成化育之功而有安貞之吉邱行可曰坤道主成成在後故先乾而動則迷而失其道後乾而動則順而得其常項平甫曰先迷後得主利言利在得主不利為主也朱漢上曰得君者臣之慶得親者子之慶得夫者婦之慶三者未有不離其朋𩔖而得者也故曰乃終有慶張紫巖曰君造始臣代終人臣立事建業以有為于下失朋儕之佐有不能獨勝其任者矣故西南以得朋為利若立于本朝左右天子苟非絶𩔖忘私其何以上得君心合德以治天下哉然則得朋臣之職也喪朋臣之心也以是心行是職非曰今日得之明日喪之也喪朋云者喪其私云耳故曰東北喪朋隂與隂為𩔖曰𩔖行生化之功始終不息曰有慶楊慈湖曰君先臣後夫先妻後當後而先為迷迷為失道君為臣主夫為妻主後而得主利莫大焉林次厓曰先迷失道是以失道解先迷後順得常是以順解得常鄭孩如曰得朋者率𩔖以從陽以人事君之道也喪朋者絶𩔖以從陽渙羣朋亡之道也喬還一曰乾惟合坤故得主得主故東南西北皆利方得朋喪朋皆吉事妻道也臣道也鄧盱眙曰四時天行四方地維故乾以元亨利貞名其行坤以東南西北表其維合訂此釋君子有攸往以下卦辭按文王繫辭皆言人事示人法天之學也乾道廣大故祗以元亨利貞四德言天道而未及人事所以尊乾也至坤卦特以君子有攸往句明示天下學易之道且以見六十四卦繫辭之㫖無非為君子謀也八卦方位始見于此説者因邵氏易有伏羲先天卦位遂以此為文王後天卦位然漢晉唐人説易未有及先天卦圖者于經亦未有所據安知文王所言卦位非即伏羲之卦位歟初六履霜堅氷至𧰼傳初六履霜隂始凝也馴致其道至堅氷也朱子案魏志象曰作初六履霜當從之王輔嗣曰隂之為道本于卑弱而後積著者也故取履霜以明其始孔仲達曰初六隂氣之微似初寒之始但履其霜微而積漸堅氷乃至馴猶狎順也言順其隂柔之道習而不已乃至堅氷也司馬温公曰履霜堅氷君子攘惡于未芽杜禍于未萌本義隂陽者造化之本不能相无而消長有常亦非人所能損益然陽主生隂主殺則其𩔖有淑慝之分焉故聖人作易于其不能相无者既以健順仁義之屬明之而无所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉馴順習也朱漢上曰一隂生于午剝乾之初也五隂而霜降六隂而堅氷坤之初六五月之氣姤卦也一隂之生始凝于下井中之泉已寒積而不已至坤上六則水寒成氷是以君子觀所履之微而知氷霜之漸蔡節齋曰履象初霜象六諸爻曰足曰趾曰拇曰履皆取在下而象初也王伯厚曰乾初九復也潛龍勿用即閉關之意坤初六姤也履霜堅氷即女壯之戒胡雲峯曰上六曰其道窮也由初六順習其道以至于窮耳兩其道字具載本末經曰堅氷至要其終也傳曰至堅氷原其始也觀彖天地者萬化之源也然天主神地主形則有陽明隂濁之分焉在人則神者心也形者體也心為主則形為神役而萬善以生體為主則神反為形役而衆惡以起君子小人内外消長自此分君父臣子之否泰順逆自此辨也六十四卦冒天下之道者其義悉自乾坤來也六二直方大不習无不利𧰼傳六二之動直以方也不習无不利地道光也孔仲達曰以此爻居中得位極于地體故盡極地之義生物不邪直也地體安靜方也无物不載大也程傳二隂位在下故為坤之主統言坤道中正在下地之道也以直方大三者形容其德盡地之道矣由直方大故不習而无所不利不習謂其自然在坤道則莫之為而為在聖人則從容中道乾坤純體以位相應二坤之主故不取五應不以君道處五也乾則二五相應王介甫曰六二之動者六二之德動而後可見也因物之性而生之是其直也成物之形而不易是其方也沈守約曰坤至柔而動也剛直也至靜而德方方也含萬物而化光大也坤之道至簡也至靜也承天而行順物而成初无假于修習也項平甫曰乾以九五為主爻坤以六二為主爻蓋此二爻為既中且正又五在天爻二在地爻正合乾坤之本位故乾于五言乾之大用而二止言乾德之美坤于二言坤之大用而五止言坤德之美六二蓋全具坤德者孔子懼人不曉六二何由兼有乾直故解之曰六二之動直以方也言坤動也剛所以能直也又曰地道光也言地道主六二猶乾之九五言乃位乎天德也葉爾瞻曰直以方看一以字六二之動方矣然由其存于内者直是以見乎外者方矣來矣鮮曰以本爻論得坤道之正則无私曲故直居坤之中則无偏黨故方内直外方所以大也唐凝菴曰直而大者乾之德也坤以乾之德為德不習而无不利坤以簡能也易外坤本不動六二言動蓋以靜不能從乾動所以從乾也又一為靜二為動乾坤皆靜于一而動于二初之潛之凝皆靜也二之見之直以方皆動也坤之二以動而見其直以方坤元以動為至萬物之資生生于動也不習者效法乎乾乾之所至坤亦至之順之至也不必習而始利也六三含章可貞或從王事无成有終象傳含章可貞以時發也或從王事知光大也王輔嗣曰三處下卦之極而不疑于陽不為事始須唱乃應待命乃發含美而可正者也故曰含章可貞有事則從不敢為首故曰或從王事不為事主順命而終故无成有終孔仲達曰以隂居陽是陽事猶在故曰含章章即陽之美程傳夫子言為臣處下之道必含晦其美乃正而可常然義所當為者則以時而發非含藏終不為也或從王事而能无成有終者唯其知之光大故能含晦淺暗之人有善唯恐人之不知豈能含章張紫巖曰三四得互坤中位一以光大一以无咎三含章蓋中德之積耳趙復齋曰以隂含陽其文炳也二色成章隂陽雜也陽施于隂隂則從之陽倡于始隂則終之鄭東谷曰坤純隂惟三五為陽位三曰含章五曰文在中謂其以隂柔靜順而中藴陽明之美胡雲峯曰六不足于貞而剛足以守有可貞象陽主進隂主退乾九三陽居陽故曰乾乾主乎進也坤六四隂居隂故曰括囊主乎退也乾九四陽居隂坤六三隂居陽故皆曰或進退未定之際也特其退也曰在淵曰含章惟進則皆曰或聖人不欲人之易于進也如此三多凶故聖人于乾坤之三爻辭獨詳焉錢啓新曰三際内外卦之交或從王事之象易外含章可貞含陽之章而為隂之貞也无成者含之于始有終者含之于終彖曰含𢎞唯含𢎞故光大爻曰含章唯光大故章以時發者含為發之本含而以時發之故品物得以咸亨非時之發為物災害以不能含也六四括囊无咎无譽𧰼傳括囊无咎慎不害也本義六四重隂不中故其象占如此蓋或事當謹密或時當隱遯也張紫巖曰坤六五得臣之正體四未得位唯含養厥德靜以待時進而至五臣道亨矣吳草廬曰括結之也坤虚而容物囊之象也唐凝菴曰坤布虚中囊象重隂之闔括象高忠憲曰括囊者君子之隱也非為在位者言也合訂四位已入重卦六以隂居隂重隂閉塞之時也然在上卦之下處得其正為能晦藏其知隱括不露六五黄裳元吉𧰼傳黄裳元吉文在中也王子邕曰坤為文五在中故曰文在中孔仲達曰坤為臣道五居尊位是臣之極貴者能以中和居于臣職故云黄裳元吉蘇子瞻曰稱裳以明其臣稱黄以明其德以隂而有陽故曰文在中本義黄中色裳下飾六五以隂居尊中順之德充諸内而見于外張南軒曰坤五非人君之所處故无君義李隆山曰坤六爻无君位坤六五之應在乾之九五與諸卦六爻自相配應例不同先儒謂五君位以隂居之為莽新武氏之𩔖此賊教之大者蔡節齋曰黄象五裳象六林黄中曰乾為衣坤為裳五雖尊配乾為下矣易外衣在上无物足以尚之故乾為衣裳者有衣以尚之裳為衣所尚有臣與妻之道故坤為裳又衣外而裳内衣使人見裳不使人見黄而為衣文之在外也黄而為裳文之在中也𤣥者乾之元黄者坤之元君垂其𤣥衣后垂其黄裳而天下治黄裳者鞠衣六服之一按孔子以中正定爻之德于此爻首見中字上六龍戰于野其血𤣥黄象傳龍戰于野其道窮也干令升曰隂在上六十月卦也爻終于酉而卦成于乾乾體純剛不堪隂盛故曰龍戰戌亥乾之都也故稱龍焉孔仲達曰即説卦云戰乎乾也戰于卦外故曰于野隂陽相傷故其血𤣥黄侯行果曰坤十月卦也乾位西北又當十月隂窮于亥窮隂薄陽所以戰也李去非曰曰龍戰則是乾來戰不以坤敵乾也馮厚齋曰主龍而言則知隂不可亢亢則陽必伐之戒隂也以戰而言則知隂不可長長則與陽敵矣戒陽也林黄中曰主陽而言戰故曰龍主隂而言傷故曰血用六利永貞𧰼傳用六永貞以大終也本義隂柔不能固守變而為陽則能永貞矣初隂後陽故曰大終胡雲峯曰坤安貞變而為乾則為永貞安者順而不動永者健而不息乾變坤剛而能柔坤變乾雖柔必强陽先于隂而陽之極不為首隂小于陽而隂之極以大終何𤣥子曰乾道主元故曰乾元用九坤道主貞故言用六永貞程敬承曰陽之極不為首是无首也隂之極以大終是无終也終始循環變化无端造化之妙固如此易外乾用九以无首為大始坤用六以永貞為大終无首者无始也无始者大始也乾如圜循之无端終不可為尾始亦不可為首故其象為龍坤之終終其乾之用耳代乾之終故曰大終總論項平甫曰易以變易為書用九用六以其能變也故爻辭多取變象為言至本爻義重者自從本爻不必盡然也然乾之二五與坤之二三皆明用變象乾二變離為乾之同人故為文明為利見皆離之象也乾五亦變離為乾之大有故為飛為利見亦離之象也坤二變陽為乾在坤中有内直外方之象孔子釋之曰六二之動直以方也言不動則有方而無直也陽為大故曰直方大隂得陽則不孤故曰德不孤坤三變艮為謙其從王事即謙之勞也有終即謙之有終也陽為光為大故曰知光大也皆變象之明者略舉之以例諸卦焉震下坎上中爻坤艮王童溪曰繼天地以用事者長子也其次為坎又其次則艮此三男相繼以効其勞于天造草昧之日闢天荒理地脉發初性而盡開物成務之道也陸庸成曰乾坤之後即繼以屯蒙蓋天開于子地闢于丑人生于寅是三才之始也天地開闢之初人值其時為洪荒之世故曰屯為混沌之民故曰蒙按震為一索所得帝出乎震萬物隨之而出故乾坤之後第一卦然不即用重震者重震則有震驚恐懼之意非發生之象此重卦與經卦之不同也屯元亨利貞勿用有攸往利建侯彖傳屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧王輔嗣曰剛柔始交是以屯也不交則否故屯乃大亨也孔仲達曰坎為險震為動震在坎下是動于險中初動險中故屯難動而不已將出於險故得大亨貞也吕藍田曰勿用有攸往久之以有待也利建侯各付其所主也程傳以雲雷二象言之則剛柔始交也以坎震二體言之動乎險中也始交未能通暢則艱屯故云難生又動于險中為艱屯之義所謂大亨而貞者雷雨之動滿盈也隂陽始交則艱屯及其和洽則成雷雨滿盈于天地之間生物乃遂屯有大亨之道也所以能大亨由夫貞也非貞固安能出屯人之處屯亦在夫貞固也天造草昧言時事本義屯難也物始生而未通之意故其為字象􅋄穿地始出而未申也能動雖可以亨而在險則宜守正未可遽進故為大亨而利于正但未可遽有所往耳又初九陽居隂下為成卦之主是能以賢下人得民而可君之象始交謂震難生謂坎天造猶言天運草雜亂昧晦㝠也隂陽交而雷雨作雜亂晦㝠塞乎兩閒天下未定名分未明宜立君以統治而未可遽謂安寧之時也楊誠齋曰物屯求亨時屯亦求亨然時屯求亨其道有三惟至正為能正天下之不正故利貞惟不欲速為能成功之速故勿用往惟多助為能克寡助故利建侯胡雲峯曰屯蒙繼乾坤之後上下體有震坎艮乾坤交而成也初以一陽居隂為成卦之主元亨震之動利貞為震遇坎而言也非不利有攸往不可輕用以往也易言利建侯者二豫建侯上震也屯建侯下震也震長子震驚百里皆有侯象張清子曰乾坤之後一索得震為始交再索得坎為難生而承上接下之辭所以合震坎之義而釋其為屯也蔡虚齋曰利貞勿用有攸往二句一意故彖傳只釋利貞來矣鮮曰勿用者震性多動故戒之險難在前中爻艮止勿用攸往之象震一君而二民建侯象草者如草不齊震為蕃草之象也昧者如天未明坎為月天尚未明昧之象坎水内景不明于外亦昧之象也何𤣥子曰震之未動坎氣為雲鬱結而未成雨所以為屯動則雲化為雨屯之鬱結者變而為解而未亨者果大亨矣易外屯春也屯為春之始春篆作萅以草之出為象蓋春不可見見于草草始生而昧為春明則為夏合訂震之德為動動故亨而卦辭爻辭俱以躁動為戒者惟能靜乃能動也按屯訓盈字之本義難者卦中之一義易外證之以春而卦義盡矣凡言建侯必有坤以有土有人也初九磐桓利居貞利建侯𧰼傳雖磐桓志行正也以貴下賤大得民也虞仲翔曰震起艮止動乎險中故磐桓得正得民故利居貞王輔嗣曰處屯之初動則難生不可以進故磐桓也息亂以靜守靜以侯安民在正𢎞正在謙屯難之世隂求于陽弱求於强民思其主之時也爻備斯義宜得其民張子磐桓猶言柱石磐磐石也桓桓柱也謂利建侯如柱石在下不可以動然志在行正也楊龜山曰行一不義殺一不辜得天下不為所謂正也文王三分有二可謂大得民也而猶服事商者亦行正而已項平菴曰屯以初九為主故爻辭全𩔖卦辭朱漢上曰陽貴隂賤坤衆為民九退居初以貴下賤大得民也胡雲峯曰文王卦辭有專主成卦之主而言者周公首於此爻之辭發之卦主震震主初磐桓即勿用有攸往利居貞即利貞卦言利建侯者其事也爻辭利建侯者其人也來矣鮮曰磐大石中爻艮石象桓大柱震陽木象也八卦正位震在初爻之極善者震本欲動而艮止不動有柱石欲動不動之象雖磐桓不進而拳拳有濟屯之志既有救人之心又有守己之節濟屯之功德備矣錢啓新曰初雖震體而居雜撰艮坤之下既如石磐于地而不可動又如柱立於磐而不可移磐如泰山之亘地而安不可搖桓如大將之當關而威不可犯驚逺懼邇霹靂震動事業全從山嶽鎮定心術中流出故利高忠憲曰國之柱石鎮定不搖居貞如是利建如是之侯也象傳言雖磐桓居貞未有作為而志行之正下賤之誠能大得民而可建侯也按象傳正字始見於此以九居初故為正孔傳以位為志故曰志行此傳例也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象傳六二之難乘剛也十年乃字反常也九家易曰二從初即逆應五順也去逆就順隂陽道正虞仲翔曰震為馬為作足二乘初故乘馬班躓也馬不進故班如王輔嗣曰㓂謂初也志在于五不從于初故曰女子貞不字孔仲達曰此因六二之象以明女子婚媾之事如有人逼近於强雖逺有外應未敢輕進被近者所陵經久之後乃得與應相合是知萬事皆象於此非唯男女而已諸爻男女之象義皆然程傳初為賢明剛正之人而為冦以侵逼于人何也曰此自據二以柔乘剛而取義更不計初之德何如易之取義如此本義字許嫁也禮曰女子許嫁笄而字六二隂柔中正有應于上而乘初剛故為所難而邅回不進然初非為冦也乃求與已為婚媾耳但已守正故不之許至于十年數窮理極妄求者去正應者合而可許矣耿希道曰志在于逺故乘馬而欲進難生于近故班如而有待都聖與曰女子臣子未受命之象馮時行曰二欲應五而不得應屯之象也自已行藏人得而制之者隂柔故也吳草廬曰二三四互坤坤數十過坤十數則逢五正應而許嫁矣胡雲峯曰屯者隂陽之始交二應五四應初皆曰婚媾取隂陽之始交也唐凝菴曰震馬能行撰艮止之班象程敬承曰不字謂不字于初也乃字謂字于五也乃字甚有味非至十年不得字也貞之至也易外易造端于夫婦故屯言婚媾蒙言納婦亦咸恒之象也按初為濟屯之主柱石之侯方欲羅綱人才共濟經綸六二中正之賢初之所急求也故曰匪冦婚媾六二自有正應不肯以初之得時用事而遂為苟合故曰貞六三即鹿无虞惟入于林中君子幾不如舍往吝𧰼傳即鹿无虞以從禽也君子舍之往吝窮也虞仲翔曰即就也虞謂虞人艮為山坎為藂木上下故曰林中震為麋鹿又為驚走故曰惟入林中三應于上之應歴險不可以往程傳六三以柔居剛柔既不能安屯居剛而不中正則妄動雖貪于所求既不足以自濟又无應援將安之乎如即鹿而无導之者則惟陷入林中君子見事之幾微不若舍而弗逐往則徒取窮吝而已事不可而妄動以從欲也猶无虞而即鹿以有從禽之心也朱漢上曰艮為黔喙震為決躁鹿也郭兼山曰六三互艮有知止之心故曰君子幾不如舍沈守約曰震體剛動變而為離離為佃漁從禽之象也鹿走險者也上據險極鹿也而不為應无虞之象也胡雙湖曰鹿山獸互艮象上六在艮山之上象蔡虚齋曰從字重故著以字所謂禽荒者也是以身徇物也錢啓新曰三動則震止則艮動止之介甚微故言幾觀彖六三无陽剛之比應動極不能自止前遇坎險故有此象然居内體涉險未深故又戒以見幾舍去勿取羞吝也六四乘馬班如求婚媾往吉无不利𧰼傳求而往明也虞仲翔曰馬在險中故班如也胡安定曰必待人求于己然後往而應之非君子性修智明其能與于斯乎本義隂柔居屯不能上進故班如朱漢上曰六四上承九五坎為美脊之馬艮為手乘馬也趙汴水曰四與初應初以男下女故為婚媾以陽求隂故為求吳草廬曰吉无不利者四雖才弱然居得其正又有剛正之應求已故也郝景山曰初為震主四以正應是謂雷雨交動滿盈而成大亨貞者也故吉无不利觀彖求而往明非四求也按一初也求婚媾一也二以非應而不字四以正應而往吉出處之宜如是夫曰求者見初求才之切往者自此之彼之常語不必泥自内之外為往也九五屯其膏小貞吉大貞凶𧰼傳屯其膏施未光也虞仲翔曰陽陷隂中故未光也程傳膏澤有所不下是威權不在已也而欲驟正之求凶之道魯昭公高貴鄉公之事也小貞則漸正之也若盤庚周宣修德用賢諸侯復朝以道馴致之不為暴也本義九五雖以陽剛中正居尊位然當屯之時陷于隂中雖有六二正應而隂柔才弱不足以濟初九得民于下衆皆歸之九五坎體有膏澤而不得施為屯其膏之象趙汴水曰我方在險德澤未加于民下焉羣隂蒙昧未孚唯寛其政教簡其號令使徐就吾之經理乃可得吉若驟用整齊振刷之術人將駭懼紛散凶孰大焉故新國用輕典谷拙菴曰施字當澤字澤屯而不施即未光非謂得施而但未光也錢啓新曰五陷險中與初不應雨意雖作雷聲不應乃雨未通而為雲雖有膏潤不能光大也易外五之屯其膏以雷尚在險中雷之氣上而未至于天為雲而未為雨故其膏屯也膏者何坎為血膏者血之𩔖坎中實為天地之血脉所凝故曰膏又坎為月離為日雷雨滿盈日月晦㝠而五以陽徳陷于險中為土隂所掩故曰未光上六乘馬班如泣血漣如𧰼傳泣血漣如何可長也虞仲翔曰坎為馬震為行艮為止馬行而止故班如也王輔嗣曰處險難之極下无應援進无所適雖比于五五屯其膏不與相得窮困闉厄无所委仰故泣血漣如楊慈湖曰何可長者言何可長如此也非深憫之亦覬其變也變則庶乎通矣胡雲峯曰四乘震馬而利者震動則屯可出也上乘坎馬而泣血者坎陷則屯未易出也梁孟敬曰坎為加憂為血卦觀彖何可長發明爻外之意言時既難行必明所以處之之道豈可徒憂傷而長自困乎坎下艮上中爻震坤胡雲峯曰有天地即有君師乾坤之後繼以屯蒙屯主震之一陽而曰利建侯君道也蒙主坎之一陽而曰童蒙求我師道也蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖傳蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也虞仲翔曰童蒙謂五艮為童蒙我謂二也震為動嫌來之五故曰匪我求童蒙五隂求陽故童蒙求我張子蒙卦之主全在九二彖所論皆二之義程傳山下有險内險不可處外止莫能進未知所為故為昏蒙之象蒙有開發之理亨之義也卦才時中致亨之道也時謂得君之應中謂處得其中得中則得時也以純一未發之蒙而養其正乃作聖之功也蒙之六爻二陽為治蒙者四隂皆處蒙者也本義蒙昧也物生之初蒙昧未明也山下有險蒙之地也内險外止蒙之義也故其名為蒙志應者二剛明五柔暗故二不求五而五求二其志自相應也鄭東谷曰赤子之心萬善皆備特蒙而未覺耳養有二義自養養人也自養者當以蒙而養其正養人者當于蒙而養之以正此皆作聖之功用楊誠齋曰蒙者人之初非性之昧故蒙有亨之理項平甫曰或以蒙為筮非也彖以瀆則不告為瀆蒙矣又可改乎坎心亨主思故有作聖之象自二至上為頤故有養正之象徐進齋曰初筮主九二言再三主上九言内卦初筮外卦再筮二當初筮之中上居再筮之三也胡雙湖曰蒙就二陽言九二取初筮之象初下體也上九取再三瀆象再上卦三上卦之三自二至上有頤口之象震動又當初筮故告再三適當艮止故不告也然二陽爻皆不正故又有利貞之戒俞石澗曰童蒙之時便當以正道涵養正性是乃作聖之功也情竇未開天真未散粹然一出于正所謂赤子之心也涵養正性全在此時錢啓新曰坎為通原有亨道撰為震能以亨行按他卦皆貴以陽求隂惟蒙有師道禮聞來學不聞往教貴以隂求陽故彖辭特以匪我求童蒙二句以明與他卦隂陽相求之例不同也初筮告再三瀆二句註疏原主治蒙者言而以初筮為剖決再三為遲疑固牽强傳義以初筮為誠一再三為煩數與卦象無涉而主蒙而言與孔傳指治蒙者言文義相左經文无隻字泛設荀慈明以再三為三與四似近之然初筮既主治蒙者言再三又指蒙者言况三爻亦在初筮之内終未允慊惟徐氏之説彖義始明告不告皆以治蒙者才德之可不可而言九二剛中故可告上九剛而不中徒以瀆蒙故不可告彖傳甚明觀上爻辭擊蒙為冦尤可見瀆蒙之義又上變為坤土應三為坎水土水相汨成泥瀆之象孔傳于二體以應否為要義應字始見于此初六發蒙利用刑人用説桎梏以往吝𧰼傳利用刑人以正法也程傳桎梏謂拘束也去其昏蒙之桎梏朱漢上曰艮手震足交于坎木桎梏之象龔泉峯曰桎梏猶孟子所謂梏亡之梏所蔽未深之時説其拘蔽之桎梏則本心復明矣聖人于上九之擊蒙猶戒其過而為冦豈有發蒙之初而即施刑者乎按初處坎下象泉之始發故曰發蒙發有發始之意有發生之意此初之質也如四之困蒙五之童蒙皆主蒙者言也九二剛中為治蒙之主初比而承之又剛柔相得故曰利用刑人用脱桎梏刑即儀刑文王之刑人謂九二桎梏蒙之象能刑人則能脫此桎梏豁然渙然如泉源之達爻辭二用字承一利字皆言初之所宜用也若儀刑在前不知取法安于桎梏拘蔽日深必往而為困蒙之吝初與四應為往象傳以正法言當以正為法也以字釋用字法字釋刑字正字釋人字説家以此爻辭作治蒙者言宜致展轉支離治蒙之道自當在九二言之不當在初言之矣誤在先以發字作治蒙解耳九二包蒙吉納婦吉子克家𧰼傳子克家剛柔接也程傳二能包納則克濟其君之事猶子能治其家也五既隂柔故發蒙之功皆在于二以家言之五父也二子也二能主蒙之功乃人子克治其家也二能主蒙之功者五之信任專也二五剛柔之情相接故能行其剛中之道本義九二以陽剛中正為内卦之主統治羣隂當發蒙之任然所任既廣物性不齊不可一槩取必而爻之德剛而不過為能有所包容之象又以陽受隂為納婦象居下位而能任上事為子克家象張紫巖曰二剛之中有震體震長男為克家楊誠齋曰五求二非二求五乃曰子克家何也臣事君如子事父正使致君如伊周亦臣子分内事如子之克家耳王秋山曰包蒙者包衆蒙而為之主納婦者受衆隂而為之婦此通一卦而言也五尊父也二卑子也處卑而任尊者之事子克家象此以應五而言也李蒙齊曰聖人恐九二以師道自居或失臣子之義故以子克家戒之胡雲峯曰包與納二虚能受之象克九剛能任之象來矣鮮曰中爻坤順在上一陽在下納受坤順之隂納婦象按艮為門庭家象孔傳獨釋子克家句以包納即克家之實也剛柔接專以子克家為二五之應六三勿用取女見金夫不有躬无攸利𧰼傳勿用取女行不順也虞仲翔曰金夫謂二陽稱金震為夫三乘二陽所行不順陸君陽曰金夫謂二二爻體剛故謂之金夫正應在上而下比于二體坎為水水性趨下志在于二而不從上失位乘剛故无攸利程傳三以隂柔處蒙闇不中不正女之妄動者也正應在上不能逺從近見九二為羣隂所歸得時之盛故捨其正應而從之是女之見金夫而不有其身者也張紫巖曰位坎險上互坤為女互震震動項平甫曰婦人以從夫為順苟非其夫皆不順也曰不順從二明矣三稱見金夫明為近利而失之也上艮為躬曰不有躬明棄上也沈守約曰坎本剛中變而為巽失所守也卦變為蠱女惑男見金夫不有躬之象按輔嗣以上三正應女先求男為不順固鑿或以九二卦主三能從之正合童蒙求我不應謂之不順不知卦辭童蒙本專指六五六三不中不正則蒙而非童安得以從二為順惟其宜應上而反從二故傳謂之不順也蓋以隂乘陽易例即有婚媾之象屯以六二唯其中正所以有守貞不字之象今三以蒙而不中正之隂而又乘剛必不能有其躬矣九二在本爻有包蒙克家之德以三視之即為金夫猶之屯初為利建之侯在六二即為乘剛之難易之不可為典要𩔖如此六四困蒙吝𧰼傳困蒙之吝獨逺實也王輔嗣曰獨逺于陽處兩隂之中闇莫之發故曰困蒙也困于蒙昧不能比賢以發其志亦以鄙矣故曰吝陽稱實也楊誠齋曰窒于通之謂困嗇于從之謂吝吝疾者諱醫吝過者諱師四之困蒙而復吝于親賢所謂困而不學民斯為下者歟胡雲峯曰初與三比二之陽五比上之陽初三五皆陽位而三五又皆與陽應唯六四所比所應所居皆隂困于蒙者也易外蒙互坤四在坤之中正泉之困也又四為艮之下泉未出為山所困石揜其上土塞其中此乃泉桎梏之時也六五童蒙吉𧰼傳童蒙之吉順以巽也虞仲翔曰處貴承上有應于二動而成巽故吉也陸公紀曰體艮少男故曰童蒙程傳五以柔順居君位下應于二童取未發而資于人也舍己從人順也降志下求巽也本義純一未發以聴于人故為童蒙楊誠齋曰有童穉之蒙有小民之蒙有學者之蒙有聖人之蒙六五以人君之尊秉巽順之德自居于童穉之蒙以下學于九二剛明之賢此聖人之蒙也高宗自以其德弗類而學于傅說武王自以不知彛倫而訪于箕子所以聖益聖歟吳草廬曰互坤順也變剛成巽也蔡虚齋曰易以六居二九居五為當位而辭多艱以六居五九居二為不當位而辭多吉蓋君以剛健為體而虚中為用臣以柔順為體而剛中為用君誠以虚中行其剛健臣誠以剛中守其柔順則上下交而其志同矣實易爻之通例按受教之道非虚中巽順不能𫉬益故以順巽明童蒙之吉不必以君道言但君道亦在内耳觀孔子巽字可信變爻之卦自宜合看上九擊蒙不利為㓂利禦㓂象傳利用禦㓂上下順也本義以剛居上治蒙過剛故為擊蒙之象然取必太過攻治太深則必反為之害惟捍其外誘以全其真純則雖過于嚴密乃為得宜趙復齋曰隂為蒙為冦上艮止乃止冦者俞石澗曰上以剛禦柔下以柔從剛則上下皆順也吳草廬曰二剛皆治蒙者九二剛而得中其于蒙也能包之治之以寛者也上九剛極不中其于蒙也乃擊之治之以猛者也來矣鮮曰艮為手擊象坎為盜㓂象華霞峯曰蒙養之初全要教者學者心志相孚此感彼應若一味剛克扼止其生發之機豈不是為㓂若嚴以拒其外誘正順以保其天真上下皆得其順矣易外自正以正人為上順人以吾正而正為下順合訂中爻坤順象周易孔義集説卷一
