body:
  text: 周易孔義集説卷十四光祿寺卿沈起元撰下經震下震上中爻艮坎震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖傳震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也易舉正程傳云邇也下脱不喪匕鬯句本義従之孔仲達曰虩虩恐懼之貌因懼自修所以致福笑言啞啞不敢失則時然後言樂然後笑後有則也匕以載鼎實鬯秬黍之酒特言匕鬯者鄭𤣥云人君于祭祀之禮尚牲薦鬯而已陸君陽曰虩蠅虎象人心之恐動石守道曰物得雷動則得亨通人能戒懼則亦得亨出者言出即可主祭祀蘇子瞻曰震震隂而達陽者也故亨程傳震為動為恐懼為有主震而奮發動而進懼而修有主而保大皆可以致亨故震則有亨當震動之來則恐懼不敢自寧旋顧周慮虩虩然也恐懼自修則可致福能恐懼而後自處有法則也有則則安而不懼處震之道也本義震有亨道震來當震之來時也震驚百里以雷言不喪匕鬯以長子言也能恐懼則致福而不失其所主之重語錄言人常似震來時虩虩然後能笑言啞啞到得震驚百里亦不喪匕鬯相連一串下來郭白雲曰自乾坤而來變之始者莫先于震故為動之始天下之理不動則不亨故天地萬物待震而後亨内外重震故有逺邇大震之象大震而不喪匕鬯此其所以可守宗社為祭主也張紫巖曰上坤下震為復其一在内雖動而静至震則内外俱動矣動吉凶悔吝所自生也動而畏天必獲後福陽動為笑言長子主器有動而代天之象不必以儲貳言之朱漢上曰震動于積隂之下奮擊而出亨也畏而恐懼所以致亨坎為棘艮為手以棘載肉而升之俎者匕也坎震為酒離為黄酒黃鬱鬯也趙復齋曰陽氣之動雷霆之威所以生物也品物流形始見其則項平甫曰出即帝出乎震之出謂君出而太子守者非李西溪曰有則謂君子所履出處語黙皆有常則不以恐懼而變也吳草廬曰凡震字皆謂動也震聲聞于百里聞者皆驚震象乾君也坤國邑也分乾之一陽以主坤之國邑者諸侯也一陽象雷之聲二隂象百里之地胡雙湖曰鼎君父正位凝命之事震長子主器之事震所以繼鼎猶坤之承乾互艮為門闕宗廟象艮為山山下為壇有社稷象胡雲峰曰文王自以震來虩虩釋震字以笑言啞啞以下釋亨字蔡虗齋曰震來虩虩以心言震驚百里以事言不喪匕鬯不懼也不懼由于能懼凡事皆當懼懼便是震來君子心常敬畏所以致福而无失焦弱侯曰笑言啞啞非侈然自放循其法則不失常度而已余子華曰震驚百里只是足笑言啞啞一句意大意謂人平時能恐懼則可致福雖卒然禍變之來亦无可畏初九震來虩虩後笑言啞啞吉𧰼傳震來虩虩恐致福也笑言啞啞後有則也房𤣥齡曰震之初九謹始恐懼以致福豫之初六唱始逸豫以貽凶孔仲達曰剛陽之徳一卦之先剛則不闇于㡬先則能有前識故處震驚之始能以恐懼自修而獲吉郭白雲曰震動之初恐懼修省不可緩也過此則危矣沈守約曰震來虩虩始震而知懼也啞啞在福而猶慎不敢肆其聲也爻變為坤順也卦變為豫後笑言之象都聖與曰震來虩虩于初笑言啞啞于後原始要終先恐後福故初九所言如此趙復齋曰為一卦之主盡震之義故以卦辭明之蔡進齋曰震之用在下四泥于柔而未光初剛无係必達于上故吉趙汴水曰既重而卦无二主初實主之周公不他為之辭亦以别于九四之震六二震來厲億喪貝躋于九陵勿逐七日得𧰼傳震來厲乘剛也王介甫曰貝者人之所寳六二之所寳者位也程傳六二柔順中正善處震者而乘初九之剛震來既猛則已處危矣六二所貴者中正震懼之來當守中正无自失也逺避以自守過則復其常矣勿逐而自得也卦位有六七乃更始事既終時既易也吕藍田曰以柔乗剛震來必危而无應必喪其所資應在六五所居髙險故曰躋于九陵若反而求之柔中自守則必得其所喪張紫巖曰剛陽浸長必喪其資惟應五斯不失臣道之常王童溪曰億多也鄭氏曰十萬曰億六五億无喪象曰大无喪也億大數也貝貨二所資也居則其位用則其財朱漢上曰艮山陵也避初之五震足升于四之上躋于九陵也二動成離離為贏贏貝也自二至上又自初至二其數七七日得李蒙齋曰震之六二其太王避狄之事乎趙汴水曰初自下震上自二視之曰來兩陽之震初為盛二迫于其上不勝危厲倉遽而逃大喪其資吳草廬曰居中得正有墮甑弗顧之達則有去珠復還之喜胡雙湖曰初四以離為貝九陽爻陵互艮艮止故勿逐胡雲峯曰常情震驚則多喪失故喪匕鬯喪貝每每言之何𤣥子曰二柔懦為雷所怖至于喪資視不喪匕鬯者有間矣然恐懼自守處震之大方也雷霆无竟日之怒故曰勿逐七日得華霞峯曰勿逐自得中正之故勿逐地位自立得髙所以喪而无喪按二變為兑兑為毁折為附決喪貝象震體為躋互艮止為勿逐進退之道具于象六三震蘇蘇震行无眚象傳震蘇蘇位不當也虞仲翔曰互坎為眚三變得正坎象不見為无眚本義以隂居陽當震時而居不正是以如此若因懼而能行以去其不正則可无眚張紫巖曰以隂居下卦上有互艮體欽慎之心止矣唯震行不息以充其道眚乃亡也楊誠齋曰震而不行徒震耳行改圖也此恐懼所以修省也鄭東谷曰來蘇蘇息皆安緩意逺于初陽无迫之者王秋山曰前震既終其勢少蘇後震方來未可為安三隂柔不中正即其少蘇而遂以為蘇曰蘇蘇苟目前而忘後慮者也居剛故能行應上則震終也胡雲峯曰初雷洊雷之間互坎之下熊梅邊曰下震終而上震繼故兩言震龔泉峯曰三居位不當去初已逺震少綏矣故曰震蘇蘇息也蘇蘇虩虩之反散緩休息不知警懼也震行无眚所以進之俞石澗曰震行謂雷之行雷動而行于天下則萬物暢達乃无災眚若當行之時而不行則萬物夭閼君子法之故行則无眚不行則有眚三雖震體而互艮止恐其止而不行故勉之按震動乃怠惰之藥苟安目前患不旋踵故于三之綏散而戒其勿以艮止也九四震遂泥象傳震遂泥未光也虞仲翔曰坤土得水為泥位在坎中故遂泥在坎隂中與屯五同義故未光程傳居震處柔失剛健之道居四无中正之徳陷溺重隂之間不能自震奮者也故云遂泥泥滯溺遂无反之意欲震動則莫能奮震道亡矣以剛處動本有光亨之道陷于重隂豈能光也沈守約曰震變為坤雷入地也項平甫曰初九一陽動于二隂之下得震本象故其福與卦辭同九四以一陽動乎四隂之中則震變成坎遂陷于泥无驚逺懼邇之威故不能如卦辭光大也趙復齋曰四近五以止為尚故无凶悔吝胡雲峯曰震之亨在初而不在四何𤣥子曰互體艮下牽二柔止而不進亦失其所以為震按在人事則溺于私牽于欲雖有剛徳而不能奮發者六五震往來厲億无喪有事象傳震往來厲危行也其事在中大无喪也虞仲翔曰可以守宗廟社稷為祭主故无喪有事張子禍至與不至皆懼則无喪有事本義以六居五而當震時无時而不危也以其得中故无所喪而能有事王童溪曰震之成體雖在于初四二爻而得尊位大中以主天下之動者則六五也郭白雲曰二以來厲而喪貝則五之往來皆厲宜大有喪不失中道可以大无喪矣項平甫曰二居下震之上故稱來五居重震之上故稱往來二五之厲即震之恐懼也趙汴水曰億无喪萬无失也有事猶言有事于泰山盖不喪匕鬯以為祭主也六二億喪六五億无喪者九四非初九之震六五非六二之中故二喪而後得五无喪而有事四剛五柔而剛不能勝者五為君而中四為臣而不中吳草廬曰二居柔則志氣餒故逢初九之震而喪其貝五居剛則持守堅故逢九四之震而无所喪失熊梅邊曰震往亦厲震來亦厲皆以危懼待之故能不失其所有俞石澗曰二曰震來指初之來以五視初則初之始震為既往四之洊震為復來五盖震往而復來之時髙忠憲曰不喪匕鬯六五當之其事在中安得喪乎于有事匕鬯之時體在中之義則當震懼而失其守者可識矣按震往來與震來句法同則往來作重震看者為允危行行字作去聲讀釋厲字盖震動之道不可晏安无事危行即有事也有事而不離于中所以无喪與震无眚同㫖上六震索索視矍矍征凶震不于其躬于其隣无咎婚媾有言象傳震索索中未得也雖凶无咎畏鄰戒也胡安定曰震不于其躬于其鄰者謂九四之剛不能及己之身鄰謂五有往來之厲能觀此鄰戒以自修省則无咎本義能及其震未及身之時恐懼修省則可无咎沈守約曰變為離離為目視矍矍象項平甫曰震之六爻初最先震上最逺于震初之震來虩虩其恐甚矣上則不然其于震也索索然若有而若无未嘗如初之恐故為征凶若能不以其躬之逺于震者為安而以其鄰之迫于震者為法能畏懼驚戒以従事于中則雖凶而无咎矣人必恐懼而後有得上惟不震是以中未得五惟震厲是以不喪其中故聖人欲上六之法之也六三之蘇蘇上六之索索皆震逺而聲小不足于恐懼者也俞石澗曰上六處重震之極雷聲漸小而漸消散故曰震索索矍矍兩目左右顧而不定貌即矍鑠之矍以隂柔處動極故其視矍矍盖動極當静征行則必凶故戒之婚媾有言羨文觀爻傳不釋可見按震索索二句多作恐懼自失解細玩既知恐懼何以征凶何以畏鄰戒而得无咎項氏俞氏善言易矣盖震以初為主故與上極逺雷將息矣索索者震之懈矍矍者動之肆以震聲消索忘懼而肆志動必得凶以隣戒而知畏則可无咎文義自具開合婚媾句强為之説皆屬未安俞氏之説似不可易艮下艮上中爻坎震程傳艮止也不曰止者艮山有安重堅實之意非止義可盡也陽動而上進之物既至于上則止矣隂者静也上止而下静故為止本義取坤地而隆其上之象亦止于極而不進之義趙汴水曰探其源乾之索至艮而止陽之升亦至艮而止玩其𧰼一陽止于二隂之上陽自止也二隂欲升閡于陽而止能止隂也艮其背不獲其身行其庭不見其人无咎象傳艮止也時止則止時行則行動静不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也王輔嗣曰凡物對面而不相通否之道也艮止而不相交與之卦也各止而不相與何得无咎唯不相見乃可也背无見之物无見則不得其身矣相背者雖近而不相與故行其庭不見其人也易背為止以明背即止也孔仲達曰老子曰不見可欲使心不亂若止于面則對面不相通必有凶咎止而无見則所止在後所止无見何及其身既不獲其身則相背雖近而不相見故得无咎凡應者一隂一陽二體不敵今上下位爻皆峙敵不相交與故曰上下敵應不相與也然八純卦皆六爻不應獨于此言之者此卦既止而不交爻又峙而不應與止義相協故兼取以明相與則有咎也李氏鼎祚曰艮為門闕今重艮兩門之間庭中之象周子艮其背背非見也静則止止非為也蘇子瞻曰艮其止止其所也此所以不獲其身也上下敵應不相與也此所以行其庭不見其人也程傳止之道唯其時仲尼仕止久速是也艮體篤實有光明之義朱子定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定而天光發是也楊龜山曰艮者萬物之所成終而成始也止于此復出乎震不終止也故曰時止則止時行則行徐進齋曰光明陽徳也艮以一陽進居二隂之上光明著見非隂暗所能揜蔽其道自然光明鄭東谷曰艮之彖辭惟曰无咎而已无咎非善之至也故夫子于彖傳備言之聖人之止事物作于吾前而不為事物之所亂時止時行行不累吾之止動静不失其時動不害吾之静此道之所以光明也今艮重艮也有六位焉上下皆敵應而不相與猶人之相背也故曰艮其背艮其背則在我者不獲其身在人者不見其人此所謂不見可欲使心不亂也聖人見可欲而不亂必不見而不亂有所見則復亂矣故艮其背非聖人之所謂艮僅能免于咎而已彖傳言艮止也此三畫為艮聖人之事也又言艮其止止其所也此重卦為艮而成六位之不相與也夫止而至于止其所其執一者之謂乎説者不詳其義于艮其背止其所皆大其辭以為聖人之事烏有聖人之止而唯曰无咎者乎項平甫曰卦辭為艮其背彖為艮其止晁説之氏曰彖亦當為艮其背自王弼以前无艮其止之説今按古文背字為北有訛為止字之理趙汴水曰時行時止動静以時其道光明文王言外之意也蘭惠卿曰艮其背不獲其身我不應人也行其庭不見其人人不應我也人我不交悔吝従何而生馮厚齋曰合全卦言上一陽肩也中二隂脊骨也下一陽腰也下二隂足也背之象分二卦而言上一人背而立也下一人亦背而立也一陽為肩二陰手足也三四内外之交庭也姚小彭曰言輔不言口言身不言面言夤不言心言限不言腹言腓不言股言趾不言足皆不獲其身也胡雲峯曰人身唯背不動艮止象不獲其身内艮象不見其人外艮象何𤣥子曰艮其背主静之功學者之事也時止則止四語聖人發明艮止之義程子所謂静亦定動亦定也是道也唯敦艮之上九足以當之若彖辭所稱艮其背者則以止為止也人之精神盡在于面不在于背故聖人教之以艮其背此求止法也使面之所向一如其背則應用交錯擾攘萬端未始不寂然矣然而其初未能也必自艮背而入故曰艮其止夫道无方所以背為止明乎有方所矣彼其心一于背即視身與背若不相涉視人與己滋不相涉則上下敵應之象也内不與外未甞引外物而入外不與内莫能誘吾心而出雖未能忘乎有所然操存之熟則可以馴至于無所故曰无咎也先儒㸔彖辭太好又以不獲其身為无我不見其人為无物細繹彖象中俱无此意按彖不直曰艮而曰艮其背正以明六畫卦之艮也三畫卦則无背象彖辭皆従背起義彖傳至艮其止始釋卦辭是以二字祇承艮其止四句來不兼承時止則止四語時止則止四語専論三畫卦艮止之義蘇氏鄭氏何氏深契易㫖敵應不相與原非美事惟艮止之義乃得无咎王童溪所謂施于他卦則不能无咎也觀敵應不相與之原非美事即可見止其所之未為盡善與彖傳上截所言時止時行者相懸殊甚六畫卦之本象與三畫卦艮止之義自不可混初六艮其趾无咎利永貞象傳艮其趾未失正也本義隂柔居艮初艮趾象占者如之則无咎又以其隂柔故又戒其利永貞郭白雲曰止于未動之先則易止于既動之後則難止于先故得无咎利永貞者利在乆于其道而固守之也朱漢上曰初六不正宜有咎事止于初其止早矣未失正也趙汴水曰人之能行必有其才有其時有其位乃可初六隂柔則无才卦為止則无時在下則无位是未可行而宜止者也艮其趾故无咎人之于止能安者難故利永貞王秋山曰當止而行者非正也當止則止則不失其正易外止莫止于山之足初山之足不可移者也故曰利永貞六二艮其腓不拯其隨其心不快象傳不拯其隨未退聴也程傳六二居中得正得止之道者三主乎止者也剛而失中不得止之宜剛止于上非能降而下求二雖中正之徳不能従也二之行止係乎所主非得自由腓之象股動則腓隨雖咎不在已其心不快在上者未能下従也退聴下従也本義三為限則腓所隨也過剛不中以止乎上二體柔弱不能往而拯之是以不快張紫巖曰互坎坎心病為不快朱漢上曰二動成巽巽為股其隨者隨九三也三震二動成兑澤雷之象三坎為耳聴也吳懿鼎曰拯以拯人之陷溺為言三互坎陷乃待乎拯二隂柔能為陷而不能為拯三動于震二即隨之腓之行止不得自由九三艮其限列其夤厲薰心列孟喜作裂象傳艮其限危薰心也王輔嗣曰限身之中也三當兩象之中故曰艮其限夤當中脊之肉虞仲翔曰限腰帶處坎為腰故艮其限夤脇肉艮為背坎為脊震起艮止故裂其夤張子一身而動止中列危至薰心楊誠齋曰限閾也九三竒而橫有門限象艮為門闕朱漢上曰下體欲静上體欲動而争之則上下不相屬沈守約曰艮變為坤艮為背坤為腹在腹背之間體之限身之夤也張紫巖曰艮一陽居上陽止其所得止静之道因而重之三位在四隂中有互坎互震體于止静失矣鄭亨仲曰心處中背處隂夤在背與心宻相向列其夤則憂危之厲薰灼及心趙汴水曰以一陽介于四隂之中故曰限限隔也在身為膺鬲亦限也胡雙湖曰夤為膂膂脊骨以卦體橫㸔九三似脊骨四隂似夾脊肉俞石澗曰三居上下二體之間其象如門之限閾在人身則腰也九三過剛不中妄動于艮止之時故其象如此重震重艮皆以兩剛爻取義震初動而四則止艮上止而三則動震之四互艮止于震動之時故有震遂泥之失艮之三互震而動于艮止之時故有列其夤之患盖與卦義相反故也唐凝菴曰以坎心當艮之堅木震動生火有薰心象何𤣥子曰震性好動而欲限之使不動然好動之性終在妄想坐馳紆軫内熱薫灼其心三至上肖離火有薫象互坎為心病按此爻之象病不在止而在動以剛居剛非能静止者况處坎震之位坎陷則急欲出險震動則勢不可止而下牽于艮體欲止不可欲動不能當分界之際窮于進退上下无交而過剛之資又不得自安故其𧰼如此艮其限者謂身在限所爻之本象列夤薫心乃以坎險震動之故諸儒多作上下兩截㸔且以三不當止而强止為過夫上下兩截乃成卦之本象卦以止為義三乃艮主能止非過何至有列夤薰心之象虞氏震起艮止一語可為妙㑹宗其説者得之六四艮其身无咎象傳艮其身止諸躬也孔仲達曰艮卦總兩體為一身兩體不分乃全全乃謂之身九三止于下體不與上交所以體分夤列六四已入上體則不分而身全胡安定曰人之體統而言之則謂之身分而言之則腰足而上謂之身六四出下體之上在上體之下身𧰼也夫人患不能自止其身今能止之得其道使四肢不妄動故无咎石守道曰四過中而近上心之所也心者身之主故四即曰艮其身心始思慮知其宜静便能止之吕藍田曰六四以隂居隂止乎至静在上體之下任一身之事徐進齋曰四當心位不言心者心不可見身者心之區宇也身止則知心得其所止矣項平甫曰四在輔之下腰膂之上正當艮其背之地在諸爻之中獨得其所止故合于卦辭之无咎象恐人誤以身為正面故以躬解之傴背為躬躬者見背而不見面也趙汴水曰不獲其身心自與身對不見其人己乃與人對今言艮其身殆行其庭不見其人者是以无咎俞石澗曰陽好動隂好静六四純乎隂静雖互震體而不妄動吳敬齋曰視聴言動身之用也非禮勿視聴言動艮其身也易外躳者舉腰膂而言躳从身从呂呂脊骨止于身之後也六五艮其輔言有序悔亡象傳艮其輔以中正也杜元凱曰震為車輔頰車互震而艮止其上也虞仲翔曰三至上頤體艮止之艮其輔也蘇子瞻曰口欲止言欲寡程傳序中節有次序也本義悔謂以隂居陽正字羡文協韻可見趙復齋曰能默故能言非默而不言也由言以推行所謂艮者亦如是而已郭白雲曰五君位主天下之止者也天下命令之所由出可不慎乎李西溪曰頰之兩旁背後可得而見咸言其面故并見頰舌艮言其背故止見其輔口言則輔動輔止則言寡故有序沈守約曰艮而為巽巽出命言象李隆山曰人所見于外者言行在下有腓趾以象其行在上有輔頰以象其言所以明艮之義則一姚小彭曰以中正當作以正中于韻為協王秋山曰互體震震為聲音故以出言取義龔泉峯曰非不言也言而有序所以為艮唐凝菴曰咸之輔在上艮之輔在五皆隂也輔有兩故以隂取象上九敦艮吉象傳敦艮之吉以厚終也程傳人之止難于久終故節或移于晚守或失于終事或廢于久上能厚于終止道之至善本義以陽剛居止之極敦厚于止語錄艮居外卦者八而皆吉趙復齋曰其安仁者乎邱行可曰艮者震之反震之用在下故震陽最下者獨吉震四之陽為互艮失所以為震矣故遂泥艮之用在上故艮陽最上者獨吉艮三之陽為互震失所以為艮矣故列夤王秋山曰艮止也自初至五皆未得其止至上則以剛居柔是能止也處卦之外是知止也居艮之終止其止也重艮之上厚之至也是以重厚之徳得其所止而安者也吳草廬曰上變成坤故象與臨上復五同此一卦之主故不言艮其盖諸爻之艮皆上之敦也胡雙湖曰咸艮皆以人身取象但差一位咸九四為心而艮九三為心咸上六為輔而艮六五為輔大要欲以九當心以六當輔故不能不差一位爾胡雲峯曰敦臨敦復皆取坤土艮山乃坤土而隆其上者其厚也彌固易外艮者物之終始内艮所以成始外艮所以成終上九重艮之極終始皆成故曰敦曰厚艮下巽上中爻坎離程傳止必有進屈伸消息之理止之所生亦進也所反亦進也漸所以次艮進以序為漸以序不越次也王秋山曰止于下而巽于上為不遽進之義又木生于山其長也不速非如生于下隰之易也亦漸之象漸女歸吉利貞彖傳漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也孔仲達曰漸者不速之名婦人之嫁備禮乃動故漸之所施在女歸漸是徐動不當進退但卦所名漸是之于進也進得位往有功進以正可以正邦此就九五得位剛中釋利貞也以六二適九五進而以正也其位剛得中者此卦爻皆得位上言進得位嫌是兼二三四等故特言剛得中以明得位之言惟九五也止不為暴巽能用謙故能漸而動進不有困窮也程傳天下之事進必以漸者莫如女歸臣之進于朝人之進于事皆當有序廉恥之道女之従人為大故以女歸為義吕藍田曰艮止于下巽進而上不可以速故其進徐也郭白雲曰進之漸者无若女歸漸則為歸速則為奔凡天下之進如女歸之漸无不吉也卦辭言女歸爻言鴻漸其義一也傳言漸之進如女之歸則吉所以明卦辭也張紫巖曰漸臣道也互離在中離為日為明君明于上時可進矣君有剛中之徳而後可與有為臣之進也恃此而已人臣進用莫病于躁動知止則定度時而動鮮不入矣朱漢上曰歸自内之外也坤之四成巽女往也乾之三成艮男下女也毛伯玉曰易未有一義明兩卦者晉進也漸非進以漸而進耳單氏渢曰内不止則非漸之道外不巽則非進之道趙汴水曰上卦乾夫之家六三進為四歸于夫也之往也之有進有退漸之所之則進也梁孟敬曰在下者能止則不驟進以援上在上者能巽則能謙遜以待下又内止而无争競之心外巽而有恭順之意進得位以位言進以正以道言胡雙湖曰進得位以下自論九五一爻恐人以進得位為六四之進得隂位故特結之以其位剛得中也來矣鮮曰進之心愈急則進之機愈阻内艮止則未進之先廉静无求外巽順則將進之間相時而動所以進不窮吳敬齋曰止而巽終是進但進以漸故卦名為漸若巽而止則終于止而事壊亂矣故卦名為蠱何𤣥子曰三四非偶因相比而相合然非正應終不若得其正之為當故借二五以明利貞之義華霞峯曰凡進皆利于貞彖傳進得位以下何嘗説女歸之義進得位進以正専指五言卦自二至五剛柔皆得其正初柔上剛亦為上下各得其位自九五得位而正通卦无不正故曰有功曰正邦合一卦之正俱歸九五之位之正也按漸之卦義所包甚廣義重在漸不在進漸乃所以為進耳故非晉升比女歸吉非成卦之由也少長不配不應與咸恒不同并與家人歸妹以之命名者不同彖辭特借巽女艮男之𧰼以女歸作漸字様子爻之鴻漸一例故夫子以漸之進三字釋女歸吉其義已了以下所云得位得中惟孔疏極得或以得位以正指六四或以自二至五皆得正位或以九三為剛得中均未允協夫進得位進以正者蒙上文漸之進來進乃卦義非謂某爻進某位也説者必以卦變實之曲矣其特以九五得位釋利貞者亦有微㫖焉長女少男非應而合既不以正下止上巽似非進用之才木生于山非日出地上之明盛又非地中生木之升長則疑卦无可進之時故特舉九五得位正中以明卦時之可進紫巖得其㫖矣末舉卦徳以明漸義之善艮止也而曰動以止為動見止之妙用巽為進退為不果也而曰不窮以退為進似不果而實不窮見巽之仁徳不獨士子進身為然王道之成聖徳之修何一不貴于漸乎此大𧰼所為居賢徳善俗即彖傳所為有功正邦也初六鴻漸于干小子厲有言无咎象傳小子之厲義无咎也虞仲翔曰艮為山為小徑坎水流下山故漸于干艮為小子初失位故厲孔仲達曰鴻水鳥干水涯程傳居下才弱上元應援常情之所危故懼而有言在下所以有進用柔所以不躁无應所以能漸于義自无咎張紫巖曰漸坎離在中鴻水物其色文明飛有序來有時故漸六爻皆况鴻初位互坎下為干艮下為小子王童溪曰鴻之為物非其往不往非其居不居六爻之位自初至上尊卑大小各得其正故取于鴻漸小子云者古人謙辭初以謙卑之志處此下位自危自警不敢妄逞而恐失進退之義故曰小子厲郭白雲曰易以象言之則一卦一爻内天地萬物无不具聖人或取諸身或取諸物獨能舉其一以明之耳理不能盡也震為龍而乾稱龍乾為馬而坤稱馬坤為牛而離稱牛皆非説卦之象八卦无鴻而漸稱鴻故知易之取象貴夫觸類而長之沈守約曰艮變為離為鳥而止于下鴻漸于干象離為言有言象項平甫曰初離水而至于干猶在水土之濱止于此而不進則于義固无失也楊慈湖曰進欲其知時故以鴻為象進欲其漸故以干磐陸木陵為象李西溪曰鴻之飛長在前幼在後此其序也初處最下小子也鴻之進常有弓繳之危故厲有言遇有危事則鳴以警衆即俗語所謂雁奴也其防患有道故无咎胡雙湖曰鴻全體象互離為飛鳥互坎為水居自坎北而離南象鴻之遷徙離目艮身儼一飛鴻胡雲峯曰幼者在後唯恐失羣故危之而號呼長者必緩飛以俟之小子厲有言之象六二鴻漸于磐飲食衎衎吉象傳飲食衎衎不素飽也虞仲翔曰承三應五故不素飽程傳漸進于上將行其道以及天下豈空飲食而已本義磐大石進于磐而益安矣衎衎和樂意六二柔順中正進以其漸而上有九五之應故其象如此郭白雲曰飲食衎衎盖君臣相遇而和樂也與詩嘉賓式燕以衎同意王童溪曰由干而之磐君子得位之象不素飽猶詩不素餐張紫巖曰身安道行君子樂之鄭東谷曰二艮體止于中正也漸而止于中正得所止也雷西仲曰初在下而无應故危二得位而上應故吉胡雲峯曰艮為石磐象互坎飲食象鴻食則呼衆衎衎和鳴柔順有應象何𤣥子曰艮變為巽正傳所謂止而巽其道不窮者九三鴻漸于陸夫征不復婦孕不育凶利禦寇象傳夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也王輔嗣曰與四相得不能復反者也非夫而孕故不育也程傳四隂三陽相比而无應相比則相親而易合无應則元道而相求夫謂三婦謂四本義鴻水鳥陸非所安九三過剛不中而无應故其象如此郭白雲曰以卦辭言女歸故以夫婦為言張紫巖曰易以夫婦象君臣三舎乾陽而趨坤隂本非志合道同而遇不以正鮮能成事居互坎坎險背道為不復離坎不相濟為不育且坤失母道也王童溪曰征往醜類也謂漸之六爻皆无不正三若獨往而不復于正道則離其羣醜婦失其道而得孕于非交所以不育嗜欲之冦甚于盜賊惟禮義可以已之使三也以道制欲而不失吾正則四亦不陷于不義此順以相保之道三艮之主貴于知止項平甫曰三為艮主自應能止然以純剛之質當漸進之時乃在互坎之中正得山上有木之象懼其進而犯難故有勸戒之辭三征則離艮而入巽故有離其羣醜之悲剛止于外下蔽二隂與之相保共禦冦賊則順道也羣醜謂儔類詩從其羣醜鄭亨仲曰三務進而妄動故征則不可還四失守而私交故孕則不敢育王秋山曰四非偶也乃冦也三若移其不中之剛而為得正之剛禦而去之則彼此不失其正故利胡雙湖曰艮止本不宜征既征不復亦止義婦孕離為大腹不育互坎血卦而潤下有胎漏之象冦互坎象利禦冦艮止象卦辭女歸吉者以三四兩爻也爻辭夫婦凶者亦三四兩爻也卦以兩體論巽女有歸艮男之象爻以應否論四女无歸三男之理胡雲峯曰鴻羣不亂止則相保有禦冦象熊南沙曰以下禦上艮體止而巽體順物莫能違故利禦冦按易中夫婦男女之象或以卦體或以爻位皆従隂陽也即卦體之男女亦以主爻之隂陽而定此卦三四乃少男長女之主爻故以夫婦言艮當止以當漸時而征巽本順以比少男而合六四鴻漸于木或得其桷无咎象傳或得其桷順以巽也孔仲達曰桷取其易直可安與三相得故无乗剛之咎程傳鴻趾連不能握枝故不木棲居正而巽順得桷也張紫巖曰位髙危道也履髙位而安其惟順乎謂順于道或云者得之難自坤之巽曰順以巽王童溪曰處近君之地為巽之主體順巽之徳而不失其正所以无冒進之咎馮厚齋曰巽為木而處艮山之上九三之竒畫衡于下桷象易山齋曰四進巽體故言漸于木俞石澗曰桷指三非應故曰或焦弱侯曰四方入巽回翔木杪其飛漸髙然或得平柯猶暫為棲息可進而不遽進漸之最善也巽體柔爻才性時位參合皆宜九五鴻漸于陵婦三嵗不孕終莫之勝吉象傳終莫之勝吉得所願也王輔嗣曰進得中位而隔乎三四不得與其應合故婦不孕各履正而居中三四不能久塞其途不過三嵗必得所願程傳陵髙阜象君位張紫巖曰君臣皆有中徳睽必合自三至五歴三位而應為三嵗艮上為陵朱漢上曰巽為髙艮為山山而進于髙陵也楊誠齋曰得所願豈惟位髙如丘陵功業亦如丘陵矣然豈一日之致哉亦三嵗之漸而至也胡雙湖曰四離體為大腹有孕象二无預于離又居坎體下故但曰不孕俞石澗曰五二正配故吉三四邪匹故凶郝象山曰二欲進于五九三為艮止撰坎以阻之華霞峯曰二不輕進五不輕任相須之久相信之深推誠一日結契終身而夙昔之願始酬于二見君臣之合于五繫夫婦之交上九鴻漸于陸其羽可用為儀吉陸胡氏程氏作逵従之象傳其羽可用為儀吉不可亂也王輔嗣曰進處髙潔不累于位无物可以屈其心而亂其志峩峩清逺儀可貴也孔仲達曰居无位之地是不累于位者處髙而能不以位自累則其羽可用為物之儀表胡安定曰陸當作逵雲路也王介甫曰其進也漸而不失時其翔也羣而不失序所謂進退可法者也六爻皆鴻至于上而曰其羽可用為儀要其終而不可亂也程傳爾雅九達謂之逵通達无阻蔽之義于漸之時居巽之極必有其序如鴻之飛于雲空賢達之髙致也羽鴻之所用進也張子无應于下羽潔无汚且處于髙故曰漸陸王童溪曰在六爻之上一卦之外不應復為九三之于陸漸于雲路翾翾其羽進退可觀沈守約曰卦之上至髙也巽之極至潔也巽為風變為坎坎為雲風雲之路錢融堂曰不可亂謂其行序之有倫若接止于陸其羽不展尚何不可亂之有王秋山曰巽體之極是風之髙者鴻遇風則其羽尤為閒雅不急不迫喻上九以陽剛處漸之極而執巽用柔居无位之地徳愈髙而望愈隆進退容止之間從容有序可為天下儀表俞石澗曰鴻之飛有序雖疾風不亂按陸當作逵秦樹峯云漸以進非漸以退也兌下震上中爻離坎歸妹征凶无攸利彖傳歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乘剛也虞仲翔曰乾天坤地三之四天地交以離日坎月戰隂陽隂陽之義配日月則萬物興故曰天地之大義震東兑西離南坎北六十四卦中此象最備四時正卦天地之大義也陸君陽曰漸四爻得正故女歸吉歸妹四爻失正故征凶程傳澤上有雷雷震而澤動男動于上而女従之嫁歸之象大率以説而動未有不失正者男女有尊卑之序夫婦有唱隨之禮苟徇情肆欲惟説是動則男牽欲而失其剛婦狃説而忘其順凶无攸利本義妹少女也兑以少女而従震之長男而其情又為以説而動皆非正也諸爻自二至五皆不得正三五爻又皆以柔乘剛故征凶而无攸利歸者女之終生育者人之始語錄歸妹未有不好只是説以動累他王童溪曰震東方兑西方天地生成之義其在人則震長男兑少女天地之大義而震與兑見之故曰歸妹天地之大義也説无紀極動无止息未有不失其正者初與上雖當位然亦陽下隂上何動而不凶以柔乗剛則柔下制乎剛剛受制乎柔何往而利項平甫曰古之言嫁者例稱歸妹易帝乙歸妹詩俔天之妹是也男三十而娶女二十而嫁男常長女常少故曰所歸妹也卦名歸妹者震東兑西夫婦之正位以卦徳言之凡説而動皆不正之事自歸妹之外皆不可行以卦爻推之則二四以陽居隂有男以不正従女之象三五以隂居陽有女以不正従男之象鄭東谷曰長男居上少女居下少女説以動而又先下于男吴草廬曰兑為少女而居内卦内卦夫家也婦人内夫家故以入于夫家為歸胡雲峯曰隨亦動而説者而曰元亨利貞何也易以内卦為貞隨貞震此動而彼説歸妹貞兑女説而男動胡雙湖曰乾交坤而為九四坤交乾而為六三是天地交也出震見離説兑勞坎是萬物興也何𤣥子曰震為天交于地之始兑為地交于天之終六爻坤乾交于上下坎離交于南北震兑交于東西象天地之交按歸妹彖傳夫子于釋彖之先補出天地之大義人之終始者盖易重交易非交易則不生此卦卦體二象本无不善文王彖辭専従卦徳爻位而言非夫子不能得其意而仍不泥其辭也姤彖傳補天地相遇于釋彖之後此補于釋彖之先其義一也於此可悟觀象玩辭之法初九歸妹以娣跛能履征吉象傳歸妹以娣以恒也跛能履吉相承也孔仲達曰為妻而行則凶為娣而行則吉胡安定曰跛者足之偏姪娣非正配而能盡其道以配君子猶足雖偏而能履地而行也程傳居下而无正應娣也剛陽在婦人為賢貞之徳娣雖賢何所能為承助其君而已如跛之能履不能及逺然在其分為善張子爻為陽故能履非匹故跛郭白雲曰无應无歸因人之歸而為娣媵張紫巖曰兑下為娣兑毁足為跛蘭恵卿曰跛者不能専行依人乃可娣妾之道承正室以行則吉馮厚齋曰女以女弟為娣故文从女从弟以江有沱詩云不我以與此同義趙復齋曰歸妹之時柔尊為女君剛而位下盖賤者也六五接二王姬下嫁初九承二賤妾上従蔡進齋曰无應不行跛象居位得當而近二故能履適二而媵乎五得娣之正俞石澗曰跛雖能履常在人後觀彖女必待聘而行惟妾媵則不論禮之齊備従嫡而適固其常也歸妹非恒以娣為之則恒矣能與君相承故曰跛能履吉九二眇能視利幽人之貞象傳利幽人之貞未變常也王輔嗣曰在内履中而能守其常故利幽人之貞張紫巖曰離為目為視兌毁之為眇二以互離居兌中若眇者之有見然其徳本明其毁外至曰眇能視澤中為幽人項平甫曰九二當以六五為婦雖與三相比而非正配當守幽人之貞以俟正配然後不失其常趙復齋曰眇能視不説彼色也利幽人之貞不慕彼勢也安静守正則六五嬪矣呉草廬曰歸妹九二即履之九二故其占同按程傳本義以六爻為女諸儒従之項平甫則以陽爻為夫隂爻為婦丘氏以二為妹之正身六五則歸妹者也胡雙湖頗許其説愚謂卦名歸妹則六爻皆歸妹之時无容指某爻為妹某爻為歸此六十四卦之通例也既名歸妹固當以女為主女而无應則皆无偶之象初三四上皆无應則皆无偶故不復分爻之隂陽及内外卦之男女唯以位之上下取象初在下卦之下為娣四在上卦之下為愆期以陽而皆作女象明卦時也至二五有應則有配有配則陽夫隂婦有自然之象不容更為矯輮周公爻辭于二不言歸妹非略之也言幽人深明九二之異于初四之陽爻也五曰帝乙歸妹明其為歸妹之主爻也曰月㡬望明與二配為坎月與離日之相望也且二之辭與履二同不應于履為士之幽于此為女之幽五之辭與泰五同不應于泰為妹歸于二于此為歸二之妹讀易者但當以爻辭之明文為據而得其所為不可為典要者正不必曲為之説又攷易例于卦之三男三女尤有不甚泥者恒之六五以震男之隂為婦家人之九五以巽女之陽為主漸之九五巽女之陽而以艮男之隂為婦又何疑于此卦兑女之九二為夫乎夫在歸妹卦時九二亦可為女而周公以為幽人者凡卦有主爻或以一爻為主或以兩爻為主固隨成卦之義而變而二五之主爻率不可易諸卦皆然即如漸與此卦反對皆以三四兩爻為主而二卦爻辭于此兩爻皆不取皆以二五中正相應之爻以明卦義之正此又所謂既有典常者也玩傳云未變常者正以卦象女下男女説而動為變其常理惟九二中正自守以男下女以致六五正應之嬪故特以未變明爻義之美六三歸妹以須反歸以娣象傳歸妹以須未當也當字平聲虞仲翔曰須需也初至五體需象孔仲達曰未當其時則宜有待趙汴水曰須待也歸于君子曰歸復還父母曰反歸三須而未進者也王秋山曰兑為少女三兑之成卦者也其少可知須待年也古者諸侯一娶九女其娣姪則有待年于父母之國者今歸而反以娣之待年者自處故曰反歸以娣傳言未當言其歸未當其時也按柔不中正少女之主爻卦辭所以為征凶者也而爻不言凶并无悔吝咎厲之占即玩爻辭亦无凶象則以為女之不正人莫之取者似非爻義盖歸妹以六五為女君正嫡不可有二則餘皆娣也娣為諸妾中之最貴者觀初爻可見初以賢貞為娣何獨于三則因人所棄而為娣或以須為女之賤者夫須賤于娣以須反歸而轉得為娣于理不順以待訓須本之註疏待年之説王氏最允盖彖言征凶者合二卦説而動而言也至爻之本位祇有兌之説而无震之動不得坐以動而失行之罪所以爻與彖不同也至此爻之須而反歸者三上无應未有所歸三體互坎動則下體成乾合水天需之象見險而止故曰須以少女而變為乾父乃待年于父母家之象故曰反歸九四歸妹愆期遲歸有時遲去聲象傳愆期之志有待而行也劉長民曰四居下體之上位過乎少女女過盛年愆期也胡安定曰以剛陽之質居隂柔之位不為躁進故待其禮之全備然後歸于君子斯得其時也遲待也程傳陽剛在女子為正徳處柔乃婦人之道其愆期為有待非不售也待得佳配而後行也本義以陽居上體而无正應賢女不輕従人張紫巖曰四居兑上兑正秋為愆期至震而動為有時按四為震初何得有愆期之象盖雷居互坎中震遂泥也六五帝乙歸妹其君之袂不如其娣之袂良月㡬望吉象傳帝乙歸妹不如其娣之袂良也其位在中以貴行也王㑹之曰下應于二君禮于臣尊下乎卑帝乙歸妹也天子歸妹于臣下以貴行也雖王姬下嫁夫婦之禮不可廢故小君降心而不凌其夫則其禮容不如娣之盛焉善之善也程傳居尊下應尚禮而不尚飾故其袂不及其娣之袂良月望隂之盈幾望未至于盈以柔中在尊貴之位以貴而行中道也本義六五尚徳而不貴飾朱漢上曰坎月在震東離日在兑西日月相望隂之盛也胡雙湖曰君謂五娣謂初與三故兩爻皆稱娣胡雲峯曰娣以容飾為事五君也豈假容飾以悅人者良在徳而不在袂月㡬望在中孚小畜以位言隂盛而與陽亢在歸妹以徳言隂盛而可與陽對也俞石澗曰六五雖王姬之貴而隂爻虗初九雖在下而陽爻實是其君之袂不如娣也觀彖婚姻之道皆男求女獨帝女下嫁以女求男此爻適當其象則歸妹之義不徒无凶而反吉矣上六女承筐无實士刲羊无血无攸利象傳上六无實承虗筐也程傳上六女歸之終而无應女歸之无終者也筐篚之實婦職所供諸侯之祭割牲取血筐篚无實則无以奉祭祀婦不能奉祭祀乃夫不能承祭祀也故刲羊而无血王童溪曰處歸妹之窮震之極動不静也柔无能才不堪也虗不實誠不存也以女言之承筐无實以士言之則刲羊无血矣故无攸利而象則特取虛筐无實盖歸妹上六女子也張紫巖曰兑為羊為金互坎在上為无血趙復齋曰乗五非娣也上極非須也无應非婦也體柔非夫也故无適而可楊誠齋曰震有虗筐象兑羊象趙汴水曰女六之象爻兼言士女明无一而利釋辭止言女主本卦而言熊梅邊曰二五得歸妹之正偶初三以非應故皆為娣而上六則不婚之男不嫁之女胡雙湖曰承筐女之職刲羊士之功夫婦之禮不成故爻以士女言之按上三本不相應不必更以應言女者爻之隂士者震之體皆指本爻言此與恒卦六五以爻隂稱婦人體震稱夫子同也本義約婚不終之意似非爻象上三皆隂何以為婚周易孔義集説卷十四
