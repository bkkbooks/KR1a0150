body:
  text: 周易孔義集説卷五光禄寺卿沈起元撰上經震下兊上中爻艮巽隨元亨利貞无咎彖傳隨剛來而下柔動而説隨大亨貞无咎而天下隨時本義云王肅本時作之今當從之隨時之義大矣哉本義云王肅本時字在之字下今當從之王輔嗣白震剛兌柔以剛下柔動而説之隨之道胡安定曰剛來下柔猶聖賢君子以至剛之徳至尊之位至貴之勢接于臣而下于民故賞罰號令一出于上則民皆悅而隨于下也石守道曰以爻取之初九在二三之下亦以剛下柔也凡隨之義可隨則隨若惟隨之務不以正道安得亨程傳女隨人者也以少女從長男隨之義又以卦變言之乾之上來居坤之下坤之初往居乾之上陽來下于隂也以陽下隂隂必説隨君子之道為衆所隨己隨于人臨事擇所隨皆隨也凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也隨之道利于貞正失其貞則有咎本義己能隨物物來隨己彼此相從其通易矣然若所隨不正則雖大亨而不免于有咎矣郭兼山曰震東方之卦萬物隨之以生兌西方之卦萬物隨之以成故春生夏長秋成冬藏隨也聖人東作西成亦隨也李隆山曰咸隨二卦皆男下女者也咸少男少女隂陽之氣相等而相應故謂之咸隨長男少女陽壯于隂可以相制而隂自隨之故謂之隨凡彖中所謂剛來者皆一陽自乾來而交坤所謂柔來者一隂自坤來而交乾震以乾之陽剛來下坤柔故兌柔以喜隨之王童溪曰或曰易家以隨自否來蠱自泰來其義何如曰非也乾坤重而為否泰无自否泰而來之理世儒惑于卦變殊不知八卦成列因而重之而内外上下往來之理已備乎其中自八卦既重之後又烏有所謂上下往來之義乎吕東萊曰凡小隨大柔隨剛隂隨陽下隨上必自上有以先之天下未有无感而應者王秋山曰隨之大亨利于貞亦謂初上成卦之主皆得其正而二五亦隨之以中正是天下隨之也時義者時之宜聖人之治隨時宜而變通之揖讓征誅皆時之宜豈强天下使之隨者故曰大矣哉胡雙湖曰男女相重之卦隨蠱噬嗑賁咸恒損益困井漸歸妹豐旅渙節既未濟凡十八卦取男女家室義者惟咸恒漸歸妹四卦如此卦陽倡隂和男行女從宜取夫婦而不取者長少既非耦成卦之爻又在初末非應非比相去遼絶也蠱亦然俞石澗曰大亨貞无咎而天下隨之蓋指九五隨之為卦大抵以下隨上故初交二二係三三係四四係五凡在下者无不隨上是謂天下隨之初九官有渝貞吉出門交有功象傳官有渝從正吉也出門交有功不失也鄭康成曰震為大塗又為日門當春分隂陽之所交也九家易曰震為子得土之位故曰官本義卦以物隨為義爻以隨物為義初九以陽居下為震之主卦之所以為隨者也既有所隨則有所偏主而變其常矣唯得其正則吉趙復齊曰初主四常也隨二變也爻義以時變時義以畫變初隨六二故出門交有功當隨之時而取應失之矣卦義隂隨陽爻義下隨上也項平甫曰官主也初九為一卦之主以乾之上九坤之初六相變而成隨上九初六本皆不正因變得正遂有動說之象故曰官有渝貞吉此一句論卦之始變隨之本也蔡節齋曰門二也徐進齋曰二居中得正初隨之而不失其正則有功也趙汴水曰隨之為義以上下言以下隨上以前後言以後隨前俞石澗曰官主守也初九震體震以剛爻為主官也官貴有守然處隨之時不可守常而不知變故曰渝變也隨六爻專取相比相隨不取應初九不可舍六二之正而從九四之不正也何况初與四兩剛相遇无相得之情豈可與交今初九出門而與六二交則不私其隨又得所從而不失其正故曰有功震以一陽為主主不當隨人而陽亦不當隨隂然以下從上以正從正則隨道之當然也以初九之正從六二之正故吉六二與六三皆半剛半柔故爻辭皆言失初九剛正而專一出門即與二交則得所從之正故不失也渝者權以適變也行權不能不失經故戒以從正不適變則失時不守正則失己適變而能以正道固守斯不失矣六二係小子失丈夫象傳係小子弗兼與也趙復齋曰隂為小子陽為丈夫二隨六三則失初九也趙汴水曰事不能兩得人不能兼與隂必隨陽則二之與初者情也下必隨上則二之與三者時也當隨之時係三則失初二者不可得兼兼初與三而立義故變係為與隂之性專三隂爻皆言係者專于隨也來矣鮮曰不言凶咎者二中正所隨之時不能兼與也六三係丈夫失小子隨有求得利居貞象傳係丈夫志舍下也司馬温公曰三无中正之徳而不凶所隨得其人也楊龜山曰陽剛大夫隂柔小子不係二而係四係丈夫也雖有所係而所隨者上與失大夫者異矣蓋親仁尚賢隨之上也本義四陽當任而已隨之有求必得然不正而為邪媚之嫌故又戒以居貞王童溪曰隨之六爻半隂半陽陽剛之才有所隨而无所係柔從之才而當隨之時均不免于有所係矣項平甫曰隂之隨人以係係者私情陽之隨人以孚孚者公道此可以見隂陽之情趙汴水曰丈夫指九四小子指六二六二六三稱小子與師六三稱弟子同義有求者三求隨于四也得者我自得謂四受之而得所願也三之係上失下與六二同而以隂隨陽則異斯為正中之正故言係兼言隨六三處九四六二之間志欲耑係于上故必舍乎下俞石澗曰道以隨上為貴隨陽則有得今以上隨下以隂隨陽故曰隨有求得然三四皆不正以不正係不正則其隨也乃枉道趨利而詭隨求必苟求得必苟得故戒之來矣鮮曰中爻巽為繩係象九四隨有獲貞凶有孚在道以明何咎象傳隨有獲其義凶也有孚在道明功也楊龜山曰九四震兌之交動而説也本義九四以剛居上之下與五同徳故其占隨而有獲張紫巖曰互艮艮手為有獲艮其道光明為以明胡雲峯曰四五以陽居三上二隂之中陽内隂外有中實之象故皆曰孚梁孟敬曰九四近九五與之同徳乃大臣之任其事者其有求于五宜无不獲也然大臣之道當正其誼不謀其利明其道不計其功今有求必得雖受所當受其能免于凶耶積孚誠以釋其疑盡臣道以致其忠明幾微以保其身斯无咎俞石澗曰九四之隨九五獲乎上而有道者也以臣從君以隂從陽故曰隨有獲按隨有獲諸儒本王輔嗣説以得人之隨據為己有為有獲獨本義以為與五同徳故隨而有獲最為得㫖然勢凌于五云云猶沿舊説也夫四之位雖多懼之地而隨之九四非若豫之九四為成卦之主而能得天下之隨者也隨四惟三不足為四病九五剛中亦非柔君可比四安得有凌五之勢在此爻之所以有獲者以隨五也所以貞凶者即在有獲也蓋四五皆陽他卦所有唯當隨之時比者相得而又同居説體則言聼計從動輒如志已屬危道且以説為主則非乾之健非離之明易于容說苟不能以道事君而寵利自居則獲之所多即凶之所集故戒之曰有孚在道以明言感孚獲上必以道為説則獲乎上正以行吾道雖有獲何咎然亦以九四位雖不正而互艮光明燭于事理下動上止有正色立朝鎮撫羣下之功不為詭隨者又為互巽居髙位而巽順无專權傲物之患象傳以明功許之深予九四之才也九五孚于嘉吉象傳孚于嘉吉位正中也來矣鮮曰八卦正位兌在六爻之嘉美者也且上六歸山乃嘉遯矣故曰孚于嘉合訂五爻不言隨而言孚九五中正居尊動物以誠也隨元亨亨者嘉之㑹也上之説説以道者也故五孚上為孚于嘉五君位本无不孚尚賢其先務也尚賢而天下隨之嘉之㑹也上六拘係之乃從維之王用亨于西山象傳拘係之上窮也吕東萊曰拘係而不可解隨之極者也如有客詩言授之縶以縶其馬白駒詩縶之維之以永今朝正合此爻李西溪曰王五也馮厚齋曰西者兌象上六成兌之主也山者艮象又一卦之上最髙之象也龍觀復曰艮坎皆北方幽隂卦朱子嘗云坎有鬼神象坎一陽伏二隂中為鬼艮一陽尊髙為宗廟兌為巫主祭祀凡言祭享通取三卦象觀彖上六卦外不與人相隨者也以卦義九五下柔故上為所拘係而不能去係之不足又從而縶維之蓋上有下賢之君則雖遯逸髙舉之士无不為所羅致文王求賢下及兎罝屠釣此神明之所以享而王業之所以興也窮上則有往而不返之象故必用拘係之合訂持以手為拘缚以物為維既拘之又維之五以誠感上以誠應一徳相孚固結而不可解也兩之字指上按隨之為義曰倡隨曰追隨皆躡而隨其後也此卦剛來而下柔乃致人説隨之道非必以剛隨柔也亦非以柔隨剛也卦象下動而上説即下隨上之義且卦與水地比相似澤亦水也震之上二隂即坤地也水潤下地承水比而无間但比有主爻故五隂以比九五為志隨无主爻則唯以近而相比者為隨此不易之理故主比而不取應方與象傳符合如舊説以初隨四則兩剛敵應何以為隨相去殊逺何言出門有交以初為小子則二而係初己逆而不順若三之于初本非比應又何以言失且已隔于二不必舍而自不相係傳何必言志舍下九四之隨有獲自當以隨五為有獲陽實隂虛三隨于陽為有得未可以四得隂隨為有獲也巽下艮上中爻兌震蠱元亨利涉大川先甲三日後甲三日彖傳蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也程傳蠱之義壊亂也在文為蟲皿皿之有蟲蠱壊之義左氏傳云風落山女惑男以長女下于少男亂其情也風遇山而囘物皆撓亂是為有事之象焦氏曰巽而止巽而不為因循至壊也壊而復使大通而天下治者幹事之效也本義蠱壊極而有事也其卦艮剛居上巽柔居下上下不交下卑巽而上苟止故為蠱蠱壊之極亂當復治故其占為元亨而利涉大川俞石澗曰動而飭之則壊者可復完甲指互震而言震動也震東方之卦東方屬甲梁孟敬曰止當矯以奮發巽當矯以剛果故利涉大川邵二泉曰治蠱曰蠱猶治亂曰亂治荒曰荒故蠱為有事來矣鮮曰利涉大川者中爻震木在兌澤之上也易外蠱元亨者言木雖蠱中尚有元能治之則可亨也卦以初上變而不成乾坤是父母之蠱也變乾為巽以柔居剛變坤為艮以剛居柔皆失其位幹者震男之事處乎乾坤之中先甲三日而幹父之蠱後甲三日而幹母之蠱使乾之始者復其始坤之終者復其終以成父母之泰而應天之行按先甲後甲三日夫子以終則有始釋之巽爻辭先庚後庚三日周公以无初有終釋之義自可尋乃諸説紛紛都未允慊俞氏以互震為甲互兌為庚似矣而以甲為始以庚為更尚沿舊説而以三日為震之三爻則于先後二字尚欠分曉易外推父母之義為獨得而于先甲後甲三日之義未有發明夫先甲二句正言治蠱之道彖傳二句所以釋先三後三之義也蓋甲者震也雷動風行散鬱起滯木氣以行震為長男足以鼓少男之止制長女之惑飭蠱之用于是乎在聖人之所亟取也文王卦圖先震三位為乾後震三位為坤乾為父坤為母乾為大始坤為大終蠱之為蠱既從乾坤失位而成故幹蠱皆幹父母之蠱父母之蠱唯長子有幹蠱之責猶天地之蠱唯大君有斡旋之力文王指出先甲三後甲三示以幹乾坤之蠱也乾坤具終始之義故傳以終則有始釋此二句後甲為坤終也先甲為乾始也此所謂天行也其不言震而言甲者震徳在木故主木而言甲爻辭所謂幹皆從木而言也震為甲木巽為乙木乙木蟲生而死甲木蟲蝕猶生以震飭巽即以甲治乙以剛振柔也推之先庚後庚例亦符合蓋巽之為義患其進退不果柔順寡斷重巽則隂之伏入尤甚故于九五發之制巽木者莫如兌金兌在西為庚先後云者无初有終之義也天之流行震始而艮終庚為兌位先兌三位為巽不及震之始後兌三位為艮適當艮之終以兌金為用則雖无初而克有終所以不言兌而言庚者兌有説體説不足以制巽故取兌之庚金以示義上九䘮其資斧征凶斧之金所以斷九五中正能用庚之斷而吉上九巽極失其兌之斷而凶可見庚之為兑金而取其斷也无疑初六幹父之蠱有子考无咎厲終吉象傳幹父之蠱意承考也王輔嗣曰處事之首始見任者也以柔巽之質能承先軌堪其任者也故曰有子當事之首是以危也能堪其事故終吉孔仲達曰凡幹父事不可一依父命當量事制宜以意承考而已父沒稱考若散而言之生亦稱考若康誥云大傷厥考心是父在稱考此避幹父之文故變云考也蘇子瞻曰器久不用而蟲生之謂之蠱人久宴溺而疾生之謂之蠱天下久安无為而弊生之謂之蠱蠱之災非一日之故也必世而後見故爻皆以父子言之及其微而幹之初之任也本義幹如木之幹枝葉之所附而生者也蠱者前人已壊之緒故諸爻皆有父母之象子能幹之則飭治而振起矣初六蠱未深而事易濟故其占為有子則能治蠱而考得无咎然亦危矣知危而能戒則終吉也吕東萊曰意承考者從父之意而已譬如人君之繼志是也祖宗之意只欲天下安我措置得天下安便是承祖宗之意沈守約曰巽而為乾本巽順之質而行以剛健子能幹父事之象卦變大畜能畜大而不散其幹蠱之才乎俞石澗曰初六巽體之柔力小任重始雖危厲而才柔志剛終亦能幹楊廷秀曰前人已失而致蠱未必无悔過之心幹父之蠱乃承考之意而置之无過之地此聖人以子之賢善歸之于父華霞峯曰意承考先意承志未成蠱而即救正之俾其父无失徳所謂有子考无咎也合訂乾為父坤為母自剛上柔下而父母之道俱失矣故六爻俱稱父母不必指定某爻為某爻父某爻為某爻母也意承考蠱者考治蠱者考之意也九二幹母之蠱不可貞象傳幹母之蠱得中道也孔仲達曰居内處中是幹母事婦人之性難可全正雖屈己剛猶不失在中之道蘇子瞻曰隂之為性安无事而惡有為是以為蠱之深而幹之尤難者正之則傷愛不正則傷義二以陽居隂有剛之實而无用剛之迹可以免矣程傳子之于母在乎屈己下意巽順將承使之身正事治而己若伸已陽剛之道矯拂傷恩則所害大矣故曰不可貞張子處中用巽以剛繫柔得剛柔之中也王童溪曰二隂位也而屬内卦之中體九陽徳也而居内卦之中位則以剛明之才而幹庭内之事之象也沈守約曰居巽應艮順而止也卦變純艮艮為門庭幹内事之象楊誠齋曰子幹母蠱易于耑斷而失于承順故戒以不可貞龔泉峯曰諸爻稱幹父之蠱者四幹母之蠱者一蓋婦无遂事而聼于夫事之壊多父所致也九三幹父之蠱小有悔无大咎象傳幹父之蠱終无咎也本義過剛不中故小有悔巽體得正故无大咎王童溪曰視二為過剛矣然此乃幹父之蠱用力之地不得不然也三之剛過父之争子不從令而以争小有悔也然免父于不義謂之非孝可乎三下體之終故曰終无咎沈守約曰爻變為坎剛中也卦變為䝉養正也剛中而養正其于幹蠱何咎之有胡雲峯曰幹蠱之道與其過柔而吝不若過剛而悔按三為互震之主爻幹蠱之任與才于是乎在故周公僅許之而孔子深予之六四裕父之蠱往見吝象傳裕父之蠱往未得也蘇子瞻曰益其疾為裕本義以隂居隂不能有為寛裕以治蠱蠱將日深故往則見咎張紫巖曰蠱至四巽極而止隂止于下有兌説體為裕劉壽翁曰發以立事為幹怠而委事為裕事弊而裕之弊亦甚矣六四體艮之止爻位俱柔止而怠柔而懦皆増益其蠱者也沈守約曰卦變為鼎鼎之四力小任重折足之凶往見吝之象毛伯玉曰九三之鋭失之過故悔本爻之緩失之不及故吝熊梅邊曰裕寛也徳可裕蠱不可裕也六五幹父之蠱用譽象傳幹父用譽承以徳也吕藍田曰六四以姑息事親六五以徳事親以姑息者苟安于一時而親卒受其弊用毁者也以徳者柔不失中全其良貴起敬起孝使親不離于令名用譽者也張紫巖曰互兌為譽項平甫曰得尊位行大中能以令名掩前人之蠱故曰承以徳言不以才幹而以徳幹也趙汴水曰爻稱幹父者三初承以意三承以力五承以徳也三以長子正位率諸弟以共濟故不稱其力而蠱自亨熊梅邊曰至于用譽則不特幹其事之已壊所謂立身揚名使國人稱願曰幸哉有子矣俞石澗曰六五之徳足以承任幹父之責故曰承以徳也以承釋用字徳釋譽字初以意承五以徳承皆能幹父蠱者也承謂本爻非指他爻鄭孩如曰子有幹蠱之名則過歸于親幹蠱而親不失于令名是用譽以幹之也幹蠱之最善者使人不曰承敝而曰承徳若不知其為前人之蠱然者按觀承以徳句自是言本爻之徳不必于二取義上九不事王侯高尚其事象傳不事王侯志可則也石守道曰在卦之終事成也在卦之上而无所承身退也在外卦而心不累乎内志之高也程傳以剛明之才无應援而處无事之地是賢人君子不偶于時而高潔自守不累于世務者伊尹太公之事曽子子思之徒是也志可則者進退合道也本義剛陽居上在事之外故為此象郭白雲曰蠱之時天下事弊風俗卑陋委靡不振非夫伯夷之聖使聞其風者頑夫廉懦夫有立志又安能振蠱之風也歟于否有彚貞之君子在蠱有不事王侯之士其道不同不可同論也林黄中曰王五也侯三也在五之上不應乎三不事王侯象張紫巖曰艮止為不事王侯項平甫曰在蠱之外不當事之人然當事者以幹蠱為事不當事者以高尚為事亦各事其事也鄭東谷曰事之始猶未定也君子則出力以幹之事之終成者不必有為壊者不可復為君子无所用其力矣是以上九雖有其才處于事外不事事而高尚其事梁孟敬曰其事者何曰聖賢之道也吾身之徳義也苟不任王侯之事又不事吾身之事而徒曰吾不事焉高尚焉若人者又曷足稱乎胡雲峯曰初至五皆以蠱言不言君臣而言父子臣之于君事猶子之于父事也上九獨以不事王侯言者蓋君臣以義合也子于父母有不可自諉于事之外者若王侯之事君子有不事者矣是故君子之出處在事之中盡力以幹焉而不為汚在事之外潔身以退焉而不為僻合訂當蠱之時風俗頽靡上九以特立之節振之所以鼓勵人心者大矣桐江一絲繫漢九鼎得上九不事之道也按卦變之説伊川云諸卦皆從乾坤來固為不易之論但聖人觀象繫辭自于成卦後有觸類而長之妙如乾坤交而成泰不交而成否則凡卦之交者皆有泰象不交者皆有否象此卦巽之一隂本自坤來艮之一陽本自乾來巽而止陽上而隂下視泰卦恰倒此二爻且巽二陽上而一隂下艮一陽上而二隂下合六爻觀之皆有不交之象即否象也而未至于否之甚故其卦為蠱聖人繫辭欲明事壊于前之意而此卦恰從乾坤之變為巽艮而成是以有父母之蠱之象况卦中貞悔則有長女少男中爻則有小女長男皆為六子之卦而先三後三又的係乾坤之位爻辭幹父蠱幹母蠱无一字泛説而説易者猶以本卦中求父母遂致步步支離耳第父母二字實象亦虚象天地亦父母也君亦父母也舊事亦父母也昨日亦父母也得此意而推而行之則存乎用易者兌下坤上中爻震坤臨元亨利貞至于八月有凶彖傅臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也孔仲達曰陽之浸長其徳壯大可以臨下剛既浸長説而且順居中有應大得亨通而利貞也程傳澤上之地岸也與水相際故為臨天下之密近相臨者莫如地與水故地上有水而為比澤上有地則為臨臨民臨事凡所臨皆是在卦取自上臨下臨民之義浸漸也二陽長于下而漸進也下兌上坤和悦而順剛得中道而有應助是以能大亨而得正化育之道所以不息者剛正和順而己以此臨人臨事臨天下莫不大亨而得正張子臨言有凶者陽至二未過中已戒猶履霜堅氷之義郭白雲曰以大臨小上臨下為義序卦曰臨者大也蓋臨為大而所臨者小故也自一卦言之二陽之生為臨其生不已故曰剛浸而長自内外二卦言之則曰説而順自九二成卦之爻言之則曰剛中而應項平甫曰易之卦義不耑取字訓但因事立義耳人之所需者以飲食為急故需為飲食需不訓食也人之所行以禮為重故履為禮履不訓禮也治蠱者必有事故曰蠱者事也蠱自訓壊蠱不訓事也能臨物者必大故曰臨者大也臨自訓莅不訓大也彖言以剛臨柔自下而長以臨上之四隂也象言以高臨深自上之坤以臨下之兌也李隆山曰陽生于子終于己隂生于午終于亥故一陽復至已為乾則陽極隂生一隂姤五月二隂遯六月三隂否七月四隂觀八月所謂八月有凶者言之于臨則當自臨數而不當自復數以觀次臨則當數至觀而不當數至遯臨觀乃隂陽反對消長之常理趙汴水曰八月之説詳味聖人消不久之義專以二陽之消長為主聖人以姤與夬反論一隂之消長以復與剝反論一陽之消長以泰與否反論三陽之消長以臨與觀反論二陽之消長觀少進一位即成剝而陽之消不久矣遯猶有四陽得為消不久乎龔泉峯曰自姤一隂生厯七爻為復而一陽來七日來復原其始而言之者喜陽之復也自臨二隂長至于八月為觀而二陽消至于八月有凶要其終而言之慮陽之消也俞石澗曰臨十二月之卦也浸猶水之浸物以漸而浸進也天地間一氣不頓長一形不頓虧必以其漸隂符經謂天地之道浸是也臨倒轉即為觀不過反掌間耳論其長則曰浸論其消則曰不久聖人豫為君子憂如此初九咸臨貞吉象傳咸臨貞吉志行正也趙汴水曰咸皆也交胥同也猶咸有一徳咸和萬民之咸二陽同進故初與二皆稱咸臨之初陽欲上行以臨人蓋以行正為吉與屯初爻志行正之義同胡雲峯曰復曰朋來初二兩咸字即朋字之義兩臨字即來字之義故復初元吉臨初亦貞吉九二咸臨吉无不利象傳咸臨吉无不利未順命也蘇子瞻曰四隂在上負其强而未順命故以咸臨之則吉趙汴水曰卦之得名在此爻蓋以剛中而正位也彖言利貞利乎此傳言以正以乎此初言行正行乎此九二與初同徳上應乎大君則庶民盡出臨莅之下梁孟敬曰四隂黨盛尚未順命于陽也華霞峯曰處隂順之時使二陽不同心以臨則君子之勢孤危道也初二咸臨即泰㧞茅彚征之意四隂方盛必合君子之交以咸臨之而後吉无不利元祐之末熙寜之小人方衆而洛蜀朔黨之分交相排擊示小人以不公而後章惇蔡京之徒得以逞其志乃知咸臨之義為君子謀至深逺矣六三甘臨无攸利既憂之无咎象傳甘臨位不當也既憂之咎不長也虞仲翔曰兌為口坤為土作甘兌口銜坤故曰甘臨失位乗陽故无攸利无應故憂動成泰故无咎胡安定曰以不正之行取説于民違道以干譽者也石守道曰比于浸長之剛而能變是以无咎程傳三居下之上臨人者也隂柔而説體又處不中正甘説也耿希道曰節之九五以中正為甘則吉臨之六三以不中正為甘則无攸利王童溪曰互位有坤順震動象為既憂之易心退聼而以至誠順君子隂消陽復馴可致泰邱行可曰此爻見君子得時小人媚説取容之狀沈守約曰處説之極變為乾説而健進甘臨象卦變為泰陽得上進泰道成矣咎不長象王秋山曰剛長之時上下諸爻皆當位得中之君子獨六三不中不正而以隂柔居下之上上无應與下畏二陽來矣鮮曰變乾乾三爻惕若憂之象也六四至臨无咎象傳至臨无咎位當也王輔嗣曰處順應陽不忌剛長而乃應之履得其位盡其至者程傳四居上之下與下體相比是切臨于下臨之至也臨道尚近故以比為至四居正位下應剛陽處近君之位守正而任賢以親臨于下是以无咎所處當也楊龜山曰初四皆當位誠意相與至臨也張紫巖曰至坤徳也四位近君撰體坤中一心應陽不撓其進上順于君下説乎民臣徳至矣胡雲峯曰六四坤兌之間地與澤相臨之至也六五知臨大君之宜吉象傳大君之宜行中之謂也王輔嗣曰處于尊位履得其中不忌剛長而能任之則聰明者竭其視聼知力者盡其謀能不為而成不行而至矣本義以柔居中下應九二不自用而任人乃知之事郭白雲曰舜之大知執其兩端用其中于民其行中之謂乎朱漢上曰二以剛中上行五以柔中下行上下相交五兼二而用之上下行中道也沈守約曰坤而為坎坎于人則知也趙汴水曰六本柔暗今乃燭羣隂之情不昵比其私而下應剛中之二知者之事也宜者行中而已六五位居大中深知羣隂不可與共政幸而二陽浸長足辦吾事故執中而扶持之使安其位以成臨下之業胡雲峯曰周公于臨之坤體曰知臨夫子釋乾四徳言仁義禮信不言知于坤言知光大五常之徳知藏于内坤以藏之故也胡雙湖曰位剛生明故曰知俞石澗曰陽大隂小六五隂爻而稱大以其順從九二之陽也中乃隨時取宜非任明察以為知也行中釋宜也按彖傳所謂剛中而應者也故曰吉曰行中上六敦臨吉无咎象傳敦臨之吉志在内也蘇子瞻曰敦益也六五既應九二上從而附益之猶復之六四既應初九六五又從而附益之也程傳坤之極順之至居臨之終敦厚于臨也與初二雖非正應然大率隂求于陽又其至順故志在從乎二陽尊賢取善敦厚之至也隂柔在上宜有咎也以其敦厚于順剛是以吉无咎居終而不取極義臨无過極故止為厚義朱子上六敦臨自是積累至極處有敦篤之意艮上九亦謂之敦艮復上六爻不好所以只于五爻謂之敦復朱漢上曰坤厚也上成艮為篤實厚而篤實敦之象張紫巖曰兌承坤以兌隂合坤隂復有坤體下臨二陽為志在内李隆山曰以厚接物未有不安故敦復无悔敦艮吉敦臨无咎大凡陽長則隂消君子吉則小人凶臨之二陽方長而上四兩吉兩无咎何也説而順剛中而應故也陽方漸長羣隂順以應之則兩不相傷宜乎下而近者无咎上而尊者吉也王秋山曰居一卦之上居高臨下所臨者二陽而已坤體厚徳而内從二陽之君子故吉故无咎楊廷秀曰處臨之終教思无窮容保民无疆者也胡雙湖曰二陽浸長進逼于隂雖成卦之主而雜卦曰臨觀之義或與或求與者上下相與也初二咸臨剛臨柔下臨上也三四五上上臨下柔臨剛也上下相臨所謂與也張彦陵曰志在内即萬物一體之意所以能敦觀彖敦厚于臨乃志在天下非在事外者也按上三爻之臨地臨于澤之象地愈厚澤愈安坤下巽上中爻坤艮觀盥而不薦有孚顒若彖傳大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀皆平聲觀天下之觀去聲鄭康成曰坤為地為衆巽為木為風九五天子之爻互體為艮艮為鬼門又為宫闕天子宗廟之象虞仲翔曰以五陽觀示坤民故稱觀盥沃盥薦羞牲也坎為水坤為器艮手臨坤坎水沃之盥之象王輔嗣曰觀之為道不以形制使物而以觀感化物神則无形者也不見天之使四時而四時不忒不見聖人使百姓而百姓自服也蜀才曰柔小浸長剛大在上其徳可觀故曰大觀在上本義觀者有以示人而為人所仰也内巽外順而九五以中正示天下所以為觀盥將祭而潔手薦奉酒食以祭有孚顒若謂在下之人信而仰之卦四隂長而二陽消為八月之卦語録聖人至徳出治自然而化更不待用力而下莫不觀感而化故取義于觀盥意謂積誠信之至但是盥滌而不待乎薦享有孚已顒若故曰下觀而化趙復齋曰聖人之誠自盥至薦純一无間民信之深自不待薦爾大觀在上統謂二陽中正以觀天下獨舉九五天之神寓于四時聖人之神寓于教自姤至否陽臨隂者皆致力焉至觀而率服變化之妙非九五不可郭白雲曰大觀在上觀之者不期化而自化是之謂神道神道之謂大觀天亦无所示也特四時不忒而已而萬物自生自化故知四時不忒是謂天之神道由人言之亦曰天之大觀也李隆山曰四陰雖長方且坤順巽伏于二陽之下而履至尊之位操九五之權則又巽當之巽為風風行草偃密移于天地之間有君子在上小人自爾巽順之義王童溪曰易中發卦之辭義例有二如泰如隨之類則于卦名後方舉其義如履虎尾否之匪人同人于野之類則就卦名而設義不復有所間斷也觀盥而不薦亦此例也神即誠體于心而謂之誠妙于物而謂之神天下服有二有知而服之者七十子之服孔子也有不知而服之者民日遷善而不知為之者張紫巖曰艮止為有孚艮手為盥巽風為神坤順為天下服項平甫曰盥者祭之初歩薦者祭禮之盛此以盥而不薦象恭己无為非重盥而輕薦也觀字卦名并一卦名皆平聲惟觀天下是去聲神道形容觀字凡有言有事者皆以迹治未可為神觀則不言不動相觀而自化為神馮厚齋曰疊艮之畫有門闕重複之象故取象于觀趙汴水曰順者順人心之所同巽則不强人之不欲居中履正則无苛察无私照此觀民之道吴草廬曰有孚謂下四隂之孚顒仰首而望之貎胡雙湖曰盥潔齊象不薦艮止象按此卦四隂方長二陽向消而聖人别取卦義者非置消長而不論也蓋正以卦象自有扶陽抑隂之道也彖傳下觀而化一語文王名卦之意孔子得之矣蓋四隂雖長而上乃巽風風之化物其神不測下又以坤順承之則四隂雖盛適為順民化消陽之隂為順陽之隂風之效教之功也又卦為大艮艮止有力足制羣隂力以制之而教以化之扶陽抑隂之道具於卦象聖人不强為安排立説也卦畫有宗廟之象故借祭祀以象聖人通于神明之意盥而不薦誠己通神上通則下孚詩云奏假無言時靡有爭此彖之謂歟初六童觀小人无咎君子吝象傳初六童觀小人道也虞仲翔曰艮為童王輔嗣曰觀之為義以所見為美者也故以近尊為尚逺之為吝處觀時而最逺朝美體于隂柔不能自進无所鑒見故曰童觀趣順而已无所能為小人之道程傳小人下民也所見昏淺不能識君子之道乃常分也不足謂之過咎本義爻以觀瞻為義皆觀乎九五也吕東萊曰傳辭雖指小人意却屬君子項平甫曰下民日用而不知常也君子而不著不察則可羞矣沈守約曰坤而為震子從母童觀之象馮厚齋曰初位陽故為童二位隂故為女皆為隂爻為童穉象俞石澗曰初六以位言也小人道謂小人之常道也六二闚觀利女貞象傳闚觀女貞亦可醜也王輔嗣曰處在于内寡所鑒見體分柔弱從順而已猶有應焉不為全蒙所見者狹故曰闚觀得位柔順故曰利女貞處大觀之時居中得位不能大觀廣鑒誠可醜也程傳二應于五觀于五也五剛陽中正之道非二隂暗柔弱所能觀見也如闚覘之觀耳朱漢上曰二離為女為目坤為闔户女處于内而窺外之象沈守約曰坤而為坎居坎窞之中上觀于五五以陽剛中正居尊非坎井之所能盡覩也徐進齋曰雖與五為應前為三四所蔽所見不明胡雙湖曰易爻有蒙全體取象者如此卦初童全體艮小子象二闚全體艮為門闕象按坎為隠伏前遇艮止不能應上而進六三觀我生進退象傳觀我生進退未失道也虞仲翔曰生謂坤生民也巽為進退趙復齋曰下卦之主故退觀民以成大順自下仰上故進觀五以望光華必先觀我生者下順從乃可進耳六三進退非為疑也尊上親下義當竭盡未失道也六四觀國之光利用賔于王象傳觀國之光尚賔也程傳觀莫明于近五以陽剛中正居尊位四切近之故觀見道徳之光輝也聖明在上則懐抱道徳之人皆願進于朝古者有徳之人則君賔禮之故士之仕進于朝謂之賔朱漢上曰艮為門闕乾五為王坤為國沈守約曰巽而為乾風行天上而照之以天光觀光之象熊梅邊曰觀與剝只爭一爻且觀互體有剝六四即剝六五也觀國之光正與貫魚以宫人寵同意皆以切近于君承光寵也九五觀我生君子无咎象傳觀我生觀民也趙復齋曰剝之五爻小人也觀之四爻君子也故曰變化之妙非九五不可九五觀民皆君子乃得无咎君子絶句上九觀其生君子无咎象傳觀其生志未平也趙復齋曰其指九五上與五共安危者民非君子不幾于剝乎故上九志未平安必觀其民也按諸爻生字自孔疏以動出為生又以道為生宋儒因以言行動作施為解之均未安也在六三言之但當進而觀上何必觀己所行為進退在九五言之所居中正為神道設教之聖人何至期于君子而猶若未能後儒或云生意或云相生未免彌曲而彌逺虞氏直據孔傳的當不易更何必别為之解蒼生羣生芸生經傳以民為生固歴歴可據况如此方與卦意親切六三居坤之上接巽之風親承風化視初二之觀已為至近宜進同六四之觀光而不宜退就初二今乃退觀其儔類近于觀望似失以下觀上之道然正為其為下卦之主羣生之領袖三欲與同類並進而當隂盛之時慮或有一二梗化是以先觀我生倡之以順而後進而觀光故孔子以未失道許之風之所被近者先得宣風及逺近者之勞此六三觀我生進退之道也巽為進退互艮為順而止退象變則互離有近光之義進象夫民固五之民也三云我者同之之辭猶曰吾儕小民也五云我者有之之辭也五所以觀之者觀其化與否也下未盡化上之咎也孔子于三象止釋進退二字未釋生字故于五爻釋之以辭同則義可互見也至上九與他卦上爻不同卦唯二陽當四隂盛長之時與五同居大觀之位分任大觀之責不得置身事外而民固五之民也非可據為己有故曰其者明其為五之民也義不可辭權不我屬而汲汲皇皇懼一民之未化若己推而納之溝中故曰志未平也正以其與我異明上九之忠勤也伊尹致政而惓惓于匹夫匹婦不獲自盡者上九之謂也觀之上二陽即臨之下二陽臨下二陽同曰咸臨觀之二陽同曰觀民要以四隂方盛陽勢不可孤耳故彖傳大觀在上兼指二陽措天下于泰山之安非二陽同徳不能此疊艮之厚力也可悟仄上二爻之辭意矣兩爻大觀之盛而僅得无咎不言吉亨者終以二陽向消故道大而福小與周易孔義集說卷五
