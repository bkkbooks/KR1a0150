body:
  text: 周易孔義集說卷二十光祿寺卿沈起元撰文言傳按文言字孔仲達云謂釋二卦之經文劉子珪云依文而言其理愚謂言乃書不盡言之言指文周之辭也文者文其言也文附于質以彖象為質幹而旁通發揮如枝葉之分出見易道之无窮也元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也九家易曰陽合而為乾衆善相繼故曰嘉之㑹本義元者生物之始天地之徳莫先于仁故于時為春於人為仁而衆善之長也亨者生物之通物至于此莫不嘉美故于時為夏于人為禮而衆美之㑹也利者生物之遂物各得宜不相妨害故于時為秋于人為義而得其分之和貞者生物之成實理具備隨在各足故于時為冬于人為智而為衆事之幹幹木之身而枝葉所依以立者也語類義截然不可犯似不和分别後萬物各止其所却是和不和生於不義義則无不和和則无不利矣貞者事之幹知是那黙運事變的所以為事之幹貞字之義須連正固說其義方全元亨利貞理有此四段氣有此四段理即在氣中兩者不曽相離有是氣則理便具此四句說天徳之自然下體仁四句說人事之當然君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事李鼎祚曰天運四時以生成萬物君法五常以教化于人元為善長故能體仁仁主春生東方木也亨為嘉㑹足以合禮禮主夏長南方火也利為物宜足以和義義主秋成西方金也貞為事幹以配于智智主冬藏北方水也本義以仁為體則无一物不在所愛之中故足以長人嘉其所㑹則无不合禮使物各得其所利則義无不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹語類欲其所㑹之美當美其所㑹蓋其尊卑大小厚薄親疎相接之禮各有節文无不中節所㑹皆美所以能合于禮胡雲峰曰禮者仁之著智者義之藏觀彖仁者徳之大而禮則顯諸仁義者用之宜而知則藏諸用按元亨利貞之四徳夫子從天地氣機上推到人身内之仁義禮知使人知仁義禮知四字並非聖人憑空杜撰乃天道自然所具且其理並不在懸虚𣺌茫之域即在氣機出入消息處形形色色上具有此仁義禮知之象而體道之聖人亦即體此天道之元亨利貞以為仁義禮知也是夫子於此揭出仁義禮知之根源以示萬世為歴聖所未發者且天地間夏之所長即春之所生秋之所成冬之所藏亦即是春之所生元之貫乎亨利貞于此可驗則仁之貫乎禮義知亦于此可驗所以夫子言為仁之功即在克己復禮明禮之即仁也君子行此四徳者故曰乾元亨利貞本義非君子之至健无以行此故曰乾元亨利貞此第一節初九曰潛龍勿用何謂也子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也呂藍田曰不易乎世與孔子所謂天下有道丘不與易也之易同不成乎名與博學而無所成名同本義龍徳聖人之徳也在下故隠犬抵乾卦六爻皆以聖人明之有隠顯而无淺深馮行可曰世不可易故雖遯去而何憾名不可成故非之而何損故皆无悶也來矣鮮曰事有快樂于心者則奮然而行之忘食忘憂之類是也事有拂逆于心者則順適而安之伐木絶糧之類是也憂樂皆无與于已而安于所遇合訂樂如伊尹樂堯舜之道為之孜孜不厭也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也陸象山曰言行之信謹二之所以成己者也善世而不伐二之所以成物者也彼其所謂信謹者乃其所以不伐者也閑邪存其誠存諸己者也徳博而化徳之及乎物者也彼其所以閑而存者乃其所博而化者也張紫巖曰一則潛二則見為言行上下皆陽為閑邪一在中為存誠二地位為善世為博二隂為不伐項平甫曰稱中正者二事也二五為中隂陽當位為正稱正中者一事也但取其正得中位非以當位言也兩言君徳明非君位也李隆山曰乾畫一實則誠坤畫一虚則敬故乾九二言誠坤六二言敬誠敬二字始于庖犧心畫而實天地自然之理也何𤣥子曰道止于中中寓于庸合訂庸言之信五句總詮一中字九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣韓康伯曰居下體之上在上體之下知終知至故不驕不憂孔仲達曰九三所以終日乾乾者欲進益道徳修營功業故終日乾乾匪懈也進徳則知至將進也修業則知終存義也九三一爻欲進知幾也欲退存義也處進退之時可進則進可退則退兩意並行程子曰修其言辭正為立己之誠意蘇子瞻曰乾進退之決在三可往而往其幾可止而止其義朱子曰忠信修辭且大綱說所以進徳修業之道知至知終則又詳其始終工夫之序知至則知道之所止至之乃行矣而驗其所知也知終則見道之極致乃力行而期至于所歸宿之地也知至至之者言此心所知者心真箇到那所知田地雖行未到而心已到故其精微幾密一齊在此故曰可與幾知終終之者既知到極處便力行到極處此真實現于行事故天下義理都无走失故曰可與存義鄭東谷曰將至上體知至也居下體之終知終也至則至之見幾而作也終則終之惟義所在也以是居上心末嘗驕以是居下心未嘗憂俞石澗曰徳與忠信皆主于心者業與辭皆見于事者事已成謂之業修者業未成則修而成之也居則業已成而居之也修謂修省誠即忠信立謂不為私意所汨撓也蔡虚齋曰忠信所以進徳毎應一件事俱著一箇心為之主唯心之所主者一于誠則徳之在内者進矣而其于事也又處置恰好如其所言則是誠有所歸宿安頓處是之謂立誠而業之見于外者修矣九三居下之上是亦有位其上者則九三為在下位亦有位其下者則九三為在上位按知至四句註疏祇就卦體言進退至程朱跟上進徳修業洗發始精然註疏亦不可廢畢竟至字終字原從卦體上來與上位下位一例非懸空說理不根爻象也故並存之九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎張舜文曰上與進釋躍字下與退釋在淵之義无常无恒釋或字之義非為邪非離羣欲及時釋无咎之義張紫巖曰四陽用事萬物發生君子體之時安可失也來矣鮮曰在田者安于下在天者安于上有常者也進而為飛退而為見有恒者也九四之位逼九五矣以上進為常則覬覦而心邪以下退為常則離羣而徳孤唯及時以進修而不干時以行險此其所以无咎也按伊尹五就桀五就湯其得此爻意乎以純粹之卦同體龍徳故无常无恒皆非有私意于其問其欲及時亦非干進之意止為行道計孔孟一生汲汲皇皇蓋以之耳九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也虞仲翔曰五動成離日出照萬物皆相見故曰聖人作而萬物睹孔仲達曰因大人與衆物感應故廣陳衆物相感應以明聖人之作而萬物瞻睹以結之也程傳本乎天者日月星辰本乎地者蟲獸草木張紫巖曰水火以相制為用有君臣交修之道風雲以相感為用有君臣遇合之道聖人在上如日在天萬物畢照凡以得聖臣為之輔若水火風雲之流從耳故上治則日月星辰得其序下治則鳥獸草木順其性天地之間豈容有失其道理者哉乾五備皇極數水火金木之象具其中按此解本天二句乃不與水流四句一例看似得解本義動物植物用邵子說上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也荀慈明曰在上故貴失正故无位上應三三陽徳正故曰賢人别體在下故曰在下位陽无應故曰无輔何氏妥曰既非王位則民不屬也王介甫曰上九不得九五天之中故曰无位下陽皆歸五故曰无民楊用修曰吉凶悔吝生乎動上九宜靜而動故有悔若順時不動焉能有悔孔子申之曰動而有悔言妄動則有悔耳此第二節潛龍勿用下也何氏妥曰此以人事明之當帝舜耕漁之時卑賤處下未為時用故云下程傳此以下言乾之時勿用以在下未可用也見龍在田時舎也舎去聲程傳隨時而止也項平甫曰舎者隨其所在而居焉古語訓舎為置去聲龍本行天之物不常在田出潛之初時寓于此故曰時舎潛則入而不出舎則已出而未行至九三乃可言行事也終日乾乾行事也林次厓曰事所當為之事進徳修業也終日行其所當為之事而不止息也或躍在淵自試也俞石澗曰試釋躍字君子謹失時之戒而自試其所學淺深也谷拙菴曰人見者淺自見者真必自家試之而後可決飛龍在天上治也蘇明允曰上治猶言盛治亢龍有悔窮之災也程傳窮極而災至也朱漢上曰陽窮于九隂窮于六位窮于上窮則變變則通通則久上九窮不知變窮之災也乾元用九天下治也觀彖用九之上加以乾元者元首也元統天而歸于貞則終始无端而不可為首即用九之義也聖人所以首出庶物无為而治者此爾此第三節潛龍勿用陽氣潛藏何氏妥曰當十一月陽氣雖動猶在地中故曰潛龍見龍在田天下文明李氏鼎祚曰陽氣上達于地故曰在田百草萌芽莩甲故曰文明馮厚齋曰文謂物之鮮榮明謂化之光顯終日乾乾與時偕行吳易齋曰位者時也爻者人也位在兩體交接之處時之行也終日乾乾人之與時偕行也或躍在淵乾道乃革孔仲達曰去下體入上體云革俞石澗曰革變也下乾以終上乾方始猶天道更端之時林次厓曰此道字輕看猶云陽道隂道飛龍在天乃位乎天徳張子三四與二皆言所遇之時至九五則是聖人極致處不論時也飛龍在天況聖人之至若天之不可階而升故于此爻却說夫人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶全與天地一體言乃位乎天徳蓋是成聖實到也不言首出所性不存焉以此當聖人之成徳若由思慮勉勉而至者止可言知不可言位也乃位則實在其所矣不言帝王而言天徳位不足道也張彦陵曰雖有其位苟无其徳可謂之位乎天位而已亢龍有悔與時偕極程傳時既極則處時者亦極矣朱漢上曰消息盈虚與時偕行則无悔偕極則窮故有悔也乾元用九乃見天則蘇子瞻曰天以无首為則張彦陵曰不曰乾爻用九而曰乾元用九統六爻而歸之元也亢而用變正是貞之極而歸于元乾之所為終始相因而无首也故曰乾元用九可見乾道變化之則谷拙侯曰則者有準而不過之意用九者有變而无常之意天道不是變換焉能使春夏秋冬各有其限聖人不是變換焉能使仁義禮智各有其節用九正天之準則不過處故曰乃見此第四節乾元者始而亨者也本義始則必亨理勢然也來矣鮮曰始者元也亨之者亦元也利貞者性情也本義收歛歸藏乃見性情之實俞石澗曰性言其靜也情言其動也物之動極至於收斂歸藏復其本體之象又將為來春動而發用之地故曰利貞者性情也來矣鮮曰帝出乎震必齊乎㢲相見乎離性者百物具足之理情者百物出入之機春生夏長百物皆有性情非必利貞而後見但此時生意未足實理未完百物尚共同一性情至秋冬各正保合一物各具一性情故利貞者即乾元之性情也則利貞之未始不為元也乾始能以美利利天下不言所利大矣哉程子曰亭毒化育皆利也不有其功常久而不已者貞也本義始者元而亨也利天下者利也不言所利者貞也林次厓曰上既即物之生長收藏以釋四徳此則歸其功於乾始而贊其大即彖傳統天之說也俞石澗曰美即亨也亨乃衆美之㑹也來矣鮮曰孔子於文言既分元亨利貞為四徳矣此又合而為一也四徳本一理或分言之以盡其用或合言之以著其體其實一理而已所以可分可合按一能字見亨利貞皆元之所為也大哉乾乎剛健中正純粹精也孔仲達曰六爻皆陽是純粹也純粹不雜是精項平甫曰剛健中正以奇畫言也純粹精以六畫言也聖人以一奇立萬化之本其體剛健至専至一其用中正至當至平復以六畫備一奇之變自始至終无時而不剛健自進至退无往而不中正此所謂純粹精也喬還一曰剛者元也健者亨也中者利也正者貞也元亨利貞實以體之剛健中正也一爻之情六爻之情也六爻發揮旁通情也蘇子瞻曰剛健中正純粹精者乾之大全也卦也及其散而有為分裂四出而各有得則爻也故曰六爻發揮旁通情也以爻為情則卦之為性明矣來矣鮮曰如初之潛以至上之亢凡事有萬殊物有萬類時有萬變皆該括曲盡其情而无遺也時乗六龍以御天也雲行雨施天下平也荀慈明曰隂陽和均而得其正故曰天下平孔仲達曰言天下普得其利而均平不偏陂程傳大哉贊乾道之大也以剛健中正純粹六者形容乾道精謂六者之精極以六爻發揮旁通盡其情義乗六爻之時以當天運則天之功用著矣故見雲行雨施隂陽敷暢天下和平之道也此第五節君子以成徳為行日可見之行也潛之為言也隠而未見行而未成是以君子弗用也為行之行去聲下二行平聲程子未成未著也本義成徳已成之徳也初九固成徳但其行未可見爾吳草廬曰隠而未見者潛之象行而未成是以欲其勿用也來矣鮮曰未見者厄於潛之時而未見也未成者因其厄而事業未成就也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也程子學聚問辨進徳也寛居仁行修業也本義再言君徳深明九二之為大人也林次厓曰學聚問辨是致知工夫寛居是把義理放在胸中詳翫深味使透徹貫串乃居安資深時也來矣鮮曰之者正中之理也龍徳正中雖以爻言然聖人之徳不過此中而已蓋乾道剛健中正民受天地之中以生唯中庸不可能苟非學聚問辨有此致知工夫寛居仁行有此力行工夫安能體此龍徳之正中哉九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣虞仲翔曰以乾接乾故重剛位非二五故不中也孔仲達曰上不在天謂非五位下不在田謂非二位居危之地以乾乾夕惕戒懼不息得无咎也吳草廬曰九三居下乾之終接上乾之始九四居上乾之始接下乾之終故皆曰重剛九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎孔仲達曰三與四俱為人道人下近於地上逺於天九三近二正是人道九四則上近於天下逺於地非人所處故云中不在人九三位卑近下向上為難危惕憂深九四則陽徳漸盛去五彌近前進稍易故但疑惑憂則淺也張彦陵曰疑非狐疑之疑只是詳審耳夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎孔仲達曰與天地合其徳謂覆載也與日月合其明謂照臨也與四時合其序若賞以春夏刑以秋冬之類也與鬼神合其吉凶如福善禍淫也本義人與天地鬼神本无二理特蔽於有我之私是以牿於形體而不能相通大人无私以道為體曽何彼此先後之可言哉先天不違謂意之所為黙與道契後天奉天謂知理如是奉而行之亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎孔仲達曰上九所以亢極有悔者正由有此三事若能三事備知雖居上位不至於亢也進退據心存亡據身得喪據位再稱聖人乎者上為知進退存亡發文下為不失其正發文言聖人非但知進退存亡又能不失其正也本義知其理勢如是而處之以道則不至於有悔矣固非計私以避害者也胡雲峯曰陽極則剝乾上則亢中不可過也知其時將過乎中而處之不失其正其唯聖人乎貞者正也乾元之用所歸宿也乾之四徳始於元至此又論聖人之體乾而歸於正其意深矣朱漢上曰人固有知進退存亡者矣其道詭於聖人則未必得其正不得其正則與天地不相似此第六節坤至柔而動也剛至靜而徳方後得主而有常含萬物而化光坤道共順乎承天而時行楊誠齋曰有臣道有臣節臣道一於順故欲柔欲靜不順則為莽卓臣節病於順故欲剛欲方順則為張禹胡廣趙汴水曰坤无乾以為始孰開其端先迷也天先施而地後生後得主也先陽後隂乃天地生生之常理吳草廬曰坤體中含乾陽如人肺藏之藏氣故曰至柔然其氣機一動而闢之時乾陽之氣直上而出莫能禦之故曰剛剛即六二爻辭所謂直也乾運轉不已而坤體隤然不動故曰至靜然其生物之徳普徧四周无處欠缺故曰方方即六二爻辭所謂方也乾之九五不徒剛健而能中正故為乾元之大坤之六三不徒柔靜而能剛方故為坤元之至俞石澗曰至柔而動也剛申徳合无疆之義至靜而徳方釋貞義後得主而有常後順得常之謂含萬物而化光即含𢎞光大品物咸亨之謂坤道其順乎承天而時行即乃順承天之謂何𤣥子曰乾剛坤柔定體也坤固至柔矣然乾之施一至坤即能翕受而發生之氣機一動不可止遏屈撓此又柔中之剛矣乾動坤靜定體也坤固至靜矣及其承乾之施陶冶萬類各有定形不可移易此又靜中之方矣柔靜者體也剛方者用也合訂此一節極贊坤之順乾以申彖傳釋卦辭之意不分釋四徳者坤之元亨利貞即乾之元亨利貞也積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也孔仲達曰辨之不早辨者戒君父防臣子之惡蓋言順者言順習隂惡之道積微而不已乃致此弑害程傳霜而至於氷小惡而至於大皆事勢之順長也呂東萊曰蓋言順也此句尤可警非心邪念不可順養將去若順將去何所不至懲治遏絶正要人著力直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也程傳直言其正也方言其義也君子主敬以直其内守義以方其外敬立而内直義形而外方敬義既立其徳盛矣不期大而大矣徳不孤也无所用而不周无所施而不利孰為疑乎敬義夾持直上達天徳自此朱子曰直是直上直下胸中無纎毫委曲方是割截方正截然不可得而移易之意隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也程子曰天地日月一般月之光乃日之光也地中生物者皆天氣也雖无成而代有終地之道也俞石澗曰既曰地道无成而又曰代有終何也乾能始物不能終物坤繼其終而終之此坤之所以為有終者終乾之所未終也蔡虚齋曰弗敢成即含章之道用於從王事者也谷拙菴曰爻言有終此言代有終則并其終亦非坤之所敢有也天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽蓋言謹也劉長民曰坤其動也闢應二之徳其靜也翕應四之位翕閉也是天地否閉之時賢人乃隠不可衒其才知也易外初之霜至四而成堅氷矣坤之囊為堅氷所括矣此坤之靜翕以為廣生之時也閉者括囊之象蓋重隂之始天地不通天地亦且括其囊而況於賢人乎月令仲冬之月毋發天地之房房者囊也按此可知坤之六四不可作近君之位看蓋全坤皆臣道六五之黄裳亦臣也六四之括囊乃在下之賢人故以儉徳避難為貴若作大臣豈可以括囊為立朝之至道哉君子黄中通理正位居體美在其中而暢於四支發於事業美之至也朱漢上曰五動為坎坎為通有美在中而通於理也正位而居坤體不失為臣之道黄裳也趙復齋曰中而不倚故通偏則滯矣正五之中位居坤之順體此明六五之為純臣也項平甫曰四方之色各有所偏通於此者必不通於彼居中央則无不通矣是故土王四季脾主四支也黄中屬黄字通理屬裳字正位屬黄字居體屬裳字美在其中屬黄字四支事業屬裳字有黄中之徳則理可旁通有正中之位則體可安居蔡伯靜曰二五皆中二居内卦之中其發見於外者不疑其所行而已五外卦之中其施於外者有事業之可觀坤道之美至此極矣鄭東谷曰象與文言皆以黄為中以裳為文為美蓋古之服制十二章衣為繪裳用繡考工記五采備為繡裳備五采與衣繪不同故裳為至美為至文是以六五取象焉胡雲峯曰直内方外之君子即黄中通理之君子蓋敬以直内則表裏如一即所以為黄中義以方外則事皆合理即所以為通理吳草廬曰黄中黄色在中也通達也理身之膚腠青白黒赤皆偏位唯中央黄色為正位體下體黄在中而外達於身之膚腠者以正位之色為裳而居於身之下體也美在其中謂黄中正位暢於四支謂通理居體蔡虚齋曰黄裳二字分而言之則黄為中裳為順合而言之則惟中故順存於中為中形於外為順理一而已惟有黄中之徳故能以下體自居易外乾之五以位乎天徳為吉坤之五以居乎地體為吉隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄干令升曰未離隂類故曰血隂陽色雜故稱𤣥黄隂陽離則異氣合則同功君臣夫妻其義一也本義疑謂均敵而无小大之差也𤣥黄天地之正色言隂陽皆傷也俞石澗曰血言𤣥黄則天地雜類而隂陽无别矣故曰天地之雜也然而天地定位於上下其大分終不可易故其終又分而言之曰天𤣥而地黄說卦傳孔仲達曰此備說重卦之由及八卦所為之象謂之說卦焉按此乃約言卦畫象辭之所由來為學易觀玩之資昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數孔仲達曰以此聖知深明神明之道而生用蓍求卦之法贊者佐而助成使微者得著倚立也其揲蓍所得取奇數于天耦數于地而立七八九六之數何以參兩為目奇耦者蓋古之奇耦亦以三兩言之且以兩是耦數之始三是奇數之初不以一目奇者張氏云以三中含兩有一以包兩之義明天有包地之徳陽有包隂之道蘇子瞻曰介紹以傳命謂之贊天地鬼神不能與人接故以蓍龜為之介紹三兩者天數三地數二明數之正于五也自五以往非數也皆相因而成者也程明道曰用蓍以求卦非謂有蓍而後畫卦張南軒曰一三五七九皆陽數也獨以一三五參之而用九者此倚其陽數也二四六八十皆隂數也獨以二四兩之而用六者此倚其隂數也特取九六而不用七八者乃參天兩地而倚其數也項平甫曰生蓍謂創立用蓍之法神不能言以蓍言之所以贊神出命謂之幽贊即所謂祐神也三奇為陽畫兩其三以為隂畫三畫為初卦兩其三以為重卦此畫卦之參兩也觀彖天一地二數之原也然一數則乗除俱不行故天數起于三地數起于二參而兩之以為數所倚三三則九二三則為六一三兩二則為七一二兩三則為八觀變于隂陽而立卦發揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命虞仲翔曰卦為陽變成震坎艮隂變成㢲離兊故立卦三變成爻十八變而成卦八卦而小成是也孔仲達曰用蓍在六爻之後非三畫之時繋辭言伏羲之畫卦故直言仰觀俯察此則論既重之後端策布爻故先言生蓍後言立卦非是聖人幽贊元在觀變之前本義和順從容无所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合于天道此聖人作易之極功也語錄此本是就易上說易上盡具許多道理直是窮得物理盡得人性到得天命所以通書說易者性命之原項平甫曰陽氣不可見則畫為剛爻以發之隂氣不可見則畫為柔爻以發之凡爻皆用剛柔之爻以發揮二氣之變也道即命徳即性義即理和順于道徳而理于義窮理盡性以至于命此兩句反覆互言之也易之奇耦在天之命為隂陽之道在人之性則為仁義之徳在地之宜則為剛柔之理和順于道徳而理于義此易之所能也故自幽而言以至于顯此所謂顯道也窮理盡性以至于命言易之所知也故自顯而言以至于幽此所謂神徳行也上文既言蓍數卦爻則此二句于爻辭彖辭言之徐進齋曰如乾為天道而元亨利貞即其徳爻之潛見飛躍即其義以一卦而統言之所謂和順也就六爻而言之所謂理也熊梅邊曰上言聖人作易之功下言易書精微之蘊右第一章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章韓康伯曰隂陽者言其氣剛柔者言其形萬物資始于天成形于地故天曰隂陽地曰柔剛或有在形而言隂陽者本其始也在氣而言柔剛者要其終也六位爻所處之位孔仲達曰昔者聖人畫卦作易將以順從天地生成性命之理也其天地生成萬物之理須在隂陽必備是以造化闢設之時其立天之道有二種之氣曰成物之隂與施生之陽也其立地之道有二種之形曰順承之柔與持載之剛也天地既立人生其間立人之道有二種之性曰愛惠之仁與斷制之義也既備三才之道而兩之作易本順此道理故因而重之使六畫而成卦也六畫所處有其六位隂位陽位迭用柔爻剛爻以居之故成爻卦之文章也按此章可見聖人畫卦是必定六畫少一畫不可多一畫不能此乃天地間自然之象自然之理所謂一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四之說與夫一而二而三而四而五而六且謂可自此而七而八而九以至不可窮詰者皆非聖人作易之道也右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也韓康伯曰八卦相錯變化理備于往則順而知之于來則逆而數之作易以逆睹來事以前民用孔仲達曰此一節就卦象明重卦之意易以乾坤象天地艮兊象山澤震㢲象雷風坎離象水火若使天地不交水火異處則庶類无生成之用品物无變化之理所以因而重之令八卦相錯則天地人事莫不備矣故云天地定位而合徳山澤異體而通氣雷風各動而相薄水火不相入而相資既八卦之用變化如此故聖人重卦令八卦莫不交互而相重以象天地山澤雷風水火莫不交錯則易之爻卦與天地等既往之事將來之幾備于爻卦中矣郭白雲曰天地之位定然後山澤雷風水火相與為用此八卦所以有必相錯之道也是以聖人重之而後可以數往知來人之道數往者順而易知來者逆而難易之逆數未見其難者蓋由其道之始必知其道之終也是亦原始可以要終之義尹和靖曰易之道如日星未到泰之上六便知泰將極未到否之上九便知否將傾此謂幾易之為書要知測未萌事若已往事何用知之數亦不必逆籌算數者理也理在必然如政在大夫五世希不失陪臣執國命三世希不失也張南軒曰易之于天下皆逆數而察其來逆如逆暑逆寒邱行可曰易言藏往知來彰往察來又言數往知來則方來已往之事易皆有以知之然往者已過而易知來者未形而難知易之占筮為知來設故曰逆數也正如所謂占事知來遂知來物前民用皆逆數之謂也按此章邵子謂是伏羲先天圖位本義因之蓋前儒所未有者也今細玩經文唯天地定位一語似可作乾南坤北看然實與上繫傳天尊地卑語氣一例山澤以下未見明立位次且經文言八卦相錯明指六十四卦言非八卦之定位也數往者順二句自是泛說下接是故易逆數也纔說到易亦一定文義今若云起震而歴離兊以至于乾數已生之卦自㢲而歴坎艮以至于坤推未生之卦則數往二語已貼易說下何以有是故之文且易之生卦夫子言乾坤生六子可謂明白曉暢矣何有先生乾震離兊而後生㢲坎艮坤之理況逆知來事蓍筮之徳蓍在重卦後故先言八卦相錯承上章易六位而成章來非言三畫之八卦也但重卦亦只是八卦故以天地定位四語明所以必相錯之理以相錯而成知來物前民用之功也邵子之易自成一家非伏羲文王周孔之易也右第三章雷以動之風以散之雨以潤之日以暄之艮以止之兌以說之乾以君之坤以藏之九家易曰乾坤交索既生六子各任其才往生物也孔仲達曰此重明八卦養物之功上四舉象下四舉卦者王肅以為互相備也張子曰隂性凝聚陽性發散隂聚之陽必散之陽為隂累則相持為雨而降隂為陽得則飄揚為雲而升隂氣凝聚陽在内者不得出則奮擊而為雷霆陽在外者則周旋不舎而為風蔡節齋曰動則物萌散則物具二者言生物之功也潤則物滋暄則物舒二者言長物之功也止則物成說則物遂二者言收物之功君則物有所歸藏則物有所息二者言藏物之功也邱行可曰雷動風散乾坤初爻交而為震㢲也雨潤日暄乾坤中爻交而為坎離也止之說之乾坤終爻交而為艮兌也此六子生物之序也然六子致用主于乾而動歸于坤而藏此又父母之功也故以乾坤終之潘天錫曰上文先言天地之无為後言六子之相為用言天地之用六子也此章先言六子之職後言乾坤之道言六子非乾坤无以主之藏之右第四章帝出乎震齊乎㢲相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮孔仲達曰此帝為天帝崔氏憬曰帝者天之王氣也春分震王而萬物出生立春㢲王而萬物潔齊立夏離王而萬物皆相見立秋坤王而萬物致養秋分兌王而萬物所說立冬乾王而隂陽相薄冬至坎王而萬物之所歸立春艮王而萬物之所成終成始也以其周王天下故謂之帝蘇子瞻曰古有是言也本義帝者天之主宰萬物出乎震震東方也齊乎㢲㢲東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮鄭康成曰萬物出乎震雷發聲以生之也齊于㢲相見于離風摇長以齊之潔猶新萬物皆相見日照之使光大萬物皆致養焉地氣含養使有秀實萬物之所說草木皆老猶以澤氣說成之戰言隂陽相薄西北隂也而乾以純陽臨之也坎勞卦也水性勞而不倦萬物之所歸也萬物自春出生于地冬氣閉藏還皆入地萬物之所成終而所成始言隂氣終陽氣始皆艮之用事龔深父曰八卦以序則有時以居則有方以象則有物相繼以為衰旺相推以為變化相繼以至无窮也楊龜山曰艮止其所也艮者萬物之所成終而所成始也止于此矣復出乎震不終止也故艮卦曰時止則止時行則行項平甫曰震㢲二木主春離火主夏兌乾二金主秋坎水主冬土旺于四季故坤土在夏秋之交艮土在冬春之交坤隂土故在隂地艮陽土故在陽地震陽木故在東㢲隂木故近南而接乎隂兌隂金故正西乾陽金故近北而接乎陽此其序甚明也蔡節齋曰帝之出入不可見而為物者可見故又以物言焉震㢲乾離坎艮皆以方言兌以時言坤坎以象言所以然者夫子欲備三者之義而互言之又足以見三者未嘗相離也楊誠齋曰于帝言致役者坤臣也帝君也君之于臣役之而已于萬物言致養者坤母也萬物子也母之于子養之而已徐進齋曰卦以震㢲離坤兌乾坎艮為序者木生火火生土土生金金生水水非土不能以生木故艮次之水土又生木八卦之用五行之生循環无窮所以為造化流行之序鄭夾漈曰乾居西北父道也父道尊嚴嚴凝之氣盛于西北萬物成就之方也坤居西南母道也母道在養育萬物萬物之生盛于西南西南者萬物長養之方也坎艮震位次于乾統三男也㢲離兌位夾乎坤統三女也西北盛隂用事而隂氣盛矣非至健莫與爭故隂陽相薄曰戰龔泉峯曰土之養物无時不然于夏秋之交物將成就之時土氣正旺致養之功莫盛于此故曰致役乎坤艮亦土也成者養之終熊梅邊曰帝出乎震者言造化一元之氣由春而夏而秋而冬也艮為萬物之所成終則元之貞也而所成始則貞下又起元矣陳紫峯曰火氣極熱物无由而成水氣極寒物无由而生惟土氣最為中和故火金之交有坤土水火之交有艮土而為萬物之所由出入者也李克恭曰兩漢時皆以此節所言時位為羲畫原義至文王繋辭坤蹇言西南東北而孔子詳說于此是自古聖賢相傳八卦方位時氣皆屬一致陸聚緱曰天地定位章邵子以為伏羲卦位但天地定位當以上下言乃云乾南坤北則以豎圖為横圖立文稍疎至謂帝出乎震章為文王所定後天之學夫畫前之易乃先天之易也一有卦畫即屬後天不得以後天專指文王也即邵子所傳伏羲圓圖雖无卦名已屬流行卦象又不得云後天之學始于文王矣右第五章神也者妙萬物而為言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也韓康伯曰于此言神者明八卦運動變化推移莫有使之然者神无物妙萬物而為言則雷疾風行火炎水潤莫不自然相與為變化故能萬物既成也孔仲達曰艮不言山獨舉卦名者動撓燥潤之功是雷風水火至于終始萬物于山義為微故言艮而不言山也上章水火不相入此言水火相逮者明性雖不相入而氣相逮及也上言雷風相薄此言不相悖者明雖相薄而不相逆也崔氏憬曰大寒立春之際艮之方位萬物以之始而為今歲首以之終而為來歲末此則協夏正之義莫盛于艮也此言六卦之神用而不言乾坤者以乾坤无為而无不為能成雷風等有為之神妙也蘇子瞻曰萬物之盛衰于四時也皆其自然莫或使之而謂之帝者萬物之中有妙于物者焉此其神也而謂之帝云爾不及乾坤者六子之功顯而乾坤之徳存乎其中龔深父曰上言生物之序則歸于乾坤此言生物之功則歸于六子郭白雲曰六子之象雖有動撓燥潤之功而或各専其功獨動獨撓不能變化亦不能成物必水火相須雷風相從山澤相通于是乎變化而畢成萬物朱漢上曰此說六子合而為乾坤乾坤合而生神康成曰共成萬物物不可得而分故合謂之神張子曰一則神兩則化妙萬物者一則神也動撓潤燥說終始萬物者六子然不能以獨化故必相逮也不相悖也通氣也然後能變化既成萬物合則化化則神康成之學進此矣張南軒曰前言天地定位終于水火不相射言八卦各立以為體也此言水火相逮終于山澤通氣者言六子交通為用也惟交相為用故變者自无而有化者自有而无此既成萬物者乎吳草廬曰乾坤主宰萬物之帝行乎六子之中所謂神也神无迹可見即萬物之中而妙不可測者神也所以動所以撓所以燥說所以潤所以終始皆乾坤之神也蔡虚齋曰逮相濟也既訓盡按此節承上章既言八卦之主時成用而又言所以能順時而成萬物者在于交相為用變化之神也動萬物數語不過覆述雷以動之數語為水火相逮四語發端重在下截玩文義自明後之泥于先天後天者謂此章先言後天之序後復明先天相合之位首尾語脈既不相貫況雷風水火山澤之在天地間自有交通為用之妙豈必俟圖立而後能交通耶右第六章乾健也坤順也震動也㢲入也坎陷也離麗也艮止也兌說也蘇子瞻曰循萬物之理无往而不自得是之謂順執柔而不爭无往而不見納故謂之入張子一陷溺而不得出為坎一附麗而不能去為離邵子曰一隂入二陽之下故天下之入莫如風一隂麗二陽之中天下之麗莫如火一隂出于外而說于物故天下之說莫如澤郭兼山曰剛則有體陷乎隂中所以為坎柔則无質麗于陽中所以為離郭白雲曰八卦之名出于伏羲氏止此八字而已文王能明之而不訓其義孔子訓之故後世可以學易非健順八字則易不復能讀矣本義此言八卦之性情右第七章乾為馬坤為牛震為龍㢲為雞坎為豕離為雉艮為狗兌為羊孔仲達曰行健故為馬任重而順故為牛震動故為龍雞能知時故為雞坎主水瀆豕行汚濕故為豕離為文明雉有文章艮為止狗為善守禁止奸人羊者順從之畜邵子曰重淵之下動物非龍乎朱漢上曰震東方卦春分以後辰亦為龍蒼龍之次也㢲為風風主號令故雞號知時美脊剛鬛坎中陽也垂耳俯首而尾不足本末隂也亥為豕者直室也坎之所自生也㢲離為飛鳥者南方七宿朱鳥也午為鶉火之次已為鶉尾其味在栁其翼在翌栁午也離也翌已也㢲也摶噬者前剛也直婁也羊内狠者二陽伏于一隂之下也項平甫曰造化權輿云乾陽物馬故蹄圓坤隂物牛故蹄拆陽疾則隂故馬疾則臥隂疾則陽故牛疾則立馬陽物故起先前足臥先後足牛隂物故起先後足臥先前足右第八章乾為首坤為腹震為足㢲為股坎為耳離為目艮為手兌為口孔仲達曰尊而在上為首包藏含容為腹龔括蒼曰耳内陽而聰目外陽而明在上而止者手在外而說者口朱漢上曰足動股隨雷風相與耳目通竅水火相逮項平甫曰坎陽陷于隂故耳居隂而能聴離隂麗于陽故目資陽而後視邱行可曰㢲隂兩開于下為股兌隂兩開于上為口龔泉峯曰震陽在下故足之用在下艮陽在上故手之用在上右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男㢲一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女孔仲達曰得父氣者為男得母氣者為女郭白雲曰六子之變自下為先乾變而得隂畫隂變而得陽畫卦變之義蓋始于此故說卦首章曰觀變于隂陽而立卦項平甫曰乾坤六子初為氣末為形中為精雷風氣也山澤形也水火精也吳草廬曰一索謂交初再索謂交中三索謂交上以索之先後為長中少之次按乾坤生六子可想見伏羲畫卦直是先定乾坤而後自下而上交變而生六子非孔子發之孰從而知六子從乾坤變出朱子言易宗邵子一生二之說故本義以此為揲蓍求卦胡雲峯云若主揲蓍而言則无此卦序矣愚謂索者是交互之義非求也夫子說卦自第七章起皆以乾坤六子為序非所謂先天圖也右第十章乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為脊馬為駁馬為木果荀九家有為龍為直為衣為言孔仲達曰天動運轉故為圜為君為父取尊道而為始也玉金剛之清明也寒氷取西北寒氷之地火赤盛陽之色良馬行健之善老馬行健之久脊馬行健之甚脊馬骨多也駁馬有牙如鋸能食虎豹取其至健張子為氷健極而寒甚也郭白雲曰果者木之始木以果為始猶物以乾為始也坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑荀九家有為牝為迷為方為囊為裳為黄為帛為漿孔仲達曰地受生育故為母布取廣載釡取化生成熟均地道平均也子母牛取其多蕃育而順之大輿取其載文萬物之色雜也柄生物之本黒極隂之色崔氏憬曰地生萬物不擇美惡故為均項平甫曰吝嗇其靜之翕也均其動之闢也乾質故坤文乾一故坤衆震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼茛竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮荀九家有為玉為鵠為鼓虞仲翔曰天𤣥地黄震天地之雜故為𤣥黄孔仲達曰大塗萬物之所出決躁剛動也蒼茛竹竹初生時色蒼茛也萑葦竹類善鳴雷聲之逺聞馬白足為馵動而見也白額為的顙亦取動而見反生取其始生載甲而出蔡節齋曰作足謂雙舉也陽長必終于乾故究為健吳草廬曰乾坤始交而生震故兼有天地之色得乾初畫為𤣥得坤中畫為黄旉又作敷與花通范蒂下連而上分為花也按為反生者震一陽動于二隂之下故冬時子月草木根芽皆往下生故曰反生㢲為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦寡髪虞氏作宣髪荀九家有為楊為鶴虞仲翔曰臭氣也風至知氣為白故宣髮馬君以宣為寡非也離目向上則白眼見故多白眼荀慈明曰風行无常故進退風行或東或西故不果翟氏元曰為繩直上二陽共正一隂使不得邪僻如繩之直孔仲達曰㢲為木可以輮曲直㢲順之謂也白取其潔長取風行之逺髙取木生而上寡髪風落樹之華葉則在樹者稀疎如人之少髪郭白雲曰寡髪剛上也廣顙重剛也朱子㢲反為震震為決躁故為躁卦熊梅邊曰震㢲皆木獨言㢲為木者㢲木之義重也大象多取㢲木吳草廬曰耦而下者木之根奇而上升者木之幹白為陽黒為隂㢲上中白而下黒白多于黒也義理陽也欲利隂也隂在内利欲主内故曰近利坎為水為溝瀆為隠伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于輿也為多眚為通為月為盜其于木也為堅多心荀九家有為宮為律為可為棟為叢棘為狐為蒺藜為桎梏虞仲翔曰以陽闢坎水性流通為溝瀆陽藏坤中為隠伏為矯輮為弓輪坎為月月在庚為弓在甲象輪勞而加憂故心病眚敗也坤為車坎折坤體為輿多眚水流瀆故通水流潛竊為盜陽剛在中故堅多心荀慈明曰水之流首卑下也宋仲子曰坎陽在中内光明有似于水曲者更直為矯直者更曲為輮水流有曲直故為矯輮陽在中央馬脊之象水磨地而行故曳崔氏憬曰内陽剛動故為亟心孔仲達曰坎勞卦北方主聴聴勞則耳痛人之有血猶地有水赤亦取血色乾至健震至動坎至行故皆以馬坤艮㢲離兌皆柔故不以馬為喻坤利牝馬取其行不取其健坎亦取其行不取其健皆外柔故為下首薄蹄曳也龔深父曰心病陽陷而不靈耳痛陽塞而不通徐進齋曰心耳皆以虚為體故中實則為病為痛吳草廬曰水者坎之本象羲皇畫以象水上下二隂象土之凹中陽象水之流于凹中為通一陽貫于二隂之中也離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其于木也為科上槁荀九家有為牝牛孔仲達曰日是火精電火類甲胄取剛在外戈兵取以剛自衞大腹懐隂氣也乾卦為日所烜也鼈蟹蚌蠃龜皆取剛在外科空也隂在内為空木既空中上必枯槁邵子曰火内暗而外明故離陽在外水外暗而内明故坎陽在内吳草廬曰槁枯木木生則柔脆死則堅剛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節狗虞氏作拘馬季長曰黔喙謂豺狼之屬陽在前也荀九家有為鼻為虎為狐虞仲翔曰震陽在初為大塗艮陽小為徑路陽在外為門兩小闕之象狗拘字之誤指屈伸制物為拘艮手多節為指剛在外故多節宋仲子曰木實為果草實為蓏皆出山谷閽人主門寺人主巷艮為止此職皆掌禁止者也郭白雲曰震之剛動于下故言足坎之剛動于中故言心艮之剛動于上故言喙項平甫曰震為旉為蕃鮮草木之始艮為果蓏草木之終果蓏能終而又能始故又于艮之象為切吳草廬曰艮之下二隂地也上一陽隆起者山也兌為澤為少女為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊荀九家有為常為輔頰虞仲翔曰坎水半見故為澤為剛鹵乾二陽在上故剛澤水潤下故醎孔仲達曰為巫取口舌之官也口舌取西方于五亊為言也兌正秋也秋物成熟槀稈之屬則毁折果蓏之屬則附決妾少女從姊為娣也張子内實則外附必決物成則上柔者必折張南軒曰巫以言語而悅神又以悅人口舌以言而悅人以食而悅己剛鹵色白外柔而内剛也朱漢上曰附者兌反艮也決者兌也隂盛陽微則陽附隂陽盛隂微則陽決隂剝一陽五隂夬一隂五陽故曰剛決柔項平甫曰羊虞氏作羔鄭氏作羊皆訓為女使然則妾也羊也少女也皆女之末者也凡兌之象皆屬末口舌者行之末妾婢者女之末程沙隨曰八卦之象八物而已充其類則有所為百物不廢者極其說又可以類萬物之情然說卦之象有與卦爻相符者有不與卦爻相符者有見于卦爻而說卦不載者有見于說卦而卦爻无之者大抵有象可見有數可數者无非易也胡雙湖曰說卦之言象其有合于彖爻者則括彖爻之例其有不合于彖爻者則又夫子之自取也序卦傳孔仲達曰韓康伯云序卦之所明非易之藴也蓋因卦之次托象以明義今驗六十四卦二二相偶非覆即變覆者表裹視之遂成兩卦屯蒙需訟師比之類是也變者反覆惟成一卦則變以對之乾坤坎離大過頤中孚小過之類是也邵子曰乾坤天地之本坎離天地之用是以易始于乾坤中于坎離終于既未濟而泰否為上經之中咸恒為下經之首皆言乎其用也朱子卦有正對有反對乾坤坎離大過頤中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對皆變故反覆觀之共二十八卦合正卦反卦總為三十六卦在上經不變卦凡六餘二十四卦反之則為十二以十二加六則十八也下經不變卦凡二餘三十二卦反之為十六以十六加二亦十八也二篇多寡之數未嘗不均大率上經乾坤坎離為終始下經用艮兌震㢲為終始項平甫曰上經言天地生萬物以氣而流形故始于乾坤終于坎離言氣化之本下經言萬物之相生以形而傳氣故始于咸恒終于既濟未濟言夫婦之道有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也干令升曰取始于天地天地之先聖人弗之論也故其法象必自天地而還張子聚而不得出故盈雖雷亦然項平甫曰屯不訓盈謂之盈者其氣謂之始生者其時謂之難者事也若屯之訓紛紜盤錯之義云爾吳草廬曰天地謂乾坤二卦屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟鄭康成曰蒙幼少之貌齊人謂萌為蒙荀慈明曰坎在乾上中有離象水火交和故為飲食之道崔氏憬曰萬物之始生者言剛柔始交故萬物資始于乾資生于坤也朱漢上曰需震坎為酒兌為口有飲食之道熊梅邊曰屯物之始生蒙民之始生至是方有人物之分而不可无以養之茹毛飲血而至于粒食民命立矣訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也韓康伯曰衆起而不比則爭无由息必相親比而後相寧也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰韓康伯曰禮所以通時用故既畜則須用有用須禮姚徳祐曰有禮然後泰泰然後安蘇子瞻曰大畜小畜皆取于畜而已小過大過皆取于過而已不復論其大小也故序卦之論易或直取其卦名而不本其卦義者多矣若賦詩斷章然不可以一理求也程子物相比附則為聚畜聚也止也止則聚矣物聚則有大小之别髙下之等美惡之分是物畜然後有禮張子徳積則行必有方物積則散必有道張南軒曰以内言之嘉㑹足以合禮以外言之萬物盛多可以備禮郭白雲曰畜而有禮則安无禮則危胡雙湖曰乾坤至履十變隂陽之氣一周泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫韓康伯曰否則思通人人同志故可出門司馬溫公曰不相交則異異則爭爭則窮故受之以同人者所以通之也程子天地不交為否上下相通為同人與否義相反故相次豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也韓康伯曰可大之業由事而生蘇子瞻曰以喜隨人溺于燕安者也故至于蠱物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也蘇子瞻曰君臣父子夫婦朋友之際所謂合也直情而行謂之苟禮以飾情謂之賁苟則易合易合則相瀆瀆則易離賁則難合難合則相敬敬則能久飾極則文勝而質衰故剝張南軒曰天下皆山惟泰山可觀天下皆水惟東海可觀惟其可觀然後有所合伯夷太公合于文王者以文王可觀也郭白雲曰自同人大有謙豫隨蠱臨觀噬嗑賁聖人所以履泰傾否之美道備盡于斯其道極盡則有剝矣朱漢上曰亨則盡矣无以復加故次之以剝此商周之末不勝其弊文之末流也吳草廬曰不執贄不可以成賓主之合不受幣不可以成男女之合物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜崔氏憬曰窮則有變物極則反于初復其本則為誠實故言復則无妄朱漢上曰无妄然後物物循理乃可大畜郭白雲曰大畜畜无妄之道而已无妄之道天道也有无妄之道則可畜猶有天命之性則可率而循之也物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也虞仲翔曰人頤不動則死故受之以大過崔氏憬曰大畜日新其徳則可觀其所養蘇子瞻曰養而不用其極必動動而不已其極必過龔括蒼曰不養則不可動雖形體亦然況欲有為乎故由頤然後利涉大川也小者之過過其分而已大者而過則為已極矣故陷陷必有所麗雖性亦然唯解脫者无所麗也閻氏彦和曰養者君子所以成已動者君子之所以應物朱漢上曰過而不已則失中失中則陷沒必有所麗乃能出險胡雙湖曰物以中為貴以坎之陽中而節其過則不過矣故受之以坎頤大過而後坎離頤似離大過似坎也林次厓曰不専一則不能直遂不翕聚則不能發散故不養則不可動大過即動也以大過之才當大過之時而行大過之亊動而本于養也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也干令升曰此詳言三綱六紀有自來也天不地不生夫不婦不成相須之至王教之端故詩以闗睢為國風之始而易于咸恒備論禮義所由生也韓康伯曰人倫之道莫大乎夫婦故夫子殷勤深述其義以崇人倫之始蘇子瞻曰有男女然後有夫婦明咸恒之所以次坎離也朱子錯只作措字謂禮義有所施設耳物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也韓康伯曰宜與世升降有時而遯也陽盛隂消君子道盛晉以柔而進也崔氏憬曰不可以終壯于陽盛宜柔進而上行項平甫曰壯與遯相反遯于義為退大壯似于進矣然火壯不得為進蓋蓄材待時養銳積力以止為進者也故序卦不訓孟子善養浩然之氣至大至剛塞乎天地其大壯之事乎進必有所傷故受之以明夷夷者傷也傷于外者必反其家故受之以家人閻氏彦和曰以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也明夷之傷豈得不反于家乎郭兼山曰傷于外者必反于家蓋行有不得于人則反求諸已家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也韓康伯曰家人之義惟嚴于敬禮勝則離家人尚嚴其敝必乖張南軒曰三軍同心胡越一家六親不和舟中作敵宜乎有難項平甫曰屯蹇稱難者卦皆有坎也然屯動乎險中行乎患難者也蹇見險而止但為所阻難而不得前耳非患難之難故居屯者必以經綸濟之遇蹇者待其解緩而後前梁石門曰天下之事急則合緩則散故難之解散謂之緩蓋以緩而漸散也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也韓康伯曰益而不已則盈故必決也程子決判也有決判則有遇合本合則何遇張南軒曰美惡不兩立邪正不並行決去小人則君子交而遇也朱漢上曰緩則寛弛必有所失胡雙湖曰咸恒十變為損益猶乾坤十變為否泰俞石澗曰損之後繼以益深谷為陵之意益之後繼以夬髙岸為谷之意按盈必溢溢則決故益不可過物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎韓康伯曰井久則濁穢宜革易其故崔氏憬曰天地相遇品物咸章故曰聚也冥升在上則窮故言升而不已必困也困極于臲卼則反下以求安程子物積聚而益髙大聚而上也變生而熟易剛而柔革物也主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也張南軒曰一陽在下故動飄風不終朝驟雨不終日此物不可以終動閻氏彦升曰晉所謂進者有進而已此進必有傷也漸所謂進者漸進而已烏有不得所歸者乎窮大者必失其居故受之以旅旅而无所容故受之以㢲㢲者入也入而後說之故受之以兌兌者說也程子旅親寡非㢲順何所取容物相入則相說相說則相入張南軒曰入于道故有見而說朱漢上曰旅者君子之窮也㢲者隂入于陽之下也天之澤萬物禮義之說人心不入則不說說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過韓康伯曰渙者發暢而无所壅滯若肆而不反則遂乖離也事有其節則物之所同守而不散越也守其信者失貞而不諒之道以信為過也故曰小過張南軒曰惟說于道故推而及人說而後散故受之以渙朱漢上曰天地之節不可以不信不信則无以成萬物而況于人乎飲食起居身之節也不信則致疾尊卑長幼家之節也不信則召亂項平甫曰有其信猶書所謂有其善言以此自負而居有之也自恃其信其行必果而過于中蔡虚齋曰立節制于此上當信而守之下當信而行之故受以中孚若果于自信事不加詳審而在所必行能免于過乎有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉韓康伯曰行過乎恭禮過乎儉可以矯世勵俗有所濟也蘇子瞻曰未濟所以為无窮也張南軒曰事至于既濟則人情倦于有為事之隳廢而物之窮也故受之以未濟項平甫曰大過則踰越常理故必至于陷小過或可濟事故有濟而无陷也坎離之交謂之既濟此生生不窮之所從出也聖人猶以為有窮又分之以為未濟蓋情之交者不可以久而无弊必以分之正者終之總論蔡虚齋曰序卦之義有相反者有相因者相反極而變也相因未至于極者也雜卦傳孔仲達曰此孔子更以意錯雜而對辨其次第不與序卦同龍觀復曰按春秋傳釋繫辭所謂屯固比入坤安震殺之屬以一字斷卦義往往古筮書多有之雜卦此類是也夫子存之為經羽翼非創作也乾剛坤柔郭白雲曰卦中之剛柔皆乾之剛坤之柔也是以獨以乾坤為剛柔比樂師憂韓康伯曰親比則樂動衆則憂臨觀之義或與或求龔括蒼曰以上臨下以下臨上以已觀物以物觀已郭白雲曰臨與所臨觀與所觀二卦皆有與求之義或有與无求或有求无與皆非臨觀之道屯見而不失其居蒙雜而著熊與可云居協据本義屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也震起也艮止也損益盛衰之始也鄭康成作衰盛虞仲翔曰損泰初益上衰之始損否上益初盛之始大畜時也无妄災也熊云時協是災協宰何𤣥子曰大畜天衢之亨得時矣然无畜而時不謂時也大畜故謂之時耳无妄或繋之牛逢災矣然有妄而災不謂災也无妄故謂之災耳萃聚而升不來也熊云來協里去聲蘇子瞻曰澤上于地萃聚于下也地中生木升于上也按澤水常瀦故曰聚木上升而不反生故曰不來謙輕而豫怠也熊云怠協棣龔括蒼曰意在卑故不自重意在樂故不自勤噬嗑食也賁无色也本義白受采俞石澗曰以色為飾曰賁唯其无色所以賁之若元有色則不可謂之賁也兌見而㢲伏也熊云伏協闢蘇子瞻曰柔在外則見在内則伏隨无故也蠱則飭也俞石澗曰故謂故舊與革去故之故同隨人則忘舊蠱則飭而新也觀彖守其故則不能舎已而隨人飭其新則可以去弊而興善剝爛也復反也徐進齋曰剝爛則陽窮于上復反則陽復于下猶果之爛墜于下則可種而生矣晉晝也明夷誅也熊云誅叶咮郭白雲曰晉與明夷朝暮之象故言明出地上明入地中孫氏奕曰反對之義明出地上為晝明入地中為昧當作明夷昧也井通而困相遇也項平甫曰以通與遇為反對則遇為相抵而不通之象矣㢲之上爻主塞坎水之上源而井之坎出其上蓋塞而復通者也故謂之通兌之下爻主塞坎水之下流而困之坎適在其下正遇其塞所以困也咸速也恒久也熊云久叶已虞仲翔曰相感者不行而至故速日月久照四時久成故久渙離也節止也徐進齋曰渙節皆有坎水風以散之則離澤以瀦之則止解緩也蹇難也龔括蒼曰蹇則急解則易俞石澗曰互文見意也睽外也家人内也朱漢上曰闗子明曰明乎外者物自睽明乎内者家自齊項平甫曰外内皆以離言也火在外則氣散火在内則神凝治身治國一也否泰反其類也熊云類叶耒龔括蒼曰陽與陽隂與隂類也否泰以其類反故爻言彚言疇大壯則止遯則退也項平甫曰以乾卦言也乾壯則止而不退乾遯則退而不止觀彖難進而易退大有衆也同人親也革去故也鼎取新也朱漢上曰功成者退方來者進一去一取天之道也小過過也中孚信也熊云故過新信互韻信叶申龔括蒼曰大者之過所謂分也小者之過所謂過也孚而不中非所謂信也觀彖行有時而或過心无時而不實豐多故也親寡旅也熊云故叶古蘇子瞻曰豐以盛大而多憂旅以寡弱而相親離上而坎下也熊云下協虎韓康伯曰火炎上水潤下小畜寡也履不處也熊云寡叶古觀彖一隂畜衆陽則寡而為力也微一隂履衆剛則危而不敢寧處需不進也訟不親也熊云進協津大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也熊云顛滴音切正協貞定協汀行協杭窮協强終叶章虞仲翔曰既濟六爻得位定也女終于嫁從一而終故女之終也蘇子瞻曰雜卦皆兩兩相從而明相反之義自大過以下則非相從之次蓋傳者失之也今改而正之曰頤養正也大過顛也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也初上者本末之地也以陽居之則正以隂居之則顛故曰頤養正也大過顛也艮下㢲上為漸男下女非其正也故曰漸女歸待男行也兌下震上為歸妹男女之正也故曰歸妹女之終也離上坎下為男女之正也故既濟定也坎下離上男失其位窮之道故曰未濟男之窮也如此則相從之次相反之義渙然若合符節矣蔡節齋曰自大過以下有亂簡雜卦皆反對協韻為序今以其例改正大過顛也頤養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也丘行可曰依蔡易讀之則八卦既以類相從而韻亦叶但不敢僭改經文按蔡氏所改與蘇氏所改反對協韻同而次序則蘇勝以乾坤始以既未濟終更不失全易之大旨因錯簡而遂為決去一隂復為純乾之說恐非夫子意也周易孔義集說卷二十
